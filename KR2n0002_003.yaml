front:
  text: 昭德先生郡齊讀書志卷第三上子部其類十六一曰儒家類二曰道家類三曰法家類四曰名家類五曰墨家類六曰縱橫類七曰雜家類八曰農家類九曰小說類十曰天文曆算類十一曰兵家類十二曰類家類十三曰雜藝類十四曰醫書類十五曰神仙類十六曰釋書類序九流者以謂皆出於先王之官咸有所長及失其傳故各有弊非道本然特學者之過也是以録之又以醫卜技藝亦先王之所不廢故附於九流之末夫儒墨名法先王之教醫卜技藝先王之政其相附近也固冝昔劉歆既録神仙之書而王儉又録釋氏今亦循之者何哉自漢以後九流䆮微隋唐之間又尚辭章不復問義理之實雖以儒自名者亦不知何等為儒術矣况其次者哉百家壅底正塗之弊雖息而神仙服食之說盛釋氏因果之教興雜然與儒者抗衡而意常先之不為所惑者鮮矣其為患又甚於漢蓋彼八家皆有𥙷於時特學者失之而莊老猶足以亡晉申商猶足以滅秦况二教無意於世不自附於聖人若學而又失之則其禍將如何故存之以為世戒云
