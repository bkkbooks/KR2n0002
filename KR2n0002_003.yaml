body:
  text: 儒家類曾子二卷右魯曾參撰漢藝文志曽子十八篇隋志曽子二卷目一卷唐志曾子二卷今世傳曽子二卷十篇本也有題曰傳紹述本豈樊宗師歟視隋亡目一篇考其書已見於大戴禮漢有禮經七十篇后氏戴氏記百三十一篇七十子後學者所記是時未有大小戴之分不知曽子在其中歟否也豫從父詹事公嘗病世之人莫不尊事孟子而知子思中庸者蓋寡知子思中庸者雖寡而知讀曾子者殆未見其人也是以文字回舛謬誤乃以家藏曾子與溫公所藏大戴參校頗為是正而盧注遂行於曽子云子思子一卷右周孔伋字子思撰四庫書目中無之載孟軻問牧民之道何先子思曰先利之曰君子之教民者亦仁義而已何必曰利仁義者固所以利之也上不仁則下不得其所上不義則下樂為詐此為不利大矣故易曰利者義之和也又曰利用安身以崇德也此皆利之大者也溫公采之著之於通鑑孟子十四卷右魯孟軻撰漢趙𡵨注自為章指折十四篇序云軻鄒人戰國時以儒術干諸侯不用退與公孫丑萬章之徒難疑答問著書七篇三萬四千六百八十五言按此書韓愈以為弟子所㑹集非軻自作今考於軻之書則知愈之言非妄發也其書載孟子所見諸侯皆稱諡如齊宣王梁惠王梁襄王滕定公滕文公魯平公是也夫死然後有諡軻著書時所見諸侯不應皆死且惠王元年至平公之卒凡七十七年孟子見惠王王目之曰叟必已老矣决不見平公之卒也故子以愈言為然孟子音義二卷右皇朝孫奭等撰大中祥符中𬒳㫖校正孟子因以張鎰于公著音義參考成書上之五臣解孟子十四卷右皇朝范祖禹孔武仲吳安詩豐稷呂希哲元祐中同在經筵所進講義貫穿史傳辝㫖精贍撗渠孟子解十四卷右皇朝張載子厚撰并孟子統說附于後荀子二十卷右趙荀况撰漢劉向校定除其重復著三十二篇為十二卷題曰新書稱卿趙人名况當齊宣王威王之時聚天下賢士稷下是時荀卿為秀才年十五始來遊學至齊襄王時荀卿最為老師後適楚相春申君以為蘭陵令已而歸趙按威王死其子嗣立是為宣王楚考烈王𥘉黃歇始相年表自齊宣王元年至楚考烈王元年凡八十一年則荀卿去楚時僅百嵗矣新書十卷右漢賈誼撰著事勢連語雜事凡五十八篇劉向校定除其重復者或取漢書誼傳附于後范氏注太玄經十卷右漢揚雄撰雄字子雲凖易而作太玄覃思渾天書為三方九州二十七部八十一家以三相乘為八十一首首為九贊共七百二十九贊二贊當一度以盡周天三百六十五度又為踦二贊以當四分度之一以五行為一家起于中孚而終於頥范望字叔明晉人也為解其序云子雲著玄桓談以為絶倫張衡擬五經自侯芭受業之後希有傳者建安中宋衷陸績解釋之文字繁猥今以陸為本録宋所長訓理其義為十卷且以首分居本經之上以測散處贊辭之下其前又有陸績序以子雲為聖人云太玄經十卷右皇朝徐庸注庸慶曆間人也以范望解指義不的因王涯林氏諸解重為之注取王涯說玄附於後及自為玄頥通名之為太玄性總其自序云爾又多改其文字如以杚為仡以㛂為㛂以牡凡為札乃以半為手以孿為㝈以稚為推之類其所謂林氏者林瑀也太玄經疏十八卷右皇朝郭元亨撰元亨序云昔揚雄作玄傳之侯芭後獨有張衡桓談張華見而稱嘆吳郡鄒伯歧求本不能得宋衷為訓解陸績為注解皆未明白范叔明王涯皆注之元亨在蜀自淳化末迄于祥符八年僅三十年撰成今疏又云太玄潤色於君平未知出何書也法言十三卷右漢揚雄撰皇朝司馬光集晉李軌唐柳宗元皇朝宋咸吳祕注雄好古學見諸子各以其知舛駮不與聖人同是非頗謬於經故人時有問雄者常用法應之撰以為十三卷象論語號曰法言每篇復為序贊以發其大意新序十卷右漢劉向撰向當成帝時典校書因採傳記行事百家之言刪取正辭美義可勸戒者為新序說苑共五十篇新序陽朔元年上世傳本多亡闕皇朝曾子固在館中自校正其訛舛而綴緝其放逸久之新序始復全說苑二十卷右漢劉向撰以君道臣術建本立節貴德復恩政理尊賢正諫法誡善說奉使權謀至公指式談叢雜言辦物修文為目鴻嘉四年上之闕第十三卷曾子固校書自謂得十五篇於士大夫家與崇文舊書五篇合為二十篇而叙然止是折十九卷作修文上下篇耳鹽鐵論十卷右漢桓寬次公撰寬汝南人孝昭時丞相御史與賢良文學論鹽鐵事因撰次之潜夫論十卷右後漢王符撰在和安之世耿介不同於俗遂不得進隱居注書二十餘篇以譏當時失得不欲彰顯其名故號潜夫云中論二卷右後漢徐幹所撰幹鄴下七子之一人也仕魏王國文學建安之間嫉詞人美麗之文不能敷散道教故著中論二十餘篇辭義典雅當世嘉之此本無復三年制役二篇家訓七卷右北齊顔之推撰之推本梁人所著凡二十篇述立身治家之法辨正時俗之謬以訓諸子孫續家訓八卷右皇朝董正功撰續顔氏之書家範十卷右皇朝司馬光君實撰取經史所載賢聖修身齊家之法分十九門編類以訓子孫正蒙書十卷右皇朝張載子厚撰張舜民嘗乞追贈載于朝云橫渠先生張載著書萬言名曰正蒙隂陽變化之端仁義道德之理死生性命之分治亂國家之經罔不究通方之前人其孟軻揚雄之流乎潜虛一卷右皇朝司馬光擬太玄撰此書以五行為本五五相乘為二十五兩之得五十首有氣體性名行變解七圖然其辭有闕者蓋未成也其手寫草藁一通今在子健姪房帝學十卷右皇朝范祖禹編纂自古賢君下逮祖宗務學事跡為一編以勸講理窟二卷右題曰金華先生未詳何人為程張氏之學者文中子中說十卷右隋王通之門人共集其師之語為是書通行事於史旡考焉隋唐通録稱其有穢行為史臣所削今觀中說其迹往往僣聖人摸擬竄竊有深可怪笑者獨貞觀時諸將相若房杜李魏二溫王陳皆其門人豫嘗以此為疑及見關朗李德林薛道衡事然後知其皆妄也通生於開皇四年而德林卒以十一年通適八歲固未有門人通仁壽四年嘗一到長安時德林卒已九載矣其書乃有豫在長安德林請見歸援琴鼓蕩之什門人皆霑襟關㓪在太和中見魏孝文自大和丁巳至通生之年甲辰蓋一百七年矣而其書有問禮於關子明隋書薛道衡傳稱道衡仁壽中出為襄州總管至焬帝即位召還本紀仁壽二年九月襄州總管周搖卒道衡之出當在此年也通仁壽四年始到長安是年高祖崩蓋仁壽末也又隋書稱道衡子收𥘉生即出繼族父孺飬於孺宅至於長成不識本生其書有內史薛公見子於長安語子收曰汝往事之用此三事推焉則以房杜輩為門人抑又可知也删孟右皇朝馮休撰其序云觀孟軻書時有叛違經者殆軻之沒其門人妄有附益耳將刪去之懼得罪於獨見遂著書十七篇以别其僞其後溫公蘇子瞻皆嘗疑軻之言有與經不合者蓋始於休云太玄經解十卷并發隱三卷釋文一卷右皇朝張察撰嘉祐中成都帥蔣堂獻其書于朝詔書寵奬賜號同退處士實録稱察字隱之雙流人通經術善屬文性恬淡屏居林泉以飬生治氣為事道家類河上公注道德經二卷右李耳撰以周平王四十二年授關尹喜凡五千七百四十有八言八十一章言道德之㫖其末云使民復結繩而用之蓋三皇之道也河上公注晉葛洪曰河上公者莫知其姓名漢孝文時居河之上侍郎裴偕言其通老子孝文詣問之即授素書道德經章句二卷其書頗言吐故納新按摩步引之術近神仙家也傳奕謂常善救人故無棄人常善救物故無棄物四句古本無有獨得於河上公耳老子疏六卷右唐玄宗撰玄宗既為注又為疏六卷唐藝文志有之天寶中加號玄邁道德經世不稱之嘗以河上公本校之不同者百餘字以校世傳本當乙者五字當注者五十五字當塗者三十八字最與御注不同如此云天下柔弱莫過於水而堅强者莫能勝以無能易之而御注作天下莫柔弱於水而故堅强者莫之能先以其無以易之也如此本云恬惔為上勝而不美而美之者是樂殺人者不可得志於天下矣吉事尚左凶事尚右偏將軍處左上將軍處右言以喪禮處之御注本恬惔為上故不美也若美必樂之樂之者是樂殺人也夫樂殺人者不得志於天下矣故吉事尚左凶事尚右偏將軍處左上將軍處右言以喪禮處之其不同至如此三十家注老子八卷右唐蜀郡岷山道士張君相集河上公嚴遵君平王弼輔嗣郭象子玄鐘㑹士秀孫登公和羊祐叔子羅什盧𥙿仲儒劉仁㑹顧歡景怡陶隱居松靈仙裴處恩杜弼節解張憑張嗣臧玄靜大孟小孟竇略宋文明禇糅劉進喜蔡子晃成玄英車惠弼等注君相稱三十家而列其名止二十有九蓋君相自為一家言并數之爾君相不知何時人而謂成玄英為皇朝道士則唐天寶後人也絶學無憂一句在絶聖棄知章下以唯之與阿别為一章與諸本不同老子指歸十三卷右漢嚴遵撰谷神子注本理國修身清淨無為之說按唐志有嚴遵指歸四十卷馮廓注指歸十三卷此本有序注而題谷神子疑即廓也王介甫注老子二卷王元澤注二卷吕吉甫注二卷陸佃注二卷劉仲平注二卷右皇朝王安石介甫注介甫平生最喜老子故解釋最所致意如無名天地之始有名萬物之母常無欲以觀其妙常有欲以觀其徼皆於有無字下斷句與先儒不同他皆類此後其子雱其黨吕惠卿陸佃劉仲平皆有老子注蘇子由注老子二卷右皇朝蘇轍子由注子由謫官筠州頗與學浮屠者游而有所得焉於是解老子中庸曰喜怒哀樂未發之謂中發而皆中節之謂和致中和天地位焉萬物育焉此非佛法而何六祖謂不思善不思惡則喜怒哀樂之未發也蓋中者佛法之異名而和者六度萬行之揔目也致中極和而天地萬物生於其間此非佛法何以當之天下無二道而所以治人則異古之聖人中心行道而不毁世法以此耳故解老子亦時有與佛法合者其自序如此其解是謂襲明以為釋氏傳燈之類劉巨濟注老子二卷右皇朝劉涇巨濟注涇蜀人篤志于學文詞竒偉早登蘇子瞻之門晚受知于蔡京除太學博士文子十二篇右李暹注其傳曰姓辛氏葵丘濮上人號曰計然范蠡師事之本受業於老子文子録其遺言為十二篇云按劉向録文子九卷而巳唐志録暹注與今篇次同豈暹折之歟顔籕以其與孔子並時而稱周平王問疑依託者然三代之書經秦火之後幸而存者其錯亂參差類如此小雅周公作也而有張仲孝友列子鄭穆公時人而有子陽餽粟是也李暹師事僧般若流支蓋元魏人也列子冲虛至德真經八卷右鄭列禦冦撰禦冦劉向校定八篇云繆公時人學本於黃帝老子清虛無為務宗不競其寓言與莊周類晉張湛注唐號冲虛真經皇朝加至德之號力命篇言壽夭不存於葆飬窮逹不係乎智力皆天之命也楊朱篇言肆耳目之欲而不恤生之危縱酒色之娛而不顧名之醜是之謂制命於內劉向以二義乖皆不似一家之言豫以為非也道家之學本謂世衰道喪物僞滋起或騁智力以圖利不知張毅之走高門竟以病殞或背天真以徇名不知伯夷之在首陽因以餒終是以兩皆排擯欲使好利者不巧詐以干命好名者不矯妄以失性爾非不同也雖然儒者之道則異乎是雖壽夭窮達之非人力也必修身俟焉以為嵓墻之下而死者非正命也雖知耳目之於聲色有性焉以為其樂也外而不易吾內嗚呼以此自為則為愛已以此教人則為愛人儒者之道所以萬世而無弊歟莊子南華真經十卷右莊周撰晉郭象注周為蒙漆園吏按漢書志書本五十二篇晉向秀郭象合為三十三篇內篇八外篇十五雜篇十一唐世號南華真經自孔子沒天下之道術日散老𥅆始著書垂世而虛無自然之論起周又從而羽翼之棓擊百世之聖人殫殘天下之聖法而不忌其言可謂反道矣自荀卿揚雄以來諸儒莫不闢之而放者猶自謂游方之外尊其學以自肆於是乎禮教之大壞戎狄亂華而天下橫流兩晉之禍是巳自熙寧元豐之後學者用意之過見其書末篇論天下之道術雖老聃與其身皆列之為一家而不及孔子莫不以為陽訿孔子而隂尊焉遂引而內之殊不察其言之指歸宗老氏邪宗孔氏邪既曰宗老氏矣庸詎有隂助孔氏之理也邪至其論道術而有是言蓋不得已耳夫盜之暴也又何嘗不知主人之為主人邪顧可以其智及此遂以為尊我開關揖而進之乎竊懼夫禍之過乎兩晉也南華真經疏三十三卷右唐成玄英撰本郭象注為之疏義玄英字子實陜州人隱居東海貞觀五年召至京師加號西華法師永徽中流郁州書成道士王元慶邀文學賈鼎就授大義嵩高山人李利涉為之序疏云莊周字子休鶡冠子三卷右按漢志鶡冠子楚人不顯名氏居深山以鶡羽為冠因自號焉著書十五篇論三才變通古今治亂之道唐柳宗元嘗辨此書非古而韓愈獨稱焉二人皆名儒未知孰是亢倉子二卷右唐柳宗元曰太史公為莊周列傳稱其為書畏纍亢桑子皆空言無事實今世有亢桑子書其首篇出莊子而益以庸言蓋周所云者尚不能有事實又况取其語而益之者其為空言尤也劉向斑固録書無亢倉子而今之為術者乃始為之傳注以教於世不亦惑乎按大唐天寶元年詔號亢桑子為洞靈真經然求之不獲襄陽處士王士元謂莊子作庚桑子太史公作亢倉子其實一也取諸子文義類者𥙷其亡今此書乃士元𥙷亡者元不知其故而遽棓擊之可見其鋭于譏議也其書多作古文奇字豈內不足者必假外飾與何璨注素書一卷右題黃石公著凡一千三百六十六言其書言治國治家治身之道而厖亂無統蓋采諸書以成之者也無盡居士注素書一卷右皇朝張啇英注啇英稱素書凡六篇按漢書黃石公圯上授子房世人多以三略為是蓋誤也晉亂有盜發子房塜玉枕中獲此書云抱撲子內篇二十卷外篇十卷右晉葛洪撰洪字稚川丹陽句容人元帝時纍召不就止羅浮山錬丹著書推明飛升之道導飬之理黃白之事二十卷名曰內篇十卷名曰外篇自號抱撲子因以命書隂符經一卷右唐少室山布衣李筌序云隂符經者黃帝之書或曰受之廣成子或曰受之玄女或曰黃帝與風后玉女論隂陽六甲退而自著其事隂者暗也符者合也天機暗合於事機故曰隂符皇朝黃庭堅魯直嘗跋其後云隂符出於筌熟讀其文知非黃帝書也蓋欲其文奇古反詭譎不經蓋糅雜兵家語又妄託子房孔明諸賢訓注尤可笑惜不經柳子厚一掊擊也法家類管子十八卷右齊管夷吾撰書冨國之要述輕重九府取人之制劉向校八十一篇今亡一篇五十八篇有注解桉杜佑指略序云房玄齡所注或云唐尹知章注未詳韓子二十卷右韓非撰非韓諸公子喜刑名法術以冨國彊兵法制之䇿干韓王不用作孤憤五蠧說林說難十餘萬言秦王見書嘆曰得此人與之游死不恨急攻韓得非後用李斯之毁下吏治赦之不及商子五卷右秦公孫鞅撰魏之庶孽相秦封商好刑名之學秦委以政遂致富彊卒以刻薄致誅所著本二十九篇今亡者三篇名家類尹文子三卷右仲長氏所定尹文子篇序稱文子當齊宣王時居稷下學於公孫龍龍稱之而前漢藝文志叙此書在龍書上顔師古謂文嘗說齊宣王在龍之前史記云公孫龍客于平原君君相趙惠文王惠文王元年齊宣沒已四十餘歲矣則知文非學於龍者也今觀其書雖專言刑名然亦宗六藝數稱仲尼其叛道者蓋鮮豈若龍之不宗賢聖好怪妄言哉李獻臣云仲長氏統也熙伯繆襲字也傳稱統卒於獻帝遜位之年而此云黃初末到京師豈史之誤乎此本冨順李氏家所藏者謬誤殆不可讀因為是正其甚者疑則闕焉鄧析子二卷右鄧析二篇文字訛缺或以繩為澠以巧為功頗為是正其謬且撮其㫖意而論之曰先王之世道德修明以義為輔誥命謨訓則著之書諷頌針規則寓之詩禮樂以彰善春秋以懲惡其始雖若不同而其歸則合猶天地之勢殊而育物之化均寒暑之氣異而成歲之功一豈非出於道德而然邪自文武既沒王者不作道德昧於天下而仁義幾于熄百家之說􅑣起各求自附於聖人而不見夫道之大全以其私知臆說譁世而惑衆故九流皆出於晚周其言各有所長而不能無所失其長蓋或有見於聖人而所失蓋各奮其私知故明者審取舍之而已然則析之書豈可盡廢哉左傳曰駟歂殺析而用其竹刑班固録析書於名家之首則析之學蓋兼名法家也今其書大㫖訐而刻真其言也無可疑者而其間時勦取他書頗駮雜不倫豈後人附益之與人物志三卷右魏劉邵撰凡一十二篇僞凉劉昞注以人物情性志氣不同當審察材理各分等列云墨家類墨子五十卷右宋墨翟撰戰國時為宋大夫著書七十一篇以貴儉兼愛尊賢右鬼非命尚同為說云荀孟皆非之而韓愈獨謂辨生於末學非二師之道本然也晏子春秋十二卷右齊晏嬰也嬰相景公此書著其行事及諫諍之言昔司馬遷讀而高之而莫知其所以為書或曰晏子之後為之唐柳宗元謂遷之言乃然以為墨子之徒有齊人者為之墨好儉名世故墨子之徒尊著其事以增高為已術者且其㫖多尚同兼愛非樂節用非厚葬久喪非儒明鬼皆出墨子又往往言墨子聞其道而稱之此甚顯白自向歆彪周皆録之儒家非是後冝列之墨家今從宗元之說云縱橫家類鬼谷子三卷右鬼谷先生撰按史記戰國時隱居頴川陽城之鬼谷因以自號長於飬性治身蘇秦張儀師之受縱橫之事叙謂此書即授秦儀者捭闔之術十三章本經持樞中經三篇梁陶弘景注柳子厚嘗曰劉向班固録書無鬼谷子鬼谷子後出而嶮盩峭薄恐其言妄亂世難信尤者晚乃益出七術怪謬異甚言益隘使人猖狂失守來鵠亦曰鬼谷子昔教人詭紿激訐揣測憸滑之術悉備於章學之者惟儀秦而已始椑闔飛䈤實今之常態是知漸漓之後不讀鬼谷子書者其行事皆得自然符契也昔倉頡作文字鬼為之哭不知鬼谷作是書鬼何為邪世人欲知鬼谷子者觀二子言略盡矣故掇其大要著之篇戰國䇿三十三卷右漢劉向校定三十三篇東西周各一秦五齊六楚趙魏各四韓燕各三宋衛舊有五號向以為皆戰國時游士䇿謀改定今名其事則上繼春秋下訖楚漢之起凡二百四十五年崇文總目多闕至皇朝曾鞏校書訪之士大夫家其書始復完漢高誘注今上十篇餘逸歷代以其記諸國事載於史類豫謂其紀事不皆實録難盡信蓋出學縱橫者所著當附于縱橫家云雜家類吕氏春秋二十六卷右秦吕不韋撰後漢高誘注按史記不韋傳云不韋相秦招致辨士厚遇之使人人著所文集論以為八覽六論十二紀二十餘萬言以為備天地萬物古今之事號曰吕氏春秋布咸陽市門懸千金其上延諸侯遊士賔客有能增損一字豫千金淮南子二十一卷右漢劉安撰安淮南厲王子也襲封招致儒士賔客講道德總統仁義作為內書二十一篇後漢許慎注慎標其首皆曰間詁次曰淮南鴻烈自名注曰記上第七十九闕子華子十卷右其傳曰子華子程氏名本晉人也劉向校定其書桉莊子稱子華子見韓昭侯陸德明以為魏人既不合又藝文志不録子華子書觀其文辭近世依託為之者也其書有子華子為趙簡子不悅又有秦襄之卒在春秋前而趙簡子與孔子同時相去幾二百年其抵捂類如此且多字說繆誤淺陋殆元豐以後舉子所為爾論衡三卷右後漢王充仲任撰充好論說始如詭異終有實理以俗儒守文多失其真乃閉門潜思户牖墻壁各置刀筆著論衡八十五篇釋物類同異正時俗嫌疑後蔡雍得之祕玩以為談助云金樓子十卷右梁元帝撰繹書十五篇論歷古興王之迹針戒立言志怪雜說自叙著書聚書通曰金樓子者在藩時自號長短經十卷右唐趙㽔撰論王霸機權正變長短之術凡六十三篇第十九載兵權隂謀云致理書十卷右唐朱朴撰乾寧中為國子毛詩博士論述時務凡五十篇上之事始三卷右唐劉孝孫等撰太宗命諸王府官以事名類推原𥘉始凡二十六門以教始學諸王云續事始五卷右僞蜀馮鑑廣孝孫所著事原録右皇朝朱繪撰其書事始之類也炙轂子雜録注解五卷右唐王睿撰二儀實録古今注載事物之始樂府題載樂府所由起睿輯纂數家之言正誤闕疑𥙷遺削冗併歸一編云宋齊丘化書六卷右僞唐宋齊丘子嵩撰張耒文潜嘗題其後云齊丘之智特犬鼠之雄耳蓋不足道其為化書雖皆淺機小數亦微有以見於黃老之所謂道德其能成功有以也文章頗亦高簡有可喜者其言曰君子有奇智天下不親雖聖人出斯言不廢農家類齊民要術十卷右元魏賈思協撰記民俗歲時治生種蒔之事凡九十二篇四時纂要五卷右唐韓諤撰諤遍閲農書取廣雅爾雅定土産取月令家令叙時冝採沉勝種樹之書掇崔實試穀之法兼删韋氏月録齊民要術編成歲華紀麗四卷右唐韓諤撰分四時十二月節序以事實為偶儷之句附著之錢譜十卷右梁顧烜嘗撰錢譜一卷唐張台亦有錢録兩卷皇朝紹聖間李孝美以兩人所纂升錯增廣成十卷分八品云錢譜十卷右皇朝董逌撰逌之祖嘗得古錢百令逌考次其文譜之以前世帝王世次為序且言梁顧烜唐封演之譜漫汗蔽固不可用其譜自太昊葛天氏至堯舜夏商皆錢弊其穿鑿誕妄至此茶經三卷右唐陸羽鴻漸撰載産茶之地造作器具古今故事分十門煎茶水記一卷右唐張又新撰其所嘗水凡二十種因第其味之優劣茶譜一卷右魏僞蜀毛文錫撰記茶故事其後附以唐人詩文建安茶録三卷右皇朝丁謂撰録建安園焙之數圖其器具叙採制入貢法式北菀拾遺一卷右皇朝劉异採新聞遺事附丁晉公茶經之末𥙷茶經一卷右皇朝周綘以陸羽茶經不載建安故𥙷之試茶録二卷右皇朝蔡襄撰記其烹試之法東溪試茶録一卷右皇朝宋子安集拾丁蔡之遺荔支譜一卷荔支故事一卷右皇朝蔡襄撰記建安荔支凡三十餘種古今故事酒經三卷右皇朝朱肱撰記釀酒諸法并麴蘖法續酒譜十卷右唐鄭遨雲叟撰輯古今酒事以續王續之書忘懷録三卷右皇朝元豐中夢上丈人撰所集皆飲食器用之式種藝之方可以資山居之樂者不詳其名氏昭德先生郡齊讀書志卷第三上昭德先生郡齊讀書志卷第三下小說類太平廣記五百卷右皇朝太平興國初詔李昉等取古今小說編纂成書同太平總類太平御覽上之補妬記一卷右古有妬記久巳亡之不知何人輯傳記中婦人嚴妬事以補亡自商周至于唐初吉凶影響十卷右皇朝岑象求編熙寧末間居江陵散閲載籍見善惡報應事輒刪潤而記之間有聞見者難於備載亦采摘著于篇文房四譜五卷右皇朝蘇易簡撰集古今筆硯紙墨本原及其故實繼以賦頌述作有徐鉉序紺珠集十三卷右皇朝朱勝非編百家小說成此書序說張燕公有紺珠見之則能記事不忘故以為名類記六十卷右皇朝曾慥編其序云間居銀峯因集百家之說纂成書可以資治體助名教供笑談廣聞見二百家類事六十卷右分門編古今稗官小說成一書雖曰該博但失於太略耳不題人姓氏世說新語十卷右宋劉義慶撰劉孝標注紀東漢以後事分三十八門唐藝文志云劉義慶世說八卷劉孝摽續十卷而崇文揔目止載十卷當是孝摽續義慶元本八卷通成十卷耳一本極詳一本殊略未知孰為正然其目則同劉知幾頗言非其實録博物志十卷右晉張華茂先撰周日用注載歷代四方奇物異事首卷有地理略後有讚文述異記二卷右梁任昉撰昉家藏書三萬采前丗異聞成書談賔録十卷右唐胡璩子溫撰皆唐朝史之所遺文武聞人劇談録三卷右康軿字駕言撰乾符中登第書載唐丗故事因話録六卷右唐趙璘撰字澤章大中衢州刺史記唐史逸事戎幕間談一卷右唐韋絢撰大和中為李德裕從事記德裕所談劉公嘉話録一卷右唐韋絢撰劉公謂禹錫絢字文明執誼子也咸通中節度義武幼從學於禹錫録其話言家學要録一卷右唐栁珵撰採其曾祖彥昭祖芳父冕家集所記纍朝典章因革時政得失著此録小說之尤者也常侍言㫖一卷右唐栁珵記其世父登所著六章上清劉幽求二傅附樹萱録一卷右序謂纂尚書滎陽公所談陸氏集異記二卷右唐陸勳纂語怪之書也凡三十二事資暇三卷右唐李匡乂濟翁撰序稱世俗之談類多訛誤雖有見聞默不敢證故著此書上篇正誤中篇談原下篇本物以資休暇云封氏見聞記五卷右唐封演撰分門記儒道經籍人物地理雜事且辨俗說訛謬蓋著其所見聞如此芝田録一卷右叙謂嘗憩緱氏故取潘嶽西征賦名其書記隋唐雜事未詳何人揔六百條朝野簽載補遺三卷右唐張鷟文成撰分三十五門載唐朝雜事鷟自號浮休子蓋取莊子其生也浮其死也休之義雲溪友議三卷右唐范攄撰記唐開元以後事攄五溪人故以名其書杜陽雜編三卷右唐蘇鶚字德祥光啓中進士家武功杜陽川雜録廣德以至咸通時事金華子三卷右唐劉崇逺撰金華子崇逺自號也録唐大中後事一本題曰劉氏雜編乾饌子三卷右唐溫庭筠撰序謂語怪以恱賔無異饌味之適口故以乾饌命篇幽間鼓吹一卷右唐張固撰紀唐二十餘事懿僖間人酉陽雜爼二十卷續十卷右唐假成式撰自序云縫掖之徒及怪及戲無侵於儒詩書為大羮史折爼子為醯醢大小二酉山多藏奇書故名酉陽雜爼分三十門為三十卷其後又續十卷北夢瑣言三十卷右荆南孫光憲撰取傳畋於江南之夢以其為髙氏從事在荆江之北故以命篇記唐至五代及十國雜事朝廷卓絶事一卷右唐陳岠撰記唐朝忠賢卓絶五十事卓異記一卷右唐李翺撰或題云陳翺記唐室功業特異并其臣美事二十七類托言十五卷右唐王定保撰八十三門記唐朝進士應舉登科雜事宣室志十卷右唐張讀聖朋撰纂輯仙鬼靈異事名曰宣室志者取漢文召見賈生論鬼神之義苗台符為之序洽聞記三卷右唐鄭常撰記古今神異詭譎事凡百五十六條或題曰鄭遂續玄怪録十卷右唐李復言撰續牛僧孺書也異聞集十卷右唐陳翰編以傳記所載唐朝竒怪事類為一書甘澤謡一卷右唐袁郊撰載譎異事九章咸通中久雨卧疾所著故曰甘澤謡稽神録十卷右南唐徐鉉撰記怪神之事序稱自乙未歲至乙卯凡二十年僅百五十事楊大年云江東布衣蒯亮好大言夸誕鉉喜之館于門下稽神録中事多亮所言河東記三卷右不著撰人亦記譎怪之事博異志右題曰谷神子纂不知撰人志怪之書也北里志一卷右唐孫􅙶撰記大中進士游俠邪雜事集異記三卷右唐薛用弱撰集隋唐間譎詭之事一題古異記尚書故實一卷右唐李綽編崇文目謂尚書即張延賞也綽記延賞所談故又題曰尚書談録按其書稱嘉貞為四世祖疑非延賞也唐語林十卷右未詳撰人效世說體分門記唐世事新增嗜好等十七門餘仍舊云史話三卷右不題撰人自後漢及江左朝野雜事皆記之傳竒三卷右唐裴鉶撰鉶髙駢客故其書所記皆神仙怪譎事駢之惑吕用之未必非鉶輩導諛所致稽神異苑十卷右題云南齊焦度撰雜編傳記鬼神變化及草木禽獸妖怪譎詭事按焦度南安氐也質訥朴戇以勇事髙帝决不能著書又卒於建元四年而所紀有梁天監中事必非也唐志有焦路窮神祕菀十卷豈即此書而相傳之訛與賈氏談録一卷右僞唐張洎奉使來朝録典客賈黃中所談三十餘事歸獻其主祕閣間談五卷右皇朝吳淑撰記祕閣同僚燕談洞微志十卷右皇朝錢希白述記唐以來詭譎事乘異記三卷右皇朝張君房撰其序謂乘者載記之名異者非常之事蓋志鬼神變怪之書凡十一門七十五事郡閣雅言一卷右皇朝潘若同撰太宗時守郡與僚佐話及南唐野逸賢哲異事佳言輒疏之于素凡五十六條以資雅言或題曰郡閣雅談楊文公談苑八卷右皇朝宋庠編初楊公億里人黃鑑裒撰平生異事為一編庠取而删類之分為二十一門晉公談録一卷右皇朝丁謂封晉公不知何人記其所談此書襄陽董識得之於洪州潘延之晉公甥也疑延之所作江鄰幾雜志右皇朝江休復撰休復歐陽永叔之執友其所記精博絶人逺甚鄰幾其字也景文筆録三卷右皇朝宋祁撰皆故事異聞嘉言奧論可為談助不知何人所編每章冠以公曰景文乃祁諡也東齊記十卷右皇朝范鎮景仁元豐中撰序言既謝事日於東齊燕坐追憶在朝時交遊言語與夫俚俗傳說因纂集成一編崇觀間以其及國朝故事禁之該聞録十卷右皇朝李畋撰畋蜀人張詠客也與范鎮友善熙寧中致事歸與門人賔客燕談衮衮忘倦門人請編録遂以該聞為目又有雜詩十二篇系于後筆談二十六卷右皇朝沈括存中撰括好功名城永樂不克貶死而實髙材博學多枝能音律星曆尤邃自序云退處林下深居絶過從所談者唯筆硯而已故以命其書凡十七目春明退朝録三卷右皇朝宋敏求次道撰多記國朝故典其序云熙寧三年豫奉朝請于春明里因纂所聞見湘山野録四卷右皇朝熙寧中僧文瑩撰記國朝故事孔氏雜記一卷右皇朝孔武仲撰論載籍中前言往行及國家故實賢哲文章亦時記其所見聞者倦遊雜録八卷右皇朝元豐初張正撰序言倦遊云者仕不得志聊書平生見聞將以信于世也自以非史官雖書善惡而不敢褒貶玉壺清話十卷右皇朝僧文瑩元豐中撰自序云文瑩收國初至熙寧中文集數千卷其間神道墓志行狀實録奏議之類輯其事成一家言玉壷隱居之潭也衣冠嘉話一卷右未詳何人撰記國初至熙寧中雜事南遷録二卷右皇朝張舜民藝叟撰舜民元豐中從軍攻靈州師還謪授郴州監酒即日之官記塗中所歷并其詩文茆亭客話十卷右皇朝黃休復撰茆亭其所居也暇日賔客話言及虛無變化謡俗卜筮雖異端而合道㫖屬懲勸者皆録之澠水燕談十卷右皇朝王闢紹聖間撰澠水其退居之地也闢從仕四方與賢士大夫燕談有可取者輒紀之久而得三百六十餘事漁樵間話二卷設漁樵問答及史傳雜事不知何人所為後山詩話二卷右皇朝陳師道無巳撰論詩七十餘條續詩話一卷右皇朝司馬光君實撰序云詩話尚有遺者歐公文章聲名雖不可及然記事一也故敢續之東坡詩話二卷右皇朝蘇軾號東坡居士雜書有及詩者好事者因集之成二卷歐公詩話一卷右皇朝歐陽修永叔撰修退居汝隂戲作此以資談笑中山詩話三卷右皇朝劉攽貢父撰多及歐梅蘇石攽以博學名世如言蕭何未嘗掾工曹亦有誤謬詩眼一卷右皇朝范溫元實撰溫范祖禹之子學詩於黃庭堅歸叟詩話六卷右皇朝王直方立之撰直方自號歸叟元祐中蘇子瞻及其門下士以盛名居北門東觀直方世居浚儀有别墅在城南殊好事以故諸公亟㑹其家由是得聞緒言餘論因輯成此書然其間多以己意有所抑揚頗失是非之實宣和末京師書肆刻印鬻之羣從中以其多記從父詹事公話言得之以呈公取覽之不懌曰皆非我語也東軒筆録十五卷續録一卷右皇朝魏泰撰襄陽人曾布之婦弟為人無行而有口頗為鄉里患苦元祐中紀其少時公卿間所聞成此編云冷齊夜話六卷右皇朝僧惠洪撰崇觀間記一時雜事惠洪喜遊公卿之門後生事配隸嶺表青瑣髙議十八卷右不題撰人載皇朝雜事及名士所撰記傳然其所書辭意頗鄙淺雲齊廣録十卷右皇朝政和中李獻民撰分九門記一時竒麗雜事遁齊間覽十四卷右皇朝陳正敏崇觀間撰正敏自號遁翁録其平昔所見聞分十門為小說一篇以備異日披閲勸善録六卷右皇朝周明寂元豐中纂道釋神竒禍福之效前人為傳記者成一編以誡世勸善録拾遺右不題撰人疑亦明寂所纂僅百事恱神集一卷右不題撰人記滑稽之說唐有邯鄲淳笑林此其類也漫叟見聞録一卷右不知何人建炎中所撰也碧雲霞兩卷右皇朝梅堯臣聖俞撰碧雲霞馬名以旋毛貴隂詆范文正公劉餗小說十卷右唐劉餗撰纂周漢至晉江左雜事皮氏見聞録五卷右唐皮光業撰光業唐末為錢鏐從事記當時詭異見聞洛中紀異十卷右皇朝秦再思撰記五代及國初䜟應雜事牧竪間談右皇朝景渙撰多記竒器異物渙自號玊壘山間吟牧竪云南郡新書五卷右皇朝錢希曰撰記唐朝雜事括異志纂十卷右皇朝張師正撰師正游宦四十年不得志於是推變怪之理參見聞之事得二百五十篇祖異志十卷右皇朝聶田撰田天禧中舉進士第不中因記近時詭聞異見一百餘事雞跖集十卷右未詳撰人纂集書傳中瑣碎佳事分門編次之傳曰善學者如齊王之食雞跖其名書之意殆以此也幕府燕間録十卷右皇朝畢仲詢景儒撰仲詢元豐初為嵐州推官纂當代怪竒可喜之事為二十門羣書古鑑一卷右未詳何人所撰熙寧間集書史中相術驗者稗官志一卷右皇朝吕大辨撰雜記其所聞前言往行師友談記一卷右皇朝李􅞧方叔撰多記蘇子瞻范純夫及四學士所談論故曰師犮龍川略志六卷龍川别志四卷右皇朝蘇轍撰元符二年夏居循州杜門閉目追惟平昔使其子逺書之于紙凡四十事其秋復記四十七事龍川循州地名天文卜算類司天考占星通玄寶鏡一卷右題曰巫咸氏皇朝興國中詔天下知星者詣京師未幾至者百許人坐私習文或誅配隸海島由是星曆之學殆絶甘石星經一卷右漢甘公石申撰以日月五星三垣二十八宿恆星圖象次舍有占訣以候休咎合元萬分曆一卷右唐曹氏撰未知其名曆元起唐髙宗顯慶五年庚申蓋民間所行小曆也本天笁曆為法李獻臣云集聖曆一卷右皇朝楊可撰推神物所向擇日辰吉凶應用之法步天歌一卷右未詳撰人二十八舍地歌也三垣頌五星凌犯賦附于後或云唐王希明自號丹元子五行類八五經三卷右序云黃帝書八五謂八卦五行雖後人依託者而其辭亦馴雅相墓書也青囊本㫖一卷右不記撰人演郭璞相墓青囊經也洞林别訣一卷右江南范越鳯集郭璞所記諸家地里得失為此書二十四篇并司空珏尋龍入式歌附珞琭子三命賦一卷右李獻臣云珞琭者取珞珞如玉琭琭如石之義推人生吉凶否泰之法李虛中命書三卷右唐李虛中撰虛中字常容姓纂云同之八代孫學最深於五行書壽夭貴賤利不利輒先處其年時萬不失一韓愈言同為虛中十一世祖誤也五行祕訣一卷右皇朝林開撰占燈法一卷右唐李淳風撰崇文揔目亦有之觀燈法一卷右唐李淳風撰袖中記一卷右皇朝唐濬撰辨人形色相知其壽夭吉凶集聖曆四卷右皇朝楊可集可為司天冬官正輯古今隂陽書彚為四時以㳙擇日辰云兵家類六韜六卷右周吕望撰案漢藝文志無此書梁隋唐始著録分文武龍虎豹犬六目兵家權謀之書也魏武注孫子一卷右吳孫武撰魏武帝注按藝文志孫子兵法八十二篇今魏武所注止十三篇杜牧以為武書數十萬言魏武削其繁剩筆其精粹成此書云其序略曰吾讀兵書戰䇿多矣武所著深矣李筌注孫子三卷右唐李筌注以魏武所解多誤約歷代史依遁甲注成三卷杜牧注孫子三卷右唐杜牧之注牧以武書大略用仁義使機權曹公所注解十不釋一而其所得自為新書爾因備注之世謂牧慨然最喜論兵欲試而不得其學能道春秋戰國時事甚慱而詳知兵者將有取焉陳皥注孫子三卷右唐陳皥撰皥以曹公注隱微杜牧注闊踈重為之注云紀燮集注孫子三卷右唐紀燮集唐孟氏賈林杜佑三家所解梅聖俞注孫子三卷右皇朝梅堯臣聖俞注歐公為之序王晢注孫子三卷右皇朝王晢撰晢以古本校正闕誤又為之注仁廟時天下久承平人不習兵元昊既叛邊將數敗朝廷頗訪知兵者士大夫人言兵矣故本朝注解孫武書者大抵皆當時人也何氏注孫子三卷右不題姓氏近代人也吳子三卷右魏吳起撰言兵家機權法制之說唐陸希聲類次為之說料敵治兵論將變動勵士凡六篇云司馬法三卷右齊司馬穰苴撰威王使大夫追論古者司馬兵法而附穰苴於其中因號司馬穰苴兵法司馬遷謂其書關黃石公三略三卷右題曰黃石公上中下三略其書論用兵機權之妙嚴明之決軍可以死易生國可以存易亡經籍志云下邳神人撰世傳此即圯上老人以一編書授漢張良者尉繚子五卷右尉繚子未詳何人書主刑法兵戰按漢藝文志有二十九篇今逸五篇首篇稱梁惠王問意者魏人與張橫渠注尉繚子一卷右皇朝張載撰其辭甚簡略李衛公對問三卷右唐李靖對太宗問兵事元豐中并六韜孫吳三略尉繚子司馬兵法類為一書頒之武學名曰七書史臣謂李靖兵法世無完書略見於通典今對問出於阮逸家或云逸因杜氏附益之李臨淮武記一卷右唐李光弼撰其書凡五十章末云吕望智廓而逺孫武思幽而密黃石寬而重斷吳起嚴而貴勇墨翟守而無攻老𣆀勝而不美今擇其精要雜以愚識為一家之書或題曰光弼從事張參所纂云人事軍律三卷右皇朝符彥卿撰其序稱言兵者多雜以隂陽殊不知往亡宋捷甲子胡興鵝入梟集翻成吉兆故此但述人事云或以為唐僧利正撰當考之庾衮保聚圖一卷右晉庾衮撰衮字叔褒西晉末保禹山張泓張昌不能犯所全活者母慮數百萬元康三年己酉因撰保聚壘議二十篇武侯十六䇿一卷右蜀諸葛亮孔明撰序稱謹進便冝十六事一治國二君臣三視聽四納言五察疑六治民七舉措八考黜九治軍十賞罰十一喜怒十二治亂十三教令十四斬斷十五思慮十六隂察陳壽録孔明書不載此䇿疑依託者神武祕要十卷右皇朝仁宗御撰纂古今兵書戰䇿及舊史成敗之迹類權謀形勢隂陽技巧九門左氏要類右皇朝韓迪撰纂左氏兵事凡五十門類書類同姓名録三卷右梁元帝撰纂類歷代同姓人成書一卷唐陸善經續增廣之初學記三十卷右唐徐堅等撰初張說類集事要以教諸王開元中詔堅與韋述余欽施敬本張烜李鋭孫季良分門撰次藝文類聚一百卷右唐歐陽詢等分門類事兼采前世賦詩銘頌文章附于逐目之後按唐志詢與令狐德棻袁朗趙智弘同修古今刀劒録一卷右唐梁陶弘景撰記古今刀劒古鏡記一卷右未詳撰人纂古鏡故事六帖三十卷右唐白居易撰以天地事物分門類為對偶而不載所出書曾祖父祕閣公為之注行于世世傳居易作六帖以陶家瓶數千各題名目置齊中命諸生採集其事類投瓶內倒取之抄録成書故所記時代多無次序云記室新書三十卷右唐李途撰采托故事綴為偶儷之句分四百門途為東川掌記因以名其書云兔薗䇿十卷右唐虞丗南撰奉王命纂古今事為四十八門皆偶儷之語戚苑英華十卷右唐袁恱重修本楊名所著恱掇其要類為對以他說附益之通典二百卷右唐杜佑撰先是劉秩采經史自黃帝迄唐天寶末制度㳂革廢置論議得失倣周禮六官法為政典三十五篇房琯稱才過劉向佑以為未盡因廣之參以新禮為二百篇以食貨選舉職官禮樂刑法州郡邊防八門分類序載世推該洽凡三十六年成書德宗時上之五代㑹要三十卷右皇朝王漙等撰采梁至周典故纂次建隆初上之節國朝㑹要十二卷右皇朝章得象等天聖中被詔以國朝故事因革制度編次宋綬馮元李淑王舉正王洙同修得象監總慶曆四年書成上之凡一百五十卷范師道以其猥冗節其要以備檢閲古城冢記二卷右唐皇甫覽撰記古城新築之人姓名初不及冢而名曰城冢記未知其說太平總領五十卷右皇朝李昉等撰太平興國中昉被詔纂經史故事分門編次六帖初學記之類也職林二十卷右皇朝楊侃纂集歷代職官㳂革之故蓋因通典職官門增廣而巳書林韻海一百卷右不題撰人分門依韻纂經史雜事以備尋閲或云皇朝許冠所編異號録二十卷右皇朝馬永易明叟編古今殊異名號如銅馬帝無愁天子之類頃嘗見近世人增廣其書名曰實賔録亦殊該博硯譜二卷右皇朝唐詢撰記硯之故事及其優劣以絲石為第一端石次之古鼎記一卷右唐虞協撰記古人鑄鼎本原及其形製洽聞記三卷右不題撰人分二十門雜記經史名數或題童子洽聞記云唐許孰撰骨鯁集二十卷右皇朝靖康初復修祖宗故事時人或集本朝諸公諌疏成此書書叙指南二十卷右皇朝任浚撰纂集古今文章碎語分門編次之凡二百餘類歌詩押韻二十四卷右皇朝楊咨撰裒集古今詩可以為矩矱者編為押韻侍女小名録一卷右皇朝王銍纂序云大觀中居汝隂與洪炎玉父遊讀陸魯望小名録戲徴古今女侍名字因盡發所藏書籍餘月而成焉香譜一卷右皇朝洪芻駒父撰集古今香法有鄭康成漢宫香南史小宗香真誥嬰香戚夫人迎駕香唐貟半千香所記甚該傳荆楚歲時記一卷右梁宗凛撰其序云傅玄之朝會社駕之上巳安仁秋興之叙君道娛蠟之述其屬辭則巳洽其比事則未弘某率為小記以録荆楚歲時自元日至除夕凡二十餘事雜藝術類古畫品録一卷右南齊謝赫撰言畫有六法分四品續畫記一卷右唐李嗣真撰謝赫之闕俊畫録一卷右唐僧彥悰品長安名畫凡二十七人名畫獵精六卷右唐張彥逺纂記歷代畫工名姓自史皇以降至唐朝及論畫法并裝背禠軸之式鑒别閲玩之方書畫史二卷右皇朝米䒥元章撰輯本朝公卿士庶家藏法書名畫論其優劣真僞五代名畫𥙷遺一卷右皇朝劉道成纂符嘉祥撰序云胡嶠嘗有梁朝名畫目因廣之故曰𥙷遺聖朝名畫評三卷右皇朝劉道成纂符嘉應撰集本朝畫工之名丗者第其品以王瓘為神品云在吳生上益州名畫録三卷右皇朝黃休復纂唐乾符𥘉至宋乾德歲休復在蜀中目擊圗畫之精者五十八人品以四格云射評要略一卷右題曰李廣撰凡十五篇嚴悟射訣一卷右唐王思永撰思永學射法於成都工曹嚴悟成書十篇每篇首必稱師曰木射圖一卷右唐陸秉撰為十五筍以代侯擊地毬以觸之筍飾以朱墨字以貴賤之朱者仁義禮智信溫良恭儉讓墨者慢傲佞貪濫仁者勝濫者負而行一賞罰焉投壷經一卷右唐上官儀奉勑刪定史玄道續注采周顒郝同梁簡文數家書為之唐志有其目樗蒲經一卷樗蒲格一卷右不題撰人序云樗蒲古之戲也劉毅李安民慕容寶之徒皆擲盧不聞餘采今以盧三擲為上雉犢次之釣鼇圖一卷右不題撰人凡四十類各有一詩採珠局一卷右不題撰人序云王公而不知其名凡三十餘類亦各有一詩彈棊經一卷右未詳撰人序稱世說曰魏武帝好彈棊宮中皆效之難得其局以粧奩之蓋形狀相類就蓋而殫之俗中因謂魏宮粧奩之戲按西京雜記云劉向作彈棊典論云前代馬合卿張公皆工彈棊然則起自漢朝非自魏始世說誤矣象棊經一卷右皇朝尹洙撰凡五圖今丗所行者不與焉捉卧甕人事數一卷右皇朝李庭中撰以畢卓嵇康劉伶阮孚山簡阮籍儀狄顔回屈原陶潜孔融陶侃張翰李白白樂天為目有趙昌言序雙陸格一卷右不題撰人其法左右十二梁設二朋朋各十五子一白一墨用明瓊二各以其采由右歸左子單則他子得擊兩子以上他子雖相當不得擊故武后夢雙六不勝狄仁傑所以云無子也益津射格一卷右皇朝錢師益序以五善圖及武陵格踈密不同參酌為之三國圖格一卷金龍戲格一卷打馬格一卷旋棊格一卷右不題撰人漢官儀彩選一卷右皇朝劉敞撰刪取西漢之官而附其列傳黜陟可戲笑者雜編之以為博奕之一物忘憂集三卷右皇朝劉仲甫編載唐韋延祐棊訣并古今棊圖六問算法五卷右皇朝龍受益撰并化零歌附應用算三卷右皇朝蔣舜元撰醫家類黃帝素問二十四卷右唐王砅注叙謂漢藝文志有黃帝內經十八卷素問即其經之九卷兼靈樞九卷乃其數焉先是第七亡逸砅時始獲乃詮次注釋凡八十一篇二十四卷今又亡剌法本論二篇砅自號啓玄子黃帝八十一難經一卷右秦越人撰吳吕廣注唐楊玄操演越人授堯君祕術洞明醫道采黃帝內經精要之說凡八十一章編次為十三類其理趣深逺非易了故名難經補注神農本草二十卷右皇朝掌禹錫等補注舊說本草經神農所作而藝文志所不載平帝紀詔天下舉通知方術本草者本草之名蓋起于此梁之録載神農本草三卷書中有後漢郡縣名蓋上丗未著文字師學相傳至張機華他始為編述嘉祐初詔禹錫與林億蘇頌張洞等為之補注以開寶本草及諸家參校采拾遺逸判定新舊藥合一千八十二種揔二十卷圖經本草二十卷目録一卷右皇朝蘇頌等撰先是詔掌禹錫林億等六人重校神農本草纍年成章奏御又詔郡縣圖上所産藥本用永徽故事重命編述於是頌再與禹錫等裒集衆說類聚詮次各有條目云嘉祐六年上脉經十卷右晉王叔和撰纂𡵨伯華他論書論脉要訣巢氏病源候論五卷右隋巢元方等撰元方大業中𬒳命與諸醫異論衆病所起之源皇朝昭陵時詔校本刻牘頒行宋綬為序外臺袐要方四十卷右唐王燾撰燾之序云嘗得古方書數千百卷因述諸病證候刪集方藥符禁針灸之法本草廣義二十卷右皇朝冦宗奭編以本草二部著撰之人或執用巳私失於商榷併行諸家之說參之事實核其情理證其誤脫以成其書天元玉䇿三十卷右啓元子撰即唐王砅也書推五運六氣之變産寶二卷右僞蜀咱殷撰輯産乳備驗方藥三百七十八首銅人腧穴針灸圖三卷右皇朝王惟德撰仁宗嘗詔惟德考次針灸之法鑄銅人為式分腑臟十二經旁注俞穴所㑹刻題其名并為圖法并主療之術勒刻板傳于丗夏竦為序明堂者謂雷公問道黃帝授之故名云太醫局方十卷右元豐中詔天下髙手醫各以得效祕方進下太醫局驗試依方製藥鬻之仍摸傳于丗沈存中良方十五卷右皇朝沈括存中撰博學通醫術故類其經驗方成此書用者多驗或以蘇子瞻論醫藥雜說附之靈苑方二十卷右皇朝沈括存中編本朝士人如髙若訥林億孫竒龐安常皆以善醫名丗而存中尤喜方書此中所載多可用博濟方五卷右皇朝王衮撰錢氏小兒方八卷右皇朝錢乙仲陽撰神宗時擢太醫丞於書無所不窺它人靳靳守古獨度越縱舍卒與法合尤邃本草多識物理辨正闕誤最工療嬰孺病年八十二而終閻孝忠方附于後蘇沈良方十五卷右皇朝沈括通醫學嘗集得效方成一書後人附益以蘇軾醫藥雜說故曰蘇沈南陽活人書二十卷右皇朝朱肱撰序謂張長沙傷寒論其言雅奧非精於經略不能曉㑹頃因投間設為對問補冝綴緝僅成卷軸作於已已成于戊子計九萬一千三百六十八字神仙類黃庭內景經一卷右題太帝內書藏湯谷隂三十六章不載注人皆七言韻語叙云扶桑太帝命湯谷神王傳魏夫人一名東華玉篇黃者二儀正色庭者四方之中近取諸身以脾為主故曰黃庭黃庭外景經一卷右叙謂老子所作旡陽子注分上中下三篇亦皆七言韻語元陽子不詳其人老君內觀經一卷右凡十二章首皆云老君曰其言皆修心錬神之法真誥七卷右梁陶弘景撰皆真人口受之誥故以為名記許邁許謐楊羲諸仙受道之說參同契三卷右漢魏伯陽撰按神仙傳伯陽㑹稽上虞人通貫詩律文辭贍慱修真飬志約周易作書凡九十篇徐氏箋注桓帝時以授同郡淳于叔通因行于世彭曉為之解隋唐書目皆不載按唐陸德明解易序云虞翻注參同契言字從日下月今此書有日月為易之文則其為古書明矣坐忘論一卷右唐司馬丞禎字子微撰凡七篇其後有文元公跋謂子微之所謂坐忘即釋氏之言宴坐也肇論四卷右姚秦僧洪肇撰師羅什規模莊周之言以著此書物不遷不真空涅槃無知般若無名四論傳燈録云肇後為姚興所殺髙僧傳不載其事天隱子一卷右唐司馬子微為之序云天隱不知何許人著書八篇修鍊形氣飬和心靈歸根契於伯陽遺照齊乎莊叟殆非人間所能力學者王古以天隱子即子微也一本有三宫法附于後羣仙會真記五卷右唐施肩吾集言鍊飬形氣補育精神成內丹之法凡二十五篇王氏神仙傳右僞蜀杜光庭纂光庭集王氏男真女仙五十五人以諂王建其後又有王虛中續纂三十人附于後神仙傳右晉葛洪之弟子滕升嘗問曰古之仙者豈有其人乎洪答云秦阮倉所記有數百人劉向所纂又七十一人今復録集古之仙者以傳真識之士云釋書類維摩詰所說經三卷右姚秦僧鳩摩羅什譯什與其弟子肇生等注十四品楞伽經四卷右宋天笁僧求那跋陀羅譯元魏時僧達摩以付僧慧可曰吾觀中國所有經教唯楞伽可以印心謂此書也金剛經㑹解一卷右後秦僧鳩摩羅什譯唐僧宗密僧知恩􅊨皇朝元仁賈昌朝王安石五家注般若波羅蜜多心經集解一卷右唐陳留僧玄獎譯并注長安中僧法藏為之疏元豐中僧法泉亦注之圓覺經疏三卷右唐長壽二年天笁僧覺救譯宗密疏解大佛頂首楞嚴經疏二十卷右唐神龍二年中天笁國僧彼岸於廣州譯房融筆授皇朝僧子璿撰疏王隨為之序宗鏡録一百卷右皇朝僧延壽撰壽因讀楞伽經云佛語心為宗乃制此録設或人問即引大藏經云以答之凡一百卷楞嚴摽指要義十卷右皇朝僧月公撰其弟子應乾録范峋為之序圭峯原人論一卷右唐僧宗密撰斥執迷褊淺直顯真源㑹通本末凡四篇弘明集十四卷右梁釋僧祐纂采前代勝士書記文述有益於釋教者多宗炳何尚之輩著述六祖壇經二卷右唐僧惠昕撰記僧盧慧能學佛本末慧能號六祖凡十六門周希後有序龐居士語録十卷右唐龐藴襄陽人與其妻子皆學佛後人録其名言成此書景德傳燈録三十卷右皇朝僧道原編其書披奕丗祖圖采諸方語録由七佛以至法眼之嗣凡五十二丗一千七百一人獻之朝詔楊億李維王曙同加裁定億等潤色其文是正其差繆上之遂大行于丗為禪學之祖傳燈玉英集十五卷右皇朝王隨撰以傳燈録繁冗難觀刪為此録景祐甲戌上之詔書奬答有序附于後天聖廣燈録三十卷右皇朝李遵勗編斷自釋迦以降仁宗御製序分燈集二十五卷右皇朝井度編蓋續三燈録也禪苑瑤林一百卷右皇朝井度編取三燈録所載祖師言行附入諸方拈提語句且是正其差誤云林間録二卷右皇朝僧德洪撰記髙僧嘉言善行謝逸為之序然多寓言如謂杜祁公張安道皆致仕居睢陽之類是也按祁公慶曆六年致仕治平中薨安道元豐末始請老蓋相去二十年矣其踈闊可笑也雪竇頌古八卷右皇朝僧道顯撰居雪竇山注維摩詰經十卷右後秦羅什譯什又與其髙弟生肇道融注釋之淳化中張齊賢刻之板忠國師多心經一卷右唐僧慧忠肅宗師事之此其所著書也六祖解心經一卷右唐僧惠能解法界觀一卷右唐僧杜順撰華嚴經最後品名曰法界叙善財參五十二位善知識經文廣博罕能通其說杜順乃著是書宗密注之裴休為之序法界觀托一要記四卷右皇朝僧遵式述其序云元豐初覽清凉玄鏡圭峯注取其合者録之六祖壇經二卷右唐僧慧能授禪學于弘忍韶州剌史韋據請說無相心地戒門人紀録目曰壇經盛行于丗華嚴經决疑論四卷右唐李通玄撰太原人則天朝撰華嚴合論又著此書皇朝張商英使河東得之壽陽縣東浮屠廢書中㑹解楞嚴經十卷右唐僧彌伽釋語房融筆授皇朝井度集古今十二家解去取之成此書修巳金剛經㫖要一卷右皇朝僧修巳住持峨眉山白水寺道楷之法嗣也釋氏要覽十卷右皇朝僧道誠集雜録釋典旁采書傳分門編次成二十類天禧三年書成髙僧傳六卷右梁僧惠敏撰分譯經義解兩門求法髙僧傳兩卷右唐僧義淨撰淨垂拱中往天笁求佛經既還因纂集唐僧往西域者五十六人行事僧寶傳三十卷右皇朝僧德洪撰其序云五家宗派嘉祐中達觀曇頴嘗為之傳載其機緣語句而略其終始行事德洪謂入道之緣臨終之效有不可闕者遂盡掇遺編别記補以諸方之傳又自嘉祐至政和取雲門臨濟兩宗之裔絶出者合八十七人各為傳系之以贊云錦囊集一卷右皇朝僧瑞光集皆教其徒答問語也昭德先生郡齊讀書志卷第三下
