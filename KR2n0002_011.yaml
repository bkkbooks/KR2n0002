body:
  text: 經類周易甘棠正義三十卷右梁任正一撰以孔頴達為本甘棠云者正一嘗為陜州司馬故名其書坤鑿度二卷右題曰包羲氏先文軒轅氏演古籀文蒼頡修按隋唐志及崇文揔目皆無之至元祐田氏書目始載焉當是國朝人依託為之周易緯稽覽圖二卷周易緯是類謀一卷周易緯辯終備一卷周易緯乾元敘制記一卷周易緯坤靈圖一卷易通驗卦二卷右漢鄭玄注按隋志有鄭氏注易緯八卷唐志有宋均注易緯九卷李氏本注與隋志同卷數與唐志同家本蓋出李氏獨不載乾鑿度二卷而有乾元叙制一卷按後漢註七緯名亦無乾元叙制周易開玄關一卷右唐蘇鶚撰鶚自序云五代祖晉官至吏部侍郎學兼天人嘗製八卦論為世所傳遭亂遺墜而編簡尚有存者鶚乃畧演其㫖於此周易流演五卷右唐成玄英撰錯綜六十四卦演九宫以直年月日推國家之吉凶玄英道士也故道藏録之或云釋仁英撰未知孰是周易啓源一十卷右蔡廣成撰李邯鄲云唐人田偉置于王昭素之下今從李説有徳恒伯言徳膚徳翰四目皆作問對凡三十六篇陸秉意學十卷右皇朝陸秉撰秉字端夫舊名東寶元二年以此書奏御勑書嘉奬秉嘗通判蜀州首篇論易之名頗采參同契之説邵古周易解五卷右皇朝邵古天叟撰古雍之父也世本范陽治平初卒于洛年七十九其學先正音文云代淵易論二十卷右皇朝代淵撰國史藝文志有其目徐庸易縕一卷右皇朝徐庸撰庸以春秋凡例易亦有之故著書九篇號意縕凡例揔論其學祖劉牧陸秉云徂徠先生周易五卷右皇朝石介守道撰景迂云易古文十二篇先儒謂費直專以彖象文言參解易爻以彖象文言雜入卦中者自費氏始孔頴達云王輔嗣又分爻之象辭各附當爻則費氏初變古制時猶若今乾卦彖象繫卦之末歟古經始變於費氏卒大亂於王弼惜哉今學者曾不之知也石守道亦曰孔子作彖象於六爻之前小象係逐爻之下惟乾悉属之於後者譲也嗚呼他人尚何責哉家本不見此文豈介後覺其誤改之歟宋咸易訓三卷右皇朝宋咸撰咸自序云予既以補註易奏御而男億請餘義凡百餘篇端因以易訓名之蓋言不敢以傳世特敎其子而已頗論陸希聲劉牧鮮于侁得失云横渠易説十卷右皇朝張載子厚撰載居横渠故以名書其解甚略繫辭差詳張弼易十卷右皇朝張弼興化軍人章惇薦于朝賜號葆光處士紹聖二年黄裳等再薦之詔以為福州司户本州敎授其易學頗宗鄭氏河圖解二卷右皇朝康平撰凡五十二篇王湜易學一卷右皇朝王湜同州人早潜心於邵康節之學其序曰康節有云理有未見不可强求使通故愚於觀物篇之所得既推其所不疑又存其所可疑亦以先生之言自慎不敢輕其去取故也兼山易解二卷右郭忠孝撰忠孝字立之河南人頗明象數自謂得李挺之卦變論于陳子惠因亟讀有得焉靖康中持憲關右死于難故其書散落大半孫莘老尚書解十三卷右皇朝孫覺莘老撰覺仕元祐至謂康王以喪服見諸侯為非禮蘇氏之説蓋本于此毛詩辨疑一卷右皇朝楊時中立撰開寶通禮二百卷右皇朝劉溫叟等撰開寶中詔溫叟同李昉盧多遜扈䝉楊昭儉賈黄中和峴陳諤損益開元禮為之附益以國朝新制太常因革禮一百卷右皇朝姚闢蘇洵撰嘉祐中歐陽脩言禮院文書放軼請禮官編修六年用張洞奏以命闢洵至治平二年乃成詔賜以名李清臣云開寶已後三輯禮書推其要歸嘉祐尤悉然繁簡失中訛缺不補豈有拘而不得騁乎何楦釀之甚也郊廟禮文三十一卷右皇朝楊完撰元豐初以郊廟禮文訛舛詔陳襄李淸臣王存黄履何洵直孫諤楊完就太常寺檢討歴代㳂革以詔考其得失又命陸佃張璪詳定後以前後嘗進禮文獨令完編類五年成書奏御其書雖援據廣博而雜出衆手前後屢見繁猥為甚云周禮義辨疑一卷右皇朝楊時中立撰集諡揔録一卷右皇朝孫緯撰春明退朝録嘗集類國朝諡幾二百人緯任宗正寺丞日因宋氏之舊纂元豐已後遂得三百餘人自宗室宰相以下分為九等其序略云有爵位已高當得諡而未聞者若范質吕餘慶韓崇訓王博文姜遵王沔是也太常禮書一百五十卷右皇朝陳祥道用之撰祥道元祐初以左宣義郎任太常博士解禮之名物且繪其象甚精博朝廷聞之給札繕寫奏御今世傳止五十卷予愛之而恨其缺少得是本於敘州通判盧彭年家其象目以五彩飾之於是始見其全書云聲律要訣十卷右唐上黨郡司馬田疇撰疇序謂一切樂器依律吕之聲皆湏本月真響若但執累黍之文則律吕隂陽不復諧矣故據經史參校短長為此書云琵琶故事一卷右未詳何人所纂敎坊記一卷右唐崔令欽撰開元中敎坊特盛令欽記之率鄙俗事非有益於正樂也皇祐樂記三卷右皇朝胡瑗等撰皇祐二年下詔曰國初循用王朴樂太祖患其聲高令和峴減下一律然猶未全命瑗同阮逸等二十餘人再定四年樂成奏之上御紫宸殿觀焉此其説也范蜀公樂書一卷右皇朝范鎮景仁撰景仁論樂宗房庶潜心四十餘年出私財鑄樂器元祐中奏御樂府詩集一百卷右皇朝郭茂倩編次取古今樂府分十二門郊廟歌辭十二燕射歌辭三鼓吹曲辭五横吹曲辭五相和歌辭十八清啇曲辭八舞曲歌辭五琴曲歌辭四雜曲歌辭十八近代歌辭四雜謡歌辭七新樂府詞十一通為百卷包括傳記辭曲畧無遺軼春秋經社六卷右皇朝孫覺撰其學亦出於啖趙凡四十餘門論議頗嚴春秋演聖統例二十卷右皇朝丁副撰田偉書目副作嗣未知孰誤其序云經有例法一家所至較然重輕杜預釋例專左氏而未該唐陸淳纂例雖舉經而未備纎悉絓羅而咸在者其唯此書乎春秋名號歸一圖二卷右偽蜀馮繼先撰左氏所書人不但稱其名或字或號或爵諡多互見學者苦之繼先皆取以繋之名下云帝王歴紀譜三卷右題曰秦相荀卿撰載周末列國世家故一名春秋公子血脉圖頗多踈畧决非荀卿所著且卿未嘗相秦豈世别有一荀卿邪皇侃論語十卷右梁皇侃撰古今論語之注多矣何晏集七家復采古論語注為集解行于世侃今又引衛瓘繆播欒肇郭象蔡謨袁宏江惇蔡奚李充孫綽周懷范寗王珉凢十三家之説成此書其序稱江熙所集世謂其引事雖時近詭異而援證精博為後學所宗云王令論語十卷右皇朝王令逢原撰解堯曰篇云四海不困窮則天禄不永終矣王安石書新義取之吕與叔論語解十卷右皇朝吕大臨撰大臨雖程正叔之徒解經不盡用其師説汪氏論語直解十卷右皇朝汪革撰革字信民撫州人紹聖中試禮部為天下第一嘗語人曰吾鄉有二宰相一為天下之福一為天下之禍蓋指晏元獻王荆公也即此可見其解經淵源所自云經解類六説五卷右唐劉迅撰迅著書以擬六經此乃其叙篇唯易闕而不言故止五卷云匡謬正俗八卷右唐顏籀師古撰以世俗之言多謬誤質諸經史刋而正之永徽中其子揚庭上之演聖通論四十九卷右皇朝胡旦撰論六經傳注得失易十六卷書七卷詩十卷禮記十六卷而春秋論别行天聖中嘗獻于朝博辨精詳學者宗焉小學類爾雅音畧三卷右偽蜀母昭裔撰爾雅舊有釋智騫及陸朗釋文昭裔以一字有兩音或三音後生疑于呼讀今釋其文義最明者為定小爾雅一卷右孔氏古文也見于孔鮒書急就章一卷右漢史游撰唐顏師古注游元帝時為黄門令書凡三十二章雜記姓名諸物五官等字以敎童䝉急就者謂字之難知者緩急可就而求焉自昔善小學者多書此故有皇象鍾繇衛夫人王羲之所書傳于世智永千字文一卷右梁周興嗣撰釋智永所書干禄字書一卷右唐顏元孫纂以經史所用為正世所行為俗三者之間為通凡三體林氏小説三卷右唐林罕撰凡五百四十一字其説頗與許慎不同而互有得失邵必縁進禮記石經陛對仁宗顧問罕之書如何必曰雖有所長而微好恠説文歸字從堆從止從帚以堆為聲罕云從追於聲為近此長於許氏矣説文哭從吅從獄省罕乃云象犬嘷此恠也有石刻在成都公武嘗從數友就觀之其解字殊可駭笑者不疑好恠之論誠然翰林禁經八卷右唐李陽氷撰論書勢筆法所禁故以名書墨藪十卷右高陽許歸與編未詳何代人李氏書目止五卷而梁武評書王逸少筆勢論皆别出臨池妙訣三卷右未詳撰人後有江南李煜述書古文四聲五卷右皇朝夏竦撰博採古文竒字分四聲編次以便檢尋周越書苑十五卷右皇朝周越撰越以善書名世天聖八年四月成此書奏御故其序稱臣越臣兄起於柳公權書又云亡兄間稱名而不臣似未精討論也唐藏經音義四卷右未詳撰人分四聲以類相從蜀中印本也英公字源一卷右皇朝釋夢英撰夢英通篆籀之學書偏旁五百三十九字郭忠恕云按説文字源唯有五百四十部子字合收在子部今目録妄有更改又集解中誤收去部在注中今點檢偏旁少晶惢至龜弦五字故知林氏虛誕誤後進其小説可焚夢英因書此以正之柴禹錫為立石唐氏字説解一百二十卷右皇朝唐耜撰紹聖以來用字説程試諸生解者甚衆耜集成此書頗注其用事所出書一時稱之耜知卭州日奏御史類五代史一百五十卷右皇朝薛居正等撰開寶中詔修梁唐晉漢周書盧多遜扈䝉張澹李昉劉兼李穆李九齡同修居正監修兩朝國史一百二十卷右仁宗英宗兩朝國史也王珪等撰元豐五年六月甲寅奏御監修王珪史官蒲宗孟李清臣王存趙彦若曾肇賜銀絹有差蘇頌黄履林希蔡卞劉奉世以它職罷去呉充宋敏求前死皆有賜賚紀五卷志四十五卷比之實録事迹頗多但非冦凖而是丁謂託之神宗詔㫖編年類帝王鏡略一卷右唐劉軻撰自開闢迄唐初帝王世次綴為四言以訓童䝉偽蜀馮鑑續之至唐末運暦圖六卷右皇朝龔頴撰起於秦昭王滅周之嵗乙巳止於國朝雍禧丁亥以歴代興亡大事附見其下四年獻于朝優詔奬之歐陽公嘗據之考正集古目録稱其精博按晉史張軌世襲凉州如但稱愍帝建興年號其間唯張祚纂竊改建興四十二年為和平元年始奉穆帝升平之朔始末不聞有改元事唯頴書載張寔改元曰永安張茂改元曰永元張重華曰永樂曰和平張元靚曰太始張天錫曰太清張大豫曰鳯凰不知頴何所據而言或云出崔鴻十六國春秋鴻書久不傳于世莫得而考焉編年通載十五卷右皇朝張衡撰衡觀四部書至古今纂輯運暦書十餘家皆淺陋楦釀無足細繹乃編歴代年號貫以甲子始於帝堯訖于國朝治平丁未質之經史資以傳記百家之書聖賢勲徳姦雄篡竊及蠻夷盜賊凡繋於存亡綱紀之大者無不詳録緫三千四百年且刋正謬誤如史記載舜年虞書不同漢紀載魏受漢禪與魏志受禪壇碑各異之類熙寧七年表獻之通鑑舉要暦八十卷右皇朝司馬光撰通鑑奏御之明日輔臣亟請觀焉神宗出而示之每編始末識以睿思殿寶章蓋尊寵其書如此公尚患本書浩大故為舉要云寶暦歌一卷右未詳撰人以開闢太古迄于周世宗正綂帝王世次諡號成七言韻語一通歴代紀元賦一卷右皇朝楊備撰次漢至五代正綂年號為賦一首又别為宋頌四章實録類唐高祖實録二十卷右唐房玄齡等撰太宗詔玄齡與許敬宗敬播同修起創業盡武徳九年貞觀十七年書成唐太宗實録四十卷右唐許敬宗撰起即位盡貞觀二十三年初貞觀十七年房玄齡許敬宗敬播撰今上實録止十四年成二十卷永徽五年無忌與史臣續十五年後盡昭陵事合四十卷其後敬宗改定唐高宗實録三十卷右唐劉知幾等撰起即位盡永淳二年凢二十九年初令狐徳棻許敬宗等撰録止顯慶三年成二十卷上之後知幾與呉兢續成唐中宗實録二十卷右唐呉兢撰起神龍元年復位盡景龍四年凢六年唐睿宗實録十卷右唐劉知幾撰知幾與呉兢先修太上皇實録起初誕止傳位凢四年後續修益止山陵唐玄宗實録一百卷右唐元載等撰起即位盡上元三年凢五十年安史之亂玄宗起居注亡大暦中史官令狐峘裒掇詔䇿備一朝之遺闕開元天寶間君臣事多漏畧唐肅宗實録三十卷右唐元載等撰起即位盡後元年凢六年唐徳宗實録五十卷右唐裴垍等撰起即位盡貞元二十一年凢二十五年元和二年詔蔣乂樊紳林寶韋處厚獨孤郁同修五年垍上之唐憲宗實録四十卷右唐路隋等撰起即位盡元和十五年初穆宗長慶二年詔監修國史杜元頴與史官韋處厚路隋沈傳師鄭澣宇文籍等修元和實録未及成書大和四年隋與蘇景裔陳夷行李漢蔣係續成上之綂例取捨皆出處厚焉唐穆宗實録二十卷右唐路隋等撰起即位盡長慶四年案文宗實録大和四年隋與蘇景裔等上憲宗實録後有王彥威楊漢公蘇滌裴休並為史官云唐文宗實録四十卷右唐魏謩等撰起即位盡開成五年凡十四年宣宗大中八年史官蔣偕牛叢王諷盧吉同修唐武宗實録一卷右唐韋保衡等撰武宗以後實録皆亡今存止㑹昌元年正月二月國朝宋敏求次道嘗補宣宗實録三十卷懿宗實録三十卷僖宗實録三十卷昭宗實録三十卷哀宗實録八卷通百二十八卷世服其博聞蜀高祖實録三十卷右偽蜀李昊撰高祖者孟知祥也昊相知祥子昶時被命撰起唐咸通甲午終於偽明徳元年甲午凡六十一年太祖實録五十卷右皇朝沈倫撰太平興國三年詔李昉扈䝉李穆郭贄宋白董淳趙隣幾同修倫緫其事更歴二載書成起創業迄山陵凡十七年淳化中王禹偁作篋中記敘云太祖神聖文武曠世無倫自受命之後功徳日新皆禹偁耳目所聞見今為史臣多有諱忌而不書又上近取實録入禁中親筆削之禹偁恐嵗月浸久遺落不傳因編次十餘事按禹偁所言雖未可盡信然咸平祥符間亦以所書漏落一再命儒臣重修多所増益故有三本傳于世徽廟實録二十卷右皇朝程俱撰先是汪藻編庚辰以來詔㫖頗繁雜俱删輯成此書且附以靖康建炎時事雜史類高氏小史一百二十卷右唐高峻撰以司馬遷史至陳隋書附以唐實録纂其要分十例為六十卷後先子逈析而倍之東觀奏記三卷右唐裴廷裕撰昭宗時長安冦亂相仍自武宗以後日暦起居注散軼不存詔史臣撰宣懿僖三朝實録廷裕次宣宗録特採大中以來耳目聞見撰次此書奏記于監修杜讓能以備史閣討論云桂苑叢談一卷右題云馮翊子子休撰雜記唐朝雜事僖昭時當是五代人邯鄲云姓嚴耳目記二卷右題云劉氏未詳何時人雜記唐末五代事唐餘録六十卷右皇朝王皥奉詔撰皥芟五代舊史繁雜之文採諸家之説倣裴松之体附註之以本朝當承漢唐之盛五代則閏也故名之曰唐餘録寶元二年上之温公修通鑑間亦采之唐末汎聞録一卷右皇朝閻自若纂乾徳中王普五代史成自若之父觀之謂自若曰唐末之事皆吾耳目所及與史册異者多矣因話見聞故事命自若志之五代補録五卷右皇朝陶岳撰祥符壬子岳以五季史書闕略因書所聞得一百七事吕夏卿兵志三卷右皇朝吕夏卿撰公武得之于宇文時中季蒙題其後云夏卿修唐史别著兵志三篇自祕之戒其子弟勿妄傳鮑欽止吏部好藏書苦求得之其子無為太守恭孫偶言因及懇借抄録於呉興之山齋龍飛日暦一卷右皇朝趙普撰記顯徳七年正月藝祖受禪事是年改元建隆三月普撰此書普時為樞宻學士景命萬年録一卷藝祖受禪録一卷右皆未詳撰人記趙氏世次藝祖歴試迄受禪事金人背盟録七卷圍城雜記一卷避戎夜話一卷金國行程十卷南歸録一卷朝野僉言一卷右皇朝汪藻編記金人叛契丹迄於宣和乙巳犯京城圍城雜記等五書皆記靖康時事也偽史類十國紀年四十二卷右皇朝劉恕道原撰溫公序云渙之子也博學强記同修通鑑史事之紛錯難治者以諉恕宋次道知亳州家多書恕徃借觀之目為之瞀性剛介初與王安石善及改新法言其非遂與之絶卒年四十九所謂十國者一王蜀二孟蜀三呉四唐五呉越六閩七楚八南漢九荆南十北漢溫公又題其後云世稱路氏九國志在五代之史中最佳此書又過之以予考之長於考異同而拙於属文其書國朝事皆曰宋而無所隱諱意者各以其國為主耳乗軺録一卷右皇朝路振子發撰振大中祥符初使契丹撰此書以獻事見其傳雲南行紀二卷右唐韋齊休撰齊休長慶三年從韋審規使雲南紀其徃來道里及其見聞序謂雲南所以能為唐患者以開道越嶲耳若自黎州之南清溪關外盡斥棄之彊場可以無虞不然憂未艾也及唐之亡禍果由此本朝棄嶲州不守而蜀遂無邊患以此論之則齊休之言可不謂善哉至道雲南録三卷右皇朝辛怡顯撰蜀賊李順既平餘黨竄入雲南雷有終募怡顯招出之至道初歸因書其所歴此成書南蠻録十卷右未詳撰人熙寧間交趾叛朝廷議討之或纂歴代南蠻事跡及便宜上之西域志十二卷右唐僧玄奘撰玄奘西遊天笁求佛書既歸記其所歴諸國風俗其序云自黑嶺以西皆土著尚東左祍務田畜重財賄嫁娶無禮獨天笁則異别記於後云夏國樞要二卷右皇朝孫巽纂記夏虜兵屯㑹要土地肥磽井泉湧涸谷粟窖藏酋豪姓氏名位司存與夫城池之完缺風俗之所尚編為兩帙上之于朝石晉陷蕃記一卷右皇朝范質撰質石晉末在翰林為出帝草降虜表知其事為詳記少主初遷於黄龍府後居於建州凡十八年而卒按契丹丙午嵗入汴順數至甲子嵗為十八年實國朝太祖乾徳二年也虜廷雜記十卷右契丹降人趙志忠撰記虜廷雜事始於阿保謹迄邪律宗真李清臣云志忠仕虜為中書舍人得罪宗真來歸上此書及契丹地圖言虜中事甚詳史評類史通析微十卷右唐柳燦炤之撰燦以劉子玄史通妄誣聖哲評湯之徳為偽跡論桀之惡為厚誣謗周公云不臣褒武庚以徇節其甚至於彈劾仲尼因討論其舛謬共成五十篇蕭綂云論則析理精微故以為名乾寧四年書成唐史云燦公綽族孫少孤貧好學著史通析微時成稱之起布衣至為相不四嵗按唐紀相燦在天祐改元則書成時猶末仕也歴代史贊論五十四卷右未詳撰人纂史記迄五代史臣讃論唐史音義三十卷右未詳撰人比竇氏書大略同而稍簡乃析為三十卷兩漢博聞十二卷右皇朝楊侃纂景徳中侃讀兩漢書取其中名數前儒解釋為此書以資渉獵者侃嘗編職林矣此亦其類也三劉漢書一卷右皇朝劉敞原父弟攽貢父子奉世仲馮撰劉跋嘗䟦其尾云余爲學官亳州故中書劉舍人貢父實爲守從容出所讀漢書示余曰欲作補注未能也然卷中題識已多公之子方山亞父録以相示也吕氏前漢論三十卷右皇朝吕大忠晉伯撰予得其本于銅梁令吕肇修汲公諸孫也晉書指掌十二卷右皇朝劉編以晉書事實以類分六十五門職官類翰林雜志一卷右不題撰人輯唐韋執誼故事元稹承㫖壁記韋來微新樓記杜元頴監院使記鄭璘視草亭記并詩李宗諤題名記為一編或云蘇易簡子耆采其父翰林續志所遺附益之新御史臺記右皇朝宋聖寵編崇寧中聖寵為察官續韓琬書咸用其規式所異者不為諸人立傳於儀制勑令格式為詳後人續至紹興九年御史臺彈奏格一卷右政和中御史中丞蔣猷奏乞委属官李彌大將本臺制勑令格式彈奏事件編成格目六月書成上之南宫故事一卷右不題撰人韋述云開元中劉鄭蘭撰劉儒者無著述才執政拜罷録十卷右不題撰人自建隆元年迄于紹興九年按國朝以樞密院及叅知政事為執政改官制後以左右丞兩省侍郎并密院為執政建炎三年後復用舊制云百官公卿表一百四十二卷右皇朝司馬光君實等撰熙寧中光以翰林學士兼史舘修撰建議欲據國史旁采異聞敘宋興以來百官除拜効漢書作表以便御覽詔許之光請宋敏求同修及敏求卒又請趙彥若繼之歴十二年書成奏御中書備對十卷右皇朝元豐三年畢仲衍承詔編次序曰周官所謂要㑹者正今日中書所宜有自漢至唐莫知議此今編成十卷凡一百二十五門附五十八事李清臣嘗與許將書云備對乃呉正憲公居宰路以聖問多出意表故令中書椽畢君為之其時預有畫㫖諸司遇取㑹不許濡滯如此尚歴數年迺就後雖有改革然事亦可㮣見也掖垣叢志二卷右皇朝宋庠撰景祐中李宗諤始取國初掌誥名氏刻之于石自爲紀序庠因之成此書王禹玉頗譏其疎略裴廷裕載舍人上事知印宰相壓角至今傳之爲故事而庠書闕焉掖垣續志一卷右不詳撰人續采庠書迄元祐六年十一月陳軒試中書舍人輔弼名對四十卷目録一卷右皇朝劉顏撰纂西漢迄五代群臣應對之名者汲黯有天子置公卿輔弼之臣寧令從諛承意陷主不誼之言顏取以名其書天聖初馮元為侍講上之顏嘗為令坐事免由是詔復其官將作營造法式三十四卷右皇朝李誡撰熙寧初勑將作監編修營造法式誡以為未備乃考究經史詢訪匠氏以成此書頒于列郡世謂喻皓木經極為精詳此書蓋過之儀注類咸鎬故事一卷右唐韋慎微撰纂長安自元日至除夜朝廷慶賀事景徳㑹計録六卷右皇朝丁謂謂之撰謂景徳中纂三司户口税賦之入及兵食吏禄之費㑹計天下每嵗出納贏虧之數吕吉甫元祐國計圖之類也書成奏御刑法類金科易覽三卷右崇文揔目有唐趙綽金科易覽一卷田氏書目有蕭緒金科易覽三卷當是綽初撰一卷緒删改析之為三爾天聖編勑三十卷右天聖中宋庠龎籍受詔改修唐令參以今制而成凢二十一門官品一户二祠三選舉四考課五軍防六衣服七儀刑八鹵簿九公式十田十一賦十二倉庫十三廏牧十四関市十五補亡十六疾醫十七獄官十八營繕十九喪葬二十雜二十一元豐廣案二百卷右皇朝元豐初置新科明法成類其所試成此書刑統賦兩卷右皇朝傳霖撰或人為之注決獄龜鑑二十卷右皇朝鄭克編次五代和凝有疑獄集近時趙仝有疑獄事類皆未詳盡克因增廣之依劉向晏子春秋舉其綱要為之目録分二十門計三百九十五事律心四卷右未詳撰人纂刑綂綱要也斷例四卷右皇朝王安石執政以後士大夫頗垂意律令此熙豐紹聖中法寺決獄比也地理類山海經十八卷右大禹製晉郭璞傳漢侍中奉車都尉劉秀校定表言禹别九州而益等類物善惡著此書皆聖賢之遺事古文明著也十父嘗考之於其書有曰長沙零陵鴈門皆郡縣名又自載禹鯀似後人因其名參益之山海經圖十卷右皇朝舒雅等撰雅仕江南韓熙載門人也後入朝數預修書之選閩中刋行本或題曰張僧繇畫妄也十道志十三卷右唐梁載言撰唐分天下為十道所載頗詳博其書多稱咸通中㳂革載言蓋唐末人也游城南記一卷右皇朝張禮撰禮秦人元祐中與陳明微自長安城南探奇訪古以抵樊川因次為之記太平寰宇志二百卷右皇朝樂史等撰太平興國中盡平諸國天下一統史悉取自古山經地志考正訛繆纂成此書上之于朝圖經右皇朝李昉撰洽聞記三卷右唐鄭常撰雜記郡國舊事故附之地理類職方機要四十卷右不題撰人姓名序云本新舊九域志上據歴代史旁取左氏水經通典且采舊聞參以小説黜繆舉真紬成此書其間載政和間事蓋當時人也傳記類襄陽耆舊記五卷右晉習鑿齒撰前載襄漢人物中載其山川城邑後載其牧守隋經籍志曰耆舊記唐藝文志曰載舊傳觀其書記録叢脞非傳体也名當從經籍志云高士傳十卷右晉皇甫謐撰纂自陶唐至魏八代二千四百餘載世士高節者其或以身徇名雖如夷齊兩龔皆不録凡九十六人而東漢之士居三之一自古名節之盛議者獨推焉觀此尤信孔子編年三卷右皇朝孔傳取左氏國語公羊史記及它書所載孔子事以年次之自生至卒東家雜記二卷右皇朝孔傳撰孔子四十七代孫也纂其家舊聞軼事于此書翊聖保徳傳三卷右皇朝王欽若撰建隆𥘉有神降于鳯翔民張守真家開寶末徵守真詣闕属太宗踐祚封神翊聖將軍築宫於終南山祥符中詔欽若編次其事御為製序引登科記三十卷右皇朝樂史撰記進士及諸科登名者起唐武徳迄天祐末唐制舉科目圖一卷右不題撰人凡七十六科仕至宰相者七十二人唯劉蕡名最高而官最不達宋登科記三卷右皇朝登科人名氏未詳何人所撰民表録三卷右皇朝胡納撰録國朝循吏善政李淑以為雖淺俗亦可備廣記云納瑗之父天聖中偕賢惠録上之賢惠録三卷右皇朝胡納撰録國朝賢惠之女後一卷瑗嗣成之萊公勲烈一卷右皇朝冦宗奭編宗奭凖之曾孫也編集仁宗祭凖文及贈誥墓碑傳誌贊詩等為此書列仙傳二卷右漢劉向撰高僧傳十四卷右蕭梁僧釋慧皎撰慧皎以劉義宣靈驗記陶潛搜神録等數十家並書諸僧殊疎畧乃博采諸書咨訪古老起于永平十年終于天監十八年凡五百五十二載二百五十七人又附見者二百餘人分為譯經義解神異習禪明律遺身誦經興福經師唱道十科續高僧傳三十卷右唐僧道宣撰藝文志作道宗大明寺僧也以慧皎㑹稽人故其書詳於呉越而畧於燕魏故上距梁天監下終唐貞觀十九年百四十四載編載二百四十人附見者又一百六十人分譯經解義習禪明律䕶法感通遺身讀誦興福雜科凡十門比丘尼傳四卷右蕭梁僧寶唱撰起晉升平訖梁天監得尼六十五人為之傳以檢淨為首寶唱金陵人藝文志有其目補江揔白猿傳一卷右不詳何人撰述梁大同末歐陽紇妻為猿所竊後生子詢崇文目以為唐人惡詢者為之緑珠傳一卷右皇朝樂史撰譜諜類千姓編三卷右不著撰人釋迦氏譜十卷右唐釋僧祐撰僧祐以釋迦譜記雜見于經論覽亦難通因纂成五卷又取内外族姓及弟子名氏附于後書目類文選著作人名三卷右唐常寶鼎撰纂文選所集文章著作人姓名爵里行事及其述作之意十三代史目三卷右唐殷仲茂撰輯史記兩漢三國晉宋齊梁陳後魏北齊周隋史籍篇次名氏國朝杜鎬以唐五代書目續之開元釋敎録三十卷右唐僧智昇撰智昇在開元中纂釋氏諸書入中國嵗月及翻譯者姓氏以楞嚴經為唐僧懷迪譯張天覺以懷迪與菩提流支同時流支後魏僧其言殆不可信也成都刻石崇目三秩右皇朝劉涇撰元祐中蔡京帥成都以意授涇纂府縣碑板幢柱自東漢初平迄偽蜀廣政凢二百六十八田氏書目六卷右皇朝田鎬撰田偉居荆南家藏書幾三萬卷鎬偉之子也因成此目元祐中袁黙為之序群書備檢十卷右未詳撰人輯易書詩左氏公羊谷梁二禮論語孟子荀子揚子文中子史記兩漢三國志晉宋齊梁陳後周北齊隋新舊唐五代史書以備檢閱昭德先生讀書後志第一卷
