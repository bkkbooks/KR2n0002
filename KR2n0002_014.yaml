body:
  text: 附志江西漕貢進士祕書省挍勘書籍趙希辨經類石經周易右周易十卷經注六萬六千八百四十四字將仕郎守國子助教臣楊鈞朝議郎守國子毛詩博士柱國臣孫逢吉書石經尚書右尚書十三卷經注并序八萬一千九百四十四字將仕郎試袐書省校書郎臣周德貞書鐫玉册官陳德超鐫石經毛詩右毛詩二十卷經注一十四萬六千七百四十字將仕郎試袐書省校書郎張紹文書石經周禮右周禮十二卷經注一十六萬三千一百單三字將仕郎試袐書省校書郎孫朋吉書石經儀禮右儀禮十七卷經注一十六萬五百七十三字將仕郎試祕書省校書郎張紹文書石經禮記右禮記二十卷經注十九萬六千七百五十一字卷首題曰御刪定禮記月令第一集賢院學士尚書左僕射兼右相吏部尚書修國史上柱國晉國公臣林甫奉勑注曲禮為第二蓋唐明皇刪定之本也將仕郎試祕書省祕書郎張紹文書石經春秋右春秋經傳集解三十卷經注并序三十四萬五千八百四十四字不題所書人姓氏石經公羊右公羊十二卷經注一十三萬一千五百一十四字不題所書人姓氏石經榖梁右榖梁十二卷經注八萬一千六百二十字不題所書人姓氏石經論語右論語十卷經注并序三萬五千三百六十八字將仕郎前守簡州平泉縣令兼殿中侍御史賜緋魚袋張德釗書頴川郡陳德謙鐫字石經孝經右孝經一卷經注并序四千九百八十五字不題所書人姓氏但題頴川郡陳德謙鐫字石經孟子右孟子十四卷不題經注字數若干亦不題所書人姓氏石經爾雅右爾雅三卷將仕郎前守簡州平泉縣令賜緋魚袋張德釗書武令升鐫不題經注字數若干以上石室十三經蓋孟昶時所鐫故周易後書廣政十四年歲次辛亥五月二十日唯三傳至皇祐𥘉方畢故公羊傳後書大宋皇祐元年歲次己丑九月辛卯朔十五日乙巳工畢又書將仕郎試國子四門助教州學講説何維翰將仕郎試祕書省校書郎州學説書黃柬儒林郎試祕書省校書郎守華陽縣尉州學勾當王尚哲朝奉郎祕書省著作佐郎簽署節度判官廳公事武騎尉管勾州學華參奉直郎尚書屯田貟外郎通判軍州兼管內橋道勸農事及提舉渠堰騎都尉借緋提舉州學解程朝奉郎尚書屯田貟外郎通判軍州兼管內勸農事及提舉渠堰輕車都尉借緋提舉州學聶丗卿提點益州路諸州軍刑獄兼本路勸農提舉渠堰公事朝奉郎尚書比部貟外郎護軍借紫孫長卿益州路諸州水陸計度轉運使兼本路勸農使朝奉郎尚書刑部貟外郎直史館上騎都尉賜緋魚袋借紫曹頴叔樞密直學士朝散大夫右諌議大夫知益州軍州事兼管內橋道勸農使充益利路屯駐駐泊本城兵馬鈐轄提舉益利路諸州軍兵甲巡檢賊盜公事上騎都尉京兆郡開國侯食邑一千户賜紫金魚袋田况春秋榖梁傳注疏二十卷右唐國子四門助教愓士勛撰昭德先生讀書志中有諸經注疏獨無穀梁注疏云經解類經説三十卷右晦庵先生朱文公熹仲晦之説也易説啓蒙三卷大易問答兩卷尚書問答三卷毛詩問答一卷禮記問答一卷中庸問答二卷大學問答二卷周禮春秋問答一卷論語問答并拾遺八卷孟子問答并拾遺并孝經刋誤四卷附太極解義太極問答西銘解義問答三卷通為三十卷邵武黃大昌鄱陽王迂編次凡六經之要旨論孟之奧義悉可以類而求之延平廖德明為之序大易粹言七十卷總論三卷右集明道先生程皓伯淳伊川先生程頥正叔橫渠先生張載子厚廣平遊酢定夫龜山楊時中立兼山郭忠孝立之白雲郭雍子和之説也舒守曽穜序紫巖易傳十卷右紫巖居士魏國張忠獻公浚德逺所著也誠齋易傳二十卷右誠齋先生楊文節公萬里廷秀所著自為之序周易本義十卷右晦庵先生朱文公熹仲晦所定也發例筮儀附周易繫辭精義二卷右東萊先生吕成公祖謙伯恭所集也周易玩辭十六卷右平庵項安丗平父所述也自敘干前其為説曰君子居則觀其象而玩其辭動則觀其變而玩其占讀易之法盡於此矣程子平生所著獨易傳為全書今以其所得於易傳者述為此書而其文無與易傳合者合則無用述此書矣其子寅孫刋于建安書院樂章識于後周易總義二十卷易學舉隅四卷右山齋易祓彥章所著也陳章李􅐉為之序易學舉隅亦祓所著傳疑之説附于後二五君臣論一卷右胡寅明仲閭丘昕逢辰二侍郎之論也六十四卦各為之説南軒先生張宣公栻為之序卦圖系述五卷右卦圗三卷皇極經丗篇系述二卷康節邵先生之説而先生之子伯溫所學也簡池趙震敘而刻之皇極經丗指要二卷右蔡元定季通所序也以伏羲卦圖列之於前而以皇極經丗疏之於後季通建陽人朱文公之益友始辭聘命終預黨名嘉定更化贈以𥘉品蓍卦辨疑三卷右上卷康節先生揲蓍法橫渠先生大衍説伊川先生揲蓍法兼山郭先生蓍數説下卷則辨證也兼山之子雍為之序謝艮齋諤識其後云卦氣圖一卷右祝融樂洪德秀所著也河南郭雍為之序德秀嘗從文定胡公父子遊取飲水曲肱之義名所居之堂故號曲肱先生云象爻説二卷右武林吳凖齋如愚所著也一則明象二則明爻喬文惠公行簡嘗薦之曰成忠郎吳如愚隨身右列尋即隱居雖在都城而杜門不出臣欲識之而不可得其人行醇而介氣直而溫講道窮經賸有著述欲乞特與換授從事郎併與祕閣校勘有旨從之而如愚不受書説六卷右東萊先生吕成公祖謙之説也自洛誥至秦誓凡一十七篇或謂先生之説始於秦誓上至洛誥而止云書説精義三卷右西山先生真文忠公德秀之説也書集傳六卷右晦庵先生朱文公訂正而武夷蔡沉集傳也沉自序于前其子奉議郎祕書省著作佐郎兼權侍右郎官兼樞密院編修官兼諸王宫大小學教授杭進于朝沉字仲默號九峰先生真西山撰其墓表今附于後詩集傳二十卷詩序辨説一卷右晦庵先生朱文公所定也江西漕趙崇憲刻于計臺而識其後周禮説三卷右朝奉郎祕書少監陳傳良所進也舊刋于止齋文集中曹叔逺別為一書而刻之且為之説周禮考疑七卷右祝融居士樂思忠仲恕所著也永嘉戴溪肖望豐城劉德秀仲洪為之序周禮總義三十卷右山齋易祓所著也許儀為之序刻于衡陽禮記要義二卷右荆國文公王安石介甫所著也中庸章句一卷或問二卷中庸輯略二卷大學章句一卷或問二卷右晦翁先生既定著章句于經文之下又述平時問答所疑以為或問中庸又述輯略兩卷蓋集伊洛諸儒之説也希辨所藏各兩本嶽麓書院精舍及白鹿洞書院所刋者春秋集解三十卷右東萊先生所著也長沙陳雍和父為之序春秋左氏後傳十二卷春秋左氏章指十七卷右止齋陳傳良所著也四明樓忠簡公鑰序其前清海崔清獻公與之識其後而刻於惟揚郡庠春秋左氏國紀二十卷右清江徐得之所編也自周而下各繫以國又因事而為之論斷止齋陳傳良序之春秋左氏博議二十五卷右東萊先生所著也自為之序春秋分記九十卷右克齋程公説伯剛所編也其弟公許守冝春刻于郡齋遊丞相似為之序左氏聮璧八卷右三山葉儀鳯子儀撰乃對偶之書也三傳分門事類十二卷右莫詳誰氏所編以類相從而分其門也論語筆解十卷右唐昌黎先生韓文公之説也其間翺曰者李習之也始愈筆大義以示翺翺從而交相明辨非獨文公制此書也韓文輔云公作論語傳未成而殁見於張藉祭詩辨之於洪慶善者明矣今丗所傳如宰豫晝寢以晝作畫子在齊聞韶三月不知肉味以三月作音浴乎沂以浴作沿子在回何敢死以死作先之類雖未必然而為伊川之學者皆取之此本乃祕書丞許勃所序者論語直解十卷右漢上先生朱文定公震所著也紹興五年夏肇建資善堂時孝廟冨於春秋文定以起居郎與宗正卿范公沖同為翊善朝論皆以為極天下之選此解資善堂録本也其孫繼先刻于瀏陽學舍而識其後孟子解兩卷右和靜先生尹侍講焞所著也先生乃伊川之髙弟欽宗纍聘不起賜號和靜紹興𥘉再以崇政殿説書召既侍講筵首解論語以進繼解孟子甫及終篇而卒此本乃邢正夫刻于嶽陽泮宫者論語解二十卷孟子解三十六卷右無垢先生張文忠公九成子韶所著也論語精義十卷孟子精義十四卷右明道伊川橫渠三先生成都范氏滎陽吕氏藍田吕氏上蔡謝氏建安遊氏延平楊氏河東侯氏河南尹氏十一人之説晦庵先生所編集也𥘉曰精義後改集義卷末淳熙辛丑冬至前五日點畢十一字乃先君子戒庵居士師向手澤也論語集注十卷孟子集注十四卷右朱文公所著也先生之於語孟始集程張吕范十一人之説以為集義既又本之注疏參之釋文採之儒先斷之詳説以為集注語孟之精微蓋萃於此書矣希辨所藏各兩本嶽麓白鹿洞所刋也論語説三卷孟子説七卷右南軒先生張宣公栻敬夫所著也論語注義問答通釋一十卷右勉齋黃先生幹通釋晦庵先生集注或問之書也孝經義一卷右荆國文公王安石所著也凡十七章喪親章闕之孝經刋誤一卷右朱文公所定也皆以古文為正惟傳之六章或從今文廬山胡冰敘于後小學類弟子職一卷右弟子職一書雜見於管子之篇朱文公揭其入學受業事師之法以為章句參以衆説輔其注文云敘古千文一卷右致堂先生胡寅明仲所作也南康黃西坡灝啇伯為之傳晦庵朱文公題其後曰敘事立言昭陳法式實有春秋經丗之志至於發明道統開示德門又於卒章深致意焉新學小童朝夕誦之而諷其義亦足以養正於蒙矣續千文一卷右左朝散大夫知池州軍州事賜紫金魚袋侍其瑗字良器所著也昔周興嗣次王逸少所書千字為韻語以便觀省後丗謂之千文良器遷避興嗣所用字別製千言以續之山谷嘗抵以書曰引辭連類使不相抵觸甚有功當與凡將急就並行也葛文康公勝仲為之序百體書千文一卷右艮齋謝公諤題其後曰神剜天畫千類萬狀豈止汲冡魯壁周鼓秦山耶敘古蒙求一卷右五峰先生胡宏所著也自羲農至于五代周凡三十一章毛以謨為之序先生之子大壯書而刻之通鑑韻語九卷右黃日新齊賢所著也大略如李瀚蒙求四言體而列其事於左方周平園朱晦翁洪容齋謝艮齋楊誠齋樓攻愧諸老先生皆為之序齊賢臨川人字義三卷右北溪陳淳安卿所著也安卿臨漳人史韻四十九卷右回溪錢諷正𥘉所編也依唐韻分四聲而以十一史之句注于下諷錢塘人鄭僑錢文子為之序篆韻五卷右徐鉉序蓋其弟鍇所集也鉉字鼎臣仕南唐為昭文館學士入朝為太子率更令太平興國𥘉詔以本官直學士院鍇字楚金仕南唐為右內史舍人卒李煜贈之禮部侍郎云隸韻七卷右洪文惠公適隸釋序冠於前周益公志其神道碑云耽嗜隸古為纂釋二十七卷頴續二十一卷十二先生詩宗集韻二十卷右裴良甫師聖編杜甫李白髙適韓愈柳宗元孟郊歐陽修曽鞏蘇軾王安石黃庭堅陳無巳之詩韻也史類輔史記一百三十卷右唐司馬貞輔司馬遷之書也輔三皇紀於五帝之前每篇各注索隱之説以百三十篇贊附于每篇之末希辨嘗考諸家之説為讀史輔注一書頗加詳焉古史六十卷右蘇文定公轍所作也自伏羲神農訖秦始皇帝為七本紀十六丗家三十七列傳以輔司馬遷之缺云西漢刋誤一卷東漢刋誤一卷右宣德郎守太常博士充國子監直講劉攽所撰也仁宗讀後漢書見墾田字皆作懇字使侍中傳詔中書使刋正之攽為學官遂刋其誤為一書云西漢輔遺一卷右何俌德輔輔西漢之遺文也蓋束晢輔詩之義耳希辨嘗讀其皇太子遺四皓書及侯公説項羽辭因思昔東坡先生亦嘗為侯公説項羽辭載於集中而啇藝小説載張良所與啇山四皓書則丗所罕見也其書曰良白仰惟先生秉超丗之殊操身在六合之間志凌造化之表但自大漢受命禎靈顯集袖母告符足以宅兆民之心先生當於此時耀神爽乎雲霄濯鳳翼於天漢使九門之外有非常之客北闕之下有神氣之賔而淵潛山隱竊為先生不取也良以頑薄承乏忝官所謂絶景不御而駕服駑駘方今元首欽明文思百揆之佐立則延首坐則引領日仄而方丈不御夜眠而閶闔不閉蓋皇極須日月以揚光后土待嶽瀆以導滯而當聖丗鸞鳳林栖不翔乎太清騏驎嶽遁不步乎郊藪非所以寧八荒尉六合也不得侍省展布腹心略寫至言想望翻然不猜其意張良白俌乾道中權工侍兼權直院西漢輔注一十卷右國子博士吳莘啇卿所著也倪思為之序史記法語十卷前漢法語二十卷東漢精語十六卷三國志精語六卷右鄱陽洪文敏公邁所著也東都事略一百三十卷右承議郎知龍州王稱所進也本紀十二丗家五列傳一百五附録八間為贊論以發揚之以其國都大梁以前之事故謂之東都然其中踈駮甚多稱眉山人故禮部侍郎賞之子此書既進遂直中祕云編年類皇王大紀八十卷右五峯先生胡宏所述皇帝王伯之事始於盤古氏而終於周之末自堯以上六閼逢無紀堯之𥘉載迄于赧王乙巳二千有三十年貫通經典採托史傳靡所不載又因事而為之論所以述去取之原釋疑似之惑者至矣先生字仁仲文定公之季子自幼有志於道嘗見楊中立于京師又從侯師聖于荆門而卒傳文定公之學紹定戊子希辨生父師坰為衡山令嘗奉朝旨索其書云通史緣起二十卷右會稽胡衛之作也其説謂伏羲氏神農氏軒轅氏三皇也少昊氏髙陽氏髙辛氏合唐虞氏五帝也不可不備乃推盤古以來衆説之異同雖十紀浩茫難以年考而傳疑傳信有理存焉衛嘗仕于朝云晉春秋二十卷右隋祕書省正字杜延業所述其自序云蕭方等採削群史著三十國春秋囊括兩晉之言網羅諸國之事以晉國為主附列二十九國延業刪緝題曰晉春秋載於唐書藝文志南北征伐編年二十三卷右吳曽編集自漢獻帝迄于周丗宗其意謂資治通鑑征伐之事雜見於列國言動之間讀者不得專一稽考至南北議論亦未詳盡遂效其體凡一征一伐靡所不載紹興辛巳逆亮叛盟廟堂知有是書嘗取以備乙覽云曽字虎臣撫之崇仁人京文忠公鏜為之序五代春秋五卷右河南先生尹洙師魯所作也由梁太祖開平元年四月甲子迄于周顯德七年正月甲辰資治通鑑綱目五十九卷序例一卷右晦庵先生朱文公所編也司馬文正既為資治通鑑又別為目録及舉要曆胡文定復修舉要輔遺朱文公因文正文定兩公四書別為義例表歲以首年而因年以著統大書以提要而分注以備言其綱倣春秋而參取群史之長其目效左傳而稽合諸儒之粹真德秀刻于泉南陳孔碩李方子敘其後希辨所藏蘷本為板四千二百有竒吉本二千八百而且無陳李二公之序希辨又嘗參以泉本挍其去取之不同并考溫公文公之書法為資治通鑑綱目考異淳祐丙午祕省嘗下本州借本書寫云資治通鑑綱目提要五十九卷右資治通鑑綱目提要存其綱而去其目如春秋之經也希辨所藏乃趙希琴刻于廬陵者續資治通鑑長編九百四十六卷右巽巖先生李文簡公燾仁甫所修也太祖至英宗一百七十五卷神宗朝二百二十八卷哲宗朝二百二十卷徽宗朝三百二十三卷其書倣司馬氏通鑑踵為之然燾謙抑不敢名續通鑑但謂續長編蜀帥汪應辰嘗乞給筆札以寫藏祕閣乾道六年正月令祕書省依通鑑紙樣及字樣大小繕寫一部仍將燾銜位於卷首依司馬光銜位書寫進入燾之卒也上語宇文價云朕嘗許燾大書續資治通鑑長編七大字且用神宗賜司馬光故事為序冠篇不謂其止此也希辨所藏蜀本視書坊所刋者為詳希辨嘗為續資治通鑑長編輔注一書以輔詔敕奏篇等闕云國朝編年政要四十卷右兵部尚書太子詹事蔡文懿公幼學所編也自太祖建隆之元迄于欽宗靖康之末祖春秋之法而參以司馬公舉要曆吕氏大事記之例宰輔拜罷表諸年首其子朝請大夫直祕閣提舉福建路常平義倉茶事籥敘而刻之皇朝編年備要二十九卷中興編年備要十卷右壷山陳均所編也其書用國史實録等書為編年體例起于建隆迄于淳熙書法蓋微倣綱目之例而加斟酌焉真德秀鄭性之林岊皆為之序開基事要十卷右朝奉郎祕書少監皇子嘉王府贊讀陳傳良所進也自建隆之𥘉迄開寶之末亦曰建隆編曹叔逺序而刻之仁宗君臣政要四十卷右文林郎守祕書丞監閬州啇稅院市買稅鹽臣張唐英編進起天聖終嘉祐詔令刑政之要禮樂選舉之法郊廟祭祀邊鄙備禦罔不備録其間名臣得其家丗之詳者為之立傳否則闕之唐英字次功自號黃松子續紀年通譜一卷右宣義郎致仕畢仲荀續宋元憲公紀年通譜之書也元憲止於慶曆辛巳仲荀起於慶曆壬午而迄于徽宗丁未録二百卷右右修職郎監臨安府都鹽倉李丙所編也上帙起召王安石為翰林學士迄于神宗皇帝升遐中帙起宣仁聖烈垂簾除吕公著侍讀迄于宣仁聖烈祔廟下帙起李清臣進䇿題迄于誅童貫安石之召實治平丁未之所始故以丁未名之三朝北盟集編二百五十卷集輔五十卷右朝散大夫充荆湖北路安撫司參議官徐夢莘編集上帙起政和七年七月庚寅終宣和七年十二月庚申中帙起宣和七年十二月庚申終靖康二年四月丁亥下帙起建炎元年五月庚寅終紹興三十二年四月丁亥集輔則輔其遺也建炎以來中興繫年要録二百卷右陵陽布衣李心傳微之所修也知瀘州許奕奏進之修國史曽㬇又嘗乞令其弟太常博士道傳繳進得旨降付國史院然其中闕疑尚多希辨嘗為輔注一書頗為詳備云寧宗皇帝紀十卷右四朝國史中之本紀也續稽古録一卷右太社令龔頥正續司馬文正稽古録之書也文正止於治平頥正起於熙寧而迄于寧宗之𥘉袁説友刊于成都趙彥勵復刊于長沙未幾有毀版之旨云通鑑問疑一卷右祕書丞髙安劉恕字道原嘗與司馬公修通鑑司馬公深愛其博學每以所疑問焉恕子羲仲纂集其往復相難者而作此書十國紀年序附于後綱目發明五十九卷右建康布衣尹起莘所著以發明綱目義例别之傑帥金陵進其書于朝魏文靖公了翁為之序綱目論斷二十卷右江圭吕中論大書以提要正變例而為之斷云其間所載徐清叟跋有以知端平𥘉元通鑑綱目上塵乙覽之因雜史類靖康傳信録三卷右李忠定公綱為尚書右丞充親征行營使及以知樞密院事為河北河東路宣撫使時事也建炎進退志總敘四卷右李忠定公綱為正議大夫尚書右僕射兼中書侍郎至於罷為觀文殿大學士提舉杭州洞霄宫時事也建炎時政記三卷右李忠定公綱所編也自建炎元年五月一日以後至於八月十八日紹興正論一卷右編録秦檜當國羅織諸賢或死於市朝或死於囹圄或死於貶所或流落於魑魅之區纍赦不移或棲遲於林泉之下屏迹不出者一百一十八人姓名與其獲罪之因但云瀟湘樵夫序不知其為誰也朝野遺事一卷右趙子嵩伯山所著記中興以前凡一百二十有五事自號鑑堂居士終於延康殿學士右中奉大夫淳熙中周益公帥長沙命項安丗丁朝佐楊長孺讎校而刻之朝野雜記甲集二十卷乙集二十卷右李心傳微之所編中興以來之事也繫年録蓋倣於此史評類讀史管見三十卷右致堂先生胡寅明仲所著也意謂二百四十二年之後至于五代司馬文正所述資治通鑑事雖備而立義少遂用春秋經旨尚論詳評晦庵綱目中多取之猶子大壯序其説孫德輿刻于衡陽讀史明辨三十卷右伊川元城龜山了齋橫渠屏山橫浦五峯東萊南軒止齋致堂十二先生史論也史説十卷右東萊先生吕成公之説也史評六卷右誠齋先生楊文節公萬里之評也西漢鑑十卷右國子博士吳莘所著也王容為之序兩漢博議二十卷右陳季雅彥群所撰也唐史論斷二卷右朝散大夫尚書刑部郎中充天章閣待制兼侍讀孫甫之翰所撰也甫陽翟人國史有傳唐論二卷右宣教郎前太平州州學教授王居中撰程公許韓祥韓輔皆序之職官類漢官考四卷右徐筠孟堅所著也西京二百年品秩爵列位號名數自三公而下至於管庫釐為十九門總一百四十九條韋楫為之序孟堅清江人淳熙甲辰進士職官分紀五十卷右孫逢吉彥同所集也以楊侃職林而廣之具載新制而又增門目之亡缺輔事實之遺漏元祐中趙睿秦觀為之序職源五十卷右王益之等所編歷代置官本末也官之故實職之典掌前賢遺迹先朝訓詞以次列焉翰苑群書三卷右唐李肇翰林志元稹承旨學士院記韋處厚翰林學士記韋執誼翰林院故事楊巨翰林學士院舊規皇朝禁林宴會集為一卷錢惟演金坡遺事朝逈别書金坡遺事李宗諤翰苑雜記為一卷蘇易簡續翰林志蘇耆次續翰林志學士年表翰苑題名翰苑遺事為一卷祖宗官制舊典三卷右東萊蔡元道所編也其子興宗敘於後云追記祖宗舊典凡設官任職治民理財之要與夫分别流品謹惜名器之道合七十七門云玉堂雜記三卷右周益公必大記玉堂中事也丁朝佐謂九重之德美前輩之典刑恩數之異同典故之沿革皆因事而見之云鑾坡録一卷右周益公必大記𥘉除翰林日制誥表章也刑法類養賢録二十二卷右王日休所編也以嘉祐元豐政和紹興勑令格式嘉祐政和祿令紹興祿秩吏部七司條法紹興免役令參考編類其舊法不行於今者亦存之以見沿革云日休字作德釣臺人也治縣法十卷右吕惠卿所著也曰法令曰詞訟曰刑獄曰簿曆曰造簿曰給納曰災傷曰盜賊曰勸課曰教化惠卿自序於前紹聖二年九月也所在多刋此法豈非不以人廢言與常平役法一卷右紹興以來臣僚申請士民陳訴備載於中按朱文公語録乃朝廷頒降者儀注類儀禮經傳通解續卷祭禮十四卷右朱文公編集而喪祭二禮未就屬之勉齋先生勉齋既成喪禮而祭禮未就又屬之楊信齋信齋據二先生藁本參以舊聞定為十四卷為門八十一鄭逢辰為江西倉進其本于朝信齋福州人名復字茂才書既奏贈文林郎家禮五卷右朱文公所定而趙崇思刻之萍鄉者潘時舉李道傳黃幹廖德明陳光祖序跋附焉家禮附注五卷右陳雷刻于溫州學宫者凡九十九條吕氏鄉約一卷鄉儀一卷右二書吕和叔季明所定也朱文公記于後司馬公居家雜儀一卷右溫國文正公光所著也天文卜算類躔度分野列宿圖三卷右自河圖洛書以及列宿圖其象於上而列漢晉隋志之説于下律吕本原一卷右蔡元定季通所著也曰黃鍾曰黃鍾之實曰黃鍾生十二律曰十二律之實曰變律曰律生五聲圖曰變聲曰八十四聲圖曰六十調圖曰候氣曰審度曰嘉量曰謹權衡凡十三篇云五行類拜命曆一卷右趙景先集其自序曰此書常式隂陽家莫能曉今則不敢傳諸該博愚嘗得自名流用之皆驗故集成此以示子孫自非洞於此道他人幸勿妄傳也趙師俠志于後地理長安志二十卷右龍圖閣直學士右諌議大夫修國史常山宋敏求所撰也熙寧九年二月五日太常博士充集賢校理崇文院檢討同知宗正丞事趙彥若序敏求亦嘗為河南志時以朝奉郎守太常丞充集賢校理編修唐書官通判西京留守司兼畿內勸農事飛騎尉署銜元豐六年二月戊辰端明殿學士兼翰林侍讀學士司馬光序讀書志中有河南志而無長安志云職方乘三卷後集十四卷豫章右洪芻所編也曰郡縣曰城宇曰山曰水曰觀寺曰祠廟曰冡墓曰寶瑞曰妖異曰牧守曰仙真曰人物凡十二部芻字駒父自少以詩名取重於時登進士第為晉州學官山谷素稱其才嘗曰甥之文學他日當大成但願極加意於忠信孝友之地甘受和白受采不但用文章照映今古乃所望也又嘗作釋權以遺山谷山谷答曰筆力縱橫極見日新之功芻之名因是益顯靖康之𥘉為尚書郎三遷至諌議大夫遭變坐事貶文登有老圃集行於丗續之者淳熙中帥程叔逹也李大異敘于後建康志十卷續志十卷右帥史正志所修而為之序乾道五年三月也慶元六年八月帥吳琚續之又為之序長沙志五十二卷右紹興辛亥帥趙善俊修而為之序冝春志十卷集八卷續修志四卷集六卷右嘉定中守滕強恕修郡人張嗣古序續志集則嘉熙𥘉守郭正已也桂海虞衡志三卷右范文穆公成大帥靜江日志其風物土冝也自為之序靜江志十二卷右嘉泰癸亥帥蔡戡修以髙宗皇帝除太傳靜江奉寧軍節度使桂州牧兼鄭州牧制詞冠于篇端永寧編十五卷溫州右嘉定中守留元剛序陳謙所述也敘州敘縣敘山敘水敘賦敘役敘兵敘人敘産敘祠敘遺凡十一類桃花源集一卷右紹聖丙子四明姚孳序淳熙庚子邑宰趙彥琇俾新澧陽簿張櫟重修備載晉唐本朝諸公詩文海南集二十三卷後集十二卷右海外瓊管之集也於中可見丁晉公蘇長公趙豐公折仲古李泰發胡邦衡諸公之文筆臨江集三十四卷右嘉定中守楊恕編郡人劉昌詩序景陵志十四卷右嘉定庚辰郡文學林英發修詩文集録附焉唐陸鴻漸皮日休陸龜蒙皇朝朱昂宋祁晏殊吳育楊徽之蘇紳石延年王禹稱張耒諸公之作為多邵陽志一卷右淳熙壬寅郡文學李韋之序陵水志三卷右慶元丙辰郡文學劉奕修詩文附臨賀志三卷集二卷右莫詳誰所修也集以蘇東坡答彭賀州啓為首渌江志十二卷右嘉定中邑令張耕修龍江志十卷右嘉定庚午邑丞吳紹古修令沈燮序鈐岡志三卷右嘉定甲戌邑令謝好古修瑞陽志十卷縣志三卷右嘉定六年郡守周綸修郡人雷孝友序梅川志三卷右寶慶丙戌重修清江張洽序秋浦新志十六卷右端平丙申江東倉使兼知池州王伯大修自為序冨川志三卷右嘉定甲申守李壽朋修寧越志三卷右慶元攺元郡守林會修南嶽總勝集三卷右紀載南嶽之勝槩也水簾詩集三卷右編集水簾洞之詩文也浯溪集前後續别四集右自元結中興頌之後凡刻之浯水之崖者皆在焉卷雪樓集二卷右集冨池昭勇廟記序詩文也廟乃三國甘寧纍封昭毅武惠遺愛靈顯王靈應後集十二卷右集梓潼廟誥勑記敘詩文也范鎮張浚胡丗將王剛中王之望眺公武諸公祝文為多亦有唐僖宗之祝文冨文忠入國語録一卷右冨弼慶曆二年以右正言知制誥為回謝契丹國信使西上閣門使符惟忠副之惟忠行至武強病卒以知貝州供備庫使恩州團練使張茂實代之所説機冝事件具載録中弼所爭者獻納二字朝廷竟從晏殊議用納字弼不預也章忠恪奉使金國語録一卷右紹興三年章誼以龍圖閣學士樞密都承旨充軍前奉表通問使給事中孫近副之誼録其報聘之語也誼字且叟攬轡録二卷右范成大乾道六年以資政殿大學士左中大夫醴泉觀使兼侍讀丹陽郡開國公食邑二千户食實封八百户與崇信軍節度使領閣門事兼客省四方館事信安郡開國侯食邑一千六百户食實封四百户康湑為奉使大金國信使副其往返地理日記也成大字至能吳縣人紹興二十四年進士使金歸除中書舍人淳熙五年參知政事自號石湖孝宗皇帝御書二字以賜之禹貢疆理廣記六卷右長沙易祓編而為之説方輿勝覽四十三卷後集七卷續集二十卷右建安祝穆和父編新安吕午伯可序仰山孚惠廟實録二十八卷太平興國禪寺附録六卷右嘉定庚午潘侃重編郡守鄭昉志于後希辨自庚午以後續録之為五卷夢華録一卷右夢想東都之録也宋敏求京城記載坊門公府宫寺第宅為甚詳而不及巷陌店肆節物時好孟元老記録舊所經歷而為此書坦庵趙師俠識其後金虜承安須知一卷右金虜名諱及增修朝官職事俸給格式服制地里圖之類也承安蓋虜主璟之紀元也時惟丁巳乃寧宗皇帝慶元三年云傳記類古列女傳八卷右漢都水使者光祿大夫劉向撰又一卷莫知其為誰續然亦載於崇文總目王回曾鞏皆序之百將傳十卷右東光張預公立所進也由太公而下至于五代之劉詞凡史辭泛漫而不切於兵者一刪去之或非兵略而可以資人之智慮者間亦存焉各以孫子兵法題其後次以行事合之諸葛忠武侯傳一卷右南軒先生張宣公栻所著也四將傳四卷右建炎中興名將劉錡嶽飛李顯忠魏勝之傳也史官章頴撰而上之十二朝名臣言行録七十二卷右八朝朱文公所編也四朝乃後人所續者豐清敏遺事一卷右李朴所編豐公稷之言行也陳瓘敘次及復官賜諡制尋訪子孫劄子國史列傳附于後朱文公為後序云范太史遺事一卷右范沖所編正獻公祖禹言行也趙豐公逸事一卷右門人喻樗方疇諸人所記也李忠定公行狀三卷右公之弟綸所述也太常博士兼實録院檢討官葉適所撰諡議附于後胡文定公行狀一卷右公之子寅寧宏所述也其孫大壯手書而傳之因附入曽玄諸孫名朱文公行狀一卷右門人黃幹所作也道命録五卷右秀巖李心傳所編也自司馬公吕申公韓康公薦伊川先生劄子至於嘉定録用伊川先生後人詔旨中間朝臣之奏疏儒宗之諡議纎悉備載道學興廢具見於此張忠文公節義録四卷右張公叔夜告敕奏劄書東北行記旌忠愍節廟碑及事類也譜諜類仙源積慶圖三卷右三祖下宗室派系也皇族登科題名一卷右大宗正嗣濮王士輵宗正丞耿延年所編也淳熙二年成書始於元祐三年李常寧榜子湜令馡厥後嗣而益之延年持節鍾官鋟木於饒洪文敏公邁書于後安定先生丗系述一卷右胡瑗丗系源委也瑗字翼之泰州如臯人也瑗為人師言行而身化之使誠明者逹昏愚者厲而頑傲者革故其為法嚴而信為道久而尊自景祐明道以來學者有師惟瑗與孫復石介三人瑗以布衣召見論樂拜校書郎嘗為湖州學官慶曆四年建太學于京師有司請下湖州取瑗教學之法以為則召為諸王宫教授以疾免巳而以太子中允致仕皇祐中召至京師議樂歲餘為光祿寺丞國子監直講遷大理寺丞嘉祐中遷太子中允充天章閣侍講巳而又以病不能朝復以太常博士致仕東歸之日太學之諸生與賢士大夫送之東門執弟子禮路人嗟歎以為榮卒年六十七丗系乃淳熙中沈大臨述周元公年譜三卷右南康所刋也以元公出處譜之以年公所作詩文之類附見焉倪灼跋橫渠先生張獻公年譜一卷右先生之孫同然所編也譜先生之出處歲月墓表諡議封告及司馬文正諡議之帖魏文靖公請諡之表并哀辭之類附焉希辨又以先生行狀輔其闕三蘇先生年譜一卷右左朝請大夫權發遣成都府路提點刑獄公事何棆編山谷先生年譜三十卷右先生諸孫􅓌所編也悉譜先生所為詩文於逐年之左極為詳備云朱文公年譜三卷右先生門人李方子所編也盧壯父刻之於瑞陽者為三册倪灼刻於康廬者為一册今兩存之諸子類御解老子二卷右徽宗皇帝之御製也嘗倣唐制命大臣分章句書寫刻石又詔史記老子傳升于列傳之首自為一帙前漢古今人表列于上聖今觀此解所謂道者人之所共由德者人之所自得道者亘萬丗而無弊德者充一性而常存老子當周之末道降而德衰故著書九九篇以明道德之常而謂之經其辭簡其旨逺學者當默識而深造之其説大槩與政和之詔同鬻子十四篇右楚人鬻熊之書也逢行圭序而注之漢藝文志云鬻子六篇今此本乃十四篇未詳孰是然篇或錯亂又多遺闕行圭之説巳然矣唐藝文志列于老子之前蓋謂其為文王師也列子九卷右列子一書漢唐及本朝藝文志皆謂八卷政和中冝春彭俞為積石軍倅聞髙麗國列子十卷得其第九篇曰元瑞於青唐卜者神宗皇帝嘗惡後漢范曄姓名欲更修之求東觀記久之不得繼而髙麗以其本來上𥙿陵厭代遂不及進元和中髙麗使人言狀訪於書省無知者醫官巳死於其家得之信乎髙麗之多異書也孔叢子七卷右孔子八丗孫鮒集先君仲尼子思子上子髙子順之言及巳之事凡二十一篇為六卷名之曰孔叢子蓋言有善而叢聚之也孔臧又以其所為賦與書謂之連叢上下篇為一卷附之卷末其書不見於漢唐藝文志嘉祐四年提點廣南西路刑獄公事兼本路勸農事朝散郎守尚書屯田郎中上輕車都尉宋咸始為注釋以進愼子一卷右例陽人愼到之書也唐藝文志云愼子十篇愼到撰滕輔注蓋法家云公孫龍子三卷右唐藝文志列于名家陳嗣古賈大隱皆嘗為之注今不辨矣孔叢子第四卷有公孫龍子一篇劉子五卷右劉晝字孔昭之書也或云劉協所撰或曰劉歆之制或謂劉孝標之作袁孝政為序之際巳不能明辨之矣唐藝文志列于雜家聱隅子二卷右閩人黃晞之書也晞好讀書聚數千卷學者多從之著聱隅欷歔瑣微論石介為直講聞其名使諸生如古禮執羔鴈束帛就里中聘之以輔學職晞固辭不就故歐陽文忠公哭徂徠先生詩云羔雁聘黃晞晞驚走鄰家是也嘉祐中韓魏公為樞密使薦之以為太學助教受命而卒或曰有子甚愚魯所聚及自著書多散失不存子家子一卷右眉山家頥飬正之書也無卷帙篇目姑附于諸子後莊子解四卷揚子解一卷右荆國文公王安石所解也農家類農書三卷右平江陳峻景文所述也唐元宗因李泌之請以二月朔為中和節令百官進農書以示務本而其書不見於史景文輯六經中所載農圃之事參以田牛蠶桑等為此編以輔史記之闕謝艮齋諤為之序社倉本末一卷右真文忠公帥潭日所編也其自敘云剟其大要使後之君子得以覽觀焉蓋今日之所講求雖不敢不極其至而後來之弊終有不能逆計者存諸家之規畫所以備後日之參考也太師史公浩尚書韓公某丞相趙公汝愚舉子條約附焉其説蓋欲救愚俗殺子之禍云雜説類丗説新語三卷右宋臨川王義慶撰梁劉孝標注讀書志引唐藝文志及崇文揔目有十卷八卷之疑又云一本極詳一本殊略未知孰為正希辨所藏本有紹興八年董弅題其後曰右世説三十六篇世所傳釐為十卷或作四十五篇而末卷但重出前九卷中所載余家舊本蓋得之王原叔家後得晏元獻公手自挍本盡去重復其注亦小加剪截最為善本云宋景文雞跖集二十卷右宋景文公祁所集也讀書志云雞跖集十卷未詳撰人希辨所藏二十卷題曰宋景文雞跖集有建炎元年黃邦俊序孔氏談苑五卷右孔平仲毅父記録之文也毅父清江人文仲武仲之弟有續丗説行於世孔氏雜説一卷右孔平仲毅父之記録也圖志謂之珩璜論公是先生弟子記一卷右劉敞原父之説也謝艮齋得之於劉司業焞以遺清江守江溥刻之趙不黯以閣下本校正而識其後云如叔貢問尚書記人之功下闕五段梓慶削木為鐻至不敢以爵賞攖其慮下缺七段文勢差錯至不可讀其他以二段為一一段為二者皆正之東萊吕紫微雜説一卷師友雜志一卷詩話一卷右吕本中字居仁之説也鄭寅刻之廬陵春明退朝録五卷右宋常山公敏求所録也讀書志云春明退朝録三卷希辨所藏一本三卷又一本五卷凡多七十有八條云侯鯖録八卷右聊復翁趙令畤德麟之説也取王氏五侯鯖之義而名之避暑録十五卷右葉夢得少藴之説也少藴蘇州吳縣人紹聖四年進士建炎𥘉為翰林學士拜户書遷尚書左丞終於崇信軍節度使自號石林云能攺齋漫録二十卷右吳曽虎臣所纂也曰事始曰辨誤曰事實曰沿襲曰地里曰議論曰記詩曰紀事曰記文曰類對曰方物曰樂府曰神仙詭怪曰詼諧戲謔一一載之曽臨川人嘗主奉常簿入玉牒為檢討官能攺齋乃其自謂云終於吏部郎揮麈録後録第三録揮麈餘話二十三卷右王明清仲言之説也明清汝隂人載朝廷典故賢哲言行為多辨志録一卷右吕東萊祖謙伯恭所著也四明樓鑰序之管見録二十卷右吳莘啇卿之説也論經史并曆為詳啇卿建寧人嘗為國子博士序則倪思典刑録二十卷右吳宏子大所録也杜東子野為之序蓋分門編次先正諸公之言行也項氏家説十卷附録四卷右項安丗平父之説也説經史文學為甚詳平父江陵人自號平庵辛克承刻于江陵郡齋而為之識容齋隨筆十六卷續筆十六卷三筆十六卷四筆十六卷五筆十卷右洪文敏公邁字景盧所著也何異序之麈史三卷右王得臣字彥輔所記也其自序云自朝廷至州里有可訓可法可鑒可誡者類以相從云得臣自號鳯臺子却掃編三卷右睢陽徐度所著也度字中立丞相處仁之子嘗為吏部侍郎示兒編前後集二十四卷右孫奕季昭所編也蘇大章諸人題于後兵家類八陳圖風后握機文馬隆八陳贊獨孤及八陳記四卷右蔡元定季通所編次也車穽或問一卷右知興國軍胡逸駕所述也自序於前附車戰利害奏劄于後類書類文章緣起一卷右梁太常卿任昉彥升所集也自秦漢以來聖君賢士所為文章名之所始備見於中古今注三卷右晉太傳丞崔豹正熊所注也一輿服二都邑三音樂四鳥獸五蟲魚六草木七雜注八問答釋義尊號録一卷右宋元憲公庠所編也自漢至于仁宗有序有評有贊龍圖閣學士提舉寶籙宫宋康年進十七史類七十七卷右三山鄭某所編也自周而下每一事相類則編而次之西漢總類二十六卷右沈長卿文伯所編也隨事立門隨門類事他傳所載總而歸一雖注中有所取者亦皆掇拾而裒集之長卿霅川人也乾道攺元信州教官吳瓊景玉序唐鱠五十卷右張文忠公九成所著也公嘗謂紀志出於歐陽公列傳出於宋公天文律曆五行志則劉羲叟為之方鎮百官表則梅堯臣為之禮儀兵制𥘉出於王景彜未竟而卒每患首尾不相貫屬遂總其條綱稽其同異類聚而區别之事物紀原十卷右髙承編自天地生植與夫禮樂刑政經籍器用下至博奕嬉戲之微蟲魚飛走之類無不考其所自來承開封人雙溪項彬序輔注事類賦三十卷右吳淑所進也始淑進一字賦百首為二十卷奉旨令其注釋遂廣為三十卷云淑勃海人事文類聚六十卷右祝穆和父編門分列各以群書要語冠其首次之以古今事實又次之以詩文全篇凡天文地理人事服食器具草木蟲魚靡不備載吕午伯可為之序祕府書林二十二卷右張文伯正夫所編曰天文曰律曆曰五行曰地理曰食貨曰選舉曰百官曰禮樂曰輿服曰祭祀曰藝文曰兵刑凡十二類考訂歷代及本朝史志為甚詳國朝會要一百五十卷右國朝會要起建隆止慶曆凡八十五年章得象所進者總類國朝會要五百八十八卷右總類國朝會要由建隆而至乾道也始仁宗命章得象編起建隆止慶曆為一百五十卷神宗又命王圭續編慶曆四年以後至熙寧末凡三十四年通前為三百卷徽宗詔王覿曾肇續編元豐至元符尋又詔起治平四年止崇寧五年凡四十二年然二書皆弗克成政和末有司獨上吉禮三類總一百五十卷蓋通章得象王圭所編者益以熙寧後事也紹興九年詔館職續編至三十一年又降趣旨孝宗命宰相提舉閲再歲乃成自神宗之𥘉至于靖康之末凡六十年總三百卷厥後中興乾道踵而成之此集則合十一朝為一書也然中多節略而始末不全者會要詳節四十卷右御史知雜范師道所編也讀書志云節會要十二卷希辨所藏乃四十卷前有敘云師道所節四十卷先後詳緻無異全本紹興小臣王容清謹題皇朝大詔令二百四十卷右宋宣獻公家所編纂也皆中興以前之典故嘉定三年李大異刻于建寧本朝事實三十五卷右莫詳編者姓氏祖宗丗次登極紀元詔書聖學御製郊廟道釋玉牒公主官職爵邑勛臣配享宰執拜罷科目儀注兵刑律曆籍田財用削平僣偽升降州縣經略夷狄之類具載本末又如聖德頌旌忠碑之類皆載之紹述熙豐政事十卷右政和八年十月一日詔云可以紹述熙豐政事書布告施行此即布告之本也具列詔書于前而載十一人姓名于後今詳書之以見當時之官制云承務郎試明堂平朔頒朔兼禮制局校正內經檢討官臣黃次功承奉郎守明堂總章頒朔臣李伯全宣教郎守明堂青陽頒朔臣嚴𥙿朝請郎明堂頒朔臣徐秉哲宣教郎試明堂頒事臣蔡胄朝散郎試明堂頒事臣陳公彥朝奉郎試明堂頒政國史編修官臣許翰通侍大夫康州防禦使提點龍德太一宫提舉入內醫官編類聖濟經提舉太醫學明堂頒朔布政詳定官臣曹孝忠翰林學士知制誥兼侍講同修國史明堂頒朔布政詳定官充編類御筆所禮制局詳議官臣張邦昌檢校少傅護國軍節度使中大一宫使直宣和殿明堂兼在京神霄玉清萬壽宫提舉通領頒朔布政詳定事臣梁師成宣和殿大學士上清寶籙宫使兼神霄玉清萬壽宫副使兼侍讀明堂頒朔布政詳定官編類御筆詳議臣蔡攸崇觀政宣詔令章奏二十卷右徽宗皇帝朝詔令章奏分門而類次之隆平典章三十卷右建炎至乾道之詔旨及御製之文奏對之章誥詞諡議之類皆分門而敘之如孔子七十二子贊及損齋記皆在焉髙宗寶訓七十卷右嘉定六年十月史館所上本也內治聖監二十卷右彭忠肅公龜年為起居舍人兼皇子嘉王府直講日所進也上自九重后妃丗子旁及宗藩戚里下至官寺胥史以類紀之而外廷百司庶府不與焉公字子壽清江人自號止堂太平治迹統類四十卷中興治迹統類三十五卷右倣通鑑紀事本末條例統而類之事撮其綱辭舉其要上自藝祖而下至於孝宗凡二百門云眉山彭百川編集雜藝術類文房圖贊一卷右和靖後人林可山撰自筆硯而下皆為之官稱圖其像於前而列其贊於後序謂唐韓愈舉頴為中書他竟無所聞今圖贊一十八人譺以官酬之俟異日請于朝罔俾昌黎顓美有唐采選集四卷右莫詳誰氏作𥘉彩選格起於唐李郃本朝踵之者有趙明逺尹師魯元豐官制行有宋保國皆取一時官制為之至劉貢父獨因其法取西漢官秩升黜次苐為之又取本傳所以升黜之語注其下局終遂可類次其語為一傳博戲中最為雅馴此集尤詳且悉曰階官曰職名曰科目曰賞格曰服色曰俸給曰爵邑諡法之類無一不備醫家類御製聖濟經十卷右徽宗皇帝所製也政和八年五月十一日詔頒之天下學校九月二十四日大司成李邦彥等言乃者從侍臣之請令內外學校課試於聖濟經出題臣等切謂今內經道德經既巳選博士訓説乞更以聖濟經附二經兼講從之陸宣公經驗方二卷右唐陸宣公贄在忠州時所集而山隂陸遊所跋也或問朱文公曰陸宣公既貶避謗闔門不著書祇為古今集驗方曰此亦未見陸宣公是處豈無聖賢經傳可以玩索可以討論濟丗全生方指迷集三卷右考城王貺字子亨所著也吳丞相敏序之曰子亨當官不苟遇丗變嘗慨然再請出疆使萬里云本草單方十五卷右龍溪林能千編集列三十六門疏二百七十三目自為之序針炙資生經七卷右王執中所編也執中東嘉人嘗為從政郎澧州教授云四時治要一卷右永嘉屠鵬字時舉所著戴文端公溪為之跋陳氏經驗方五卷右書林陳先生集李文懿公壁為之序神仙御序集注無量度人經二卷右真宗皇帝御製序徽宗皇帝御書而注之會要云宣和六年八月四日詔賜左丞范致虛御注洞元靈寶無量度人經二部想即此本也别一本云建中靖國元年四月十三日奉聖旨鏤版而無序無注亦不載於會要朱文公云此經乃杜光庭撰赤松子中誡經一卷右序云軒轅黃帝遇赤松子授中誡經希辨嘗考國朝大詔令云元符三年九月日制云赤松真君紀于仙籙神農之師可加號赤松凌虛真君疑即此也然張良亦封忠佑凌虛真人云玉皇本行集經三卷右嘉熙四年臨安府承天靈應觀所刻蜀本也程公許序述為詳九天生神章經三卷右綿州沖虛觀道士王希巢隱賢解玉局散吏程公許為之序西蜀譙巖趙日休跋朱文公嘗謂此經亦杜光庭所撰西山十二真君傳一卷右晉許遜吳猛陳勳周廣曽亨時荷草戰施岑彭抗盱烈鍾離嘉黃仁覽皆得道於西山者政和玉册誥詞在其中皇宋拾遺仙傳一卷右陳希夷張虛靜朱觀妙徐神公王侍宸劉靜一趙道翁皇甫清虛之事迹也其中所載御製及誥詞與夫詩記之類為多太上感應篇八卷右漢嘉夾江隱者李昌齡所編也希辨生父師坰嘗為之序四明史彌忞跋其後曰趙公所序禍福善惡之報為尤詳可謂愛人以德者余嘗守袁喜袁人之樂於趍善因閲是序矍然起敬而程公許湯中繼書之竹宫表制一卷右楊至質字休文太乙宫代言之文也自號勿齋聖上嘗書二字以賜之休文謝表云先儒德秀嘗貽金石之文督府了翁復賁蟲魚之篆希辨云不若用臣真德秀臣魏了翁休文以為然釋書類御注四十二章經一卷右御注未詳歲月希辨嘗聞朱文公云釋氏只四十二章經是他古書其餘皆中國文士潤色成之維摩經亦是南北時人作御注大圓覺了義經二卷右孝宗皇帝賜徑山興聖萬壽禪寺僧寶印者也前刻唐裴休序大方廣佛華嚴經八十卷普賢行願品一卷右于闐國三藏沙門實義難詑譯序云天册金輪聖神皇帝製者唐武后也希辨嘗考晉義熙中六十卷唐聖曆中八十卷普賢行願品乃正元十二年南天竺烏荼國王手書以進通為八十一卷厥後李長者製為合論四十卷提舉坑冶鑄錢朝奉張大夫乃以經論合為一書云李忠定公綱曰廣博妙圎極諸經之閫奧莫如大方廣佛華嚴經精微條暢為華嚴之指南莫如李長者所製合論妙法蓮華經七卷右姚秦三藏法師鳩摩羅什譯經本十卷後三卷朝廷所禁云楞嚴經解十卷右王荆公安石所解也圎覺經皆證論二卷右臨川謝逸序謂王荆公嘗問真淨文禪師曰一切衆生皆證圎覺而圭峯禪師易證為具謂譯者之訛其義是否真淨曰圭峯之説非是真淨法子德洪述其師之説而為之論淨土文一卷右王日休所編歷陽張孝祥為之序日休字虛中龍舒人嘗為國學進士般若精義四卷右金剛般若波羅蜜經解義也寂感禪師法語五卷右寂感禪師印肅語也程公許為之序淳熙中謝艮齋諤所作塔銘附無庵法語一卷右孟少保琰與公安僧法東往復之語也陳􅠐趙希杼為之序昭德先生讀書志卷第五上
