body:
  text: 楚辭類楚辭十七卷後漢校書郎王逸叔師注楚屈原名平爲懷王左徒博聞强志􅈺於辭令後同列心害其能而讒之王怒䟽平平自傷忠而被謗乃作離騷經以諷不見省納及襄王立又放之江南復作九歌天問九章逺游卜居漁父大招自沉汨羅以死其後楚宋玉作九辨招魂漢賈誼作惜誓淮南王小山作招隱士東方朔作七諫嚴忌作哀時命王襃作九懷劉向作九歎皆擬其文而哀平之死於忠至漢武時淮南王安始作離騷傳劉向典校經書分爲十六卷東京班固賈逵各作離騷章句餘十五卷闕而不說至逸自以爲南陽人與原同土悼傷之復作十六卷章句又續爲九思取班固二序附之爲十七篇按漢書志屈原賦二十五篇今起離騷經至大招凢六九章九歌又十八原賦存者二十四篇耳并國殤禮魂在九歌之外爲十一則溢而爲二十六篇不知國殤禮魂何以系九歌之末又不可合十一爲九然則謂大招爲原辭可疑也夫以招魂爲義恐非自作或曰景差蓋近之其卷後有蔣之翰跋云晁美叔家本也楚辭釋文一卷未詳撰人其篇次不與世行本同蓋以離騷經九辯九歌天問九章逺遊卜居漁父招隱士招魂九懷七諫九歎哀時命惜誓大招九思爲次按今本九章第四九辯第八而王逸九章注云皆解於九辯中知釋文篇第葢舊本也後人始以作者先後次第之爾或曰天聖中陳說之所爲也補注楚辭十七卷考異一卷未詳撰人凢王逸章句有未盡者補之自序云以歐陽永叔蘇子瞻晁文元宋景文家本參校之遂爲定本又得姚廷輝本作考異且言辯騷非楚辭本書不當録重編楚辭十六卷右族父吏部公重編獨離騷經仍故爲首篇其後以逺游九章九歌天問卜居漁父大招九辯招䰟惜誓七諫哀時命招隱九懷九歎爲次而去九思一篇其說曰按八卷屈原遭憂所作故首篇曰離騷經篇皆曰離騷餘皆曰楚辭今本所第篇或不次序於是遷逺遊九章次離騷經在九歌上以原自叙其意近離騷經也而九歌天問乃原既放之後攄憤所作者故遷於下卜居漁父自序之餘意也故後次之大招古奥疑原作非景差辝沈淵不返故以終焉爲楚辭上八卷九辯招䰟皆宋玉或曰九辯原作其聲浮矣惜誓弘深或以爲賈誼作蓋近之東方朔嚴忌皆漢武帝庭臣淮南小山之辭不當先朔忌王褒漢宣帝時人後淮南小山至劉向㝡後作故其次序如此皆西漢以前文也爲楚辭下八卷王逸東漢人九思視向以前所作相闊矣又十七卷非舊録故去之又頗刪逸離騷經訓釋淺陋者而録司馬遷原傳冠其首云續楚辭二十卷右族父吏部公編擇後世文賦與楚辭類者編之自宋玉巳下至本朝王令凢二十六人計六十篇各爲小序以冠其首而最喜沈括以爲辭近原蓋深探其用意疾徐其歩驟而與之偕然亦暇而不迫也變離騷二十卷右族父吏部公編公既集續楚辭又擇其餘文賦或大意祖述離騷或一言似之者爲一編其意謂原之作曰離騷餘皆曰楚辭今楚辭又變而廼始曰變離騷者欲後世知其出於原也猶服盡而系其姓於祖云所録自楚荀卿至本朝王令凢三十八人通九十六首别集類上蔡邕集十卷右漢蔡邕伯喈陳留圉人仕至左中郎將後為王允所害邕博學好辭章術數天文妙操音律在東觀欲補漢紀自陳十意及付獄乞黥刖以成書不能得遂死獄中所著文章百四篇今録止存九十篇而銘墓居其半或曰碑或曰銘或曰神誥或曰哀讃其實一也嘗自云爲郭有道碑獨無愧辝則其他可知矣凢文集其人正史自有傳者止掇論其文學之辝及略載郷里所終爵位或死非其理亦附見餘歷官與其善惡率不録若史逸其行事者則雜取他書詳載焉庶後有考曹植集一卷右魏曹植子建也太祖子文帝封植爲陳王卒年三十一謚曰思年十餘歲誦讀詩論及辭賦數十萬言善属文援筆立成自少至終篇籍不離於手景初中撰録植所著賦頌詩銘雜論凢百餘篇今集僅二百篇通爲一卷王粲集八卷右後漢王粲仲宣也髙平人爲魏國侍中粲博物多識彊記善筭屬文舉筆便成無所攺定時人常以爲宿製然正復精意覃思亦不能加著詩賦論議垂六十篇今集有八十一首按唐藝文志粲集十卷今亡兩卷其詩文反多於史所記二十餘篇不曉其故阮籍集十卷右魏阮籍嗣宗也尉氏人籍志氣宏逹博覽群籍尤好莊老属文不留思嗜酒能嘯善彈琴當其得意忽忘形骸雖不拘禮教而發言玄逺晉帝輔政爲從事中郎後求爲步兵校尉嵇康集十卷右魏嵇康叔夜譙國人康美詞氣有風儀土木形骸不自藻飾學不師授博覽該通長好莊老屬文玄逺以魏宗室婚拜中散大夫景元初鍾㑹譛於晉文帝遇害張華集三卷右晉張華茂先也范陽人惠帝時爲司空趙王倫孫秀黨謀害之華學業優博辭藻温麗圖緯方伎等書莫不詳覽家有書三十乗天下竒祕悉在博物洽聞世無與比集有詩一百二十哀詞冊文二十一賦三陸機集十卷右晉陸機士衡也抗之子少有異才文章冠丗伏膺儒術非禮不動呉滅退居舊里閉門勤學積有十年太康末入洛成都王頴令機率師伐長沙王乂至阿橋大敗爲頴所誅初造張華華重其名如舊相識嘗謂之曰人之爲才常恨才少而子更患多葛洪著書亦稱歎焉所著文章凢三百餘篇今存詩賦論議牋表碑誄一百七十餘首以晉書文選較正外餘多舛誤陸雲集十卷右晉陸雲士龍也呉郡人惠帝時爲中書侍郎㑹兄機兵敗同遇害雲六歲能属文性清正有才理與兄齊名雖文章不及而持論過之所著文章三百四十九篇新書十篇陶潜集十卷右晉陶潜淵明也潯陽人晉宋史皆有傳晉安帝時爲彭澤令去職潜少有髙趣好讀書不求甚解著五柳先生傳以自况世號靖節先生今集有數本七卷者梁蕭統編以序傳顔延之誄載卷首十卷者北齊陽休之編以吾孝傳聖賢群輔録序傳誄分三卷益之詩篇次差異按隋經籍志潜集九卷又云梁有五卷録一卷唐藝文志潜集五卷今本皆不與二志同獨呉氏西齋書目有潜集十卷疑即休之本也休之本出宋庠家云江左舊書其次第最有倫貫獨四百目後八儒三墨二條似後人妄加鮑照集十卷右宋鮑照明逺也上黨人世祖以爲中書舍人後臨海王子頊鎮荆州照爲參軍子頊敗爲亂兵所殺孝武好文自謂人莫能及故照悟其㫖爲文多鄙言累句當時謂照才盡實不然也事見沈約書而延壽史乃以世祖爲文帝集有唐虞炎序云爲宋景所害儻見於他書乎唐人避武后諱攺照爲昭謝眺集十卷右齊謝眺玄暉也陽夏人明帝初自中書郎出東海太守東昏時爲江祐黨譛害之眺少好學有美名文章清麗善草隷尤長五言詩沈約嘗云二百年來無此詩也文選所録眺僅二十首集中多不載今附入謝惠連集五卷右宋謝惠連也方明子元嘉七年爲彭城王法曹行參軍十歲能属文爲雪賦以髙麗見竒族兄靈運每見其新文曰張華重生不能易也呉均集三卷右梁呉均叔宰也史稱均博學才俊清拔有古氣好事効之謂呉均體有集二十卷唐丗搜求止得十卷文亡其七矣舊題誤曰呉筠筠乃唐人此詩殊不類而其中有贈興嗣柳貞陽輩詩固巳知其非筠又有蕭子雲贈呉朝請入東詩蓋均在武帝時爲奉朝請則知爲均也無疑矣蕭子雲詩八蕭子顯朱异平均王僧孺詩各一附顔之推譏均集中有破鏡賦今亦亡之江淹集十卷右梁江淹文通也濟陽人梁初爲散騎常侍封醴陵侯少好學不事章句留情於文章晚節才思微退人謂才盡著述百餘篇自撰爲前後集今集二百四十九篇何遜集二卷右梁何遜仲信也東海人終水部貟外郎遜少能詩州舉秀才范雲見其文嗟賞曰觀文人質則過懦麗則傷俗能含清濁古今見之何生矣沈約謂每讀卿詩一日三復猶不能巳與劉孝綽以文章見重於丗謂之何劉王僧孺集其文爲八卷今亡逸不全庾信集二十卷右周庾信子山也南陽人梁元帝時爲散騎常侍聘西魏遂留長安孝閔時終司憲中大夫信在梁與徐陵文並綺麗丗號徐庾體集有滕王逌序王績東臯子五卷右唐王績無功也龍門人隋大業中舉孝悌廉㓗授六合丞棄官耕東臯自號東臯子唐書以爲隱逸集有吕才序稱其㓜歧薿年十五謁楊素占對英辯一坐盡傾以爲神仙童子薛道衡見其登龍門憶禹賦歎曰今之庾信也且載其卜筮之驗者數事云楊炯盈川集二十卷右唐楊炯也華隂人顯慶六年舉神童授校書郎終婺州盈川令卒炯博學善属文與王勃盧照隣駱賔王以文詞齊名海内稱王楊盧駱四才子亦曰四傑炯自謂吾愧在盧前恥居王後張說曰盈川文如懸河酌之不竭恥王後信然愧盧前謙也集本三十卷今多亡逸王勃集二十卷右唐王勃子安也通之孫麟德初劉祥道薦其材對策髙等授朝散郎沛王召署府修撰以戯爲諸王作闘鷄檄髙宗怒斥出府父為交趾令勃徃省溺海卒勃属文𥘉不精思先磨墨數升酌飲引被覆面卧及寤援筆成篇不易一字時人謂之腹藁有劉元濟序盧照隣幽憂子集十卷右唐盧照隣昇之也洛陽人調新都尉病去官隠具茨山下手足攣廢疾乆訣親戚自沈穎水照隣自以當髙宗時尚吏巳獨儒武后尚法巳獨黄老后封嵩山聘賢士巳巳廢著五悲文今在集中嘗自號幽憂子駱賔王集十卷右唐駱賔王也義烏人武后時數言事得罪貶臨海丞不得志棄官去文明中徐敬業亂署府佐爲敬業傳檄天下斥武后罪后讀之矍然及敗亡命不知所之後宋之問逢之於靈隱巳祝髮爲浮屠矣賔王七歲能属文妙於五言詩中宗詔求其文得百餘篇命郄雲卿次序之蘇頲許公集二十卷右唐蘇頲廷石也武功人調露二年進士賢良方正異等除左司禦府胄曹玄宗時中書舍人知制誥開元四年同紫微黃門平章事頲㓜敏悟一覽五千言輒覆景龍後與張說以文章顯時號燕許李德裕謂近丗詔誥唯頲叙事外爲文章韓休爲序集四十卷今亡其半矣陳子昻集十卷右唐陳子昻伯玉也梓州人文明初舉進士上書召見累擢拾遺聖曆初解官歸飬父䘮廬墓縣令叚簡貪暴脅取其賂不厭逮捕死獄中子昂少以豪俠使氣及冠折節爲學精究墳籍耽愛黄老易象尤善属文唐興文章承徐庾餘風天下祖尚至是始變雅正故雖無風節而唐之名人無不推之柳儀曹曰張說以著述之餘攻比興而莫能極張九齡以比興之暇窮著述而不克備唐興以來稱是選而不怍者子昂而已宋之問考功集十卷右唐宋之問延清也汾州人武后召與楊炯分直習藝舘謟事太平公主爲考功貟外郎睿宗初欽州賜死自魏建安迄江左詩律屢變至沈約庾信以音韻相婉附属對精密及之問沈佺期又加靡麗回忌聲病約句準篇如錦繡成文學者宗之號曰沈宋徐堅嘗論之問之文如良金美玉無施不可其爲當時所重如此沈佺期集五卷右唐沈佺期雲卿也相州人及進士第由恊律郎遷弘文館直學士常侍中宴舞回波爲弄辭恱帝還賜牙緋杜審言集一卷右唐杜審言必簡也襄陽人預之後裔擢進士恃髙才以傲丗嘗對武后賦歡喜詩后歎重其文學李嶠崔融蘇味道爲文章四友集有詩四十餘篇而巳張說集三十卷右唐張說道濟也洛陽人永昌元年賢良方正筞第一累遷鳯閣舎人睿宗時兵部侍郎平章事開元十八年終左丞相燕國公說爲文精壯長於碑志朝廷大述作多出其手常典集賢圖書之任間爲天平軍大使及致仕一歲皆即軍中於家論譔國史晚謫岳州詩益悽惋人謂得江山助李嶠集一卷右唐李嶠巨山也賛皇人擢進士第制䇿甲科爲監察御史武后時同鳯閣鸞臺平章事嶠冨才思前與王勃楊炯中與崔融蘇味道齊名晚諸人没爲文章宿老學者取法集本六十卷未見今所録一百二十詠而巳或題曰單題詩有張方注張九齡曲江集二十卷右唐張九齡子壽也曲江人長安二年進士調校書郎以道侔伊吕科筞髙等爲左拾遺開元中爲中書令卒謚文獻九齡風度藴藉㓜善屬文玄宗朝知制誥雅爲帝知爲相諤諤有大臣節及貶荆州惟文史自娯朝廷許其勝流徐堅論九齡之文如輕縑素練實濟時用而窘邊幅柳宗元以九齡兼攻詩文但不能究其極尔集後有姚子彦所撰行狀吕温撰真賛鄭宗珍撰謚議徐浩撰墓碑及贈司徒勑詞王維集十卷右唐王維摩詰也太原人開元九年進士終尚書右丞維㓜能屬文工草隷善畫名盛安禄山反嘗䧟賊中賊大宴凝碧池賦詩痛悼詩聞行在後得免死代宗訪維文章於第縉裒集十卷上之李肈記維漠漠水天飛白鷺隂隂夏木囀黃鸝之句以爲竊李嘉祐者今嘉祐之集無之豈肈之厚誣乎儲光羲集五卷右唐儲光羲魯人開元十四年進士嘗爲監察御史後從安禄山僞署賊平貶死王昌齡詩六卷右唐王昌齡少伯也江寧人開元十五年進士爲校書郎又中宏詞不護細行貶龍標尉以丗亂歸郷里爲刺史閭丘曉所殺昌齡工詩縝宻而思清時謂王江寧云常建詩一卷右唐常建開元十五年進士劉長卿集十卷右唐劉長卿字文房開元二十一年進士至徳中監察御史以檢校祠部貟外爲轉運判官知淮西岳鄂轉運留後觀察使呉仲孺誣奏貶潘州南巴尉㑹有爲辨者除睦州司馬終隨州剌史長卿剛而犯上故兩逢斥廢詩雖窘于才而能鍜鍊權德輿嘗謂爲五言長城今集詩九卷雜文一卷顔真卿文一卷右唐顔真卿清臣也萬年人博學工辭章開元二十二年進士又登制科代宗時爲太子太師使李希烈遇害丗謂真卿忤楊國忠李輔國元載楊炎盧𣏌拒安禄山李希烈廢斥者七八以至於死而不自悔天下一人而巳而學問文章徃徃雜神仙浮屠之說不皆合於理而所爲乃尔者蓋天性然也蕭頴士集十卷右唐蕭頴士茂挺也梁宗室之後開元二十三年進士爲史館待制安禄山反竄山南節度崔圓授揚州工曹至官信宿而去客死汝南逆旅門人謚曰文元先生頴士屬文觀書一覽即誦通百家譜系書籕嘗教學濮陽時號蕭夫子李林甫惡不附己故數罷去閻士和盛推頴士文章以爲聞蕭氏之風者童子羞稱曹陸張鷟龍筋鳯髓判十卷右唐張鷟字文成辭章藻麗嘗八中制科此乃其書判也凢一百首自號浮休子孟浩然詩一卷右唐孟浩然也襄陽人工五言詩隱鹿門山年四十乃游京師一日諸名士集秘省聮句浩然句曰微雲淡河漢踈雨滴梧桐衆皆欽伏張九齡王維雅稱道之維私邀入禁林遇玄宗臨幸浩然匿牀下維以聞上曰素聞其人因召見命自誦所爲詩至不才明主棄之句上曰不求進而誣朕棄人命放歸所著詩二百一十首冝城處士王士源序次爲三卷今併爲一又有天寳中韋縚序嚴從中黄子集三卷右唐嚴從開元中爲著作郎春宫侍讀集賢院學士卒自號中黃子當時命太子侍文吕向訪遺文於家得訓老經頌等八篇序爲三卷李翰林集二十卷右唐李白太白也白舊集十卷唐李陽氷序咸平中樂史别得白歌詩十卷凢歌詩七百七十六篇又纂雜著爲别集十卷宋次道治平中得王文獻及唐魏萬所纂白詩又裒唐類詩洎刻石所傳者通李陽氷樂史集共一千一篇雜著六十五篇曾子固乃考其先後而次第之云白蜀郡人天寳初至長安明皇召爲翰林供奉頃之不合去安禄山反明皇在蜀永王璘節度東南白時卧廬山迫致之璘敗坐繫潯陽獄崔渙宋若思驗治白以爲罪薄釋白囚使謀其軍乾元元年終以汙璘事長流夜郎釋過當塗以卒其始終更涉如此此白之詩書所自叙可考者也舊史稱白山東人爲翰林待詔又稱白在宣城謁見永王璘遂辟爲從事而新書又稱白流夜郎還潯陽坐事下獄宋若思釋之者皆不合於白之自序蓋史誤也予按杜甫詩亦以白爲山東人而蘇子瞻嘗恨白集爲庸俗所亂則白之自序亦未可盡信而以爲史誤近蜀本又附入左緜邑人所裒曰白隱處少年所作六十篇尤爲淺俗白天才英麗其辭逸蕩雋偉飄然有超丗之心非常人所及讀者自可别其真偽也岑參集十卷右唐岑參南陽人文本之後天寳三年進士累官補闕起居郎出嘉州剌史杜鴻漸表置幕府爲職方郎中兼侍御史罷終于蜀參博覽史籍尤工綴文屬詞清尚用心良苦其有所得徃徃超拔孤秀度越常情每篇絶筆人競傳諷至德中裴薦杜甫等常薦其識度清逺議論雅正佳名早立時輩所仰可以備獻替之官云集有杜確序李嘉祐詩二卷右唐李嘉祐别名從一趙州人天寳七年進士爲秘書正字袁台二州剌史善爲詩綺靡婉麗有齊梁之風時人以比呉均何遜云髙適集十卷集外文二卷别詩一卷右唐髙適達夫也又字仲武渤海人天寳八年舉有道科中第永泰中終散騎常侍五十始爲即工以氣質自髙每一篇出好事者輒傳布云賈至集十卷右唐賈至㓜幾也洛陽人天寳十年明經擢第累官起居舍人知制詔從幸西川當譔傳位冊既進藁上曰先天誥命乃父爲之今兹冊命又尔爲之兩朝大典出卿父子可爲繼美矣大曆中終散騎常侍集李邯鄲淑家本二十卷蘇弁編次常仲儒爲序以墓銘叙碑列于後今亡其本蘇子瞻嘗行吕惠卿責詞有元兇在位之語仇人乃曰史唯宋太子劭謂之元兇因誣其指斥殊不知曹子建責躬詩有曰元兇是率蓋自謂也今至制詔中除魏仲犀徐歸道詞亦以元兇指禄山豈獨劭爲元兇邪丗多疑子瞻失詞因表出之錢起詩二卷右唐錢起徽之父也呉郡人天寳中舉進士初從郷薦客舍月夜聞人哦於庭曰曲終人不見江上數峯青起攝衣從之無所見矣及就試詩題乃湘靈皷瑟也起即鬼謡十字爲落句主文李暐深嘉之擢置髙第釋褐授校書郎終考功與郎士元齊名時曰前有沈宋後有錢郎元子十卷琦玕子一卷文編十卷右唐元結次山也後魏之裔天寳十三年進士復舉制科授右金吾兵曹累遷容管經略使始在商餘山稱元子逃難入琦玕洞稱琦玕子或稱浪士漁者稱爲聱叟酒徒呼漫叟及官呼漫郎因以命其所著結性耿介有憂道閔丗之意逢天寳之亂或隱自謂與聱牙豈獨其行事而然其文辭亦如之然其辭義幽約譬古鍾磬不諧於俚耳而可尋玩在當時名出蕭李下至韓愈稱數唐之文人獨及結云韓翃詩五卷右韓翃君平也南陽人天寳十三年進士淄青侯希逸宣武李勉繼辟幕府俄以駕部郎中知制誥終於中書舍人雄詩興致繁冨朝野重之杜甫集二十卷集外詩一卷注杜甫詩二十卷蔡興宗編杜甫詩二十卷趙次公注杜詩五十九卷右唐杜甫子美也審言之孫天寳十三年玄宗朝獻太清宫享廟及郊奏賦三篇使待制集賢院宰相試文再遷右衞率府胄曹終於劒南參謀檢校工部貟外曠放不自檢好論天下大事髙而不切少與李白齊名號李杜數當冦亂挺節無汚爲歌詩傷時撓弱情不忘君人憐其忠云集有王洙原叔王琪君玉序本朝自王原叔以後學者喜杜詩世有爲之注者數家率皆鄙淺可笑有原甫名其實非也吕微仲在成都時嘗譜其年月近時有蔡興宗者再用年月編次之而趙次公者又以古律詩雜次第之且爲之注兩人頗以意攺定其誤字人不善之獨孤及毗陵集二十卷右唐獨孤及至之也洛陽人天寳十三年舉洞曉玄經科代宗初爲太常博士濠舒二州剌史政最徙常州卒官自㓜有成人之量徧覽五經觀其大義不爲章句學爲文以立憲誡丗襃賢遏惡爲用長於論議唐實録稱韓愈師其爲文云集有李舟梁肅前後序末載崔祐甫碑誌皇甫冉詩二卷右唐皇甫冉茂政也丹陽人天寳十五年進士爲無錫尉歷拾遺補闕卒與弟曾齊名當時比張氏景陽孟陽云集有獨孤及序郎士元詩右唐郎士元字君胄中山人天寳十五年進士為郢州刺史與錢起俱有詩名而士元尤更嫻雅時朝廷公卿出牧奉使若兩人無詩祖行人以為愧顧况集二十卷右唐顧况字逋公蘇州人至徳二年江東進士善為歌詩性詼諧徳宗時栁渾輔政以祕書郎召况素善李泌及泌相自謂當得逹官乆遷著作郎及泌卒有調笑語貶饒州司戸卒集有皇甫冉詩序陳蛻詩一卷右唐陳蛻集有長安十五詠自序蛻生長江淮間以詩句從賦僅十餘年矣今我后撫運澤及四夷蛻復得為太平人也云云蓋肅代間人也盧綸詩一卷右唐盧綸與吉中孚韓翃錢起司空曙苗發崔峒耿緯夏侯審李端皆能詩齊名號大曆十才子綸字允言累舉進士不第耿緯詩二卷右唐耿緯寳應元年進士爲左拾遺韋應物集十卷右唐韋應物京兆人天寳時爲三衞周逍遥公夐之後左僕射扶陽公待賈生令儀令儀生鑾鑾生應物永㤗中任洛陽丞京兆府功曹大曆十四年自鄠縣制除機陽令稱疾辭歸建中二年授比部郎中守滁州居頃之攺江州召還擢左司郎中或媢其進媒蘖之出爲蘇州剌史性髙㓗鮮食寡欲所居焚香除地而坐詩律自沈宋以後日益靡嫚鎪章刻句揣合浮切音韻婉諧属對麗宻而嫻雅平淡之氣不存矣獨應物之詩馳驟建安以還得其風格云李端司馬集三卷右唐李端趙州人大曆五年進士爲校書郎卒官杭州司馬郭曖尚昇平公主賢明招納士類故端等多從曖游嘗進官宴客端席上賦詩甚工一坐稱歎錢起曰素爲之請賦起姓端立獻一章云新開金埒看調馬舊錫銅山許鑄錢起乃服主喜厚賜帛李益詩一卷右唐李益君虞也姑臧人大曆四年進士調鄭縣尉幽州劉濟辟從事憲宗雅聞其名召爲集賢殿學士負才凌籍士衆不能堪暴其獻濟詩不上望京樓之句以渉怨望詔降秩俄復舊益少富詞藻長於歌與宗人賀齊名每作一篇樂工以賂求取𬒳聲歌供奉天子征人早行篇天下皆施之圖繪今集有從軍詩五十篇而無此詩惜其放逸多矣陸䞇奏議十二卷右唐陸䞇敬輿也䞇嘉興人大曆八年進士中博學宏詞書判拔萃科德宗初爲翰林學士從奉天還爲中書舍人平章事䞇在奉天日下詔書數百初如不紬思逮成皆周盡人情嘗爲帝言今盗徧天下冝痛自悔以感人心誠不吝攺過以言謝天下使臣持筆忘所忌庶叛者革心上從之故下制書雖武夫悍卒無不感動流涕議者謂興元戡難功雖瓜牙宣力蓋贄有助焉舊有榜子集五卷議論集三卷翰苑集十卷元祐中蘇子瞻乞校正進呈攺從今名疑是裒諸集成此書王建詩十卷右唐王建也大曆十年進士爲昭應縣丞太府寺丞大和中陜州司馬尤長宫詞栁郯詩一卷右唐栁郯與李端盧綸輩相酬贈大曆間進士也武元衡臨淮集兩卷右唐武元衡伯蒼也河南人建中四年進士元和三年以門下侍郎平章事出劒南節度八年復秉政明年早朝遇盗害之元衡工五言詩好事者傳之被於管絃嘗夏夜作詩曰夜乆喧暫息池臺唯月明無因駐清景日出事還生翌日遇害舊有臨淮集七卷此其二也議者謂唐丗工詩宦逹者唯髙適逹宦詩工者唯元衡羊士諤詩一卷右唐羊士諤也貞元元年擢進士第順宗時爲宣歙廵官王叔文所惡貶汀州寧化尉元和初李吉甫知奬擢監察御史掌制誥甞出爲資州剌史麴信陵集一卷右唐麴信陵貞元元年進士爲舒州望江令卒楊巨濟詩一卷右唐楊巨濟字景山貞元五年進士爲張弘靖從事太常博士禮部貟外郎歐陽詹集十卷右唐歐陽詹行周也泉州人貞元八年進士終國子四門助教初閩人不肯北宦及常衮爲觀察使興學勸仕第進士自詹始與韓愈李絳聮第皆天下選時號龍虎榜云福州刺史李貽孫纂韓愈集四十卷集外文一卷右唐韓愈退之也南陽人貞元八年進士累擢知制誥進中書舎人遷吏部侍郎爲京兆尹與李紳不恊紳出愈罷爲兵部俄復舊劉昫唐書稱愈恃才肆意盩孔孟之㫖若南人妄以栁宗元爲羅池神而愈碑以實之李賀父名晉肅不應進士而愈作諱辯又爲毛頴傳譏戯不近人情此文章之甚紕繆者新書稱愈三歳而孤自知讀書比長盡通六經百家學性明銳不詭隨每言文章自相如子長後作者不丗出故深探本原卓然樹立成一家言造端置辭要爲不襲蹈前人者議者謂舊史謂愈文章甚紕繆固不待辨而新史謂造端置辭不襲蹈前人亦未爲知愈蓋愈之置辭字字悉有據依其造端如毛頴傳進學解之類皆有所師範云其集屢經名人是正其訛舛絶少但編次殊失倫類有暇日者冝再編之李絳論諫集七卷右唐李絳深之也賛皇人貞元八年進士中宏詞補渭南尉六年進中書侍郎平章事大和初爲山南西道節度南蠻入㓂爲亂兵所害絳偉儀質以直道進退望冠一時賢不肖大分屢爲讒邪所中平生論諫數十百事其甥夏侯孜所編大中史官蔣偕爲序李觀文編三卷外集二卷右唐李觀元賔也華之從子貞元八年進士中宏詞科終太子校書郎觀爲文不襲前人時謂與韓愈相上下議者以觀少天文未極愈老不休故擅名陸希聲大順中編觀文爲序以爲觀尚辭故辭勝理愈尚質故理勝辭雖愈窮老終不能加觀之辭觀後愈死亦不能逮愈之質云其後蜀人趙昻又得其安邊書至晁錯論一十四首爲後集二卷頃年從父詹事公掌誥命以四之日爲四日不學者閧然以爲非觀集中亦嘗如此用不知本于此柳宗元集三十卷集外文一卷右唐柳宗元子厚也後魏濟隂公某之裔貞元九年進士中博學宏詞科授校書郎終於栁州刺史宗元少精敏絶倫文章卓偉精緻旣竄斥堙厄感鬱一寓諸文倣離騷數十篇讀者悲惻在柳州進士走數千里從學經指授者文辭皆有法世號柳州韓愈評其文曰雄深雅健似司馬子長崔蔡不足多云集中有御史周君碣司馬温公考異以此碣爲周子諒碣實開元二十五年也栁作天寳時悞按此碣殊踈略舊唐書紀牛仙客傳玄宗實録皆載子諒彈牛仙客杖流瀼州死藍田劉禹錫夢得集三十卷外集十卷右唐劉禹錫夢得也中山人貞元九年進士登博學宏詞科貶朗州司馬元和十年召還欲任南省郎作玄都觀看花詩譏忿當路出爲播州刺史裴杜以母老爲請得易連州入爲主客郎中復作游玄都詩以詆權近俄分司東都遷賔客㑹昌時加檢校禮部尚書卒禹錫少工文章恃才而廢老年寡所合乃以文章自適素善詩晚節尤精白居易推爲詩豪嘗言其詩在處應有神物護持禹錫早與栁宗元爲文章之友稱劉栁晚與居易爲詩交號劉白雖詩文似少不及然能抗衡二人間信天下之竒才也孟東野詩集十卷右唐孟郊東野也湖州人貞元十二年進士調溧陽尉辟爲興元參謀卒郊少隱嵩山性介寡合韓論其詩曰髙處在古無上平處下顧二謝云張籍謚爲貞曜先生集宋次道重編先時世傳汴呉鏤本五卷一百二十四篇周安惠本十卷三百三十一篇别本五卷三百四十篇蜀人蹇濬用退之贈郊句纂咸池集二卷一百八十篇自餘不爲編秩雜録之家家自異次道揔拾遺逸摘去重複若體製不類者得五百十一篇而十聮句不與焉一賛二書附于後郊集於是始有完書吕温集十卷右唐吕温和叔也一字化光河中人貞元十四年進士以善韋執誼王叔文起家再命左拾遺同張薦使吐蕃元和初使還累進知御史雜事再貶道州刺史徙衡州温從梁肅爲文章規摹左氏藻贍精冨流輩推尚劉禹錫爲編次其文序之云古之爲書先立言而後體物賈生之書道過秦而荀卿亦後其賦故斷自人文化成論至諸葛武侯廟記爲上篇今集先賦詩後雜文非禹錫本也李翺集十八卷右唐李翺習之凉武昭王之後貞元十四年進士調校書郎知制誥㑹昌初終山南東道節度使翺峭鯁論議無所屈仕不得顯官怫鬱無所發從韓愈爲文辭致渾厚見推當時集皆雜文無歌詩前有蘇舜欽序云唐之文章稱韓柳翺文雖辭不迨韓而理過於栁張籍詩集五卷右唐張籍文昌也和州人貞元十五年登進士第終國子司業籍性狷急惟長於樂府多警句次有序元和中與白樂天孟東野歌辭天下宗之謂之元和體云集張洎編文心雕龍右晉劉勰撰評自古文章得失别其體製凢五十篇各係之以賛云余嘗題其後曰丗之詞人刻意文藻讀書多滅裂杜牧之以龍星爲真龍王摩詰以去病爲衞青昔人譏之然亦不足恠蓋詩賦或率爾之作故也今勰著書垂丗自謂嘗夢執丹漆器隨仲尼南行其自負不淺矣觀其論說篇籍稱論語以前經無論字六韜三論後人追題是殊不知書有論道經邦之言也其踈略殆過於王杜矣昭德先生郡齋讀書志卷第四上
