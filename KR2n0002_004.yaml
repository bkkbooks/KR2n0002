front:
  text: 昭德先生郡齋讀書志卷第四上集部其類有三一曰楚辭類二曰别集類三曰緫集類内别集猥多復分爲上中下昔屈原作離騷雖詭譎不槩諸聖而英辯藻思閎麗演迤發於忠正蔚然爲百代詞章之祖衆士慕嚮波属雲委自時厥後綴文者接踵於斯矣然軌轍不同機杼亦異各名一家之言學者欲矜式焉故别而聚之命之爲集蓋其原起於東京而極於有唐至七百餘家當晉之時摰虞巳患其凌雜難觀嘗自詩賦以下彚分之曰文章流别後丗祖述之而爲緫集蕭統所選是也至唐亦且七十五家嗚呼盛矣雖然賤生於無所用或其傳不能廣值水火兵㓂之厄因而散落者十八九亦有長編鉅軸幸而得存其属目者幾希此無他凢以其虚辭濫說徒爲美觀而已無益於用故也今録漢迄唐附以五代本朝作者其數亦甚衆其間格言偉論可以扶持世教者爲益固多至於虚辭濫說如上所陳者知其終當泯泯無聞猶可以自警則其無用亦有用也是以不加銓擇焉
