front:
  text: 昭德先生郡齊讀書志卷第四下下
  hash: sha256:e0cb22cd3ee06d75bf56ea86de23c3bf80486b842c66bfd3c040d13604ce10b0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0002_SBCK_007-1a}
body:
  text: 總集類李善注文選六十卷右梁昭明太子蕭統纂前有序具述其所作之意蓋選漢迄梁諸家所著賦詩騷七詔䇿令教冊秀才之表上書啓彈事箋記書移檄難對問議論序頌贊符命史論連珠銘針誄哀䇿碑志行狀弔祭文類輯之為三十卷竇常謂統著文選以何遜在世不録其文其人既往而後其文刻定然則所録皆前人之作也唐李善集注析六十卷善髙宗時弘文學士博學經史百家無不備覽而無文時人謂之書簏初為輯注博引經史釋而忘其義書成上進問其子雍雍無言善曰非耶爾當正之於是雍更加以義釋解精於五臣今釋事加義者兩存焉蘇子瞻嘗讀善注而嘉之故近世復行五臣注文選三十卷右唐吕延祚集注延祚以李善止引經史不釋述作意義集吕延濟劉良張詵吕珦李周翰五人注延祚不與焉復為三十卷開元六年延祚上之名曰五臣注唐文粹一百卷右皇朝姚鉉寶臣編鉉廬州人太平興國初進士文辭敏麗善書札藏書至多頗有異本纍遷兩浙漕課吏寫書采唐世文章分門編類初為五十卷後復增廣之為薛映掎其事奪官斥連州卒後其子以其書上獻詔藏內府命以一官古樂府十卷并樂府古題要解兩卷右唐吳兢纂雜采漢魏以來古樂府詞凡十卷又於傳記洎諸家文集中采樂府所起本義以釋解古題云玉臺新詠十卷右陳徐陵纂唐李康成云昔陵在梁世父子俱事東朝特見優遇時承平好文雅尚宫體故采西漢以來詞人所著樂府艷詩以備諷覽玊臺後集十卷右唐李康成采梁蕭子範迄唐張赴二百九人所著樂府歌詩六百七十首以續陵序編謂名登前集者今並不録唯庾信徐陵仕周陳既為異代理不可遺云續古今詩苑英華集十卷右唐僧惠淨撰輯梁武帝大同年中會三教編至唐劉孝孫成臯望河之凡一百五十四人歌詩五百四十八篇孝孫為之序珠英學士集五卷右唐武后朝詔武三思等修三教珠英一千三百卷預修書者凡四十七人崔融編集其所賦詩各題爵里以官班為次融為之序麗則集五卷右唐李氏撰不著名集文選以後至唐開元詞人詩凡三百二十首分門編類貞元中鄭餘慶為序中興間氣集三卷右唐髙仲武輯至德迄大曆中錢起以下二十六人詩自為序以天寶之亂述作中廢至德中興風雅復振故以名仍品藻衆作著之於前云或又題孟彥深纂南薰集三卷右唐竇常撰集韓翃至皎然三十人約三百六十篇凡三卷其序云欲勒上中下則近於褒貶題一二三則有等衰故以西掖南宫外臺為目人各系名系贊本事詩一卷右唐孟棨撰纂歷代詞人緣情感事之詩其本事凡七類續本事詩二卷右僞吳處常子撰未詳其人自有序云比覽孟初中本事詩輒搜篋中所有依前題七章類而編之然皆唐人詩也斷金集一卷右唐令狐楚輯其與李逢吉酬唱詩什開成初裴夷直序之漢上題襟集十卷右唐假成式輯其與溫庭筠余知古酬和詩筆箋題松陵集十卷右唐皮日休與陸龜蒙酬唱詩凡六百五十八首龜蒙編次之日休為之序松陵者平江地名也西崑酬唱集二卷右皇朝楊億劉筠李宗諤朝某錢惟演及當時同館十五人唱和詩凡二百四十七章前有億序宋唐類詩二十卷右唐朝僧仁贊序稱羅唐兩士所編而不載其名分類編次唐及本朝祥符已前名人詩唐百家詩選二十卷右皇朝宋敏求次道編次道為三司判官嘗取其家所藏唐人一百八家詩選擇其佳者凡一千二百四十六首為一編王介甫觀之因再有所去取且題云欲觀唐詩者觀此足矣世遂以為介甫所纂寶刻叢章三十卷右皇朝宋敏求次道編次道聚天下古人詩歌石刻凡一千一百三十篇以其相附近者相從又次以嵗月先後王益柔之序云文章難能者莫如詩凡刻之金石者則必其自以為得或作於人所愛重者故多有新清瓌麗之語覽者其深究焉嵗時雜詠二十卷右皇朝宋綬編宣獻公昔在中書第三閣手編古詩及魏晉迄唐人嵗時章什一千五百有六釐為十八卷今溢為二十卷矣仕塗必用集二十一卷右皇朝祝熙載編本朝楊劉以後諸公表啓為一編聖紹堯章集十卷右皇朝李文友編靖康末至紹興十年赦書詔㫖丹陽類集十卷右皇朝曾􅌈編丹陽今潤州春秋曰朱方秦曰丹徒孫權改名京口東晉僑立州郡至宋齊陳曰東海獨梁曰蘭陵而皆以徐州稱之隋始定今名唐以建康諸邑隸焉更為丹陽郡元豐中􅌈守官于其地因采諸家之集始自東漢終于南唐凡得歌詩賦贊五百餘篇雲臺編六卷右皇朝耿思柔纂華州雲臺觀古今君臣所題詩什清才集十卷右皇朝劉禹卿編輯古今題劒門詩什銘賦蒲逢為之序瑤池新集一卷右唐蔡省風集唐世能詩婦人李季蘭至程長文二十三人詩什一百十五首各為小序於其前且總為序其略云世叔之婦修史屬文皇甫之妻抱忠善隸蘇氏雅於回紋蘭英擅於宫掖晉紀道藴之辨漢尚文姬之辭况今文明之盛乎九僧詩集一卷右皇朝僧希畫保暹文兆行肇簡長惟鳯惠業牢昭懷古也陳充為序凡一百十篇歐公曰進士許洞因會九僧分題出一紙約曰不犯一字其字乃山水風雲竹石花草雪霜星日禽鳥之類於是諸僧皆閣筆此本出李夷中家其詩可稱者甚多惜乎歐公不盡見之許洞之約雖足以困諸僧然論詩者政不當爾蓋詩多識鳥獸草木之名而楚辭亦寓意於颷風雲霓如池塘生春草窗間列逺岫天際識歸舟雲中辨江樹蟬噪林逾靜鳥鳴山更幽庭草無人隨意緑宫漏出花遲楓落吳江冷空梁落燕泥微雲淡河漢踈雨滴梧桐殘星幾㸃鴈橫塞長笛一聲人倚樓雞聲茅店月人跡版橋霜之類莫不犯之若使諸公與許洞分題亦須閣筆矧其下者哉聖宋文粹三十卷右不題撰人輯慶曆間羣公詩文劉牧黃通之徒皆在其選宋文海一百二十卷右皇朝江畋編輯本朝諸公所著賦詩表啓書論說述議記序傳文贊頌銘碑制詔疏詞志挽祭禱文凡三十八門雖頗該博而去取無法皇宋詩選五十七卷右皇朝曾慥魯公裔孫守贑川帥荆渚日選本朝自冦萊公已次至僧璉二百餘家詩序云博采旁搜拔尤取頴悉表而出焉政和文選二十卷右政和中或編元豐以後人詩文千餘篇徐禧席旦其知名者也西漢文類右唐柳宗直撰其兄宗元嘗為之序至皇朝其書亡陶氏者重編纂成之昭德先生郡齊讀書志卷四下下
