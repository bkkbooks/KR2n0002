front:
  text: 昭德先生郡齋讀書志卷第二上史部其類十有三一曰正史類二曰編年類三曰實録類四曰雜史類五曰偽史類六曰史評類七曰職官類八曰儀注類九曰刑法類十曰地理類十一曰傳記類十二曰譜牒類十三曰目録類後世述史者其體有三編年者以事繫日月而總之於年蓋本於左氏明紀傳者分記君臣行事之終始蓋本於司馬遷實録者近起於唐雜取兩者之法而為之以備史官採擇而已初無制作之意不足道也若編年紀傳則各有所長殆未易以優劣論雖然編年所載於一國治亂之事為詳紀傳所載於一人善惡之迹為詳用此言之編年似優又其來最古而人皆以紀傳便於披閱獨行於世號為正史不亦異乎舊以職官儀注等凢史氏有取者皆附之史今從焉
