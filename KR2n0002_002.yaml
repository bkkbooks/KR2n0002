body:
  text: 正史類史記一百三十卷右漢太史令司馬遷續其父談書創為義例起黄帝迄漢武獲麟之嵗撰成十二紀以序帝王年表以貫嵗月八書以紀政事三十世家以序公侯七十列傳以志士庶上下三千餘載凢為五十二万六千五百言遷沒後缺景武紀禮樂律書三王世家漢興以來將相年表日者龜策傳靳蒯列傳等十篇元成間褚少孫追補及益以武帝後事辭㫖淺鄙不及遷書遠甚裴駰集觧班固嘗譏遷論大道則先黄老而後六經序㳺俠則退處士而進姦雄述貨殖則崇勢利而羞貧賤後世愛遷者以此論為不然謂遷特感當世之所失憤其身之所遭寓之於書有所激而為此言耳非其心所謂誠然也當武帝之世表章儒術而罷黜百家宜乎大治而窮奢極侈海内彫弊反不若文景尚黄老時人主㳟儉天下饒給此其論大道所以先黄老而後六經也武帝用法刻深羣臣一言忤㫖輙下吏誅而當刑者得以貨自贖遷之遭李陵之禍家貧無財賄自贖交遊莫救卒陷腐刑其序㳺俠退處士而進姦雄者蓋遷歎時無朱家之倫不能脱己於禍故曰士窮窘得委命此豈非人所謂賢豪者邪其述貨殖崇勢利而羞貧賤者蓋遷自傷特以貧故不能自免於刑戮故曰千金之子不死於市非空言也固不察其心而驟譏之過矣前漢一百卷右後漢玄武司馬班固續司馬遷史記撰十二帝紀八年表十本志七十列傳起髙祖終於王莽之誅二百三十年凢八十餘萬字固既瘐死書頗散亂章帝令其妺曹世叔妻昭就東觀緝校内八表天文志皆其補也唐太子承乾令顔師古考衆説為之注范曄譏固飾主闕蓋亦不然其贊多微文顧讀者弗察耳劉知幾又詆其古今人物表無益於漢史此論誠然但非固之罪也至謂受金鬻筆固雖謟附匪人亦何至是歟然識者或以固書皆因司馬遷王商揚雄歆向舊文潤色成之故其文章首尾皆善而中間頗冗瑣良田商之才視數子微劣尔固之自序稱述者亦謂有所本也後漢九十卷志三十卷右宋范曄撰十帝紀八十列傳唐髙宗令章懐太子賢與劉訥言革希言作註曄所撰本志未成而伏誅後劉昭補注三十卷觀曄與甥姪書叙其作書之意稱自古體大而思精未有如此者又謂諸序論筆勢放縱實天下之竒作徃徃不減過秦篇常以比方班氏非但不愧之而巳其自負如此然世多譏曄創為皇后紀及采風俗通中王喬抱朴子中左慈等詭譎事列之於傳又贊辭佻巧失史之體云三國志十五卷右晋陳壽撰魏四紀二十六列傳蜀十五列傳吳二十列傳宋文帝嫌其畧命裴松之補注博采羣説分入書中其多過本書數倍王通數稱壽書細觀之實髙簡有法如不言曹操本生而載夏侯悙及淵於諸曹傳中則見嵩本夏后氏之子也髙貴鄉公書卒而載司馬昭之奏則見公之不得其死也他皆類此但以魏為紀而稱漢吳曰傳又改漢曰蜀世頗譏其失至於謂其銜諸葛孔明髠父而為貶辭求丁氏之米不獲不立儀廙傳之類亦未必然也晋書一百三十卷右唐房喬等撰貞觀中以何法盛等十八家晋史未善詔喬與褚遂良許敬宗再加撰次乃據臧榮緒書增損之後又命李淳風李義府李延壽等十三人分掌著述敬播等四人考正類例西晋四帝五十四年東晋十一帝一百二年又胡羯氏羗鮮卑割據中原為凉四燕三秦夏蜀十六國共成帝紀十志二十列傳七十載記三十例出播天文律歷淳風專之喬以宣武紀陸機王羲之傳論上所自為故曰制㫖又緫題御撰焉按歷代之史雄晋叢冗最甚可以無譏然其多采語林世説幽明録搜神記詭異謬妄之言至於取沈約之説誣元帝為牛氏子之類亦不可不辨宋書一百卷右梁沈約撰十本紀三十志六十列傳齊永明中約奉詔為是書以何承天書為本兼採徐爰之説頗為精詳但本志兼載魏晋失於限斷又王邵謂其喜造竒説以誣前代如瑯琊王妃通小吏牛氏生子孝武於路太后處寢息時人多有異議之類是也後梁武帝知而不以為非嘉祐中以宋齊梁陳魏北齊周書舛繆亡缺始命館職讎校曾鞏等以祕閣所藏多誤不足憑以是正請詔天下蔵書之家悉上異本久之始集治平中鞏校定南齊梁陳三書上之劉恕等上後魏書王安國上周書政和中始皆畢頒之學官民間傳者尚少未幾遭靖康丙午之亂中原淪陷此書幾亡紹興十四年井憲孟為四川漕始檄諸州學官求當日所頒本時四川五十餘州皆不被兵書頗有在者然徃徃亡缺不全收合補綴獨少後魏書十許卷最後得宇文季䝉家本偶有所少者於是七史遂全因命眉山刋行南齊書五十九卷右梁蕭子顯撰八紀十一志四十列傳初江淹已作十志沈約又有紀子顯自表别修然天文但紀災祥州郡不著户口祥瑞多載圖讖表云事祕户口不知不敢私載曾子固謂子顯於斯史喜自馳騁其更改破折刻雕藻繢之變尤多而文比七史最下云梁書五十六卷右唐姚思亷撰六本紀五十列傳唐貞觀三年詔思亷同魏徴撰思亷者梁史官察之子推其父意又採謝吳等所記以成此書徴唯著揔論而已陳書三十六卷右唐姚思亷撰六本紀三十列傳其父察在陳嘗刪撰梁陳事未成陳亡隋文帝問之察以所論載每一篇成輙奏之未訖而沒察且死属思亷繼其業貞觀中與梁書同上之其書丗亦罕傳故多脱誤後魏書一百三十卷右北齊魏收撰初魏史官崔浩既誅太和後始有李彪崔鴻等書魏末山偉綦雋更主國書二十餘年事迹蕩然萬不紀一文宣時詔收撰次成十二紀十志九十二列傳上之悉焚舊書多謟諱不平受尔朱榮子金故減其惡夙有怨者多沒其善黨北朝貶江左為島夷至謂晋元帝為牛金之子時人疾之號為穢史劉知幾謂其生絶徹嗣死逢剖斵皆隠慝所致後隋文帝顔之推等别修唐貞觀中陳叔達亦作五代史皆不傳獨收書在皇朝命劉恕等校正北齊書五十卷右唐李百藥撰本紀八列傳四十二百藥父徳林在齊嘗撰著紀傳貞觀初詔分修諸史百藥因父書丗祖世宗之類周書五十卷右唐令狐徳棻等撰本紀八列傳四十二貞觀中徳棻請譔次而詔徳棻與陳叔達唐儉成之先是蘇綽秉周政軍國詞令多准尚書牛弘為史尤務清言徳棻因之以成是書故多非實録仁宗時出太清樓本合史館袐閣本又募天下獻書而取夏竦李巽家本下館閣是正其文字而後林希王安國上之隋書八十五卷右唐魏徴等撰紀五列傳五十五長孫無忌等撰志三十初詔顔師古孔頴達修述徴揔其事序論皆徴自作後又詔于志寜李淳風韋安仁李延壽同修五代史志無忌上之詔編苐入隋書人亦號五代史志天文律歷五行三志淳風獨作唐書二百卷右石晋劉昫張昭遠等撰因韋述舊史增損以成繁畧不均校之實録多所漏闕又是非失實其甚至以韓愈文章為大紕繆故仁宗刪改蓋亦不可巳焉新唐書二百二十五卷右皇朝嘉祐中曾公亮等被詔刪定歐陽修撰紀志宋祁撰列傳舊者約一百九十萬新書約一百七十四萬而其中增表故書成上於朝自言曰其事則增於前其文則省於舊也而議者頗謂永叔學春秋每務褒貶子京通小學唯刻意文章采雜説既多徃徃抵捂有失實之歎焉五代史記七十五卷右皇朝歐陽脩永叔以薛居正史繁猥失實加修定藏于家永叔沒後朝廷聞之取以付國子監刋行國史稱其可以繼班固劉向人不以為過特恨其晋出帝論以為因濮園議而發也三朝國史一百五十卷右皇朝呂夷簡等撰初景徳四年詔王旦先文元公楊億等十人撰太祖太宗兩朝史至天聖五年詔夷簡等九人添入眞宗朝史王曾監修曾罷夷簡代八年書成編年類荀悦漢紀三十卷右漢荀悦撰班固作漢書起髙祖終于孝平王莽之十二世二百四十二年為紀表志傳凢八十餘萬言獻帝以其文繁詔舉要撮揔通比其事列繫年月為紀三十篇凢八萬三千四百三十二字辭約事該時稱嘉史袁宏漢紀三十卷右晋袁宏彦伯在晋末為一時文宗性强直雖為桓溫禮遇每不阿屈以東京史籍不倫謝承司馬彪之徒錯繆同異無所取正唯張璠紀差詳因參摭記傳以損益之比諸家號為精密唐曆四十卷右唐桞芳撰初肅宗詔芳綴緝吳兢書其叙天寳後事不倫上元中芳讁黔中㑹髙力士同貶因從力士質開元天寳及禁中事識其本時舊史巳送官不可追刋乃推衍義類倣編年法作此書起隋義寜元年迄大曆十三年然不立褒貶義例而叙制度為詳河洛行年記十卷右唐劉仁軌撰記唐初李密王世充事起大業十三年二月迄武徳四年七月秦王擒竇建徳第九卷述大業都城第十卷載宮館園囿且云煬帝遷都之詔稱務從節儉觀其宮室窮極綺麗云大唐創業起居注三卷右唐温大雅撰紀髙祖建義至受隋禪用師符讖受命典册事通曆十卷右唐馬揔撰揔纂太古十七氏中古五帝三王及刪取秦漢三國晋十六國宋齊梁陳元魏北齊後周隋世紀興滅粗述其君賢否取虞世南畧論分系於末以見義焉續通曆十卷右荆南孫光憲撰輯唐洎五代事以續馬揔曆參以黄巢李茂真劉守光阿保機吳唐閩廣湖越兩蜀事迹太祖朝詔毁其書以其所紀多非實也五代通録六十五卷右皇朝范質撰五代實録共三百六十卷質刪其煩文摭其要言以成是書自乾化壬申至梁亡十二年間簡牘散亡亦採當時制勑碑碣以補其闕紀年通譜十二卷右皇朝宋庠撰自漢文帝後元戊寅止周恭帝顯徳庚申為九篇以本朝建隆之元至慶曆辛已為一篇皆曰統元以甲子貫之有五號曰正閏偽賊蠻夷以王莽十九年繫孺子更始以接建武東魏十七年附西魏豫王六年天后十五年繫中宗緒神龍朱梁十六年通濟隂天祐續同光捃晋恭帝禪宋之嵗對魏明元泰常五年尊北降南始主正朔乃通譜之新意也别二篇舉字為類各部分曰類元慶曆中上之優詔褒焉稽古録二十卷右皇朝司馬光君實編起自三皇止皇朝英宗治平末至周共和庚申始為編年編年紀事十一卷右皇朝劉攽因司馬溫公所撰編次資治通鑑二百九十四卷目録三十卷考異三十卷右皇朝治平中司馬光奉詔編集歷代君臣事迹許自辟官属借以館閣書籍在外聽以書局自隨至元豐七年凢十七年始奏御上起戰國下終五代凢一千三百六十二年又略舉事目年經國緯以備檢閲别為目録參考同異俾歸一塗别為考異各一編公自謂精力盡於此書神宗賜名資治通鑑託始於周威烈王命韓趙魏為諸侯下訖五代劉恕嘗語光曷不起上古或堯舜光荅以事包春秋不可又以經不可續不敢始於獲麟恕意謂闕漏因撰一書起三皇五帝止周共和載其世次而巳起共和庚申至威烈王二十二年丁丑四百三十八年為一編號曰外紀猶國語稱春秋外傳也實録類唐則天寳録二十卷右唐吳兢撰初神龍二年詔武三思魏元忠祝欽明徐彦伯桞同崔融岑羲徐堅撰録三十卷開元四年兢與劉知機刋修成此書上之起嗣聖改元甲申臨朝止長安四年甲辰傳位凢二十一年唐代宗實録四十卷右唐令狐峘撰初詔峘撰録未成書貶官卒元和二年子丕上之當時名臣如房琯不立傳直抗如顔眞卿畧而不載時譏漏畧起寳應元年壬寅止大曆十四年已未凢十七年唐順宗實録五卷右唐韓愈撰起貞元二十一年乙酉正月止永貞元年丙戌八月初愈撰録書禁中事為切直閹官不喜訾其非實在文宗時詔路隋刋正隋建言衆議以刋修非是李宗閔牛僧孺謂史官李漢蔣係皆愈之婿不可參撰俾臣下筆臣謂不然且愈之所書非已自出元和以來相循逮今漢等以嫌無害公誼請條其甚謬誤者付史官刋定詔擿去元和永貞間數事為失實餘不復改唐敬宗實録十卷右唐李讓夷等撰起長慶四年甲辰即位止寳曆二年丁未凢三嵗武宗㑹昌中詔史官陳商鄭亞同修讓夷監修書成上之建康實録二十卷右唐許嵩撰始自吳起漢興平元年終於陳末禎明三年南朝六代四百年間君臣行事及土地山川城池宫苑制置興壊用存古跡其有異事則注之以益見聞建康者六朝所都地名也太祖實録五十卷右皇朝李沆等撰起建隆元年庚申止開寳九年丙子十月咸平中眞宗以前録漏落詔錢若水王禹偁李宗諤梁顥趙安仁重加刋修呂端監修端罷沆代二年書成上之沆表云前録天造之始國姓之源發揮無取削平諸國僭主偽臣頗亡事迹今之所正率由典章又益諸臣傳一百四人太宗實録八十卷右皇朝錢若水等撰起即位止至道三年丁酉三月凢二十年至道三年詔若水柴成務宋庚吳渉楊億同修咸平元年書成上之眞宗實録一百五十卷右皇朝王欽若等撰起藩邸止乾興元年壬戌二月凢二十六年乾興元年詔李維晏殊孫奭宋綬陳堯佐王舉正李淑同修馮拯監修拯卒欽若代天聖二年書成上之仁宗實録二百卷右皇朝韓琦等撰起藩邸盡嘉祐八年三月凢四十二年英宗實録三十卷右皇朝曾公亮等撰録起藩邸盡治平四年九月凢四年神宗實録二百卷右皇朝呂大防等撰起藩邸止元豐八年三月凢十九年紹聖中言者謂元祐間呂大防提舉實録范祖禹等編修刋落事跡變乱美實外應姦人詆誣之説命蔡卞改修其後奏書以舊録為本用墨書添入者用朱書其刪去者用黄抹已而將舊録焚毁宣和中或得其本於禁中遂傳於民間號朱墨史云哲宗前實録一百卷後實録九十四卷右蔡京等撰前録起藩邸盡元祐七年十二月後録起紹聖元年正月盡元符三年正月共十三年京之意以宣仁垂簾時政非出於上故分前後録蓋厚誣也哲宗新實録一百五十卷紹興四年三月壬子太上皇帝顧謂宰臣朱勝非等曰神宗哲宗兩朝史録事實多誣非所以傳信後世當重别修定著唐鑑范祖禹有子名冲者巳有召命可促來令兼史事臣勝非奏曰神宗史縁添入王安石日録哲宗史經蔡京蔡卞之手議論多不公今䝉聖諭命官刪定以昭彰二帝盛美天下甚幸十八日丙申新除宗正少卿兼直史舘范冲辭免恩命臣勝非奏曰冲謂史舘專修神宗哲宗史録而其父祖禹元祐間任諫官後坐章疏議論責死嶺表而神宗實録又經祖禹之手今既重修則凢出京卞之意及其增添者不無刪改儻使冲預其事恐其黨未能厭服上曰以私意増添不知當否臣勝非曰皆非公論上曰然則刪之何害紛紛浮論不足䘏也臣勝非曰范冲不得不以此為辭今聖斷不移冲亦安敢有請上復愀然謂勝非等曰此事豈朕敢私頃嵗昭慈聖獻皇后誕辰因置酒宮中從容語及前朝事昭慈謂朕曰吾老矣幸相聚於比他時身後吾復何患然有一事當為官家言之吾逮事宣仁聖烈皇后求之古今母后之賢未見其比因姦臣快其私憤肆加誣謗有玷盛徳建炎初雖嘗下詔辨明而史録所載未經刪改豈足傳信後世吾意在天之靈不無望於官家也朕每念及此惕然於朝夕欲降一詔書明載昭慈遺旨庶使中外知朕修史之本意臣勝非進曰聖諭及此天下幸甚臣仰惟神宗哲宗兩朝實録巳上太上皇帝聖意先定爰命宰臣悉令刪修故具載聖語於篇末云元符庚辰以來詔㫖四卷右皇朝汪藻編徽宗即位後詔㫖未全濮安懿王申陳一卷紀治平中封濮安懿王時宰相奏狀及臺諫言章邵氏辯誣一卷右皇朝邵伯溫撰辯蔡卞章悙邢恕誣罔宣仁欲廢哲宗立徐邸事雜史類汲冡周書十卷右晋太康中汲郡與穆天子傳同得晋孔晁注蓋孔子刪採之餘凢七十篇吳越春秋十二卷右後漢趙曄撰吳起太伯盡夫差越起无余盡勾踐内吳外越本末咸備南史八十卷北史一百卷右唐李延壽撰延壽父太師嘗謂宋齊逮周隋分隔南北南謂北為索虜北謂南為島夷欲改正擬吳越春秋編年未就而卒延壽後預修晋隋書因究悉舊事更依馬遷論體總叙八代北起魏盡隋二百四十二年南起宋盡陳百七十年為二史删煩補闕過本史遠甚至今學者止觀其書沈約魏收等所撰皆不行獨闕本志而隋書有之故隋書亦傳于世西京雜記二卷右晋葛洪撰初序言洪家有劉子駿漢書百卷乃當時欲撰史録事而未得締思無前後之次雜記而巳後學者始甲乙壬癸為十卷以其書校班史殆全取劉書耳所餘二萬許言乃抄撮之析二篇以禆漢書之闕猶存甲乙裒次江左人或以為吳均依託為之五代新説二卷右唐張洵古撰以梁陳北齊周隋君臣雜事分三十門纂次南部煙花録一卷右唐顔師古撰載隋煬帝時宮中袐事僧志徹得之瓦官閣筍筆中一名大業拾遺記大業雜記十卷右唐杜寳撰起隋仁壽四年煬帝嗣位止越王侗皇太三年王世充降唐事貞觀政要十卷右吳兢撰兢以唐之極治貞觀為最故採時政之可備勸戒者上之於朝凢四十篇大唐新語十三卷右唐劉肅撰輯唐故事起武徳止大曆分為二十類明皇雜録二卷右唐鄭處誨撰記孝明時雜事别録一卷題補闕所載十二事開元傳信記一卷右唐鄭棨撰紀開元天寳傳聞之事故曰傳信國史補二卷右唐李肇撰起開元長慶間事初劉餗記元魏迄唐開元事名曰國朝傳記故肇續之幸蜀記三卷右唐李匡文宋巨周宋居白撰初匡文記盡孝明崩巨周止於歸長安叙事互有詳畧居白合二記以宋為本折李為注取二序冠篇復掇遺事增廣焉次桞氏舊聞一卷右唐李徳裕撰上元中史臣桞芳與髙力士同竄黔中為芳言開元天寳年中事乃論次號問髙力士李吉甫與芳子冕真元中俱為尚書郎嘗道力士之說吉甫每為其子徳裕言嵗祀既久遺藁不傳但記十七事後文宗訪力士事於徳裕徳裕編次上之多同明皇雜録開成承詔録二卷右唐李石撰石與鄭覃李固言相文宗録當時延英奏對事開成乃其時年號大和辨謗畧三卷右唐李徳裕撰先是唐次録周秦迄隋忠良罹䜛謗事徳宗覽之不悦後憲宗以為善命令狐楚等廣之成十卷至大和中文成上之兩朝獻替記三卷右唐李徳裕撰徳裕相文宗武宗録當時奏對論議開元升平源記一卷右唐吳兢載姚崇以十事要明皇金鑾密記一卷右唐韓偓撰天復中爲翰林學士從昭宗西幸梁祖以兵圍鳯翔偓每與謀議因密記之及所聞見事止復京師偓貶云松䆫録一卷右唐韋叡撰記唐故事元和朋黨録一卷右唐馬永易記牛李朋黨始末自牛僧孺試賢良迄令狐綯去位中朝故事二卷右偽唐尉遲偓撰記唐懿昭哀三朝故事故曰中朝入洛記一卷右蜀王仁裕隨王衍降入洛陽記徃返途中事并其所著詩賦南部新書五卷右皇朝錢希白撰記唐故事建隆遺事一卷右皇朝王禹偁記太祖事十按太祖開寳九年十月癸丑崩于萬嵗殿先是趙普以六年罷為河陽節度使盧多遜至太平興國元年始除平章事太祖崩時宰臣盖薛居正沈倫也今此云上將晏駕前一日召宰相趙普盧多遜入宮其繆甚矣世多以其所記為然恐不足信也祖宗獨斷一卷右皇朝陸經記祖宗獨断凢十事聖宗掇遺一卷右皇朝余靖撰記國初至仁宗君臣美事以備史闕三朝政録二十卷右皇朝富弼上言欲選官置局將三朝典故編成一書即命王洙余靖孫甫歐陽修編修分别事類成九十六門溫公紀聞五卷右皇朝司馬光撰記賔客所談祖宗及當時雜事筆録一卷右皇朝王曾撰皆國朝雜事晋公談録三卷右皇朝丁謂撰多本朝事每章之首皆稱晋公言不知何人為潤益初董識志彦得之於洪州潘延之家延之晋公甥疑延之所為嘉祐時政記一卷右吳奎趙槩歐陽脩記立英宗事并賈易論韓琦定策疏富公語録一卷右皇朝富弼使虜時所録曽相手記三卷右紹聖初元祐黨禍起曾布知公論所在故對上之語多持兩端又輙增損以著此書云隆平集二十卷右皇朝曾鞏撰記五朝君臣事蹟建炎日曆五卷右皇朝汪伯彦撰記􅊨太上皇帝登極時事五代史闕文一卷右皇朝王禹偁撰録五代史筆避嫌漏畧者以備闕文凢一十七事英宗朝諸臣傳三卷右不知何人於英廟實録中摘出凢四十二人邵氏聞見録二十卷右皇朝邵伯溫子文撰記國朝雜事迄紹興之初序言早以其父之故親接前輩得前言徃行為多類之成書其父雍也金人背盟録一卷右皇朝汪藻編記金人叛契丹迄於宣和乙巳犯京城多採北遼遺事圍城雜録一卷右皇朝王養正録靖康末女眞再犯都城事順昌録一卷右紹興十年劉錡破女眞于順昌城下其徒紀其功云紹運圖一卷右未詳何人所撰自伏羲迄皇朝神廟五徳之傳及紀事皆著于篇昭德先生郡齋讀書志卷第二上昭德先生郡齋讀書志卷第二下偽史類華陽國志十二卷右晉常璩撰華陽梁州地也記漢以來巴蜀人物吕微仲跋云漢至晉初四百載間士女可書四百人亦可謂盛矣復自晉至周顯徳僅七百嵗而史所紀者無幾人忠魂義骨與塵埃同没何可勝數豈不重可歎哉江南録十卷右皇朝徐鉉等撰鉉等自江南歸朝奉詔撰集李氏時事王介甫嘗謂書至亡國之際不言其君之過但以曆數存亡論之雖有愧實録其於春秋箕子之義得之矣雖然潘佑以直言見殺而鉉書佑死以妖妄何也殆與佑爭名且耻其善不及佑故匿其忠汚之以罪耳若然豈唯厚誣忠臣其欺吾君不亦甚乎江南别録四卷右皇朝陳彭年撰偽呉偽唐四主傳也九國志五十一卷右皇朝路振撰呉唐前蜀後蜀東漢南漢閩楚凢九國蜀桂堂編事二十卷右偽蜀楊九齡撰雜記孟氏廣政中舉試事跡始末南唐近事二卷右皇朝鄭文寳編紀李氏二主四十年間雜事之可紀者江南野史二十卷右皇朝龍衮撰凡八十四傳外史擣扤十卷右皇朝張唐英次公撰序稱王建孟知祥父子四世八十年比之公孫述輩最為久逺其間善惡有可為世戒者路振之書未備今成此書以𥙷其遺凡五代史及皇朝日暦所書皆略之北遼遺事二卷右不題撰人蓋遼人也記女真滅遼事序云遼國自阿保機創業於其𥘉徳光恢廓於其後吞併諸蕃割據漢界南北開疆五千里東西四千里戎器之備戰馬之多前古未有子孫繼統二百三十餘年迨至天祚失御女真稱兵十三年間舉國土崩古人謂得之難失之易非虛言耳金虜節要一卷右陷虜人所上也記金人𥘉内侮止紹興十年共十六年事頗詳實史評類史記索隠三十卷右唐司馬貞撰據徐斐注紏正抵捂援據宻緻如東坡辯宰我未嘗從田常為亂蓋本諸貞也唐書直筆四卷右皇朝吕夏卿撰夏卿強記絶人預修新書唐書新例湏知一卷右記新書比舊増减志傳及其緫數唐書音訓四卷右皇朝竇苹撰唐書辯證二十卷右皇朝呉縝撰數新書𥘉修之時其失有八類其舛誤二十門凢四百餘事唐史要論十卷右皇朝孫甫之翰撰歐陽脩司馬光蘇軾稱其書以為舊史所不及西漢發揮十卷右皇朝劉涇巨濟撰蜀人唐鑑二十卷右皇朝范祖禹醇夫撰醇夫為温公通鑑局編修官十五年分掌唐史以其所自得著成此書取武后臨朝二十一年系之中宗其言曰此春秋公在乾侯之義也雖得罪於君子亦所不辭觀此則知醇夫之從公决非苟同者凢二百六篇注唐紀十卷右題曰樊先生而不詳其名近代人所注新書紀也唐史評右皇朝焦考寧撰自號適適先生五代史纂誤五卷右皇朝呉縝撰凢二百餘事皆五代史抵捂闕誤也三國人物論三卷右皇朝楊祐甫撰蜀人歴代史辨志五卷右未詳撰人劉氏史通二十卷右唐劉知幾撰知幾長安神龍間三為史官頗不得志乃以前代書史叙其體法因習廢置掇其得失述作曲直分内外篇著為評議備載史䇿之要當時徐堅深重其書甞云居史職者冝置坐右玄宗朝詔其家録進上讀而善之宋子京稱唐舊史之文猥釀不綱謂知幾工訶古人而拙於用己觀此書知子京之論不誣職官類集賢注記一卷右唐韋述撰摭院中故事脩撰書史之次孝明時學士名氏御史臺記十二卷右唐韓琬撰載唐𥘉至開元御史臺中制度故事以大夫中丞侍御史殿中監察主簿録事分門載次名行事著論一篇叙御史正邪得失正擢誅滅附卷末以為世戒中台志十卷右唐李筌撰起殷周迄隋唐纂輔相邪正之迹分皇王覇亂亡五類以為鍳戒唐相以李林甫陳希烈附皇道筌上元中乃自表天寳𥘉追以綴名云翰林志一卷右唐李肇撰摭唐世翰林院中供奉儀則制誥書詔之式翰林盛事一卷右唐張著撰記唐朝儒臣美事凢三十八史舘故事三卷右不題撰人姓名記史舘雜分六門迄於五代李獻臣以為後周史官所著宰相拜罷録一卷右皇朝陳繹奉詔編起范質止曾公亮所載拜罷之由與實録不同元祐史臣謂繹多出己意樞府拜罷録一卷右皇朝陳繹編起魏仁浦止宋綬翰林續志二卷右皇朝蘇易簡在翰林院最承太宗睠遇録國朝政事以續肇志子耆采易簡所載之餘成一卷附益之金坡遺事三卷右皇朝錢惟演撰載國朝禁林雜儀式事迹并學士名氏文元公真宗禮待儒臣三事附于卷末麟臺故事五卷右皇朝程俱撰紹興𥘉復館職俱首入館纂集舊聞成十二篇唐六典三十卷右唐玄宗撰李林甫張說等注以三公三師三省九寺五監十二衛等例其職司官佐叙以秩品擬周禮六官云蓋唐極治之書也雖不能悉行於世而諸司遵用殆將過半觀唐㑹要請事者徃徃援據以為實或以為此書雖成於開元間而不行於一時不學之言也嘉祐御史臺記五十卷右皇朝溤㓗已撰御史臺有記始於武后時姚庭筠其後韓琬韋述嗣有紀著嘉祐中王疇命㓗已續之乃上自太祖建隆之元迄於嘉祐八年凢一百四年分門載其名氏行事㓗已拯之子也為叙傳兩篇述其父之事附于後儀注類封禪記五十卷右皇朝丁謂等撰大中祥符元年詔謂與李宗諤陳彭年以景徳五年正月三日天書降於左丞天門鴟吻之上迄十月泰山修封事迹儀注詔誥編次成書上之御製序冠之於首祀汾隂記五十卷右皇朝丁謂撰大中祥符三年八月降祀汾隂御扎至明年春禮成四年詔與陳彭年編次事迹儀注踰二年成書上之皇祐㑹計録六卷右皇朝田貺元鈞兩為三司使約景徳㑹計銀以皇祐財賦所入多於景德而其出又多於所入著為皇祐㑹計録上之冀以悟上庶更立輕制使民完實而縣官有餘用者吉凶書儀二卷右皇朝胡瑗翼之撰略依古禮而以今體書䟽儀式附之本朝事實三十卷右皇朝李攸編次雜纂國朝事儀注為多服餙圖三卷右唐李德𥙿編共五十五事刑法類刑統三十卷右皇朝竇儀等詳定疑獄三卷右晉和凝撰纂史傳决疑獄事其上卷凝書也下中卷凝子㠓所續元豐斷例六卷右元豐中法寺所斷罪此節文也諸路將官通用勑二十卷右皇朝崇寧中修紹興勑十二卷令五十卷格三十卷式三十卷政和二年以後赦十五卷右皇朝張守等紹興中𬒳旨編修地理類渚宫舊事十卷右唐余知古撰自鬻熊至唐江陵君臣人物事迹史子傳記所載者悉纂次之水經四卷右漢桑欽撰成帝時人本經三卷後魏酈道元注道元範之子為政嚴酷蕭寳夤叛死之史稱道元好學歴覽竒書撰注水經行于世洛陽伽藍記右元魏羊衒之撰後魏遷都洛陽一時王公大夫多造佛寺或捨其私第為之故僧舍之多為天下最衒之載其本末及事跡甚備青城山記一卷右偽蜀杜光庭賔聖撰集蜀山若水在青城者悉本道家方士之言東京記三卷右皇朝宋敏求編開封坊巷寺觀官廨私第所在及諸故實極其精博相臺志十二卷右皇朝韓琦欲編次未成郡守李琮命郡文學掾陳申之効宋敏求河南志成此書河南志二十卷右皇朝宋敏求以唐韋述兩京記為未備演之為長安河南志司馬光為之序明越風物志七卷右皇朝姜嶼撰以明州本越地故曰明越又以郭璞注爾雅多引江東故詳載其風物云蜀記一卷右皇朝張守約撰載孟昶𥘉降至薨事皇祐平蠻記一卷右皇朝馮炳撰記儂智高叛朝廷遣狄青平之成都古今記三十卷右皇朝趙抃自慶暦至熙寧凢四入蜀知蜀事為詳摭其故實以類相從分百餘門九域志十卷右皇朝王存𬒳㫖刪定緫二十三路京府四次府十州二百四十二軍三十七監四縣一千一百三十五戴斗奉使録二卷右皇朝王曙撰曙景徳三年為契丹主生辰使祥符二年為弔慰使所録也浮休居士使遼録二卷右皇朝元祐甲戌春張舜民𬒳命為回謝大遼弔祭使鄭价為副録其徃返地里及話言也舜民字芸叟浮休居士其自號云嘉州志二卷右皇朝吕昌明撰以嘉州圖經増廣之西夏湏知一卷右皇朝劉温潤守延州日編録偽境雜事匈奴湏知一卷契丹歸朝人田緯編次蕃爾雅一卷右不載撰人姓名以夏人語依爾雅釋以華言雞林志三十卷右皇朝崇寧中劉逵吳拭使高麗王雲為書記官既歸攟輯其㑹見之禮聘問之辭類分為八門廬山記五卷右皇朝陳令舉舜俞撰先是劉煥嘗為記令舉因而増廣之又為俯視圖紀尋山先後之次云春秋地譜十二卷右皇朝楊湜編十三國地皆釋以今州縣名并為圖於其後蓋常氏已嘗有此書而湜増廣焉冝春傳信録三卷右皇朝羅誘述載其地古今人物及牧守政跡山川靈異云袁州孚惠廟録一卷右皇朝張慤纂記仰山二神靈異之迹輿地廣記三十八卷右皇朝歐陽忞纂自堯舜已來至于五代地里㳂革離合皆係於今郡縣名或云無所謂歐陽忞者特假名以行其書耳青唐録二卷右皇朝汪藻撰青唐吐蕃遺種也崇寧中命童貫取湟廓西寧州擒趙懐徳上為之御樓受降宰臣蔡京以下進官有差三輔黄圖一卷右未見撰人隋經籍志唐藝文志皆有其目蓋古書也記秦漢以來宫殿門闕樓觀池苑在關輔者曰三輔黄圖言東都不與焉雲南志十卷右唐樊綽記雲南山川物産雜事止咸通中梁益記十卷右皇朝任弁撰天禧中游䆠于成都以蜀記數家其言皆無所據依乃引書傳刋正其謬蜀三神祠録五卷右皇朝井度編任四川漕日裒梓潼灌口射洪三神祠碑文板記成此書云蕃禺紀異五卷右皇朝馮拯撰拯淳化中謫知端州見嶺表鳥獸草木民俗物情舉異中原録之類為三十門凢三百事還朝上之生辰國信語録一卷右皇朝冦瑊撰瑊與康徳輿天聖六年使契丹賀其主生辰徃返語録并景徳二年至天聖八年使副姓名及雜儀附于後零陵揔記十五卷右皇朝陶岳撰永州地里志也今永州所部才三縣其所録多連及數郡自序云以其皆零陵舊地故収之南行記三卷右王仁𥙿撰晉天福三年仁𥙿被命使高季興記自汴至荆南道塗賦詠及飲宴酬倡殆百餘篇洛陽名園記一卷右皇朝李格非撰記洛中園圃自冨鄭公以下十九所其論以為洛陽之盛衰為天下治亂之候園圃之興廢為洛陽盛衰之候則園記之作豈徒然哉公卿大夫忘天下治忽欲退享此得乎唐之末路是也傳記類黄帝内傳一卷右序云籛鏗得之於衡山石室中後至漢劉向於東觀校書見之遂傳于世穆天子傳六卷右晉太康二年汲縣民盗發古冡所得凢六卷八千五百一十四字詔荀朂和嶠等以隷字寫之云按春秋左氏傳穆王欲肆其心周行天下將皆有車轍馬跡焉此書所載即其事也穆王好廵狩得驊驪緑耳之乘造父為御以觀四荒北絶流沙西登崑崙與太史公記同汲郡収書不謹多毁缺雖其言不典皆古書頗可觀覽郭璞注本謂之周王遊行記朂之時古文巳不能盡識時有闕者又轉冩益誤殆不可讀漢武内傳二卷右不題撰人記王母降漢武故事二卷右世言班固撰唐張柬之書洞冥記後云漢武故事王儉造漢武洞冥記五卷右後漢郭憲子横撰其序言漢武明嶲特異之主東方朔因滑稽浮誕以匡諫洞心於道教使冥跡之奥昭然顯著故曰洞冥十洲記一卷右漢東方朔撰斑固賛言朔之詼諧逢占射覆其事浮淺童兒牧竪莫不眩耀而後世好事者因取竒言恠語附著之朔豈謂此書之類乎楊貴妃外傳二卷右皇朝樂史撰叙唐楊妃事迹迄孝明之崩趙飛燕外傳一卷右漢令玄子于撰茂陵卞理藏之於金縢漆櫃王莽之亂劉㳟得之傳于世晉荀朂校上閩川名士傳三卷黄璞一本作皇甫璞右唐黄璞撰唐神龍以來閩人知名於世者効楚國先賢傳為之王子年拾遺記十卷右梁蕭綺叙録晉王嘉字子年嘗著書百二十篇載伏羲以來異事前世竒詭之説書逸不完綺拾綴殘輯而叙之汾陽王家傳十卷右唐陳雄撰雄本汾陽王郭子儀僚吏後又從事渾瑊幕府故傳不名第九卷録行狀第十卷録副佐三十三人大將二十七人曰忠武將佐略降聖記五十卷右皇朝丁謂撰大中祥符五年十月十七日聖祖降七年謂請編次事迹詔李維宋綬晏殊同編天禧元年上之先天紀三十六卷右皇朝王欽若集聖祖趙諱即軒轅黄帝也故欽若奉詔編次傳記黄帝事迹上之賜名先天紀御製序冠其首柳氏序訓一卷右唐柳玭叙其祖公綽已下内外事迹以訓其子孫吳湘事迹録一卷右唐大中中李紳鎮揚州陷湘州以罪抵死後其兄汝納辯訴其枉狀録揔載焉王魏公遺事四卷右皇朝王魏公旦相真宗其子素録遺事凢百餘條分四卷王文正公言行録三卷右皇朝王文正公曽相仁宗其弟皥録其平生言行凢六十事李清臣為之序張忠定公語録四卷右皇朝張忠定公詠守蜀有善政其門人李畋紀其語論可以垂世者西李文正公談録一卷右西李文正公昉也相皇朝太宗其子宗諤録其平生所談十七事韓魏公家傳二卷右皇朝韓忠彦撰録其父琦平生行事近世著史者喜采小説以為異聞逸事如李繁録其父泌崔胤記其父慎由事悉鑿空妄言前世謂此等無異莊周鮒魚之辝賈生服鳥之對者也而唐書皆取之以亂正史由是近時多有家傳語録之類行于世陳瑩中所以發憤而著書謂魏公名徳在人耳目如此豈假門生子姪之間區區自列乎持史筆其慎焉魏國忠獻公别録三卷右皇朝韓魏公琦相仁宗英宗其門人王嵓叟記其言論事實然以國史考之其嵗月徃徃抵捂蓋失之誣也潜德録一卷右皇朝吕誨獻可之孫撰記其祖乞立英宗言章文潞公私記一帙右皇朝文彦博所撰元豐𥘉王堯臣之子同老以其父至和中所撰立英宗為皇子詔草上之且曰時宰相文彦博冨弼知狀神宗以問彦博彦博具以實對至元祐中賈易為言官因為韓忠彦爭辯其事彦博乃著此其後云自古唯霍禹云縣官非我家將軍不得至此楊復㳟自稱定筞國老謂昭宗為門生天子皆鞅鞅不道之言卒𬒳夷滅鐘山日録二十卷右皇朝王安石介甫撰紹聖間蔡卞合曽布獻于朝添入神宗實録陳瑩中謂安石既罷相悔其執政日無善状乃撰此書歸過于上掠美於己且歴詆平生不悦者欲以欺後世於是著尊堯集及日録不合神道論云嘉祐名臣傳五卷右皇朝張唐英傳仁宗朝賢臣五十餘人晁以道楊雄别傳一卷右族父詹事公撰雜取諸書所載雄逸事為一編系之以賛忠臣逆臣傳三卷右皇朝楊堯臣撰忠臣謂李若水也逆臣謂劉豫也相國鄴侯家傳十卷右唐李繁撰繁鄴侯之子也大和中以罪繫獄當死恐先人功業不傳乞廢𥿄䘿筆於獄吏以成傳藁戒其家求世間人潤色之後竟不果宋子京謂其辭浮侈云唐宋科名分定録三卷右不題撰人元符間所著書也序云己卯嵗得張君房所誌唐朝科場故事今續添五代及本朝科名分定事迄於李常寧云開元天寳遺事四卷右漢王仁𥙿撰仁𥙿仕蜀至翰林學士蜀亡仁𥙿至鎬京採摭民言得開元天寳遺事一百五十九條明皇幸蜀記兩卷右唐宋巨纂記明皇幸蜀迄于復歸京師傳信録右皇朝鮮于綽大受撰記國朝雜事多言元豐後朝廷政事得失人物賢否譜諜類姓源韻譜五卷右唐張九齡撰依春秋正典柳氏萬姓録世本圖捃摭諸書纂為此譜分四聲以便尋閲元和姓纂十一卷右唐林寳撰元和中封閻具於諸家姓氏太原其人乃言非本郡憲宗令宰相命寳纂諸家姓氏外各依四聲類集毎韻之内則以大姓為首鮮于氏卓絶譜一卷右唐書藝文志有其目喬琳撰紹興𥘉鮮于戡續之闕里世系一卷右皇朝孔宗翰重修孔子家譜也唐藝文志有孔子系葉傳今亡其家所藏譜雖曰古本止叙承襲者一人故多踈略宗翰元豐末知洪州刋于牘紹興中端朝者續之止於四十九代洪興祖又以史記并孔光孔僖傳及太子賢注與唐宰相世系諸書校正直作年譜例于卷首云書目類藝文志見闕書目一卷右唐書藝文志近因朝廷募遺書刻牘布告境内下注書府所闕俾之訪求崇文揔目一卷右唐朝崇文院書目也隋嘉則殿書三十六萬卷至唐散失已多崇文書比之唐十得二三而已自經丙午之亂存者無幾矣吳氏西齋目一卷右唐呉兢録其家藏書凢一萬三千四百六十八卷兢自撰書附于正史之末又有續抄書列于後道藏書目一卷右皇朝鄧自和撰太洞真部八十一秩靈寳洞玄部九十秩太上洞部三十秩太真部九十六秩太平部一十六秩正一部三十九秩凢六部三百一十一秩大宋史舘書目一卷右皇朝史舘書揔計一萬五千一百四十二卷邯鄲圖書十志十卷右皇朝李淑獻臣撰載其家所藏圖書五十七類釐為十志昭徳先生郡齋讀書志卷第二下
