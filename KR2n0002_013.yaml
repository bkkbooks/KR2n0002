front:
  text: 二本四卷考異
  hash: sha256:5525e5584c93bc62300963d9e8fa4c3bfc31daefd5e919e1ab37e726c1fbc9a5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0002_SBCK_013-1a}
body:
  text: 三種書同而名異袁本毗陵易傳十一卷衢本作東坡易傳袁本藝閣先生易解一卷衢本作吕氏章句易袁本陳叔易詩一卷衢本作澗上丈人詩二十一種所載入類不同朝以道易玄星紀譜一卷左氏綱領四卷左氏蒙求三卷押韻一卷漁樵問對一卷程氏雜説一卷儒言一卷信聞記一卷以上袁本經類衢本子類古樂府十卷樂府古題要解十卷玉臺新詠十卷玉臺後集十卷以上袁本經類衢本集類松窗録一卷太和辨謗略三卷以上袁本史類衢本集類神仙傳十卷王氏神仙傳四卷高僧傳二卷求法高僧傳十卷僧寶傳三十二卷以上袁本子類衢本史類馭臣鑒古二十卷汲古論一卷以上袁本集類衢本子類二十九種袁本所載衢本所遺六家經要四卷淳化法帖十卷武陵法帖二十二卷王曾筆録一卷英宗朝諸臣列傳三卷本朝事實三十卷青唐録二卷忠臣逆臣傳三卷藝文志見闕書目一卷酒經三卷晉公談録一卷該聞録十卷漫叟見聞録一卷劉辣小説五卷左氏要類職林二十卷骨鯁集二十卷蘇沈良方十五卷維摩詰所説經三卷六祖壇經二卷修已金剛經旨要一卷錦囊集一卷員半千三蓮集二十卷余氏至言十八卷藏寂軒文集趙延持盈要論聖紹堯章集十卷藝圃折衷六卷政和文選二十卷二本四卷考異
