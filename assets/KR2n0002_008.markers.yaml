  - {type: variant, offset: 232, length: 0, content: '', WYG: 以熙寧後事也紹興九年詔館職續編至三十一年又降趣㫖孝宗命宰相提舉閲再歲乃成自神宗}
  - {type: variant, offset: 233, length: 0, content: '', WYG: 初至於靖康之末凡六十年總三百卷厥後中興乾道踵而成之此集則合十一廟為一書也然中多節畧而始末不全者會要詳節四十卷右御史知雜范師道所編也讀書志云節會要十二卷希弁所藏乃四十卷前有序云師道所節四十卷先後詳緻無異全本紹興小臣王容清謹題皇朝大詔令二百四十卷右宋宣獻公家所編纂也皆中興以前之典故嘉定三年李大異刻於建寧本朝事實三十五卷右莫詳編者姓氏祖宗世次登極紀元詔書聖學御製郊廟道釋玉牒公主官職爵邑勛臣配享宰執拜罷科目儀注兵刑律厯籍田財用削平僭偽陞降州縣經畧夷狄之類具載本末又如聖德頌旌忠碑之類皆載之紹述熙豐政事十卷右政和八年十月一日詔云可以紹述熙豐政事書布告施行此即布告之本也其列詔書於前而載十一人姓名於後今詳書之以見當時之官制云承務郎試明堂平朔頒朔兼禮制局校正内經檢討官臣黄次功承奉郎守明堂總章頒朔臣李伯全宣教郎守明堂青陽頒朔臣嚴裕朝請郎明堂頒朔臣徐秉哲宣教郎試明堂頒事臣蔡伷朝散郎試明堂頒事臣陳公彦朝奉郎試明堂頒政國史編修官臣許翰通侍大夫康州防禦使提㸃龍德太一宫提舉入内醫官編類聖濟經提舉太醫學明堂頒朔布政詳定官臣曹孝忠翰林學士知制誥兼侍講同修國史明堂頒朔布政詳定官充編類御筆所禮制局詳議官臣張邦昌檢校少傅䕶國軍節度使中太一宮使直宣和殿明堂兼在京神霄玉清萬壽宮提舉通領頒朔布政詳定事臣梁師成宣和殿大學士上清寳籙宮使兼神霄玉清萬壽宮副使兼侍讀明堂頒朔布政詳定官編類御筆詳議臣蔡攸崇觀政宣詔令章奏二十卷右徽宗皇帝朝詔令章奏分門而類次之隆平典章三十卷右建炎至乾道之詔㫖及御製之文奏對之章誥詞諡議之類皆分門而敘之如孔子七十二子贊及損齋記皆在焉髙宗寳訓七十卷右嘉定六年十月史官所上本也内治聖監二十卷右彭忠肅公龜年為起居舍人兼皇子嘉王府直講日所進也上自九重后妃世子旁及宗藩戚里下至官寺胥史以類紀之而外廷百司庶府不與焉公字子壽清江人自號止堂太平治迹統類四十卷中興治迹統類三十五卷右倣通鑑紀事本末條例統而類之事撮其綱辭舉其要上自藝祖而下至於孝宗凡二百門云眉山彭百川編集雜藝術類文房圖贊一卷右和靖後人林可山撰自筆硯而下皆為之官稱圖其像於前而列其贊於後序謂唐韓愈舉頴為中書他竟無所聞今圖贊一十八人擬以官酬之竢異日請於朝罔俾昌黎顓美有唐采選集四卷右莫詳誰氏作初彩選格起於唐李郃本朝踵之者有趙明逺尹師魯元豐官制行有宋保國皆取一時官制為之至劉黄父獨因其法取西漢官秩陞黜次第為之又取本傳所以陞黜之語注其下局終遂可類次其語為一傳博戲中最為雅馴此集尤詳且悉曰階官曰職名曰科目曰賞格曰服色曰俸給曰爵邑諡法之類無一不備醫家類御製聖濟經十卷右徽宗皇帝所製也政和八年五月十一日詔頒之天下學校九月二十四日大司成李邦彦等言乃者從侍臣之請令内外學校課試於聖濟經出題臣等切謂今内經道德經既已選博士訓説乞更以聖濟經附二經兼講從之陸宣公經騐方二卷右唐陸宣公贄在忠州時所集而山陰陸游所跋也或問朱文公曰陸宣公既貶避謗闔門不著書秖為古今集騐方曰此亦未見陸宣公是處豈無聖賢經傳可以玩索可以討論濟世全生方指迷集三卷右考城王貺字子亨所著也吳丞相敏序之曰子亨當官不苟遇世變嘗慨然再請出疆使萬里云本草單方十五卷右龍溪林能千編集列三十六門疏二百七十三目自為之序鍼炙資生經七卷右王執中所編也執中東嘉人嘗為從政郎澧州教授云四時治要一卷右永嘉屠鵬字時舉所著戴文端公溪為之跋陳氏經騐方五卷右書林陳先生集李文懿公壁為之序神仙類御序集註無量度人經二卷右真宗皇帝御製序徽宗皇帝御書而註之會要云宣和六年八月四日詔賜左丞范致虚御書洞元靈寶無量度人經二部想即此本也别一本云建中靖國元年四月十三日奉聖㫖鏤版而無序無註亦不載於會要朱文公云此經乃杜光庭撰赤松子中械經一卷右序云軒轅黄帝遇赤松子授中械經希弁嘗攷國朝大詔令云元符三年九月日制云赤松真君紀於仙籙神農之師可加號赤松凌虚真君疑即此也然張良亦封忠佑凌虚真人云玉皇本行集經三卷右嘉熙四年臨安府承天靈應觀所刻蜀本也程公許序述為詳九天生神章經三卷右緜州冲虚觀道士王希巢隠賢解玉局散吏程公許為之序西蜀譙巖趙日休跋朱文公嘗謂此經亦杜光庭所撰西山十二真君傳一卷右晉許遜吳猛陳勲周廣曾亨時荷甘載施岑彭杭盱烈鍾離嘉黄仁覽皆得道於西山者政和王册誥詞在其中皇宋拾遺仙傳一卷右陳希夷張虚靜朱觀妙徐神公主侍宸劉靜一趙道翁皇甫清虚之事蹟也其中所載御製及誥詞與夫詩記之類為多太上感應篇八卷右漢嘉夾江𨼆者李昌齡所編也希弁生父師冋嘗為之序四明史彌志跋其後曰趙公所序禍福善惡之報為尤詳可謂愛人以德者余嘗守袁喜袁人之樂於趨善因閲是序矍然起敬而程公許湯中維書之竹宮表制一卷右楊至質字休文太乙宮代言之文也自號勿齋聖上嘗書二字以賜之休文謝表云先儒德秀嘗貽金石之文督府了翁復賁蟲魚之篆希弁云不若用臣真德秀臣魏了翁休文以為然釋書類御註四十二章經一卷右御注未詳歳月希弁嘗聞朱文公云釋氏只四十二章經是他古書其餘皆中國文士潤色成之維摩經亦是南北時人作御注大圓覺了義經二卷右孝宗皇帝賜徑山興聖萬壽禪寺僧寳印者也前刻唐裴休序大方廣佛華嚴經八十卷普賢行願品一卷右于闐國三藏沙門實义難陀譯序云天册金輪聖祐皇帝製者唐武后也希弁嘗攷晉義熙中六十卷唐聖厯中八十卷普賢行願品乃正元十二年南天竺烏荼國王手書以進通為八十一卷厥後李長者製為合論四十卷提舉坑冶鑄錢朝奉張大夫乃以經論合為一書云李忠定公綱曰廣博妙圓極諸經之閫奥莫如大方廣佛華嚴經精微條暢為華嚴之指南莫如李長者所製合論妙法蓮華經七卷右姚秦三藏法師鳩摩羅什譯經本十卷後三卷朝廷所禁云楞嚴經解十卷右王荆公安石所解也圓覺經皆證論一卷右臨川謝逸序謂王荆公嘗問真淨文禪師曰一切衆生皆證圓覺而圭峰禪師易證為具謂譯者之訛其義是否真淨曰圭峰之説非是真淨法子德洪述其師之説而為之論淨土文一卷右王日休所編歴陽張孝祥為之序日休字虚中龍舒人嘗為國學進士般若精義四卷右金剛般若波羅密經解義也寂感禪師法語五卷右寂感禪師印肅語也程公許為之序淳熙中謝艮齋諤所作塔銘附無庵法語一卷右孟少保琰與公安僧法東往復之語也陳􅠐趙希杼為之序郡齋讀書志卷五上欽定四庫全書郡齋讀書志卷五下附志宋趙希弁撰楚辭類楚辭集註八卷後語六卷辨證一卷右朱文公所定也離騷凡七題二十五篇皆屈原作定為五卷續離騷八題十六篇定為三卷校晁氏本増弔屈原服賦二篇而去七諌九懐九歎九思四篇公謂四篇雖為騷體然詞氣平緩意不深切如無所疾痛而强為呻吟者就其中諌歎猶粗可觀兩三則卑已甚矣故雖幸附書尾而人莫之讀今不復以累篇􅐆也賈傅之詞于西京為最髙且惜誓已著於篇而二賦尤精乃不見取亦不可曉故并録以附焉後語定著五十二篇公謂屈子者窮而呼天疾痛而呼父母之詞也故今所欲取而使繼之者必其出於幽憂窮蹙怨慕凄涼之意乃為得其餘韻而宏衍鉅麗之觀懽愉快適之語宜不得而與焉至論其等則又必以無心而冥㑹者為貴其或有是則雖逺且賤猶將汲而進之一有意於求似則雖迫近如楊柳亦不得已而取之耳騷自楚興公之加意此書則作牧於楚之後也或曰有感於趙忠定之變而然離騷章句一卷右吕成公所分也以離騷經一篇為十六章公謂王逸嘗言劉向典校分離騷為十六卷班固賈逵各作離騷章句惟一卷傳焉餘十五卷闕而不録今觀屈平所作凡二十有五各有篇目獨此一篇謂之離騷切意劉向所分即此篇猶一篇之中有數章焉故嘗因逸之言即離騷一篇反復求之考其文之起㐲意之先後固有十六章次第矣因而分之為十六章東萊集中不載離騷草木疏四卷右通直郎行國子録河南呉仁傑撰慶元間自序别集類一申鑒五卷右後漢荀恱所作也恱字仲豫儉之子也儉早卒恱年十二能說春秋家貧無書每之人間所見篇牘一覽多能誦記尢好著述靈帝時閹官用權士多退身窮處恱乃託疾隠居初辟鎮東將軍曹操府遷黄門侍郎侍講禁中累遷秘書監侍中時政移曹氏天子恭已而已恱志在獻替而謀無所用乃作申鑒五篇其所論辨通見政體既成而奏之其大畧曰前鑒既明後復申之故古之聖王其於仁義也申重而已恱嘗依左氏傳體為漢紀三十篇又著崇徳正論及諸論數十篇建安十四年卒孔稚珪集十卷右齊孔稚珪字徳璋之文也稚珪道隆孫㑹稽山隂人為東南冠族少知名有文彩辭章清抜獨冠當世舉秀才為安成王法曹叅軍齊髙帝時補記室叅軍終于都官尚書散騎常侍太子詹事追贈金紫光禄大夫謚簡子集有序云所為文章雖行於世竟未撰集今摭其遺逸分為十卷然莫知其為誰序也詩品三卷右梁征逺記室叅軍鍾嶸撰嶸字仲偉南史有傳嶸嘗求譽於沈約約拒之及約卒嶸品古今詩為評言其優劣云觀休文衆製五言最優齊永明中相王愛文王元長等皆宗附約于時謝朓未遒江淹才盡范雲名級又微故稱獨歩故當辭宏於謝意淺于江蓋追宿憾以此報約也陸宣公集二十二卷右唐陸贄敬輿之文也讀書志云陸贄奏議十二卷希弁所藏制誥十卷奏草六卷奏議六卷凡二十二卷云李翰林文集三十卷右唐李白太白之文也讀書志云二十卷希弁所藏三十卷以常山宋敏求南豐曽鞏序考之則三十卷為是然第一卷乃李陽冰魏顥樂史三人所作序李華劉全白范傳正裴敬四人所作誌與碑第二卷以後乃白詩文云黄氏補千家集註杜工部詩史三十六卷外集二卷右唐杜甫少陵之詩也嘉定中臨川黄希夢得及其子鶴叔似所補也外集上卷詩二十九首下卷祭逺祖當陽君文祭外祖祖母文為閬州王史君進論巴蜀安危表東西兩川說凡四篇以唐書本傳冠于前而吕汲公年譜附于後云昌黎先生文集四十卷外集三卷順宗實録五卷附録三卷右唐韓愈退之之文也讀書志云韓愈集四十卷集外文一卷希弁所藏合五十一卷嘗以宜春新舊本兼饒本叅校又以嘉祐壬寅所刋杭本是正之饒本刋年譜于目録之後刋附録于外集之前又附録止載九篇而前後共列五序柳開但曰後序亦不書其姓名杭本並無目録年譜附録亦無柳開一序趙徳之序文録列于李漢之先歐陽修之記舊本較之他集則異他本所載者六百二十七字杭本所刋者一百六十二字以嘉祐壬寅考之歐陽方在政府刋者不應謬誤豈非後來更改而然歟遂寫杭本歐陽之序饒本汲公之記續於附録之後石守道秦少游張文潜之論黄魯直蔣頴叔李伯紀之詩鄭介甫之祭文陳元光之集序黄直卿之記新廟真希元之記祠堂又寫附歐吕二公之後而諸賢評論先生之文者各以其說註於逐篇之上若夫委緌大學宜序天臺之屬此先生除都官郎之誥詞也當考誰行道徳博聞此先生謚文公之法也當考誰議有所謂示浩初序之書者王逢原代先生之作也續駑驥行之詩者李泰伯廣先生之說也如此類者亦當寫補附録之缺云柳先生文集四十五卷外集二卷附録二卷右唐柳宗元子厚之文也讀書志云柳宗元集三十卷集外文一卷希弁所藏卷帙與劉禹錫四十五通之說同以諸本㸃校寫諸公評論於逐篇之上附録中先後失次者正之遺缺者補之若夫昌黎所作先生墓誌祭文他本皆在附録中惟此本在正符之後蓋禹錫自謂附於第一通之末也朱文公嘗謂柳文後龍城雜記王銍性之所為也子厚叙事文字多少筆力此記衰弱之甚皆寓古人詩文中不可曉知底于其中似暗影出云杜詩辨證一卷右洪興祖所纂也年譜列于前興祖字慶善鎮之丹陽人也張釡刻于興國韓文考異十卷右朱文公所定也以南安舉正及祥符杭本嘉祐蜀本李謝所據館閣本考其同異一以文勢義理及他書之可證驗者決之云嘉定戊辰三山鄭自誠刻而叙其後韓文音義一卷右右從政郎潭州寧鄉縣丞祝充所進也毛叔度為之序張杓刻而叙其後柳文音釋一卷右南城童宗說編韓集舉正一卷右莫詳誰作而說云唐儒郭京有周易舉正三卷蓋以所得王輔嗣韓康伯註定真本舉正傳本之訛題義取云文標集三卷右唐集賢學士盧肇之文也肇字子發宜春人幼好學頴抜不羣宜春令盧㠋一見竒之曰子異日有聞乎由是愈激厲唐㑹昌二年預江西解試末送啟謝曰巨鼇贔屭首冠蓬山主文詢其謂對曰巨鼇不靈頑石右上一座盡笑唐制取士許簾獻所業先察其素時王起知舉肇為書以獻起問曰鄉薦如公材幾何對曰皆才選也未易品判然如肇者亦猶沅江之鼈九助賔希繼而同舉黄頗進謁起問如初則曰捨頗其誰才起由是少頗而多肇之謙始李徳裕以言事出為宜春長史嘉肇文行異禮之至是徳裕以言事遷大尉總樞柄絶朋黨晚進寒素難逰其門獨肇入謁常許袍帶從容談論既試有期知舉以取士白亦舊例也徳裕曰某不薦人然喜今榜得一狀元矣迨試果魁中任著作郎遷京兆府司録使相盧商裴休盧簡求爭辟之厯集賢學士歙宣池三州刺史所至皆有可紀後為吉州刺史卒靈溪集七卷右唐王貞白之文也貞字有道信州永豐人乾寧二年進士後七年調校書郎手編所為詩三百篇命曰靈溪集云慶元中洪文敏公邁為之序别集二趙韓王文集五卷右韓忠獻王趙普之文也讀書志云文集三卷而叙述甚畧希弁所藏文集一册列劉昌言所作行狀于前記一表疏二十九附手詔批答五奏狀劄子二十五附御詩二十一啟狀十詞帖三希弁又得其謝請班師批答一表於國史本傳賀平江南一表及與諸公遺書于國朝文粹通六十八篇以太宗皇帝御製神道碑冠于帙首并行狀為一卷次以記又次以表疏又次以奏狀劄子又次以啟狀詞帖成五卷碑稱晚嵗酷愛讀書經史百家常存几案强記黙識經目諳心碩學老儒宛有不及又為之銘曰經綸宏異學識通該傳亦稱普初以吏道聞寡學術及為相太祖常勸以讀書晚年手不釋卷謚以忠獻取慮國忘家薦可替否之法也追封韓王配享太祖皇帝廟庭韓魏王安陽集五十卷右魏忠獻王韓琦之文也王安陽人故以名集王字稚圭天聖五年進士第二人定䇿三朝功在國史神宗皇帝御製神道碑有云薨前一夕有大星殞於園中櫪馬皆鳴又曰公奉詔立皇子句被顧命立英宗為皇帝句立朕以承祖宗之序可謂定䇿元勛之臣矣又為之銘曰公行不歸中夕是悼尚想公儀淚落苑草復御篆十字填金以冠其額曰兩朝顧命定䇿元勛之碑贈尚書令謚忠獻取慮國忘家文賢有成之法也追封魏王配享英廟楊文公武夷集二十卷右楊文公億之文也景徳丁未公所自編序于前曰目之武夷蓋山林之士不忘維桑之情雕篆之文竊懐敝帚之愛命題之意蓋以是也集凡五百七十五篇公兩為翰林學士冦凖得罪公憂畏而卒自唐大中後文氣衰濫國朝稍革其弊至億乃振起風采與古之作者方駕矣景祐初贈禮部尚書謚曰文鎮國節度使駙馬都尉李朂乞加謚忠字奏雖不行詔付史館种𨼆君江南小集二卷右种放字明逸之文也明逸洛陽人少時徃來嵩華間慨然有山林之志隠居終南豹林谷自號雲溪醉叟又號退士聞陳摶之風徃見之放作樵夫拜庭下摶挽之而上曰君豈樵者耶二十年當為顯官名聞天下放曰放為道義官禄非所願也摶笑曰人之貴賤莫不有命貴者不可為賤亦猶賤者之不可為貴也君骨相當爾雖晦迹山林恐不能安異日當自知之太宗時召之不起真宗時召為左司諫携其手登龍圖閣論天下事累遷工部侍郎嘗侍宴真宗命羣臣賦詩杜鎬以素不屬辭誦北山移文以譏之真宗因出放所上時議十二篇謂近臣曰放為朕言事甚衆但人無知者耳放一日晨興忽取前後章疏槀焚之服道士服召諸生飲與訣酒數行而卒年六十贈工部尚書集凡二百九十四篇乃淳化三年李介所編者序謂以所集之地定名故曰江南小集云歐陽文忠公文集一百五十三卷附録五卷廬陵歐陽先生集六十一卷右歐陽文忠公修永叔之文也讀書志云文忠公集八十卷諫垣集八卷希弁所藏一百五十三卷内居士集五十卷外集二十五卷易童子問三卷外内制十一卷表奏書啟四六奏議二十五卷雜著述十九卷集古録跋語一十卷附録五卷别一本六十一卷乃舊物也張文定玉堂集二十卷右張文定公方平之文也公字安道宋城人明道二年以茂材異等擢為校書郎神廟時參大政元祐六年終於太子少師致仕贈司空謚文定公出入兩禁垂二十年一時大典多出其手劉忠肅嘗序其玉堂集二十卷乃在東坡所序樂全集四十卷之外淳熙九年錫山尤袤重刻于江西漕臺范文正公奏議十五卷右范文正公仲淹之奏議也皇祐五年韓魏王為河東經畧安撫使知并州時所序也公字希文蘇州人中進士第嘗與韓魏王開府涇州經畧邊事元昊請和召拜樞副除參知政事以資政殿學士户部侍郎卒贈兵書謚文正上篆其碑額曰褒賢别有丹陽集二十卷東坡先生序之王岐公華陽集一百卷右王文恭公珪之文也大觀二年詔故相岐國王公之家以文集來上其子朝奉大夫管勾南京鴻慶宫上䕶軍仲修等表進之許光疑為之序公字禹玉成都華陽人也舉進士廷試等二以左僕射岐國公薨於位贈太師謚文恭紹聖中為章惇所誣追貶萬安軍司户元符三年其子仲修訴父寃乃盡復故官贈謚及蔡京用事又以珪為臣不忠入黨籍哲宗嘗篆其碑額曰懿文徽宗又賜之曰元豐治定弼亮功臣范忠宣公文集二十卷右范忠宣公純仁之文也後三卷乃國史載公本傳及行狀公字堯夫文正公次子以恩補太祝中皇祐元年進士第再相元祐之間元符末自潁昌以大觀文中太乙宫使召以疾不赴薨上覽遺表震悼贈開府儀同三司謚忠宣賜其墓碑曰世濟忠直曽文昭公銘之四明樓鑰序其文别有臺諫論事五卷邊防奏議二十卷又在此文之外劉忠肅公文集四十卷右劉忠肅公摯之文也忠肅制誥附于後元城先生劉安世序之公名摯字莘老永靜軍東光人嘉祐中登進士甲科元祐六年拜右僕射出知鄆州紹聖四年責鼎州團練副使新州安置薨詔許歸𦵏追復觀文殿學士中興贈少師謚正肅以家諱改忠肅陳忠肅公諌垣集二卷右陳忠肅公瓘所作也瓘字瑩中延平人元豐二年進士甲科徽宗朝為右正言遷右司諌坐黨籍除名勒停送袁州編管崇寧初移亷州又移郴及彗出仆黨碑乃得自便靖康初贈諌議大夫擢其李子為密院檢詳嘗因奏對許刋其家集云道卿鄒忠公奏議十卷右鄒忠公浩之文也龜山先生為之序公字至全常州晉陵人舉進士累遷右正言上疏諌立劉皇后除名新州覊管然世所傳疏其辭詆訐蓋當時小人偽為之以激怒者也公之子柄後因賜對首辨此事且繳元疏副本上之詔付史館贈公寳文閣直學士謚曰忠趙豐公忠正徳文集十卷右豐國趙忠簡公鼎之文也始號得全居士集周文忠公序之曰髙宗中興用宰相十五人曰忠曰正曰徳曰文兼而有之者其惟趙公元鎮乎此非私言髙宗大書賜公云爾遂以名其集文謂唐用兵伐叛詔書付宰相乃下處報機急武宗必命徳裕起草與公事業如出一揆又謂徳裕自分司東都貶潮之司馬鼎奉祠四明以散官安置于潮徳裕貶朱崖司户而卒公亦移置此地薨於紹興十七年乾道四年賜謚忠簡上曰此謚甚稱陳俊卿曰真所謂正直無邪曰簡追封豐國公贈太傳配食髙廟胡文定公武夷集十五卷右胡文定公安國之文也公之子太常丞寧輪對奏事上問乃父既解釋春秋尚當有他論著其具以進徽猷閣直學士左承議郎致仕寅遂表上之安國子康侯建之崇安人中紹聖四年進士第終于寳文閣直學士謚文定呉康肅公湖山集四十三卷别集一卷和陶詩三卷附録三卷右呉康肅公芾之文也附録則行狀神道碑及謚誥周益公為之序公字明可台之仙居人紹興二年進士中第嘗為御史厯吏户禮刑少常伯給事中以龍圖閣直學士致仕卒謚康肅自號湖山居士云忠恪章公文集二十卷右章忠恪公誼之文也公字且叟丹陽人崇寧二年進士建炎三年通判杭州苗劉之變公正色以斥時希孟二賊就擒擢倉部外郎累遷樞密都承㫖同孫近使金國歸拜刑部尚書終于端明殿學士提舉明道宫謚忠恪集乃陳季習序許右丞襄陵文集二十二卷詩二卷行狀一卷右尚書右丞許翰之文也翰字崧老拱之襄邑人登元祐進士第建炎初元自提舉鴻慶宫召拜右丞屢章丐罷除資政提舉洞霄宫紹興二年以提舉萬夀觀召懇求外祠又乞致仕道卒于吉州贈光禄大夫行狀中載其章疏為多李莊簡公文集二十卷右李莊簡公光之文也光字泰發紹興中叅知政事庚申嵗金敗盟奪河南地光在榻前攻檜之短遂罷尋謫藤州移瓊州又移萬安檜死量移郴己卯用赦放還舟行至江州而卒洪文惠盤洲集八十卷右文惠公洪适之文也公字景伯紹興十二年與文安公遵同中博學宏詞科宰臣進呈所試制詞髙宗曰父在逺子能自立可嘉宜與陞擢遂除勅令所刪定官後三年文敏公邁亦中選由是洪氏文名滿天下适以乾道元年十二月拜通奉大夫尚書右僕射兼樞密使淳熙十一年二月薨於家前自撰遺表上之神道碑謚議附於集後孫尚書大全集五十七卷右孫覿之文也覿字仲益蘭陵人大觀三年進士常以靖康間文字得罪廢徙久之終于左朝奉郎龍圖閣待制趙中書棲雲集二十五卷右中書舎人趙昶之文也昶字莊叔紹興辛未入奉大對天子親擢為第一嘗卜居溪山間榜之曰棲雲故名其集潘文夀編周麟之所撰墓誌附于後徐學士北門集十二卷右徐鳯之文也盧壯父刻于瑞陽王荆公詩註五十卷右李文懿公璧所註魏文靖公了翁序孔毅文詩戯一卷右孔平仲毅甫之詩也向子諲跋之平仲父延之字長源生文仲武仲平仲皆登制科晚又得子極頴悟多才思有故人見其三子既顯貴以書勸長源歸休長源報書云某又有一子年七嵗能作梅花詩云舊葉落未盡新花開更繁俟其及第則致仕未幾而夭黄直講泉書十卷右國子監直講黄君俞之說也觀其自序蓋仁廟時閩人也所謂六經關言二傳節適三史訓彛五經續註六代史記惜不得而見之矣蒭蕘集十卷右從政郎差充嚴州州學教授鄭範撰進凡五十篇一曰叙篇叙述其所以言之意云别集類三河東先生文集十五卷右如京使知滄州河東伯栁開字仲塗之文也讀書志云柳仲塗集一卷希弁所藏乃十五卷咸平三年張景序云緝其遺文得九十六首成十五卷命之曰河東先生集行狀附于後亦景所撰也開著書號東郊野夫又號補亡先生作二傳以見意開垂絶語景曰吾十年著一書可行于世景為名之曰黙書辭義稍隠讀者難遽曉今載文集第一卷第一篇凡六百二十三言濓溪先生大成集七卷濓溪先生大全集七卷右周元公頥字茂叔之文也濓溪在營道之西蓋營川之支流也先生既不能返其故鄉卜居廬山之下築室溪上名曰濓溪書堂以無忘父母之邦之意學者因號為濓溪先生國朝道學始于先生嘉定十二年賜謚曰元太常丞臧格取主善行徳之法也}
