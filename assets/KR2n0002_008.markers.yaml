  - {type: variant, offset: 80, length: 0, content: '', WYG: 惜名器之道合七十七門云玉堂雜記三卷右周益公必大記玉堂中事也丁朝佐謂九重之美德前輩之典刑恩數之異同典故之㳂革皆因事而見之云鑾坡錄一卷右周益公必大記初除翰林日制誥表章也刑法類養賢錄二十二卷右王日休所編也以嘉祐元豐政和紹興勅令格式嘉祐政和祿令紹興祿秩吏部七司條法紹興免役令叅攷編類其舊法不行於今者亦存之以見㳂革云日休字作德釣臺人也治縣法十卷右呂惠卿所著也曰法令曰詞訟曰刑獄曰簿厯曰催科曰給納曰災傷曰盜賊曰勸課曰教化惠卿自序於前紹聖二年九月也所在多刋此法豈非不以人廢言與常平役法一卷右紹興以來臣僚申請士民陳訴備載於中按朱文公語錄乃朝廷頒降者儀註類儀禮經傳通解續纂祭禮十四卷右朱文公編集而喪祭二禮未就屬之勉齋先生勉齋既成喪禮而祭禮未就又屬之楊信齋信齋據二先生藁本叅以舊聞定為十四卷為門八十一鄭逢辰為江西倉進其本於朝信齋福州人名復字茂才書既奏贈文林郎家禮五卷右朱文公所定而趙崇思}
