  - {type: variant, offset: 74, length: 0, content: '', WYG: 卷五上宋趙希弁撰附志經類石經周易右周易十卷經註六萬六千八百四十四字將仕郎守國子助教臣楊鈞朝議郎守國子毛詩博士柱國臣孫逢吉書石經尚書右尚書十三卷經註并序八萬一千九百四十四字將仕郎試秘書省校書郎臣周德貞書鐫王冊官陳德超鐫石經毛詩右毛詩二十卷經註一十四萬六千七百四十字將仕郎試秘書省校書郎張紹文書石經周禮右周禮十二卷經註一十六萬三千一百單三字將仕郎試秘書省校書郎孫明吉書石經儀禮右儀禮十七卷經註一十六萬五百七十三字將仕郎試秘書省校書郎張紹文書石經禮記右禮記二十卷經註十九萬六千七百五十一字卷首題曰御刪定禮記月令第一集賢院學士尚書左僕射兼右相吏部尚書修國史上柱國晉國公臣林甫奉勅註曲禮為第二葢唐明皇刪定之本也將仕郎試秘書省校書郎張紹文書石經春秋右春秋經傳集解二十卷經註并序三十四萬五千一百四十四字不題所書人姓氏石經公羊右公羊十二卷經註一十三萬一千五百一十四字不題所書人姓氏石經穀梁右穀梁十二卷經註八萬一千六百二十字不題所書人姓氏石經論語右論語十卷經註并序三萬五千三百六十八字將仕郎前守簡州平泉縣令兼殿中侍御史賜緋魚袋張德釗書潁川郡陳德謙鐫字石經孝經右孝經一卷經註并序四千九百八十五字不題所書人姓氏但題潁川郡陳德謙鐫字石經孟子右孟子十四卷不題經註字數若干亦不題所書人姓氏石經爾雅右爾雅三卷將仕郎前守簡州平泉縣令賜緋魚袋張德釗書武令昇鐫不題經註字數若干以上石室十三經葢孟昶時所鐫故周易後書廣政十四年歲次辛亥五月二十日唯三傳至皇祐初方畢故公羊傳後書大宋皇祐元年歲次己丑九月辛卯朔十五日乙巳工畢又書將仕郎試國子四門助教州學講説何維翰將仕郎試秘書省校書郎州學説書黄東儒林郎試秘書省校書郎守華陽縣尉州學勾當王尚喆朝奉郎秘書省著作佐郎簽署節度判官㕔公事武騎尉管勾州學華叅奉直郎尚書屯田員外郎通判軍州兼管内橋道勸農事及提舉渠堰騎都尉借緋提舉州學解程朝奉郎尚書屯田員外郎通判軍州兼管内勸農事及提舉渠堰輕車都尉借緋提舉州學聶世卿提㸃益州路諸州軍州獄兼本路勸農提舉渠堰公事朝奉郎尚書比部員外郎䕶軍借紫孫長卿益州路諸州水陸計度轉運使兼本路勸農使朝奉郎尚書刑部員外郎直史館上騎都尉賜緋魚袋借紫曹頴叔樞密直學士朝散大夫右諫議大夫知益州軍州事兼管内橋道勸農使充益利路屯駐駐泊本城兵馬鈐轄提舉益利路諸州軍兵甲巡檢賊盜公事上騎都尉京兆郡開國侯食邑一千户賜紫金魚袋田況春秋穀梁傳註疏二十卷右唐國子四門助教楊士勛撰昭德先生讀書志中有諸經註疏獨無穀梁註疏云經解類經説三十卷右晦菴先生朱文公熹仲晦之説也易説啟蒙三卷大易問答兩卷尚書問答三卷毛詩問答一卷禮記問答一卷中庸問答二卷大學問答二卷周禮春秋問答一卷論語問答并拾遺八卷孟子問答并拾遺并孝經刋誤四卷附太極解義太極問答西銘解義問答三卷通為三十卷邵武黄大昌鄱陽王迂編次凡六經之要㫖論孟之奥義悉可以類而求之延平廖德明為之序大易粹言七十卷總論三卷右集明道先生程顥伯淳伊川先生程頥正叔横渠先生張載子厚廣平游酢定夫龜山楊時中立兼山郭忠孝立之白雲郭雍子和之説也舒守曾穜序紫巖易傳十卷右紫巖居士魏國張忠獻公浚德逺所著也誠齋易傳二十卷右誠齋先生楊文節公萬里廷秀所著自為之序周易本義十卷右晦菴先生朱文公熹仲晦所定也發例筮儀附周易繫辭精義二卷右東萊先生吕成公祖謙伯㳟所集也周易玩辭十六卷右平菴項安世平父所述也自叙於前其為説曰君子居則觀其象而玩其辭動則觀其變而玩其占讀易之法盡於此矣程子平生所著獨易傳為全書今以其所得於易傳者述為此書而其文無與易傳合者合則無用述此書矣其子寅孫刋於建安書院樂章識於後周易總義二十卷易學舉隅四卷右山齊易祓彦章所著也陳章李􅌫為之序易學舉隅亦祓所著傳疑之説附於後二五君臣論一卷右胡寅明仲閭丘昕逢辰二侍郎之論也六十四卦各為之説南軒先生張宣公栻為之序卦圖系述五卷右卦圗三卷皇極經世篇系述二卷康節邵先生之説而先生之子伯温所學也簡池趙震敘而列之皇極經世指要二卷右蔡元定季通所序也以伏羲卦圖列之於前而以皇極經世疏之於後季通建陽人朱文公之益友始辭聘命終預黨名嘉定更化贈以初品蓍卦辨疑三卷右上卷康節先生揲蓍法横渠先生大衍説伊川先生揲蓍法兼山郭先生蓍數説下卷則辨證也兼山之子雍為之序謝艮齋識其後云卦氣圖一卷右祝融樂洪德秀所著也河南郭雍為之序德秀嘗從文定胡公父子游取飲水曲肱之義名所居之堂故號曲肱先生云象爻説二卷右武林吴凖齋如愚所著也一則明象二則明爻喬文惠公行簡嘗薦之曰成忠郎吴如愚隨身右列尋即隠居雖在都城而杜門不出臣欲識之而不可得其人行醇而介氣直而温講道窮經賸有著述欲乞特與換授從事郎併與秘閣校勘有㫖從之而如愚不受書説六卷右東萊先生吕成公祖謙之説也自洛誥至秦誓凡一十七篇或謂先生之説始於秦誓上至洛誥而止云書説精義三卷右西山先生真文忠公德秀之説也書集傳六卷右晦菴先生朱文公訂正而武夷蔡沈集傳也沈自序于前其子奉議郎秘書省著作佐郎兼權右侍郎官兼樞密院編修官兼諸王宫大小學教授杭進於朝沈字仲黙號九峰先生真西山撰其墓表今附於後詩集傳二十卷右晦菴先生朱文公所定也江西漕趙崇憲刻于計臺而識其後周禮説三卷右朝奉郎秘書少監陳傅良所進也舊刋于止齋文集中曹叔逺别為一書而刻之且為之説周禮攷疑七卷右祝融居士樂思忠仲恕所著也永嘉戴溪肖望豐城劉德秀仲洪為之序周禮總義三十卷右山齋易祓所著也許儀為之序刻于衡陽禮記要義二卷右荆國文公王安石介甫所著也中庸章句一卷或問二卷中庸輯畧二卷大學章句一卷或問二卷右晦菴先生既定著章句于經文之下又述平時問答所疑以為或問中庸又述輯畧兩卷葢集伊洛諸儒之説也希弁所藏各兩本嶽麓書院精舍及白鹿洞書院所刋者春秋集解三十卷右東萊先生所著也長沙陳邕和父為之序春秋左氏後傳十二卷春秋左氏章指十七卷右止齋陳傅良所著也四明樓忠簡公鑰序其前清海崔清獻公與之識其後而刻於維揚郡序春秋左氏國紀二十卷右清江徐得之所編也自周而下各繫以國又因事而為之論斷止齋陳傅良序之春秋左氏博議二十五卷右東萊先生所著也自為之序春秋分記九十卷右克齋程公説伯剛所編也其弟公許守宜春刻於郡齋游丞相似為之序左氏連璧八卷右三山葉儀鳳子儀撰乃對}
