  - {type: variant, offset: 177, length: 0, content: '', WYG: 右徽宗皇帝之御製也嘗倣唐制命大臣分章句書寫刻石又詔史記老子傳陞於列傳之首自為一帙前漢古今人表列於上聖今觀此解所謂道者人之所共由德者人之所自得道者亘萬世而無弊德者充一性而常存老子當周之末道降而德衰故著書九九篇}
