  - {type: variant, offset: 81, length: 1, content: 置, WYG: 之萍鄉者潘時舉李道傳黄榦廖德明陳光祖序跋附焉家禮附註五卷右陳雷刻於温州學宮者凡九十九條呂氏鄉約一卷右二書呂和叔季明所定也朱文公記於後司馬公居家雜儀一卷右温國文正公光所著也天文卜算類躔度分野列宿圖三卷右自河圖洛書以及列宿圖其象於上而列漢晉隋志之説於下律呂本原一卷右蔡元定季通所著也曰黄鐘曰黄鐘之實曰黄鐘生十二律曰十二律之實曰變律曰律生五聲圖曰變聲曰八十四聲圖曰六十調圖曰候氣曰審度曰嘉量曰謹權衡凡十三篇云五行類拜命厯一卷右趙景先集其自序曰此書常式陰陽家莫能曉今則不敢傳諸該博愚嘗得自名流用之皆騐故集成此以示子孫自非洞於此道他人幸勿妄傳也趙師俠誌於後地理類長安志二十卷右龍圖閣直學士右諫議大夫修國史常山宋敏求所撰也熙寧九年二月五日太常博士充集賢校理崇文院檢討同知宗正丞事趙彦若序敏求亦嘗為河南志時以朝奉郎守太常丞充集賢校理編修唐書官通判西京留守司兼畿内勸農事飛騎尉署銜元豐六年二月戊辰端明殿學士兼翰林院侍讀學士司馬光序讀書志中有河南志而無長安志云職方乘三卷後集十四卷豫章右洪芻所編也曰郡縣曰城宇曰山曰水曰觀寺曰祠廟曰冢墓曰寶瑞曰妖異曰牧守曰仙真曰人物凡十二部芻字駒父自少以詩名取重於時登進士第為晉州學官山谷素稱其才嘗曰甥之文學他日當大成但願極加意於忠信孝友之地甘受和白和采不但用文章照映今古乃所望也又嘗作釋權以遺山谷山谷答曰筆力縱横極見日新之功芻之名因是益顯靖康之初為尚書郎三遷至諫議大夫遭變坐事貶文登有老圃集行於世續之者淳熙中帥程叔達也李大異序於後建康志十卷續志十卷右御史正志所修而為之序乾道五年三月也慶元六年八月帥吳琚續之又為之序長沙志五十二卷右紹興辛亥帥趙善俊修而為之序宜春志十卷集八卷續修志四卷集六卷右嘉定中守滕强恕修郡人張嗣古序續志集則嘉熙初守郭正已也桂海虞衡志三卷右范文穆公成大帥靜江日志其風物土宜也自為之序靜江志十二卷右嘉泰癸亥帥蔡戡修以髙宗皇帝除太傅靜江奉寧軍節度使桂州牧兼鄭州牧制詞冠於篇端永寧編十五卷右嘉定中守留元剛序陳謙所述也敘州敘縣敘山敘川敘賦敘役敘兵敘人敘産敘祠敘遺凡十一類桃花源集一卷右紹聖丙子四明姚孳序淳熙庚子邑宰趙彦琇俾新澧陽簿張櫟重修備載晉唐本朝諸公詩文海南集二十三卷後集十二卷右海外瓊管之集也於中可見丁晉公蘓長公趙豐公折仲古李泰發胡邦衡諸公之文臨江集三十四卷右嘉定中守楊恕編郡人劉昌詩序景陵志十四卷右嘉定庚辰郡文學林英發修詩文集錄附焉唐陸鴻漸皮日休陸龜蒙皇朝朱昻宋祁晏殊吳育楊徽之蘇紳石延年王禹偁張耒諸公之作為多邵陽志一卷右淳熙壬寅郡文學李韋之序陵水志三卷右慶元丙辰郡文學劉奕修詩文附臨賀志三卷集二卷右莫詳誰所修也集以蘇東坡答彭賀州啟為冠淥江志十二卷右嘉定中邑令張耕修龍江志十卷右嘉定庚午邑丞紹古修令沈燮序鈐岡志三卷右嘉定甲戌邑令謝好古修瑞陽志十卷縣志三卷右嘉定六年郡守周綸修郡人雷孝友序梅川志三卷右寶慶丙戌重修清江張洽序秋浦新志十六卷右端平丙申江東倉使兼知池州王伯大修自為序富川志三卷右嘉定甲申守李壽朋修寧越志三卷右慶元改元郡守林會修南嶽總勝集三卷右紀載南嶽之勝槩也水簾詩集三卷右編集水簾洞之詩文也浯溪集前後續别四集右自元結中興頌之後凡刻之浯水之崖者皆在焉卷雪樓集二卷右集富池昭勇廟記序詩文也廟乃三國甘寧累封昭毅武惠遺愛靈顯王靈應後集十二卷右集梓潼廟誥勅記敘詩文也范鎮張浚胡世將王剛中王之望􅄯公武諸公祝文為多亦有唐僖宗之祝文富文忠八國語錄一卷右富弼慶厯二年以右正言知制誥為回謝􅆻丹國信使西上閣門使符惟忠副之惟忠行至武强病卒以知貝州供備庫使恩州團練使張茂實代之所説機宜事件具載錄中弼所爭者獻納二字朝廷竟從晏殊議用納字弼不預也章忠恪奉使金國語錄一卷右紹興三年章誼以龍圖閣學士樞密都承㫖充軍前奉表通問使給事中孫近副之誼錄其報聘之語也誼字且叟攬轡錄二卷右范成大乾道六年以資政殿大學士左中大夫醴泉觀使兼侍讀丹陽郡開國公食邑三千户食實封八百户與崇信軍節度使領閣門事兼客省四方館事}
