  - {type: variant, offset: 85, length: 1, content: 齋, WYG: 開國侯食邑一千六百户食實封四百户康湑為奉使大金國信使副其往返地理日記也成大字至能吳縣人紹興二十四年進士使金歸除中書舍人淳熙五年叅知政事自號石湖孝宗皇帝御書二字以賜之禹貢疆理廣記六卷右長沙易祓編而為之説方輿勝覽四十三卷後集七卷續集二十卷右建安祝穆和父編新安呂千伯可序仰山孚惠廟實錄二十八卷太平興國禪寺附錄六卷右嘉定庚午潘侃重編郡守鄭昉誌於後希弁自庚午以後續錄之為五卷夢華錄一卷右夢想東都之錄也宋敏求京城記載坊門公府宫寺第宅為甚詳而}
