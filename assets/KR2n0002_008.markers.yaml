  - {type: variant, offset: 0, length: 0, content: '', WYG: 總集類李善注文選六十卷右梁}
  - {type: variant, offset: 1, length: 1, content: 德, WYG: 明太子蕭統纂前有序具述其所作之意蓋選漢迄梁諸家所著賦詩騷七詔䇿令教冊秀才文表上書啟彈事牋記書移檄難對問議論序頌贊符命史論連珠銘箴誄哀䇿碑誌行狀弔祭文類輯之為三十卷竇常謂統著文選以何遜在世不録其文蓋其人既往而後其文尅定然所録皆前人作也唐李善集注析為六十卷善髙宗時為𢎞文學士博學經史百家無不備覽而無文時人謂之書簏初為輯注博引經史釋事而忘其義書成上進問其子邕邕無言善曰非耶爾當正之於是邕更加以義釋解精於五臣今釋事加義者兩存焉蘇子瞻嘗讀善注而嘉之故近世復行五臣注文選三十卷右唐吕延祚集注延祚以李善上引經史不釋述作意義集吕延濟劉良張詵吕珦李周翰五人注延祚不與焉復為三十卷開元六年延祚上之名曰五臣注唐文粹一百卷右皇朝姚鉉寶臣編鉉廬州人太平興國初進士文辭敏麗善書札藏書至多頗有異本累遷兩浙漕課吏寫書采唐世文章分門編類初為五十卷後復増廣之為薛映掎其事奪官斥連州卒後其子以其書上獻詔藏内府命以一官古樂府十卷并樂府古題要解兩卷右唐吳兢纂雜采漢魏以來古樂府詞凡十卷又於傳記及諸家文集中采樂府所起本義以釋解古題云玉臺新詠十卷右陳徐陵纂唐李康成云昔陵在梁世父子俱事東朝特見優遇時承平好文雅尚宫體故采西漢以來詞人所著樂府艶詩以備諷覽且為之序玊臺後集十卷右唐李康成采梁蕭子範迄唐張赴二百九人所著樂府歌詩六百七十首以續陵序編謂名登前集者今並不録唯庾信徐陵仕周陳既為異代理不可遺云續古今詩苑英華集十卷右唐僧惠淨撰輯梁武帝大同年中會三教編至唐劉孝孫成臯望河之作凡一百五十四人歌詩五百四十八篇孝孫為之序珠英學士集五卷右唐武后朝詔武三思等修三教珠英一千三百卷預修書者凡四十七人崔融編集其所賦詩各題爵里以官班為次融為之序麗則集五卷右唐李氏撰不著名集文選以後至唐開元詞人詩凡三百二十首分門編類貞元中鄭餘慶為序中興閒氣集三卷右唐髙仲武輯至徳迄大厯中錢起以下二十六人詩自為序以天寶之亂述作中廢至徳中興風雅復振故以名仍品藻衆作著之於前云或又題孟彦深纂南薰集三卷右唐竇常撰集韓翃至皎然三十人約三百六十篇凡三卷其序云欲勒上中下則近於褒貶題一二三則有有等衰故以西掖南宫外臺為目人各系名系贊本事詩一卷右唐孟棨撰纂厯代詞人緣情感事之詩敘其本事凡七類續本事詩二卷右偽吳處常子撰未詳其人自有序云比覽孟初中本事詩輒搜篋中所有依前題七章類而編之然皆唐人詩也斷金集一卷右唐令狐楚韓琪與李逢吉酬唱詩什開成初裴夷直序之漢上題襟集十卷右唐段成式輯其與温庭筠余知古酬和詩筆牋題松陵集十卷右唐皮日休與陸龜䝉酬唱詩凡六百五十八首龜䝉編次之日休為之序松陵者平江地名也西崑酬唱集二卷右皇朝楊億劉筠李宗諤}
