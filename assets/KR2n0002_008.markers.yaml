  - {type: variant, offset: 230, length: 1, content: 增, WYG: 得以覽觀焉葢今日之所講求雖不敢不極其至而後來之弊終有不能逆計者存諸家之規畫所以備後日之叅攷也太師史公浩尚書韓公某丞相趙公汝愚舉子條約附焉其説葢欲捄愚俗殺子之禍云雜説類世説新語三卷右宋臨川王義慶撰梁劉孝標注讀書志引唐藝文志及崇文總目有十卷八卷之疑又云一本極詳一本殊畧未知孰為正希弁所藏本有紹興八年董弅題其後曰右世説三十六篇世所傳釐為十卷或作四十五篇而末卷但重出前九卷中所載余家舊本葢得之王原叔家後得晏元獻公手自校本盡去重複其注亦小加剪截最為善本云宋景文雞跖集二十卷右宋景文公祁所集也讀書志云雞跖集十卷未詳撰人希弁所藏二十卷題曰宋景文雞跖集有建炎九年黄邦俊序孔氏談苑五卷右孔平仲毅父記錄之文也毅父清江人文仲武仲之弟有續世説行於世孔氏雜説一卷右孔平仲毅父之記錄也圖志謂之珩璜論公是先生弟子記一卷右劉敞原父之説也謝艮齋得之於劉司業焞以遺清江守江溥刻之趙不黯以閣下本校正而識其後云如叔貢問尚書記人之功下闕五段梓慶削本為鐻至不敢以爵賞攖其慮下缺七段文勢差錯至不可讀其他以二段為一一段為二者皆正之東萊呂紫微雜説一卷師友雜志一卷詩話一卷右呂本中字居仁之説也鄭寅刻之廬陵春明退朝錄五卷右宋常山公敏求所錄也讀書志云春明退朝錄三卷希弁所藏一本三卷又一本五卷凡多七十有八條云侯鯖錄八卷右聊復翁趙令時德麟之説也取王氏五侯鯖之義而名之避暑錄十五卷右葉夢得少藴之説也少藴蘇州吳縣人紹聖四年進士建炎初為翰林學士拜户書遷尚書左丞終於崇信軍節度使自號石林云能改齋漫錄二十卷右吳曽虎臣所纂也曰事始曰辨誤曰事實曰㳂襲曰地理曰議論曰記詩曰紀事曰記文曰類對曰方物曰樂府曰神仙詭怪曰詼諧戲謔一一載之曾臨川人嘗主奉常簿入玉牒為檢討官能改齋乃其自謂云終於吏部郎揮麈錄後錄第三錄揮麈餘話二十三卷右王明清仲言之説也明清汝陰人載朝廷典故賢哲言行為多辨志錄一卷右呂東萊祖謙伯㳟所著也四明樓鑰序之管見錄二十卷右吳莘商卿之説也論經史并厯為詳商卿建寧人嘗為國子博士序則倪思典刑錄二十卷右吳宏子大所錄也杜東子野為之序葢分門編次先正諸公之言行也項氏家説十卷附錄四卷右項安世平父之説也説經史文學為甚詳平父江陵人自號平庵辛克承刻于江陵郡齋而為之識容齋隨筆十六卷續筆十六卷三筆十六卷四筆十六卷五筆十卷右洪文敏公邁字景盧所著也何異序之麈史三卷右王得臣字彦輔所記也其自序云自朝廷至州里有可稱可法可鑒可戒者類以相從云得臣自號鳳臺子却掃篇三卷右雎陽徐度所著也度字中立丞相處仁之子嘗為吏部侍郎示兒編前後集二十四卷右孫奕季昭所編也蘇大章諸人題於後兵家類八陣圖風后握機文馬隆八陣贊獨孤及八陣記四卷右蔡元定季通所編次也車穽或問一卷右知興國軍胡逸駕所述也自序於前附車戰利害奏劄於後類書類文章緣起一卷右梁太常卿任昉彦升所集也自秦漢以來聖君賢士所為文章名之所始備見於中古今注三卷右晉太傅丞崔豹正熊所註也一輿服二都邑三音樂四鳥獸五蟲魚六草木七雜註八問答釋義尊號錄一卷右宋元憲公庠所編也自漢至於仁宗有序有評有贊龍圖閣學士提舉寳籙宮宋康年進十七史類七十七卷右三山鄭某所編也自周而下每一事相類則編而次之西漢總類二十六卷右沈長卿文伯所編也隨事立門隨門類事他傳所載總而歸一雖注中有所取者亦皆掇拾而裒集之長卿霅川人也乾道改元信州教官吳瓊景玉序唐鱠五十卷右張文忠公九成所著也公嘗謂紀志出於歐陽公列傳出於宋公天文律厯五行志則劉義叟為之方鎮百官表則梅堯臣為之禮儀兵制初出於王景彞未竟而卒每患首尾不相貫屬遂總其條綱稽其同異類聚而區别之事物紀原十卷右髙承編自天地生植與夫禮樂刑政經籍器用下至博奕嬉戲之微蟲魚飛走之類無不攷其所自來承開封人雙溪項彬序補註事類賦三十卷右吴淑所進也始淑進一字賦百首為二十卷奉㫖令其注釋遂廣為三十卷云淑勃海人事文類聚六十卷右祝穆和父編門分臚列各以羣書要語冠其首次之以古今事實又次之以詩文全篇凡天文地理人事服食器具草木蟲魚靡不備載呂午伯可為之序秘府書林二十二卷右張文伯正夫所編曰天文曰律厯曰五行曰地理曰食貨曰選舉曰百官曰禮樂曰輿服曰祭祀曰藝文曰兵刑凡十二類攷訂歴代及本朝史志為甚詳國朝會要一百五十卷右國朝會要起建隆止慶厯凡八十五年章得象所進者總類國朝會要五百八十八卷右總類國朝會要由建隆而至乾道也始仁宗命章得象編起建隆止慶厯為一百五十卷神宗又命王珪續編慶厯四年以後至熙寧末凡三十四年通前為三百卷徽宗詔王覿曾肇續編元豐至元符尋又詔起治平四年止崇寧五年凡四十二年然二書皆弗克成政和末有司獨上吉禮三類總一百五十卷葢通章得象王珪所編者}
