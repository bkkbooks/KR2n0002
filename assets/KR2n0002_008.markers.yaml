  - {type: variant, offset: 200, length: 0, content: '', WYG: 云鬻子六篇今此本乃十四篇未詳孰是然篇或錯亂又多遺闕行珪之説已然矣唐藝文志列於老子之前葢謂其}
  - {type: variant, offset: 201, length: 0, content: '', WYG: 文王師也列子九卷右列子一書漢唐及本朝藝文志皆謂八卷政和中宜春彭俞為積石軍倅聞髙麗國列子十卷得其第九篇曰元瑞於青唐卜者神宗皇帝嘗惡後漢范􅁮姓名欲更修之求東觀記久之不得繼而髙麗以其本來上裕陵厭代遂不及進元和中髙麗使人言狀訪於書省無知者醫官已死於其家得之信乎髙麗之多異書也孔叢子}
  - {type: page-break, offset: 201, content: '', id: KR2n0002_WYG_005-46a, image: WYG0674/WYG0674-0324a.png}
  - {type: variant, offset: 203, length: 0, content: '', WYG: 右孔子八世孫鮒集先君仲尼子思子上子髙子順之言及已之行事凡二十一篇為六卷名之曰孔叢子葢言有善而叢聚之也孔臧又以其所為賦與書謂之連叢上下篇為一卷附之卷末其書不見於漢唐藝文志嘉祐四年提㸃廣南西路刑獄公事兼本路勸農事朝散郎守尚書屯田郎中上輕車都尉宋咸始為註釋以進慎子一卷右瀏陽人慎到之書也唐藝文志云慎子十篇慎到撰滕輔註葢法家云公孫龍子三卷右唐藝文志列於名家陳嗣古賈大𨼆皆嘗為之註}
  - {type: page-break, offset: 203, content: '', id: KR2n0002_WYG_005-46b, image: WYG0674/WYG0674-0324b.png}
  - {type: page-break, offset: 203, content: '', id: KR2n0002_WYG_005-47a, image: WYG0674/WYG0674-0324c.png}
  - {type: variant, offset: 204, length: 0, content: '', WYG: 不辨矣孔叢子第四卷有公孫龍子一卷劉子五卷右劉晝字孔昭之}
  - {type: variant, offset: 205, length: 0, content: '', WYG: 也或云劉勰所撰或曰劉歆}
