  - {type: variant, offset: 236, length: 0, content: '', WYG: 序金陵吏餘四卷右劉榘帥建康日所作詩詞也豫章雜著二卷右馬某分教隆興日所作詩文也雲壑隠居集三卷浩歌集一卷右蔡柟堅老之作也柟嘗為宜春别駕云閑止堂集一卷右沈弇徳逺之作也趙蕃為之序弇之子兢莊可亦以詩名自號菊山此集乃莊可之手寫碧崖詩集五卷右閤皂山羽士甘夢叔叔懐之詩也叔懐嘗登晦菴誠齋之門楊長孺為之序東山詩文選十卷右葛紹體元承之作也家大酉應㒡為之序葉夢鼎跋其後行狀墓誌附焉煮瀑菴詩一卷右莆陽方左鉞武成之詩也劉克莊所作墓誌附葛無懐詩一卷右㑹稽葛天民無懐之詩也語録類河南程氏遺書二十五卷附録一卷外書十二卷右李籲吕大臨謝良佐游酢蘇昞諸人記二先生語十卷劉絢錄明道語四卷劉元承楊遵道周孚張繹唐棣鮑若雨鄒柄暢大隠諸人録伊川語十三卷附録則明道行狀劉立之朱光庭邢恕范祖禹叙述游酢書行狀後吕大臨哀詞明道墓表伊川年譜張繹祭文胡安國奏狀外書則拾遺也朱光庭録二卷陳淵本程氏學馮氏本羅氏本胡氏本游氏本春秋録大全集時氏本傳聞雜記各一卷朱文公記其後横渠先生語録三卷右張獻公載字子厚之語也公秦人舉嘉祐二年進士厯崇文檢書同知太常禮院議禮不合復以病請歸卒門人謚為明誠中子吕大臨為謚議有正䝉理窟二書行于世嘉定中有旨賜謚禮官議謚曰逹或者不以為然改議曰誠或者又以謚法至誠感神為疑乆之乃謚曰獻淳祐初從祀于學封郿伯云横渠先生經學理窟一卷右張獻公載之說也讀書志云理窟二卷右題金華先生未詳何人為程張之學者希弁所藏横渠先生經學理窟一卷其目有所謂周禮詩書宗法禮樂氣質義理學大原自道祭祀月令統䘮紀凡十二云元城先生語録三卷譚録一卷道䕶録兩卷右劉忠定公安世字器之之語也維揚馬永卿大年為之序器之大名人中熙寧六年進士第哲宗朝厯正言左史司諫右諫議中書舎人貶黜乆之至除名勒停送峽州編管起提舉鴻慶復直龍圖閣以卒昔有與蘇子瞻論元祐人才者至公則曰器之真鐵漢不可及也龜山先生語録四卷右楊文靖公時字中立之語也公閩人與游定夫謝顯道俱從游于明道先生之門嘗以著庭兼邇英殿說書遷祭酒擢右諫議除徽猷閣直學士工部侍郎兼侍講紹興五年卒初入見之際首言自古聖賢之君未有不以講學為先務者上深然之上蔡先生語録三卷右門人記録謝先生良佐字顯道之語也延平先生問答一卷右延平先生李侗愿中之語而晦菴先生所録也晦菴先生語録四十三卷右廖徳明輔廣余大雅陳文蔚李閎祖李方子葉賀孫潘時舉董銖竇從周金去偽李季扎萬人傑楊道夫徐寓林恪石洪慶徐容甘節黄義剛㬊淵龔蓋卿廖謙孫自修潘履孫湯泳林夔孫陳埴錢木之曽祖道沈僴郭友仁李儒用三十三人記録晦菴先生之語也李文惠公道𫝊持江東庾節刻于池陽黄幹書于目録之後晦菴先生語續録四十六卷右黄幹何鎬程端䝉周謨潘柄魏椿呉必大黄􅓌楊若海楊驤陳淳童伯羽鄭可學滕璘王立行游敬仲黄升卿周明作蔡㦛楊與立鄭南升歐陽謙之游倪楊至潘植王過董拱夀林學䝉林賜李儒用胡泳吕燾黄義剛吕夀昌楊長儒呉琮等四十一家記録晦庵先生語也内五家莫詳姓氏後一卷則前録廖徳明潘時舉董銖萬人傑徐寓林恪所遺也李性傳叙而刻之鄱陽朱子語畧二十卷右楊與立編次晦庵先生之語蕭一致刻于道州師誨三卷附録一卷右呉必大記録晦庵先生之語朱鑑刻于興國近思録十四卷右晦庵先生東萊先生集周張二程之說也續近思録十四卷右寳慶丁亥蔡模纂晦庵先生之語以續之五峰先生知言一卷右胡子宏字仁仲之說也門人張栻序之曰先生優游南山之下餘二十年玩心神明不舎晝夜力行所知親切至到析太極精微之藴窮皇王制作之端此書乃平日之所自著其言約其義精晚嵗嘗被召旨不幸寢疾不克造朝而卒云近世朝廷嘗索其書而賜之謚無垢先生心傳録十二卷右張文忠公九成字子韶之說也甥于恕編公以紹興三年狀元及第厯禮部侍郎兼侍講謫居南安十四年于不停披嵗久庭蹟依然公題于柱曰予平生嗜書老來目病執書就明於此者十四年矣倚立積乆雙趺隠然可一笑也因自號横浦居士寳慶初贈太師追封崇國公謚文忠云横浦日新二卷右門人郎􅁮記録無垢先生之說也南軒先生問答四卷右張宣公栻敬夫答門人之所問也敬夫魏國忠獻公之嗣子也忠獻都督諸軍事奏以公書冩機宜文字以軍事入見天子異其言詔以為直秘閣劉珙薦公學行志業遂與郡召為吏部員外郎兼侍講除左司知靜江治狀上聞特轉承事郎除修撰為湖北運副知江陵而卒且死猶手草遺表冩畢而絶學者稱為南軒先生嘉定八年賜謚張子太極解義一卷右張宣公解周元公太極之義二十先生西銘解義一卷右明道伊川吕大防微仲吕大臨與叔楊時中立游酢定夫尹焞彥明劉安節元承鮑若雨商霖李朴先之張九成子韶胡銓邦衡許景衡少伊郭雍子和謝諤昌國劉清之子澄張維祝禹圭錢聞詩子言張栻敬夫解横渠先生西銘之義也無極太極辨一卷右朱文公陸梭山象山往復論難之書也復禮齋語録一卷右楚澤李蓍之說也亦名桂林語録總括夫子言仁圖一卷右李蓍所著也羣經新說十二卷論五經疑難新說三卷右荆國文公王安石之說也傳道精語三十卷後集二十六卷右李方子編濂溪康節横渠明道伊川晦庵南軒東萊之說類而集之勉齋先生講義一卷右黄文肅公榦所講孟子義二十篇也總集類古文苑九卷右古文苑世傳孫巨源于佛寺經龕中得唐人所藏文章一編莫知誰氏録也皆史傳所不載文選所未取而間見于諸集及樂府好事者因以古文苑目之自石鼓文而下曰賦曰詩曰歌曰曲曰敕曰書曰對曰頌曰箴曰銘曰贊曰記曰碑曰雜文皆周秦漢人之作也容齋隨筆嘗引之然訛舛謬缺不敢是正淳熙中韓元吉之記己言之文苑英華一千卷右翰林學士中書舍人宋白等奉敕集始太宗皇帝既得諸國圖籍聚名士於朝詔修三大書其一曰文苑英華蓋以諸家文集其數實繁雖各擅所長亦榛蕪相間乃命白等精加銓擇以類編次為一千卷時太平興國七年九月也雍熙三年十二月壬寅上之賦五十卷詩一百八十卷歌行二十卷雜文二十九卷中書制誥四十卷翰林制誥五十三卷䇿問四卷䇿二十六卷判五十卷表七十四卷牋一卷狀十七卷檄二卷露布二卷彈文一卷移文一卷啟十六卷書二十七卷疏五卷序四十卷論二十二卷議十卷連珠喻對一卷頌八卷讚五卷銘六卷箴一卷傳五卷記三十八卷謚哀册五卷謚議二卷誄二卷碑九十一卷誌三十五卷墓表一卷行狀十卷祭文二十三卷通一千卷嘉泰改元周益公刻而記于前樂府集十卷樂府序解一卷樂府雜録一卷羯鼓録一卷右劉次莊所序也古樂府之所起二十二横吹曲二十四日月雲霞十九時序十一山水二十三佛道十二古人十七童謠三古婦人二十三美女十六酒六音樂十一遊樂十三離怨二十八雜歌行五十七都邑四十六宫殿樓臺十六征}
