  - {type: indent, offset: 27, content: 　　　　　, id: KR2n0002_krp_008-bkkind4}
  - {type: variant, offset: 27, length: 2, content: 異同, WYG: 地因采諸家之集始自東漢終于南唐凡得歌詩賦贊五百餘篇雲臺編六卷右皇朝耿思柔纂華州雲臺觀古今君臣所題詩什清才集十卷右皇朝劉禹卿編輯古今題劍門詩什銘賦蒲逢為之序瑤池新集一卷右唐蔡省風集唐世能詩婦人李秀蘭至程長文二十三人詩什一百十五首各為小序冠于其前且總為序其畧云世叔之婦修史屬文皇甫之妻抱忠善𨽻蘇氏雅於回紋蘭英擅於宫掖晉紀道藴之辨漢尚文姬之辭况今文明之盛乎九僧詩集一卷右皇朝僧希畫保暹文兆行肇簡長惟鳯惠業牢昭懷古也陳充為序凡一百十篇歐公曰進士許洞因會九僧分題出一紙約曰不得犯一字其字乃山水風雲竹石花草雪霜星日禽鳥之類於是諸僧皆閣筆此本出李夷中家其詩可稱者}
  - {type: page-break, offset: 27, content: '', id: KR2n0002_WYG_004-117a, image: WYG0674/WYG0674-0299c.png}
  - {type: page-break, offset: 27, content: '', id: KR2n0002_WYG_004-117b, image: WYG0674/WYG0674-0299d.png}
  - {type: variant, offset: 30, length: 3, content: 詳又作, WYG: 多惜乎歐公不盡見之許洞之約雖足以困諸僧然論詩者政不當爾葢詩多識鳥獸草木之名而楚辭亦寓意於颷風雲霓如池塘生春草窓間列逺岫天際識歸舟雲中辨江樹蟬噪林逾静鳥鳴山更幽庭草無人隨意綠宫漏出花遲楓落吳江冷空梁落燕泥㣲雲淡河漢疎雨滴梧桐殘星㡬㸃鴈横塞長笛一聲人倚樓雞聲茅店月人跡板橋霜之類莫不犯之若使諸公與許洞分題亦須閣筆矧其下者哉聖宋文粹三十卷右不題撰人輯慶厯間羣公詩文劉牧王通之徒皆在其選宋文海一百二十卷右皇朝江畋編輯本朝諸公所著賦詩表啟書論說述議記序𫝊文贊頌銘碑制詔疏詞誌挽祭禱文凡三十八門雖頗該博而去取無法皇宋詩選五十七卷右皇朝曾慥魯公裔孫守贑州帥荆渚日選本朝自冦萊公已次至僧璉二百餘家詩序云博采旁搜拔尤取頴悉表而出焉政和文選二十卷右政和中或編元豐以後人詩文千餘篇徐禧席旦其知名者也西漢文類右唐柳宗直撰其兄宗元嘗為之序至皇朝其書亡陶氏者重編纂成之郡齋}
