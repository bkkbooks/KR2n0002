  - {type: variant, offset: 215, length: 11, content: 七然家陋而未見冝尚多焉, WYG: 經中所載農圃之事參以田牛蠶桑等為此編以補史記之闕謝艮齋諤為之序社倉本末一卷右真文忠公帥潭日所編也其自序云剟其大要使}
