  - {type: variant, offset: 152, length: 13, content: 君錫継從郡貟外司馬帑轄蔡㢘, WYG: 又以先生行狀補其闕三蘇先生年譜一卷右左朝請大夫權發遣成都府路提㸃刑獄公事何棆編山谷先生年譜一卷右先生諸孫􅓌所編也悉譜先生所為詩文於逐年之左極為詳備云朱文公年譜三卷右先生門人李方子所編也盧壯}
