  - {type: variant, offset: 235, length: 0, content: '', WYG: 初元詔從祀于學封舂陵伯始道守蕭一致刻先生遺文并附録七卷名曰大成集進士易統又刻于萍鄉名曰大全集然兩本俱有差誤今併參校而藏之明道先生文集四卷遺文九篇右程純公顥字伯淳之文也太師潞國公文彦博題其墓曰大宋明道先生程君伯淳之墓弟頥序其所以而刻之嘉定十二年謚曰純公取法所謂中正粹精也淳祐初詔從祀于學封河南伯此集并伊川集刻于長沙者南軒先生識其後曰右遺文九篇新安朱熹得之玉山汪應辰者敬授教授何藴俾嗣刻之河内先生文集六卷右太常博士尹源字子漸之文也源與弟洙俱以儒學知名趙元昊冦邊圍定川堡大將葛懐敏發涇原兵救之源與懐敏書曰賊舉其國而來其利不在城堡而兵法有不得而救者且吾軍畏怯見敵必赴而不計利害此其所以數敗也宜駐兵尾亭見利而後動懐敏不能用今此書不見于集中河南先生文集十五卷右起居舎人尹洙師魯之文也讀書志云尹師魯集二十卷希弁所藏二十七卷洙傳中所載亦同希弁嘗考邵氏聞見録云錢惟演守西都起雙桂樓建臨園驛命永叔師魯作記永叔文先成凡千餘言師魯曰某止用五百字可記文成永叔服其簡古永叔自此始為古文然二記皆不載于集中彭城先生文集六十卷右中書舍人劉攽字貢父之文也攽與兄敞同學自刻厲博讀羣書遂偕中第或曰原父將死戒子弟無得遽出其集曰後百餘年世好定當有知我者故貢父次其集藏之不肯出私謚曰公是先生貢父平生亦好諧謔與荆公素厚坐是亦相失及死子弟亦次其文私謚曰公非先生然今謂原父之文為公是集貢父止曰彭城集云東坡先生别集三十二卷續别集八卷右東坡先生别集續别集乃蘇公嶠刋置建安而刪畧者淳祐甲辰廬陵郡庠刻豫章先生别集二十卷黄文纂異一卷右豫章先生别集乃前集外集之未載者淳熈壬寅先生諸孫􅓌所編也后山先生文集五十五卷右陳師道無已之文也讀書志云二十卷希弁所藏乃紹興二年謝克家所叙者或謂二十卷者乃魏衍所編而讀書志不載清真先生文集二十四卷右周邦彦字美成之文也神宗時嘗奏汴都賦七千言上命近臣讀于邇英閣由諸生為學官哲宗寘之文館徽宗列之郎曹嘗守四明故樓忠簡公鑰序而刻之玉池先生文集十二卷右鄧忠臣字謹思之文也即覆議范忠宣公謚者以此入黨籍欽宗踐阼贈直秘閣初寮先生前集四十卷後集十卷右王安中字履道之文也讀書志止載初寮集十卷希弁所藏乃周益文忠公必大序前集中興以前後集中興以後文也内外制二十六卷則李文敏公邴序西塘先生文集二十卷右鄭俠字介甫之文也熙寧中監安上門時久不雨公以本門所見飢民及新法之不便者為圖狀發馬遞經銀臺投進且曰如行臣之言十日不雨乞斬臣宣徳門外神宗觀圖長嘘命馮京等體量新法而寢罷之大開倉庾以賑飢民下責躬詔三日大雨荆公率百僚入賀上出奏疏并圖以示之附麗新法者爭言公詆毁良法直奏驚御遂得罪云中興初贈朝奉郎官其孫一人元澤先生文集三十六卷右王雱字元澤之文也雱未冠著書已數千百言舉進士為旌徳尉作䇿三十餘篇極論天下事又作老子訓傳及佛書義解亦數萬言有以雱書聞者召見除太子中允崇政殿說書被㫖撰詩書義擢天章閣待制書成遷龍圖閣直學士雱不拜而卒雱論議刻深常稱商君以為豪傑之士言不誅異議者法不行嘗勸安石誅不用命大臣政和中封臨川伯從祀于學靖康初罷之集乃崇寧中盧崇編忠惠先生文集三十卷右翟汝文公㢲之文也公㢲丹陽人年十四登進士第徽宗朝為左史給事中吏部侍郎欽宗朝召直翰苑紹興中叅知政事終于資政殿學士提舉洞霄宫私謚忠惠文乃其子耆年編次附忠惠先生家傳于後梁谿先生文集一百七十卷右李忠定公綱之文也公字伯紀邵武人寓于常州無錫梁谿因以為號政和初年進士乙科宣和初為起居舎人以大水章疏罷黜靖康初為右丞親征行營使俄知樞密院河東北宣撫使罷知揚州提舉洞霄宫責授昭化節度副使建昌軍安置髙宗即位召拜右僕射凡七十五日而罷後贈少師謚忠定奏議中欽宗批答為多集有陳俊卿序朱文公後序浮溪先生文集六十卷猥槀外集一卷龍溪先生文集六十卷右汪藻字彥章之文也讀書志止載汪彥章集十卷希弁所藏浮溪龍溪兩本卷帙皆六十卷藻徳興人崇寧二年進士建炎中為中書舎人權直院紹興中為兵侍改翰林出知湖州改撫州提舉太平宫黜居于永累赦不宥凡八年而卒藻工於儷語所為制詞人多𫝊誦集乃孫覿序北海先生文集六十卷右綦崈禮字叔厚之文也叔厚髙密人登政和上舍進士第仕髙宗為翰林學士終寳文閣學士髙密郡侯贈朝議大夫楊萬里樓鑰為文集序行狀墓誌附于後致堂先生斐然集三十卷右禮部侍郎胡寅字明仲之文也章頴為序然與髙閌書責其請幸太學報秦檜書所謂願公修政任賢勿替初志尊王攘狄以開後功之說皆不載焉玉山先生表奏六卷右汪應辰聖錫之文也本名洋紹興五年進士第二黄中以有官遂升洋為第一洋乞避逺祖嫌名髙宗以其與王拱辰皆年十八遂賜今名五峰先生文集五卷右胡宏字仁仲之文門人張栻所序也南軒先生文集四十四卷右張宣公栻字敬夫之文也朱文公校定而為之序然紫巖棊圖跋語之類皆不載于集中晦菴先生文集一百卷續集一十卷右朱文公之文嘉熙己亥王埜刻于建安黄壯猷嗣成之識于後續集則王遂刋而序之然南康黄西坡諸處所刻墨帖之類或不在焉然則遺逸尚多有之象山先生文集二十八卷外集四卷右陸文安公九淵字子靜之文也嘗作書院於象山之上以待講學之士因以自號集有袁爕楊簡序嘉定十三年賜謚行狀謚議附復齋先生文集六卷右陸文安公之兄九齡字子夀之文也東萊吕太史所作墓誌附水心先生文集二十八卷右葉適字正則之文也門人趙汝鐺序而刻之水心其自號云篔牕先生初集三十卷續集三十八卷右陳耆卿字夀老之文也夀老台之臨海人初集葉水心為之序呉子良併刻于江西漕司于中沂邸牋表為多頥堂先生文集五十九卷碧雞漫志一卷長短句一卷祭文一卷右王灼晦叔之文也灼遂寧人嘗佐總幕故趙公為之序漫志可以見樂府之源委鶴山先生文集十三卷後集十卷續集十三卷别集十一卷右魏文靖公了翁字華父謫靖州日所作故名渠陽集云鴈湖先生詩集四十卷右李文懿公璧字季章之詩也璧文簡公燾之子嘗為叅知政事神道碑附于集後真文忠公徳秀所作也滄洲先生塵缶編三十五卷内外制二十四卷右程先生公許之文也先生字季與眉桂枝人嘉定辛未進士嘗以禮部侍郎兼侍講聖上親御翰墨以桂枝永芳世家及南山滄洲字賜之臞軒王邁為之序其集希弁生父郴倅墓銘先生筆也總龜先生松菊集五卷右阮閱之詩也建炎初以中奉大夫知袁州三山張先生質言四卷右張淵叔潜撰叔潜三山人嘗為左宣教郎樞宻院編修云石室先生百論十卷右陸子才所進也君論三十篇政事論二十篇臣論三十篇攻守論二十篇各有其目云别集類四莆陽居士蔡公文集三十卷右蔡忠惠公襄字君謨之文也讀書志止載蔡君謨集十七卷希弁所藏三十卷乃公之曾孫刑部郎洗所刋者陳叅政騤序得得居士乗桴集三卷戇草二卷右任忠敏公伯雨字徳翁之文也公眉山人元豐五年進士為左正言僅半嵗而上一百八疏以黨事編管通州遷儋耳移道州復官提點明道宫卒紹興中累贈右諫議謚忠敏集首刻朱震所作行狀藏六居士安樂集十二卷右安定郡王令畤之文也王字徳麟東坡先生為字說又嘗薦之乞召致館閣以風厲天下紹興初同知大宗正襲封安定薨之日嗣濮王仲湜言其貧無以殮乃命户部賜銀絹百匹兩贈開府儀同三司王薦宗室槀中所謂和衎自將居貧不撓則有右從政郎子孟者希弁曾大父清愿先生字醇父也家藏王之墨跡為多近時諸賢皆跋之退齋居士文集二十八卷右起居舎人侯延慶字季長之文也季長衡山人政和六年進士嘗侍講筵髙宗取杜詩直臣寧戮辱賢路不﨑嶇之句書扇以賜之兄彭老所為誌銘附集後介菴趙居士文集十卷右趙彦端字徳莊之文也徳莊寓居南昌登紹興八年進士第出更麾節入踐臺省凡奏對獻䇿陳述利害如蠲丁錢講治體禦敵守邊之謀用兵行賞之規議論醇正卓然皆有可用之實淳熙十四年江西運副趙彦操刻之于湖居士文集四十卷右張孝祥字安國之文也安國厯陽人紹興甲戌大魁多士明年入館浸登清華至中書舎人出典藩郡孝宗皇帝嘗有用不盡之歎安國筆法妙天下希弁伯祖伯崇得其詩曰趙侯富貴種而有巖壑姿同姓古所敦早晚蹋天墀又云徳髙欲余作字醉中不能謹也安國書徳髙乃伯祖字也介庵張居士文集七卷右張耕字莘翁之文也莘翁嘉泰壬戌進士終于清江别駕希弁妻之諸父也故生父師同為之序繼而程公許亦序之行狀則今應大叅㒡之筆雪齋居士文集二十卷右導江王咨字夢得之文也門人計運孫援李漢裒昌黎文章故事為序咨嘗知劍州其訓詞有曰早登儒科文采著見久更民事為朕所知云李泰伯退居類槀十二卷皇祐續槀八卷當語三卷周禮致太平論十卷後集六卷右李覯泰伯之文也覯旴江人嘗試制科六論不得其一曰吾書未嘗不讀必孟子註疏也擲而出人為檢視之果然遂下第而歸後以海門簿召赴太學說書以卒嘗自類其所為文曰天將夀我與所為固未足也不然斯亦足以藉手見古人矣其詳見于國朝儒學傳希弁嘗得修梓山寺殿記云應茂材異等科李覯撰然不載于槀中續元豐類槀四十卷右南豐先生遺文也建昌郡丞陳東叔魯刋而叙之掖垣類槀七卷玉堂類槀二十卷右周益文忠公必大之文也公自為之序性善堂槀十五卷右度正周卿之文也曹文簡公彦約為之序周卿巴川人紹熙元年進士嘗為禮部侍郎志隠類槀二十卷右許開仲啟之文也信安陳晅為之序開嘗為中奉大夫提舉武夷冲祐觀清江二王帖開為守時所刻東溪詩槀六卷右許玠介之之詩也周益公嘗親寫其漢宫春夜朱陵洞詞古離别出塞曲四篇而跋之友林詩槀二卷右史彌寧安卿之詩也集有黄景說曽丰序安卿嘉定中以國子舎生之望涖春坊事帶閣門宣贊舎人知邵陽雙峰猥槀八卷右舒邦佐平叔之文也開禧丙寅劉徳秀為之序平叔豫章雙谿人也湘中類槀三卷右楊叔虎文若之詩也環澗王容為之序文若長安人為武成宫諸生第一嘗任隂平太守得罪謫長沙云捄楮奏槀一卷右唐璘伯玉之奏疏也刻于江東漕司籌思堂孚齋文録十卷右張翃仲龍之文也李良為之序翃三山人嘗以隆興倅攝袁州腴齋詞草三卷右段允廸之作也允廸濟陽人乃武人之能文者陳朴厚黄}
