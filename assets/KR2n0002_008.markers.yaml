  - {type: variant, offset: 237, length: 0, content: '', WYG: 弋獵十七夷狄六蟲魚鳥獸三十三草木花果二十五次莊元祐間人也樂府雜録一卷朝議大夫守國子司業上柱國賜紫金魚袋段安節撰羯鼓録一卷婺州刺史南卓撰乃唐人也讀書志載古樂府於别集類而載段卓二録於樂類希弁所藏本乃刋三書為一集云國朝二百家名臣文粹三百卷右論著二十二門策四門書十門碑記十二門序六門雜文八門總目六分門六十二所謂二百家者趙普柳開張齊賢田錫冦凖張詠王禹偁孫何楊億劉筠陳堯咨錢惟演种放王曽夏竦晏殊穆修范仲淹孫堪宋庠宋祁余靖尹洙韓琦包拯文彥博孫甫孫抃蔡襄田况石介歐陽修元絳富弼張方平趙抃蘇舜欽祖無擇司馬光范鎮鮮于侁邵泌吕誨邵亢李覯王珪王安石韓維陳襄孫復王令崔公度劉敞王逢强至章望之劉恕周敦頥錢公輔文同孫覺鄧潤甫孫洙鄭獬楊繪劉攽蒲宗孟李清臣梅堯臣蘇洵吕惠卿曽鞏王無咎蔣之竒蘇軾蘇轍程顥王韶張載王回邵雍王鞏顔復胡宗愈劉摯章惇楊傑李常王覯孔文仲孔武仲范祖禹袁默吕陶鄧綰孫覽吕大臨張舜民張商英許安世鄭俠王雱黄庭堅曽肇顧臨史均陸佃龔原王巖叟劉涇劉安世張耒呉拭王安國徐禧楊時呉儔陳瓘晁補之劉弇楊天惠黄裳張剛鄒浩馮澥任伯雨周邦彥程頥秦觀李廌陳師道何去非王庠李之儀蘇過謝逸馬存鄭少微崔鶠馬涓李新王當侯溥唐庚晁詠之翟汝文范致明王雲宇文粹中王賞彭俊民汪藻汪伯彥黄定梅執禮蘇元老劉觀喻汝礪陳恬余安行唐重孫覿李若水王騰陳公輔韓駒林敏功何㮚李良臣洪皓胡宏范宗尹計有功劉一止熊彥詩楊椿馮時行張九成趙雍何熙志程敦厚張行成邵博黄成孫王之望李燾晁公遡劉望之宋逺孫洪邁郭雍張栻趙逵李石張震張孝祥楊萬里王十朋趙雄皇朝名臣經濟奏議一百五十卷右淳熙中趙忠定帥蜀時所進也一君道二帝繫三天道四百官五儒學六禮樂七賞刑八財賦九兵政十方域十一邊防十二總議自建隆迄靖康推尋嵗月槩見本末忠定自序於前紹熙之末忠定有定䇿功為侂胄誣貶久而論定賜謚追王配食寧廟游佀誌其神道之碑御篆額曰宗老元勛云宗藩文類六十卷右魏邸鑰天銓次也三祖而下各以昭穆編叙之凡朝廷之所褒嘉者為詔為制二十五卷凡名公鉅卿相與贊述者為表奏為記序為賦頌為詩歌與夫碑銘祭文等作三十五卷魏了翁為之序端平己亥鑰天自蜀來訪扣未盡之書希弁嘗以一二補其闕渠深惜太祖𣲖下文字獨少既而欲以燕王秦王初除防禦使制達之而未能云古文正宗前集二十二卷後集十二卷右集諸儒評論先秦兩漢三國二晉六朝唐及我宋諸公之文也諸儒鳴道集七十二卷右集濓溪洓水横渠二程上蔡元城龜山横浦諸公議論著述也于中有江民表心性說一卷安正忘筌集十卷崇安聖傳論二卷宋賢體要集十三卷右集曾鞏歐陽修王安石王令王安國呉子經周亶父王雱陳之方蘇軾蘇轍孫洙杜植曾宰鄭獬范鎮唐介姚闢所作也戛玉前集四十九卷後集五十卷右紹興壬戌楊存亮元明編近世諸公舉業雜文類而次之中興六臣進䇿十二卷右紹興五年前宰執吕頥浩李綱汪伯彦李邴張守王絢韓肖胄答詔旨所問戰守方畧之策也中興羣公吟槀四十八卷右中興以來一百五十三人之詩也四靈詩四卷右趙師秀字靈秀翁卷字靈舒徐璣字靈囦徐照字靈暉四人之詩也法帖類御製太清樓閱書歌一卷右真宗皇帝御製賜張耆以下徽宗皇帝髙宗皇帝跋其後御製唐十八學士圖贊一卷右欽宗皇帝御書賜張叔夜御書真草孝經一卷右髙宗皇帝御書賜尚書右僕射兼樞密使秦檜時紹興九年六月辛酉檜請刻之石上曰十八章世人以為童蒙之書不知聖人精微之學不出乎此朕宫中無事因學草聖遂以賜卿豈足傳後檜請再三乃從之十四年七月從左宣教郎守殿中侍御史汪勃所請詔令諸州刋石賜見任官并係學籍諸生云御臨法帖十卷右髙宗皇帝臨晉唐諸人之帖也秦檜跋御製聖安夀仁太上皇帝聖政序一卷右寧宗皇帝御製光宗皇帝聖政序也謝深甫跋其下淳熙秘閣續法帖十卷右淳熙十二年三月十九日奉聖旨摸勒鍾繇諸人帖羣玉堂帖十卷右嘉定元年四月二十四日省劄下秘書收省藏蓋韓平原家本也故卷尾有印曰閱古審定法書之印永興軍節度使印篇首則三朝宸翰有璽文曰呉娃之章呉氏書印呉娃翰墨寳章妙墨宜爾子孫世世寳之康夀珍坃皆憲聖慈烈皇后之記也二王帖三卷右清江所刻羲之獻之帖也二像冠于篇端引周子中之言曰心慕二王之人品則瞻之在前手追二王之墨妙則忽然在後目録註釋具於卷末篆書千文一卷右徐鉉篆周興嗣之音也希弁嘗考徽宗皇帝實録政和三年四月辛卯詔避廟諱改曰嚴與敬為曰嚴與謹勞謙謹勅為勞謙兢勅籍甚無竟為籍甚無罄璇璣懸斡為璇璣遷幹云星鳯樓帖右曹文簡公彦約家所刻也甲秀堂帖右廬山陳氏所刻也鳯墅帖二十卷畫帖二卷續帖四卷右廬陵曽宏父刻國朝聖賢帖也東坡先生帖三十卷右玉山汪應辰聖錫所刻也山谷先生帖五卷右張孝祥跋山谷之姪虨所藏卷後引徽宗皇帝評公之書謂如抱道足學之士坐髙車駟馬之上横斜髙下無不如意云張忠文奏議一卷右張忠文公叔夜圍城中奏議也李綱李彌遜趙子淔胡世將沈調諸公跋其後趙延康帖右髙宗皇帝賜趙子崧書一幅後用御名圖書其次則子崧與張邦昌一書與王時雍諸人一書親茟也張魏公帖一卷右張忠獻公帖篇端紫巖碁圖乃忠獻及陳逍遥二老畫像南軒先生跋其下張宣公帖四卷右南軒先生帖遺表終焉表云再世䝉恩一心報國大命至此厥路無由猶有微誠不能自己伏願陛下親君子逺}
