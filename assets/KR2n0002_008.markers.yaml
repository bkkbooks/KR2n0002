  - {type: variant, offset: 241, length: 1, content: 番, WYG: 休杜荀鶴張籍任藩劉商楊發處黙戎昱于良史王灣林寛劉禹錫王貞白七十六人之作二妙集一卷右汴人趙師秀選賈島姚合詩也宣和御製詩一卷右徽宗皇帝賜張忠文公叔夜之詩也凡二十有八篇云巴東集一卷右萊國忠愍公冦凖之詩也讀書志云冦忠愍詩三卷希弁所藏巴東集乃公自編而為之序凡一百五十有六篇秋風亭記附按公本傳云巴東有秋風亭公析韋應物一言為二句云野水無人渡孤舟盡日横識者知其必大用凡五年不得代邑庭有二栢民以比甘棠集後有范忠文諸公題秋風亭詩然東坡亦有詩曰萊公昔未遇寂寞在巴東聞道山中樹獨餘手種松惜不之載焉晦翁先生朱文公語後録二十卷右東}
