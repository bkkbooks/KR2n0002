  - {type: variant, offset: 75, length: 0, content: '', WYG: 之書也三傳分門事類十二卷右莫詳誰氏所編以類相從而分其門也論語筆解十卷右唐昌黎先生韓文公之説也其間翺曰者李習之也始愈筆大義以示翺翺從而交相明辨非獨文公制此書也韓文補云公作論語傳未成而沒見於張藉祭詩辨之於洪慶善者明矣今世所傳如宰予晝寢以晝作畫子}
  - {type: page-break, offset: 75, content: '', id: KR2n0002_WYG_005-12a, image: WYG0674/WYG0674-0307a.png}
  - {type: variant, offset: 76, length: 1, content: 篋, WYG: 齊聞韶三月不知肉味以三月作音浴乎沂以浴作㳂子在回何敢死以死作先之類雖未必然而為伊川之學者皆取之此本乃秘書丞許勃所序者論語直解十卷右漢上先生朱文定公震所著也紹興五年夏肇建資善堂時孝廟富於春秋文定以起居郎與宗正卿范公冲同為翊善朝論皆以為極天下之選此解資善堂錄本也其孫繼先刻於瀏陽學舍而識其後孟子解兩卷右和靜先生尹侍講焞所著也先生乃伊川之髙弟欽宗累聘不起賜號和靜紹興初再以崇政殿説書召既侍講筵首解論語以進繼解孟子甫及終篇而卒此本乃邢正夫刻於岳陽泮宫者論語解二十卷孟子解三十六卷右無垢先生張文忠公九成子韶所著也論語精義十卷孟子精義十四卷右明道伊川横渠三先生成都范氏滎陽呂氏藍田呂氏上蔡謝氏建安游氏延平楊氏河東侯氏河南尹氏十一人之説晦菴先生所編集也初曰精義後改集義卷末淳熙辛丑冬至前五日㸃畢十一字乃先君子戒菴居士師冋手澤也論語集註十卷孟子集註十四卷右朱文公所著也先生之於語孟始集程張呂范十一人之説以為集義既又本之註疏叅之釋文採之儒先斷之詳説以為集註語孟之精微葢萃於此書矣希弁所藏各兩本嶽麓白鹿洞所刋也論語説三卷孟子説七卷右南軒先生張宣公栻敬夫所著也論語註義問答通釋一十卷右勉齋黄先生幹通釋晦菴先生集註或問之書也孝經義一卷右荆國文公王安石所著也凡十七章喪親章闕之孝經刋誤一卷右朱文公所定也皆以古文為正惟傳之六章或從今文廬山胡冰叙於後小學類弟子職一卷右弟子職一書雜見於管子之篇朱文公掲其入學受業事師之法以為章句參以衆説輔其註文云叙古千文一卷右致堂先生胡寅明仲所作也南康黄西坡灝商伯為之傳晦菴朱文公題其後曰叙事立言昭陳法式實有春秋經世之志至於發明道統開示德門又於卒章深致意焉新學小童朝夕誦之而諷其義亦足以養正於蒙矣續千文一卷右佐朝散大夫知池州軍州事賜紫金魚袋侍其瑗字良器所著也昔周興嗣次王逸少所書千字為韻語以便觀省後世謂之千文良器遷避興嗣所用字别製干言以續之山谷嘗抵以書曰引辭連類使不相觝觸甚有功當與凡將急就並行也葛文康公勝仲為之序百體書千文一卷右艮齋謝公諤題其後曰神剜天畫千類萬狀豈止汲冡魯璧周鼓秦山耶敘古䝉求一卷右五峰先生胡宏所著也自羲農至於五代周凡三十章毛以謨為之序先生之子大壯書而刻之通鑑韻語九卷右黄日新齊賢所著也大畧如李瀚䝉求四言體而列其事於左方周平園朱晦翁洪容齋謝艮齋楊誠齋樓攻愧諸老先生皆為之序齊賢臨川人字義三卷右北溪陳淳安卿所著也安卿臨潼人史韻四十九卷右回谿錢諷正初所編也依唐韻分四聲而以十士史之句註於下諷錢塘人鄭僑錢文子為之序篆韻五卷右徐鉉序葢其弟鍇所集也鉉字鼎臣仕南唐為昭文館學士入朝為太子率更令太平興國初詔以本官直學士院鍇字楚金仕南唐為右内史舍人卒李煜贈之禮部侍郎云𨽻韻七卷右洪文惠公适𨽻釋序冠於前周益公誌其神道碑云耽嗜𨽻古為纂釋二十七卷𨽻續二十一卷十二先生詩宗集韻二十卷右裴良甫師聖編杜甫李白髙適韓愈柳宗元孟郊歐陽修曾鞏蘇軾王安石黄庭堅陳無已之詩韻也史類補史記一百三十卷右唐司馬貞補司馬遷之書也補三皇紀於五帝之前每篇各註索隠之説以百三十篇贊附於每篇之末希弁嘗考諸家之説為讀史補註一書頗加詳焉古史六十卷右蘇文定公轍所作也自伏羲神農訖秦始皇帝為七本紀十六世家三十七列傳以補司馬遷之缺云西漢刋誤一卷東漢刋誤一卷右宣德郎守太常博士充國子監直講劉攽所撰也仁宗讀後漢書見墾田字皆作懇字使侍}
