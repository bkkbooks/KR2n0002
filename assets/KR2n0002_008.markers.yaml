  - {type: variant, offset: 238, length: 0, content: '', WYG: 人信任防一已之徧好惡公天下之理永清四海克鞏丕圖臣死之日猶生之年臣栻朱文公帖六卷右南康黄西坡所藏先生之帖而郡守錢明徳并項平菴跋語刻之于中可以補晦翁大全集之闕者為多張紫微帖一卷右厯陽張孝祥帖尋陽陶思贊所刻歐陽公集古録跋尾六卷拾遺一卷右周益公跋方崧卿所刋雖非石刻亦真蹟也故附於法帖之後拾遺春秋集善十一卷右胡忠簡公銓為敷文閣直學士提舉江州太平興國宫日被旨投進之書也其說多引易以證之張忠獻公浚為之序論語集程氏說二卷孟子集程氏說一卷右左宣教郎建寧府教授湯烈編集程氏二先生論孟說也二先生議論答問散在諸集學者未能徧觀烈取遺書語録與夫門人編纂之言條而類之于逐章之下續又得論語說一百二十有九孟子說六十有八附于卷末曰拾遺云論語意原十卷右東谷鄭汝諧所著也然所原三仁等說晦庵先生多不然之晦庵謂論語只言微子去之初無面縳啣璧之說今乃捨孔子而從左氏史遷已自難信义不得已而曲為之說以為微子之去乃去紂而適其封國則尤為無㨿矣疑孟一卷右温國司馬文正公光所著也公疑孟子之書有非軻之言者故為疑孟十有一篇建安余允文乃為尊孟辨於温公之疑逐段為之辨晦庵先生又於允疑之後逐段為之說云孝經解一卷右張文忠公九成所解也孝經說一卷右蒙齋先生袁公甫親筆也甫字廣微潔齋先生之子也大學衍義四十三卷右真文忠公徳秀為户部尚書日所進也因大學條目而附之以經史首之以帝王為治之序次之以帝王為學之本是之謂綱首之以明道術辨人才審治體察民情次之以崇敬畏戒逸欲又次之以謹言動正威儀又次之以重妃匹嚴内治定國本教戚屬是之謂目每條之中首之以聖賢之典訓次之以古今之事迹諸儒之釋經論史有發明者録之而公之說亦附見焉小學之書四卷右朱文公先生所編也有内篇有外篇其宏綱有三曰立教曰明倫曰敬身明倫則有父子君臣夫婦長幼朋友之品敬身則有心術威儀衣服飲食之目又採摭古今經傳書史之所紀載曰稽古曰嘉言曰善行以廣其教而實其事小學之工程大學之門户也越絶書十}
