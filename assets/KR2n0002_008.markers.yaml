  - {type: substitution, offset: 2, original: 晁, replacement: 朝, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19766}}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 某錢惟演及當時同館十五人唱和詩凡二百四十七章前有億序唐宋類詩二十卷右唐朝僧仁贊序稱羅唐兩士所編而不載其名分類編次唐及本朝祥符已前名人詩唐百家詩選二十卷右皇朝宋敏求次道編次道為三司判官嘗取其家所藏唐人一百八家詩選擇其佳者凡一千二百四十六首為一編王介甫觀之因再有所去取且題云欲觀唐詩者觀此足矣世遂以為介甫所纂寶刻叢章三十卷右皇朝宋敏求次道編次道聚天下古人詩歌石刻凡一千一百三十篇多有别集中所逸者以其相附近者相從又次以嵗月先後王益柔為之序云文章難能者莫如詩凡刻之金石者則必其自以為得或作於人所愛重者故多有清新瓌麗之語覽者其深究焉嵗時雜詠二十卷右皇朝宋綬編宣獻}
  - {type: page-break, offset: 3, content: '', id: KR2n0002_WYG_004-115b, image: WYG0674/WYG0674-0298d.png}
