  - {type: variant, offset: 87, length: 0, content: '', WYG: 及巷陌店肆節物時好孟元老記錄舊所經歴而為此書坦菴趙師俠識其後金國承安須知一卷右金國名諱及增修朝官職事俸給格式服制地理圖之類也承安葢金主之璟之紀元也時}
  - {type: variant, offset: 88, length: 0, content: '', WYG: 丁巳乃寧宗皇帝慶元三年云傳記錄古列女傳八卷右漢都水}
