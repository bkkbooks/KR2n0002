  - {type: variant, offset: 240, length: 0, content: '', WYG: 卷外傳記吳地第三卷吳内傳第四卷計倪内經第五卷請糴内傳第六卷外傳策考第七卷外傳記范伯内傳陳成􅀈第八卷外傳記地𫝊第九卷外傳計倪第十卷外傳記吳王占夢第十一卷外傳記寶劍第十二卷内經九術外傳記軍氣第十三卷外傳枕中第十四卷外傳春申君徳序外傳第十五卷篇叙外傳此十五卷也然第一卷有所謂越絶外傳本事一篇此其為十六卷歟蔡邕獨斷二卷右漢左中郎將陳留蔡邕撰雜記自古國家及漢朝故事王莽無髮蓋見於此資治通鑑釋文二十八卷右奉議郎行秘書省著作佐郎兼侍講賜緋魚袋司馬康所集也康字公體温公之子也内傳國語十卷右劉攽戇父所作也以其異於外傳國語故曰内傳云其兄敞原父題辭神宗聖訓二十卷右試太學録林虙所集也虙乃希之妷以所聞神宗聖訓記録分一百門擬續五朝寳訓崇寧中上於朝云韓忠獻王遺事一卷右羣牧判官朝奉郎尚書職方員外郎上騎都尉强至編次韓魏王琦言行也始韓忠彦編次家傳王巖叟編次别録至又編次其遺事云厯代氏族言行類槀六十卷右武夷章定以厯代迄本朝名賢言行之迹類姓成編凡一千一百八十九姓云古今年號録五卷右紹熙中臨安府免解進士侯望所進也其說謂自漢建元至今一千三百三十五年正偽年號總八百三十八為字二百三十五有重用三用至九用者列子釋文二卷右唐當塗縣丞殷敬順撰說𤣥一卷右温國司馬文正公光所著也天象賦一卷右題後漢尚書張衡撰蜀丞相諸葛亮注然注中引用晉事決非亮也希弁嘗以秘書省闕書目考之天象賦一卷張衡撰李淳風注疑此為是𤣥綱三卷神仙可學論一卷形神可固論一卷右唐中嶽嵩陽宫道士宗𤣥先生呉筠貞節所進修行之要㫖也一曰明道徳二曰辨法教三曰析疑滯𤣥宗批答云詞簡旨奥義博文精足以𢎞闡格言發明幽致國朝官制沿革一卷右黄元禮琮所編也職官記一卷右三晉張縯所編也其說謂元豐官制名實正矣惟是祖宗因官制以别流品之意當時初不講明及之故寄禄之階條理未盡若叅以舊典則得失可見遂先立元豐寄禄新格以祖宗舊官遷轉之法叅列於後云續文房四譜五卷右題柯田山樵編蓋續蘇易簡之書也秘書省闕書目云李洪編夷堅志四十八卷右洪文敏公邁記異志怪之書也其名蓋取列子所謂大禹行而見之伯益知而名之夷堅聞而志之說者謂夷堅乃古之博物者云義林十卷右起居舎人兼中書舎人兼侍講眉山程敦厚所述也凡一百一十二篇摭取千百載人物而尚論之張文忠公九成嘗謂如論姚崇不進制心之說而以十事諫王莽之文姦言起於嚴助朱買臣天誘君子以甚難王伯自用心始鄭伯上欲為舜下欲為周公文帝斗粟之譏所以致刑措景帝殺臨江王天下安之而不疑蕭何萬世之功在王漢中用韓信絳侯無出塞功衛霍有絶漠賞仲連鄒陽同傳平勃合於輿權之說皆深見眇微而發古人用心處議論卓然在人意表云常譚二卷右河南呉箕和父雜記經子史傳之事二百餘條視聴鈔三卷右國子博士呉莘商卿得之聞見示後人以勸戒凡六十四事云武昌志三十卷右郡守古括王信所修也詩文附焉萍實志十卷續志二卷右邑宰周世昌所修征官王大節所續也都梁志六卷右郡守何季羽所修也詩文附焉嶺外代答十卷右周去非直夫記廣右二十五郡疆場之事經國之具荒忽誕漫之俗瑰詭譎怪之産耳目所治與得諸學士大夫之緒談者四百條云秘書省闕書目四卷右秘書省見闕書之目也楚辭故訓傳六卷楚辭草木疏一卷楚辭補音一卷右建寧倅谷水林至所著也李大異為之序河海英靈集二卷右唐丹陽進士殷璠集常建李白王維劉謹虚張渭王季友陶翰李頎髙適岑參崔顥薛㨿綦母潜孟浩然崔國輔儲光羲王昌齡賀蘭進明崔曙王灣祖詠盧象李嶷閻防二十四人之詩璠謂諸人皆河海英靈也故以名集凡二百四十三首云唐賢絶句一卷右莆田柯夢得所選李白杜甫元結王維韋應物賀知章岑參靈徹張繼郎士兀盧綸司空文明韓愈柳宗元張籍賈島陳羽劉禹錫元稹白居易杜牧竇庠竇鞏張祜徐凝王建于鵠朱絳許渾雍陶陳陶李播劉商羊士諤楊敬之司空圖薛能鄭谷王涯李渉楊憑崔櫓劉昭屬陸龜䝉狄歸昌章碣劉得仁許纏吉師老張顛杜荀鶴呉融韓偓韋莊五十四人之作白止四首甫六首愈八首宗元四首惟牧二十五首云衆妙集一卷右汴人趙師秀編沈佺盧象王維孟浩然錢起周賀于武陵李頻秦系劉長卿李嘉祐楊巨源劉得仁朱慶餘雍陶郎士元崔塗皇甫曾皇甫冉包佶司空曙耿緯嚴維李端韓翃戴叔倫盧綸祖詠綦母潜方干靈一無可䕶國貫休岑參張衆甫張南史周朴張蠙張祐李季蘭許渾張祜馬戴張循之張繼章八元李益張喬吕温于鵠崔顥項斯崔峒包何竇常趙嘏薛能劉威鄭谷韓偓羅隠李羣玉皮}
