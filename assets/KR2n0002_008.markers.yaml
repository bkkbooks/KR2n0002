  - {type: variant, offset: 18, length: 0, content: '', WYG: 第三閣手編古詩及魏晉迄唐人嵗時章什一千五百}
  - {type: variant, offset: 19, length: 2, content: 易詩, WYG: 六釐為十八卷今溢為二十卷矣仕塗必用集二十一卷右皇朝祝熙載編本朝楊劉以後諸公表啟為一編聖紹堯章集十卷右皇朝李文友編靖康末至紹興十年赦}
  - {type: page-break, offset: 19, content: '', id: KR2n0002_WYG_004-116b, image: WYG0674/WYG0674-0299b.png}
  - {type: variant, offset: 22, length: 0, content: '', WYG: 詔㫖丹陽類稿十卷右皇朝曾􅌈編丹陽今潤州}
  - {type: variant, offset: 24, length: 2, content: 解考, WYG: 曰朱方秦曰丹徒孫權改名京口東晉僑立州郡至宋齊陳曰東海獨梁曰蘭陵而皆以徐州稱之隋始定令名唐以建康諸邑𨽻焉更為丹陽郡元豐中􅌈守官于}
  - {type: 'kr:newline', offset: 27, content: '

      ', id: KR2n0002_krp_008-bkkkrnewl4}
