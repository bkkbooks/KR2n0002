  - {type: variant, offset: 243, length: 1, content: 黎, WYG: 王佖記楊方黄榦劉炎黄灝邵浩劉砥李煇黄卓汪徳輔陳芝呉振呉雉林子䝉林學履劉礪鍾震蕭佐舒髙魏椿楊至所録也其說謂池録初成勉齋猶未免有遺恨於刋行之後况饒本又出於其後乎此二十卷皆池饒所未及刋者稽其所自證其所得嘗屢反復焉無一語或敢不謹也又謂晦翁始與南軒講于嶽麓後與東萊及象山講于鵝湖此皆先賢講論大端深恨從游者莫能録其所聞以示後世云晦庵先生朱文公語續録後集二十五卷右楊方黄榦包揚劉炎劉子寰邵浩劉砥劉礪李煇陳芝黄灝黄卓汪徳輔呉振呉雉鍾震林子䝉林學履蕭佐舒髙魏椿楊至二十二人記録晦庵先生之語也蔡杭將詣江東集而刻之曲江帖五卷後帖一卷右二蘇劉元城鄒道卿黄山谷王金陵曾文清韓吕諸公之帖也花蘂夫人詩一卷右蜀孟昶愛姬也青城費氏女幼能屬文長于詩宫詞尤有思致蜀平以俘輪織室後有罪賜死此卷乃王}
