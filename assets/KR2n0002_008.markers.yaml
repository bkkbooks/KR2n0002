  - {type: variant, offset: 206, length: 3, content: 傳于世, WYG: 制或謂劉孝標之作袁孝政為序之際已不能明辨之矣唐藝文志列於雜家聱隅子二卷右閩人黄晞之書也晞好讀書聚數千卷學}
  - {type: page-break, offset: 206, content: '', id: KR2n0002_WYG_005-47b, image: WYG0674/WYG0674-0324d.png}
  - {type: variant, offset: 210, length: 0, content: '', WYG: 多從之著聱隅欷歔瑣微論石介為直講聞其名使諸生如古禮執羔鴈束帛就里中聘之以補學職晞}
  - {type: variant, offset: 211, length: 2, content: 巳十, WYG: 辭不就故歐陽文忠公哭徂徠先生詩云羔雁聘黄晞晞驚走隣家是也嘉祐中韓魏公為樞密使薦}
  - {type: variant, offset: 214, length: 0, content: '', WYG: 以為太學助教受命而卒或曰有子甚愚魯所聚及自著書多散失不存子家子一卷右眉山家頥養正之書也無卷帙篇目姑附於諸子後莊子解四卷楊子解一卷右荆國文公王安石所解也農家類農書三卷右平江陳峻景文所述唐元宗因李泌之請以二月朔為中和節令百官進農書以示務本而其書不見於史景文輯}
  - {type: page-break, offset: 214, content: '', id: KR2n0002_WYG_005-48a, image: WYG0674/WYG0674-0325a.png}
