  - {type: variant, offset: 89, length: 3, content: 晁氏平, WYG: 者光祿大夫劉向撰又一卷莫知其為誰續然亦載於崇文總目王回曾鞏皆序之百將傳十卷右東光張預公立所進也由太公而下至於五代之劉詞凡史辭泛漫而不切於兵者一刪去之或非兵畧而可以資人之智慮者間亦存焉各以孫子兵法題其後次以行事合之諸葛忠武侯傳一卷右南軒先生張宣公栻所著也四將傳四卷右建炎中興名將劉琦岳飛李顯忠魏勝之傳也史官章頴撰而上之十二朝名臣言行錄七十二卷右八朝朱文公所編也四朝乃後人所續者豐清敏遺事一卷右李朴所編豐公稷之言行也陳瓘敘次及復官賜諡制尋訪子孫劄子國史列傳附於後朱文公為後序云范太史遺事一卷右范冲所編正獻公祖禹言行也趙豐公逸事一卷右門人喻樗方疇諸人所記也季忠定公行狀三卷右公之弟綸所述也太常博士兼實錄院檢討官葉適所撰諡議附於後胡文定公行狀一卷右公之子寅寧宏所述也其孫大壯手書而傳之因附入曾𤣥諸孫名朱文公行狀一卷右門人黄幹所作也道命錄五卷右秀巖李心傳所編也自司馬公呂申公韓康公薦伊川先生劄子至於嘉定錄用伊川先生後人詔㫖中間朝臣之奏疏儒宗之諡議纖悉備載道學興廢至京師議樂歲餘為光祿寺丞國子監直講遷大理寺丞嘉祐中遷太子中允充天章閣侍講已而又以病不能朝復以太常博士致仕東歸之日太學之諸生與賢士大夫送之東門執弟子禮路人嗟歎以為榮卒年六十七世系乃淳熙中沈大臨述周元公年譜三卷右南康所刋也以元公出處譜之以年公所作詩文之類附見焉倪灼䟦横渠先生張獻公年譜一卷右先}
