  - {type: variant, offset: 239, length: 0, content: '', WYG: 卷右越復讎之書也或以為子貢所作或疑似子胥所作皆無所據故曰越絶誰所作呉越賢者所作也隋經籍志十六卷崇文總目十五卷希弁考其所以第一卷荆平王内傳第}
