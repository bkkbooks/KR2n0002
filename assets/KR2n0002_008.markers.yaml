  - {type: variant, offset: 78, length: 1, content: 鈞, WYG: 傳詔中書使刋正之攽為學官遂刋其誤為一書云西漢補遺一卷右何俌德輔補西漢之遺文也葢束晢補詩之義耳希弁嘗讀其皇太子遺四皓書及侯公説項羽辭因思昔東坡先生亦嘗為侯公説項羽辭載於集中而商芸小説載張良所與商山四皓書則世所罕見也其書曰良白仰惟先生秉超世之殊操身在六合之間志凌造化之表但自大漢受命禎靈顯集神母告符足以宅兆民之心先生當於此時耀神爽乎雲霄濯鳳翼於天漢使九門之外有非常之客北闕之下有神氣之賓而淵潛山隠竊為先生不取也良以頑薄承乏忝官所謂絶景不御而駕服駑駘方今元首欽明文思百揆之佐立則延首坐則引領日仄而方文不御夜眠而閶闔不閉葢皇極須日月以揚光后土待嶽瀆以導滯而當聖世鸞鳳林栖不翔乎太清騏驎嶽遁不步乎郊藪非所以寧八荒慰六合也不得侍省展布腹心畧寫至言想望翻然不猜其意張良白俌乾道中權工侍兼權直院西漢補註一十卷右國子博士吳莘商卿所著也倪思為之序史記法語十卷前漢法語二十卷東漢精語十六卷三國志精語六卷右鄱陽洪文敏公邁所著也東都事畧一百三十卷右承議郎知龍州王稱所進也本紀十二世家五列傳一百五附錄八間為贊論以發揚之以其國都大梁以前之事故謂之東都然其中疎駁甚多稱眉山人故禮部侍郎賞之子此書既進遂直中秘云編年類皇王大紀八十卷右五峰先生胡宏所述皇帝王伯之事始於盤古氏而終於周之末自堯以上六閼逢無紀堯之初載迄於赧王乙巳二千有三十年貫通經典採摭史傳靡所不載又因事而為之論所以述去取之原釋疑似之惑者至矣先生字仁仲文定公之季子自幼有志於道嘗見楊中立於京師又從侯師聖於荆門而卒傳文定公之學紹定戊子希弁生父師冋為衡山令嘗奉朝㫖索其書云通史緣起二十卷右會稽胡衞之作也其説謂伏羲氏神農氏軒轅氏三皇也少昊氏髙陽氏髙辛氏合唐虞氏五帝也不可不備乃推盤古以來衆説之異同雖十紀浩茫難以年考而傳疑傳信有理存焉衞嘗仕於朝云晉春秋二十卷右隋秘書省正字杜延業所述其自序云蕭方等採削羣史著三十國春秋囊括兩晉之言網羅諸國之事以晉國為主附列二十九國延業刪緝題曰晉春秋載於唐書藝文志南北征伐編年二十卷右吳曾編集自漢獻帝迄於周世宗其意謂資治通鑑征伐之事雜見於列國言動之問讀者不得專一稽攷至南北議論亦未詳盡遂效其體凡一征一伐靡所不載紹興辛巳金人涖盟廟堂知有是書嘗取以備乙覽云曾字虎臣撫之崇仁人京文忠公鏜為之序五代春秋五卷右河南先生尹洙師魯所作也由梁太祖開平元年四月甲子迄於周顯德七年正月甲辰資治通鑑綱目五十九卷序例一卷右晦菴先生朱文公所編也司馬文正既為資治通鑑又别為目錄及舉要厯胡文定復修舉要補遺朱文公因文正文定兩公四書别為義例表歲以首年而因年以著統大書以提要而分註以備言其綱倣春秋而叅取羣史之長其目效左傳而稽合諸儒之粹真德秀刻於泉南陳孔碩李方子叙其後希弁所藏蘷本為板四千二百有竒吉本二千八百而且無陳李二公之序希弁又嘗叅以泉本校其去取之不同并考温公文公之書法為資治通鑑綱目考異淳祐丙午秘省嘗下本州借本書寫云資治通鑑綱目提要五十九卷右資治通鑑綱目提要存其綱而去其目如春秋之經也希弁所藏乃趙希琹刻於廬陵者續資治通鑑長編九百四十六卷右巽巖先生李文簡公燾仁甫所修也太祖至英宗一百七十五卷神宗朝二百二十八卷哲宗朝二百二十卷徽宗朝三百二十三卷其書倣司馬氏通鑑踵為之然燾謙抑不敢名續通鑑但謂續長編蜀帥汪應辰嘗乞給筆札以寫藏秘閣乾道六年正月令秘書省依通鑑紙樣及字樣大小繕寫一部仍將燾銜位於卷首依司馬光銜位書寫進入燾之卒也上語宇文价云朕嘗許燾大書續資治通鑑長編七大字且用神宗賜司馬光故事為序冠篇不謂其止此也希弁所藏蜀本視書坊所刋者為詳希弁嘗為續資治通鑑長編補註一書以補詔勅奏篇等闕云國朝編年政要四十卷右兵部尚書太子詹事蔡文懿公幼學所編也自太祖建隆之元迄於欽宗靖康之末祖春秋之法而叅以司馬公舉要厯吕氏大事記之例宰輔拜罷表諸年首其子朝請大夫直秘閣提舉福建路常平義倉茶事籥叙而刻之皇朝編年備要二十九卷中興編年備要十卷右壺山陳均所編其書用國史實錄等書為編年體例起於建隆迄於淳熙書法葢微倣綱目之例而加斟酌焉真德秀鄭性之林岊皆為之序開基事要十卷右朝奉郎秘書少監皇子嘉王府贊讀陳傅良所進也自建隆之初迄開寶之末亦曰建隆編曹叔逺序而刻之仁宗君臣政要四十卷右文林郎守秘書丞監閬州商税院市買税鹽臣張唐英編進起天聖終嘉祐詔令刑政之要禮樂選舉之法郊廟祭祀邊鄙備禦罔不備錄其門名臣得其家世之詳者為之立傳否則闕之唐英字次功自號黄松子續紀年通譜一卷右宣議郎致仕畢仲荀續宋元憲公紀年通譜之書也元憲止於慶厯辛巳仲荀起於慶厯壬午而迄於徽宗丁未錄二百卷右左修職郎監臨安府都鹽倉李丙所編也上帙起召王安石為翰林學士迄於神宗皇帝升遐中帙起宣仁聖烈垂簾除呂公著侍讀迄於宣仁聖烈祔廟下帙起李清臣進䇿題迄於誅童貫安石之召實治平丁未之所始故以丁未名之三朝北盟集編二百五十卷集補五十卷右朝散大夫充荆湖北路安撫司參議官徐夢莘編集上帙起政和七年七月庚寅終宣和七年十二月庚申中帙起宣和七年十二月庚申終靖康二年四月丁亥下帙起建炎元年五月庚寅終紹興三十二年四月丁亥集補則補其遺也建炎以來中興繫年要錄二百卷右陵陽布衣李心傳微之所修也知瀘州許奕奏進之修國史曾㬇又嘗乞令其弟太常博士道傳繳進得㫖降付國史院然其中闕疑尚多希弁嘗為補註一書頗為詳備云寧宗皇帝紀十卷右四朝國史中之本紀也續稽古錄一卷右太社令龔頥正續司馬文正稽古錄之書也文正止於治平頥正起於熙寧而迄於寧宗之初袁説文栞於成都趙彦勵復栞於長沙未幾有毁板之㫖云通鑑問疑一卷右秘書丞髙安劉恕字道原嘗與司馬公修通鑑司馬公深愛其博學每以所疑問焉恕子羲仲纂集其往復相難者而作此書十國紀年序附於後綱目發明五十九卷右建康布衣尹起莘所著以發明綱目義例别之傑帥金陵進其書於朝魏文靖公了翁為之序綱目論斷二十卷右江珪呂中論大書以提要正變例而為之斷云其間所載徐清叟䟦有以知端平初元通鑑綱目上塵乙覽之因雜史類靖康傳信錄三卷右李忠定公綱為尚書右丞充親征行營使及以知樞密院事為河北河東路宣撫使時事也建炎進退志總序四卷右李忠定公綱為正議大夫尚書右僕射兼中書侍郎至於罷為觀文殿大學士提舉杭州洞霄宮時事也建炎時政記三卷右李忠定公綱所編也自建炎元年五月一日以後至於八月十八日紹興正論一卷右編錄秦檜當國羅織諸賢或死於市朝或死於囹圄或死於貶所或流落於魑魅之區累赦不移或棲遲於林泉之下屏跡不出者一百一十八人姓名與其獲罪之因但云瀟湘樵夫序不知其為誰也朝野遺事一卷右趙子崧伯山所著記中興以前凡一百二十有五事自號鑑堂居士終於延康殿學士右中奉大夫淳熙中周益公帥長沙命項安世丁朝佐楊長孺讐校而刻之朝野雜記甲集二十卷乙集二十卷右李心傳微之所編中興以來之事也繫年錄葢倣於此史評類讀史管見三十卷右致堂先生胡寅明仲所著也意謂二百四十二年之後至於五代司馬文正所述資治通鑑事雖備而立義少遂用春秋經㫖尚論詳評晦菴綱目中多取之猶子大壯序其説孫德輿刻於衡陽讀史明辨二十卷右伊川元城龜山了齋横渠屏山横浦五峰東萊南軒止齋致堂十二先生史論也史説十卷右東萊先生呂成公之説也史評六卷右誠齋先生楊文節公萬里之説也西漢鑑十卷右國子博士吳莘所著也王容為之序兩漢博議二十卷右陳季雅彦羣所撰也唐史論斷二卷右朝散大夫尚書刑部郎中充天章閣待制兼侍讀孫甫之翰所撰也甫陽翟人國史有傳唐論二卷右宣教郎前太平州州學教授王居中撰程公許韓祥韓補皆序之職官類漢官考四卷右徐筠孟堅所著也西京二百年品秩爵列位號名數自三公而下至於筦庫釐為十九門總一百四十九條韋楫為之序孟堅清江人淳熙甲辰進士職官分紀五十卷右孫逢吉彦同所集也以楊侃職林而廣之其載新制而又增門目之亡缺補事實之遺漏元祐中趙叡秦觀為之序職源五十卷右王益之等所編歴代置官本末也官之故實職之典掌前賢遺跡先朝訓詞以次列焉翰苑羣書二卷右唐李肇翰林志元稹承㫖學士院記韋處厚翰林學士記韋執誼翰林院故事楊鉅翰林學士院舊規皇朝禁林讌會集為一卷錢惟演金坡遺事晁逈别書金坡遺事李宗諤翰苑雜記為一卷蘇易簡續翰林志蘇耆次續翰林志學士年表翰苑題名翰苑遺事為一卷祖宗官制舊典二卷右東萊蔡元道所編也其子興宗叙於後云追記祖宗舊典凡設官任職治民理財之要與夫分别流品}
