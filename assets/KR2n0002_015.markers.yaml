  - {type: variant, offset: 17116, length: 0, content: '', WYG: 五下昭德先生郡齋讀書後志序昭德先生校井氏書為讀書志四卷番陽黎侯傳本於蜀刋之宜春郡齋且取希弁家所藏書删其重􅃨摭所未有益為五卷别以讀書附志三衢游史君蜀人也亦以蜀本鋟諸梓乃衍而為二十卷書加多焉盖先生門人姚君應績所編也按先生自序余家自文元公來以翰墨顯者七世故家多書然自中原無事時已有火厄及兵戈之後尺素不存而杜君鵬舉所序扣之古松流水之間亦止於四卷則方其得南陽藏書時固未多也其殆三榮校讀之後網羅其家散失裒彚漸夥或者先生續筆邪抑門人推廣其遺志也今考姚君所編杜序獨缺而不著而著先生自序有所謂合吾家舊藏得若干卷疑於尺素不存之語自相牴牾希弁摘取其所増入者凡四百三十五部總八千二百四十五卷往往皆晁氏之書請於郡而併刋焉然四卷既傳矣不敢以附志次其先自為讀書後志二卷然後井晁二氏藏書之富其目大備希弁家三世所藏因以託不朽云郡侯命序梗概於卷首至若二本所載井氏四卷之書其間有實同而名異此備而彼遺與夫分種入類之各不同又為考異於編末淳祐庚戌日南至江西漕貢進士秘書省校勘書籍趙希弁謹序欽定四庫全書郡齋讀書後志卷一宋趙希弁撰經類周易甘棠正義三十卷右梁任正一撰以孔頴達為本甘棠云者正一嘗為陜州司馬故名其書坤鑿度二卷右題曰包羲氏先文軒轅氏演古籀文蒼頡修按隋唐志及崇文總目皆無之至元祐田氏書目始載焉當是國朝人依託為之周易緯稽覽圖二卷周易緯是類謀一卷周易緯辨終備一卷周易緯乾元敘制記一卷周易緯坤靈圖一卷易通驗卦二卷右漢鄭𤣥注按隋志有鄭氏注易緯八卷唐志有宋均注易緯九卷李氏本注與隋志同卷數與唐志同家本葢出李氏獨不載乾鑿度二卷而有乾元敘制一卷按後漢注七緯名亦無乾元敘制周易開𤣥關一卷右唐蘇鶚撰自序云五代祖晉官至吏部侍郎學兼天人嘗製八卦論為世所傳遭亂遺墜而編簡尚有存者鶚乃畧演其㫖於此周易流演五卷右唐成𤣥英撰錯綜六十四卦演九宫以直年月日推國家之吉凶𤣥英道士也故道藏録之或云釋仁英撰未知孰是周易啟源一十卷右蔡廣成撰李邯鄲云唐人田偉置于王昭素之下今從李説有徳恒伯言徳膚徳翰四目皆作問對凡三十六篇陸秉意學十卷右皇朝陸秉撰秉字端夫舊名東寶元二年以此書奏御勅書嘉奬秉嘗通判蜀州首篇論易之名頗采參同契之説邵古周易解五卷右皇朝邵古天叟撰古雍之父也世本范陽治平初卒于洛年七十九其學先正音文云代淵易論二十卷右皇朝代淵撰國史藝文志有其目徐庸易意縕一卷右皇朝徐庸撰庸以春秋凡例易亦有之故著書九篇號意縕凡例總論其學祖劉牧陸秉云徂徠先生周易五卷右皇朝石介守道撰景迂云易古文十二篇先儒謂費直專以彖象文言參解易爻以彖象文言雜入卦中者自費氏始孔頴達云王輔嗣又分爻之象辭各附當爻則費氏初變古制時猶若今乾卦彖象繫卦之末歟古經始變于費氏卒大亂於王弼惜哉今學者曾不之知也石守道亦曰孔子作彖象於六爻之前小象係逐爻之下惟乾悉屬之於後者譲也嗚呼他人尚何責哉家本不見此文豈介後覺其誤改之歟宋咸易訓三卷右皇朝宋咸撰咸自序云予既以補註易奏御而男億請餘義凡百餘篇端因以易訓名之葢言不敢以傳世特敎其子而已頗論陸希聲劉牧鮮于侁得失云横渠易説十卷右皇朝張載子厚撰載居横渠故以名書其解甚畧繫辭差詳張弼易十卷右皇朝張弼興化軍人章惇薦于朝賜號葆光處士紹聖二年黄裳等再薦之詔以為福州司户本州敎授其易學頗宗鄭氏河圖解二卷右皇朝康平撰凡五十二篇王湜易學一卷右皇朝王湜同州人早潛心於邵康節之學其序曰康節有云理有未見不可强求使通故愚於觀物篇之所得既推其所不疑又存其所可疑亦以先生之言自慎不敢輕其去取故也兼山易解二卷右郭忠孝撰忠孝字立之河南人頗明象數自謂得李挺之卦變論于陳子惠因亟讀有得焉靖康中持憲關右死于難故其書散落大半孫莘老尚書解十三卷右皇朝孫覺莘老撰覺仕元祐至謂康王以喪服見諸侯為非禮蘇氏之説葢本于此毛詩辨疑一卷右皇朝楊時中立撰開寶通禮二百卷右皇朝劉溫叟等撰開寶中詔溫叟同李昉盧多遜扈䝉楊昭儉賈黄中和峴陳諤損益開元禮為之附益以國朝新制太常因革禮一百卷右皇朝姚闢蘇洵撰嘉祐中歐陽修言禮院文書放軼請禮官編修六年用張洞奏以命闢洵至治平二年乃成詔賜以名李清臣云開寶已後三輯禮書推其要歸嘉祐尤悉然繁簡失中訛缺不補豈有拘而不得騁乎何楦釀之甚也郊廟禮文三十一卷右皇朝楊完撰元豐初以郊廟禮文訛舛詔陳襄李淸臣王存黄履何洵直孫諤楊完就太常寺檢討歴代㳂革以詔考其得失又命陸佃張璪詳定後以前後嘗進禮文獨令完編類五年成書奏御其書雖援據廣博而雜出衆手前後屢見繁猥為甚云周禮義辨疑一卷右皇朝楊時中立撰集諡總録一卷右皇朝孫緯撰春明退朝録嘗集類國朝諡幾二百人緯任宗正寺丞日因宋氏之舊纂元豐已後遂得三百餘人自宗室宰相以下分為九等其序畧云有爵位已高當得諡而未聞者若范質吕餘慶韓崇訓王博文姜遵王沔是也太常禮書一百五十卷右皇朝陳祥道用之撰祥道元祐初以左宣義郎任太常博士解禮之名物且繪其象甚精博朝廷聞之給札繕寫奏御今世傳止五十卷予愛之而恨其缺少得是本於敘州通判盧彭年家其象目以五彩飾之於是始見其全書云聲律要訣十卷右唐上黨郡司馬田疇撰疇序謂一切樂器依律吕之聲皆須本月真響若但執累黍之文則律吕隂陽不復諧矣故據經史參校短長為此書云琵琶故事一卷右未詳何人所纂敎坊記一卷右唐崔令欽撰開元中敎坊特盛令欽記之率鄙俗事非有益於正樂也皇祐樂記三卷右皇朝胡瑗等撰皇祐二年下詔曰國初循用王朴樂太祖患其聲高令和峴減下一律然猶未全命瑗同阮逸等二十餘人再定四年樂成奏之上御紫宸殿觀焉此其説也范蜀公樂書一卷右皇朝范鎮景仁撰景仁論樂宗房庶潛心四十餘年出私財鑄樂器元祐中奏御樂府詩集一百卷右皇朝郭茂倩編次取古今樂府分十二門郊廟歌辭十二燕射歌辭三鼓吹曲辭五横吹曲辭五相和歌辭十八清商曲辭八舞曲歌辭五琴曲歌辭四雜曲歌辭十八近代歌辭四雜謡歌辭七新樂府詞十一通為百卷包括傳記辭曲畧無遺軼春秋經社六卷右皇朝孫覺撰其學亦出於啖趙凡四十餘門論議頗嚴春秋演聖統例二十卷右皇朝丁副撰田偉書目副作嗣未知孰誤其序云經有例法一家所至較然重輕杜預釋例專左氏而未該唐陸淳纂例雖舉經而未備纎悉絓羅而咸在者其唯此書乎春秋名號歸一圖二卷右偽蜀馮繼先撰左氏所書人不但稱其名或字或號或爵諡多互見學者苦之繼先皆取以繋之名下云帝王歴紀譜三卷右題曰秦相荀卿撰載周末列國世家故一名春秋公子血脈圖頗多疎畧决非荀卿所著且卿未嘗相秦豈世别有一荀卿邪皇侃論語十卷右梁皇侃撰古今論語之注多矣何晏集七家復采古論語注為集解行于世侃今又引衛瓘繆播欒肇郭象蔡謨袁宏江惇蔡奚李充孫綽周懷范寗王珉凡十三家之説成此書其序稱江熙所集世謂其引事雖時近詭異而援證精博為後學所宗云王令論語十卷右皇朝王令逢原撰解堯曰篇云四海不困窮則天禄不永終矣王安石書新義取之吕與叔論語解十卷右皇朝吕大臨撰大臨雖程正叔之徒解經不盡用其師説汪氏論語直解十卷右皇朝汪革撰革字信民撫州人紹聖中試禮部為天下第一嘗語人曰吾鄉有二宰相一為天下之福一為天下之禍葢指晏元獻王荆公也即此可見其解經淵源所自云經解類六説五卷右唐劉迅撰迅著書以擬六經此乃其敘篇唯易闕而不言故止五卷云匡謬正俗八卷右唐顏籀師古撰以世俗之言多謬誤質諸經史刋而正之永徽中其子揚庭上之演聖通論四十九卷右皇朝胡旦撰論六經傳注得失易十六卷書七卷詩十卷禮記十六卷而春秋論别行天聖中嘗獻于朝博辨精詳學者宗焉小學類爾雅音畧三卷右偽蜀母昭裔撰爾雅舊有釋智騫及陸朗釋文昭裔以一字有兩音或三音後生疑于呼讀今釋其文義最明者為定小爾雅一卷右孔氏古文也見于孔鮒書急就章一卷右漢史游撰唐顏師古注游元帝時為黄門令書凡三十二章雜記姓名諸物五官等字以敎童䝉急就者謂字之難知者緩急可就而求焉自昔善小學者多書此故有皇象鍾繇衛夫人王羲之所書傳于世智永千字文一卷右梁周興嗣撰釋智永所書于禄字書一卷右唐顏元孫纂以經史所用為正世所行為俗三者之間為通凡三體林氏小説三卷右唐林罕撰凡五百四十一字其説頗與許慎不同而互有得失邵必縁進禮記石經陛對仁宗顧問罕之書如何必曰雖有所長而微好怪説文歸字從堆從止從帚以堆為聲罕云從追於聲為近此長於許氏矣説文哭從吅從獄省罕乃云象犬嘷此怪也有石刻在成都公武嘗從數友就觀之其解字殊可駭笑者不疑好怪之論誠然翰林禁經八卷右唐李陽氷撰論書勢筆法所禁故以名書墨藪十卷右高陽許歸與編未詳何代人李氏書目止五卷而梁武評書王逸少筆勢論皆别出臨池妙訣三卷右未詳撰人後有江南李煜述書古文四聲五卷右皇朝夏竦撰博採古文竒字分四聲編次以便檢尋周越書苑十五卷右皇朝周越撰越以善書名世天聖八年四月成此書奏御故其序稱臣越臣兄起於柳公權書又云亡兄間稱名而不臣似未精討論也唐藏經音義四卷右未詳撰人分四聲以類相從蜀中印本也英公字源一卷右皇朝釋夢英撰夢英通篆籀之學書偏旁五百三十九字郭忠恕云按説文字源唯有五百四十部子字合收在子部今目録妄有更改又集解中誤收去部在注中今㸃檢偏旁少晶惢至龜弦五字故知林氏虛誕誤後進其小説可焚夢英因書此以正之柴禹錫為立石唐氏字説解一百二十卷右皇朝唐耜撰紹聖以來用字説程試諸生解者甚衆耜集成此書頗注其用事所出一時稱之耜知卭州日奏御五代史一百五十卷右皇朝薛居正等撰開寶中詔修梁唐晉漢周書盧多遜扈䝉張澹李昉劉兼李穆李九齡同修居正監修兩朝國史一百二十卷右仁宗英宗兩朝國史也王珪等撰元豐五年六月甲寅奏御監修王珪史官蒲宗孟李清臣王存趙彦若曾肇賜銀絹有差蘇頌黄履林希蔡卞劉奉世以它職罷去呉充宋敏求前死皆有賜賚紀五卷志四十五卷比之實録事迹頗多但非冦凖而是丁謂託之神宗詔㫖編年類帝王鏡畧一卷右唐劉軻撰自開闢迄唐初帝王世次綴為四言以訓童䝉偽蜀馮鑑續之至唐末運厯圖六卷右皇朝龔頴撰起於秦昭王滅周之嵗乙巳止於國朝雍禧丁亥以歴代興亡大事附見其下四年獻於朝優詔奬之歐陽公嘗據之考正集古目録稱其精博按晉史張軌世襲凉州如但稱愍帝建興年號其間唯張祚纂竊改建興四十二年為和平元年始奉穆帝升平之朔始末不聞有改元事唯頴書載張實改元曰永安張茂改元曰永元張重華曰永樂曰和平張元龍曰太始張天錫曰太清張大豫曰鳯凰不知頴何所據而言或云出崔鴻十六國春秋鴻書久不傳于世莫得而考焉編年通載十五卷右皇朝張衡撰衡觀四部書至古今纂輯運厯書十餘家皆淺陋楦釀無足細繹乃編歴代年號貫以甲子始于帝堯訖于國朝治平丁未質之經史資以傳記百家之書聖賢勲徳奸雄纂竊及蠻夷盜賊凡繋於存亡綱紀之大者無不詳録總三千四百年且刋正謬誤如史記載舜年虞書不同漢紀載魏受漢禪與魏志受禪壇碑各異之類熙寧七年表獻之通鑑舉要厯八十卷右皇朝司馬光撰通鑑奏御之明日輔臣亟請觀焉神宗出而示之每編始末識以睿思殿寶章葢尊寵其書如此公尚患本書浩大故為舉要云寶厯歌一卷右未詳撰人以開闢太古迄于周世宗正綂帝王世次諡號成七言韻語一通歴代紀元賦一卷右皇朝楊億撰次漢至五代正綂年號為賦一首又别為宋頌四章實録類唐高祖實録二十卷右唐房𤣥齡等撰太宗詔𤣥齡與許敬宗敬播同修起創業盡武徳九年貞觀十七年書成唐太宗實録四十卷右唐許敬宗等撰起即位盡貞觀二十三年初貞觀十七年房𤣥齡許敬宗敬播撰今上實録止十四年成二十卷永徽五年無忌與史臣續十五年後盡昭陵事合四十卷其後敬宗改定唐高宗實録三十卷右唐劉知幾等撰起即位盡永淳二年凡二十九年初令狐徳棻許敬宗等撰録止顯慶三年成二十卷上之後知幾與呉兢續成唐中宗實録二十卷右唐呉兢撰起神龍元年復位盡景龍四年凡六年唐睿宗實録十卷右唐劉知幾撰知幾與呉兢先修太上皇實録起初誕止傳位凡四年後續修益止山陵唐𤣥宗實録一百卷右唐元載等撰起即位盡上元三年凡五十年安史之亂𤣥宗起居注亡大厯中史官令狐峘裒掇詔䇿備一朝之遺闕開元天寶間君臣事多漏畧唐肅宗實録三十卷右唐元載等撰起即位盡後元年凡六年唐徳宗實録五十卷右唐裴垍等撰起即位盡貞元二十一年凡二十五年元和二年詔蔣乂樊紳林寶韋處厚獨孤郁同修五年垍上之唐憲宗實録四十卷右唐路隋等撰起即位盡元和十五年初穆宗長慶二年詔監修國史杜元頴與史官韋處厚路隋沈傳師鄭澣宇文籍等修元和實録未及成書太和四年隋與蘇景裔陳夷行李漢蔣係續成上之綂例取捨皆出處厚焉唐穆宗實録二十卷右唐路隋等撰起即位盡長慶四年案文宗實録太和四年隋與蘇景裔等上憲宗實録後有王彥威楊漢公蘇滌裴休竝為史官云唐文宗實録四十卷右唐魏謩等撰起即位盡開成五年凡十四年宣宗大中八年史官蔣偕牛叢王諷盧吉同修唐武宗實録一卷右唐韋保衡等撰武宗以後實録皆亡今存止㑹昌元年正月二月唐宣宗實録三十卷懿宗實録三十卷僖宗實録三十卷昭宗實録三十卷哀宗實録八卷右國朝宋敏求次道嘗補宣宗實録三十卷懿宗實録三十卷僖宗實録三十卷昭宗實録三十卷哀宗實録八卷通百二十八卷世服其博聞蜀高祖實録三十卷右偽蜀李昊撰高祖者孟知祥也昊相知祥子昶時被命撰起唐咸通甲午終於偽明徳元年甲午凡六十二年太祖實録三十卷右皇朝沈倫撰太平興國三年詔李昉扈䝉李穆郭贄宋白董淳趙隣幾同修倫總其事更歴二載書成起創業迄山陵凡十七年淳化中王禹偁作篋中記敘云太祖神聖文武曠世無倫自受命之後功徳日新皆禹偁耳目所聞見今為史臣多有諱忌而不書又上近取實録入禁中親筆削之禹偁恐嵗月浸久遺落不傳因編次十餘事按禹偁所言雖未可盡信然咸平祥符間亦以所書漏落一再命儒臣重修多所増益故有三本傳于世徽廟實録二十卷右皇朝程俱撰先是汪藻編庚辰以來詔㫖頗繁雜俱删輯成此書且附以靖康建炎時事雜史類高氏小史一百二十卷右唐高峻撰以司馬遷史至陳隋書附以唐實録纂其要分十例為六十卷後其子逈析而倍之東觀奏記三卷右唐裴廷裕撰昭宗時長安冦亂相仍自武宗以後日厯起居注散軼不存詔史臣撰宣懿僖三朝實録廷裕次宣宗録特採大中以來耳目聞見撰次此書奏記于監修杜讓能以備史閣討論云桂苑叢談一卷右題云馮翊子子休撰雜記唐朝雜事僖昭時當是五代人邯鄲云姓嚴耳目記二卷右題云劉氏未詳何時人雜記唐末五代事唐餘録六十卷右皇朝王皥奉詔撰皥芟五代舊史繁雜之文採諸家之説倣裴松之體附註之以本朝當承漢唐之盛五代則閏也故名之曰唐餘録寶元二年上之溫公修通鑑間亦采之皥曽之弟唐末汎聞録五卷右皇朝閻自若纂乾徳中王普五代史成自若之父觀之謂自若曰唐末之事皆吾耳目所及與史册異者多矣因話見聞故事命自若志之五代補録五卷右皇朝陶岳撰祥符壬子岳以五季史書闕畧因書所聞得一百七事吕夏卿兵志三卷右皇朝吕夏卿撰公武得之于宇文時中季蒙題其後云夏卿修唐史别著兵志三篇自秘之戒其子弟勿妄傳鮑欽止吏部好藏書苦求得之其子無為太守恭孫偶言及因懇借抄録於呉興之山齋龍飛日厯一卷右皇朝趙普撰記顯徳七年正月藝祖受禪事是年改元建隆二月普撰此書普時為樞宻學士景命萬年録一卷藝祖受禪録一卷右皆未詳撰人記趙氏世次藝祖歴試迄受禪事金人背盟録七卷圍城雜記一卷避戎夜話一卷金國行程十卷南歸録一卷朝野僉言一卷右皇朝汪藻編記金人伐契丹迄於宣和乙巳犯京城圍城雜記等五書皆記靖康時事也偽史類十國紀年四十二卷右皇朝劉恕道原撰溫公序云渙之子也博學强記同修通鑑史事之紛錯難治者以諉恕宋次道知亳州家多書恕往借觀之目為之瞀性剛介初與王安石善及改新法言其非遂與之絶卒年四十九所謂十國者一王蜀二孟蜀三呉四唐五呉越六閩七楚八南漢九荆南十北漢溫公又題其後云世稱路氏九國志在五代之史中最佳此書又過之以予考之長於考異同而拙於屬文其書國朝事皆曰宋而無所隱諱意者各以其國為主耳秉軺録一卷右皇朝路振子發撰振大中祥符初使契丹撰此書以獻事見其傳雲南行紀二卷右唐韋齊休撰齊休長慶三年從韋審規使雲南紀其往來道里及其見聞序謂雲南所以能為唐患者以開道越嶲耳若自黎州之南清溪關外盡斥棄之疆場可以無虞不然憂未艾也及唐之亡禍果由此本朝棄嶲州不守而遂無邊患以此論之則齊休之言可不謂善哉至道雲南録三卷右皇朝辛怡顯撰蜀賊李順既平餘黨竄入雲南雷有終募怡顯招出之至道初歸因書其所歴成此書南蠻録十卷右未詳撰人熙寧間交趾叛朝廷議討之或纂歴代南蠻事迹及便宜上之西域志十二卷右唐僧𤣥奘撰𤣥奘西遊天竺求佛書既歸記其所歴諸國風俗其自序云自黑嶺以西皆土著尚東左袵務田畜重財賄嫁娶無禮獨天竺則異别記於後云夏國樞要二卷右皇朝孫巽纂記夏北兵屯㑹要土地肥磽井泉湧涸谷粟窖藏酋豪姓氏名位司存與夫城池之完缺風俗之所尚編為兩帙上之于朝石晉陷蕃記一卷右皇朝范質撰質石晉末在翰林為出帝草降北表知其事為詳記少主初遷於黄龍府後居於建州凡十八年而卒按契丹丙午嵗入汴順數至甲子嵗為十八年實國朝太祖乾徳二年也北廷雜記十卷右契丹降人趙志忠撰記北廷雜事始於阿保謹迄邪律宗真李清臣云志忠仕北為中書舍人得罪宗真來歸上此書及契丹地圖言北中事甚詳史評類史通析微十卷右唐柳燦炤之撰燦以劉子𤣥史通妄誣聖哲評湯之徳為偽跡論桀之惡為厚誣謗周公云不臣褒武庚以徇節其甚至於彈劾仲尼因討論其舛謬共成五十篇蕭綂云論則析理精微故以為名乾寧四年書成唐史云燦公綽族孫少孤貧好學著史通析微時或稱之起布衣至為相不四嵗按唐紀相燦在天祐改元則書成時猶未仕也歴代史贊論五十四卷右未詳撰人纂史記迄五代史臣讚論唐史音義三十卷右未詳撰人比竇氏書大畧同而稍簡乃析為三十卷兩漢博聞十二卷右皇朝楊侃纂景徳中侃讀兩漢書取其中名數前儒解釋為此書以資渉獵者侃嘗編職林矣此亦其類也三劉漢書六卷右皇朝劉敞原父弟攽貢父子奉世仲馮撰劉跂嘗䟦其書尾云余為學官亳州故中書劉舍人貢父實為守從容出所讀漢書示余曰欲作補注未能也然卷中題識已多公之子方山亞父録以相示也吕氏前漢論三十卷右皇朝吕大忠晉伯撰予得其本于銅梁令吕肇修撰汲公諸孫也晉書指掌十二卷右皇朝劉編以晉書事實以類分六十五門職官類翰林雜志一卷右不題撰人輯唐韋執誼故事元稹承㫖壁記韋來微新樓記杜元頴監院使記鄭璘視草亭記并詩李宗諤題名記為一編或云蘇易簡子耆采其父翰林續志所遺附益之新御史臺記右皇朝宋聖寵編崇寧中聖寵為察官續韓琬書咸用其規式所異者不為諸人立傳於儀制勅令格式為詳後人續至紹興九年御史臺彈奏格一卷右政和中御史中丞蔣猷奏乞委屬官李彌大將本臺制勅令格式彈奏事件編成格目六月書成上之南宫故事一卷右不題撰人韋述云開元中劉鄭蘭撰劉儒者無著述才執政拜罷録十卷右不題撰人自建隆元年迄于紹興九年按國朝以樞密院及叅知政事為執政改官制後以左右丞兩省侍郎并密院為執政建炎三年後復用舊制云百官公卿表一百四十二卷右皇朝司馬光君實等撰熙寧中光以翰林學士兼史官修撰建議欲據國史旁採異聞敘宋興以來百官除拜効漢書作表以便御覽詔許之光請宋敏求同修及敏求卒又請趙彥若繼之歴十二年書成奏御中書備對十卷右皇朝元豐三年畢仲衍承詔編次序曰周官所謂要㑹者正今日中書所宜有自漢至唐莫知議此今編成十卷凡一百二十五門附五十八事李清臣嘗與許將書云備對乃呉正憲公居宰路以聖問多出意表故令中書椽畢君為之其時預有畫㫖諸司遇取㑹不許濡滯如此尚歴數年迺就後雖有改革然事亦可概見也掖垣叢志二卷右皇朝宋庠撰景祐中李宗諤始取國初掌誥名氏刻之于石自為紀序庠因之成此書王禹王頗譏其疎畧裴廷裕載舍人上事知印宰相壓角至今傳之為故事而庠書闕焉掖垣續志一卷右不詳撰人續宋庠書迄元祐六年十一月陳軒試中書舍人輔弼名對四十卷目録一卷右皇朝劉顏撰纂西漢迄五代羣臣應對之名者汲黯有天子置公卿輔弼之臣寧令從諛承意陷主不誼之言顏取以名其書天聖初馮元為侍講上之顏嘗為令坐事免由是詔復其官將作營造法式三十四卷右皇朝李誡撰熙寧初勅將作監編修營造法式誡以為未備乃考究經史詢訪匠氏以成此書頒于列郡世謂喻皓木經極為精詳此書葢過之儀注類咸鎬故事一卷右唐韋慎微撰纂長安自元日至除夜朝廷慶賀事景徳㑹計録六卷右皇朝丁謂謂之撰謂景徳中纂三司户口税賦之入及兵食吏禄之費㑹計天下每嵗出納贏虧之數吕吉甫元祐國計圖之類也書成奏御刑法類金科易覽三卷右崇文總目有唐趙綽金科易覽一卷田氏書目有蕭緒金科易覽三卷當是綽初撰一卷緒删改析之為三爾天聖編勅三十卷右天聖中宋庠龎籍受詔改修唐令叅以今制而成凡二十一門官品一户二祠三選舉四考課五軍防六衣服七儀制八鹵簿九公式十田十一賦十二倉庫十三廏牧十四關市十五補亡十六疾醫十七獄官十八營繕十九喪葬二十雜二十一元豐廣案一百卷右皇朝元豐初置新科明法或類其所試成此書刑綂賦兩卷右皇朝傳霖撰或人為之注決獄龜鑑二十卷右皇朝鄭克編次五代和凝有疑獄集近時趙仝有疑獄事類皆未詳盡克因增廣之依劉向晏子春秋舉其綱要為之目録分二十門計三百九十五事律心四卷右未詳撰人纂刑綂綱要也斷例四卷右皇朝王安石執政以後士大夫頗垂意律令此熙豐紹聖中法寺決獄比也地理類山海經十八卷右大禹製晉郭璞傳漢侍中奉車都尉劉秀校定表言禹别九州而益等類物善惡著此書皆聖賢之遺事古文明著者也大父嘗考之於其書有曰長沙零陵鴈門皆郡縣名又自載禹鯀似後人因其名叅益之山海經圖十卷右皇朝舒雅等撰雅仕江南韓熙載門人也後入朝數預修書之選閩中刋行本或題曰張僧繇畫妄也十道志十三卷右唐梁載言撰唐分天下為十道所載頗詳博其書多稱咸通中㳂革載言葢唐末人也游城南記一卷右皇朝張禮撰禮秦人元祐中與陳明微自長安城南探奇訪古以抵樊川因次之為記太平寰宇志二百卷右皇朝樂史等撰太平興國中盡平諸國天下一綂史悉取自古山經地志考正訛謬纂成此書上之于朝圖經右皇朝李昉撰洽聞記三卷右唐鄭常撰雜記郡國舊事故附之地理類職方機要四十卷右不題撰人姓名序云本新舊九域志上據歴代史旁取左氏水經通典且採舊聞叅以小説黜繆舉真紬成此書其間載政和間事葢當時人也傳記類襄陽耆舊記五卷右晉習鑿齒撰前載襄漢人物中載其山川城邑後載其牧守隋經籍志曰耆舊記唐藝文志曰載舊傳觀其書記録叢脞非傳體也名當從經籍志云高士傳十卷右晉皇甫謐撰纂自陶唐至魏八代二千四百餘載世士高節者其或以身狥名雖如夷齊兩龔皆不録凡九十六人而東漢之士居三之一自古名節之盛議者獨推焉觀此尤信孔子編年三卷右皇朝孔傳取左氏國語公羊史記及他書所載孔子事以年次之自生至卒東家雜記二卷右皇朝孔傳撰孔子四十七代孫也纂其家舊聞軼事于此書翊聖保徳傳三卷右皇朝王欽若撰建隆初有神降于鳯翔民張守真家開寶末徵守真詣闕屬太宗踐祚封神翊聖將軍築宫于終南山祥符中詔欽若編次其事御為製序引登科記三十卷右皇朝樂史撰記進士及諸科登名者起唐武徳迄天祐末唐制舉科目圖一卷右不題撰人凡七十六科仕至宰相者七十二人唯劉蕡名最高而官最不達宋登科記三卷右皇朝登科人名氏未詳何人所撰民表録三卷右皇朝胡納撰録國朝循吏善政李淑以為雖淺俗亦可備廣記云納瑗之父天聖中偕賢惠録上之賢惠録三卷右皇朝胡納撰録國朝賢惠之女後一卷瑗嗣成之萊公勲烈一卷右皇朝冦宗奭編宗奭凖之曾孫也編集仁宗祭凖文及贈誥墓碑傳誌贊詩等為此書列仙傳二卷右漢劉向撰高僧傳十四卷右蕭梁僧釋慧皎撰慧皎以劉義宣靈驗記陶潛搜神録等數十家並書諸僧殊疎畧乃博采諸書咨訪古老起于永平十年終于天監十八年凡五百五十二載二百五十七人又附見者二百餘人分為釋經義解神異習禪明律遺身誦經興福經師唱道十科續高僧傳三十卷右唐僧道宣撰藝文志作道宗大明寺僧也以慧皎㑹稽人故其書詳於呉越而畧於燕魏故上距梁天監下終唐貞觀十九年百四十四載編載二百四十人附見者又一百六十人分釋經解義習禪明律䕶法感通遺身讀誦興福雜科凡十門比丘尼傳四卷右蕭梁僧寶唱撰起晉升平訖梁天監得尼六十五人為之傳以檢淨為首寶唱金陵人藝文志有其目補江總白猿傳一卷右不詳何人撰述梁大同末歐陽紇妻為猿所竊後生子詢崇文目以為唐人惡詢者為之緑珠傳一卷右皇朝樂史撰譜諜類千姓編右不著撰人釋迦氏譜十卷右唐釋僧祐撰僧祐以釋迦譜記雜見于經論覽亦難通因纂成五卷又取内外族姓及弟子名氏附于後書目類文選著作人名三卷右唐常寶鼎撰纂文選所集文章著作人姓名鄉里行事及其述作之意十三代史目三卷右唐殷仲茂撰輯史記兩漢三國晉宋齊梁陳後魏北齊周隋史籍篇次名氏國朝杜鎬以唐五代書目續之開元釋敎録三十卷右唐僧智昇撰智昇在開元中纂釋氏諸書入中國嵗月及翻譯者姓氏以楞嚴經為唐僧懷迪譯張天覺以懷迪與菩提流支同時流支後魏僧其言殆不可信也成都刻石總目三帙右皇朝劉涇撰元祐中蔡京帥成都以意授涇纂府縣碑板幢柱自東漢初平迄偽蜀廣政凡二百六十八田氏書目六卷右皇朝田鎬撰田偉居荆南家藏書幾三萬卷鎬偉之子也因成此目元祐中袁黙為之序羣書備檢十卷右未詳撰人輯易書詩左氏公羊穀梁二禮論語孟子荀子揚子文中子史記兩漢三國志晉宋齊梁陳後周北齊隋新舊唐五代史書以備檢閱郡齋讀書後志卷一欽定四庫全書郡齋讀書後志卷二宋趙希弁撰子類伊川孟子解十四卷右皇朝程頥正叔撰頥居洛陽其門人號之為伊川先生云百家孟子解十二卷右集古今諸儒自裴日休至强至賈同百餘家解孟子成一編王安石解孟子十四卷王雱解孟子十四卷許允成解孟子十四卷右皇朝王安石介甫素喜孟子自為之解其子雱與其門人許允成皆有注釋崇觀間場屋舉子宗之㸃注孟子十四卷右皇朝熙寧中蜀州張簡㸃節經注附以釋文以敎童子董子一卷右周董無心撰皇朝呉秘注無心在戰國時著書闢墨子説𤣥一卷右唐王涯廣津撰涯始以貞元丙子終於元和己丑二十六年間注太𤣥為六卷今不之見獨此書行于世凡五篇一明宗二立例三揲法四占法五辨首宋惟幹太𤣥解十卷右皇朝宋惟幹注惟幹嘗得太𤣥古本于昭應咸平中知滑臺取宋衷陸績范望三家訓解别為之注仍作太𤣥宗㫖兩篇附于後其學葢師濟東田告司馬溫公所謂小宋者也陳漸演𤣥十卷右皇朝陳漸撰漸堯佐族子也國史有傳凡十四篇漸謂史以揚雄非聖人而作經猶呉楚僭王今按法言解嘲止云太𤣥然則經非其自稱弟子侯芭之徒尊之耳太𤣥淵㫖一卷右皇朝張揆撰溫公集注太𤣥經十卷右皇朝司馬光君實集漢宋衷解詁呉陸績釋文晉范望解贊唐王涯注經及首測宋惟幹通注陳漸演𤣥呉秘音義七家為此書自慶厯至元豐凡三十年始成其直云宋者衷也小宋者惟幹也惟幹漸秘皆國朝人溫公集注法言十三卷右皇朝司馬光君實集晉李軌唐柳宗元國朝宋咸呉秘注光自言少好此書歴年已多今輒采諸家所長附以己意名曰集注凡觀書者當先正其文辨其音然後可以求其義故宋相公庠家有李祠部注本及音義最為精詳宋呉亦據李本而其文多異同今叅以漢書取其通者以為定本先審其音乃解其義云元經十卷右隋王通撰唐薛收傳皇朝阮逸學起晉惠帝太熙元年終于陳亡予從兄子逸仕安康嘗得其本歸而示四父四父讀至帝問哇鳴哂其陋曰六籍奴婢之言不為過按崇文無其目疑逸依託為之帝範一卷右唐太宗撰凡十二篇今存者六篇貞觀末著此書以賜高宗且曰修身治國備在其中一旦不諱更無所言矣其末頗以汰侈自咎以戒高宗俾勿效已殊不知閨門之内慙徳甚多豈特太侈而已哉武后之立實有自來不能身敎多言奚益悲夫臣範二卷右唐則天皇后武氏撰範或作軌武氏稱制時嘗詔天下學者習之尋廢本十篇今闕其下五篇法語二十卷右南唐劉鶚撰鶚甲戌嵗擢南唐進士第實開寶七年也著書凡八十一篇言治國立身之道徐鉉為之序老子畧論一卷右魏王弼撰凡十有八章景迂云弼有得於老子而無得於易注易資於老子而老子論無資於易則其淺深之效可見矣溫公道徳論述要兩卷右皇朝司馬光撰光意謂道徳連體不可偏舉故廢道經徳經之名而曰道徳論墓誌載其目無名天地之始有名萬物之母常無欲以觀其妙常有欲以觀其徼皆於無與有下斷句不與先儒同吕氏老子注二卷右皇朝吕大臨撰其意以老氏之學合有無謂之𤣥以為道之所由出葢至于命矣其言道體非獨智之見孰能臻此求之終篇膠于聖人者葢寡但不當以聖知仁義為可絶棄耳黙希子注文子十二卷右黙希子者唐徐靈府自號也靈府謂文子周平王時人朱𤣥注文子十二卷右唐朱𤣥注闕符言一篇或取黙希注補焉文如海莊子疏十卷右唐文如海撰如海明皇時道士也以郭象注放乎自然而絕學習失莊生之㫖因再為之解凡九萬餘言吕吉甫注莊子十卷右皇朝吕惠卿撰吉甫惠卿字也元豐七年先表進内篇餘續成之王元澤注莊子十卷右皇朝王雱撰元澤其字也東坡廣成子解一卷右皇朝蘇軾撰軾取莊子中黄帝問道於廣成子一章為之解景迂嘗難之其序畧曰某晚玷先生薦賢中安敢與先生異論然先生許我不苟同翰墨具在天機子一卷右不著撰人凡二十五篇或曰一名隂符二十四機諸葛亮撰予觀其詞㫖殆李筌所為爾託之孔明也載道藏中無能子三卷右不著撰人唐光啟三年天子在褒寓三輔景氏舍成書三十篇述老莊自然之㫖總目録之於道家四子治國樞四卷右唐范乾九集四子謂莊子文子列子亢倉子其意以為黄老之道内足以修身外足以治國周王得文子之言趙王納莊周之論皆能興邦致治故採其書有益治道者分為二十門風俗通義十卷右漢應劭撰劭字仲遠奉之子篤學博覽多聞靈帝時舉孝亷仕至泰山太守撰風俗通以辨物名號釋時俗嫌疑文雖不典世服其洽聞意林三卷右唐馬總㑹元撰初梁頴川庾仲容取諸家書術數雜説凡一百七家抄其要語為三十卷總以其繁畧失中增損成三軸前有戴叔倫楊伯存兩序格言五卷右偽唐韓熙載叔言撰熙載以經濟自任乃著書二十六篇論古今王霸之道以干李煜首言陽九百六之數及五運迭興事其􅭸雜如此有門生舒雅序兩同書兩卷右唐羅隱撰隱謂老子養生孔子訓世因本之著内外篇各五其曰兩同書者取兩者同出而異名之言也物類相感志十卷右皇朝僧贊寧撰采經籍傳記物類相感者志之分天地人物四門贊寧呉人以博物稱于世柳如京徐騎省與之遊或就質疑事楊文公歐陽文忠公亦皆知其名王氏雜說十卷右皇朝王安石介甫撰蔡京為安石傳其畧曰自先王澤竭國異家殊由漢迄唐源流浸深宋興文物盛矣然不知道徳性命之理安石奮乎百世之下追堯舜三代通乎晝夜隂陽所不能測而入於神初著雜説數萬言世謂其言與孟軻相上下於是天下之士始原道徳之意窺性命之端云所謂雜説即此書也以京之誇至如此且不知所謂通乎晝夜隂陽所不能測而入於神者為何等語故著之保生月録一卷右唐韋行規撰分十二月雜纂每月攝養種藝祈禳之術也李翺為之序輦下嵗時記一卷右唐李綽撰綽經黄巢之亂避地蠻隅偶記秦地盛事傳諸晚學云國朝時令十二卷右皇朝賈昌朝撰景祐初復禮記舊文其唐月令别行三年詔昌朝與丁度李淑采國朝律厯典禮百度昏曉中星祠祀配侑嵗時施行約唐月令定為時令一卷以備宣讀後昌朝注為十二卷奏上頒行顧渚山記二卷右唐陸羽撰羽與皎然朱放輩論茶以顧渚為第一顧渚山在湖州呉王夫差顧望欲以為都故以名山吕惠卿建安茶記右皇朝吕惠卿撰聖宋茶論一卷右徽宗御製茶雜文一卷右集古今詩文及茶者竹譜一卷右戴凱之撰凱之字慶預武昌人裒輯竹事四字一讀有韻類賦頌李邯鄲云未詳何代人筍譜三卷右皇朝僧惠崇撰小説類殷芸小説十卷右宋殷芸撰述秦漢以來雜事予家本題曰劉餗李淑以為非𤣥怪録十卷右唐牛僧孺撰僧孺為宰相有聞於世而著此等書周秦行紀之謗葢有以致之也周秦行紀一卷右唐牛僧孺自敘所遇異事賈黄中以為韋瓘所撰瓘李徳裕門人以此誣僧孺鹿革事類三十卷鹿革文類三十卷右節太平廣記事實成一編曰事類詩文成一編曰文類蔡蕃晉如所撰晉如博學通音律能屬文與十父相友善鑒戒録十卷右後蜀何光遠撰字輝夫東海人唐證中纂輯唐以來君臣事迹可為世鑒者前有劉曦度序李獻臣云不知何時人考之不詳也歸田録六卷右皇朝李畋撰畋蜀人張詠客也與范鎮友善熙寧中致仕歸與門人賔客燕談衮衮忘倦門人請編録之遂以該聞為目又有雜詩十二篇係于後開譚録兩卷右皇朝蘇耆撰舜卿之父也記五代以來雜事下帙多載馮道行義古今前定録二卷右皇朝尹國均輯經史子集古今之人興衰窮達貴賤貧富死生壽夭與夫一動靜一語黙一飲一啄定于前而形于夢兆于卜見于相貌應于䜟記者凡一門以為不知命而躁競者之戒至若裴度以隂徳而致貴孫亮以隂譴而減齡之類又别為二門使君子不以天廢人云傅公嘉話一卷右皇朝傅堯俞之子孫記堯俞之言行凡四十餘章獻簡堯俞諡也曾公南遊記一卷右曾公未詳何人當是公亮之孫也共十二章記國朝雜事搢紳脞説二十卷右皇朝張唐英君房撰君房博學通釋老善著書如名臣傳蜀檮杌雲笈七籖行于世者毋慮數百卷此書亦詳實青箱雜記右唐朝何處厚撰處厚發蔡確車葢亭詩所記多失實成都置交子務起於冦瑊處厚乃以為張詠他多類此緗素雜記十卷右皇朝黄朝英撰所記二百事朝英建州人紹聖後舉子也為王安石之學者以贈之以芍藥為男淫女貽我握椒為女淫男前輩嘗以是為嗤朝英獨愛重之他可知也褒善録一卷右皇朝王蕃撰嘉祐中巴縣簿黄靖國死而復蘇道其冥中所見廖生嘗傳之蕃删取其要為此書麗情集二十卷右皇朝張君房唐英編古今情感事天文厯算類景祐乾象新書三卷右崇文目有三十卷置之天文類厯法一卷右未詳撰人厯草也刻漏圖一卷右皇朝燕肅撰肅有巧思上蓮花漏法嘗知潼川有石刻存焉洛陽宋君者増損肅之法為此圖五行類廣古今五行志三十卷右竇鋈撰唐志有其目未詳何人纂五行變異敘其徵應葢為洪範之學者自古術數之學多矣言五行則本洪範言卜筮則本周易近時兩者之學殆絕而最盛于世者葬書相術五星禄命六壬遁甲星禽而已然六壬之類足以推一時之吉凶星禽五星禄命相術之類足以推一身之吉凶葬書之類足以推一家之吉凶遁甲之類足以推一國之吉凶其所知若有遠近之異而或中或否不可盡信則一也且其説皆本於五行故同次之為一類青囊補注三卷右晉郭璞撰世傳葬書之學皆云無出郭璞之右者今盛行多璞書也按璞傳載葬母事世傳葢不誣矣璞未幾為王敦所殺若謂禍福皆係於葬則璞不應擇凶地以取禍若謂禍福有定數或它有以致之則葬地不必擇矣嗚呼璞自用其術尚如此况後遵其遺書者乎撥沙經一卷右唐吕才撰地理書畫山水之形成圖葢依託者㑹元經二十四卷右孫季邕撰未詳何代人集諸家相地書芟其鄙陋無驗者成是書五音地理新書三十卷右唐僧一行撰以人姓五音驗八山三十八將吉凶之方其學今世不行秤星經三卷右不著撰人以日月五星羅㬋計都紫炁月孛十一曜演十二宫宿度以推人貴賤壽夭休咎不知其術之所起或云天竺梵學也按洪範曰嵗月日時無易百穀用成乂用明俊民用章家用平康月之從星則以風雨冷州鳩曰武王伐殷嵗在鶉火月在天駟一曰在析木之津辰在斗柄星在天黿以此言之五星之術其來尚矣葢可以占國則可以占事可以占事則可以占人也然術家用日月五星以占吉凶又加以交初交中之神紫炁月孛之宿初中者交食之㑹亦可以意求惟氣孛無稽而術家獨以為效且曰土木之餘氣五星之行土木最遲而為吉凶者久故有餘氣云周易十二論一卷右未詳撰人論日月五星直年以占吉凶珞琭子疏五卷右皇朝李全東方明撰河圖天地二運賦一卷右不著撰人論天地二運葢三命書也崇文目以為卜筮類常陽經一卷右崇文目題曰黄帝式用葢六壬占卜術也六壬要訣一卷右未詳何人撰隋志載六壬之書兩種金鑾密記及五代史記頗言其驗今世龜筮道息而此術獨行六壬課鈐一卷右未詳何人所纂以六十甲子加十二時成七百二十課三傳入神以占吉凶玉關歌一卷右不題撰人六壬課訣也三十二家相書三卷右或集許負以下三十二家書成此編月波洞中記一卷右序稱唐任逍遥得之於太白山月波洞石壁上凡九篇相形術也崇文目置之五行類靈龜經一卷右史蘇撰論龜兆之吉凶崇文目三卷遁甲萬一訣一卷右題云唐李靖所纂黄帝書按遁甲之書見於隋志凡一十三家則其學之來亦不在近世矣以休生傷杜景死驚開八門推國家之吉凶通其學者以為有驗未之嘗試也遁甲經一卷右唐胡乾撰李氏書目亦云九天𤣥女術推九星八門三奇六儀之法鮮鶚經十卷右未詳撰人凡十門六十二章以星禽推知人之吉凶言其性情嗜好為尤驗説者謂本神仙之訣也故此書載于道藏李邯鄲云羅浮山逍遥子撰八神筮法二卷右以八卦世分六十四卦每卦首必云子夏曰論易筮之吉凶靈棊經二卷右漢東方朔撰又云張良劉安未知孰是晉顏幼明宋何承天注有唐李遠敘歸來子以為黄石公書豈謂以授良者邪按南史載客從南來遺我良財寶貨珠璣金碗玉盃之繇則古之遺書也明矣凡一百二十卦皆有繇辭紫堂訣三卷右紫堂先生撰未詳何代人著紫垣十二星至隱曜總三百六十位分二十八舍附之以五星配十二辰以推人命之吉凶兵類郭元振安邊策三卷右唐郭元振撰以總兵進攻聚衆退守不可無權謀乃著此書故舊題曰定遠安邊策武經聖畧十二卷右皇朝王洙撰寶元中西邊用兵朝廷講武備是時洙奉詔編祖宗任將用兵邊防事迹分十二門武經總要四十卷右皇朝曾公亮丁度撰康定中朝廷恐羣帥昧古今之學命公亮等采古兵法及本朝計謀方畧凡五年奏御制度五卷邊防五卷故事十五卷占候五卷御為製序兵要望江南一卷右題云黄石公以授張良者按其書雜占行軍吉凶寓聲于望江南詞取其易記憶總目云武安軍左押衙易靜撰葢唐人也倚馬立成法二卷右唐李淳風撰兵行占候之書也淳風太宗時人而此書起九宫法至貞元六年庚午假托以行其書爾非淳風本㫖也類書類古人姓氏相同録一卷右唐丘光庭撰光庭中進士第北堂書抄一百七十三卷右唐虞世南撰世南仕隋為秘書郎時鈔經史百家之事以備用分八十部八百一類北堂者省之後堂世南鈔書之所也家一百二十卷集類一百卷右唐劉綺莊撰綺莊毗陵人嘗為蘇州崑山縣令家多異書採摭事類分二十餘門凡五十餘萬言上之于朝前有萬希序題云開元二十九年辛巳按綺莊集有上白敏中啟疑非𤣥宗時人當攷三敎珠英三卷右唐張昌宗等撰按唐志一千三百卷今所存者止此備舉文言二十卷右唐陸贄撰總四百五十餘門議者謂大類六帖而文辭過焉崇文總目中有之小名録三卷右唐陸龜䝉撰龜䝉以末世有官名小名之别自秦至隋編而紀之至於神仙玉女之名婦人臧獲之字亦無棄焉龜蒙世稱其博然此書特雜取於史傳間爾無異聞也備忘小抄十卷右偽蜀文谷撰雜抄子史一千餘事以備遺忘其後題廣政三年廣政王衍號也唐㑹要一百卷右皇朝王溥撰初唐蘇冕敘高祖至徳宗九朝㳂革損益之制大中七年詔崔鉉等撰次徳宗以來事至宣宗大中六年以續冕書溥又采宣宗以後事共成百卷建隆二年正月奏御詞簡禮備太祖覽而嘉之詔藏於史閣賜物有差册府元龜一千卷右皇朝景徳二年詔王欽若楊億修君臣事迹唯取六經子史不録小説雜書至祥符六年書成上之凡三十一部有總序千一百四門有小序同修者十五人錢惟演杜鎬刁衎李維戚綸王希哲陳彭年姜輿宋貽陳越陳從易劉筠查道王曙夏竦初撰篇序諸儒皆作帝以體製不一遂擇李維錢惟演陳彭年劉筠夏竦等付楊億竄定賜今名為序冠其首其音釋又命孫奭為之類要六十五卷右皇朝晏殊纂分門輯經史子集事實以備修文之用禁殺録一卷右皇朝李象先纂元祐中象先集錄古今冥報事以為殺戒貨泉録一卷右皇朝陶岳撰記五代諸侯擅改錢幣之由幽州嶺南福建湖南江南五國墨譜一卷右皇朝董秉撰熙寧間人秉患世人徒知祖李之名而不知形模之異同製作之精觕故作圖以著其源流用補蘇易簡之闕文云印格一卷右皇朝晁克一撰克一張文潛甥也文潛嘗為之序其畧曰克一既好古印章其父補之愛之尤篤悉録古今印璽之法謂之圖書譜自秦以來變制異狀皆能言其故余頗愛其用心不移致精于末務使有傳焉䝉求三卷右唐李瀚撰纂經傳善惡事實類者兩兩相比為韻語取䝉卦童䝉求我之義名其書葢以敎學童云魯史分門屬類賦三卷右皇朝楊筠撰以左氏事類分十門各為律賦一篇乾徳四年奏御詔褒之仙苑編珠二卷右唐王松年撰取阮倉劉向葛洪所傳神仙又取經記中梁以後神仙百二十八人比事屬辭效蒙求本體為是書國史對韻十二卷右皇朝范鎮撰呉仲庶嘗稱景仁憫諸後學雖渉書傳而問之今代典故則懵然不知乃自太祖開基迄于仁宗朝摭取事實可為規矩鑒戒者用韻編次之即此書也孝悌類鑒七卷右皇朝俞觀能撰取經史孝悌事成四言韻語兩漢䝉求五卷唐史屬辭五卷南北史䝉求十卷右未詳撰人皆效李瀚也雜藝術類名畫見聞志六卷右皇朝郭若虛撰若虛以張愛賔之畫絕筆永昌元年因續之歴五代止國朝熙寧七年分敘論紀藝故事近事四門溫公投壺新格一卷右皇朝司馬光君實撰舊有投壺格君實惡其多取奇中者以為僥倖因盡改之九章算法九卷右未詳撰人者姓名或曰周公九章者一方田二算粟三衰分四少廣五商功六均輸七盈不足八方程九句股魏劉徽唐李淳風嘗為之注則此術起于漢之前矣求一算經一卷右未詳撰人溫公七國象碁一卷右皇朝司馬光君實撰周秦韓魏趙楚齊燕實八國而云七者周室不與焉葉子戲格一卷右不著撰人世傳葉子婦人也撰此戲晚唐之時也相鹤經一卷右題曰浮丘公撰其傳云浮丘公授于王子晉後崔文子學道于子晉得其文藏于嵩山之石室淮南公採藥得之乃傳于世相馬經二卷右伯樂撰相馬經一卷右未詳撰人述相馬法式并著馬之疾狀及治療之術李氏書目有之皇帝醫相馬經三卷右唐穆蠡集伯樂王良等六家書成此編皇帝斤神農也育駿方三卷右未詳撰人相馬術及醫治畜牧之方相牛經一卷右序曰寗戚傳之百里奚漢世河西薛公得其書以相牛千百不失其一至魏世高堂生又傳晉宣帝其後秘之細字薛公注也醫家類靈樞經九卷右王砯謂此書即漢志皇帝内經十八卷之九也或謂好事者于皇甫謐所集内經倉公論中抄出之名為古書也未知孰是丁徳用注難經五卷右皇朝丁徳用注以楊𤣥操所演甚失大義因改王之經文隱奥者繪為圖徳用濟陽人嘉祐末其書始成虞庶注難經五卷右皇朝虞庶注庶仁壽人寓居漢嘉少為儒已而棄其業習醫術為此書以補吕楊所未盡黎泰辰治平間為之序金匱玉函經八卷右漢張仲景撰晉王叔和集設答問雜病形證脈理叅以療治之方仁宗朝王洙得于館中用之甚効合二百六十二方仲景傷寒論十卷右漢張仲景述晉王叔和撰次按名醫録云仲景南陽人名機仲景其字也舉孝亷官至長沙太守以宗族二百餘口建安紀年以來未及十稔死者三之二而傷寒居其七乃著論二十二篇證外合三百九十七法一百一十二方善醫者或云仲景著傷寒論誠不刋之典然有大人之病而無嬰孺之患有北方之藥而無南方之治此其所闕者葢陳蔡以南不可用柴胡白虎二湯治傷寒其言極有理脈經三卷右題云黄帝撰論診脈之要凡二十一篇脈訣一卷右題曰王叔和皆歌訣鄙淺之言後人依託者然最行于世雷公炮炙三卷右宋雷斆撰胡洽重定述百藥性味炮熬煮炙之方其論多本之于乾寧晏先生斆稱内究守國安正公當是官名未詳金寶鑑三卷右魏嵩撰嵩仕至翰林博士崇文總目云不詳何代人述脈候徵驗要妙之理通真子傷寒訣一卷右題曰通真子而不著名氏用張長沙傷寒論為歌詩以便覽者脈訣之類也傷寒百問三卷右題曰無求子大觀初所著書運氣論奥三卷右皇朝劉溫舒撰溫舒以素問氣運最為治病之要而答問紛揉文辭古奥讀者難知因為三十論七十二圖上于朝脈粹一卷右皇朝蕭世基撰世基嘗閲素問及歴代醫經患其難知因綴緝成一編治平中姚誼序之存真圖一卷右皇朝楊介編崇寧間泗州刑賊於市郡守李夷行遣醫并畫工往親決膜摘膏肓曲折圖之盡得纎悉介校以古書無少異者比歐希範五藏圖過之遠矣實有益醫家也王莽時捕得翟義黨王孫慶使太醫尚方與巧屠共刳剝之量度五藏以竹筳導其脈知所終始云可以治病亦是此意證類本草三十二卷右皇朝唐慎微纂合兩本草為一書且集書傳所記單方附之于本條之下殊為詳博子午經一卷右題云扁鵲撰論鍼砭之要成歌詠葢後人依託者明堂針灸圖三卷右題曰黄帝論人身俞穴及灼灸禁忌㸃烙三十六黄經一卷右不著撰人唐世書也國史補云自茗飲行于世世人不復病黄癉千金方三十卷右唐孫思邈撰思邈博通經傳洞明醫術著用藥之方診脈之訣針灸之穴禁架之法以至導引養生之要無不周悉後世或能窺其一二未有不為名醫者然議者頗恨其獨不知傷寒之數云千金翼方三十卷右唐孫思􅊬撰思邈著千金方復掇集遺軼以羽翼其書成一家之學林億等謂首之以藥録次之以婦人傷寒小兒養性辟穀退居補益雜病瘡癰色脈針灸而禁經終焉者皆有指意云龍樹眼論三卷右佛經龍樹大士者能治眼疾或假其説集治七十二種目病之方寶藏暢微論三卷右五代軒轅述撰青霞君作寶藏論三篇著變煉金石之訣既詳其未善因刋其謬誤增其缺漏以成是言故曰暢微時年九十實乾亨二年也太平聖惠方一百卷右太宗皇帝在潛邸日多蓄名方異術太平興國中内出親驗者千餘首乃詔醫局各上家傳方書命王懷隱王祐鄭彥陳昭遇校正編類各於篇首著其疾證淳化初書成御製序引和劑局方十卷右大觀中詔通醫刋正藥局方書閲嵗書成校正七百八字增損七十餘方養生必用方十六卷右皇朝初虞世撰序謂古人醫經行於世者多矣所以别著者古方分劑為今銖兩不侔用者頗難此方其證易詳其法易用苟尋文為治雖不習之人亦可無求於醫也虞世本朝士一旦削髪為僧在襄陽與十父遊從甚密嬰童寶鏡十卷右題曰栖真子不著姓名録世行應驗方成此書小兒靈秘方十三卷右不題撰人辨小兒疾證及治療之方多為歌訣傷寒證治三方右皇朝王實編實謂百病之急無踰傷寒故畧舉病名法及世名醫之言為十三篇總方百四十六首或云頴川人官至外郎龎安常之高弟也小兒玉訣一卷右未詳撰人名氏為韻語以記小兒疾證治法凡二十三孫尚秘寶十卷右皇朝孫尚撰吕惠卿帥邊日尚之子在屬部因取此書刻板傳于世楊子䕶命方五卷通神論十四卷右皇朝楊退修撰退修以岐伯論五運六氣以治疾病後世通之者唯王砯一人而已然猶於遷變行度莫知其始終次序故著此方論云道書類大洞真經一卷右題云高上虛皇君等道書三十七章晉永和中上清紫微元君降授于王夫人是上清高法道藏書六部一曰大洞真部二曰靈寶洞元部三曰太上洞神部四曰太真部五曰太清部六曰正一部邯鄲李氏道書志四類一曰經誥類二曰傳録類三曰丹藥類四曰符篆類皆以此書為之首然唐志不載故以此度人經云西昇經四卷右題曰太上真人尹君紀録老子將遊西域既為關令尹喜説五千言又留秘㫖凡三十六章喜述之為此經其首稱老君西昇聞道竺乾有古先生是以就道說者以古先生佛也事見廣洪明集辯惑論韋注西昇經二卷右梁道士韋處𤣥分上下經上經三七法天之陽數分二十一章下經四七法地之隂數總四十九章象大衍用數云唐志稱處𤣥集解以聞道竺乾為經道竺乾以古先生為老子自謂洞𤣥注西昇經四卷右唐洞𤣥子注其姓名未詳唐志有戴詵注西昇經疑此或詵書也分三十六章謂竺乾古先生非釋氏之號云徐注西昇經二卷右徐道邈撰句曲人未詳何代其本以有古先生善入無為作善入泥丸古先生者吾之師也化乎竺乾作吾之身也化胡竺乾云歩虛經一卷右太極真人傳左仙公其章皆高仙上聖朝𤣥都玉京飛巡虚空之所諷詠故曰歩虚定觀經一卷右題云天尊授左𤣥真人述定心惠觀等修故以為名云老子化胡經十卷右魏明帝為之序經言老子歸崑崙化胡次授􅄢賔後及天竺按裴松之三國志注言世稱老子西入流沙化胡成佛其説葢起于此議化胡經八狀附于後唐志云萬嵗通天元年僧惠澄上言乞毁老子化胡經秋官侍郎劉如璿等議狀證其非偽此是也太清經一卷右太清䕶命靈文金闕上真按付修道之士可以除邪治病云登真隱訣二十五卷右梁陶𢎞景撰景以為學其訣者當由階而登真文多隱非訣莫登故以名書凡七篇十七條隋志云雲笈七籖一百二十卷右皇朝張君房等纂君房祥符中謫官寧海時聖祖降朝廷盡以秘閣道書付杭州俾戚綸陳堯臣校正綸等同王欽若薦君房專其事君房詮次得四千五百六十五卷於是掇其蘊奥總萬餘條成是書仁宗時上之張隨注參同契三卷右皇朝張隨皇祐中居青城山注魏伯陽之書列十數圖于其後參同契太易圖一卷右不題撰人論周天火候有太易太初太始太素太極四象五行等二十四篇并圖按崇文總目云張處撰而李獻臣以為天老神君撰雲常子張處序亦名至藥丹訣未知孰是混元内外鑒二卷延壽經一卷附右混元謂老子也亦導引之術内篇八外篇三玉皇聖胎神用訣一卷右玉皇訣云野人郎肇注太上説魂魄經二卷右題曰老子撰載三魂七魄名字形狀好惡以咒術存制之崇文題曰太上靈書李氏亦有其目無上秘要九十五卷右題曰元始天尊說藝文志止七十二卷不知何時析出二十三通也葛仙翁胎息術一卷右仙翁葛洪也太清服氣口訣一卷太起經一卷閉氣法一卷太上指南歌一卷右四書皆題曰老子撰服氣訣也食氣經一卷右太皇子撰未詳李邯鄲云似雜集之書道引養生圖一卷右梁陶𢎞景撰分三十六勢如鴻鶴徘徊鴛鸞戢羽之類各繪像于其上田偉家本少八勢天真皇人九仙經一卷右天真皇人為黄帝説一行羅公遠葉法靜注論水火龍虎造金丹之術崇文書也按九仙經興廢記云此經黄帝留峩眉山石壁漢武帝時得之大中嘗禁絕隂府内丹經一卷右題曰老子説日月𤣥樞論一卷右唐劉知古撰明皇朝為綿州昌明令時詔求通丹藥之士知古謂神仙大藥無出參同契因著論上于朝大還丹契秘圖一卷右草衣洞真子𤣥撰凡三十章大還丹者乃日月精氣之所致也論火候則以朔望為據記藥物則以鉛汞為名云釋書類華嚴經合論一百二十卷右按纂靈記云華嚴大經龍宫有三本佛滅度後六百年有龍樹菩薩入龍宫誦下本十萬偈四十八品流傳天竺晉有沙門支法領得下本分三萬六千偈至此土義熙十四年譯成六十卷唐證聖元年于闐沙門喜學再譯舊文兼補諸闕通舊總四萬五千頌成八十卷三十九品合論者唐李通𤣥所撰通𤣥太原人宗室子也當武后時隱居不仕舊學佛者皆曰佛説此經時居七處九㑹獨通𤣥以為十處十㑹云華嚴經清凉疏一百五十卷右唐僧澄觀撰澄觀居清凉山號清凉國師即韓愈贈之詩者文元公有言曰明法身之體者莫辨於楞嚴明法身之用者莫辨於華嚴學佛者以為不刋之論華嚴經畧一卷右唐僧澄觀撰澄觀既疏華嚴又撮其大意為此凡四十二章華嚴起信文一卷右唐僧善孜撰善孜潭州太平寺僧也每品一章撮其大指凡三十九章華嚴百門義海兩卷右唐僧法藏撰法藏長安崇福寺僧也分十章華嚴奥㫖一卷右唐僧法藏撰文曰妄盡還源觀凡六門法界披雲集一卷右皇朝僧道遹述杜順纂華嚴經義撰法界觀道遹又分十𤣥門華嚴吞海集一卷右皇朝僧道通述華嚴經七處九㑹三十九品五萬四千偈其文浩博澄觀為之疏尤難觀覽道通約之成萬三千言以便初學法華言句二十卷右唐僧智顗撰智顗居天台山號天台敎五代兵亂其書亡錢俶聞高麗有本厚賂因賈人求得之至今盛行於江浙禪宗金剛經解一卷右皇朝安保衡採摭禪宗自達磨而下發明是經者參釋之序稱其有言渉修證者北宗法門也舉心即佛者江西法門也無法無物本來如是者曹溪法門也建中靖國續燈録三十卷右皇朝僧惟白編惟白靖康初住法雲寺駙馬都尉張敦禮以其書上于朝徽宗為之序分正宗對機拈古頌古偈頌五門古塔主語録三卷右皇朝僧道古撰范文正喜之嘗親為疏請説法有云道行無玷孤風絕攀時以為非溢美也碧巖集十卷右皇朝僧克勤解雪竇頌古名曰碧巖集觀心論一卷右魏菩提達磨撰百法論一卷右唐僧𤣥奘譯西域僧天親所造所謂一切法者其畧有語一心法二心所有法三色法四心不相應行法五無為法心法八種心所有法五十一種色法十一種心不相應行法二十四種無為法六種故曰百法起信論一卷右唐僧宗密注僧真諦譯天竺第十二祖馬鳴大士所造也雖云名相葢明心宗指義𤣥微文辭明緻故盛行于世若肇論百法唯識及此學者皆顓門名家故藏中所收亦録于此辨正論八卷右唐釋法琳撰頴川陳良序云法琳姓陳關中人著此書窮釋老之教源極品藻之名理宣和中以其斥老子語焚毁其第二第四}
