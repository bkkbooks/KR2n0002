  - {type: variant, offset: 17118, length: 0, content: '', WYG: 第六第八凡五卷序文亦有剪棄者破邪論二卷右唐釋法琳撰辨傅弈所排毁虞世南為之序甄正論二卷右唐釋法琳撰已上三書皆經宣和焚毁藏中多闕故録之輔敎編五卷右皇朝僧契嵩撰藤州人皇祐間以世儒多詆釋氏之道因著此書廣引經籍以證三家一致輔相其敎云幕府燕間録十卷右皇朝畢仲詢景儒撰仲詢元豐初為嵐州推官纂當代怪奇可喜之事為二十門羣書古鑑一卷右未詳何人所撰熙寧間集書史中相術驗者稗官志一卷右皇朝吕大辨撰雜記其所聞前言往行師友談記一卷右皇朝李薦方叔撰多記蘇子瞻范純夫及四學士所談論故曰師友龍川畧志六卷龍川别志四卷右皇朝蘇轍撰元符二年夏居循州杜門閉目追惟平昔使其子遠書之于紙凡四十事其秋復記四十七事龍川循州地名天文卜算類司天考占星通𤣥寳鏡一卷右題曰巫咸氏皇朝太平興國中詔天}
