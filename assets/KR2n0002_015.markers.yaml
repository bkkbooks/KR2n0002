  - {type: variant, offset: 17120, length: 2, content: 字匠, WYG: 誤一卷右皇朝王仲至撰韓柳文章譜三卷右皇朝}
  - {type: page-break, offset: 17120, content: '', id: KR2n0002_WYG_008-82a, image: WYG0674/WYG0674-0431a.png}
  - {type: variant, offset: 17123, length: 2, content: 應等, WYG: 大輿撰大輿之意以為文章有莊老之異故取韓愈柳宗元文章為三譜其一取其詩文中官次年月可攷者次第先後著其初晚之異也其一悉取其詩文比敘之其一列當時君相於上以見二人之出處極為詳悉天廚禁臠三卷右皇朝釋惠洪撰論諸家詩格三十三種已見附志今不重}
  - {type: variant, offset: 17126, length: 1, content: 板, WYG: 開書目如后石經周易十卷周易指畧例一卷石經尚書十三卷石經毛詩二十卷石經周禮十二卷石經禮記二十卷石經左氏傳三十卷石經公羊傳十二卷石經穀梁傳十二卷春秋穀梁疏十二卷石經論語十卷石經孟子十四卷韓李論語筆解十卷疑孟一卷仁宗政要四十卷神宗聖訓二十卷東漢刋誤一卷長安志十卷列女傳八卷續一卷百將傳十卷三朝國朝會要一百卷聱隅子十卷鬻子十卷御注老子二卷列子釋文二卷孔叢子七卷劉子三卷御製聖濟經十卷度人經三卷四十二章經一卷神仙可學論一卷蔡邕獨斷二卷花蘂夫人詩一卷華陽集一百卷二種見平泉草木記一卷已載李衛公集中牡丹記一卷已載歐陽公集中一種刪去百中經三卷二本四卷考異三種書同而名異袁本毗陵易傳十一卷衢本作東坡易傳袁本芸閣先生易解一卷衢本作吕氏章袁本陳叔易詩一卷衢本作澗上丈人詩二十一種所載入類不同晁以道易𤣥星紀譜一卷左氏綱領四卷左氏䝉求三卷押韻一卷漁樵問對一卷程氏雜説一卷儒言一卷信聞記一卷以上袁本經類衢本子類古樂府十卷樂府古題要解十卷玉臺新咏十卷玉臺後集十卷以上袁本經類衢本集類松牕録一卷太和辨謗畧三卷以上袁本史類衢本集類神仙傳十卷王氏神仙傳四卷高僧傳二卷求法高僧傳十卷僧寳傳三十二卷以上袁本子類衢本史類馭臣鑒古二十卷汲古論一卷以上袁本集類衢本子類二十九種袁本所載衢本所遺六家經要四卷淳化法帖十卷武陵法帖二十二卷王曾筆録一卷英宗朝諸臣列傳三卷本朝事實三十卷青唐録二卷忠臣逆臣傳三卷藝文志見闕書目一卷酒經三卷晉公談録一卷該聞録十卷漫叟見聞録一卷劉辣小説五卷左氏要類職林二十卷骨鯁集二十卷蘇沈良方十五卷維摩誥所説經三卷六祖壇經二卷修已金剛經㫖要一卷錦囊集一卷員半千三蓮集二十卷余氏至言十八卷藏寂軒文集趙延持盈要論聖紹堯章集十卷藝圃}
