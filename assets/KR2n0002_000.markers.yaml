  - {type: variant, offset: 780, length: 0, content: '', WYG: 杜鄴從張京兆之子學問王粲為蔡中郎所奇皆盡得其家書故鄴以多聞稱而粲以博物顯下逮國朝宋宣獻公亦得畢文簡楊文莊家書故所藏之富與秘閣等而常山公以贍博聞于時夫世之書多矣顧非一人之力所能聚設令篤好而能聚之亦老将至而耄且及豈暇讀哉然則二三子所以能博聞者蓋自少時已得先逹所藏故也公武家自文元公來以翰墨為業者七世故家多書至於是正之功世無與讓焉然自中原無事時已有火厄及兵戈之後尺素不存也公武仕宦連蹇久益窮空雖心志未衰而無書可讀每恨之南陽公天資好書自知興元府至領四川轉運使常以俸之半傳錄時巴蜀獨不被兵人間多有異本聞之未嘗不力求必得而後已歴二十餘年所有甚富旣罷載以舟卽廬山之下居焉宿與公武厚一日貽書曰某老且死有平生所藏書甚秘惜之顧子孫稚弱不自樹立若其心愛名則為貴者所奪若其心好利則為富者所售恐不能保也今舉以付子他日其間有好學者而後歸焉不然則子自取之公武惕然從其命書凡五十篋合吾家舊藏除其複重得二萬四千五百卷有奇今三榮僻左少事日夕躬以朱黄讎校舛誤每終篇輙撮其大指論之豈敢効二三子之博聞所期者不墜家聲而已書則固自若也儻遇其子孫之賢者當如約紹興二十一年元日昭德晁公武序欽定四庫全書郡齋讀書志卷}
