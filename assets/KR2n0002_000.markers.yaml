  - {type: variant, offset: 0, length: 351, content: 昭徳先生讀書志四卷盖所得南陽井氏藏書也井氏始収之禺道聚于廬山之陽旣乃歸先生徙而置之三峨之下書今不可得盡見矣而志獨存冝春士趙希弁公族之秀慱學好古蔵書亦冨遂以属之校正因即其所蔵之目參焉已載者不復取未有者𥙷其缺其間互出者盖詳略之不同文義之或異而後来諸賢之所著述亦藉以㮣見盖為五卷別以讀書附志併鋟諸梓俾得託晁氏而玆傳抑以夀趙君之所蔵慱極君子當肖取於斯淳祐己酉日南至冝春郡假守番陽黎安朝謹書昭徳先生郡齋讀書志門人承議郎新奏辟通判茂州軍州事賜緋杜鵬舉序先生姓晁氏名云武校井氏書為讀書志凡四卷鵬舉作邑峨下望先生滄洲之居雞犬相聞暇即問竒字於古松流水之閒一日叩以此書忻然相付先生慱物洽聞雅稱海内孰知萬籍樓中先生所淂蓋巳超出文㡰而此筌蹄尚足為貧子之光因庚其傳􅚌吾儕晚學於未見書畧知其㮣尚先生刮䝉彂蔀之意云昭德先生郡齋讀書志, WYG: ''}
