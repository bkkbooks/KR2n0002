  - {type: variant, offset: 11116, length: 5185, content: 幕府燕間録十卷右皇朝畢仲詢景儒撰仲詢元豐初爲嵐州推官纂當代恠竒可喜之事爲二十門羣書古鑑一卷右未詳何人所撰熙寧間集書史中相術驗者稗官志一卷右皇朝吕大辨撰雜記其所聞前言徃行師友談記一卷右皇朝李􅞧方叔撰多記蘇子瞻范純夫及四學士所談論故曰師犮龍川略志六卷龍川别志四卷右皇朝蘇轍撰元符二年夏居循州杜門閉目追惟平昔使其子逺書之于紙凢四十事其秋復記四十七事龍川循州地名天文卜筭類司天考占星通玄寳鏡一卷右題曰巫咸氏皇朝興國中詔天下知星者詣京師未幾至者百許人坐私習文或誅配隷海島由是星曆之學殆絕甘石星經一卷右漢甘公石申撰以日月五星三垣二十八宿恒星圖象次舍有占訣以候休咎合元萬分曆一卷右唐曹氏撰未知其名曆元起唐髙宗顯慶五年庚申蓋民間所行小曆也本天笁曆爲法李獻臣云集聖曆一卷右皇朝楊可撰推神物所向擇日辰吉凶應用之法歩天歌一卷右未詳撰人二十八舍地歌也三垣頌五星凌犯賦附于後或云唐王希明自號丹元子五行類八五經三卷右序云黄帝書八五謂八卦五行雖後人依託者而其辭亦馴雅相墓書也青囊本㫖一卷右不記撰人演郭璞相墓青囊經也洞林别訣一卷右江南范越鳯集郭璞所記諸家地里得失爲此書二十四篇并司空珏尋龍入式歌附珞琭子三命賦一卷右李獻臣云珞琭者取珞珞如玉琭琭如石之義推人生吉凶否㤗之法李虚中命書三卷右唐李虚中撰虚中字常容姓纂云同之八代孫學最深於五行書壽夭貴賤利不利輙先處其年時萬不失一韓愈言同爲虚中十一世祖誤也五行秘訣一卷右皇朝林開撰占燈法一卷右唐李淳風撰崇文揔目亦有之觀燈法一卷右唐李淳風撰袖中記一卷右皇朝唐濬撰辨人形色相知其壽夭吉凶集聖暦四卷右皇朝楊可集可爲司天冬官正輯古今隂陽書彚爲四時以㳙擇日辰云兵家類六韜六卷右周吕望撰案漢藝文志無此書梁隋唐始著録分文武龍虎豹犬六目兵家權謀之書也魏武注孫子一卷右呉孫武撰魏武帝注按藝文志孫子兵法八十二篇今魏武所注止十三篇杜牧以爲武書數十萬言魏武削其繁剰筆其精粹成此書云其序略曰吾讀兵書戰䇿多矣武所著深矣李筌注孫子三卷右唐李筌注以魏武所解多誤約歴代史依遁甲注成三卷杜牧注孫子三卷右唐杜牧之注牧以武書大略用仁義使機權曹公所注解十不釋一而其所得自爲新書尔因備注之世謂牧慨然最喜論兵欲試而不得其學能道春秋戰國時事甚慱而詳知兵者將有取焉陳皥注孫子三卷右唐陳皥撰皥以曹公注隱微杜牧注闊踈重爲之注云紀爕集注孫子三卷右唐紀爕集唐孟氏賈林杜佑三家所解梅聖俞注孫子三卷右皇朝梅堯臣聖俞注歐公爲之序王晢注孫子三卷右皇朝王晢撰晢以古本校正闕誤又爲之注仁廟時天下乆承平人不習兵元昊旣叛邊將數敗朝廷頗訪知兵者士大夫人言兵矣故本朝注解孫武書者大抵皆當時人也何氏注孫子三卷右不題姓氏近代人也呉子三卷右魏呉起撰言兵家機權法制之說唐陸希聲類次為之說料敵治兵論將變動勵士凢六篇云司馬法三卷右齊司馬穰苴撰威王使大夫追論古者司馬兵法而附穰苴於其中因號司馬穰苴兵法司馬遷謂其書關黄石公三略三卷右題曰黄石公上中下三略其書論用兵機權之妙嚴明之決軍可以死易生國可以存易亡經籍志云下邳神人撰世傳此即圯上老人以一編書授漢張良者尉繚子五卷右尉繚子未詳何人書主刑法兵戰按漢藝文志有二十九篇今逸五篇首篇稱梁恵王問意者魏人與張横渠注尉繚子一卷右皇朝張載撰其辭甚簡略李衛公對問三卷右唐李靖對太宗問兵事元豐中并六韜孫呉三略尉繚子司馬兵法類爲一書頒之武學名曰七書史臣謂李靖兵法世無完書略見於通典今對問出於阮逸家或云逸因杜氏附益之李臨淮武記一卷右唐李光弼撰其書凢五十章末云吕望智廓而逺孫武思幽而宻黄石寛而重斷呉起嚴而貴勇墨翟守而無攻老𣆀勝而不美今擇其精要雜以愚識爲一家之書或題曰光弼從事張參所纂云人事軍律三卷右皇朝符彦卿撰其序稱言兵者多雜以隂陽殊不知徃亡宋捷甲子胡興鵝入梟集飜成吉兆故此但述人事云或以爲唐僧利正撰當考之庾衮保聚圖一卷右晉庾衮撰衮字叔褒西晉末保禹山張泓張昌不能犯所全活者母慮數百萬元康三年己酉因撰保聚壘議二十篇武侯十六䇿一卷右蜀諸葛亮孔明撰序稱謹進便冝十六事一治國二君臣三視聽四納言五察疑六治民七舉措八考黜九治軍十賞罰十一喜怒十二治乱十三敎令十四斬斷十五思慮十六隂察陳壽録孔明書不載此䇿疑依託者神武祕要十卷右皇朝仁宗御撰纂古今兵書戰䇿及舊史成敗之迹類權謀形勢隂陽技巧九門左氏要類右皇朝韓迪撰纂左氏兵事凢五十門類書類同姓名録三卷右梁元帝撰纂類歷代同姓人成書一卷唐陸善經續增廣之初學記三十卷右唐徐堅等撰初張說類集事要以教諸王開元中詔堅與韋述余欽施敬本張烜李銳孫季良分門撰次藝文類聚一百卷右唐歐陽詢等分門類事兼采前世賦詩銘頌文章附于逐目之後按唐志詢與令狐德棻袁朗趙智弘同修古今刀劒録一卷右唐梁陶弘景撰記古今刀劒古鏡記一卷右未詳撰人纂古鏡故事六帖三十卷右唐白居易撰以天地事物分門類爲對偶而不載所出書曾祖父祕閣公爲之注行于世世傳居易作六帖以陶家缾數千各題名目置齋中命諸生採集其事類投缾内倒取之抄録成書故所記時代多無次序云記室新書三十卷右唐李途撰采摭故事綴爲偶儷之句分四百門途爲東川掌記因以名其書云兎薗䇿十卷右唐虞丗南撰奉王命纂古今事爲四十八門皆偶儷之語戚苑英華十卷右唐袁恱重修本楊名所著恱掇其要類爲對以他說附益之通典二百卷右唐杜佑撰先是劉秩采經史自黄帝迄唐天寳末制度㳂革廢置論議得失倣周禮六官法爲政典三十五篇房琯稱才過劉向佑以爲未盡因廣之參以新禮爲二百篇以食貨選舉職官禮樂刑法州郡邊防八門分類序載世推該洽凢三十六年成書德宗時上之五代㑹要三十卷右皇朝王漙等撰采梁至周典故纂次建隆初上之節國朝㑹要十二卷右皇朝章得象等天聖中被詔以國朝故事因革制度編次宋綬馮元李淑王舉正王洙同修得象監緫慶曆四年書成上之凢一百五十卷范師道以其猥冗節其要以備檢閱古城塚記二卷右唐皇甫覽撰記古城新築之人姓名初不及塚而名曰城塚記未知其說太平緫領五十卷右皇朝李昉等撰太平興國中昉被詔纂經史故事分門編次六帖初學記之類也職林二十卷右皇朝楊侃纂集歷代職官㳂革之故蓋因通典職官門增廣而巳書林韻海一百卷右不題撰人分門依韻纂經史雜事以備㝷閲或云皇朝許冠所編異號録二十卷右皇朝馬永易明叟編古今殊異名號如銅馬帝無愁天子之類頃嘗見近世人増廣其書名曰實賔録亦殊該博硯譜二卷右皇朝唐詢撰記硯之故事及其優劣以絲石爲第一端石次之古鼎記一卷右唐虞協撰記古人鑄鼎本原及其形製洽聞記三卷右不題撰人分二十門雜記經史名數或題童子洽聞記云唐許塾撰骨鯁集二十卷右皇朝靖康初復修祖宗故事時人或集本朝諸公諌䟽成此書書叙指南二十卷右皇朝任浚撰纂集古今文章碎語分門編次之凢二百餘類歌詩押韻二十四卷右皇朝楊咨撰裒集古今詩可以爲矩矱者編爲押韻侍女小名録一卷右皇朝王銍纂序云大觀中居汝隂與洪炎玉父遊讀陸魯望小名録戯徴古今女侍名字因盡發所藏書籍餘月而成焉香譜一卷右皇朝洪芻駒父撰集古今香法有鄭康成漢宫香南史小宗香眞誥嬰香戚夫人迎駕香唐貟半千香所記甚該傳荆楚歳時記一卷右梁宗懔撰其序云傅玄之朝會社駕之上巳安仁秋興之叙君道娱蜡之述其属辤則巳洽其比事則未弘某率爲小記以録荆楚歳時自元日至除夕凢二十餘事雜藝術類古畫品録一卷右南齊謝赫撰言畫有六法分四品續畫記一卷右唐李嗣眞撰謝赫之闕俊畫録一卷右唐僧彦悰品長安名畫凢二十七人名畫獵精六卷右唐張彦逺纂記歷代畫工名姓自史皇以降至唐朝及論畫法并裝背禠軸之式鑒别閱玩之方書畫史二卷右皇朝米䒥元章撰輯本朝公卿士庶家藏法書名畫論其優劣眞僞五代名畫𥙷遺一卷右皇朝劉道成纂符嘉祥撰序云胡嶠嘗有梁朝名畫目因廣之故曰𥙷遺聖朝名畫評三卷右皇朝劉道成纂符嘉應撰集本朝畫工之名丗者第其品以王瓘爲神品云在呉生上益州名畫録三卷右皇朝黃休復纂唐乹符𥘉至宋乾德歳休復在蜀中目擊圗畫之精者五十八人品以四格云射評要略一卷右題曰李廣撰凢十五篇嚴悟射訣一卷右唐王思永撰思永學射法於成都工曹嚴悟成書十篇毎篇首必稱師曰木射圖一卷右唐陸秉撰爲十五筍以代侯擊地毬以觸之筍飾以朱墨字以貴賤之朱者仁義禮智信温良恭儉譲墨者慢傲佞貪濫仁者勝濫者負而行一賞罰焉投壷經一卷右唐上官儀奉勑刪定史玄道續注采周顒郝同梁簡文數家書爲之唐志有其目樗蒲經一卷樗蒲格一卷右不題撰人序云樗蒲古之戯也劉毅李安民慕容寳之徒皆擲盧不聞餘采今以盧三擲爲上雉犢次之釣鼇圖一卷右不題撰人凢四十類各有一詩採珠局一卷右不題撰人序云王公而不知其名凢三十餘類亦各有一詩彈棊經一卷右未詳撰人序稱世說曰魏武帝好彈棊宮中皆効之難得其局以粧奩之蓋形狀相類就蓋而殫之俗中因謂魏宮粧奩之戯按西京雜記云劉向作彈棊典論云前代馬合卿張公皆工彈棊然則起自漢朝非自魏始世說誤矣象棊經一卷右皇朝尹洙撰凢五圖今丗所行者不與焉捉卧甕人事數一卷右皇朝李庭中撰以畢卓嵇康劉伶阮孚山簡阮籍儀狄顔囬屈原陶潜孔融陶侃張翰李白白樂天爲目有趙昌言序雙陸格一卷右不題撰人其法左右十二梁設二朋朋各十五子一白一墨用明瓊二各以其采由右歸左子單則他子得擊兩子以上他子雖相當不得擊故武后夢雙六不勝狄仁傑所以云無子也益津射格一卷右皇朝錢師益序以五善圖及武陵格踈宻不同參酌爲之三國圖格一卷金龍戯格一卷打馬格一卷旋棊格一卷右不題撰人漢官儀彩選一卷右皇朝劉敞撰刪取西漢之官而附其列傳黜陟可戯笑者雜編之以爲博奕之一物忘憂集三卷右皇朝劉仲甫編載唐韋延祐棊訣并古今棊圖六問筭法五卷右皇朝龍受益撰并化零歌附應用筭三卷右皇朝蔣舜元撰醫家類黃帝素問二十四卷右唐王砅注叙謂漢藝文志有黃帝内經十八卷素問即其經之九卷兼靈樞九卷廼其數焉先是第七亡逸砅時始獲乃詮次注釋凢八十一篇二十四卷今又亡剌法本論二篇砅自號啓玄子黃帝八十一難經一卷右秦越人撰呉吕廣注唐楊玄操演越人授尭君祕術洞明醫道采黃帝内經精要之說凢八十一章編次爲十三類其理趣深逺非易了故名難經補注神農本草二十卷右皇朝掌禹錫等補注舊說本草經神農所作而藝文志所不載平帝紀詔天下舉通知方術本草者本草之名蓋起于此梁之錄載神農本草三卷書中有後漢郡縣名蓋上丗未著文字師學相傳至張機華佗始爲編述嘉祐初詔禹錫與林億蘇頌張洞等爲之補注以開寳本草及諸家參校采拾遺逸判定新舊藥合一千八十二種揔二十卷圖經本草二十卷目錄一卷右皇朝蘇頌等撰先是詔掌禹錫林億等六人重校神農本草累年成章奏御又詔郡縣圖上所産藥本用永徽故事重命編述於是頌再與禹錫等裒集衆說類聚詮次各有條目云嘉祐六年上脉經十卷右晉王叔和撰纂𡵨伯華佗論書論脉要訣巢氏病源候論五卷右隋巢元方等撰元方大業中𬒳命與諸醫異論衆病所起之源皇朝昭陵時詔校本刻牘頒行宋綬爲序外臺袐要方四十卷右唐王燾撰燾之序云嘗得古方書數千百卷因述諸病證候刪集方藥符禁鍼灸之法本草廣義二十卷右皇朝冦宗奭編以本草二部著撰之人或執用巳私失於商榷併行諸家之說參之事實覈其情理證其誤脫以成其書天元玉䇿三十卷右啓元子撰即唐王砅也書推五運六氣之變産寳二卷右僞蜀昝殷撰輯産乳備驗方藥三百七十八首銅人腧穴鍼灸圖三卷右皇朝王惟德撰仁宗嘗詔惟德考次鍼灸之法鑄銅人爲式分腑臓十二經旁注俞穴所㑹刻題其名并爲圖法并主療之術勒刻板傳于丗夏竦爲序明堂者謂雷公問道黃帝授之故名云太醫局方十卷右元豐中詔天下髙手醫各以得効祕方進下太醫局驗試依方製藥鬻之仍摸傳于丗沈存中良方十五卷右皇朝沈括存中撰博學通醫術故類其經驗方成此書用者多驗或以蘇子瞻論醫藥雜說附之靈苑方二十卷右皇朝沈括存中編本朝士人如髙若訥林億孫竒龐安常皆以善醫名丗而存中尤喜方書此中所載多可用博濟方五卷右皇朝王衮撰錢氏小兒方八卷右皇朝錢乙仲陽撰神宗時擢太醫丞於書無所不窺它人靳靳守古獨度越縱舍卒與法合尤邃本草多識物理辨正闕誤最工療嬰孺病年八十二而終閻孝忠方附于後蘇沈良方十五卷右皇朝沈括通醫學嘗集得效方成一書後人附益以蘇軾醫藥雜說故曰蘇沈南陽活人書二十卷右皇朝朱肱撰序謂張長沙傷寒論其言雅奥非精於經略不能曉㑹頃因投閑設爲對問補冝綴緝僅成卷軸作於已已成于戊子計九萬一千三百六十八字神仙類黄庭内景經一卷右題太帝内書藏湯谷隂三十六章不載注人皆七言韻語叙云扶桑太帝命湯谷神王傳魏夫人一名東華玉篇黄者二儀正色庭者四方之中近取諸身以脾爲主故曰黄庭黄庭外景經一卷右叙謂老子所作旡陽子注分上中下三篇亦皆七言韻語元陽子不詳其人老君内觀經一卷右凢十二章首皆云老君曰其言皆修心錬神之法真誥七卷右梁陶弘景撰皆真人口受之誥故以爲名記許邁許謐楊羲諸仙受道之説參同契三卷右漢魏伯陽撰按神仙傳伯陽㑹稽上虞人通貫詩律文辭贍慱修真飬志約周易作書凢九十篇徐氏箋注桓帝時以授同郡淳于叔通因行于世彭曉爲之解隋唐書目皆不載按唐陸德明解易序云虞翻注參同契言字從日下月今此書有日月爲易之文則其爲古書明矣坐忘論一卷右唐司馬丞禎字子微撰凢七篇其後有文元公跋謂子微之所謂坐忘即釋氏之言宴坐也肈論四卷右姚秦僧洪肈撰師羅什規模莊周之言以著此書物不遷不真空涅槃無知般若無名四論傳燈録云肈後爲姚興所殺髙僧傳不載其事天隱子一卷右唐司馬子微爲之序云天隱不知何許人著書八篇修鍊形氣飬和心靈歸根契於伯陽遺照齊乎莊叟殆非人間所能力學者王古以天隱子即子微也一本有三宫法附于後, WYG: ''}
