  - {type: variant, offset: 9919, length: 1, content: 玄, WYG: 幕府燕間録十卷右皇朝畢仲詢景儒撰仲詢元豐初為嵐州推官纂當代怪奇可喜之事為二十門羣書古鑑一卷右未詳何人所撰熙寧間集書史中相術驗者稗官志一卷右皇朝吕大辨撰雜記其所聞前言往行師友談記一卷右皇朝李薦方叔撰多記蘇子瞻范純夫及四學士所談論故曰師友龍川畧志六卷龍川别志四卷右皇朝蘇轍撰元符二年夏居循州杜門閉目追惟平昔使其子遠書之于紙凡四十事其秋復記四十七事龍川循州地名天文卜算類司天考占星通𤣥寳鏡一卷右題曰巫咸氏皇朝太平興國中詔天下知星者詣京師未幾至者百許人坐私習天文或誅或配𨽻海島由是星厯之學殆絕故予所藏書中亦無幾姑裒數種以備數云甘石星經一卷右漢甘公石申撰以日月五星三垣二十八宿恒星圖象次舍有占訣以候休咎合元萬分厯一卷右唐曹氏撰未知其名厯元起唐高宗顯慶五年庚申葢民間所行小厯也本天竺厯為法李獻臣云集聖厯一卷右皇朝楊可撰推神物所向擇日辰吉凶應用之法歩天歌一卷右未詳撰人二十八舍歌也三垣頌五星凌犯賦附于後或云唐王希明撰自號丹元子五行類八五經三卷右序云黄帝書八五謂八卦五行雖後人依託者而其辭亦馴雅相墓書也青囊本㫖一卷右不記撰人演郭璞相墓青囊經也洞林别訣一卷右江南范越鳯集郭璞所記諸家地里得失為此書二十四篇并司空珏尋龍入式歌附珞琭子三命賦一卷右李獻臣云珞琭者取珞珞如石琭琭如玉之義推人生吉凶否泰之法李虛中命書三卷右唐李虛中撰虛中字常容姓纂云同之八代孫學最深於五行書壽夭貴賤利不利輒先處其年時萬不失一韓愈言同為虛中十一世祖誤也五命秘訣一卷右皇朝林開撰三命之術年月日支干也加以時胎故曰五命占燈法一卷右皇朝李淳風撰崇文總目亦有之觀燈法一卷右唐李淳風撰袖中記一卷右唐朝李唐濬撰辨人形色知其壽夭吉凶集聖厯四卷右皇朝楊可集可為司天冬官正輯古今隂陽書彚為四時以涓擇日辰云兵家類六韜六卷右周吕望撰案漢藝文志無此書梁隋唐始著録分文武龍虎豹犬六目兵家權謀之書也魏武注孫子一卷右呉孫武撰魏武帝注按藝文志孫子兵法八十二篇今魏武所注止十三篇杜牧以為武書數十萬言魏武削其繁剰筆其精粹成此書云其序畧曰吾讀兵書戰策多矣武所著深矣李筌注孫子三卷右唐李筌注以魏武所解多誤約歴代史依遁甲注成三卷杜牧注孫子三卷右唐杜牧牧之注牧以武書大畧用仁義使機權曹公所注解十不釋一葢惜其所得自為新書爾因備注之世謂牧慨然最喜論兵欲試而不得者其學能道春秋戰國時事甚博而詳知兵者有取焉陳皥注孫子三卷右唐陳皥撰皥以曹公注隱微杜牧注濶疎重為之注云紀燮集注孫子三卷右唐紀燮集唐孟氏賈林杜佑三家所解梅聖俞注孫子三卷右皇朝梅堯臣聖俞注歐公為之序王晳注孫子三卷右皇朝王晳撰晳以古本校正闕誤又為之注仁廟時天下久承平人不習兵元昊既叛邊將數敗朝廷頗訪知兵者士大夫人人言兵矣故本朝注解孫武書者大抵皆當時人也何氏注孫子三卷右不題姓氏近代人也呉子三卷右魏呉起撰言兵家機權法制之說唐陸希聲類次為之説料敵治兵論將變化勵士凡六篇云司馬法三卷右齊司馬穰苴撰威王使大夫追論古者司馬兵法而附穰苴於其中因號司馬穰苴兵法司馬遷謂其書閎廓深遠雖三代征伐未能竟其義如其文近亦少褒矣穰苴為區區小國行師何暇及司馬兵法之揖讓乎黄石公三畧三卷右題曰黄石公上中下三畧其書論用兵機權之妙嚴明之决明妙審决軍可以死易生國可以存易亡經籍志云下邳神人撰世傳此即圯上老人以一編書授漢張良者尉繚子五卷右尉繚子未詳何人書主刑法兵戰按漢藝文志有二十九篇今逸五篇首篇稱梁惠王問意者魏人與張横渠注尉繚子一卷右皇朝張載撰其辭甚簡畧李衛公對問三卷右唐李靖對太宗問兵事元豐中并六韜孫呉三畧尉繚子司馬兵法類為一書頒之武學名曰七書史臣謂李靖兵法世無完書畧見於通典今對問出於阮逸家或云逸因杜氏附益之李臨淮武記一卷右唐李光弼撰其書凡一百二章末云吕望智廓而遠孫武思幽而密黄石寛而重斷呉起嚴而貴勇墨翟守而無攻老􅅨勝而不美今擇其精要雜以愚識為一家之書題曰統軍靈轄寶秘策或云光弼從事張參所纂人事軍律三卷右皇朝符彥卿撰其序稱言兵者多雜以隂陽殊不知往亡宋捷甲子胡興鵞入梟集翻成吉兆故此但述人事云或以為唐燕僧利正撰當考之庾袞保聚圖一卷右晉庾袞撰袞字叔褒西晉末保禹山張泓張昌不能犯所全活者毋慮數百萬元康三年己酉因撰保聚壘議二十篇武侯十六策一卷右蜀諸葛亮孔明撰序稱謹進便宜十六事一治國二君臣三視聴四納言五察疑六治民七舉措八考黜九治軍十賞罰十一喜怒十二治亂十三敎令十四斬斷十五思慮十六隂察陳壽録孔明書不載此策疑依託者神武秘畧十卷右皇朝仁宗御撰纂古今兵書戰策及舊史成敗之迹類權謀形勢隂陽技巧凡四門三十篇左氏要類其事類投缾内倒取之抄録成書故所記時代多無次序云記室新書三十卷右唐李途撰采摭故事綴為偶儷之句分四百門途為東川掌記因以名其書云園策十卷右唐虞世南撰奉王命纂古今事為四十八門皆偶儷之語戚苑英華十卷右唐袁悅重修本楊名所著悦掇其要類為語對以他説附益之通典二百卷右唐杜佑撰先是劉秩採經史自黄帝迄唐天寶末制度沿革廢置論議得失倣周禮六官法為政典三十五篇房琯稱才過劉向佑以為未盡因廣之參以新禮為二百篇以食貨選舉職官禮樂刑法州郡邊防八門分類序載世推該洽凡三十六年成書徳宗時上之五代㑹要三十卷右皇朝王溥等撰采梁至周典故纂次建隆初上之節國朝㑹要十二卷右皇朝章得象等天聖中被詔以國朝故事因革制度編次宋綬馮元李淑王舉正王洙同修得象監總慶厯四年書成上之凡一百五十卷范師道以其猥冗節其要以備檢閲古城塜記二卷右唐皇甫鑒撰記古城所築之人姓名初不及塜而名曰城塜記未知其説太平總領五十卷右唐朝李昉等撰太平興國中昉被詔纂經史故事分門編次六帖初學記之類也職林二十卷右皇朝楊侃纂集歴代職官沿革之故葢因通典職官門増廣而已書林韻海一百卷右不題撰人分門依韻纂經史雜事以備尋閱或云皇朝許冠所編異號録二十卷右皇朝馬永易明叟編古今殊異名號如銅馬帝無愁天子之類頃嘗見近世人増廣其書名曰賔實録亦殊該博硯譜二卷右皇朝唐詢撰記硯之故事及其優劣以紅絲石為第一端石次之古鼎記一卷右唐呉協撰記古人鑄鼎本原及其形製洽聞記三卷右不題撰人分二十門雜記經史名數或題童子洽聞記云唐許塾撰骨鯁藥二十卷右皇朝靖康初復修祖宗故事時人或集本朝諸公諫疏成此書書敘指南二十卷右皇朝任浚撰纂集古今文章碎語分門編次之凡二百餘類歌詩押韻二十四卷右皇朝楊咨撰裒集古今詩可以為矩矱者編為押韻侍女小名録一卷右皇朝王銍纂序云大觀中居汝隂與洪炎玉父遊讀陸魯望小名録戲徴古今女侍名字因盡發所藏書籍纂集餘月而成焉香譜一卷右皇朝洪芻駒父撰集古今香法有鄭康成漢宫香南史小宗香真誥嬰香戚夫人迫駕香唐員半千香所記甚該博然通典載厯代祀天用水沉香獨遺之何耶荆楚歲時記一卷右梁宗懔撰其序云傅𤣥之朝㑹杜駕之上已安仁秋興之叙君道娛蜡之術其屬辭則已洽其比事則未𢎞某率為小記以録荆楚時風物故事自元日至至除夕凡二十餘事雜藝術類古畫品録一卷右南齊謝赫撰言畫有六法分四品續畫記一卷右唐李嗣真撰補謝赫之闕後畫錄一卷右唐僧彦悰撰品長安名畫凡二十七人名畫獵精六卷右唐張彥遠纂記歴代畫工名姓自史皇以降至唐朝及論畫法并裝背禠軸之式鑒别閱玩之方書畫史二卷右皇朝米芾元章撰輯本朝公卿士庶家藏法書名畫論其優劣真偽五代名畫補遺一卷右皇朝劉道成纂符嘉應撰序云胡嶠嘗有梁朝名畫録因廣之故曰補遺聖朝名畫評三卷右皇朝劉道成纂符嘉應撰集本朝畫工之名世者第其品以王瓘之為神品云在呉生上益州名畫録三卷右皇朝黄休復纂唐乾符初至宋乾徳嵗休復在蜀中目擊圖書之精者五十八人品以四格云射評要畧一卷右題曰李廣撰凡十五篇嚴悟射訣一篇右唐王思永撰思永學射法於成都工曹嚴悟成書十篇每篇首必稱師木射圖一卷右唐陸秉撰為十五筍以代侯擊地毬以觸之筍飾以朱墨字以貴賤之朱者仁義禮智信溫良恭儉讓墨者慢傲佞貪濫仁者勝濫者負而行一賞罰焉投壺經一卷右唐上官儀奉勅刪定史𤣥道續注采周顒郝同梁簡文數家書為之唐志有其目樗蒲經一卷樗蒲格一卷右不題撰人序云樗蒲古之戲也劉毅李安民慕容寶之徒皆擲盧不聞餘采今以盧梟為上雉犢次之釣鼇圖一卷右不題撰人凡四十類各有一詩採珠局一卷右不題撰人序云王公而不知其名凡三十餘類亦各有一詩彈棊經一卷右未詳撰人序稱世説曰魏武帝好彈棊宫中皆効之難得其局以粧奩之葢形狀相類就葢而彈之俗中因謂魏宫粧奩之戲按西京雜記云劉向作彈棊典論云前代馬合卿張公子皆工彈棊然則起於漢朝非自魏始世說誤矣象棊經一卷右皇朝尹洙撰凡五圖今世所行者不與焉捉卧甕人事數一卷右皇朝李庭中撰以畢卓嵇康劉伶阮孚山簡阮籍儀狄顏回屈原陶潛孔融陶侃張翰李白白樂天為目有趙昌言序雙陸格一卷右不題撰人其法左右十二梁設二朋朋各十五子一白一墨用明瓊二各以其采由右歸左子單則他子得擊兩子以上他子雖相當不得擊故武后夢雙陸不勝狄仁傑所以云無子也益津射格一卷右皇朝錢師益序以五善圖及武陵格疎密不同參酌為之三國圖格一卷金龍戲格一卷打馬格一卷旋棊格一卷右不題撰人漢官儀彩選一卷右皇朝劉敞撰刪取西漢之官而附其列傳黜陟可戲笑者雜編之以為博弈之一物忘憂集三卷右皇朝劉仲甫編載唐韋延祐棊訣并古今棊圖六問算法五卷右皇朝龍受益撰并化零歌附應用算法三卷右皇朝蔣舜元撰醫家類黄帝素問右唐王砯注砯謂漢藝文志有黄帝内經十八卷素問即其經之九卷兼靈樞九卷迺其數焉先是第七亡逸砯時始獲乃詮次注釋凡八十一篇分二十四卷今又亡刺法本論二篇砯自號啟𤣥子黄帝八十一難經一卷右秦越人撰呉吕廣注唐楊𤣥操演越人授桑君秘術洞明醫道采黄帝内經精要之説凡八十一章編次為十三類其理趣深遠非易了故名難經補注神農本草二十卷右皇朝掌禹錫等補注舊説本草經神農所作而藝文志所不載平帝紀詔天下舉通知方術本草者本草之名葢起於此梁之録載神農本草三卷書中有後漢郡縣名葢上世未著文字師學相傳至張機華佗始為編述嘉祐初詔禹錫與林億蘇頌張洞等為之補注以開寶本草及諸家參校采拾遺逸判定新舊藥合一千八十二種總二十卷圖經本草二十卷目録一卷右皇朝蘇頌等撰先是詔掌禹錫林億等六人重校神農本草累年成書奏御又詔郡縣圖上所產藥本用永徽故事重命編述於是頌再與禹錫等裒集衆説類聚詮次各有條目云嘉祐六年上脈經十卷右晉王叔和撰纂岐伯華佗等論脈要訣巢氏病源候論五卷右隋巢元方等撰元方大業中被命與諸醫共論衆病所起之源皇朝昭陵時詔校本刻牘頒行宋綬為序外臺秘要方四十卷右唐王燾撰燾之序云嘗得古方書數千百卷因述諸病證候刪集方藥符禁鍼灸之法本草廣義二十卷右皇朝冦宗奭編以本草二部著撰之人或執用已私失於商確併考諸家之説參之事實覈其情理證其脱誤以成其書天元玉策三十卷右啟元子撰即唐王砯也書推五運六氣之變產寶二卷右偽蜀昝殷撰輯產乳備驗方藥二百七十八首銅人腧穴鍼灸圖三卷右皇朝王惟徳撰仁宗嘗詔惟徳考次鍼灸之法鑄銅人為式分腑臟十二經旁注俞穴所㑹刻題其名并為圖法并主療之術刻板傳于世夏竦為序明堂者謂雷公問道黄帝授之故名云太醫局方十卷右元豐中詔天下高手醫各以得効秘方進下太醫局驗試依方製藥鬻之仍摸本傳于世沈存中良方十五卷右皇朝沈括存中撰存中博學通醫術故類其經驗方成此書用者多驗或以蘇子瞻論醫藥雜說附之靈苑方二十卷右皇朝沈括存中編本朝士人如高若訥林億孫奇龎安常皆以善醫名世而存中尤善方書此中所載多可用博濟方五卷右皇朝王袞撰錢氏小兒方八卷右皇朝錢乙仲陽撰神宗時擢太醫丞於書無所不窺它人靳靳守古獨度越縱舍卒與法合尤邃本草多識物理辨正闕誤最工療嬰孺病年八十二而終閻季忠方附于後蘇沈良方十五卷右皇朝沈括通醫學嘗集得効方成一書後人附益以蘇軾醫藥雜説故曰蘇沈南陽活人書二十卷右皇朝朱肱撰序謂張長沙傷寒論其言雅奥非精於經絡不能曉㑹頃因投閒設為對問補苴得緝僅成卷軸作於己巳成于戊子計九萬一千三百六十八字神仙類黄庭内景經一卷右題大帝内書藏暘谷隂三十六章不載注人皆七言韻語梁丘子敘云扶桑大帝命𤾉谷神王傳魏夫人一名東華玉篇黄者二儀正色庭者四方之中近取諸身以脾為主故曰黄庭黄庭外景經一卷右敘謂老子所作元陽子注分上中下三篇亦皆七言韻語元陽子不詳其人老君内觀經一卷右凡十二章首皆云老君曰其言皆修心鍊神之法真誥七卷右梁陶𢎞景撰皆真人口受之誥故以為名記許邁許謐楊羲諸仙受道之説參同契三卷右漢魏伯陽撰按神仙傳伯陽㑹稽上虞人通貫詩律文辭贍博修真養志約周易作此書凡九十篇徐氏箋注桓帝時以授同郡淳于叔通因行于世彭曉為之解隋唐書目皆不載按唐陸徳明解易字云虞翻注參同契言字從日下月今此書有日月為易之文則其為古書明矣坐忘論一卷右唐司馬承禎字子微撰凡七篇其後有文元公跋謂子微之所謂坐忘即釋氏之言宴坐也肇論四卷右姚秦僧洪肇撰師羅什規模莊周之言以著此書物不遷不真空􅄺槃無知般若無名四論傳燈録云肇後為姚興所殺高僧傳不載其事天隱子一卷右唐司馬子微為之序云天隱子不知何許人著書八篇修鍊形氣養和心靈歸根契於伯陽遺照齊乎莊叟殆非人間所能力學者也王古以天隱子即子微也一本有三宫法附于後𤣥}
