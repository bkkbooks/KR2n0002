  - {type: variant, offset: 9884, length: 275, content: 具見於此張忠文公節義録四卷右張公叔夜告敕奏劄書東北行記旌忠愍節廟碑及事類也譜諜類仙源積慶圖三卷右三祖下宗室派系也皇族登科題名一卷右大宗正嗣濮王士輵宗正丞耿延年所編也淳熈二年成書始於元祐三年李常寧榜子湜令馡厥後嗣而益之延年持節鍾官鋟木於饒洪文敏公邁書于後安定先生丗系述一卷右胡瑗丗系源委也瑗字翼之泰州如臯人也瑗爲人師言行而身化之使誠明者逹昏愚者厲而頑傲者革故其爲法嚴而信爲道乆而尊自景祐明道以來學者有師惟瑗與孫復石介三人瑗以布衣召見論樂拜校書郎嘗爲湖州學官慶暦四年建太學于京師有司請下湖州取瑗教學之法以爲則召爲諸王宫教授以疾免巳而以太子中允致仕皇祐中召, WYG: ''}
