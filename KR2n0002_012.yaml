body:
  text: 子類伊川孟子解十四卷右皇朝程頥正叔撰頥居洛陽其門人號之為伊川先生云百家孟子解十二卷右集古今諸儒自裴日休至強至賈同百餘家解孟子成一編王安石解孟子十四卷王雱解孟子十四卷許允成解孟子十四卷右皇朝王安石介甫素喜孟子自為之解其子雱與其門人許允成皆有注釋崇觀間埸屋舉子宗之點注孟子十四卷右皇朝熙寧中蜀州張簡點節經注附以釋文以教童子董子一卷右周董無心撰皇朝吳祕注無心在戰國時著書闢墨子説玄一卷右唐王涯廣津撰涯始以正元丙子終於元和己丑二十六年間注太玄為六卷今不之見獨此書行于世凡五篇一明宗二立例三揲法四占法五辨首宋惟幹太玄解十卷右皇朝宋惟幹注惟幹嘗得太玄古本于昭應咸平中知滑臺取宋衷陸績范望三家訓解别為之注仍作太玄宗旨兩篇附于後其學蓋師濟東田告司馬溫公所謂小宋者也陳漸演玄十卷右皇朝陳漸撰漸堯佐族子也國史有傳凡十四篇漸謂史以揚雄非聖人而作經猶吳楚僣王今按法言解嘲止云太玄然則經非其自稱弟子侯芭之徒尊之耳太玄淵旨一卷右皇朝張揆撰溫公集注太玄經十卷右皇朝司馬光君實集漢宋衷解詁吳陸績釋文晉范望解贊唐王涯注經及首測宋惟幹通注陳漸演玄吳祕音義七家為此書自慶曆至元豐凡三十年始成其直云宋者衷也小宋者惟幹也惟幹漸祕皆國朝人溫公集注法言十三卷右皇朝司馬光君實集晉李軌唐柳宗元國朝宋咸吳祕注光自言少好此書歷年已多今輒采諸家所長附以已意名曰集注凡觀書者當先正其文辨其音然後可以求其義故宋相公庠家有李祠部注本及音義最為精詳宋吳亦據李本而其文多異同今參以漢書取其通者以為定本先審其音乃解其義云元經十卷右隋王通撰唐薛收傳皇朝阮逸學起晉惠帝太熙元年終於陳亡豫從兄子逸仕安康嘗得其本歸而示四父四父讀至帝問蛙鳴哂其陋曰六籍奴婢之言不為過按崇文無其目疑逸依託為之帝範一卷右唐太宗撰凡二十篇今存者六篇正觀末著此書以賜高宗且曰修身治國備在其中一旦不諱更無所言矣其末頗以汰侈自咎以戒高宗俾勿效已殊不知閨門之內慙德甚多豈特汰侈而已哉武后之立實有自來不能身教多言奚益悲夫臣範二卷右唐則天皇后武氏撰範或作軌武氏稱制時嘗詔天下學者習之尋廢本十篇今闕其下五篇法語二十卷右南唐劉鶚撰鶚甲戌嵗擢南唐進士第實開寶七年也著書凡八十一篇言治國立身之道徐鉉為之序老子略論一卷右魏王弼撰凡十有八章景迂云弼有得於老子而無得於易注易資於老子而老子論無資於易則其淺深之效可見矣溫公道德論述要兩卷右皇朝司馬光撰光意謂道德連體不可偏舉故廢道經德經之名而曰道德論墓志載其目無名天地之始有名萬物之母常無欲以觀其妙常有欲以觀其徼皆於無與有下斷句不與先儒同吕氏老子注二卷右皇朝吕大臨撰其意以老氏之學合有無謂之玄以為道之所由出蓋至于命矣其言道體非獨智之見孰能臻此求之終篇膠于聖人者蓋寡但不當以聖知仁義為可絶棄默希子注文子十二卷右默希子者唐徐靈府自號也靈府謂文子周平王時人朱玄注文子十二卷右唐朱玄注闕符言一篇或取默希注輔焉文如海莊子疏十卷右唐文如海撰如海明皇時道士也以郭象注放乎自然而絶學習失莊生之旨因再為之解凡九萬餘言吕吉甫注莊子十卷右皇朝吕惠卿撰吉甫惠卿字也王元澤注莊子十卷右皇朝王雱撰元澤其字也東坡廣成子解一卷右皇朝蘇軾撰軾取莊子中黃帝問道於廣成子一章為之解景迂嘗難之其序略曰某晚玷先生薦賢中安敢與先生異論然先生許我不苟同翰墨具在天機子一卷右不著撰人凡二十五篇或曰一名隂符二十四機諸葛亮撰豫觀其詞旨殆李筌所為爾託之孔明也載道藏中無能子三卷右不著撰人唐光啓三年天子在褒寓三輔景氏舍成書三十篇述老莊自然之旨總目録之於道家四子治國樞要四卷右唐范乾九集四子謂莊子文子列子亢倉子其意以為黃老之道內足以修身外足以治國周王得文子之言趙王納莊周之論皆能興邦致治故採其書有益治道者分為二十門風俗通義十卷右漢應劭撰劭字仲遠奉之子篤學博覽多聞靈帝時舉孝廉仕至泰山太守撰風俗通以辨物名號釋時俗嫌疑文雖不典世服其洽聞意林三卷右唐馬總會元撰𥘉梁頴川庾仲容取諸家書術數雜説凡一百七家抄其要語為三十卷揔以其繁略失中增損成三軸前有戴叔倫楊伯存兩序格言五卷右偽唐韓熙載叔言撰熙載以經濟自任乃著書二十六篇論古今王霸之道以干李煜首言陽九百六之數及五運迭興事其􅭸雜如此有門生舒雅序兩同書兩卷右唐羅隱撰隱謂老子飬生孔子訓世因本之著內外篇各五其曰兩同書者取兩者同出而異名之言也物類相感志十卷右皇朝僧贊寧撰采經籍傳記物類相感者志之分天地人物四門贊寧吳人以博物稱于世柳如京徐騎省與之遊或就質疑事楊文公歐陽文忠公亦皆知其名王氏雜説十卷右皇朝王安石介甫撰蔡京為安石傳其略曰自先王澤竭國異家殊由漢迄唐源流浸深宋興文物盛矣然不知道德性命之理安石奮乎百世之下追堯舜三代通乎晝夜隂陽所不能測而入於神初著雜説數萬言世謂其言與孟軻相上下於是天下之士始原道德之意窺性命之端云所謂雜説即此書也以京之誇至如此且不知所謂通乎晝夜隂陽所不能測而入於神者為何等語故著之保生月録一卷右唐韋行規撰分十二月雜纂每月攝飬種藝祈禳之術也輦下嵗時記一卷右唐李綽撰綽經黃巢之亂避地蠻隅偶記秦地盛事傳諸晚學云國朝時令十二卷右皇朝賈昌朝撰景祐初復禮記舊文其唐月令别行三年詔昌朝與丁度李淑采國朝律曆典禮百度昏曉中星祠祀配侑嵗時施行約唐月令定為時令一卷以備宣讀後昌朝注為十二卷奏上頒行顧渚山記二卷右唐陸羽撰羽與皎然朱放輩論茶以顧渚為第一顧渚山在湖州吳王夫差顧望欲以為都故以名山吕惠卿建安茶記右唐朝吕惠卿撰聖宋茶論一卷右徽宗御製茶雜文一卷右集古今詩文及茶者竹譜一卷右戴凱之撰凱之字慶預武昌人裒輯竹事四字一讀有韻類賦頌李邯鄲云未詳何代人荀譜三卷右皇朝僧惠崇撰小説類殷藝小説十卷右宋殷藝撰述秦漢以來雜事豫家本題曰劉餗李淑以為非玄怪録十卷右唐牛僧孺撰僧孺為宰相有聞于世而著此等書周秦行紀之謗蓋有以致之也周秦行紀一卷右唐牛僧孺自敘所遇異事賈黃中以為韋瓘所撰瓘李德𥙿門人以此誣僧孺鹿革事類三十卷鹿革文類三十卷右節太平廣記事實成一編曰事類詩文成一編曰文類蔡蕃晉如所撰晉如博學通音律能屬文與十父相善友鑒戒録十卷右後蜀何光遠撰字輝夫東海人唐證中纂輯唐以來君臣事迹可為世鑒者前有劉曦度序李獻臣云不知何時人考之不詳也歸田録六卷右皇朝李畋撰畋蜀人張詠客也與范鎮友善熙寧中致仕歸與門人賔客燕談衮衮忘倦門人請編録遂以該聞為目又有雜詩二十篇係于後開談録兩卷右皇朝蘇耆撰舜卿之父也記五代以來雜事下秩多載馮道行義古今前定録二卷右皇朝尹國均輯經史子集古今之人興衰窮達貴賤貧冨死生壽夭與夫一動靜一語默一飲一啄定於前而形于夢兆于卜見於相貌應於讖記者凡一門以為不知命而躁競者之戒至若裴度以隂德而致貴孫亮以隂譴而減齡之類又别為二門使君子不以天廢人云傳公嘉話一卷右皇朝傳堯俞之子孫記堯俞之言行凡四十餘章獻簡堯俞諡也曾公南遊記一卷右曾公未詳何人當是公亮之孫也共十二章記國朝雜事搢紳脞説二十卷右皇朝張唐英君房撰君房學通釋老善著書如名臣傳蜀搗杌雲笈七籖行于世者毋慮數百卷此書亦詳實青箱雜記右皇朝吳處厚撰處厚發蔡確車蓋亭詩事者所記多失實成都置交子務起於冦瑊處厚乃以為張詠他多類此緗素雜記十卷右皇朝黃朝英撰所記二百事朝英建州人紹聖後舉子也為王安石之學者以贈之以芍藥為男淫女貽我握椒為女淫男前輩嘗以是為嗤朝英獨愛重之它可知也褒善録一卷右皇朝王蕃撰嘉祐中巴縣簿黃靖國死而復蘇道其冥中所見廖生嘗傳之蕃刪取其要為此書麗情集二十卷右皇朝張君房唐英編古今情感事天文曆算類景祐乾象新書三卷右崇文目有三十卷置之天文類曆法一卷右未詳撰人曆草也刻漏圖一卷右皇朝燕肅撰肅有巧思上蓮花漏法嘗知潼川有石刻存焉洛陽宋君者增損肅之法為此圖五行類廣古今五行志三十卷右竇鋈撰唐志有其目未詳何人纂五行變異敘其徵應蓋為洪範之學者自古術數之學多矣言五行則本洪範言卜筮則本周易近時兩者之學殆絶而最盛于世者葬書相術五星祿命六壬遁甲星禽而已然六壬之類足以推一時之吉凶星禽五星祿命相術之類足以推一身之吉凶葬書之類足以推一家之吉凶遁甲之類足以推一國之吉凶其所知若有遠近之異而或中或否不可盡信則一也且其説皆本於五行故同次之為一類青囊輔注三卷右晉郭璞撰世傳葬書之學皆云無出郭璞之右者今盛行多璞書也按璞傳載葬母事世傳蓋不誣矣璞未幾為王敦所殺若謂禍福皆係於葬則璞不應擇凶地以取禍若謂禍福有定數或它有以致之則葬地不必擇矣嗚乎璞自用其術尚如此况後遵其遺書者乎撥沙經一卷右唐吕才撰地理書畫山水之形成圖蓋依託者會元經二十四卷右孫季雍撰未詳何代人集諸家相地書芟其鄙陋無驗者成是書五音地理新書三十卷右唐僧一行撰人姓五音驗八山三十八將吉凶之方其學今世不行稱星經三卷右不著撰人以日月五星羅㬋計都紫氣月孛十一曜演十二宫宿度以推人貴賤壽夭休咎不知其術之所起或云天竺𣑽學也按洪範曰嵗月日時無易百穀用成乂用民俊民用章家用平康月之從星則以風雨泠州鳩曰武王伐殷嵗在鶉火月在天駟一曰在析木之津辰在斗柄星在天黿以此言之五星之術其來尚矣蓋可以占國則可以占事可以占事則可以占人也然術家用日月五星以占吉凶又加以交𥘉交中之神紫氣月孛之宿𥘉中者交食之會亦可以意求惟氣孛無稽而術家獨以為效且曰土木之餘氣五星之行土木最遲而為吉凶者久故有餘氣云周易十二論一卷右未詳撰人論日月五星直年以占吉凶珞琭子疏五卷右皇朝李同東方明撰河圖天地二運賦一卷右不著撰人論天地二運蓋三命書也崇文目以為卜筮類常陽經一卷右崇文目題曰黃帝式用蓋六壬占卜術也六壬要訣一卷右未詳何人撰隋志載六壬之書兩種金鑾密記及五代史記頗言其驗今世龜筮道息而此術獨行六壬課鈐一卷右未詳何人所纂以六十甲子加十二時成七百二十課三傳入神以占吉凶玉關歌一卷右不題撰人六壬課訣也三十二家相書三卷右或集許負以下三十二家書成此編月波洞中記一卷右序稱唐任逍遙得之於太白山月波洞石壁上凡九篇相形術也崇文目置之五行類靈龜經一卷右史蘇撰論龜兆之吉凶崇文目三卷遁甲萬一訣一卷右題云唐李靖所纂黃帝書按遁甲之書見於隋志凡一十三家則其學之來亦不在近世矣以休生傷杜景死驚開八門推國家之吉凶通其學者以為有驗未之嘗試也遁甲經一卷右唐胡乾撰李氏書目云亦云九天玄女術推九星八開三奇六儀之法鮮鶚經十卷右未詳撰人凡十門六十二章以星禽推知人之吉凶言其性情嗜好為尤驗説者謂本神仙之訣也故此書載於道藏李邯鄲云羅浮山逍遙子撰八神筮法二卷右以八卦世分六十四每卦首必云子夏曰論易筮之吉凶靈棊經二卷右漢東方朔撰又云張良劉安未知孰是晉顏幼明宋何承天注有唐李遠敘歸來子以為黃石公書豈謂以授良者邪按南史載客從南來遺我良財寶貨珠璣金碗玉杯之繇則古之遺書也明矣凡一百二十卦皆有繇辭紫堂訣三卷右紫堂先生撰未詳何代人著紫垣十二星至隱曜揔三百六十位分二十八舍附之以五星配十二辰以推人命之吉凶兵類郭元振安邊䇿三卷右唐郭元振撰以總兵進攻聚衆退守不可無權謀乃著此書故舊題曰定遠安邊䇿武經聖略十五卷右皇朝王洙撰寶元中西邊用兵朝廷講武備是時洙奉詔編祖宗任將用兵邊防事迹分二十門武經總要四十卷右皇朝曾公亮丁度撰康定中朝廷恐群帥昧古今之學命公亮等采古兵法及本朝計謀方略凡五年奏御制度五卷邊防五卷故事十五卷占候五卷御為製序兵要望江南一卷右題云黃石公以授張良者按其書雜占行軍吉凶寓聲於望江南詞取其易記憶總目云武安軍左押衙易靜撰蓋唐人也倚馬立成法二卷右唐李淳風撰兵行占候之書也淳風太宗時人而此書起九宫法至貞元六年庚午假託以行其書爾非淳風本旨也類書類古人姓字相同録一卷右唐丘光庭撰光庭中進士第北堂書鈔一百七十三卷右唐虞世南撰世南仕隋為祕書郎時鈔經史百家之事以備用分八十部八百一類北堂者省之後堂世南鈔書之所也家一百二十卷集類一百卷右唐劉綺莊撰綺莊毗陵人嘗為蘇州崑山縣令家多異書採托事類分二十餘門凡五十餘萬言上之于朝前有萬希序題云開元二十九年辛巳按綺莊集有上白敏中啓疑非玄宗時人當考三教珠英三卷右唐張昌宗等撰按唐志一千三百卷今所存者止此備舉文言二十卷右唐陸贄撰揔四百五十餘門議者謂大類六帖而文辭過焉崇文揔目中有之小名録三卷右唐陸龜蒙撰龜蒙以末世有官名小名之别自秦至隋編而紀之至於神仙玉女之名婦人臧獲之字亦無棄焉龜蒙世稱其博然此書特雜取於史傳間爾無異聞也備忘小抄十卷右偽蜀文谷撰雜抄子史一千餘事以備遺忘其後題廣政三年廣政王衍號也唐會要一百卷右皇朝王溥撰𥘉唐蘇冕敘高祖至德宗九朝沿革損益之制大中七年詔崔鉉等撰次德宗以來事至宣宗大中六年以續冕書溥又采宣宗以後事共成百卷建隆二年正月奏御史簡禮備太祖覽而嘉之詔藏於史閣賜物有差册府元龜一千卷右皇朝景德二年詔王欽若楊億修君臣事迹唯取六經子史不録小説雜書至祥符六年書成上之凡三十一部有揔序千一百四門有小序同修者十五人錢惟演杜鎬刁衎李維戚綸王希哲陳彭年薑輿宋貽序陳越陳從易劉筠查道王曙夏竦𥘉撰篇序諸儒皆作帝以體製不一遂擇李維錢惟演陳彭年劉筠夏竦等付楊億竄定賜今名為序冠其首其音釋又命孫奭為之類要六十五卷右皇朝晏殊纂分門輯經史子集事實以備修文之用禁殺録一卷右皇朝李象先纂元祐中象先集録古今冥報事以為殺戒貨泉録一卷右皇朝陶嶽撰記五代諸侯擅改錢幣之由幽州嶺南福建湖南江南五國墨譜一卷右皇朝黃秉撰熙寧間人秉患世人徒知祖李之名而不知形模之異同製作之精粗故作圖以著其源流用輔蘇易簡之闕文云印格一卷右皇朝朝克一撰克一張文潛甥也文潛嘗為之序其略曰克一既好古印章其父補之愛之尤篤悉録古今印璽之法謂之圖書譜自秦以來變制異狀皆能言其故余頗愛其用心不移致精於末務使有傳焉蒙求三卷右唐李瀚撰纂經傳善惡事實類者兩兩相比為韻語取蒙卦童蒙求我之義名其書蓋以教學童云魯史分門屬類賦三卷右皇朝楊鈞撰以左氏事類分十門各為律賦一篇乾德四年奏御詔褒之仙苑編珠二卷右唐王松年撰取阮倉劉向葛洪所傳神仙又取經記中梁以後神仙百二十八人比事屬辭效蒙求體為是書國史對韻十二卷右皇朝范鎮撰吳仲庶嘗稱景仁憫諸後學雖涉書傳而問之今代典故則懵然不知乃自太祖開基迄于仁宗朝托取事實可為規矩鑒戒者用韻編次之即此書也孝悌類鑒七卷右皇朝俞觀能撰取經史孝悌事成四言韻語兩漢蒙求五卷唐史屬辭五卷南北史蒙求十卷右未詳撰人皆效李瀚也雜藝術類名畫見聞志六卷右皇朝郭若虛撰若虛以張愛賔之畫絶筆永昌元年因續之歷五代止國朝熙寧七年分敘論紀藝故事近事四門溫公投壷新格一卷右皇朝司馬光君實撰舊有投壷格君實惡其多取奇中者以為僥幸因盡改之九章算經九卷右未詳撰人者姓名或曰周公九章者一方田二算粟三衰分四少廣五啇功六均輸七盈不足八方程九句股魏劉徽唐李淳風嘗為之注則此術起於漢之前矣求一算經一卷右未詳撰人溫公七國象碁一卷右皇朝司馬光君實撰周秦韓魏趙楚齊燕實以八國而云七者周室不與焉葉子戲格一卷右不著撰人世傳葉子婦人也撰此戲晚唐之時也相鶴經一卷右題曰浮丘公撰其傳云浮丘公授于王子晉後崔文子學道於子晉得其文藏于嵩山之石室淮南公採藥得之乃傳于世相馬經二卷右伯樂撰相馬經一卷右未詳撰人述相馬法式并書馬之疾狀及治療之術李氏書目有之皇帝醫相馬經三卷右唐穆蠡集伯樂王良等六家書成此編皇帝斥神農也育駿方三卷右未詳撰人相馬術及醫治畜牧之方相牛經一卷右序曰寧戚傳之百里奚漢世河西薛公得其書以相牛千百不失其一至魏世高堂生又傳晉宣帝其後祕之細字薛公注也醫家類靈樞經九卷右王砯謂此書即漢志黃帝內經十八卷之九也或謂好事者於皇甫謐所集內經倉公論中抄出之名為古書也未知孰是丁德用注難經五卷右皇朝丁德用注以楊玄操所演甚失大義因改正之經文隱奧者繪為圖德用濟陽人嘉祐末其書始成虞庶注難經五卷右皇朝虞庶注庶仁壽人寓居漢嘉少為儒已而棄其業習醫術為此書以輔吕楊所未盡黎泰辰治平間為之序金匱玉函經八卷右漢張仲景撰晉王叔和集設答問雜病形證脈理參以療治之方仁宗朝王洙得于館中用之甚效合二百六十二方仲景傷寒論十卷右漢張仲景述晉王叔和撰次按名醫録云仲景南陽人名機仲景其字也舉孝廉官至長沙太守以宗族二百餘口建安紀年以來未及十稔死者三之二而傷寒居其七乃著論二十二篇證外合三百九十七法一百一十二方善醫者或云仲景著傷寒論誠不刋之典然有大人之病而無嬰孺之患有北方之藥而無南方之治此其所闕者蓋陳蔡以南不可用柴胡白虎二湯治傷寒其言極有理脈經三卷右題云黃帝撰論脈疹之要凡二十一篇脈訣一卷右題曰王叔和皆歌訣鄙淺之言後人依託者然最行于世雷公炮炙三卷右宋雷斆撰胡洽重定述百藥性味炮熬煮炙之方其論多本之於乾寧晏先生斆稱內究守國安正公當是官名未詳金寶鑑三卷右魏嵩撰嵩仕至翰林博士崇文揔目云不詳何代人述脈候徵驗要妙之理通子傷寒訣一卷右題曰通子而不著名氏用張長沙傷寒論為歌詩以便覽者脈訣之類也傷寒百問三卷右題曰無求子大觀初著書運氣論奧三卷右皇朝劉溫舒撰溫舒以素問氣運最為治病之要而答問紛揉文辭古奧讀者難知因為三十論二十七圖上于朝脈粹一卷右皇朝蕭世基撰世基嘗閲素問及歷代醫經患其難知因綴緝成一編治平中姚誼序之存真圖一卷右皇朝楊介編崇寧間泗州刑賊於市郡守李夷行遣醫并畫工往親決膜摘膏盲曲折圖之盡得纎悉介校以古書無少異者比歐希範五藏圖過之遠矣實有益醫家也王莽時捕得翟義黨王孫慶使大醫尚方與巧屠共刳剝之量度五藏以竹筳導其脈知所終始云可以治病是亦此意證類本草三十二卷右皇朝唐慎微纂合兩本草為一書且集書傳所記單方附之于本條之下殊為詳博子午經一卷右題云扁鵲撰論針砭之要成歌詠蓋後人依託者明堂針灸圖三卷右題曰黃帝論人身俞穴及灼灸禁忌點烙三十六黃經一卷右不著撰人唐世書也國史補云自茗飲行于世世人不復病黃疸千金方三十卷右唐孫思邈撰思邈博通經傳洞明醫術著用藥之方疹脈之訣針灸之穴禁架之法以至導引養生之要無不周悉後世或能窺其一二未有不為名醫者然議者頗恨其獨不知傷寒之數云千金翼方三十卷右唐孫思邈撰思邈著千金方復掇集遺軼以羽翼其書成一家之學林億等謂首之以藥録次之以婦人傷寒小兒養性辟穀退居補益雜病瘡癰色脈針灸而禁經終焉者皆有指意云龍樹眼論三卷右佛經龍樹大士者能治眼疾或假其説集治七十二種目病之方寶藏暢微論三卷右五代軒轅述撰青霞君作寶藏論三篇著變煉金石之訣既詳其未善因刋其謬誤增其缺漏以成是言故曰暢微時年九十實乾亨二年也太平聖惠方一百卷右太宗皇帝在潛邸日多蓄名方異術太平興國中內出親驗者千餘首乃詔醫官各上家傳方書命王懷隱王祐鄭彥陳昭遇校正編類各於篇首著其疾證淳化初書成御製序引和劑局方十卷右大觀中詔通醫刋正藥局方書閲嵗書成校正七百八字增損七十餘方養生必用方十六卷右皇朝初虞世撰序謂古人醫經行于世者多矣所以别著者古方分劑為今銖兩不侔用者頗難此方其證易詳其法易用苟尋文為治雖不習之人亦可無求於醫也虞世本朝士一旦削髮為僧在襄陽與十父遊從甚密嬰童寶鏡十卷右題曰栖真子不著姓名録世行應驗方成此書小兒靈祕方十三卷右不題撰人辨小兒疾證及諸療之方多為歌訣傷寒證治三卷右皇朝王實編實為百病之急無踰傷寒故略舉病名法及世名醫之言為十三篇總方百四十六首或云頴川人官至外郎龐安常之高第也小兒玉訣一卷右未詳撰人名氏為韻語以記小兒疾證治法凡二十三孫尚祕寶十卷右皇朝孫尚撰吕惠卿帥邊日尚之子在屬部因取此書刻板傳于世楊子護命方五卷通神論十四卷右皇朝楊退修撰退修以歧伯論五運六氣以治疾病後世通之者唯王砯一人而已然猶於遷變行氣莫知其始終次序故著此方論云道書類大洞真經一卷右題云高上虛皇君等道書三十七章晉永和中上清紫微元君降授于王夫人是上清高法道藏書六部一曰大洞真部二曰靈寶洞元部三曰太上洞神部四曰太真部五曰太清部六曰正一部邯鄲李氏道書志四類一曰經誥類二曰傳録類三曰丹藥類四曰符篆類皆以此書為之首然唐志不載故以次度人經云西升經四卷右題曰太上真人尹君紀録老子將遊西域既為關令尹喜説五千言又留祕旨凡三十六章喜述之為此經其首稱老君西升聞道笁乾有古先生是以就道説者以古先生佛也事見廣洪集辨惑論韋注西升經二卷右梁道士韋處玄分上下經上經三七法天之陽數分二十一章下經四七法天之隂數總四十九章象大衍用數云唐志稱處玄集解以聞道笁乾為經道笁乾以古先生為老子自謂同玄注西升經四卷右唐同玄子注其姓名未詳唐志有戴詵注西升經疑此或詵書也分三十六章謂笁乾古先生非釋氏之號云徐注西升經二卷右徐道邈撰句曲人未詳何代其本以有古先生善入無為作善入泥丸古先生者吾之師也化乎笁乾作吾之身也化胡笁乾云步虛經一卷右太極真人傳左仙公其章皆高仙上聖朝玄都玉京飛巡虛空之所諷詠故曰步虛定觀經一卷右題云天尊授左玄真人述定心惠觀等修故以為名云老子化胡經十卷右魏明帝為之序經言老子歸崑崙化胡次授罽賔後及天笁按裴松之三國志注言世稱老子西入流沙化胡成佛其説蓋起于此議化胡經八狀附于後唐志云萬嵗通天元年僧惠澄上言乞毁老子化胡經秋官侍郎劉如璿等議狀證其非偽此是也太清經一卷右太清護命靈文金闕上真按付修道之士可以除邪治病云登真隱訣二十五卷右梁陶弘景撰景以為學其訣者當由階而登真文多隱非訣莫登故以名書凡七篇十七條隋志云雲笈七籖一百二十卷右皇朝張君房等纂君房祥符中謫官寧海時聖祖降朝廷盡以祕閣道書付杭州俾戚綸陳堯佐校正綸等同王欽若薦君房専其事君房詮次得四千五百六十五卷於是掇其蘊奧揔萬餘條成是書仁宗時上之張隨注參同契三卷右皇朝張隨皇祐中居青城山注魏伯陽之書列十數圖于其後參同契太易圖一卷右不題撰人論周天火候有太易太初太始太素太極四象五行等二十四篇并圖按崇文揔目云張處撰而李獻臣以為天老神君撰雲常子張處序亦名至藥丹訣未知孰是混元內外鑒二卷延壽經一卷附右混元謂老子也亦道引之術內篇八外篇三玉皇聖胎神用訣一卷右玉皇訣之野人郎肇注太上説魂魄經兩卷右題曰老子撰載三魂七魄名字形狀好惡以呪術存制之崇文題曰太上靈書李氏亦有其目無上祕要九十五卷右題曰元始天尊説藝文志止七十二卷不知何時析出二十三通也葛仙翁胎息術一卷右仙翁葛洪也太清服氣口訣一卷太起經一卷閉氣法一卷太上指南歌一卷右四書皆題曰老子撰服氣訣也食氣經一卷右太皇子撰未詳李邯鄲云似雜集之書道引養生圖一卷右梁陶弘景撰分三十六勢如鴻鶴徘徊鴛鸞戢羽之類各繪像于其上田偉家本少八勢天真皇人九仙經一卷右天真皇人為黃帝説一行羅公逺葉法靜注論水火龍虎造金丹之術崇文書也按九仙經興廢記云此經黃帝留峨眉山石璧漢武帝時得之大中嘗禁斷隂府內丹經一卷右題曰老子説日月玄樞論一卷右唐劉知古撰明皇朝為綿州昌明令時詔求通丹藥之士知古謂神仙大藥無出參同契因著論上于朝大還丹契祕圖一卷右草衣洞真子玄撰凡十二章大還丹者乃日月精氣之所致也論火候則以朔望為據記藥物則以鉛汞為名云釋書類華嚴經合論一百二十卷右按纂靈記云華嚴大經龍宫有三本佛滅度後六百年有龍樹菩薩入龍宫誦下本十萬偈四十八品流傳天笁晉有沙門支法領得下本分三萬六千偈至此土義熙十四年譯成六十卷唐證聖元年于闐沙門喜學再譯舊文兼補諸闕通舊揔四萬五千頌成八十卷三十九品合論者唐李通玄所撰通玄太原人宗室子也當武后時隱居不仕舊學佛者皆曰佛説此經時居七處九會獨通玄以為十處十會云華嚴經清涼疏一百五十卷右唐僧澄觀撰澄觀居清涼山號清涼國師即韓愈贈之詩者文元公有言曰明法身之體者莫辨於楞嚴明法身之用者莫辨於華嚴學佛者以為不刋之論華嚴經略一卷右唐僧澄觀撰澄觀既疏華嚴又撮其大意為此凡四十二章華嚴起信文一卷右唐僧善孜撰善孜潭州太平寺僧也每品一章撮其大指凡三十九章華嚴百門義海兩卷右唐僧法藏撰法藏長安崇福寺僧也分十章華嚴奧旨一卷右唐僧法藏撰文曰妄盡還源觀凡六門法界披雲集一卷右皇朝僧道遹述杜順纂華嚴經義撰法界觀道通又分十玄門華嚴吞海集一卷右皇朝僧道通述華嚴經七處九會三十九品五萬四千偈其文浩博澄觀為之疏尤難觀覽道通約之成萬三千言以便初學法華言句二十卷右唐僧智顗撰智顗居天台山號天台教五代兵亂其書亡錢俶聞高麗有本厚賂因賈人求得之至今盛行於江浙禪宗金剛經解一卷右皇朝安保衡採托禪宗自達磨而下發明是經者參釋之序稱其有言涉修證者北宗法門也舉心即佛者江西法門也無法無物本來如是者曹溪法門也靖國續燈録三十卷右皇朝僧惟白編惟白靖康初住法雲寺駙馬都尉張敦禮以其書上于朝徽宗為之序分正宗對機拈古頌古偈頌五門古塔主語録三卷右皇朝僧道古撰范文正喜之嘗親為疏請閲法有句云道行無玷孤風絶攀時以為非溢美也碧巖集十卷右皇朝僧克勤解雪竇頌古名曰碧巖集觀心論一卷右魏菩提達磨撰百法論一卷右唐僧玄奬譯西域僧天親所造所謂一切法者其略有語一心法二心所有法三色法四心不相應行法五無為法心法八種心所有法五十一種色法十一種心不相應行法二十四種無為法六種故曰百法起信論一卷右唐僧宗密注僧真諦譯天笁第十二祖馬鳴大士所造也雖云名相蓋明心宗指義玄微文辭明緻故盛行于世若肇論百法唯識及此學者皆顓門名家故藏中所收亦録于此辨正論八卷右唐釋法琳撰頴川陳良序云法琳姓陳關中人著此書窮釋老之教源極品藻之名理宣和中以其斥老子語焚毁其第二第四第五第六第八凡五卷序文亦有剪棄者破邪論二卷右唐釋法琳撰辨傳奕所排毁虞世南為之序甄正論三卷右唐釋法琳撰已上三書皆經宣和焚毁藏中多闕故録之輔教編五卷右皇朝僧契嵩撰藤州人皇祐間以世儒多詆釋氏之道因著此書廣引經籍以證三家一致輔相其教云玄聖蘧廬二卷右唐李繁撰繁學於江西僧道一敬宗時嘗與丁公著陸亘入殿中抗佛老講論唐虞愈稱其家多書一覽終身不忘大和中舒元輿誣其濫殺不辜繫獄知且死著書十六篇以明禪理自謂臨死生而不懼賢於顔回在陋巷不改其樂嗚呼可謂賢矣而史載其平生行事甚醜獨何歟廣弘明集三十卷右唐僧釋道宣撰道宣麟德𥘉居西明寺以中原自周魏以來重老輕佛因採輯自古文章下逮齊隋發明其道者以廣僧祐之書分歸正辨惑佛德法義僧行慈惻誠功啓福滅罪統歸等十門别集類楊雄集三卷右漢楊雄子雲也古無雄集皇朝談愈好雄文患其散在諸篇籍離而不屬因綴輯之得四十餘篇隂鏗集一卷右陳隂鏗字子堅幼聰慧五嵗能誦詩賦日千言及長博涉史傳尤善五言詩徐陵言之於世祖使賦安樂宫援筆立成纍遷散騎常侍有集三卷隋志已亡其二今所存者十數詩而已杜少陵嘗贈李太白詩首云李侯有佳句往往似隂鏗今觀斯集白蓋過之遠矣甫之慎許可乃如此吳筠宗元先生集十卷右唐吳筠撰前有權德輿序筠字貞節華隂人生十五年隱於南陽天寶𥘉召至京師請為道士居嵩山已而勑待詔翰林筠知祿山將亂求還茅山許之乃東遊會稽往來天台剡中與李白孔巢父酬倡大曆中卒弟子諡為宗元先生筠通經義美文辭性高鯁其待詔翰林也特承恩顧高力士素奉佛嘗短筠於帝故筠所著文賦深詆釋氏頗為通人所譏云陳黯文集三卷右唐陳黯撰黯字希孺頴川人十嵗能詩十三袖文謁清源牧牧面令賦詩頗稱賞之由是一時聲名大振會昌初就鄉薦至禮部輒罷歸咸通中卒有羅隱黃滔序令狐楚表奏十卷右唐令狐楚字殼士撰楚相憲宗為文善於箋奏自為序云登科後為桂并四府從事掌箋奏者十三年始遷御史綴其藁得一百九十三篇自號白雲孺子胡笳十八拍一卷右唐劉啇撰漢蔡雍女琰為胡騎所掠因胡人吹蘆葉以為歌遂翻為琴曲其辭古淡啇因擬之敘琰事盛行一時啇彭城人擢進士第歷臺省為郎好道術隱義興胡父渚世傳其仙去鼎國詩三卷右後唐李雄撰雄洛鞏人莊宗同光甲申嵗遊金陵成都鄴下各為咏古詩三十章以三國鼎峙故曰鼎國孫晟文集三卷右南唐孫晟字鳯密州人好學有文辭尤長於詩少為道士常畫賈島像置于屋璧晨夕事之後乃儒服謁唐莊宗于鎮州莊宗以為著作佐郎天成中奔于吳李忭父子用之為相周丗宗征淮景懼遣晟奉表求和丗宗召問江南事不對殺之景聞贈魯國公吳越掌記集一卷右唐羅隱掌錢鏐記室所著表啓也神宗皇帝御集二百卷右本朝神宗皇帝撰章悙等纂紹聖𥘉以元祐中所集止九百四十三道有旨命惇再加編次至元符中書成比元祐所編增多八千七百三十道分文辭政事邊機三門言者仍以元祐之臣託以邊機不宜泄露掩沒先帝盛美於是遍以賜群臣云范魯公集三十卷右皇朝范質字文素大名人後唐長興中舉進士時和凝典貢舉覽質程文器之自以登第名在十三即以其數處質舉子謂之傳衣鉢晉天福中為翰林學士周廣順𥘉拜相太祖受禪加兼侍中乾德二年始罷為太子太傳卒年五十四將終戒其子旻勿請諡勿刻墓碑質力學強記好聚書既登朝猶手不釋卷國史載其示從子詩家書自序薦吕餘慶趙普表三篇張師黯集五十卷右皇朝張洎字師黯滁州人仕李煜知制誥中書舍人歸朝為史館修撰翰林學士淳化中參知政事至道二年卒洎風神灑落文辭清麗通釋氏學然性險詖而諂附集有吳淑序其子安順所編咸平五年上之朝文元道院集要三卷右皇朝王古編其序云文元朝公得觀內書不徒力行復勤於撰述以開導後學其書曰道院别集曰自擇增修百法曰法藏碎金曰隨因記述曰耄智餘書余嘗遍閲之以為名理之妙雖白樂天不逮也輒刪去重復總集精粹以便觀覽云古元祐中侍從田表聖咸平集五十卷右皇朝田錫字表聖其先京兆人唐末徙于蜀國初與胡旦何士宗齊名中興國三年進士第歷相臺桐廬淮陽海陵四郡守知制誥終於諫議大夫范仲淹司馬光讀其書皆稱其諒蘇軾亦以比賈誼云李仲方集二十卷右皇朝李維字仲方雍熙二年進士景德中知制誥遷中書舍人為翰林學士承旨年七十一維以文學進至老手不釋卷能詩嗜酒嘗謂人曰人生詩酒足則尚何營哉民士編一十九卷右皇朝陳充撰充成都人雍熙中擢甲科仕至刑部郎中知祥符六年貢舉卒年七十詞學典贍性曠達善談謔淡於榮利自號中庸子民士云者蓋其未仕已仕前後所著文也嘗以唐牛僧孺善惡無餘論為害教著書反之國史稱焉今集載其論兩篇張晦之集二十卷右皇朝張景字晦之少師事柳開為古文名震一時卒官至廷評年四十九集有文百九十三首禹稱所編并為之序姚鉉文集二十卷右皇朝姚鉉字寶臣廬州合肥人中進士甲科文辭敏麗淳化中直史館應制賦賞花釣魚詩特被嘉賞翌日命中使就第賜白金褒奬之纍遷兩浙轉運使鉉雋爽尚氣薛映知杭州與之不協中以危法除其名卒年五十三緹巾集二十卷右皇朝宋庠字公序開封雍丘人天聖中擢進士第一入翰林為學士皇祐元年拜相嘉祐中復為樞密使封莒國公以司空致仕𥘉名郊字伯庠御史言其姓符國號名應郊天乃改今名遺命子孫不得以其文集流傳韓持國詩三卷右皇朝韓維字持國億之子也元豐中入翰林為學士遷承旨哲宗𥘉載拜門下侍郎與其兄子華玉汝俱位宰相持國最能詩世傳其酴釄絶句它多稱是范子功集五十卷右皇朝范百祿字子功鎮之姪也終於中書侍郎朝氏具次集三卷右先君子詩集也呂本中以為江西宗派曾慥亦稱公早受知陳無已從兄以道嘗謂公宗族中最才華喻汝礪序其詩云豫嘗從叔用啇近朝人物嘉言善行朝章國典禮文損益靡不貫洽由叔用之學而達諸廊廟溫厚足以代言淵博足以顧問則以詩鳴者是宣叔用之志也哉雖然叔用既已油然棲志於林澗曠逺之中遇事寫物形於興屬淵雅踈亮未嘗為悽怨危憤之音豫於是有以見叔用於消長用舍之際未嘗不安而樂之者也嗟乎所謂含章內奧而深於道者非耶秦漢以來士有抱奇懷能留落不遇往往操心汗筆有怨誹沈抑之思氣候急刻不能間遠古之詞人皆是也所以往往無所建立於天下唯深於道者遺於世而不怨發於詞而不怒君子是以知其必能有為於世者也嗟乎吾於叔用豈直以詩人命之哉岷山百境集二卷右皇朝王寀字道輔少有能詩名世謂其詩𥘉若不經意然遣辭屬意清麗絶人自號南陔居士宣和中以狂譎𬒳譛伏誅楊天隱詩十卷右皇朝楊恬字天隱潼川人許表民詩十卷右皇朝許彥國字表民青社人周邦彥稱其寬平優遊中極物情惜乎留落不偶故世人知之或寡也滿民昌邑集二十卷右皇朝滿中行字思復登進士第元豐中為太學官虞蕃獄起思復獨不絓吏議詔褒之元氏集三卷右皇朝元絳字厚之杭州人鎖廳中進士第為翰林學士參知政事絳立朝無特操晚入翰林諂事王安石及其子弟時論鄙之工文辭為流輩所推許卒年七十六諡章簡馮允南集十卷右皇朝馮山字允南普州人鄧綰為中丞薦為臺官允南力辭不就士論稱之希白詩三卷右皇朝僧希白撰張逸序之云希白能詩與宋白梁周翰張詠而下十數公相友善其格律不減齊已云邵氏集二十卷右皇朝邵溥字澤民進士第靖康𥘉為户部侍郎上踐祚以例貶官紹興中復待制宣撫川陜師事崇福十二父詩文早有能聲總集類雜文章一卷右孫巨源得之於祕閣載宋玉等賦頌五十八篇景迂生元豐甲子以李公擇本校正後有劉大經曰為王雲李端唐君益諸公跋題唐賦二十卷右唐科舉之文也蕭頴士裴度白居易薛逢陸龜蒙之作皆在焉東漢文類三十卷右五代竇儼編唐文類三十卷右皇朝陶叔獻編唐漢䇿要十卷右皇朝陶叔獻編綸言集一百卷右或編國朝制册詔誥成此書以其皆王言也故以為名高麗詩三卷右元豐中高麗遣崔思齊李子威高琥康壽平李穗入貢上元宴之於東闕之下神宗製詩賜館伴畢仲行仲行與五人者及兩府皆和進其後使人金梯朴夤亮裴李絳孫盧柳金化珍等塗中酬唱七十餘篇自編之為西上雜詠絳孫為之序太平盛典二十三卷右或編政和間制誥表章多有可觀者文説類金針詩格三卷右唐白居易撰居易自謂與劉禹錫元稹皆以詩知名撮詩之體要為一格病得針而愈詩亦猶是也故曰金針集續金針詩格一卷右皇朝梅堯臣聖俞撰聖俞遊廬山宿西林與僧希白談詩因廣樂天所述云杜詩刋誤一卷右皇朝王仲至撰韓柳文章譜三卷右皇朝黃大輿撰大輿之意以為文章有莊老之異故取韓愈柳宗元文章為三譜其一取其詩文中官次年月可考者次第先後著其𥘉晚之異也其一悉取其詩文比敘之其一列當時君相於上以見二人之出處極為詳悉天厨禁臠三卷右皇朝釋惠洪撰論諸家詩格三十三種已見附志今不重刋開書目如后石經周易十卷周易指略例一卷石經尚書十三卷石經毛詩二十卷石經周禮十二卷石經禮記二十卷石經左氏傳三十卷石經公羊傳十二卷石經穀梁傳十二卷春秋穀梁疏十二卷石經論語十卷石經孟子十四卷韓李論語筆解十卷疑孟一卷仁宗政要四十卷神宗聖訓二十卷東漢刋誤一卷長安志十卷列女傳八卷續一卷百將傳十卷三朝國朝會要一百五十卷聱隅子十卷鬻子十卷御注老子二卷列子釋文二卷孔叢子七卷劉子三卷御製聖濟經十卷度人經三卷四十二章經一卷神仙可學論一卷蔡雍獨斷二卷花蘂夫人詩一卷華陽集一百卷二種互見平泉草木記一卷已載李衛公集中牡丹記一卷已載歐陽公集中一種刪去百中經三卷昭德先生讀書後志第二卷
