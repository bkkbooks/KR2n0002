body:
  text: 易類王弼周易十卷右上下經魏尚書郎王弼輔嗣注繫辭說卦雜卦序卦弼之門人韓康伯註又載弼所作畧例通十卷自啇瞿受於孔子六傳至田何而大興為施讎孟喜梁丘賀其後焦贛費直始顯而傳受皆不明由是分為三家漢末田焦之學㣲而費氏獨存其學無章句惟以彖象文言等十篇解上下經凢以彖象文言等叅入卦中皆祖費氏束京荀劉馬鄭皆傳其學王弼最後出或用鄭說則弼亦本費氏也歐陽永叔見此遂謂孔子古經已亡按劉向以中古文易經校施孟梁丘經或脱去無咎悔亡唯費氏經與古文同然則古經何嘗亡哉周易正義十四卷右唐國于祭酒孔穎逹與顏師古司馬才章王恭馬嘉運趙乾叶王談于志寕等同撰蘇德融趙弘智覆審序稱江南義疏有十餘家辭尚虛誕皆所不取唯王弼之學獨冠古今以弼為本采諸說附益之易乾鑿度二卷右舊題蒼頡修古籒文鄭氏注按唐四庫書目有鄭玄注書詩緯及有宋均注易緯而無此書其中多有不可曉者獨九宮之法頗明昔通儒謂緯書偽起哀平光武旣以䜟立故篤信之陋儒阿世學者甚衆鄭玄何休以之通經曹褒以之定禮歴代革命之際莫不引䜟為符瑞故桓譚張衡之徒皆深疾之自符堅之後其學殆絶就使其尚存猶不足保况此又非眞也卜子夏易十卷右舊題卜子夏傳唐藝文志巳亡子夏書今此書約王弼注為之者止雜卦景迂云唐張弧偽作京房易三卷右隋有漢京房章句十卷此書舊題京房傳呉陸績注皆星行氣候之學非章句也關子明易一卷右魏關子明傳子明名朗元魏太和末王虬言于孝文孝文召見之著成筮論數十篇唐趙㽔注㽔云恨書亡半隨文詮解才十一篇而已四庫書不載李氏集解十卷右唐李鼎祚集解經皆避唐諱又取序卦各冠逐卦之首所集有子夏孟喜京房馬融荀爽鄭康成劉表何晏宋衷虞翻陸績干寶王肅王輔嗣姚信王廙張璠向秀王凱冲侯果蜀才翟玄韓康伯劉瓛何安崔憬沈麟士盧氏崔覲孔頴逹三十餘家又引九家易乾鑿度義所謂蜀才者人多不知按顏之推云范長生也其序云自卜商之後傳註百家唯王鄭相㳂頗行於代鄭則多參天象王乃全釋人事易之道豈偏滯于天人哉而天象難尋人事易習折楊黄華學徒多從之今集諸家刋輔嗣之野文補康成之逸象以貽同好蓋宗鄭學者也隋書經籍志所錄易類六十九部子今所有五部而已関朗易不載于目乾鑿度自是緯書焦贛易林又屬卜筮子夏書或云張弧偽為然則隋志所錄捨王弼書皆未得見也獨鼎祚所集諸家之說時可見其大指唐錄稱鼎祚書十七卷今所有十卷蓋亦失其七惜哉周易口訣義七卷右唐史證撰抄注疏以便講習田氏乃以為魏鄭公撰誤也周易微旨三卷右唐陸希聲撰希聲大順中棄官居陽羡自號居陽遁叟著傳十卷别撰易圖一指說一釋變一微㫖一通十卷此微㫖也皆設問答周易舉正三卷右唐郭京撰京嘗任蘇州司户序稱京家藏王弼韓康伯手扎周易本及石經校正一百三十五處二百七十三字蓋以繇彖相證有闕漏處可推而知託云得王韓手札與石經耳如渙之繇利渉大川下有利貞字而彖辭無之則增入漸之繇女歸吉下無也字而彖辭有之則削去他皆此類元命包十卷右唐衞元嵩撰蘇源明傳李江注坤為首因八卦世變為六十四卦之次又著運蓍說源二篇統言卦體不列爻位自云周易元包一也易軌一卷右偽蜀蒲乾貫撰專言流演其序云可以知否㤗之源察延促之數蓋數學也景迂云按劉道原十國紀年乾貫作䖍觀今兩字皆誤易論三十三卷右皇朝王昭素撰昭素居酸棗太祖時嘗召令講易其書以注疏異同互相詰難蔽以巳意證墜簡一卷右皇朝天禧中毗陵從事建溪范諤昌撰其書酷類郭京舉正如震卦象辭内云脫不喪七鬯四字程正叔取之漸卦上六疑陸字誤胡翼之取之自謂其學出於湓浦李處約廬山許堅意者豈果有師承故程胡有所取焉胡先生易傳一十卷右皇朝胡瑗撰瑗字翼之泰州人通經術樂律敎人有法在湖州從其學者常數百人成材而備朝廷器使者不可勝數此解甚詳或云門人倪天隱所纂非其自著也無繋辭周易述聞一卷隱訣一卷補解一卷精微三卷右皇朝皇甫泌撰又有紀師說辯道通為八卷邵康節皇極經世十二卷右皇朝邵雍撰雍字堯夫謚康節隱居愽學尤精于易世謂其能窮作易之本原前知來物其始學之時睡不施枕者至三十年此書以元經㑹以㑹經運經世起於堯卽位之二十二年甲辰終於周顯德六年己未編年紀興亡治亂之事以符其學又有觀物篇系于後其子伯溫解劉長民易十五卷右皇朝劉牧長民撰仁宗時言數者皆宗之慶曆初呉祕獻其書于朝優詔奬之田况為序鈎隱圖三卷右劉牧撰皆易之數也凢四十八圖并遺事九有歐陽永叔序而其文殊不類鄭揚庭周易傳十二卷右皇朝鄭夬掦庭撰姚嗣宗謂劉牧之學受之呉祕袐受之夬夬又作明數明象明傳道明次例明範五篇邵雍言夬竊其學於王豫沈括亦言夬之學似雍云王逢易傳十卷右皇朝王逢撰嘗為國子直講其學宗王弼溫公易說一卷右皇朝司馬光君實撰雜解易義無詮次未成書也周易聖斷七卷右皇朝鮮于侁子駿撰本之王弼劉牧而時辯其非且云衆言淆亂析諸聖故名其篇曰聖斷周易古經二卷右皇朝呂大防微仲編其序云彖象以為注乃分於卦爻之下學者於是始不見完經而文辭次第貫穿之意亦缺然不屬因按古文而正之凢十二篇别無解釋毗陵易傳十一卷右皇朝蘇軾子瞻撰自言其學出於父洵且謂卦不可爻别而觀之其論卦必先求其所齊之端則六爻之義未有不貫者未嘗鑿而通也程氏易十卷右皇朝程頥正叔撰朱震言頤之學出於周敦頥得之於穆脩亦本於陳摶與邵雍之學本同然考頥之解不及象數頗類胡瑗爾景迂云胡武平周茂叔同師潤州鶴林寺僧壽涯其後武平傳其學于家茂叔則授二程與震之言不同周易義海一百卷右皇朝房審權撰集鄭玄至王安石凢百家摘取其專明人事者為一編或諸家說有異同輙加評議附之篇末乾生歸一圖兩卷右皇朝石汝礪撰先辯卦彖爻象之别後列數圖頗雜以釋老之說王介甫易義二十卷龔原注易二十卷耿南仲注易二十卷右皇朝王安石介甫撰介甫三經義皆頒學宮獨易解自謂少作未善不專以取士故紹聖後復有龔原耿南仲注易三書偕行于場屋晁以道古易十二篇右從父詹事公撰以諸家易及許愼說文等九十五書是正其文且依漢田何本分易經上下并十翼通為十二篇以矯費氏王弼之失謂劉向嘗以中古文易經校施孟梁丘經至蜀李譔又嘗著古文易遂名之曰古易公諱說之字以道昔班固自序其父祖事皆著名袁種字其叔父曰絲人皆不以為非今錄先世及諸父所著書若不記名字則後莫知為誰非史之比故不敢効孟堅况非靣斥輙援袁種舊例云餘皆倣此晁以道太極傳六卷因說一卷太極外傳一卷右從父詹事公撰其學本之邵雍自云初學京房後遇楊賢寳得其傳初著商瞿傳亡之建炎中再作此書時年七十一晁以道易玄星紀譜一卷右族父詹事公撰溫公玄曆及邵康節太玄凖易圖合而譜之以見揚雄以首凖卦非出私意蓋有星候為之機括且辯正古今諸儒之失如羡不當凖臨明夷不當凖大壯之類凢此難與諸家口舌爭觀譜則彼自屈矣此譜之所以作也朱子發易集傳十一卷易圖三卷叢記一卷右皇朝朱震子發撰自謂其學以程頥為宗和㑹邵雍張載之論合鄭玄王弼之學為一云其書多采先儒之說以成故曰集傳先天易鈐太極寶局兩卷右皇朝牛師德撰自云傳邵雍之學於司馬溫公而其說近於術數未知其信然否芸閣先生易解一卷右皇朝呂大臨與叔撰有統論數篇無詮次未完也焦氏易林十六卷右漢天水焦贛延壽傳易於孟喜行事見儒林傳中此其所著書也費直題其前曰六十四卦變人有唐俞王序其書每卦變六十四總四千九十六首皆為韻語與左氏傳所載鳯皇于飛和鳴鏘鏘漢書所載大横庚庚予為天王之語絶相類豈古之卜者各有此等書耶書類尚書十三卷右本古文孔安國傳五十九篇安國取序一篇分諸篇之首更定五十八篇晉之亂歐陽夏侯尚書並亡晉梅賾始得此傳闕舜典一篇乃以王肅注足成上之齊建武中呉姚方興得之於大稚比王注多二十八字唐孝明不喜古文以今文易之又頗改其辭如舊無頗今改无陂是也按安國旣定古文㑹有巫蠱事不復以聞藏于私家而已是以鄭康成注禮記韋昭注國語杜預注左氏趙岐注孟子遇引今尚書所有之文皆曰逸書蓋未嘗見古文故也然嘗以禮記校說命孟子較秦誓大義雖不遠而文不盡同意者安國以隷古定時失之耳尚書正義二十卷右孔頴逹等撰因梁費甝疏廣之注唐儒學傳稱頴逹與顏師古司馬才章王恭王琰撰五經義訓百餘篇號義贊詔改為正義包括異家為詳備然其中不能無謬冗馬嘉運駮正其失永徽中于志寧張行成高季輔就加增損始布天下藝文志云頴逹與李子雲王德韶等撰朱長才蘇德融隋德素王士雄趙弘智審覆長孫無忌李勣等二十四人刋定唐史志傳記事多叅差此為尤甚所記撰著人姓氏頴逹外徃徃不同古文尚書十三卷右漢孔安國以隷古定五十九篇之書也蓋以隷寫籒故謂隷古其書自漢迄唐行於學官明皇不喜古文改從今文由是古文遂絶陸德明獨存其一二於釋文而己皇朝呂大防得本於宋次道王仲至家以較陸氏釋文雖小有異同而大體相類觀其作字竒古非字書傅㑹穿鑿者所能到學者考之可以知制字之本也尚書大傳三卷右秦伏生勝撰鄭康成注勝至漢孝文時年且百歲歐陽生張生從學焉音聲猶有訛誤先後猶有差舛重以篆隷之殊不能無失勝終之後數子各論所聞以己意彌縫其闕而别作章句又特撰大義因經屬指名之曰傳後劉向校書得而上之尚書解十四卷右皇朝顧臨蔣之奇姚闢孔武仲劉敞王㑹之周範蘇子才朱正夫呉孜所撰後人集之為一編然非完書也胡翼之洪範解一卷右皇朝胡瑗翼之撰皆其門人所錄無詮次首尾張晦之洪範一卷右皇朝張晦之撰晦之景祐三年為房州參軍著論七篇洪範傳一卷右皇朝王安石介甫撰安石以劉向董仲舒伏生明災異為蔽而别著此傳以庻徴所謂若者不當訓順當訓如人君之五事如天之雨暘寒燠風而已大意言天人不相干雖有變異不足畏也楊元素書九意一卷右皇朝楊繪元素撰其序云詩書春秋同出於史而仲尼或刪或修莫不有筆法焉詩春秋先儒皆言之書獨無其法邪故作斷堯虞書夏書禪讓稽古商書周書費誓泰誓意九篇蘇明允洪範論圖一卷右皇朝蘇洵明允撰三論皆援經繋傳斥未以歸本二圖一以指歆向之繆一以形其意新經尚書義十三卷右皇朝王雱撰雱安石之子也熙寜六年命呂惠卿兼修國子監經義王雱兼同修撰王安石提舉而雱董是經頒於學官用以取士士或少違異輙不中程由是獨行于世者六十年而天下學者喜攻其短自開黨錮之禁世人羞稱焉書義辯疑一卷右皇朝楊時中立撰其書專攻王雱之失時仕至禮部侍郎東坡書傳十三卷右皇朝蘇軾子瞻撰熙寜以後專用王氏之說進退多士此書駭異其說為多又以胤征為羿簒位時康王之誥為失禮引左氏為證與諸儒之說不同顏呉范司馬無逸說命解三卷右皇朝呉安詩范祖禹司馬康元祐中侍講筵顏復說書崇政殿日所進講說也伊川書說一卷右皇朝程頥正叔之門人記其師所談四十餘篇洪範㑹傳一卷右皇朝孫諤撰元祐中博士其說多本先儒頗攻王氏之失書傳一卷右不載撰人蓋為程正叔之學者疑諸呂所著也詩類毛詩詁訓傳二十卷右古詩三千餘篇孔子刪取其三百一十篇為經後亡其六漢興分為三申公作訓詁號魯詩轅固生作傳號齊詩韓嬰作傳號韓詩皆列學官最後毛公詩出自謂子夏所傳公趙人為河間獻王慱士五傳至東京馬賈二鄭皆授其學魏晉間魯齊詩遂廢而韓詩僅存毛公詩獨行至今世謂其解經㝡密其序蕭統以為卜子夏所作韓愈常以三事疑其非至介甫獨謂詩人所自製按東漢儒林傳曰衞宏作毛詩叙善得風雅之旨隋經籍志曰先儒相承謂毛詩序子夏所創毛公及衞公所潤益愈之言蓋本於此韓詩序芣苢曰傷夫也漢廣曰悅人也序若詩人所自製毛詩猶韓詩也不應不同若是况文意繁雜其不出一人之手甚明不知介甫何以言之殆臆論也漢鄭康成箋毛詩正義四十卷右唐孔頴逹等撰據劉炫劉焯䟽為本刪其所煩而增其所簡云韓詩外傳十卷右漢韓嬰撰嬰燕人其書漢志本十篇内傳四外傳六隋止存外傳折十篇其及經蓋寡而遺說徃徃見於他書如逶迤郁夷之類其義與毛詩不同此書稱外傳雖非其解經之深者然文辭清婉有先秦風詩譜一卷右漢鄭玄康成撰歐陽永叔補完之毛詩草木鳥獸蟲疏二卷右呉陸璣撰或題曰陸機非也璣仕至烏程令新經毛詩義二十卷右皇朝熙寜中置經義局撰三經義皆本王安石說毛詩先命王雱訓其辝復命安石訓其義書成以賜太學布之天下以取士云蘇氏詩解二十卷右皇朝蘇轍子由撰其說以毛詩序為衞宏作非孔氏之舊止存其首一言餘皆刪去按司馬遷曰周道鈌而關睢作揚雄曰周康之時頌聲作乎下關雎作乎上與今毛詩序之意絶不同則知序非孔氏之舊明矣雖然若去序不觀則詩之辭有溟涬而不可知者不得不存其首之一言也伊川詩說兩卷右皇朝程頥正叔門人記其師所談之經也陳氏詩解二十卷右皇朝陳少南撰歐陽詩本義十五卷右皇朝歐陽脩永叔撰歐陽公解詩毛鄭之說已善者因之不改至於質諸先聖則悖理攷於人情則不可行然後易之故所得比諸儒最多但平日不信符命嘗著書以周易河圖洛書為妖妄今又以生民玄鳥之詩為怪說蘇子瞻曰帝王之興其受命之符卓然見於詩書者多矣河圖洛書玄鳥生民之詩豈可謂誣也哉恨學者推之太詳流入䜟緯而後之君子亦矯枉過正舉從而廢之以為王莾公孫之流緣此作亂使漢不失德莾述何自起而歸罪三代受命之符亦過矣禮類周禮十二卷右鄭玄注漢武帝時河間獻王開獻書之路得周官有五篇失冬官一篇乃募以千金不得取考工記以補其闕至孝成時劉歆校理祕書始得序列著于錄略為衆排棄歆獨以為周公致太平之迹永平時杜子春初能通其讀鄭衆鄭興亦嘗傳受玄皆引之以參釋異同云大夫者興也司徒者衆也儀禮十七卷右鄭氏注兩漢諸儒得古文禮凢五十六篇高堂生慱士禮十七篇為禮儀喪服傳一卷子夏所為其說曰周禮為本聖人體之儀禮為末聖人履之為本則重者在前故宗伯序五禮以吉㐫賔軍嘉為次為末則輕者在前故禮儀先冠昏後喪祭唐韓愈謂文王周公法制粗在於是恨不及其時進退揖遜于其間云禮記二十卷右漢戴聖纂鄭康成注聖即所謂小戴者也此書乃孔子没後七十子之徒所共錄中庸孔伋作緇衣公孫尼子作王制漢文帝時博士作河間獻王集而上之劉向校定一百五十篇大戴旣刪八十五篇小戴又刪四十六篇馬融傳其學又附月令明堂義合四十九篇唐孝明刪月令移第一皇朝以禮記不刋之書改正復為第五議者謂經禮三百曲禮三千毋不敬一言足以蔽之故先儒以為首孝明肆情變亂甚無謂也復之當矣大戴禮記十三卷右漢戴德纂亦河間王所獻百三十一篇劉向校定又得明堂陰陽記三十三篇德刪其煩重為八十五篇今書止四十篇其篇目自三十九篇始無四十三四十四四十五六十一四篇有兩七十四蓋因舊缺錄之每卷稱今卷第幾題曰九江太守戴德撰按九江太守聖也德為信都王太傅蓋後人誤題三禮義宗三十卷右梁崔靈恩撰一百五十二篇今此本頗殘缺周禮疏四十卷右唐賈公彥撰公彥洺州人永徽中仕至太學博士著周禮䟽四十卷今併為十二卷儀禮䟽五十卷右唐賈公彥撰齊黄慶隋李孟悊各有䟽義公彥刪二䟽為此書禮記䟽七十卷右唐孔穎逹等貞觀中奉詔撰其序稱大小二戴共氏而分門王鄭兩家同經而異注爰從晉宋逮于周隋傳禮業者江左尤盛其為義䟽者甚多唯皇甫侃熊安生見于世然皇氏為勝今據以為本其不備以熊氏補焉禮記外傳四卷右唐成伯璵撰義例兩卷五十篇名數兩卷六十九篇雖以禮記為目通以三禮言之劉明素序張㓜倫注三禮圖二十卷右聶崇義周世宗時被旨撰以鄭康成阮諶等六家圖刋定皇朝建隆中奏之竇儼為之序明道中庸解一卷右皇朝程顥撰陳瓘得之江濤江濤得之曾天隱天隱得之傅才孺才孺云李丙所藏也芸閣禮記解四卷右皇朝呂大臨與叔撰與叔師事程正叔禮學甚精愽中庸大學尤所致意也編禮三卷右皇朝呂大臨與叔編以士喪禮為本取三禮附之自始死至祥練各以類分其施於學甚惠尚恨所編者五禮中特㐫禮而己新經周禮義二十二卷右皇朝王安石介甫撰熙寜中設經義局介甫自為周官義十餘萬言不解考工記按秦火之後周禮比他經最後出論者不一獨劉歆稱為周公致太平之迹鄭氏則曰周公復辟後以此授成王使居洛邑治天下林孝謂之黷亂不驗之書何休亦云六國陰謀之說昔北宮錡問孟子周室班爵祿之法孟子以謂諸侯惡其害己滅去其籍則自孟子時已無周禮矣况經秦火乎漢濡非之良有以也不知劉鄭何所據而言然又自違異不同王莾嘗取而行之歛財聚貨瀆祀煩民冗猝詭異離去人情遠甚施於文則可觀措於事則難行凢莽之馴致大亂者皆其所致厥後唯蘇綽王通善之諸儒未嘗有言者至於介甫以其書理財者居半愛之如行青苖之類皆稽焉所以自釋其義者蓋以其所創新法盡傅著經義務塞異議者之口後其黨蔡卞蔡京紹述介甫期盡行周禮焉圜土方田皆是也周姬姓故其女曰王姬舍其周姓其臣如宋齊之女亦不曰姬而各氏其姓曰姜氏曰子氏趙嬴姓京乃命帝女稱帝姬噫至於姓亦從焉何其甚也久之禍難並起與莽曾無少異殆書所謂與亂同事者邪中庸篇一卷右族父詹事公撰近世學者以中庸為二事其說是書皆穿鑿而二之於是本諸胡先生司馬溫公程明道張横渠王肅鄭玄作傳焉游氏中庸解一卷右皇朝游酢定夫撰酢亦程正叔門人楊中立中庸解一卷周禮辨疑一卷右皇朝楊時中立撰時載程正叔之言曰不偏之謂中不易之謂庸蓋亦猶王氏之說也周禮辨疑其如辨詩書者也周公謚法一卷右其序曰維周公旦太公望相嗣王發建功于牧野及終將葬乃制謚計一百九十餘條云謚隋志附於論語類中今遷于此春秋謚法一卷右與周公謚法相類而小有異同沈賀謚法四卷右梁沈約撰凢七百九十四條賀琛又加婦人謚二百三十八條嘉祐謚法三卷右皇朝蘇洵明允撰洵嘉祐中被詔編定周公春秋廣謚沈約賀琛扈䝉六家謚法於是講求六家外採今文尚書汲冡師春蔡邕獨斷凢古人論謚之書收其所長加以新意得一百六十八謚三百一十一條芟去者百九十有八又為論四篇以叙其去取之意樂類樂府雜錄一卷右唐段安節撰記唐開國以來雅鄭之樂并其事始古之為國者先治身故以禮樂之用為本後世為國者先治人故以禮樂之用為末先王欲明德於天下深推其本必先修身而修身之要在乎正心誠意故禮以制其外樂以養其内使内之不貞之心無自而萌外之不義之事無由而蹈一身旣修而天下治矣是以禮樂之用不可須臾離也後世則不然設法造令務以整治天下自適其暴戾恣睢之心謂躬行率人為迂濶不可用若海内平定好名之主然後取禮之威儀樂之節奏以文飾其治而已則其所謂禮樂者實何益於治亂成敗之數故曰後世為國者先治人以禮樂之用為末雖然禮文在外為易見歴代猶不能廢至於樂之用在内微密要眇非常情所能知故自漢以來指樂為虛器雜以鄭衞夷狄之音雖或用於一時旋卽放失無復存者况其書哉今裒集數種姑以補書目之闕爾羯鼔錄一卷右唐南卓撰述鼓曲故事補亡樂書三卷右皇朝房庻撰古律旣亡後世議樂者縱黍為之則尺長律管容黍為有餘王朴是也横黍為之則尺短律管容黍為不足胡瑗是也故庻欲先以一千二百黍納之於律管中黍盡乃得九十分為黄鍾之長其說大要以律生尺耳范蜀公本之以製雅樂五音㑹元圖一卷右未知何人所撰謂樂各有譜但取篥譜爲圖以七音十二律使俗易曉大晟樂府雅樂圖一卷右皇朝政和中建大晟樂府起黃鍾于上躬之中指弃塞古今諸儒異同之論此其譜也琴筌十卷右皇朝苟以道撰記造琴法彈琴訣并譜昭徳先生郡齋讀書志卷第一上昭徳先生郡齋讀書志卷第一下春秋類春秋經傳集觧三十卷右晋杜預元凱集劉子駿賈景伯父子許惠卿頴子嚴之注分經之年與傳之年相附其發明甚多古今稱之然其弊則棄經信傳如成公十三年麻隧之戰傳載秦敗績而經不書以爲晋直秦曲則韓役書戰時公在師復不須告克獲有功亦無所諱於左傳之例皆不合不曰傳之謬而猥稱經文闕漏其尤甚者至如此春秋公羊傳十二卷右戴宏序云子夏傳之公羊髙髙傳其子平平傳其子地地傳其子敢敢傳其子壽至漢景帝時壽乃與弟子胡毋子都著以竹帛其後傳董仲舒以公羊顯于朝又四傳至何休為經傳集詁其書遂傳鄭玄曰公羊明讖休注引讖最多春秋榖梁傳十二卷右范寗注應劭風俗通稱榖梁名赤子夏弟子縻信則以為秦孝公同時人阮孝緒則以為名俶字元始皆未詳也自孫卿五傳至蔡千秋漢宣帝好之遂盛行于世自漢魏以來為之註解者有尹更始唐固縻信孔寅江熙等十數家而范寗皆以為膚淺於是帥其長子參中子雍小子凱從弟邵及門生故吏商畧名例博采諸儒同異之説成其父汪之志嘗謂三傳之學榖梁所得最多諸家之觧范寗之論最善寗字武子春秋外傳國語二十一卷右魯左丘明撰吳韋昭弘嗣集鄭衆賈逵虞翻唐固四家説成此觧皇朝宋庠為補音三卷班固藝文志有國語二十一篇隋志云二十二卷唐志云二十一卷今書篇次與漢志同蓋歷代儒者析簡併篇互有損益不足疑也要之藝文志審矣陸淳謂與左傳文體不倫定非一人所為蓋未必然范寗云左氏富而艶韓愈云左氏浮夸今觀此書信乎其富艶且浮夸也非丘明而誰桞宗元稱越語尤竒峻豈特越哉自楚以下類如此春秋繁露十七卷右漢董仲舒撰史稱仲舒説春秋事得失聞舉玉杯繁露清明竹林之属數十篇十餘萬言皆傳於後世今溢而為八十二篇又通名繁露皆未詳隋唐卷目與今同但多訛舛春秋釋例十五卷右晋杜預撰凢四十部集左傳諸例及地名譜第曆數皆顯其同異從而釋之發明尤多昔人稱預爲左氏忠臣而預自以爲有傳癖觀此尤信左氏膏肓九卷右漢何休撰休始荅賈逵事因記左氏之短鄭康成嘗著膏肓後人附之逐章之下春秋正義三十六卷右唐孔頴逹撰自杜預專治左氏學其後沈文阿蘇寛劉炫皆有義疏而炫性矜伐雅好非毁䂓杜氏之失一百五十餘事義特淺近然比諸家猶有可觀今書據以為本而以沈氏補其闕焉春秋公羊疏三十卷右不著撰人李獻民云徐彦撰以何氏三科九㫖為宗本其説曰何氏之意三科九㫖正是一事爾總而言之謂之三科析而言之謂之九㫖新周故宋以春秋當新王此一科三㫖也所見異辭所聞異辭所傳聞異辭此二科六㫖也内其國而外諸夏内諸夏而外夷狄此三科九㫖也盧仝春秋摘㣲四卷右唐盧仝撰其經觧不用傳然㫖意甚疎韓愈謂春秋三傳束髙閣獨抱遺經究終始蓋實録也祖無擇得之於金陵崇文揔目所不載春秋微㫖六卷右唐陸淳伯同撰淳吳人纂三傳不同擇其善者質以啖助趙匡之説助字叔佐閩人匡字伯修天水人微㫖自為序予嘗學春秋閲古今諸儒之説多矣大抵啖趙以前學者皆顓門名家苟有不通寜言誤其失也固陋啖趙以後學者喜援經繫傳其或未明則慿私臆决其失也穿鑿均之失聖人之㫖而穿鑿者之害為甚春秋折衷論三十卷右唐陳岳撰以左氏傳為上公羊為中榖梁傳為下比其異同而折中之岳唐末從鍾傳辟為江西從事春秋㑹義二十六卷右皇祐間進士杜諤集釋例繁露䂓過膏肓先儒同異篇指掌碎玉折衷指掌議纂例辨疑微㫖摘微通例胡氏論箋義揔論尊王發微本㫖辨要㫖要集議索隱新義經社三十餘家成一書其後仍斷以巳意雖其説不皆得聖人之㫖然使後人博觀古今同異之説則於聖人之㫖或有得焉春秋正經一卷右以左氏經為本其與公榖不同者注于下春秋世系一卷右不著撰人姓名譜左氏諸國君臣世系獨秦無世臣春秋尊王發微十二卷右皇朝孫明復撰史臣言明復治春秋不取傳註其言簡而義詳著諸大夫功罪以考時之盛衰而推見治亂之迹故得經之意為多常秩則譏之曰明復為春秋猶商鞅之法棄灰于道者有刑歩過六尺者有誅謂其失於刻也胡安國亦以秩之言為然春秋集傳十五卷右皇朝王㳂撰三傳解經之文春秋權衡十七卷春秋意林二卷春秋劉氏傳十五卷右皇朝劉敞原父撰權衡論三傳之失意林叙其解經之㫖劉氏傳其所解經也如桓無王季友卒胥命用郊之類皆古人所未言黎氏春秋經解右皇朝黎錞希聲撰錞蜀人歐陽公之客名其書為經解者言以經解經也其後又為統論附焉横渠春秋説一卷右皇朝張載子厚撰為門人雜説春秋其書未成頴濵春秋集傳十二卷右蘇轍子由撰大意以世人多師孫復不復信史故盡棄三傳全以左氏為本至其不能通者始取二傳啖趙自熙寧謫居髙安至元符初十數年矣暇日輙有改定卜居龍川而書始成劉質夫春秋五卷右皇朝劉絢質夫撰絢學於二程之門伯淳嘗語人曰他人之學敏則有矣未易保也斯人之至吾無疑焉正叔亦曰㳺吾門者多矣而信之篤得之多行之果守之固若子者幾希有李參序得法忘例論三十卷右皇朝馮正符所撰熙寜八年何郯取其書奏之而久之不報意者王安石不喜春秋故也其書例最詳悉務通經㫖不事浮辭後坐鄧綰陳亨甫語言被斥繹聖傳十二卷右皇朝任伯雨徳翁所撰觧經不甚通例如觧桓十三年二月公㑹紀侯鄭伯己已及齊侯宋公衛侯燕人戰齊師宋師衛師燕師敗績取糓梁之説戰稱人敗績稱師重衆之説殊不知齊人代衛衛人及齊人戰衛人敗績何獨不重衆也胡氏春秋傳三十卷右皇朝胡安國被㫖撰安國師程頥其傳春秋事按左氏義取公榖之精者採孟子荘周董仲舒王通邵堯夫程明道張横渠程正叔之説以潤色之其序畧曰近世推隆王氏新説按爲國是獨於春秋貢舉不以取士庠序不以設官經筵不以進讀斷國論者無以折衷天下不知所適人欲日長天理日消其効使夷狄亂華莫之遏也王氏春秋十二卷右皇朝王當撰當眉山人嘗為春秋列國諸臣傳十餘萬言今又釋春秋真可謂有志矣馮氏春秋通觧十二卷右皇朝馮山字允南撰普州人澥之父也春秋新傳十二卷右皇朝余安行撰采左氏公羊榖梁及諸家之得失參以己意為之春秋指南十卷右吳園先生張根知常撰以征伐㑹盟年經而國緯汪藻為之序四家春秋集觧二十五卷右或人集皇朝師恊石季長王棐景先之觧為一通具載本文非國語兩卷右唐桞宗元子厚撰序云左氏國語其文深閎傑異而其説多誣淫懼學者溺其文采而淪於是非本諸理作非國語上卷三十一篇下卷三十六篇春秋列國諸臣傳五十一卷右皇朝王當撰類左氏所載列國諸臣事効司馬遷為之傳凢一百三十有四人系之以贊云左氏綱領四卷右皇朝文濟道撰排比事實為儷句䝉求之類也左氏䝉求三卷右皇朝王舜俞序不知何人所作過於綱領者春秋機括一卷右皇朝沈括存中撰春秋譜也春秋纂例十卷右唐陸淳撰其序云啖氏製統例分䟽通㑹其義趙氏損益多所發揮今纂而合之凢四十篇孝經類孝經一卷右漢初顔芝之子真獻于朝千八百七十二字唐玄宗註序稱取王肅劉邵虞翻韋昭劉炫陸澄六家説約孔鄭舊義為之何休稱子曰吾志在春秋行在孝經信斯言也則孝經乃孔子自著者也今其首章云仲尼居曾子侍則非孔子所著明矣詳其文義當是曾子弟子所為書也桞宗元謂論語載弟子必以字獨曾參不然蓋曾氏之徒樂正子春子思與為之耳余於孝經亦云孝經正義三卷右皇朝邢昺等撰世傳孝經疏外餘家尚多咸平中昺集説為此書孝經解一卷右皇朝王安石介甫撰經云當不義則子不可不諍於父而孟子猥曰父子之間不責善夫豈然哉今介甫因謂當不義則諍之非責善也噫不為不義即善也阿其所好以巧慧侮聖人之言至此君子疾夫古文孝經指解一卷右古文二十二章與尚書同出於壁中蓋孔惠所蔵者與顔芝十八章大較相似而析出三章又有閨門一章不同者四百餘字劉向校書以十八章為定故世不大傳獨有孔安國注今亡然諸家説不安處古文字讀皆異推此言之未必非真也皇朝司馬文正公為之指觧并音古文孝經説一卷右皇朝范祖禹夢得撰元祐中侍經幄時所上論語類論語十卷右魏何晏集解其序自云據魯論包氏周氏孔安國馬融鄭康成陳羣王肅周生烈八家之説與孫邕鄭同曹羲荀顗集諸家訓解為之按時論語凢有三而齊論有問王知道兩篇詳其名是必論内聖之道外王之業未必非夫子之最致意者不知何説而張禹獨遺之禹身不知王鳯之邪正其不知此固冝然勢位足以軒輊一世使斯文遂喪惜哉鄭同名觸先公諱司馬遷父名談以趙談子為固子故予亦云後倣此論語正義十卷右梁王侃甫侃折一云皇採衛瓘蔡謨等十三家説為疏國朝邢昺等因之撰此書王介甫論語解十卷右皇朝王安石介甫撰紹聖後亦行於埸屋伊川論語説十卷右皇朝程頥正叔之門人記其師所解論語也不為文辭直以俚語記之東坡論語解十卷右皇朝蘇軾子瞻撰子瞻没後義有未安者其弟子由嘗辨正之凢二十有七章范氏論語説十卷右皇朝范祖禹醇夫撰亦元祐中所進數稱引劉敞程頥之説云謝顯道論語解十卷右皇朝謝顯道撰少常師事程正叔景迂論語講義十卷右從父詹事公撰多取古儒之説以正近世之失楊氏注論語十卷右皇朝楊時中立撰亦伊川門下士也尹氏論語義十卷右皇朝尹焞彦明撰彦明亦程氏門下人紹興中自布衣召為崇政殿説書被㫖訓觧多采純夫之説孔子家語十卷右魏王肅序注凢四十四篇劉向校録止二十七篇後肅得此於孔子二十四世孫猛家經觧類白虎通徳論十卷右後漢章帝㑹羣臣於白虎殿講論五經同異班固奉詔纂七經小傳五卷右皇朝劉敞原甫撰所謂七經者毛詩尚書公羊周禮儀禮禮記論語也元祐史官謂慶曆前學者尚文辭多守章句注數之學至敞始異諸儒之説後王安石修經義蓋本於敞予觀原甫伊尹相湯伐桀升自陑之説之類經義多勦取之史官之言良不誣也漁樵對問一卷右皇朝張載撰設為荅問以論隂陽化育之端性命道徳之奧云程氏雜説一卷右皇朝程頥正叔門人記其師之言儒言一卷右從父詹事公撰其書蓋辨正王安石之學違僻者三墳書七卷右皇朝張商英天覺得之於比陽民家墳皆古文而傳乃隷書所謂三墳者山氣形也按七略不載三墳隋志亦無之世皆以為天覺偽撰蓋以比李筌隂符經云信聞記一卷右皇朝張載撰雜解六經六祖經要四卷右皇朝任洙撰洙自言受學於呂隱君凢五十門皆數學也小學類爾雅三卷右世傳釋詁周公書也仲尼子夏叔孫通梁文增補之晋郭璞注文字之學凢有三其一體制謂點畫有衡緃曲直之殊其二訓詁謂稱謂有古今雅俗之異其三音韻謂呼吸有清濁髙下之不同論體製之書説文之類是也論訓詁之書爾雅方言之類是也論音韻之書沈約四聲譜及西域反切之學是也三者雖各一家其實皆小學之類而藝文志獨以爾雅附孝經類經籍志又以附論語類皆非是今依四庫書目置于小學之首爾雅疏十卷右舊有孫炎髙璉疏皇朝以其淺畧命邢昺杜鎬等别著此書方言三卷右漢揚雄子雲撰晋郭璞注雄齎油素問上計孝亷異語悉集之題其首曰輶軒使者絶代語釋别國方言玉篇三十卷右梁顧野王撰唐孫彊又嘗增字僧神珙反紐圖附于後廣韻五卷右隋陸法言撰其後唐孫愐加字凢四萬三千三百八十三前有法言長孫訥孫愐三序經典釋文三十卷右唐陸徳明撰釋易書詩三禮三傳孝經論語爾雅老荘頗載古文及諸家同異徳明蓋博極羣書也羣經音辨七卷右皇朝賈昌朝撰先是大臣稽古不過秦漢引經議政蓋自昌朝始此書以古今多通借音詁乃辨正之凢五門禮部韻畧五卷右皇朝丁度等撰元祐中孫諤蘇軾再加詳定類篇四十九卷右皇朝景祐中丁度受詔修類篇至熙寜中司馬光始奏音文三萬一千三百一十九重音二萬一千八百四十六以説文為本集韻十卷右皇朝丁度李淑與宋祁鄭戬王洙賈昌朝同定字五萬三千五百二十五比舊增二萬七千三百三十一龍龕手種三卷右契丹僧行均撰凢二萬六千四百三十字注十六萬三千一百餘字僧智光為之後題云統和十五年丁酉按紀年通譜邪律隆緒嘗改元統和丁酉至道三年也沈存中言契丹書禁甚嚴傳入中國者法皆死熙寜中有人自虜中得此書入傅欽之家蒲傳正帥浙西取以刻板其末題云重熙二年序蒲公削去之今本乃云統和非重熙豈存中不見舊題妄記之邪佩觹三卷右皇朝郭忠恕撰上篇論古今傳記小學異同極為辨博切韻指玄論三卷右皇朝王宗道撰論字之五音清濁四聲等第圖一卷右皇朝僧宗彦撰切韻之訣也説文解字十五卷右漢許慎纂李陽氷刋定偽唐徐鉉再是正之又增加其闕字字説二十卷右皇朝王安石介甫撰蔡卞謂介甫晚年閒居金陵以天地萬物之理著為此書與易相表裏云而元祐中言者指其糅雜釋老穿鑿破碎聾瞽學者特禁絶之陸氏埤雅二十卷右皇朝陸佃農師撰書載虫魚鳥獸草木名物喜採俗説然王安石客也而其學不專主王氏亦特立者字説偏傍音釋一卷字説疊解備檢一卷右不見撰人姓名押韻六卷右皇朝張孟撰緝六藝諸子三史句語依韻編入以備舉子試詩賦之用復古編三卷右皇朝張守謙中撰守自㓜喜小篆年六十成此書三千言據古説文以為正其㸃畫之微轉側縱横髙下曲直毫髪有差則形聲頓異自陽冰前後名人格以古文徃徃而失其精且博如此鍾鼎篆韻七卷右皇朝薛尚功集元祐中呂大臨所載僅數百字政和中王楚所傳亦不過數千字今是書所録凢一萬一百二十有五淳化法帖十卷右皇朝淳化中出禁中所藏歷代君臣書命刋之板後大臣二府皆以賜焉歐陽公云徃時禁中火焚其板或云尚在但不賜爾武陵法帖二十二卷右皇朝王若谷以祕閣法帖合潭絳臨江汝海諸帖參校有無補其遺逸成是書鼎中張斛刋之石法帖釋文十卷右淳化法帖既巳焚板元祐中有劉次荘者模刻之石復取帖中草書世所病讀者為釋文行於世考古圖十卷右皇朝呂大臨與叔撰裒諸家所藏三代秦漢尊彛鼎敦之屬繪之于幅而辨論形制文字愽古圖三十卷右皇朝王楚集三代秦漢彛器繪其形範辨其欵識增多呂氏考古十倍鍾鼎欵識二十卷右皇朝薛尚功編考古博古之類然猶為詳備博雅十卷右隋曹憲撰魏張揖嘗採蒼雅遺文為書名曰廣雅憲因揖之説附以音觧避煬帝諱更之為博云後有張揖表昭徳先生郡齋讀書志卷第一下
