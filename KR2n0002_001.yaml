front:
  text: 昭德先生郡齋讀書志卷第一上自漢武帝之後雖世有治亂無不知崇尚典籍劉歆始著七畧緫錄羣書一曰輯畧二曰六藝三曰諸子四曰詩賦五曰兵書六曰術數七曰方技至荀朂更著新簿分為四部一曰甲部紀六藝及小學等書二曰乙部有古今諸子家及兵書術數三曰丙部有史記及故事四曰丁部有詩賦圖讚朂之簿蓋合兵書術數方技於諸子自春秋類摘出史記别為一六藝諸子詩賦皆仍歆舊其後歴代所編書目如王儉阮孝緒之徒咸從歆例謝靈運任昉之徒咸從朂例唐之分經史子集藏於四庫是亦祖述朂而加詳焉歐陽公謂其始於開元其誤甚矣今予所錄書史集猥衆若依七畧則多寡不均故亦分為四部焉經部其類十一曰易類二曰書類三曰詩類四曰禮類五曰樂類六曰春秋類七曰孝經類八曰論語類九曰經解類十曰小學類孔氏之敎别而為六藝數十萬言其義理之富至於不可勝原然其要片言可斷曰修身而已矣修身之道内之則本於正心誠意致知格物外之則推於齊家治國平天下内外兼盡無施而不冝學者若以此而觀六藝猶坐璇璣以窺七政之運無不合者不然則悖謬乖離無足恠也漢承秦後六藝皆出於灰燼之餘學者顓門名家故易有田氏焦氏費氏詩有魯詩韓詩齊詩春秋有鄒郟左丘明公羊高榖梁赤禮樂有大小戴之殊書有古文今文之異各尊其師說而伐其異已者黨枯骸䕶蠧簡至於忘父子君臣之分爭辯不少屈其弊甚矣迨至晉魏之後此弊雖衰而學者徒剽賊六藝之文飾其辭章以譁世取寵而不復有明道之意無以議為及唐之中葉海内乂安士稍知宗尚經術而去聖愈遠異端並興學書者則以今文易古文而頗改其辭學春秋者則合三傳之同異而雜舉其義不本所承決以胷臆以迄于今釋老申韓之說雜然滿於六經之中雖與漢儒之學不同而其失一也凢此者豈有他哉皆不能探修身之道及刻意於章句是以迢迢千載之間悖謬乖離殊塗而同歸至此其極悲夫今所錄漢唐以來之書甚備觀者其愼擇焉論語孝經自班固以來皆附經類夫論語羣言之首孝經百行之宗皆六經之要其附於經固不可易又藝文志有小學類四庫書目有經解類蓋有補於經而無所系屬故皆附于經今亦從之
