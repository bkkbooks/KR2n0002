front:
  text: 昭德先生郡齋讀書志卷第五下
  hash: sha256:fadee0a42fab577d3a48b4c30bc705b141ba221df32b3b0a29883112f5ba90ff
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0002_SBCK_015-1a}
body:
  text: 附志江西漕貢進士祕書省校勘書籍趙希弁楚辭類楚辭集註八卷後語六卷辨證一卷右朱文公所定也離騷凢七題二十五篇皆屈原作定為五卷續離騷八題十六篇定為三卷校晁氏本増弔屈原服賦二篇而去七諌九懐九歎九思四篇公謂四篇雖為騷體然詞氣平緩意不深切如無所疾痛而强為呻呤者就其中諌嘆猶粗可觀兩王則卑已甚矣故雖幸附書尾而人莫之讀今不復以累篇袠也賈傅之詞於西京爲最髙且惜誓已著于篇而二賦尤精乃不見取亦不可曉故併録以附焉後語定著五十二篇公謂屈子者窮而呼天疾痛而呼父母之詞也故今所欲取而使繼之者必其出於幽憂窮蹙怨慕凄涼之意乃爲得其餘韻而宏衍鉅麗之觀懽愉快適之語宜不得而與焉至論其等則又必以無心而冥㑹者爲貴其或有是則雖逺且賤猶將汲而進之一有意於求似則雖迫近如楊柳亦不得已而取之耳騷自楚興公之加意此書則作牧于楚之後也或曰有感於趙忠定之變而然離騷章句一卷右吕成公所分也以離騷經一篇為十六章公謂王逸嘗言劉向典校分離騷為十六卷班固賈逵各作離騷章句惟一卷傳焉餘十五卷闕而不録今觀屈平所作凢二十有五各有篇目獨此一篇謂之離騷切意劉向所分即此篇猶一篇之中有數章焉故嘗因逸之言即離騷一篇反復求之考其文之起伏意之先後固有十六章次弟矣因而分之為十六章東萊集中不載離騷草木䟽四卷右通直郎行國子録河南呉仁傑撰慶元間自序别集類一申鑒五卷右後漢荀恱所作也恱字仲豫儉之子也儉早卒恱年十二能說春秋家貧無書每之人間所見篇牘一覽多能誦記尤好著述靈帝時閹宦用權士多退身窮處恱乃託疾隠居初辟鎮東將軍曹操府遷黄門侍郎侍講禁中累遷祕書監侍中時政移曹氏天子恭已而已恱志在獻替而謀無所用乃作申鑒五篇其所論辨通見政體既成而奏之其大畧曰前鑒既明後復申之故古之聖王其於仁義也申重而已恱嘗依左氏傳體為漢紀三十篇又著崇徳正論及諸論數十篇建安十四年卒孔稚珪集十卷右齊孔稚珪字徳璋之文也稚珪道隆孫㑹稽山隂人為東南冠族少知名有文彩辭章清抜獨冠當世舉秀才為安成王法曹叅軍齊髙帝時補記室叅軍終於都官尚書散騎常侍太子詹事追贈金紫光禄大夫謚簡子集有序云所為文章雖行於世竟未撰集今摭其遺逸分為十卷然莫知其為誰序也詩品三卷右梁征逺記室參軍鍾嶸撰嶸字仲偉南史有傳嶸嘗求譽於沈約約拒之及約卒嶸品古今詩為評言其優劣云觀休文衆製五言最優齊永明中相王愛文王元長等皆宗附約于時謝眺未遒江淹才盡范雲名級又微故稱獨歩故當辭宻於謝意淺於江蓋追宿憾以報約也陸宣公文集二十二卷右唐陸贄敬輿之文也讀書志云陸贄奏議十二卷希弁所藏制誥十卷奏草六卷奏議六卷凢二十二卷云李翰林文集三十卷右唐李白太白之文也讀書志云二十卷希弁所藏三十卷以常山宋敏求南豐曽鞏序攷之則三十卷為是然第一卷乃李陽冰魏顥樂史三人所作序李華劉全白范傳正裴敬四人所作誌與碑第二卷以後乃白詩文云黄氏補千家集註杜工部詩史三十六卷外集二卷右唐杜甫少陵之詩也嘉定中臨川黄希夢得及其子鶴叔似所補也外集上卷詩二十九首下卷祭逺祖當陽君文祭外祖祖母文為閬州王史君進論巴蜀安危表東西兩川說凢四篇以唐書本傳冠于前而吕汲公年譜附于後云昌黎先生文集四十卷外集三卷順宗實録五卷附録三卷右唐韓愈退之之文也讀書志云韓愈集四十卷集外文一卷希弁所藏合五十一卷嘗以宜春新舊本兼饒本叅校又以嘉祐壬寅所刋杭本是正之饒本刋年譜於目録之後刋附録於外集之前又附録止載九篇而前後共列五序柳開但曰後序亦不書其姓名杭本並無目録年譜附録亦無柳開一序趙徳之序文録列于李漢之先歐陽修之記舊本較之他集則異他本所載者六百二十七字杭本所刋者一百六十二字以嘉祐壬寅考之歐陽方在政府刋者不應謬誤豈非後來更改而然歟遂寫杭本歐陽之序饒本汲公之記續於附録之後石守道秦少游張文潜之論黄魯直蔣頴叔李伯紀之詩鄭介甫之祭文陳元光之集序黄直卿之記新廟真希元之記祠堂又寫附歐吕二公之後而諸賢評論先生之文者各以其說註于逐篇之上若夫委緌大學宜序天臺之属此先生除都官郎之誥詞也當攷誰行道徳博聞此先生謚文公之法也當攷誰議有所謂示浩初序之書者王逢原代先生之作也續駑驥行之詩者李泰伯廣先生之說也如此類者亦當寫補附録之缺云柳先生文集四十五卷外集二卷附録二卷右唐柳宗元子厚之文也讀書志云柳宗元集三十卷集外文一卷希弁所藏卷帙與劉禹錫四十五通之說同以諸本點校寫諸公評論於逐篇之上附録中先後失次者正之遺缺者補之若夫昌黎所作先生墓誌祭文他本皆在附録中惟此本在正符之後盖禹錫自謂附于第一通之末也朱文公嘗謂柳文後龍城雜記王銍性之所為也子厚叙事文字多少筆力此記衰弱之甚皆寓古人詩文中不可曉知底於其中似暗影出云杜詩辨證一卷右洪興祖所纂也年譜列于前興祖字慶善鎮之丹陽人也張釡刻于興國韓文考異十卷右朱文公所定也以南安舉正及祥符杭本嘉祐蜀本李謝所據舘閣本考其同異一以文勢義理及它書之可證驗者決之云嘉定戊辰三山鄭自誠刻而叙其後韓文音義一卷右右從政郎潭州寧鄉縣丞祝充所進也毛叔度為之序張枃刻而叙其後柳文音釋一卷右南城童宗說編韓集舉正一卷右莫詳誰作而說云唐儒郭京有周易舉正三卷盖以所得王輔嗣韓康伯註定真本舉正傳本之訛題義取云文標集三卷右唐集賢學士盧肇之文也肇字子發宜春人幼好學頴抜不羣宜春令盧㠋一見竒之曰子異日有聞乎由是愈激厲唐㑹昌二年預江西解試末送啟謝曰巨鼇贔屭首冠蓬山主文詢其謂對曰巨鼇不靈頑石在上一坐盡笑唐制取士許簾獻所業先察其素時王起知舉肇為書以獻起問曰鄉薦如公材幾何對曰皆才選也未易品判然如肇者亦猶沅江之鼈九肋實希繼而同舉黄頗進謁起問如初則曰捨頗其誰才起由是少頗而多肇之謙始李徳裕以言事出為宜春長史嘉肇文行異禮之至是徳裕以言事遷太尉總樞柄絶朋黨晚進寒素難游其門獨肇入謁常許袍帶從容談論既試有期知舉以取士白亦舊例也徳裕曰某不薦人然喜今榜得一狀元矣迨試果魁中任著作郎遷京兆府司録使相盧商裴休盧簡求爭辟之歴集賢學士歙宣池三州刺史所至皆有可紀後為吉州刺史卒靈溪集七卷右唐王貞白之文也貞字有道信州永豐人乾寧二年進士後七年調校書郎手編所為詩三百篇命曰靈溪集云慶元中洪文敏公邁為之序别集二趙韓王文集五卷右韓忠獻王趙普之文也讀書志云文集三卷而叙述甚畧希弁所藏文集一册列劉昌言所作行狀于前記一表䟽二十九附手詔批荅五奏狀劄子二十五附御詩二十一啟狀十詞帖三希弁又得其謝請班師批荅一表於國史本傳賀平江南一表及與諸公遺書於國朝文粹通六十八篇以太宗皇帝御製神道碑冠于帙首并行狀為一卷次以記又次以表䟽又次以奏狀劄子又次以啟狀詞帖成五卷碑稱晚嵗酷愛讀書經史百家常存几案强記黙識經目諳心碩學老儒宛有不及又為之銘曰經綸宏異學識通該傳亦稱普初以吏道聞寡學術及為相太祖常勸以讀書晚年手不釋卷謚以忠獻取慮國忘家薦可替否之法也追封韓王配享太祖皇帝廟庭韓魏王安陽集五十卷右魏忠獻王韓琦之文也王安陽人故以名集王字稚圭天聖五年進士第二人定䇿三朝功在國史神宗皇帝御製神道碑有云薨前一夕有大星殞于園中櫪馬皆鳴又曰公奉詔立皇子句被顧命立英宗為皇帝句立朕以承祖宗之序可謂定䇿元勛之臣矣又為之銘曰公行不歸中夕是悼尚想公儀淚落苑草復御篆十字填金以冠其額曰兩朝顧命定䇿元勛之碑贈尚書令謚忠獻取慮國忘家文賢有成之法也追封魏王配享英廟楊文公武夷集二十卷右楊文公億之文也景徳丁未公所自編序於前曰目之武夷盖山林之士不忘維桑之情雕篆之文竊懐敝帚之愛命題之意盖以是也集凢五百七十五篇公兩為翰林學士冦凖得罪公憂畏而卒自唐大中後文氣衰濫國朝稍革其弊至億乃振起風采與古之作者方駕矣景祐初贈禮部尚書謚曰文鎮國節度使駙馬都尉李遵朂乞加謚忠字奏雖不行詔付史舘种隱君江南小集二卷右种放字明逸之文也明逸洛陽人少時徃來嵩華間慨然有山林之志隱居終南豹林谷自號雲溪醉叟又號退士聞陳搏之風徃見之放作樵夫拜庭下搏挽之而上曰君豈樵者耶二十年當為顯官名聞天下放曰放為道義官禄非所願也搏笑曰人之貴賤莫不有命貴者不可為賤亦猶賤者之不可為貴也君骨相當爾雖晦迹山林恐不能安異日當自知之太宗時召之不起真宗時召為左司諫携其手登龍圖閣論天下事累遷工部侍郎嘗侍宴真宗令羣臣賦詩杜鎬以素不屬辭誦北山移文以譏之真宗因出放所上時議十二篇謂近臣曰放為朕言事甚衆但人無知者耳放一日晨興忽取前後章䟽槀焚之服道士服召諸生飲與訣酒數行而卒年六十贈工部尚書集凢二百九十四篇乃淳化三年李介所編者序謂以所集之地定名故曰江南小集云歐陽文忠公文集一百五十三卷附録五卷廬陵歐陽先生六十一卷右歐陽文忠公脩永叔之文也讀書志云文忠公集八十卷諫垣集八卷希弁所藏一百五十三卷内居士集五十卷外集二十五卷易童子問三卷外内制十一卷表奏書啟四六奏議二十五卷雜著述十九卷集古録跋語一十卷附録五卷别一本六十一卷乃舊物也張文定玉堂集二十卷右張文定公方平之文也公字安道宋城人明道二年以茂材異等擢為校書郎神廟時參大政元祐六年終於太子少師致仕贈司空謚文定公出入兩禁垂二十年一時大典多出其手劉忠肅嘗序其玉堂集二十卷乃在東坡所序樂全集四十卷之外淳熈九年錫山尤袤重刻于江西漕臺范文正公奏議十五卷右范文正公仲淹之奏議也皇祐五年韓魏王為河東經畧安撫使知并州時所序也公字希文蘇州人中進士第嘗與韓魏王開府涇州經畧邊事元昊請和召拜樞副除參知政事以資政殿學士户部侍郎卒贈兵書謚文正上篆其碑額曰褒賢别有丹陽集二十卷東坡先生序之王岐公華陽集一百卷右王文恭公珪之文也大觀二年詔故相歧國王公之家以文集來上其子朝奉大夫管勾南京鴻慶宫上䕶軍仲修等表進之許光疑為之序公字禹玉成都華陽人也舉進士廷試第二以左僕射歧國公薨于位贈太師謚文恭紹聖中為章悙所誣追貶萬安軍司户元符三年其子仲修訴父寃乃盡復故官贈謚及蔡京用事又以珪為臣不忠入黨籍哲宗甞篆其碑額曰懿文徽宗又賜之曰元豐治定弼亮功臣范忠宣公文集二十卷右范忠宣公純仁之文也後三卷乃國史載公本傳及行狀公字堯夫文正公次子以恩補太祝中皇祐元年進士第再相元祐之間元符末自潁昌以大觀文中太一宫使召以疾不赴薨上覽遺表震悼贈開府儀同三司謚忠宣賜其墓碑曰世濟忠直曽文昭公銘之四明樓鑰序其文别有臺諫論事五卷邊防奏議二十卷又在此文之外劉忠肅公文集四十卷右劉忠肅公摯之文也忠肅制誥附于後元城先生劉安世序之公名摯字莘老永靜軍東光人嘉祐中登進士甲科元祐六年拜右僕射出知鄆州紹聖四年責鼎州團練副使新州安置薨詔許歸葬追復觀文殿學士中興贈少師謚正肅以家諱改忠肅陳忠肅公諌垣集二卷右陳忠肅公瓘所作也瓘字瑩中延平人元豐二年進士甲科徽宗朝為右正言遷右司諌坐黨籍除名勒停送袁州編管崇寧初移亷州又移郴及彗出仆黨碑乃得自便靖康初贈諌議大夫擢其季子為密院檢詳嘗因奏對許刋其家集云道郷鄒忠公奏議十卷右鄒忠公浩之文也龜山先生為之序公字至全常州晉陵人舉進士累遷右正言上䟽諌立劉皇后除名新州覊管然世所傳䟽其辭詆訐盖當時小人偽為之以激怒者也公之子柄後因賜對首辨此事且繳元䟽副本上之詔付史館贈公寳文閣直學士謚曰忠趙豐公忠正徳文集十卷右豐國趙忠簡公鼎之文也始號得全居士集周文忠公序之曰髙宗中興用宰相十五人曰忠曰正曰徳曰文兼而有之者其惟趙公元鎮乎此非私言髙宗大書賜公云爾遂以名其集又謂唐用兵伐叛詔書付宰相乃下處報機急武宗必命徳裕起草與公事業如出一揆又謂徳裕自分司東都貶潮之司馬鼎奉祠四明以散官安置于潮徳裕貶朱崖司户而卒公亦移置此地薨按公薨於紹興十七年乾道四年賜謚忠簡上曰此謚甚稱陳俊卿曰真所謂正直無邪曰簡追封豐國公贈太傳配食髙廟胡文定公武夷集十五卷右胡文定公安國之文也公之子太常丞寧輪對奏事上問乃父既解釋春秋尚當有他論著其具以進徽猷閣直學士左承議郎致仕寅遂表上之安國字康侯建之崇安人中紹聖四年進士第終于寳文閣直學士謚文定呉康肅公湖山集四十三卷别集一卷和陶詩三卷附録三卷右呉康肅公芾之文也附録則行狀神道碑及謚誥周益公為之序公字明可台之仙居人紹興二年進士中第嘗為御史歴吏户禮刑少常伯給事中以龍圖閣直學士致仕卒謚康肅自號湖山居士云忠恪章公文集二十卷右章忠恪公誼之文也公字且叟丹陽人崇寧二年進士建炎三年通判杭州苖劉之變公正色以斥時希孟二賊就擒擢倉部外郎累遷樞密都承㫖同孫近使金國歸拜刑部尚書終於端明殿學士提舉明道宫謚忠恪集乃陳季習序許右丞襄陵文集二十二卷詩二卷行狀一卷右尚書右丞許翰之文也翰字崧老拱之襄邑人登元祐進士第建炎初元自提舉鴻慶宫召拜右丞屢章丐罷除資政提舉洞霄宫紹興二年以提舉萬夀觀召懇求外祠又乞致仕道卒于吉州贈光禄大夫行狀中載其章䟽為多李莊簡公文集二十卷右李莊簡公光之文也光字泰發紹興中叅知政事庚申嵗虜敗盟奪河南地光在榻前攻檜之短遂罷尋謫藤州移瓊州又移萬安檜死量移郴己卯用赦放還舟行至江州而卒洪文惠盤洲集八十卷右文惠公洪适之文也公字景伯紹興十二年與文安公遵同中博學宏詞科宰臣進呈所試制詞髙宗曰父在逺子能自立可嘉宜與陞擢遂除勑令所刪定官後三年文敏公邁亦中選由是洪氏文名滿天下适以乾道元年十二月拜通奉大夫尚書右僕射兼樞密使淳熙十一年二月薨於家前自撰遺表上之神道碑謚議附于集後孫尚書大全集五十七卷右孫覿之文也覿字仲益蘭陵人大觀三年進士常以靖康間文字得罪廢徙乆之終於左朝奉郎龍圖閣待制趙中書棲雲集二十五卷右中書舎人趙昶之文逵字莊叔紹興辛未入奉大對天子親擢為第一嘗卜居溪山間榜之曰棲雲故名其集潘文燾編周麟之所撰墓誌附于後徐學士北門集十二卷右徐鳯之文也盧壯父刻于瑞陽王荆公詩註五十卷右李文懿公壁所註魏文靖公了翁序孔毅父詩戯一卷右孔平仲毅甫之詩也向子諲跋之平仲父延之字長源生文仲武仲平仲皆登制科晚又得子極頴悟多才思有故人見其三子既顯貴以書勸長源歸休長源報書云某又有一子年七嵗能作梅花詩云舊葉落未盡新花開更繁俟其及第則致仕未幾而夭黄直講泉書十卷右國子監直講黄君俞之說也觀其自序蓋仁廟時閩人也所謂六經關言二傳節適三史訓彛五經續註六代史記惜不得而見之矣蒭蕘集十卷右從政郎差充嚴州州學教授鄭範撰進凢五十篇一曰叙篇叙述其所以言之意云别集類三河東先生文集十五卷右如京使知滄州河東伯栁開字仲塗之文也讀書志云柳仲塗集一卷希弁所藏乃十五卷咸平三年張景序云緝其遺文得九十六首成十五卷命之曰河東先生集行狀附于後亦景所撰也開著書號東郊野夫又號補亡先生作二傳以見意開垂絶語景曰吾十年著一書可行於世景為名之曰黙書辭義稍隱讀者難遽曉今載文集第一卷第一篇凡六百二十三言濓溪先生大成集七卷濓溪先生大全集七卷右周元公頥字茂叔之文也濓溪在營道之西蓋營川之支流也先生既不能返其故鄉卜居廬山之下築室溪上名曰濓溪書堂以無忘父母之邦之意學者因號為濓溪先生國朝道學始於先生嘉定十二年賜謚曰元太常丞臧格取主善行徳之法也淳祐初元詔從祀于學封舂陵伯始道守蕭一致刻先生遺文并附録七卷名曰大成集進士易統又刻于萍鄉名曰大全集然兩本俱有差誤今併參校而藏之明道先生文集四卷遺文九篇右程純公顥字伯淳之文也太師潞國公文彦博題其墓曰大宋明道先生程君伯淳之墓弟頥序其所以而刻之嘉定十二年謚曰純公取法所謂中正粹精也淳祐初詔從祀于學封河南伯此集并伊川集刻于長沙者南軒先生識其後曰右遺文九篇新安朱熹得之玉山汪應辰者敬授教授何藴俾嗣刻之河内先生文集六卷右太常博士尹源字子漸之文也源與弟洙俱以儒學知名趙元昊冦邊圍定川堡大將葛懐敏發涇原兵救之源與懐敏書曰賊舉其國而來其利不在城堡而兵法有不得而救者且吾軍畏怯見敵必赴而不計利害此其所以數敗也宜駐兵瓦亭見利而後動懐敏不能用今此書不見於集中河南先生文集十五卷右起居舎人尹洙師魯之文也讀書志云尹師魯集二十卷希弁所藏二十七卷洙傳中所載亦同希弁嘗攷邵氏聞見録云錢惟演守西都起䨇桂樓建臨園驛命永叔師魯作記永叔文先成凢千餘言師魯曰某止用五百字可記文成永叔服其簡古永叔自此始為古文然二記皆不載於集中彭城先生文集六十卷右中書舍人劉攽字貢父之文也攽與兄敞同學自刻厲博讀群書遂偕中弟或曰原父將死戒子弟無得遽出其集曰後百餘年世好定當有知我者故貢父次其集藏之不肯出私謚曰公是先生貢父平生亦好諧謔與荆公素厚坐是亦相失及死子弟亦次其文私謚曰公非先生然今謂原父之文為公是集貢父止曰彭城集云東坡先生别集三十二卷續别集八卷右東坡先生别集續别集乃蘇公嶠刋置建安而刪畧者淳祐甲辰廬陵郡庠刋豫章先生别集集二十卷黄文纂異一卷右豫章先生别集乃前集外集之未載者淳熈壬寅先生諸孫􅓌所編也后山先生文集五十五卷右陳師道無已之文也讀書志云二十卷希弁所藏乃紹興二年謝克家所叙者或謂二十卷者乃魏衍所編而讀書志不載清真先生文集二十四卷右周邦彦字羙成之文也神宗時嘗奏汴都賦七千言上命近臣讀於邇英閣由諸生為學官哲宗寘之文舘徽宗列之郎曹嘗守四明故樓忠簡公鑰序而刻之玉池先生文集十二卷右鄧忠臣字謹思之文也即覆議范忠宣公謚者以此入黨籍欽宗踐祚贈直祕閣初寮先生前集四十卷後集十卷右王安中字履道之文也讀書志止載初寮集十卷希弁所藏乃周益文忠公必大序前集中興以前後集中興以後文也内外制二十六卷則李文敏公邴序西塘先生文集二十卷右鄭俠字介夫之文也熈寧中監安上門時久不雨公以本門所見飢民及新法之不便者為圖狀發馬遞經銀臺投進且曰如行臣之言十日不雨乞斬臣宣徳門外神宗觀圖長嘘命馮京等體量新法而寢罷之大開倉庾以賑飢民下責躬詔三日大雨荆公率百僚入賀上出奏䟽并圖以示之附麗新法者爭言公詆毁良法直奏驚御遂得罪云中興初贈朝奉郎官其孫一人元澤先生文集三十六卷右王雱字元澤之文也雱未冠著書已數千百言舉進士為旌徳尉作䇿三十餘篇極論天下事又作老子訓傳及佛書義解亦數萬言有以雱書聞者召見除太子中允崇政殿說書被㫖撰詩書義擢天章閣待制書成遷龍圖閣直學士雱不拜而卒雱論議刻深常稱商君以為豪傑之士言不誅異議者法不行嘗勸安石誅不用命大臣政和中封臨川伯從祀于學靖康初罷之集乃崇寧中盧崇編忠惠先生文集三十卷右翟汝文字公巽之文也公巽丹陽人年十四登進士第徽宗朝為左史給事中吏部侍郎欽宗朝召直翰苑紹興中叅知政事終于資政殿學士提舉洞霄宫私謚忠惠文乃其子耆年編次附忠惠先生家傳于後梁谿先生文集一百七十卷右李忠定公綱之文也公字伯紀邵武人寓于常州無錫梁谿因以為號政和元年進士乙科宣和初為起居舎人以大水章䟽罷黜靖康初為右丞親征行營使俄知樞密院河東北宣撫使罷知楊州提舉洞霄宫責授昭化節度副使建昌軍安置髙宗即位召拜右僕射凢七十五日而罷後贈少師謚忠定奏議中欽宗批荅為多集有陳俊卿序朱文公後序浮溪先生文集六十卷猥槀外集一卷龍溪先生文集六十卷右汪藻字彥章之文也讀書志止載注彥章集十卷希弁所藏浮溪龍溪兩本卷秩皆六十卷藻徳興人崇寧二年進士建炎中為中書舎人權直院紹興中為兵侍改翰林出知湖州改撫州提舉太平宫黜居于永累赦不宥凢八年而卒藻工於儷語所為制詞人多傳誦集乃孫覿序北海先生文集六十卷右綦崈禮字叔厚之文也叔厚髙密人登政和上舍進士第仕髙宗為翰林學士終寳文閣學士髙密郡侯贈朝議大夫楊萬里樓鑰為文集序行狀墓誌附于後致堂先生斐然集三十卷右禮部侍郎胡寅字明仲之文也章頴為序然與髙閌書責其請幸太學報秦檜書所謂願公修政任賢勿替初志尊王攘狄以開後功之說皆不載焉玉山先生表奏六卷右汪應辰聖錫之文也本名洋紹興五年進士第二黄中以有官遂升洋為第一洋乞避逺祖嫌名髙宗以其與王拱辰皆年十八遂賜今名五峰先生文集五卷右胡宏字仁仲之文門人張栻所序也南軒先生文集四十四卷右張宣公栻字敬夫之文也朱文公校定而為之序然紫巖棊圖跋語之類皆不載於集中晦庵先生文集一百卷續集一十卷右朱文公之文嘉熙己亥王埜刻于建安黄壯猷嗣成之識于後續集則王遂刋而序之然南康黄西坡諸處所刻墨帖之類或不在焉然則遺逸尚多有之象山先生文集二十八卷外集四卷右陸文安公九淵字子靜之文也嘗作書院於象山之上以待講學之士因以自號集有袁爕楊簡序嘉定十三年賜謚行狀謚議附復齋先生文集六卷右陸文安公之兄九齡字子夀之文也東萊吕太史所作墓誌附水心先生文集二十八卷右葉適字正則之文也門人趙汝譡序而刻之水心其自號云篔牎先生初集三十卷續集三十八卷右陳耆卿字夀老之文也夀老台之臨海人初集葉水心為之序呉子良併刻于江西漕司於中沂邸牋表為多頥堂先生文集五十九卷碧雞漫志一卷長短句一卷祭文一卷右王灼晦叔之文也灼遂寧人嘗佐總幕故趙公為之序漫志可以見樂府之源委鶴山先生文集十三卷後集十卷續集十三卷别集十一卷右魏文靖公了翁字華父謫靖州日所作故名渠陽集云雁湖先生詩集四十卷右李文懿公壁字季章之詩也壁文簡公燾之子嘗為參知政事神道碑附于集後真文忠公徳秀所作也滄洲先生塵缶編三十五卷内外制二十四卷右程先生公許之文也先生字季與眉桂枝人嘉定辛未進士嘗以禮部侍郎兼侍講聖上親御翰墨以桂枝永芳世家及南山滄洲字賜之臞軒王邁為之序其集希弁生父郴倅墓銘先生筆也總龜先生松菊集五卷右阮閱之詩也建炎初以中奉大夫知袁州三山張先生質言四卷右張淵叔潜撰叔潜三山人嘗為左宣教郎樞宻院編修云石室先生百論十卷右陸子才所進也君論三十篇政事論二十篇臣論三十篇攻守論二十篇各有其目云别集類四莆陽居士蔡公文集三十卷右蔡忠惠公襄字君謨之文也讀書志止載蔡君謨集十七卷希弁所藏三十卷乃公之曾孫刑部郎洸所刋者陳叅政騤序得得居士乗桴集三卷戇草二卷右任忠敏公伯雨字徳翁之文也公眉山人元豐五年進士為左正言僅半嵗而上一百八䟽以黨事編管通州遷儋耳移道州復官提點明道宫卒紹興中累贈右諫議謚忠敏集首刻朱震所作行狀藏六居士安樂集十二卷右安定郡王令畤之文也王字徳麟東坡先生為字說又嘗薦之乞召致館閣以風厲天下紹興初同知大宗正襲封安定薨之日嗣濮王仲湜言其貧無以殮乃命户部賜銀絹百匹兩贈開府儀同三司王薦宗室槀中所謂和衎自將居貧不撓則有右從政郎子孟者希弁曾大父清愿先生字醇父也家藏王之墨蹟為多近時諸賢皆跋之退齋居士文集二十八卷右起居舎人侯延慶字季長之文也季長衡山人政和六年進士嘗侍講筵髙宗取杜詩直臣寧戮辱賢路不﨑嶇之句書扇以賜之兄彭老所為誌銘附集後介庵趙居士文集十卷右趙彦端字徳莊之文也徳莊寓居南昌登紹興八進士第出更麾節入踐臺省凢奏對獻䇿陳述利害如蠲丁錢講治體禦敵守邊之謀用兵行賞之規議論醇正卓然皆有可用之實淳熙十四年江西運副趙彦操刻之于湖居士文集四十卷右張孝祥字安國之文也安國歴陽人紹興甲戌大魁多士明年入館浸登清華至中書舎人出典藩郡孝宗皇帝嘗有用不盡之嘆安國筆法妙天下希弁伯祖伯崇得其詩曰趙侯富貴種而有巖壑姿同姓古所敦早晚蹋天墀又云徳髙欲余作字醉中不能謹也安國書徳髙乃伯祖字也介庵張居士文集七卷右張耕字莘翁之文也莘翁嘉泰壬戌進士終于清江别駕希弁妻之諸父也故生父師冋為之序繼而程公許亦序之行狀則今應大叅㒡之筆雪齋居士文集二十卷右導江王咨字夣得之文也門人計運孫援李漢裒昌黎文章故事為序咨嘗知劒州其訓詞有曰早登儒科文采著見久更民事為朕所知云李泰伯退居類槀十二卷皇祐續槀八卷常語三卷周禮致太平論十卷後集六卷右李覯泰伯之文也覯盱江人嘗試制科六論不得其一曰吾書未嘗不讀必孟子註䟽也擲而出人為檢視之果然遂下第而歸後以海門簿召赴太學說書以卒嘗自類其所為文曰天將夀我與所為固未足也不然斯亦足以藉手見古人矣其詳見於國朝儒學傳希弁嘗得修梓山寺殿記云應茂材異等科李覯撰然不載於槀中續元豐類槀四十卷右南豐先生遺文也建昌郡丞陳東叔魯刋而叙之掖垣類槀七卷玉堂類槀二十卷右周益文忠公必大之文也公自為之序性善堂槀十五卷右度正周卿之文也曹文簡公彦約為之序周卿巴川人紹熈元年進士嘗為禮部侍郎志隱類槀二十卷右許開仲啟之文也信安陳晅為之序開嘗為中奉大夫提舉武夷冲祐觀清江二王帖開為守時所刻東溪詩槀六卷右許玠介之之詩也周益公嘗親寫其漢宫春夜朱陵洞詞古别離出塞曲四篇而跋之友林詩槀二卷右史彌寧安卿之詩也集有黄景說曽丰序安卿嘉定中以國子舎生之望涖春坊事帶閤門宣賛舎人知邵陽雙峰猥槀八卷右舒邦佐平叔之文也開禧丙寅劉徳秀為之序平叔豫章雙谿人也湘中類藁三卷右楊叔虎文若之詩也環澗王容為之序文若長安人為武成宫諸生第一嘗任隂平太守得罪謫長沙云捄楮奏藁一卷右唐璘伯玉之奏䟽也刻于江東漕司籌思堂孚齋又録十卷右張翃仲龍之文也李良為之序翃三山人嘗以隆興倅攝袁州腴齋詞草三卷右叚允廸之作也允廸濟陽人乃武人之能文者陳朴厚黄庚序金陵吏餘四卷右劉榘帥建康日所作詩詞也豫章雜著二卷右馬某分教隆興日所作詩文也雲壑隱居集三卷浩歌集一卷右蔡柟堅老之作也柟嘗為宜春别駕云閑止堂集一卷右沈弇徳逺之作也趙蕃為之序弇之子兢莊可亦以詩名自號菊山此集乃莊可之手寫碧崖詩集五卷右閤皂山羽士甘夣叔叔懐之詩也叔懐嘗登晦庵誠齋之門楊長孺為之序東山詩文選十卷右葛紹體元承之作也家大酉應㒡爲之序葉夣鼎跋其後行狀墓誌附焉煮瀑庵詩一卷右莆陽方左鉞武成之詩也劉克莊所作墓誌附葛無懐詩一卷右㑹稽葛天民無懐之詩也語録類河南程氏遺書二十五卷附録一卷外書十二卷右李籲吕大臨謝良佐游酢蘇昞諸人記二先生語十卷劉絢錄明道語四卷劉元承楊遵道周孚張繹唐棣鮑若雨鄒柄暢大隱諸人録伊川語十三卷附録則明道行狀劉立之朱光庭邢恕范祖禹叙述游酢書行狀後吕大臨哀詞明道墓表伊川年譜張繹祭文胡安國奏狀外書則拾遺也朱光庭録二卷陳淵本程氏學馮氏本羅氏本胡氏本游氏本春秋録大全集時氏本傳聞雜記各一卷朱文公記其後横渠先生語録三卷右張獻公載字子厚之語也公秦人舉嘉祐二年進士歴崇文檢書同知太常禮院議禮不合復以病請歸卒門人謚為明誠中子吕大臨為謚議有正䝉理窟二書行于世嘉定中有旨賜謚禮官議謚曰逹或者不以為然改議曰誠或者又以謚法至諴感神為疑乆之乃謚曰獻淳祐初從祀于學封郿伯云横渠先生經學理窟一卷右張獻公載之說也讀書志云理窟二卷右題金華先生未詳何人為程張之學者希弁所藏横渠先生經學理窟一卷其目有所謂周禮詩書宗法禮樂氣質義理學大原自道祭祀月令統䘮紀凢十二云元城先生語録三卷譚録一卷道䕶録兩卷右劉忠定公安世字噐之之語也維楊馬永卿大年為之序噐之大名人中熙寧六年進士第哲宗朝歴正言左史司諫右諫議中書舎人貶黜乆之至除名勒停送峽州編管起提舉鴻慶復直龍圖閣以卒昔有與蘇子瞻論元祐人才者至公則曰噐之真鐵漢不可及也龜山先生語録四卷右楊文靖公時字中立之語也公閩人與游定夫謝顯道俱從游於明道先生之門嘗以著庭兼邇英殿說書遷祭酒擢右諫議除徽猷閣直學士工部侍郎兼侍講紹興五年卒初入見之際首言自古聖賢之君未有不以講學爲先務者上深然之上蔡先生語録三卷右門人記録謝先生良佐字顯道之語也延平先生問荅一卷右延平先生李侗愿中之語而晦庵先生所録也晦庵先生語録四十三卷右廖徳明輔廣余大雅陳文蔚李閎祖李方子葉賀孫潘時舉董銖竇從周金去偽李季札萬人傑楊道夫徐㝢林恪石洪慶徐容甘節黄義剛㬊淵襲蓋卿廖謙孫自修潘履孫湯泳林夔孫陳埴錢木之曽祖道沈僴郭友仁李儒用三十三人記録晦庵先生之語也李文惠公道傳持江東庾節刻于池陽黄榦書于目録之後晦庵先生語續録四十六卷右黄榦何鎬程端䝉周謨潘柄魏椿呉必大黄􅓌楊若海楊驤陳淳童伯羽鄭可學滕璘王力行游敬仲黄升卿周明作蔡㦛楊與立鄭南升歐陽謙之游倪楊至潘植王過董拱夀林學䝉林賜李儒用胡泳吕燾黄義剛吕夀昌楊長孺呉琮等四十一家記録晦庵先生語也内五家莫詳姓氏後一卷則前録廖徳明潘時舉董銖萬人傑徐㝢林恪所遺也李性傳叙而刻之鄱陽朱子語畧二十卷右楊與立編次晦庵先生之語蕭一致刻于道州師誨三卷附録一卷右呉必大記録晦庵先生之語朱鑑刻于興國近思録十四卷右晦庵先生東萊先生集周張二程之說也續近思録十四卷右寳慶丁亥蔡模纂晦庵先生之語以續之五峰先生知言一卷右胡子宏字仁仲之說也門人張栻序之曰先生優游南山之下餘二十年玩心神明不舎晝夜力行所知親切至到析太極精微之藴窮皇王制作之端此書乃平日之所自著其言約其義精晚嵗嘗被召旨不幸寢疾不克造朝而卒云近世朝廷嘗索其書而賜之謚無垢先生心傳録十二卷右張文忠公九成字子韶之說也甥于恕編公以紹興三年狀元及第歷禮部侍郎兼侍講謫居南安十四年手不停披嵗久庭蹟依然公題于柱曰予平生嗜書老來目病執書就明于此者十四年矣倚立積乆雙趺隠然可一笑也因自號横浦居士寳慶初贈太師追封崇國公謚文忠云横浦日新二卷右門人郎曄記録無垢先生之說也南軒先生問荅四卷右張宣公栻敬夫荅門人之所問也敬夫魏國忠獻公之嗣子也忠獻都督諸軍事奏以公書冩機宜文字以軍事入見天子異其言詔以為直祕閣劉珙薦公學行志業遂與郡召為吏部員外郎兼侍講除左司知靜江治狀上聞特轉承事郎除修撰為湖北運副知江陵而卒且死猶手草遺表冩畢而絶學者稱為南軒先生嘉定八年賜謚張子太極解義一卷右張宣公解周元公太極之義也二十先生西銘解義一卷右明道伊川吕大防微仲吕大臨與叔揚時中立游酢定夫尹焞彦明劉安節元承鮑若雨商霖李朴先之張九成子韶胡銓邦衡許景衡少伊郭雍子和謝諤昌國劉清之子澄張維祝禹圭錢聞詩子言張拭敬夫解横渠先生西銘之義也無極太極辨一卷右朱文公陸梭山象山徃復論難之書也復禮齋語録一卷右楚澤李蓍之說也亦名桂林語録緫括夫子言仁圖一卷右李蓍所著也羣經新說十二卷論五經疑難新說三卷右荆國文公王安石之說也傳道精語三十卷後集二十六卷右李方子編濂溪康節横渠明道伊川晦庵南軒東萊之說類而集之勉齋先生講義一卷右黄文肅公榦所講孟子義二十篇也總集類古文苑九卷右古文苑世傳孫巨源於佛寺經龕中得唐人所藏文章一編莫知誰氏録也皆史傳所不載文選所未取而間見於諸集及樂府好事者因以古文苑目之自石鼓文而下曰賦曰詩曰歌曰曲曰敕曰書曰對曰頌曰箴曰銘曰賛曰記曰碑曰雜文皆周秦漢人之作也容齋隨筆嘗引之然訛舛謬缺不敢是正淳熙中韓元吉之記己言之文苑英華一千卷右翰林學士中書舍人宋白等奉敕集始太宗皇帝既得諸國圖籍聚名士于朝詔修三大書其一曰文苑英華蓋以諸家文集其數實繁雖各擅所長亦榛蕪相間乃命白等精加銓擇以類編次為一千卷時太平興國七年九月也雍熈三年十二月壬寅上之賦五十卷詩一百八十卷歌行二十卷雜文二十九卷中書制誥四十卷翰林制誥五十三卷䇿問四卷䇿二十六卷判五十卷表七十四卷牋一卷狀十七卷檄二卷露布二卷彈文一卷移文一卷啟十六卷書二十七卷䟽五卷序四十卷論二十二卷議十卷連珠喻對一卷頌八卷讚五卷銘六卷箴一卷傳五卷記三十八卷謚哀册五卷謚議二卷誄二卷碑九十一卷誌三十五卷墓表一卷行狀十卷祭文二十三卷通一千卷嘉泰改元周益公刻而記于前樂府集十卷樂府序解一卷樂府雜録一卷羯鼓録一卷右劉次莊所序也古樂府之所起二十二横吹曲二十四日月雲霞十九時序十一山水二十三佛道十二古人十七童謠三古婦人二十三羙女十六酒六音樂十一遊樂十三離怨二十八雜歌行五十七都邑四十六宫殿樓臺十六征戍弋獵十七夷狄六蟲魚鳥獸三十三草木花果二十五次莊元祐間人也樂府雜録一卷朝議大夫守國子司業上柱國賜紫金魚袋叚安節撰羯鼓録一卷婺州刺史南卓撰乃唐人也讀書志載古樂府於别集類而載叚卓二録於樂類希弁所藏本乃刋三書為一集云國朝二百家名臣文粹三百卷右論著二十二門策四門書十門碑記十二門序六門雜文八門總目六分門六十二所謂二百家者趙普柳開張齊賢田錫冦凖張詠王禹偁孫何楊億劉筠陳堯咨錢惟演种放王曽夏竦晏殊穆脩范仲淹孫堪宋庠宋祁余靖尹洙韓琦包拯文彥博孫甫孫抃蔡襄田况石介歐陽脩元絳富弼張方平趙抃蘇舜欽祖無擇司馬光范鎮鮮于侁邵必吕誨邵亢李覯王珪王安石韓維陳襄孫復王令崔公度劉敞王逢强至章望之劉恕周敦頥錢公輔文同孫覺鄧潤甫孫洙鄭獬楊繪劉攽蒲宗孟李清臣梅堯臣蘇洵吕惠卿曽鞏王無咎蔣之竒蘇軾蘇轍程顥王韶張載王回邵雍王鞏顔復胡宗愈劉摯章悙楊傑李常王覯孔文仲孔武仲范祖禹袁默吕陶鄧綰孫覽吕大臨張舜民張商英許安世鄭俠王雱黄庭堅曽肇顧臨史均陸佃龔原王巖叟劉涇劉安世張耒呉拭王安國徐禧楊時呉儔陳瓘晁補之劉弇揚天惠黄裳張剛鄒浩馮澥任伯雨周邦彥程頥秦觀李廌陳師道何去非王庠李之儀蘇過謝逸馬存鄭少微崔鶠馬涓李新王當侯溥唐庚晁詠之翟汝文范致明王雲宇文粹中王賞彭俊民汪藻汪伯彥黄定梅執禮蘇元老劉觀喻汝礪陳恬余安行唐重孫覿李若水王騰陳公輔韓駒林敏功何㮚李良臣洪皓胡宏范宗尹計有功劉一止熊彥詩楊椿馮時行張九成趙雍何熙志程敦厚張行成邵博黄成孫王之望李燾晁公遡劉望之宋逺孫洪邁郭雍張拭趙逵李石張震張孝祥楊萬里王十朋趙雄皇朝名臣經濟奏議一百五十卷右淳熙中趙忠定帥蜀時所進也一君道二帝繫三天道四百官五儒學六禮樂七賞刑八財賦九兵政十方域十一邊防十二緫議自建隆迄靖康推尋歳月槩見本末忠定自序於前紹熙之末忠定有定䇿功為侂胄誣貶久而論定賜謚追王配食寧廟游佀誌其神道之碑御篆額曰宗老元勛云宗藩文類六十卷右魏邸鑰夫銓次也三祖而下各以昭穆編叙之凢朝廷之所褒嘉者為詔為制二十五卷凢名公鉅卿相與賛述者為表奏為記序為賦頌為詩歌與夫碑銘祭文等作三十五卷魏了翁為之序端平己亥鑰夫自蜀來訪扣未盡之書希弁嘗以一二補其闕渠深惜太祖派下文字獨少既而欲以燕王秦王初除防禦使制達之而未能云古文正宗前集二十二卷後集十二卷右集諸儒評論先秦兩漢三國二晉六朝唐及我宋諸公之文也諸儒鳴道集七十二卷右集濓溪洓水横渠二程上蔡元城龜山横浦諸公議論著述也於中有江民表心性說一卷安正忘筌集十卷崇安聖傳論二卷宋賢體要集十三卷右集曾鞏歐陽脩王安石王令王安國呉子經周亶父王雱陳之方蘇軾蘇轍孫洙杜植曾宰鄭獬范鎮唐介姚闢所作也戞玉前集四十九卷後集五十卷右紹興壬戌楊存亮元明編近世諸公舉業雜文類而次之中興六臣進䇿十二卷右紹興五年前宰執吕頥浩李綱汪伯彦李邴張守王綯韓肖胄荅詔旨所問戰守方畧之策也中興羣公吟槀四十八卷右中興以來一百五十三人之詩也四靈詩四卷右趙師秀字靈秀翁卷字靈舒徐璣字靈囦徐照字靈暉四人之詩也法帖類御製太清樓閱書歌一卷右真宗皇帝御製賜張耆以下徽宗皇帝髙宗皇帝跋其後御製唐十八學士圖賛一卷右欽宗皇帝御書賜張叔夜御書真草孝經一卷右髙宗皇帝御書賜尚書右僕射兼樞密使秦檜時紹興九年六月辛酉檜請刻之石上曰十八章世人以為童蒙之書不知聖人精微之學不出乎此朕宫中無事因學草聖遂以賜卿豈足傳後檜請再三乃從之十四年七月從左宣教郎守殿中侍御史汪勃所請詔令諸州刋石賜見任官并係學籍諸生云御臨法帖十卷右髙宗皇帝臨晉唐諸人之帖也秦檜跋御製聖安夀仁太上皇帝聖政序一卷右寧宗皇帝御製光宗皇帝聖政序也謝深甫跋其下淳熈祕閣續法帖十卷右淳熈十二年三月十九日奉聖旨摸勒鍾繇諸人帖羣玉堂帖十卷右嘉定元年四月二十四日省劄下祕書収省藏蓋韓平原家本也故卷尾有印曰閱古審定法書之印永興軍節度使印篇首則三朝宸翰有璽文曰呉娃之章呉氏書印呉娃翰墨寳章妙墨宜爾子孫世世寳之康夀珍玩皆憲聖慈烈皇后之記也二王帖三卷右清江所刻羲之獻之帖也二像冠于篇端引周子中之言曰心慕二王之人品則瞻之在前手追二王之墨妙則忽然在後目録註釋具于卷末篆書千文一卷右徐鉉篆周興嗣之韻也希弁嘗攷徽宗皇帝實録政和三年四月辛卯詔避廟諱改曰嚴與敬為曰嚴與謹勞謙謹勑為勞謙兢勑籍甚無竟為籍甚無罄璇璣懸斡為璇璣遷斡云星鳯樓帖右曹文簡公彦約家所刻也甲秀堂帖右廬山陳氏所刻也鳯墅帖二十卷畫帖二卷續帖四卷右廬陵曽宏父刻國朝聖賢帖也東坡先生帖三十卷右玉山汪應辰聖錫所刻也山谷先生帖五卷右張孝祥跋山谷之姪虨所藏卷後引徽宗皇帝評公之書謂如抱道足學之士坐髙車駟馬之上横斜髙下無不如意云張忠文奏議一卷右張忠文公叔夜圍城中奏議也李綱李彌遜趙子淔胡世將沈調諸公跋其後趙延康帖右髙宗皇帝賜趙子崧書一幅後用御名圖書其次則子崧與張邦昌一書與王時雍諸人一書親筆也張魏公帖一卷右忠獻公帖篇端紫巖碁圖乃忠獻及陳逍遥之老畫像南軒先生跋其下張宣公帖四卷右南軒先生帖遺表終焉表云臣再世䝉恩一心報國大命至此厥路無由猶有微誠不能自己伏願陛下親君子逺小人信任防一已之徧好惡公天下之理永清四海克鞏丕圖臣死之日猶生之年臣栻朱文公帖六卷右南康黄西坡所藏先生之帖而郡守錢明徳并項平庵跋語刻之於中可以補晦翁大全集之闕者為多張紫微帖一卷右歴陽張孝祥帖尋陽陶思賛所刻歐陽公集古録跋尾六卷拾遺一卷右周益公跋方崧卿所刋雖非石刻亦真蹟也故附于法帖之後拾遺春秋集善十一卷右胡忠簡公銓為敷文閣直學士提舉江州太平興國宫日被旨投進之書也其說多引易以證之張忠獻公浚為之序論語集程氏說二卷孟子集程氏說一卷右左宣教郎建寧府教授湯烈編集程氏二先生論孟說也二先生議論荅問散在諸集學者未能徧觀烈取遺書語録與夫門人編纂之言條而類之于逐章之下續又得論語說一百二十有九孟子說六十有八附于卷末曰拾遺云論語意原一卷右東谷鄭汝諧所著也然所原三仁等說晦庵先生多不然之晦庵謂論語只言微子去之初無靣縛㗸璧之說今乃捨孔子而從左氏史遷已自難信又不得已而曲為之說以為微子之去乃去紂而適其封國則尤為無㨿矣疑孟一卷右温國司馬文正公光所著也公疑孟子之書有非軻之言者故為疑孟十有一篇建安余允文乃為尊孟辨於温公之疑逐段為之辨晦庵先生又於允疑之後逐段為之說云孝經解一卷右張文忠公九成所解也孝經說一卷右蒙齋先生袁公甫親筆也甫字廣微潔齋先生之子也大學衍義四十三卷右真文忠公徳秀為户部尚書日所進也因大學條目而附以經史首之以帝王為治之序次之以帝王為學之本是之謂綱首之以明道術辨人才審治體察民情次之以崇敬畏戒逸欲又次之以謹言動正威儀又次之以重妃匹嚴内治定國本教戚属是之謂目每條之中首之以聖賢之典訓次之以古今之事迹諸儒之釋經論史有發明者録之而公之說亦附見焉小學之書四卷右朱文公先生所編也有内篇有外篇其宏綱有三曰立教曰明倫曰敬身明倫則有父子君臣夫婦長㓜朋友之品敬身則有心術威儀衣服飲食之自又採摭古今經傳書史之所紀載曰稽古曰嘉言曰善行以廣其教而實其事小學之工程大學之門户也越絶書十五卷右越復讎之書也或以為子貢所作或疑似子胥所作皆無所據故曰越絶誰所作呉越賢者所作也隋經籍志十六卷崇文緫目十五卷希弁攷其所以第一卷荆平王内傳第二卷外傳記吳地第三卷吳内傳第四卷計倪内經第五卷請糴内傳第六卷外傳策考第七卷外傳記范伯内傳陳成恒第八卷外傳記地傳第九卷外傳計倪第十卷外傳記吳王占夣第十一卷外傳記寶劒第十二卷内經九術外傳記軍氣第十三卷外傳枕中第十四卷外傳春申君徳序外傳第十五卷篇叙外傳此十五卷也然第一卷有所謂越絶外傳本事一篇此其為十六卷歟蔡邕獨斷二卷右漢左中郎將陳留蔡邕撰雜記自古國家及漢朝故事王莽無髮蓋見于此資治通鑑釋文二十八卷右奉議郎行祕書省著作佐郎兼侍講賜緋魚袋司馬康所集也康字公休温公之子也内傳國語十卷右劉攽戇父所作也以其異於外傳國語故曰内傳云其兄敞原父題辭神宗聖訓二十卷右試太學録林虙所集也虙乃希之妷以所聞神宗聖訓記録分一百門擬續五朝寳訓崇寧中上于朝云韓忠獻王遺事一卷右羣牧判官朝奉郎尚書職方員外郎上騎都尉强至編次韓魏王琦言行也始韓忠彦編次家傳王巖叟編次别録至又編次其遺事云歷代氏族言行類槀六十卷右武夷章定以歴代迄本朝名賢言行之迹類姓成編凢一千一百八十九姓云古今年號録五卷右紹熈中臨安府免解進士侯望所進也其說謂自漢建元至今一千三百三十五年正偽年號總八百三十八為字二百三十五有重用三用至九用者列子釋文二卷右唐當塗縣丞殷敬順撰說玄一卷右温國司馬文正公光所著也天象賦一卷右題後漢尚書張衡撰蜀丞相諸葛亮注然注中引用晉事決非亮也希弁嘗以祕書省闕書目攷之天象賦一卷張衡撰李淳風注疑此為是玄綱三卷神仙可學論一卷形神可固論一卷右唐中嶽嵩陽宫道士宗玄先生呉筠貞節所進修行之要㫖也一曰明道徳二曰辨法教三曰析疑滯玄宗批答云詞簡旨奥義博文精足以弘闡格言發明幽致國朝官制㳂革一卷右黄元禮琮所編也職官記一卷右三晉張縯所編也其說謂元豐官制名實正矣惟是祖宗因官制以别流品之意當時初不講明及之故寄禄之階條理未盡若參以舊典則得失可見遂先立元豐寄禄新格以祖宗舊官遷轉之法參列於後云續文房四譜五卷右題柯田山樵編蓋續蘇易簡之書也祕書省闕書目云李洪編夷堅志四十八卷右洪文敏公邁記異志恠之書也其名蓋取列子所謂大禹行而見之伯益知而名之夷堅聞而志之說者謂夷堅乃古之博物者云義林十卷右起居舎人兼中書舎人兼侍講眉山程敦厚所述也凢一百一十二篇摭取千百載人物而尚論之張文忠公九成嘗謂如論姚崇不進制心之說而以十事諫王莽之文姦言起於嚴助朱買臣天誘君子以甚難王伯自用心始鄭伯上欲為舜下欲為周公文帝斗粟之譏所以致刑措景帝殺臨江王天下安之而不疑蕭何萬世之功在王漢中用韓信絳侯無出塞功衛霍有絶漠賞仲連鄒陽同傳平勃合於與權之說皆深見眇微而發古人用心處議論卓然在人意表云常譚二卷右河南呉箕和父雜記經子史傳之事二百餘條視聴鈔三卷右國子博士呉莘商卿得之聞見示後人以勸戒凢六十四事云武昌志三十卷右郡守古括王信所修也詩文附焉萍實志十卷續志二卷右邑宰周世昌所修征官王大節所續也都梁志六卷右郡守何季羽所修也詩文附焉嶺外代答十卷右周去非直夫記廣右二十五郡疆埸之事經國之具荒忽誕漫之俗瑰詭譎恠之産耳目所治與得諸學士大夫之緒談者四百餘條云祕書省闕書目四卷右祕書省見闕書之目也楚辭故訓傳六卷楚辭草木䟽一卷楚辭補音一卷右建寧倅谷水林至所著也李大異為之序河海英靈集二卷右唐丹陽進士殷璠集常建李白王維劉謹虚張渭王季友陶翰李頎髙適岑參崔顥薛㨿綦母潜孟浩然崔國輔儲光羲王昌齡賀蘭進明崔署王灣祖詠盧象李嶷閻防二十四人之詩璠謂諸人皆河海英靈也故以名集凢二百四十三首云唐賢絶句一卷右莆田柯夣得所選李白杜甫元結王維韋應物賀知章岑參靈徹張繼郎士元盧綸司空文明韓愈柳宗元張籍賈島陳羽劉禹錫元稹白居易杜牧竇庠竇鞏張祐徐凝王建于鵠朱絳許渾雍陶陳陶李播劉啇羊士諤楊敬之司空圖薛能鄭谷王涯李渉楊慿崔櫓劉昭屬陸龜䝉狄歸昌章碣劉得仁許纏吉師老張顛杜荀鶴呉融韓偓韋莊五十四人之作白止四首甫六首愈八首宗元四首惟牧二十五首云衆妙集一卷右汴人趙師秀編沈佺盧象王維孟浩然錢起周賀于武陵李頻秦系劉長卿李嘉祐楊巨源劉得仁朱慶餘雍陶郎士元崔塗皇甫曾皇甫冉包佶司空曙耿緯嚴維李端韓翃戴叔倫盧綸祖詠綦母潜方干靈一無可䕶國貫休岑參張衆甫張南史周朴張蠙張祜李季蘭許渾張祐馬戴張循之張繼章八元李益張喬吕温于鵠崔顥項斯崔峒包何竇常趙嘏薛能劉威鄭谷韓偓羅隠李羣玉皮日休杜荀鶴張籍任藩劉商楊發處黙戎昱于良史王灣林寛劉禹錫王貞白七十六人之作二妙集一卷右汴人趙師秀選賈島姚合詩也宣和御製詩一卷右徽宗皇帝賜張忠文公叔夜之詩也凡二十有八篇云巴東集一卷右萊國忠愍公冦凖之詩也讀書志云冦忠愍詩三卷希弁所藏巴東集乃公自編而為之序凡一百五十有六篇秋風亭記附按公本傳云巴東有秋風亭公析韋應物一言為二句云野水無人渡孤舟盡日横識者知其必大用凡五年不得代邑庭有二栢民以比甘棠集後有范忠文諸公題秋風亭詩然東坡亦有詩曰萊公昔未遇寂寞在巴東聞道山中樹獨餘手種松惜不之載焉晦翁先生朱文公語後録二十卷右東陽王佖記楊方黄榦劉炎黄灝邵浩劉砥李煇黄卓汪徳輔陳芝呉振呉雉林子䝉林學履劉礪鍾震蕭佐舒髙魏椿楊至所録也其說謂池録初成勉齋猶未免有遺恨於刋行之後况饒本又出於其後乎此二十卷皆池饒所未及刋者稽其所自證其所得嘗屢反復焉無一語或敢不謹也又謂晦翁始與南軒講于嶽麓後與東萊及象山講于鵝湖此皆先賢講論大端深恨從游者莫能録其所聞以示後世云晦庵先生朱文公語續録後集二十五卷右楊方黄榦包揚劉炎劉子寰邵浩劉砥劉礪李煇陳芝黄灝黄卓汪徳輔呉振呉雉鍾震林子䝉林學履蕭佐舒髙魏椿楊至二十二人記録晦庵先生之語也蔡杭將指江東集而刻之曲江帖五卷後帖一卷右二蘇劉元城鄒道郷黄山谷王金陵曾文清韓吕諸公之帖也花蘂夫人詩一卷右蜀孟昶愛姬也青城費氏女幼能属文長於詩宫詞尤有思致蜀平以俘輸織室後有罪賜死此卷乃王安國寫入館者毛恕鐫于衡陽昭徳先生讀書志卷第五下刋字匠黄應等刋板折書表司劉瑜等楷書
