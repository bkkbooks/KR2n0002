body:
  text: 昭德晁公侍郎僑居蜀嘉㝎之峩眉平生著書有易詩書春秋解考其異同甚詳又作讀書志皆鋟版大父及嚴君喜蔵書在嘉㝎時甞摹而藏之及南来不能悉與俱个併他所藏燬矣讀書志偶在篋中鈞謹刻置信安郡齋不惟使晁氏平生之功得不泯沒而觀者按其目而访求之庻亦可使古書之不泯云淳祐巳酉夏五郡守南充游鈞書昭惪先生三榮郡齋瀆書志四卷既刋傳矣趙希弁君錫継從郡貟外司馬帑轄蔡㢘父淂三衢本參校為後志二卷以𥙷其缺盖晁氏舊蔵之書也合南陽所卑與夫君鍚附志為七卷今書之傳于世者固巳十之六七然家陋而未見冝尚多焉後之君子增益之淳祐庚戍小五二日番陽黎安朝漌識
