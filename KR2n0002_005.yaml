body:
  text: 别集類中白居易長慶集七十一卷右唐白居易樂天太原人貞元十七年進士中拔萃科元和初制筞乙等調盩厔尉入翰林為學士太和中遷刑部侍郎㑹昌初以刑部尚書致仕居易以文章精切然最工詩初頗以規諷得失及其多更下偶俗好當時士人爭傳鷄林賈國相率篇易一金在杭州自類詩藁分諷諭閑適感傷雜律四類前集五十卷有元稹序後集二十卷自為序紀又有續後集五卷今亡三卷矣予嘗謂樂天進退以義風流髙矣與劉禹錫游人謂之劉白而不陷入司馬黨中與元稹遊人謂之元白而不蹈北司黨中又與楊虞卿爲姻家而不陷牛李黨中嗚呼叔世有如斯人髣髴者乎獨集後載聞李崖州貶二絶句其言淺俗似幸其禍敗者余固疑非樂天之語及以唐史攷之崖州貶時樂天沒將踰年或曰浮屠某作也戴叔倫述藁十卷外詩一卷書狀一卷右唐戴叔倫㓜公也潤州人爲人温雅善舉止貞元十六年進士累遷容管經畧使政治稱最德宗賜中和詩世以為榮代還請為道士未幾卒集有馬揔序或題㑹録云唐史但云師事蕭頴士初稱其能詩時人少其詩骨氣緜弱故也權德輿集五卷右唐權德輿載之也秦州人未冠以文章稱諸儒間貞元十五年知制誥累官中書舍人元和五年以禮部尚書平章事德輿三歲知變四聲四歲能賦詩積思經術無不貫綜自始學至老未曾一日去書其文雅正贍縟當時公卿功德卓異者皆所銘紀雖動止無外飾其醖藉風流自然可慕貞元元和間為縉紳羽儀其兩漢辨亡論世祖封不義侯議世多稱之云嘗自纂制集五十卷楊憑為序今亡逸文集孫憲孫編次楊嗣復為序符載集十四卷右唐符載字厚之岐襄人㓜有宏達之志隠居廬山聚書萬卷不為章句學貞元中李巽江西觀察薦其材授奉禮郎為南昌軍副使継辟西川韋皐掌書記澤潞郄士羙參謀歴恊律郎監察御史元和中卒叚文昌為墓誌附于後集皆雜文末篇有數詩而已集前有崔郡送符處士歸序皆云載蜀人以比司馬王揚云張登集六卷右唐張登性剛潔介特始以巾褐就辟歴衞佐廷尉平監察御史貞元中改河南士曹椽遷殿中侍御史漳州刺史居七年坐公累受劾吏議侵誣感疾卒權德輿為之序甚詳以公幹景陽比之國史補亦稱登長於小賦氣宏而密間不容髪有織成隠起結綵蹙金之狀其舊集詩賦之外書啓序述誌記銘誄合一百二十二篇今存者纔六十餘首戎昱集三卷右唐戎昱撰李䕫亷桂林月夜聞隣居呤咏之音清遲明訪之乃昱也即延為幕賓後因飲席調其侍兒䕫微知其故即贈之昱感怍賦詩有恩合死前酬之句又為衞伯玉荆南從事後歴辰䖍二州刺史元稹長慶集六十卷右唐元稹微之也河南人擢明經書判入等授校書郎元和初舉制科對策第一拜左拾遺在江陵與監軍崔潭峻善潭峻以稹歌詩奏御穆宗賞恱即以祠部郎中知制誥未幾入翰林為中書舍人承旨學士長慶二年拜同中書門下平章事稹為文長於詩與白居易齊名號元和體往往播樂府穆宗在東宫妃嬪近習誦之宫中呼元才子及知制誥變詔書體務純厚明切盛傳一時有長慶集百卷今亡其四十卷皇甫湜文六卷右唐皇甫湜持正也睦州人元和元年進士仕至工部郎中裴度辟東都判官度修福先寺求碑文於白居易湜怒曰近舍湜而逺取居易請從此辭度謝之湜即酣飲援筆立就度贈車馬繒綵甚厚湜怒曰吾自為顧况集序未嘗許人今碑字三千一字三縑何遇我薄邪度笑曰不覊之才也從而酬之今集雜文三十八篇而已况集序在焉而碑已亡矣李紳追昔遊三卷右唐李紳公垂也亳州人元和元年進士𥙷國子助教穆宗召為翰林學士累進中書舍人武宗即位拜中書侍郎平章事紳為人短小精悍於詩最有名號短李與李德裕元稹同時號三俊追昔遊者盖賦詩紀其平生所遊歴謂起梁漢歸諫署升翰苑及播越荆楚逾嶺嶠止髙安移九江過鍾陵守滁陽轉夀春留洛陽亷㑹稽分務東周守蜀鎮梁也開成戊午八月自為之序鮑溶詩一卷右唐鮑溶德源元和四年進士張爲謂溶詩氣力宏贍博識清度雅正髙古衆才無不備具云朱倣詩一卷倣字長通襄陽人隱居剡溪嗣曹王臯鎮江西辟節度參謀貞元初召為拾遺不就沈亞之集八卷右唐沈亞之字下賢長安人元和十年進士涇原李彚辟掌書記為祕書省正字長慶初補櫟陽尉四年為福建團練副使事徐晦後累進殿中丞御史内供奉大和三年栢耆宣慰德州取為判官耆罷亞之貶南康尉後終郢州掾亞之以文詞得名狂躁貪冒輔耆為惡故及於貶常遊韓愈門李賀杜牧李商隠俱有擬沈下賢詩亦當時名輩所稱云姚合詩十卷右唐姚合也崇曾孫以詩閒元和十一年李逢吉知舉進士歴武功主簿富平萬年尉寳應中監察殿中御史户部員外郎出金杭二州刺史為刑户二部郎中諌議大夫給事中陜虢觀察使開成末終祕書監世號姚武功云施肩吾西山集五卷右唐施肩吾吳興人元和十五年進士以洪州西山十二真君羽化之地慕其真風髙蹈于此輯其所著自為之序李賀集四卷外集一卷右唐李賀長吉也鄭王之孫七歳能辭章韓愈皇甫湜聞之過其家使賦詩援筆輙就自目曰髙軒過二人大驚年二十七終恊律郎賀辭尚竒詭為詩未始先立題所得皆驚邁逺去筆墨畦逕當時無能効者樂府十數篇雲韶工合之絃管云或說既卒後為不相恱者盡取其所著投圊中以故世傳者不多外集予得之梁子羙盧仝詩一卷右唐盧仝范陽人隠少室山號玉川子徵諫議不起韓愈為河南令愛其詩厚禮之嘗作月蝕詩以譏元和逆黨愈稱其工後死于甘露之禍劉义詩一卷右唐劉义也少嘗任俠殺人後更折節讀書善歌詩客韓愈門作冰柱雪車二詩出盧仝李賀右歸齊魯不知所終今集二十餘篇尔不載二詩斷金集一卷右唐李逢吉令狐楚自未第至貴顯所唱和詩也後逢吉卒楚編次之得六十餘篇裴夷直名曰斷金集為之序杜牧樊川集二十卷外集一卷右唐杜牧牧之也京兆人大和二年進士復舉制科㑹昌中以考功郎中知制誥終中書舍人牧善属文剛直有奇節敢論引大事指陳利病為詩情致豪邁人號小杜以别甫云臨死自為墓誌悉焚所為文章其甥裴廷翰輯其藁編次為之後序樊川盖杜氏所居外集皆詩也許渾丁卯集二卷右唐許渾字仲晦圉師之後大和六年進士為當塗太平二令以病免起潤州司馬大中三年為監察御史歴虞部員外睦郢二州刺史嘗分司於朱方丁卯潤自編所著因以名賀鑄本跋云按渾自序集三卷五百篇世傳本兩卷三百餘篇求訪二十年得沈氏曾氏本并取擬玄天笁集校正之共得四百五十四篇予近得渾集完本五百篇皆在然止兩卷唐藝文志亦言渾集兩卷鑄稱三卷者誤也雍陶詩五卷右唐雍陶國鈞大和八年進士大中六年自國子毛詩博士出刺簡州唐志集十卷今亡其半李啇隠樊南甲集二十卷乙集二十卷又文集八卷右唐李啇隱義山也隴西人開成二年進士令狐楚奏為集賢校理楚出汴滑興元皆表幕府補大學博士初為文瑰邁竒古及從楚學儷偶長短而繁縟過之㫖能感人人謂其橫絶前後無儔者今樊南甲乙集皆四六為序即所謂繁縟者又有古賦及文共三卷辭㫖恠詭宋景文序傳中云譎恠則李商隠蓋以此詩五卷清新纎艷故舊史稱其與溫庭筠叚成式齊名時號三十六體云李德裕㑹昌一品集二十卷姑臧集五卷平泉詩一卷窮愁志三卷别集八卷别友賦一卷右唐李德裕文饒也趙郡人宰相吉甫之子少力于學既冠卓犖有大節不喜與諸生試有司憲宗時以廕補校書郎穆宗初擢翰林學士號令大典皆出于手進中書舍人召兵部尚書中書門下平章事㑹昌初復秉政平澤潞筞功拜太尉封衞公大中貶崖州司户叅軍三年卒德裕性孤峭明辨有風采善為文章雖在大位手不去書謀議援古衮衮可喜為武宗知常以經綸天下為己任時王室幾中興焉一品集鄭亞為之序皆㑹昌制誥表狀外内冊贊碑序文也賦詩四首窮愁志乃崖州所撰姑臧集題叚全緯纂上四卷亦制誥第五乃戞黠斯朝貢傳與八詩别集乃裒合古賦平泉詩集外雜著又有古賦一卷載金松等四賦劉得仁詩集一秩一卷右唐劉得仁公主之子長慶中以詩名五言清瑩獨步文埸自開成後昆弟皆居顯仕獨自苦於詩舉進士二十年竟無所成嘗有寄所知詩云外族帝王足中朝親故稀翻令浮議者不許九霄飛及卒詩僧棲白以絶句弔之曰忍苦為詩身到此氷魂雪魄巳難招直教桂子落墳上生得一枝寃始銷劉綺莊歌詩四卷右唐四庫書目有綺莊集十卷今所餘止四卷詩三十二啟狀四十四而已惜其散落太半其本乃南唐故物紙墨甚精後題曰昇平四年重題印其文云云薛逢歌詩二卷右故唐薛逢陶臣也河東人㑹昌元年進士終祕書監逢持論鯁切以謀畧髙自摽顯與楊收王鐸同年登第而逢文藝最優収作相逢有詩云誰知金印朝天客同是沙堤避路人鐸作相逢又有詩云昨日鴻毛萬鈞重今朝山岳一毫輕二人皆怒故不見齒鄭畋集五卷右唐鄭畋台文也滎陽人㑹昌二年進士書判入等授校書郎調渭南尉知制誥中書舍人乾符四年以本官同中書門下平章事二年召復秉政至成都以病不拜終太子少保藁草皆乾符堂判勑語云趙嘏渭南詩三卷右唐趙嘏承祐也㑹昌四年進士終渭南尉杜紫微讀其早秋詩云殘星幾㸃鴈横塞長笛一聲人倚樓因謂之趙倚樓云孟遲詩一卷右唐孟遲字叔之平昌人㑹昌五年陳商下及第薛能集十卷右唐薛能字大拙汾州人㑹昌六年登進士第大中末書判中選補盩厔尉辟太原陜虢河陽從事李福鎮滑表署觀察判官歴御史都官刑部員外郎福徙西蜀奏以自副咸通中攝嘉州刺史造朝遷主客度攴刑部郎中俄刺同州京兆尹温漳貶命權知尹事出帥咸化入授工部尚書復節度徐州徙忠武廣明元年徐軍戍溵水經許能以軍懐舊惠館之城中許軍懼見襲大將周岌乘衆疑怒逐能據城自稱留後因屠其家能政嚴察絶私謁癖於詩日賦一章晚節惑浮屠法奉之唯謹然恣驁倨故佻輕以忤物及為藩鎮尢易武吏嘗命其子屬橐韃雅拜雜進士或問其故曰渠銷弭灾咎云李郢端公詩一卷右唐李郢楚望也大中十年進士詩調清麗居餘杭踈於馳競為藩鎮從事兼侍御史鄭嵎津陽門詩一卷右唐鄭嵎字賓光大中五年進士津陽即華清宫之外闕為詩百韻紀明皇時事自有序云劉滄詩一卷右唐劉滄字温靈大中八年進士詩頗清麗句法絶類趙嘏孫樵經緯集三卷右唐孫樵字隠之大中九年進士廣明初狂冦犯闕赴岐隴授職方員外郎時詔書曰行在三絶以常侍李隲有曾閔之行前進士司空圖有巢由之風樵有楊馬之文遂輯所著名經緯集李羣玉詩一卷右唐李羣玉文山也澧州人曠逸不樂仕進專以吟詠自適詩筆妍麗才力遒徤好吹笙美筆翰親友彊赴舉上一而止裴休亷察湖南延郡中大中八年來京師進詩三百篇休復論薦授弘文館校書郎集後附其進詩表并除官制廣記所載黄陵廟事甚異絶句在焉張祜詩一卷右唐張祜承吉清河人樂髙尚客淮南杜牧為度支使善其詩嘗贈之詩曰何人得似張公子千首詩輕萬户侯嘗作淮詩有人生只合楊州死禪智山光好墓田之句大中中果終丹陽隠舍人以為䜟陳陶集二卷右唐陳陶嵩伯也鄱陽人大中時隠洪州西山自號三教布衣云江南野史有傳温庭筠金筌集七卷外集一卷右唐溫庭筠也庭筠本名岐字飛卿宰相彦博之裔詩賦清麗與李商隠齊名時號温李能逐弦吹之音為側艷之辭為行塵雜由是累年不第終國子助教宣宗嘗作詩賜宫人句有金步揺遣場中對之庭筠對以玉跳脫上喜其敏欲用之而嘗作詩忤時相令狐綯終弃不用皮日休文藪十卷右唐皮日休字襲羙一字逸少襄陽人隠鹿門山自號醉吟先生以文章自負尤善箴銘咸通八年登進士第為著作佐郎太常博士乾符喪亂東出闗為毗陵副使陷巢賊中賊遣為䜟文疑其譏已遂害之集乃咸通丙戌年居州里所編自序云發篋次類文藁繁如藪澤因以名之凢二百篇司空圖一鳴集三十卷右唐司空圖表聖也河中人咸通十一年王凝下及第黄巢陷長安僖宗次鳳翔召拜知制誥中書舍人朱温將簒召為禮部尚書不赴聞哀帝遇弑不食而卒圖居中條山自號知非子奈辱居士集自為序以濯纓亭一鳴牕名其集子荷别為集後記最長於詩其論詩有曰梅止於酸而鹽止於鹹其羙常在酸鹹之外謂其詩棊聲花院靜幡影石壇髙之句為得之人以其言為然唐彦謙鹿門詩一卷右唐唐彦謙茂業也并州人咸通末舉進士第中和王重榮表河中從事歴節度副使晉絳二州刺史重榮遇害貶漢中椽興元楊守亮留署判官遷副使閬壁刺史卒彦謙才髙負氣無所摧屈博學多藝尤能言詩師庭筠故格體類之世稱耳聞明主提三尺眼見愚民盜一抔蓋彦謙句也自號鹿門先生有薛廷珪序曹唐詩一卷右唐曹唐字堯賓桂州人初為道士咸通中為府從事卒作游仙詩百餘篇或靳之曰堯賓嘗作鬼詩唐曰何也井底有天春寂寂人間無路月茫茫非鬼而何唐乃大哂今集中不見然他詩及神仙者尚多秦韜玉投知小録三卷右唐秦韜玉中明京兆人有詞藻工歌吟險而好進為田令孜所善僖宗幸蜀令孜引為工部侍郎中和二年賜進士第編入春牓雲臺編三卷宜陽外編一卷右唐鄭谷字守愚宜陽人光啟三年擢髙第遷右拾遺歴都官郎中乾寧四年歸冝春卒于别墅其集號雲臺編者以其扈從華山觀居所編次云谷詩属思頗切於理而格韻凡猥語句浮俚不為議者所多然一時傳諷號鄭都官而弗名也陸龜䝉笠澤叢書四卷右唐陸龜蒙魯望也蘇州人少髙放通六經大義尤明春秋舉進士一不中從張搏為蘇湖從事居松江甫里以文章自怡自號江湖散人或號天隨子甫里先生笠澤者松江地名也其自序云自乾符六年春卧病笠澤遇體中不甚羸耗時亦隠几著書詩賦銘記往往雜發不類不次混而録之故曰叢書韓偓詩二卷香奩集右唐韓偓致光也京兆人龍紀元年進士累遷諫議大夫翰林學士昭宗幸鳳翔進兵部侍郎承旨朱全忠怒貶濮州司馬榮懿尉天祐初挈族依王審知而卒香奩集或曰和凝既貴惡其側艷故詭稱偓著云李洞詩一卷右唐李洞撰字才江諸王之孫慕賈島為詩銅鑄其像事之如神詩人多誚僻澁不貴其奇峭唯吳融稱之昭宗時不第遊蜀卒杜荀鸖唐風集十卷右唐杜荀鸖池州人大順二年進士善為詞句切理宣州田頵重之嘗以牋問至梁祖薦為翰林學士主客員外恃勢侮易縉紳衆怒欲殺之而未及天祐初病卒有顧雲序荀鸖自號九華山人程晏集六卷右唐程晏然乾寧二年進士集皆雜文孫郃文纂一卷右唐孫郃字希韓四明人乾寧四年進士好荀楊孟之書慕韓愈為校書郎河南府文學舊四十卷朱朴致理書一卷右唐朱朴襄陽人以三史舉為荆門令乾寧中方士許巖士得幸禁中言朴有經濟才帝幸石門召對即拜諫議大夫平章事曹松詩一卷右唐曹松夢徵也舒州人學賈島為詩天復元年與王希羽劉象柯崇鄭希顔同登第年皆七十餘號五老牓時以新平内難聞放進士喜特勑授校書郎而卒裴說詩一卷右唐裴說撰天祐三年進士詩有避亂一身多之句讀者悲之羅虬比紅兒詩一卷右唐羅虬也皇朝方性夫注虬詞藻富贍與其族人隠鄴齊名時號三羅從鄜州李孝恭籍中有杜紅兒者善歌常為副戎属意副戎聘隣道虬請紅兒歌贈綵孝恭不令受之虬怒拂衣而起詰旦手刃之既而追其冤作絶句詩百篇借古人以比其艷盛行於時方干詩集一卷右唐方干字雄飛歙人唐末舉進士不第隠鏡湖上徐凝有詩一見干器之授以詩律其皃陋又兔鈌而喜凌侮嘗謁亷帥誤三拜人號方三拜將薦于朝而卒門人謚玄英先生其生楊弇與郃編次王賛為序郃又為玄英先生傳附王德輿詩一卷右唐王德輿集有次韻和鄭畋詩知其懿僖間人也沈彬集一卷右唐沈彬保大中以尚書郎致仕居髙安集中有與韋莊杜光庭貫休詩唐末三人皆在蜀疑其同時避亂嘗入蜀云上李昇山水圖詩在焉熊皦屠龍集五卷右晉熊皦後唐清泰二年進士為延安劉景巖從事天福中說景巖歸朝擢右司諫坐累黜上津今集有陶糓序陳沆賞皦早梅云一夜欲開盡百花猶未知曰太妃容德於是乎在沈顔聱書十卷右偽吳沈顔字可鑄傳師之孫天復初進士為校書郎屬亂離奔湖南辟巡官吳國建為淮南巡官禮儀使兵部郎中知制誥翰林學士順義中卒顔少有詞藻琴棊皆臻妙場中語曰下水舡言為文敏速無不載也性閑淡不樂世利嘗病當時文章浮靡倣古著書百篇取元次山聱叟之說附已志而名書其自序云自孟軻以後千餘年經百千儒者咸未有聞焉天厭其極付在鄙子其夸誕如此李煜集十卷右偽唐主李煜重光也景之子少聦悟喜讀書属文工書畫知音律建龍三年嗣偽位開寳八年王師克金陵封違命侯太平興國三年終隴西郡公贈吳王江隣幾雜志云韓熈載格言五卷右偽唐韓熈載字叔言北海人後唐同光中進士南奔江淮李昪建國用為袐書郎使與其子璟游璟嗣位為虞部員外郎史館修撰兼太常博士知制誥頃之請誅陳覺黜和州司馬復召中書舍人累遷兵部尚書第宅華侈妓樂四十餘人不加檢束時人比徐之才璟屢欲倚以為相用是不果後左授右庶子分司乃盡斥群妓單車引道留為秘書監俄復位已而其去妓皆還上書論古今之變名格言熈載天才俊敏工隷書及畫聲名冠一時自朱元叛後煜頗疑北人多因事誅之熈載愈益淫縱然喜延譽後進如舒雅等後多知名謚曰文潘佑榮陽集十卷右偽唐潘佑金陵人韓熈載薦於璟授秘書正字直崇文館煜時為虞部員外郎史館修撰知制誥中書舍人佑性貞介文章贍逸尤長論議坐言事悖慢下獄自剄死人頗言張洎譖之李有中詩二卷右偽唐李有中嘗為新塗令與水部郎中孟賓于稱其詩如方干賈島之徒賓于晉天福中進士也有中集中有贈韓張徐三舍人詩韓乃熈載張乃洎徐乃鉉也春日詩云乾坤一夕雨草木萬方春頗佳他皆稱是成彦雄梅頂集右偽唐成彦雄江南進士有徐鉉序張蠙詩一卷右偽蜀張蠙字象文清河人唐乾寧中進士為校書郎櫟陽尉犀浦令建開國拜膳部員外郎後為金堂令王衍與徐后遊大慈寺見壁間墻頭細雨垂纎草水靣囬風聚落花愛之問之云蠙句給禮令以詩進蠙以二首獻衍頗重之將召為制誥宋光嗣以其輕傲止賜白金而已蠙生而頴秀幼能為詩作登單于臺有白日地中出黄河天外來之句為世所稱牛嶠歌詩三卷右偽蜀牛嶠字延峰隴西人唐相僧孺之後博學有文以歌詩著名乾符五年進士歷拾遺補闕尚書郎建鎮西川辟判官及開國拜給事中卒集本三十卷自序云竊慕李長吉所為歌詩輒効之韋莊浣花集五卷右偽蜀韋莊字端已仕王建至吏部侍郎平章事集乃其第藹所編以所居即杜甫草堂舊址故名云偽史稱莊有集二十卷今止存此盧延讓詩一卷右偽蜀盧延讓子善也范陽人唐光化元年進士㓪陵雷滿辟滿敗歸建及僭號授水部員外郎累遷給事中卒官終刑部侍郎延讓師薛能詩不尚竒巧吳融以其不蹈襲大奇之羅隠甲乙集十卷䜛書五卷右杭越羅隠字昭諫餘杭人唐乾符中舉進士不第從事諸鎮皆無合久之而歸鏐辟掌書記歴節度判官副使奏授司勲郎中梁祖以諫議大夫召不行魏博羅紹威推為叔父表薦給事中卒隠少聦敏作詩著文以譏刺為主自號江東生其集皆自為序孫光憲鞏湖編玩三卷右荆南孫光憲字孟文陵州人王衍降唐避地荆南從誨辟掌書記歴檢校祕書監御史大夫王師収朗州光憲勸其主獻三州乾德中終黄州刺史自號葆光子徐鉉集三十卷右偽唐徐鉉字鼎臣廣陵人仕楊溥為祕書郎直宣徽北院長文翰李昪時知制誥璟煜時累官為翰林學士歸朝為直學士院給事中散騎常侍淳化初坐累黜靜難軍司馬鉉初至京師見御毛褐者輙哂之邠苦寒竟以冷氣入腹而卒鉉幼能属文尤精小學為文未嘗沈思自云速則意思壯緩則體勢踈慢云集有陳彭年序李涉歌詩一卷右唐李涉也早從陳許辟一再謫官夷陵大和中為太學博士自號清溪子弟渤三詩附賈島長江集十卷右唐賈島浪仙也燕薊人累舉進士不第文宗時坐飛謗謫長江主簿會昌初終普州司倉參軍島少為僧名無本後從韓愈遂去浮屠于武陵詩一卷右唐于武陵大中進士皎然杼山集十卷右唐僧皎然撰字晝吳興人謝靈運十世孫工篇什德宗詔録本納集賢院集前有于頔序并贈晝上人詩貫休禪月集三十卷右唐僧貫休撰字德隠姓姜氏婺州人後入蜀號禪月大師初呉融為之序其弟子曇域削去别為序引偽蜀乾德中獻之清塞詩一卷右唐僧清塞字南卿詩格清雅與賈島無可齊名寳暦中姚合為杭因携書投謁合聞其哭僧詩云凍湏亡夜剃遺偈病中書大愛之因加以冠巾為周賀云虛中碧雲詩一卷右唐僧虛中也居玉笥山嘗以詩投司空圖酬云十年太華無知已只得虚中一首詩其見重如此薛濤錦江集五卷右唐薛濤洪度也西川樂妓工為詩當時人多與酬贈武元衡奏校書郎大和中卒李肇云樂妓而工詩者濤亦文妖也修文要訣三卷右偽川馮鑑撰雜論為文體式評其誤謬以訓初學云别集類下柳仲塗集一卷右皇朝柳開字仲塗大名人開寳六年進士太平興國中上書願備邊用換崇儀使知寧邊軍徙全桂二年貶復州團練副使居久之復官歴環邠曹代忻滄五州咸平四年終于京師開幼竒警有膽氣學必宗經慕韓愈柳宗元為文因名肩愈字紹先既而易今名字自以為開聖道之塗也集乃門人張景所編歐公常推本朝古文自仲塗始胡周父文集十卷右皇朝胡旦字周父渤海人太平興國三年進士第一人知海州上河平頌先是盧多遜趙普罷頌有逆遜投逺姦普屏外之句太宗怒貶商州團練副使上平燕八議召復官再遷知制誥翟馬周上封事斥時政語連旦謫坊州團練副使復召知制誥草王繼恩制詞溢羙流潯州景德初以目病致仕終祕書監為人雋辯强敏少有大志力學以贍博聞雍熈淳化間奏御之文為時推賞晚節黷貨多干擾州縣持吏短長時論薄之冦忠愍詩三卷右皇朝冦準字平叔華州人太平興國中登進士科淳化五年參知政事切直上怒起輙挽衣留以俟處决定筞立真宗為皇太子景德元年拜平章事契丹入冦决親征之筞三年出知陜州大中祥符七年同平章事明年罷天禧三年復相真宗不䂊皇后預政準白上請太子監國因令楊億草制且進億以代丁謂詰朝準被酒漏言累貶雷州司户徙衡州司馬卒後詔許歸塟公安縣民擁道設祭立竹焚紙竹無根株踰月皆自生民即其地立祠名其竹曰㓂公竹仁宗時贈中書令謚忠愍嘗封萊國公初篤學喜属文尤長詩什多得警句在相位論議忠直不顧身謀仇邪媒蘖既以謫死或又謗之云在相位時與張齊賢相傾朱能謂天書降乾祐準知而不言曾鞏明其不然曰準審如是丁謂拂湏固足以恱之集有范雍叙共二百四十首野水無人渡及江南春二首皆在獨到海只十里之詩已亡其全篇矣王元之小畜集三十卷右皇朝王禹偁字元之鉅野人家微賤九歲能為歌詩畢士安見而異之及長善属文太平興國八年登進士第端拱初試文擢左司諫知制誥判大理寺辨徐鉉罪忤㫖貶商州團練副使久之復召知制誥入翰林為學士孝章皇后崩梓宫遷主第禹偁謂后嘗母儀天下當用舊典坐謗訕出知啇州徙楊州真宗即位復召掌誥修太宗實録坐語涉輕誣出黄州元之詞學敏贍獨步一時鋒銳氣厲極談世事臧否人物以直道自任故屢被擯斥喜稱奬後進當世名士多出於門下集自有序宋文安集一百卷右皇朝宋白字素臣開封人年十二善属文建隆二年進士調嘉州玉津令太宗平晉獻頌上嘉之累擢翰林學士卒謚文安白之文頗浮麗而理致或不工典貢舉取王禹偁田錫胡旦時稱得人晁文元道院别集十五卷法藏碎金録一十卷右五世祖文元公也諱某字明逺澶州人自父始徙家彭門幼從王禹偁學太平興國五年進士至道末擢右正言直史館知制誥入翰林為學士加承㫖眷禮優厚天禧中祈解近職判西京留司御史臺居六年請老以太子少保致仕終少傅年八十四文元謚也國史云公樂易淳固守道甚篤雖貴勢無所摧屈嘗言歴官臨事未嘗挾情害人以售進保全䕶固如免髮膚之傷真宗數稱其長者楊億謂其所作書命代言之體李獻臣亦言公服膺墳典耆年不倦少遇異人指導心要不喜術數之說疑文滯義須質正後已文章典贍書法楷正時輩推重自唐以來世掌告命者唯楊於陵及其子而晁氏繼之延譽後進其門人如宋宣獻晏元憲李邯鄲皆為世顯人集皆有自序及李遵勗後序楊文公刀筆集十卷右皇朝楊億字大年建州人祖文逸嘗夢一羽人自稱懐玉山人覺而億生白毛被體其長盈尺踰月始墮雍熈初以才名聞年纔十一召至闕下得對面試詩賦授秘書省正字宰臣等賀得神童淳化中奏二京賦命試禁林賜進士第久之直集賢院修水熈實録獨成五十六卷真宗即位累擢知制誥入翰林為學士祥符中母病楊翟謁告不待報歸省俄自以病丐解官以太常少卿分司病愈起知汝州復為學士卒年四十七天性頴悟自幼迄老不離翰墨為文敏速對客談笑揮毫無滯博聞强記於歴代典章制度尤所該通時多取正樂道人善後進翕然宗之然評品人物黑白太明姦邪疾惡之故屢被讒毁真宗愛其材特保持之僅免焉景祐中王晦叔上其為冦相請皇太后親政䟽草仁宗嘉歎特贈禮部尚書謚曰文刀筆集有陳詁序凢三百六十三首張乖崖集十卷右皇朝張詠字復之濮州人太平興國初進士累擢至樞密直學士御史中丞禮部尚書卒年七十少好擊劒兼通術數為文尚氣不事彫飾自號乖崖公知益州恩威並著至今人畏愛之錢易所撰墓誌李畋所纂語録附于後陳文惠愚丘集二卷潮陽編一卷右皇朝陳堯佐字希元閬州人端拱初進士累遷三司副使修永定實録擢知制誥歴韶廬夀洛并同雍鄭八州景祐四年召拜同中書門下平章事後太子太師致仕年八十二卒號知餘子謚文惠堯佐属辭尚古不牽世用喜為二韻詩辭調清警號雋味集皆自有序孫漢公集三十卷右皇朝孫何字漢公蔡州人淳化三年應進士殿省俱中第一四遷起居舍人知制誥性卞急嘗任京西東兩浙轉運使副頗事苛察幼篤學嗜古為文宗經與丁謂同為王元之所稱時謂之孫丁集有丁謂序丁晉公集四卷右皇朝丁謂字公言初字謂之蘇州人淳化三年進士累遷知制誥出知鄆亳昇三州天禧四年拜平章事俄以户部罷未幾復相封晉國公乾興中坐擅改永定陵貶崖州司户更赦徙道州明道末以秘書監召還卒於光州幼聰敏書經目輙記不忘善為古文章尤工詩什憸巧險詖世鮮其儔太中祥符初議封禪未决謂因言大計有餘議遂定當時所奏祥瑞事皆謂及王欽若預焉喜圖畫博奕音律吳人自陸宣公後至謂始相本朝熈寧以前議者莫不指謂為姦邪之首自王安石用事頗稱其賢智云集皆詩也劉中山刃筆三卷淝川集四卷右皇朝劉筠字子儀大名人咸平元年進士三遷右正言直史館以司諫知制誥出知鄧陳兩州召入翰林為學士嘗草丁謂李迪罷相制既而又命草制復留丁謂筠不奉詔遂出知廬州再召為學士月餘以病知頴州召入翰林加承㫖未幾進户部龍圖閣學士再知廬州為人不苟合學問閎博文章以理為宗辭尚緻密尤工篇詠能侔揣情状音調凄麗自景德已來與楊億以文章齊名號為楊劉天下宗之刀筆集并淝川集黄鑑序鮮于伯圭集一卷右皇朝鮮于瓌字伯圭閬中人文章為一時之冠累舉不第嘗作揠愁詞時人稱之李宗諤贈詩云漢殿無人薦揚子滿朝空誦揠愁詞後與宗諤同年第四人登科趙普判秦州辟為觀察推官卒晏元憲臨川集三十卷紫㣲集一卷右皇朝晏殊字同叔臨川人景德三年張知白薦得召賜同進士出身再試文擢秘書正字為昇王府記室累擢知制誥翰林學士寳元三年拜平章事坐撰李宸妃墓銘不言上宸妃所出及役兵治産事四年罷知潁川歴陳許雍洛以疾歸侍經席卒性剛峻幼孤獨學為文温純應用尤長於詩杼情寓物辭多曠達當世賢士如范文正歐陽文忠皆出其門女適富鄭公楊察世稱其知人云集有兩本一本自作序范文正丹陽編八卷右皇朝范仲淹字希文其先邠人大中祥符八年進士㓜隨母適朱氏名恱後復今姓名擢右司諌爭廢郭后事出守睦蘇二州以召充天章閣待制知開封獻百官圖詆宰相奪職知饒州歴潤越寳元初知永興陜西經略副使涇原帥敗例降官知耀州幾月改環慶遷四路經略招討使慶暦元年召拜樞密副使參知政事明年宣撫河東陜西俄知邠州病請南陽徙杭青二州卒謚文正為學明經術跂慕古人事業慨然有康濟之志作文章尤以傳道為任事母至孝姑蘇之范皆踈属置義莊以賙給之天下想聞其風采賢士大夫以不獲登其門爲恥獨梅堯臣嘗著碧雲霞一編以譏詆之云集有蘇子瞻叙种明逸詩六卷右皇朝种放字明逸長安人隠終南之豹林谷咸平中遣使召赴闕授左司諫累遷諫議大夫給事中祥符八年終工部侍郎放通經史七歲能属文不喜釋氏常裂佛書以製惟帳著嗣禹說在朝有所啟奏時無知者楊億譏其循黙真宗乃出其議十三篇以示輔臣晚年頗縱酒盛輿服王嗣宗知京兆嘗條上其不法詔問狀不娶無子集乃姪孫說所編范㢲之爲序卷首載真宗詔書及御製詩十首魏仲先草堂集一卷鉅鹿東觀集二卷右皇朝魏野字仲先陜州人志清逸以吟詠自娛亡懐榮利隠于陜之東郊手植竹木繞以流泉鑿土袤丈曰樂天洞前立草堂為詩清苦句多警策與冦準王旦善每往來酬唱祀汾隂歲召不起卒贈著作郎集有薛田序潘逍遥詩三卷右皇朝潘閬字逍遙大名人通易春秋以詩知名太宗嘗召對賜進士第將官使之不就王繼恩與之善繼恩下獄捕閬甚急久之弗得咸平初來京師尹収繫之真宗釋其罪以為滁州參軍後卒于泗上與王禹偁孫何柳開魏野交好最密集有祖無擇序錢易張逵皆碣其墓附于集蘇子瞻少年時過一山院見壁上有詩曰夜凉知有雨院靜若無僧而不知何人詩今集載此聮乃閬夏日宿西禪院詩也小說中謂閬坐盧多遜黨嘗追捕非也昭德先生郡齋讀書志卷第四中
