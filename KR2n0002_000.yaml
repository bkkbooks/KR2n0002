body:
  text: 昭德先生讀書志四卷蓋所得南陽井氏藏書也井氏始收之禺道聚于廬山之陽既乃歸先生徙而置之三峨之下書今不可得盡見矣而志獨存冝春士趙希辨公族之秀慱學好古藏書亦冨遂以屬之校正因即其所藏之目參焉已載者不復取未有者輔其缺其間互出者蓋詳略之不同文義之或異而後來諸賢之所著述亦藉以概見蓋為五卷別以讀書附志併鋟諸梓俾得託朝氏而茲傳抑以夀趙君之所藏慱極君子當肖取於斯淳祐己酉日南至冝春郡假守番陽黎安朝謹書昭德先生郡齋讀書志門人承議郎新奏辟通判茂州軍州事賜緋杜鵬舉序先生姓朝氏名云武校井氏書為讀書志凡四卷鵬舉作邑峨下望先生滄洲之居雞犬相聞暇即問竒字於古松流水之間一日叩以此書欣然相付先生慱物洽聞雅稱海內孰知萬籍樓中先生所淂蓋巳超出文宇而此筌蹄尚足為貧子之光因庚其傳􅚌吾儕晚學於未見書略知其概尚先生刮蒙彂蔀之意云昭德先生郡齋讀書志序魏王粲為蔡中郎所竒盡得其家書籍文章故能慱物多識問無不對國朝宋宣獻公亦得畢文簡楊文莊家書故藏書之冨與祕閣等而常山公以贍博聞于時夫丗之書多矣顧非一人之力所能聚設令篤好而能聚之亦老將至而耄且及豈暇讀哉然則王宋所以能博者蓋自少時巳得先逹所藏故也余家自文元公來以翰墨顯者七丗故家多書至於是正之功丗無與讓然自中原無事時巳有火厄及兵戈之後尺素不存也余仕宦連蹇久益窮空雖心志未衰而無書可讀每恨之南陽井公天資好書自知興元府領四川轉運使常以俸之半傳録時巴蜀獨不𬒳兵人間多有異本聞之未嘗不力求必得而後已歷十餘年所有甚冨既罷載以舟即廬山之下居焉與余厚一日貽余書曰度老且死有平生所藏書甚祕惜之顧子孫稚弱不自樹立若其心愛名則為貴者所有若其心好利則為冨者所有恐不能保也今舉以付子他日其間有好學者而後歸焉不然則子自取之余惕然從其命凡得書若干部計若干卷今三榮僻左少事日夕躬以朱黃讎校舛誤每終篇輒撮其大指論之豈敢效王宋之博所期者家聲是繼而巳其書則固自若也儻遇井氏之賢當如約昭德先生郡齋讀書志序
