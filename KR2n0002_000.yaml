body:
  text: 昭徳先生讀書志四卷盖所得南陽井氏藏書也井氏始収之禺道聚于廬山之陽旣乃歸先生徙而置之三峨之下書今不可得盡見矣而志獨存冝春士趙希弁公族之秀慱學好古蔵書亦冨遂以属之校正因即其所蔵之目參焉已載者不復取未有者𥙷其缺其間互出者盖詳略之不同文義之或異而後来諸賢之所著述亦藉以㮣見盖為五卷別以讀書附志併鋟諸梓俾得託晁氏而玆傳抑以夀趙君之所蔵慱極君子當肖取於斯淳祐己酉日南至冝春郡假守番陽黎安朝謹書昭徳先生郡齋讀書志門人承議郎新奏辟通判茂州軍州事賜緋杜鵬舉序先生姓晁氏名云武校井氏書為讀書志凡四卷鵬舉作邑峨下望先生滄洲之居雞犬相聞暇即問竒字於古松流水之閒一日叩以此書忻然相付先生慱物洽聞雅稱海内孰知萬籍樓中先生所淂蓋巳超出文㡰而此筌蹄尚足為貧子之光因庚其傳􅚌吾儕晚學於未見書畧知其㮣尚先生刮䝉彂蔀之意云昭德先生郡齋讀書志序魏王粲爲蔡中郎所竒盡得其家書籍文章故能慱物多識問無不對國朝宋宣獻公亦得畢文簡楊文莊家書故藏書之冨與祕閣等而常山公以贍博聞于時夫丗之書多矣顧非一人之力所能聚設令篤好而能聚之亦老將至而耄且及豈暇讀哉然則王宋所以能博者蓋自少時巳得先逹所藏故也余家自文元公來以翰墨顯者七丗故家多書至於是正之功丗無與讓然自中原無事時巳有火厄及兵戈之後尺素不存也余仕宦連蹇乆益窮空雖心志未衰而無書可讀毎恨之南陽井公天資好書自知興元府領四川轉運使常以俸之半傳録時巴蜀獨不𬒳兵人間多有異本聞之未嘗不力求必得而後已歷十餘年所有甚冨旣罷載以舟即廬山之下居焉與余厚一日貽余書曰度老且死有平生所藏書甚祕惜之顧子孫稚弱不自樹立若其心愛名則爲貴者所有若其心好利則爲冨者所有恐不能保也今舉以付子他日其間有好學者而後歸焉不然則子自取之余惕然從其命凢得書若干部計若干卷今三榮僻左少事日夕躬以朱黄讎校舛誤毎終篇輙撮其大指論之豈敢効王宋之博所期者家聲是繼而巳其書則固自若也儻遇井氏之賢當如約昭德先生郡齋讀書志序
