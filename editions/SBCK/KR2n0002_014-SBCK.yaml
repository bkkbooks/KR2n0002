body:
  text: 附志江西漕貢進士祕書省挍勘書籍趙希弁經類石經周易右周易十卷經註六萬六千八百四十四字將仕郎守國子助教臣楊鈞朝議郎守國子毛詩􅀶士柱國臣孫逢吉書石經尚書右尚書十三卷經註并序八萬一千九百四十四字將仕郎試袐書省校書郎臣周德貞書鐫玉􅁽官陳德超鐫石經毛詩右毛詩二十卷經註一十四萬六千七百四十字將仕郎試袐書省校書郎張紹文書石經周禮右周禮十二卷經註一十六萬三千一百單三字將仕郎試袐書省校書郎孫朋吉書石經儀禮右儀禮十七卷經註一十六萬五百七十三字將仕郎試秘書省校書郎張紹文書石經禮記右禮記二十卷經註十九萬六千七百五十一字卷首題曰御刪定禮記月令第一集賢院學士尚書左僕射兼右相吏部尚書修國史上柱􅀦晉􅀦公臣林甫奉勑註曲禮爲第二盖唐明皇刪定之本也將仕郎試祕書省祕書郎張紹文書石經春秋右春秋經傳集解三十卷經註并序三十四萬五千八百四十四字不題所書人姓氏石經公羊右公羊十二卷經註一十三萬一千五百一十四字不題所書人姓氏石經榖梁右榖梁十二卷經註八萬一千六百二十字不題所書人姓氏石經論語右論語十卷經註并序三萬五千三百六十八字將仕郎前守簡州平泉縣令兼殿中侍御史賜緋魚袋張德釗書頴川郡陳德謙鐫字石經孝經右孝經一卷經註并序四千九百八十五字不題所書人姓氏但題頴川郡陳德謙鐫字石經孟子右孟子十四卷不題經註字數若干亦不題所書人姓氏石經爾雅右爾雅三卷將仕郎前守簡州平泉縣令賜緋魚袋張德釗書武令昇鐫不題經註字數若干以上石室十三經蓋孟昶時所鐫故周易後書廣政十四年歳次辛亥五月二十日唯三傳至皇祐􅀄方畢故公羊傳後書大宋皇祐元年歳次己丑九月辛夘朔十五日乙巳工畢又書將仕郎試國子四門助教州學講說何維翰將仕郎試祕書省校書郎州學說書黄柬儒林郎試祕書省校書郎守華陽縣尉州學勾當王尚喆朝奉郎祕書省著作佐郎簽署節度判官㕔公事武􅀐尉管勾州學華叅奉直郎尚書屯田貟外郎通判軍州兼管内橋道勸農事及提舉渠堰􅀐都尉借緋提舉州學解程朝奉郎尚書屯田貟外郎通判軍州兼管内勸農事及提舉渠堰輕車都尉借緋提舉州學聶丗卿提㸃益州路諸州軍刑獄兼本路勸農提舉渠堰公事朝奉郎尚書比部貟外郎護軍借紫孫長卿益州路諸州水陸計度轉運使兼本路勸農使朝奉郎尚書刑部貟外郎直史館上􅀐都尉賜緋魚袋借紫曹頴叔樞宻直學士朝散大夫右諌議大夫知益州軍州事兼管内橋道勸農使充益利路屯駐駐泊本城兵馬鈐轄提舉益利路諸州軍兵甲巡檢賊盗公事上􅀐都尉京兆郡開國侯食邑一千户賜紫金魚袋田况春秋榖梁傳註䟽二十卷右唐國子四門助教愓士勛撰昭德先生讀書志中有諸經註䟽獨無穀梁註䟽云經解類經說三十卷右晦庵先生朱文公熹仲晦之􅀃也易􅀃啓􅀩三卷大易問荅兩卷尚書問荅三卷毛詩問荅一卷禮記問荅一卷中庸問荅二卷大學問荅二卷周禮春秋問荅一卷論語問荅并拾遺八卷孟子問荅并拾遺并孝經刋誤四卷附太極解義太極問荅西銘解義問荅三卷通爲三十卷邵武黄大昌鄱陽王迂編次凢六經之要旨論孟之奥義悉可以類而求之延平廖德明爲之序大易粹言七十卷緫論三卷右集明道先生程顥伯淳伊川先生程頥正叔横渠先生張載子厚廣平游酢定夫􅀛山楊時中立兼山郭忠孝立之白雲郭雍子和之􅀃也舒守曽穜序紫巖易傳十卷右紫巖居士魏國張忠獻公浚德逺所著也誠齋易傳二十卷右誠齋先生楊文節公萬里廷秀所著自爲之序周易本義十卷右晦庵先生朱文公熹仲晦所定也發例筮儀附周易繫辭精義二卷右東萊先生吕成公祖謙伯㳟所集也周易玩辭十六卷右平庵項安丗平父所述也自叙干前其爲􅀃曰君子居則觀其象而玩其辭動則觀其變而玩其占讀易之法盡於此矣程子平生所著獨易傳爲全書今以其所得於易傳者述爲此書而其文無與易傳合者合則無用述此書矣其子寅孫刋于建安書院樂章識于後周易緫義二十卷易學舉隅四卷右山齋易祓彦章所著也陳章李􅐉爲之序易學舉隅亦祓所著傳疑之􅀃附于後二五君臣論一卷右胡寅明仲閭丘昕逢辰二侍郎之論也六十四卦各爲之􅀃南軒先生張宣公栻爲之序卦圖系述五卷右卦圗三卷皇極經丗篇系述二卷康節邵先生之􅀃而先生之子伯温所學也簡池趙震叙而刻之皇極經丗指要二卷右蔡元定季通所序也以伏羲卦圖列之於前而以皇極經丗䟽之於後季通建陽人朱文公之益友始辭聘命終預黨名嘉定更化贈以􅀄品􅆱卦辨疑三卷右上卷康節先生揲􅆱法横渠先生大衍􅀃伊川先生揲􅆱法兼山郭先生􅆱數􅀃下卷則辨證也兼山之子雍爲之序謝艮齋諤識其後云卦氣圖一卷右祝融樂洪德秀所著也河南郭雍爲之序德秀嘗從文定胡公父子游取飲水曲肱之義名所居之堂故號曲肱先生云象爻􅀃二卷右武林呉凖齋如愚所著也一則明象二則明爻喬文恵公行簡嘗薦之曰成忠郎呉如愚隨身右列尋即隱居雖在都城而杜門不出臣欲識之而不可得其人行醇而介氣直而温講道窮經賸有著述欲乞特與換授從事郎併與祕閣校勘有旨從之而如愚不受書􅀃六卷右東萊先生吕成公祖謙之􅀃也自洛誥至秦誓凢一十七篇或謂先生之􅀃始於秦誓上至洛誥而止云書􅀃精義三卷右西山先生眞文忠公德秀之􅀃也書集傳六卷右晦庵先生朱文公訂正而武夷蔡沉集傳也沉自序于前其子奉議郎祕書省著作佐郎兼權侍右郎官兼樞宻院編修官兼諸王宫大小學教授杭進于朝沉字仲黙號九峰先生真西山撰其墓表今附于後詩集傳二十卷詩序辨􅀃一巻右晦庵先生朱文公所定也江西漕趙崇憲刻于計臺而識其後周禮􅀃三卷右朝奉郎祕書少監陳􅀓良所進也舊刋于止齋文集中曹叔逺別爲一書而刻之且爲之􅀃周禮攷疑七卷右祝融居士樂思忠仲恕所著也永嘉戴溪肖望豐城劉徳秀仲洪爲之序周禮緫義三十卷右山齋易祓所著也許儀爲之序刻于衡陽禮記要義二卷右荆國文公王安石介甫所著也中庸章句一卷或問二卷中庸輯略二卷大學章句一卷或問二卷右晦翁先生既定著章句于經文之下又述平時問荅所疑以爲或問中庸又述輯略兩卷蓋集伊洛諸儒之􅀃也希弁所藏各兩本嶽麓書院精舍及白鹿洞書院所刋者春秋集解三十卷右東萊先生所著也長沙陳邕和父爲之序春秋左氏後傳十二卷春秋左氏章指十七卷右止齋陳􅀓良所著也四明樓忠簡公鑰序其前清海崔清獻公與之識其後而刻於惟揚郡庠春秋左氏國紀二十卷右清江徐得之所編也自周而下各繫以國又因事而爲之論斷止齋陳􅀓良序之春秋左氏􅀶議二十五卷右東萊先生所著也自爲之序春秋分記九十卷右克齋程公􅀃伯剛所編也其弟公許守冝春刻于郡齋游丞相佀爲之序左氏聮璧八卷右三山葉儀鳯子儀撰乃對偶之書也三傳分門事類十二卷右莫詳誰氏所編以類相從而分其門也論語筆解十卷右唐昌黎先生韓文公之􅀃也其間翺曰者李習之也始愈筆大義以示翺翺從而交相明辨非獨文公制此書也韓文􅀘云公作論語傳未成而殁見於張藉􅀕詩辨之於洪慶善者明矣今丗所傳如宰予晝寢以晝作畫子在齊聞韶三月不知肉味以三月作音浴乎沂以浴作㳂子在回何敢死以死作先之類雖未必然而爲伊川之學者皆取之此本乃祕書丞許勃所序者論語直解十卷右漢上先生朱文定公震所著也紹興五年夏肇建資善堂時孝廟冨於春秋文定以起居郎與宗正卿范公冲同爲翊善朝論皆以爲極天下之選此解資善堂録本也其孫繼先刻于瀏陽學舍而識其後孟子解兩卷右和静先生尹侍講焞所著也先生乃伊川之髙弟欽宗累聘不起賜號和静紹興􅀄再以崇政殿􅀃書召既侍講筵首解論語以進繼解孟子甫及終篇而卒此本乃邢正夫刻于岳陽泮宫者論語解二十卷孟子解三十六卷右無垢先生張文忠公九成子韶所著也論語精義十卷孟子精義十四卷右明道伊川横渠三先生成都范氏滎陽吕氏藍田吕氏上蔡謝氏建安游氏延平楊氏河東侯氏河􅀯尹氏十一人之􅀃晦庵先生所編集也􅀄曰精義後改集義卷末淳熙辛丑冬至前五日㸃畢十一字乃先君子戒庵居士師向手澤也論語集註十卷孟子集註十四卷右朱文公所著也先生之於語孟始集程張吕范十一人之􅀃以爲集義既又本之註䟽參之釋文採之儒先斷之詳􅀃以爲集註語孟之精微盖萃於此書矣希弁所藏各兩本嶽麓白鹿洞所刋也論語􅀃三卷孟子􅀃七卷右􅀯軒先生張宣公栻敬夫所著也論語註義問荅通釋一十卷右勉齋黄先生􅆬通釋晦庵先生集註㦯問之書也孝經義一卷右荆國文公王安石所著也凢十七章䘮親章闕之孝經刋誤一卷右朱文公所定也皆以古文爲正惟傳之六章或從今文廬山胡冰叙于後小學類弟子職一卷右弟子職一書雜見於管子之篇朱文公掲其入學受業事師之法以爲章句參以衆􅀃輔其註文云叙古千文一卷右致堂先生胡寅明仲所作也南康黄西坡灝啇伯爲之傳晦庵朱文公題其後曰叙事立言昭陳法式實有春秋經丗之志至於發明道統開示德門又於卒章深致意焉新學小童朝夕誦之而諷其義亦足以養正於􅂪矣續千文一卷右左朝散大夫知池州軍州事賜紫金魚袋侍其瑗字良器所著也昔周興嗣次王逸少所書千字爲韻語以便觀省後丗謂之千文良器遷避興嗣所用字別製千言以續之山谷嘗抵以書曰引辭連􅀋使不相觝觸甚有功當與凢將急就並行也葛文康公勝仲爲之序百體書千文一卷右艮齋謝公諤題其後曰神剜天畫千􅀋萬狀豈止汲􅃁魯壁周鼓秦山耶叙古􅂪求一卷右五峰先生胡宏所著也自羲農至于五代周凢三十一章毛以謨爲之序先生之子大壯書而刻之通鑑韻語九卷右黄日新齊賢所著也大畧如李瀚蒙求四言体而列其事於左方周平園朱晦翁洪容齋謝艮齋楊誠齋樓攻愧諸老先生皆爲之序齊賢臨川人字義三卷右北溪陳淳安卿所著也安卿臨漳人史韻四十九卷右回谿錢諷正􅀄所編也依唐韻分四聲而以十一史之句註于下諷錢塘人鄭僑錢文子爲之序􅂐韻五卷右徐鉉序蓋其弟鍇所集也鉉字鼎臣仕南唐爲昭文館學士入朝爲太子率更令太平興國􅀄詔以本官直學士院鍇字楚金仕南唐爲右内史舍人卒李煜贈之禮部侍郎云􅀠韻七卷右洪文恵公适􅀠釋序冠於前周益公誌其神道碑云耽􅄝􅀠古爲纂釋二十七卷頴續二十一卷十二先生詩宗集韻二十卷右裴良甫師聖編杜甫李白髙適韓愈柳宗元孟郊歐陽脩曽鞏􅂫軾王安石黄庭堅陳無巳之詩韻也史􅀋􅀘史記一百三十卷右唐司馬貞􅀘司馬遷之書也􅀘三皇紀於五帝之前每篇各註索隱之􅀃以百三十篇賛附于每篇之末希弁嘗考諸家之􅀃爲讀史􅀘註一書頗加詳焉古史六十卷右􅂫文定公轍所作也自伏羲神農訖秦始皇帝爲七本紀十六丗家三十七列傳以􅀘司馬遷之缺云西漢刋誤一卷東漢刋誤一卷右宣德郎守太常􅀶士充國子監直講劉攽所撰也仁宗讀後漢書見墾田字皆作懇字使侍中傳詔中書使刋正之攽爲學官遂刋其誤爲一書云西漢􅀘遺一卷右何俌德輔􅀘西漢之遺文也蓋束晢􅀘詩之義耳希弁嘗讀其皇太子遺四皓書及侯公􅀃項羽辭因思昔東坡先生亦嘗爲侯公􅀃項羽辭載於集中而啇芸小􅀃載張良所與啇山四皓書則丗所罕見也其書曰良白仰惟先生秉超丗之殊操身在六合之間志凌造化之表但自大漢受命禎靈顯集䄂母告符足以宅兆民之心先生當於此時耀神爽乎雲霄濯鳳翼於天漢使九門之外有非常之客北闕之下有神氣之賔而淵潜山隱竊爲先生不取也良以頑薄承乏忝官所謂絶景不御而駕服駑駘方今元首欽明文思百揆之佐立則延首坐則引領日仄而方丈不御夜眠而閶闔不閉蓋皇極湏日月以􅀭光后土待嶽瀆以導滯而當聖丗鸞鳳林栖不翔乎太清騏驎嶽遁不步乎郊藪非所以寧八荒尉六合也不得侍省展布腹心略冩至言想望翻然不猜其意張良白俌乾道中權工侍兼權直院西漢􅀘註一十卷右國子􅀶士吳莘啇卿所著也倪思爲之序史記法語十卷前漢法語二十卷東漢精語十六卷三國志精語六卷右鄱陽洪文敏公邁所著也東都事畧一百三十卷右承議郎知龍州王稱所進也本紀十二丗家五列傳一百五附録八間爲賛論以發揚之以其國都大梁以前之事故謂之東都然其中踈駮甚多稱眉山人故禮部侍郎賞之子此書既進遂直中祕云編年􅀋皇王大紀八十卷右五峯先生胡宏所述皇帝王伯之事始於盤古氏而終於周之末自尭以上六閼逢無紀尭之􅀄載迄于赧王乙巳二千有三十年貫通經典採摭史傳靡所不載又因事而爲之論所以述去取之原釋疑似之惑者至矣先生字仁仲文定公之季子自㓜有志於道嘗見楊中立于京師又從侯師聖于荆門而卒傳文定公之學紹定戊子希弁生父師冋爲衡山令嘗奉朝旨索其書云通史縁起二十卷右㑹稽胡衛之作也其􅀃謂伏羲氏神農氏軒轅氏三皇也少昊氏髙陽氏髙辛氏合唐虞氏五帝也不可不備乃推盤古以來衆􅀃之異同雖十紀浩茫難以年考而傳疑傳信有理存焉衞甞仕于朝云晉春秋二十卷右隋祕書省正字杜延業所述其自序云蕭方等採削群史著三十國春秋囊括兩晉之言網羅諸國之事以晉國爲主附列二十九國延業刪緝題曰晉春秋載於唐書藝文志南北征伐編年二十三卷右呉曽編集自漢獻帝迄于周丗宗其意謂資治通鑑征伐之事雜見於列國言動之間讀者不得專一稽攷至南北議論亦未詳盡遂效其體凢一征一伐靡所不載紹興辛巳逆亮叛盟廟堂知有是書嘗取以備乙覧云曽字虎臣撫之崇仁人京文忠公鏜爲之序五代春秋五卷右河南先生尹洙師魯所作也由梁太祖開平元年四月甲子迄于周顯德七年正月甲辰資治通鑑綱目五十九卷序例一卷右晦庵先生朱文公所編也司馬文正既爲資治通鑑又別爲目録及舉要暦胡文定復修舉要􅀘遺朱文公因文正文定兩公四書別爲義例表歳以首年而因年以著統大書以提要而分註以備言其綱倣春秋而參取群史之長其目效左傳而稽合諸儒之粹眞德秀刻于泉南陳孔碩李方子叙其後希弁所藏蘷本爲板四千二百有竒吉本二千八百而且無陳李二公之序希弁又嘗叅以泉本挍其去取之不同并考温公文公之書法爲資治通鑑綱目考異淳祐丙午祕省嘗下本州借本書冩云資治通鑑綱目提要五十九卷右資治通鑑綱目提要存其綱而去其目如春秋之經也希弁所藏乃趙希琹刻于廬陵者續資治通鑑長編九百四十六卷右巽巖先生李文簡公燾仁甫所修也太祖至英宗一百七十五卷神宗朝二百二十八卷哲宗朝二百二十卷徽宗朝三百二十三卷其書倣司馬氏通鑑踵爲之然燾謙抑不敢名續通鑑但謂續長編蜀帥汪應辰嘗乞給筆札以冩藏祕閣乾道六年正月令祕書省依通鑑帋樣及字樣大小繕冩一部仍將燾衘位於卷首依司馬光衘位書冩進入燾之卒也上語宇文价云朕嘗許燾大書續資治通鑑長編七大字且用神宗賜司馬光故事爲序冠篇不謂其止此也希弁所藏蜀本視書坊所刋者爲詳希弁嘗爲續資治通鑑長編􅀘註一書以􅀘詔敕奏篇等闕云國朝編年政要四十卷右兵部尚書太子詹事蔡文懿公㓜學所編也自太祖建隆之元迄于欽宗靖康之末祖春秋之法而參以司馬公舉要暦吕氏大事記之例宰輔拜罷表諸年首其子朝請大夫直祕閣提舉福建路常平義倉茶事籥叙而刻之皇朝編年備要二十九卷中興編年備要十卷右壷山陳均所編也其書用國史實録等書爲編年體例起于建隆迄于淳熙書法蓋微倣綱目之例而加斟酌焉眞德秀鄭性之林岊皆爲之序開基事要十卷右朝奉郎祕書少監皇子嘉王府賛讀陳􅀓良所進也自建隆之􅀄迄開寶之末亦曰建隆編曹叔逺序而刻之仁宗君臣政要四十卷右文林郎守祕書丞監閬州啇税院市買税塩臣張唐英編進起天聖終嘉祐詔令刑政之要禮樂選舉之法郊廟祭祀邊鄙備禦罔不備録其間名臣得其家丗之詳者爲之立傳否則闕之唐英字次功自號黄松子續紀年通譜一卷右宣義郎致仕畢仲荀續宋元憲公紀年通譜之書也元憲止於慶曆辛巳仲荀起於慶曆壬午而迄于徽宗丁未録二百卷右右修職郎監臨安府都鹽倉李丙所編也上帙起召王安石爲翰林學士迄于神宗皇帝升遐中帙起宣仁聖烈垂簾除吕公著侍讀迄于宣仁聖烈祔廟下帙起李清臣進䇿題迄于誅童貫安石之召實治平丁未之所始故以丁未名之三朝北盟集編二百五十卷集􅀘五十卷右朝散大夫充荆湖北路安撫司叅議官徐夢莘編集上帙起政和七年七月庚寅終宣和七年十二月庚申中帙起宣和七年十二月庚申終靖康二年四月丁亥下帙起建炎元年五月庚寅終紹興三十二年四月丁亥集􅀘則􅀘其遺也建炎以來中興繫年要録二百卷右陵陽布衣李心傳微之所修也知瀘州許奕奏進之修國史曽㬇又嘗乞令其弟太常􅀶士道傳繳進得旨降付國史院然其中闕疑尚多希弁嘗爲􅀘註一書頗爲詳備云寧宗皇帝紀十卷右四朝國史中之本紀也續稽古録一卷右太社令龔頥正續司馬文正稽古録之書也文正止於治平頥正起於熙寧而迄于寧宗之􅀄􅀽􅀃友栞于成都趙彦勵復栞于長沙未幾有毀版之旨云通鑑問疑一卷右祕書丞髙安劉恕字道原嘗與司馬公修通鑑司馬公深愛其􅀶學每以所疑問焉恕子羲仲纂集其徃復相難者而作此書十國紀年序附于後綱目發明五十九卷右建康布衣尹起莘所著以發明綱目義例别之傑帥金陵進其書于朝魏文靖公了翁爲之序綱目論斷二十卷右江珪吕中論大書以提要正變例而爲之斷云其間所載徐清叟跋有以知端平􅀄元通鑑綱目上塵乙覧之因雜史類靖康傳信録三卷右李忠定公綱爲尚書右丞充親征行營使及以知樞宻院事爲河北河東路宣撫使時事也建炎進退志緫叙四卷右李忠定公綱爲正議大夫尚書右僕射兼中書侍郎至於罷爲觀文殿大學士提舉杭州洞霄宫時事也建炎時政記三卷右李忠定公綱所編也自建炎元年五月一日以後至於八月十八日紹興正論一卷右編録秦檜當國羅織諸賢或死於市朝或死於囹圄或死於貶所或流落於魑魅之區累赦不移或棲遟於林泉之下屏跡不出者一百一十八人姓名與其􅀗罪之因但云瀟湘樵夫序不知其爲誰也朝野遺事一卷右趙子崧伯山所著記中興以前凢一百二十有五事自號鑑堂居士終於延康殿學士右中奉大夫淳熙中周益公帥長沙命項安丗丁朝佐楊長孺讎校而刻之朝野雜記甲集二十卷乙集二十卷右李心傳微之所編中興以來之事也繫年録蓋倣於此史評類讀史管見三十卷右致堂先生胡寅明仲所著也意謂二百四十二年之後至于五代司馬文正所述資治通鑑事雖備而立義少遂用春秋經㫖尚論詳評晦庵綱目中多取之猶子大壯序其􅀃孫德輿刻于衡陽讀史明辯三十卷右伊川元城􅀛山了齋横渠屏山横浦五峯東萊南軒止齋致堂十二先生史論也史􅀃十卷右東萊先生吕成公之􅀃也史評六卷右誠齋先生楊文節公萬里之評也西漢鑑十卷右國子􅀶士吳莘所著也王容爲之序兩漢􅀶議二十卷右陳季雅彦群所撰也唐史論斷二卷右朝散大夫尚書刑部郎中充天章閣待制兼侍讀孫甫之翰所撰也甫陽翟人國史有傳唐論二卷右宣教郎前太平州州學教授王居中撰程公許韓祥韓􅀘皆序之職官類漢官考四卷右徐筠孟堅所著也西京二百年品秩爵列位號名數自三公而下至於筦庫釐爲十九門緫一百四十九條􅅊楫爲之序孟堅清江人淳熙甲辰進士職官分紀五十卷右孫逢吉彦同所集也以楊侃職林而廣之具載新制而又増門目之亡缺􅀘事實之遺漏元祐中趙叡秦觀爲之序職源五十卷右王益之等所編歴代置官本末也官之故實職之典掌前賢遺跡先朝訓詞以次列焉翰􅁐群書三卷右唐李肇翰林志元稹承旨學士院記韋處厚翰林學士記韋執􅁩翰林院故事楊鉅翰林學士院舊規皇朝禁林讌㑹集爲一卷錢惟演金坡遺事晁逈别書金坡遺事李宗諤翰􅁐雜記爲一卷􅂫易簡續翰林志􅂫􅂄次續翰林志學士年表翰􅁐題名翰􅁐遺事爲一卷祖宗官制舊典三卷右東萊蔡元道所編也其子興宗叙於後云追記祖宗舊典凡設官任職治民理財之要與夫分别流品謹惜名噐之道合七十七門云玉堂雜記三卷右周益公必大記玉堂中事也丁朝佐謂九重之德羙前軰之典刑恩數之異同典故之㳂革皆因事而見之云鑾坡録一卷右周益公必大記􅀄除翰林日制誥表章也刑法類養賢録二十二卷右王日休所編也以嘉祐元豐政和紹興勑令格式嘉祐政和禄令紹興禄秩吏部七司條法紹興免􅃥令叅攷編􅀋其舊法不行於今者亦存之以見㳂革云日休字作德釣臺人也治縣法十卷右吕恵卿所著也曰法令曰詞訟曰刑獄曰簿暦曰造簿曰給納曰災傷曰盜賊曰勸課曰教化恵卿自序於前紹聖二年九月也所在多刋此法豈非不以人廢言與常平􅃥法一卷右紹興以來臣僚申請士民陳訴備載於中按朱文公語録乃朝廷頒降者儀註􅀋儀禮經傳通解續卷􅀕禮十四卷右朱文公編集而䘮􅀕二禮未就属之勉齋先生勉齋既成䘮禮而􅀕禮未就又属之楊信齋信齋據二先生藁本叅以舊聞定爲十四卷爲門八十一鄭逢辰爲江西倉進其本于朝信齋福州人名復字茂才書既奏贈文林郎家禮五卷右朱文公所定而趙崇思刻之萍郷者潘時舉李道傳黄榦廖德明陳光祖序跋附焉家禮附註五卷右陳雷刻于温州學宫者凢九十九條吕氏郷約一卷郷儀一卷右二書吕和叔季明所定也朱文公記于後司馬公居家雜儀一卷右温國文正公光所著也天文卜筭􅀋􅄤度分野列􅀫圖三卷右自河圖洛書以及列􅀫圖其象於上而列漢晉隋志之􅀃于下律吕本原一卷右蔡元定季通所著也曰黄鍾曰黄鍾之實曰黄鍾生十二律曰十二律之實曰變律曰律生五聲圖曰變聲曰八十四聲圖曰六十調圖曰候氣曰審度曰嘉量曰謹權衡凢十三篇云五行􅀋拜命暦一卷右趙景先集其自序曰此書常式隂陽家莫能曉今則不敢傳諸該􅀶愚嘗得自名流用之皆驗故集成此以示子孫自非洞於此道他人幸勿妄傳也趙師俠誌于後地理長安志二十卷右龍圖閣直學士右諌議大夫修國史常山宋敏求所撰也熙寧九年二月五日太常􅀶士充集賢校理崇文院檢討同知宗正丞事趙彦若序敏求亦嘗爲河南志時以朝奉郎守太常丞充集賢校理編修唐書官通判西京留守司兼畿内勸農事飛􅀐尉署衘元豐六年二月戊辰端明殿學士兼翰林侍讀學士司馬光序讀書志中有河南志而無長安志云職方乗三卷後集十四卷豫章右洪芻所編也曰郡縣曰城宇曰山曰水曰觀寺曰祠廟曰􅃁墓曰寶瑞曰妖異曰牧守曰仙眞曰人物凢十二部芻字駒父自少以詩名取重於時登進士第爲晉州學官山谷素稱其才嘗曰甥之文學他日當大成但願極加意於忠信孝友之地甘受和白受采不但用文章照映今古乃所望也又嘗作釋權以遺山谷山谷荅曰筆力縱横極見日新之功芻之名因是益顯靖康之􅀄爲尚書郎三遷至諌議大夫遭變坐事貶文登有老圃集行於丗續之者淳熙中帥程叔逹也李大異叙于後建康志十卷續志十卷右帥史正志所修而爲之序乾道五年三月也慶元六年八月帥吳琚續之又爲之序長沙志五十二卷右紹興辛亥帥趙善俊修而爲之序冝春志十卷集八卷續修志四卷集六卷右嘉定中守滕強恕修郡人張嗣古序續志集則嘉熙􅀄守郭正已也桂海虞衡志三卷右范文穆公成大帥静江日志其風物土冝也自爲之序静江志十二卷右嘉泰癸亥帥蔡戡修以髙宗皇帝除太􅀓静江奉寧軍節度使桂州牧兼鄭州牧制詞冠于篇端永寧編十五卷温州右嘉定中守留元剛序陳謙所述也叙州叙縣叙山叙水叙賦叙􅃥叙兵叙人叙産叙祠叙遺凢十一􅀋桃花源集一卷右紹聖丙子四明姚孳序淳熙庚子邑宰趙彦琇俾新澧陽簿張櫟重修備載晉唐本朝諸公詩文海南集二十三卷後集十二卷右海外瓊管之集也於中可見丁晉公􅂫長公趙豐公折仲古李泰發胡􅀖衡諸公之文筆臨江集三十四卷右嘉定中守楊恕編郡人劉昌詩序景陵志十四卷右嘉定庚辰郡文學林英發修詩文集録附焉唐陸鴻漸皮日休陸􅀛􅀩皇朝朱昂宋祁晏殊呉育楊徽之􅂫紳石延年王禹偁張耒諸公之作爲多邵陽志一卷右淳熙壬寅郡文學李􅅊之序陵水志三卷右慶元丙辰郡文學劉奕修詩文附臨賀志三卷集二卷右莫詳誰所修也集以蘇東坡荅彭賀州啓爲首渌江志十二卷右嘉定中邑令張耕修龍江志十卷右嘉定庚午邑丞呉紹古修令沈爕序鈐岡志三卷右嘉定甲戌邑令謝好古修瑞陽志十卷縣志三卷右嘉定六年郡守周綸修郡人雷孝友序梅川志三卷右寳慶丙戌重修清江張洽序秋浦新志十六卷右端平丙申江東倉使兼知池州王伯大修自爲序冨川志三卷右嘉定甲申守李壽朋修寧越志三卷右慶元攺元郡守林㑹修南嶽緫勝集三卷右紀載南嶽之勝槩也水簾詩集三卷右編集水簾洞之詩文也浯溪集前後續别四集右自元結中興頌之後凢刻之浯水之崖者皆在焉卷雪樓集二卷右集冨池昭勇廟記序詩文也廟乃三國甘寧累封昭毅武恵遺愛靈顯王靈應後集十二卷右集梓潼廟誥勑記叙詩文也范鎮張浚胡丗將王剛中王之望􅄯公武諸公祝文爲多亦有唐僖宗之祝文冨文忠入國語録一卷右冨弼慶曆二年以右正言知制誥爲回謝契丹國信使西上閤門使符惟忠副之惟忠行至武強病卒以知貝州供備庫使恩州團練使張茂實代之所􅀃機冝事件具載録中弼所争者獻納二字朝廷竟從晏殊議用納字弼不預也章忠恪奉使金國語録一卷右紹興三年章􅁩以龍圖閣學士樞宻都承㫖充軍前奉表通問使給事中孫近副之􅁩録其報聘之語也􅁩字且叟攬轡録二卷右范成大乾道六年以資政殿大學士左中大夫醴泉觀使兼侍讀丹陽郡開國公食邑二千户食實封八百户與崇信軍節度使領閤門事兼客省四方館事信安郡開國侯食邑一千六百户食實封四百户康湑爲奉使大金國信使副其徃返地理日記也成大字至能呉縣人紹興二十四年進士使金歸除中書舍人淳熙五年叅知政事自號石湖孝宗皇帝御書二字以賜之禹貢疆理廣記六卷右長沙易祓編而爲之􅀃方輿勝覽四十三卷後集七卷續集二十卷右建安祝穆和父編新安吕午伯可序仰山孚恵廟實録二十八卷太平興國禪寺附録六卷右嘉定庚午潘侃重編郡守鄭昉誌于後希弁自庚午以後續録之爲五卷夢華録一卷右夢想東都之録也宋敏求京城記載坊門公府宫寺第宅爲甚詳而不及巷陌店肆節物時好孟元老記録舊所經歴而爲此書坦庵趙師俠識其後金虜承安湏知一卷右金虜名諱及增修朝官職事俸給格式服制地里圖之類也承安蓋虜主璟之紀元也時惟丁巳乃寧宗皇帝慶元三年云傳記􅀋古列女傳八卷右漢都水使者光禄大夫劉向撰又一卷莫知其爲誰續然亦載於崇文緫目王回曾鞏皆序之百將傳十卷右東光張預公立所進也由太公而下至于五代之劉詞凢史辭泛漫而不切於兵者一刪去之或非兵略而可以資人之智慮者間亦存焉各以孫子兵法題其後次以行事合之諸葛忠武侯傳一卷右南軒先生張宣公栻所著也四將傳四卷右建炎中興名將劉錡岳飛李顯忠魏勝之傳也史官章頴撰而上之十二朝名臣言行録七十二卷右八朝朱文公所編也四朝乃後人所續者豐清敏遺事一卷右李朴所編豐公稷之言行也陳瓘叙次及復官賜謚制尋訪子孫劄子國史列傳附于後朱文公爲後序云范太史遺事一卷右范冲所編正獻公祖禹言行也趙豐公逸事一卷右門人喻樗方疇諸人所記也李忠定公行狀三卷右公之弟綸所述也太常􅀶士兼實録院檢討官葉適所撰謚議附于後胡文定公行狀一卷右公之子寅寧宏所述也其孫大壯手書而傳之因附入曽玄諸孫名朱文公行狀一卷右門人黄榦所作也道命録五卷右秀巖李心傳所編也自司馬公吕申公韓康公薦伊川先生劄子至於嘉定録用伊川先生後人詔㫖中間朝臣之奏䟽儒宗之謚議纎悉備載道學興廢具見於此張忠文公節義録四卷右張公叔夜告敕奏劄書東北行記旌忠􅉖節廟碑及事􅀋也譜諜􅀋仙源積慶圖三卷右三祖下宗室派系也皇族登科題名一卷右大宗正嗣濮王士輵宗正丞耿延年所編也淳熈二年成書始於元祐三年李常寧榜子湜令馡厥後嗣而益之延年持節鍾官鋟木於饒洪文敏公邁書于後安定先生丗系述一卷右胡瑗丗系源委也瑗字翼之泰州如臯人也瑗爲人師言行而身化之使誠明者逹昏愚者厲而頑傲者革故其爲法嚴而信爲道乆而尊自景祐明道以來學者有師惟瑗與孫復石介三人瑗以布衣召見論樂拜校書郎嘗爲湖州學官慶暦四年建太學于京師有司請下湖州取瑗教學之法以爲則召爲諸王宫教授以疾免巳而以太子中允致仕皇祐中召至京師議樂歲餘爲光禄寺丞國子監直講遷大理寺丞嘉祐中遷太子中允充天章閣侍講巳而又以病不能朝復以太常􅀶士致仕東歸之日太學之諸生與賢士大夫送之東門執弟子禮路人嗟歎以爲榮卒年六十七丗系乃淳熙中沈大臨述周元公年譜三卷右南康所刋也以元公出處譜之以年公所作詩文之類附見焉倪灼跋横渠先生張獻公年譜一卷右先生之孫同然所編也譜先生之出處歲月墓表謚議封告及司馬文正謚議之帖魏文靖公請謚之表并哀辭之􅀋附焉希弁又以先生行狀􅀘其闕三􅂫先生年譜一卷右左朝請大夫權發遣成都府路提􅀧刑獄公事何棆編山谷先生年譜三十卷右先生諸孫􅓌所編也悉譜先生所爲詩文於逐年之左極爲詳備云朱文公年譜三卷右先生門人李方子所編也盧壯父刻之於瑞陽者爲三􅁽倪灼刻於康廬者爲一􅁽今兩存之諸子􅀋御解老子二卷右徽宗皇帝之御製也嘗倣唐制命大臣分章句書冩刻石又詔史記老子傳陞于列傳之首自爲一帙前漢古今人表列于上聖今觀此解所謂道者人之所共由德者人之所自得道者亘萬丗而無弊德者充一性而常存老子當周之末道降而德衰故著書九九篇以明道德之常而謂之經其辭簡其旨逺學者當黙識而深造之其􅀃大槩與政和之詔同鬻子十四篇右楚人鬻熊之書也逢行珪序而註之漢藝文志云鬻子六篇今此本乃十四篇未詳孰是然篇或錯亂又多遺闕行珪之􅀃巳然矣唐藝文志列于老子之前蓋謂其爲文王師也列子九卷右列子一書漢唐及本朝藝文志皆謂八卷政和中冝春彭俞爲積石軍倅聞髙麗國列子十卷得其第九篇曰元瑞於青唐卜者神宗皇帝嘗惡後漢范曄姓名欲更修之求東觀記乆之不得繼而髙麗以其本來上􅁉陵厭代遂不及進元和中髙麗使人言狀訪於書省無知者醫官巳死於其家得之信乎髙麗之多異書也孔叢子七卷右孔子八丗孫鮒集先君仲尼子思子上子髙子順之言及巳之事凢二十一篇爲六卷名之曰孔叢子蓋言有善而叢聚之也孔臧又以其所爲賦與書謂之連叢上下篇爲一卷附之卷末其書不見於漢唐藝文志嘉祐四年提􅀧廣南西路刑獄公事兼本路勸農事朝散郎守尚書屯田郎中上輕車都尉宋咸始爲註釋以進愼子一卷右例陽人愼到之書也唐藝文志云愼子十篇愼到撰滕輔註蓋法家云公孫龍子三卷右唐藝文志列于名家陳嗣古賈大隱皆嘗爲之註今不辨矣孔叢子第四卷有公孫龍子一篇劉子五卷右劉晝字孔昭之書也或云劉勰所撰或曰劉歆之制或謂劉孝標之作􅀽孝政爲序之際巳不能明辨之矣唐藝文志列于雜家聱隅子二卷右閩人黄晞之書也晞好讀書聚數千卷學者多從之著聱隅欷歔􅃈微論石介爲直講聞其名使諸生如古禮執羔鴈束帛就里中聘之以􅀘學職晞固辤不就故歐陽文忠公哭徂徠先生詩云羔雁聘黄晞晞驚走鄰家是也嘉祐中韓魏公爲樞密使薦之以爲太學助教受命而卒或曰有子甚愚魯所聚及自著書多散失不存子家子一卷右眉山家頥飬正之書也無卷帙篇目姑附于諸子後莊子解四卷揚子解一卷右荆國文公王安石所解也農家􅀋農書三卷右平江陳峻景文所述也唐元宗因李泌之請以二月朔爲中和節令百官進農書以示務本而其書不見於史景文輯六經中所載農圃之事參以田牛􅅙桑等爲此編以􅀘史記之闕謝艮齋諤爲之序社倉本末一卷右真文忠公帥潭日所編也其自叙云剟其大要使後之君子得以覽觀焉蓋今日之所講求雖不敢不極其至而後來之弊終有不能逆計者存諸家之規畫所以備後日之叅攷也太師史公浩尚書韓公某丞相趙公汝愚舉子條約附焉其􅀃蓋欲捄愚俗殺子之禍云雜􅀃􅀋丗􅀃新語三卷右宋臨川王義慶撰梁劉孝標注讀書志引唐藝文志及崇文揔目有十卷八卷之疑又云一本極詳一本殊略未知孰爲正希弁所藏本有紹興八年董弅題其後曰右世􅀃三十六篇世所傳釐爲十卷或作四十五篇而末卷但重出前九卷中所載余家舊本蓋得之王原叔家後得晏元獻公手自挍本盡去重􅃨其注亦小加剪截最爲善本云宋景文雞跖集二十卷右宋景文公祁所集也讀書志云雞跖集十卷未詳撰人希弁所藏二十卷題曰宋景文雞跖集有建炎元年黄􅀖俊序孔氏談􅁐五卷右孔平仲毅父記録之文也毅父清江人文仲武仲之弟有續丗􅀃行於世孔氏雜􅀃一卷右孔平仲毅父之記録也圖志謂之珩璜論公是先生弟子記一卷右劉敞原父之􅀃也謝艮齋得之於劉司業焞以遺清江守江􅄎刻之趙不黯以閣下本校正而識其後云如叔貢問尚書記人之功下闕五段梓慶削木爲鐻至不敢以爵賞攖其慮下缺七段文􅀔差錯至不可讀其他以二段爲一一段爲二者皆正之東萊吕紫微雜􅀃一卷師友雜志一卷詩話一卷右吕本中字居仁之􅀃也鄭寅刻之廬陵春明退朝録五卷右宋常山公敏求所録也讀書志云春明退朝録三卷希弁所藏一本三卷又一本五卷凢多七十有八條云侯鯖録八卷右聊復翁趙令畤德麟之􅀃也取王氏五侯鯖之義而名之避暑録十五卷右葉夢得少藴之􅀃也少藴蘇州呉縣人紹聖四年進士建炎􅀄爲翰林學士拜户書遷尚書左丞終於崇信軍節度使自號石林云能攺齋漫録二十卷右呉曽虎臣所纂也曰事始曰辨誤曰事實曰㳂襲曰地里曰議論曰記詩曰紀事曰記文曰􅀋對曰方物曰樂府曰神僊詭怪曰詼諧戯謔一一載之曽臨川人嘗主奉常簿入玉牒爲檢討官能攺齋乃其自謂云終於吏部郎揮麈録後録第三録揮麈餘話二十三卷右王明清仲言之􅀃也明清汝隂人載朝廷典故賢哲言行爲多辨志録一卷右吕東萊祖謙伯㳟所著也四明樓鑰序之管見録二十卷右呉莘啇卿之􅀃也論經史并暦爲詳啇卿建寧人嘗爲國子􅀶士序則倪思典刑録二十卷右呉宏子大所録也杜東子野爲之序蓋分門編次先正諸公之言行也項氏家􅀃十卷附録四卷右項安丗平父之􅀃也􅀃經史文學爲甚詳平父江陵人自號平庵辛克承刻于江陵郡齋而爲之識容齋隨筆十六卷續筆十六卷三筆十六卷四筆十六卷五筆十卷右洪文敏公邁字景盧所著也何異序之麈史三卷右王得臣字彦輔所記也其自序云自朝廷至州里有可訓可法可鑒可誡者􅀋以相從云得臣自號鳯臺子却掃編三卷右睢陽徐度所著也度字中立丞相處仁之子嘗爲吏部侍郎示兒編前後集二十四卷右孫奕季昭所編也􅂫大章諸人題于後兵家􅀋八陣圖風后握機文馬隆八陣賛獨孤及八陣記四卷右蔡元定季通所編次也車穽或問一卷右知興國軍胡逸駕所述也自序於前附車戰利害奏劄于後􅀋書􅀋文章縁起一卷右梁太常卿任昉彦升所集也自秦漢以來聖君賢士所爲文章名之所始備見於中古今註三卷右晉太􅀓丞崔豹正熊所註也一輿服二都邑三音樂四鳥獸五蟲魚六草木七雜註八問荅釋義尊號録一卷右宋元憲公庠所編也自漢至于仁宗有序有評有賛龍圖閣學士提舉寶籙宫宋康年進十七史􅀋七十七卷右三山鄭某所編也自周而下每一事相􅀋則編而次之西漢緫􅀋二十六卷右沈長卿文伯所編也隨事立門隨門􅀋事他傳所載緫而歸一雖注中有所取者亦皆掇拾而裒集之長卿霅川人也乾道攺元信州教官呉瓊景玉序唐鱠五十卷右張文忠公九成所著也公嘗謂紀志出於歐陽公列傳出於宋公天文律暦五行志則劉羲叟爲之方鎮百官表則梅尭臣爲之禮儀兵制􅀄出於王景彜未竟而卒每患首尾不相貫属遂緫其條綱稽其同異􅀋聚而區别之事物紀原十卷右髙承編自天地生植與夫禮樂刑政經籍器用下至􅀶奕嬉戯之微蟲魚飛走之􅀋無不攷其所自來承開封人雙溪項彬序􅀘註事􅀋賦三十卷右呉淑所進也始淑進一字賦百首爲二十卷奉旨令其注釋遂廣爲三十卷云淑勃海人事文􅀋聚六十卷右祝穆和父編門分列各以群書要語冠其首次之以古今事實又次之以詩文全篇凢天文地理人事服食噐具草木蟲魚靡不備載吕午伯可爲之序祕府書林二十二卷右張文伯正夫所編曰天文曰律暦曰五行曰地理曰食貨曰選舉曰百官曰禮樂曰輿服曰􅀕祀曰藝文曰兵刑凢十二􅀋攷訂歴代及本朝史志爲甚詳國朝㑹要一百五十卷右國朝㑹要起建隆止慶暦凢八十五年章得象所進者緫􅀋國朝㑹要五百八十八卷右緫􅀋國朝會要由建隆而至乾道也始仁宗命章得象編起建隆止慶暦爲一百五十卷神宗又命王珪續編慶暦四年以後至熙寧末凢三十四年通前爲三百卷徽宗詔王覿曾肇續編元豐至元符尋又詔起治平四年止崇寧五年凢四十二年然二書皆弗克成政和末有司獨上吉禮三􅀋緫一百五十卷蓋通章得象王珪所編者益以熙寧後事也紹興九年詔館職續編至三十一年又降趣㫖孝宗命宰相提舉閲再歳乃成自神宗之􅀄至于靖康之末凢六十年緫三百卷厥後中興乾道踵而成之此集則合十一朝爲一書也然中多節略而始末不全者㑹要詳節四十卷右御史知雜范師道所編也讀書志云節㑹要十二卷希弁所藏乃四十卷前有叙云師道所節四十卷先後詳緻無異全本紹興小臣王容清謹題皇朝大詔令二百四十卷右宋宣獻公家所編纂也皆中興以前之典故嘉定三年李大異刻于建寧本朝事實三十五卷右莫詳編者姓氏祖宗丗次登極紀元詔書聖學御製郊廟道釋玉牒公主官職爵邑勛臣配享宰執拜罷科目儀注兵刑律暦籍田財用削平僣僞陞降州縣經略夷狄之􅀋具載本末又如聖德頌旌忠碑之􅀋皆載之紹述熙豐政事十卷右政和八年十月一日詔云可以紹述熙豐政事書布告施行此即布告之本也具列詔書于前而載十一人姓名于後今詳書之以見當時之官制云承務郎試明堂平朔頒朔兼禮制􅈰校正内經檢討官臣黄次功承奉郎守明堂緫章頒朔臣李伯全宣教郎守明堂青陽頒朔臣嚴􅁉朝請郎明堂頒朔臣徐秉哲宣教郎試明堂頒事臣蔡伷朝散郎試明堂頒事臣陳公彦朝奉郎試明堂頒政國史編修官臣許翰通侍大夫康州防禦使提㸃龍德太一宫提舉入内醫官編􅀋聖濟經提舉太醫學明堂頒朔布政詳定官臣曹孝忠翰林學士知制誥兼侍講同修國史明堂頒朔布政詳定官充編􅀋御筆所禮制局詳議官臣張􅀖昌檢校少傅護國軍節度使中大一宫使直宣和殿明堂兼在京神霄玉清萬壽宫提舉通領頒朔布政詳定事臣梁師成宣和殿大學士上清寶籙宫使兼神霄玉清萬壽宫副使兼侍讀明堂頒朔布政詳定官編􅀋御筆詳議臣蔡攸崇觀政宣詔令章奏二十卷右徽宗皇帝朝詔令章奏分門而􅀋次之隆平典章三十卷右建炎至乾道之詔旨及御製之文奏對之章誥詞謚議之􅀋皆分門而叙之如孔子七十二子賛及損齋記皆在焉髙宗寶訓七十卷右嘉定六年十月史館所上本也内治聖監二十卷右彭忠肅公􅀛年爲起居舍人兼皇子嘉王府直講日所進也上自九重后妃丗子旁及宗藩戚里下至官寺胥史以􅀋紀之而外廷百司庶府不與焉公字子壽清江人自號止堂太平治迹統􅀋四十卷中興治迹統􅀋三十五卷右倣通鑑紀事本末條例統而􅀋之事撮其綱辭舉其要上自藝祖而下至於孝宗凢二百門云眉山彭百川編集雜藝術􅀋文房圖賛一卷右和靖後人林可山撰自筆硯而下皆爲之官稱圖其像於前而列其賛於後序謂唐韓愈舉頴爲中書他竟無所聞今圖賛一十八人譺以官酬之竢異日請于朝罔俾昌黎顓羙有唐采選集四卷右莫詳誰氏作􅀄彩選格起於唐李郃本朝踵之者有趙明逺尹師魯元豐官制行有宋保國皆取一時官制爲之至劉貢父獨因其法取西漢官秩陞黜次苐爲之又取本傳所以陞黜之語注其下􅈰終遂可􅀋次其語爲一傳􅀶戯中最爲雅馴此集尤詳且悉曰階官曰職名曰科目曰賞格曰服色曰俸給曰爵邑謚法之􅀋無一不備醫家􅀋御製聖濟經十卷右徽宗皇帝所製也政和八年五月十一日詔頒之天下學校九月二十四日大司成李􅀖彦等言乃者從侍臣之請令内外學校課試於聖濟經出題臣等切謂今内經道德經既巳選􅀶士訓􅀃乞更以聖濟經附二經兼講從之陸宣公經驗方二卷右唐陸宣公贄在忠州時所集而山隂陸游所跋也或問朱文公曰陸宣公既貶避謗闔門不著書祇爲古今集驗方曰此亦未見陸宣公是處豈無聖賢經傳可以玩索可以討論濟丗全生方指迷集三卷右考城王貺字子亨所著也呉丞相敏序之曰子亨當官不苟遇丗變嘗慨然再請出疆使萬里云本草單方十五卷右龍溪林能千編集列三十六門䟽二百七十三目自爲之序鍼炙資生經七卷右王執中所編也執中東嘉人嘗爲從政郎澧州教授云四時治要一卷右永嘉屠鵬字時舉所著戴文端公溪爲之跋陳氏經驗方五卷右書林陳先生集李文懿公壁爲之序神仙御序集註無量度人經二卷右眞宗皇帝御製序徽宗皇帝御書而註之㑹要云宣和六年八月四日詔賜左丞范致虚御註洞元靈寶無量度人經二部想即此本也别一本云建中靖國元年四月十三日奉聖㫖鏤版而無序無註亦不載於㑹要朱文公云此經乃杜光庭撰赤松子中誡經一卷右序云軒轅黄帝遇赤松子授中誡經希弁嘗攷國朝大詔令云元符三年九月日制云赤松眞君紀于仙籙神農之師可加號赤松凌虚眞君疑即此也然張良亦封忠佑凌虚眞人云玉皇本行集經三卷右嘉熙四年臨安府承天靈應觀所刻蜀本也程公許序述爲詳九天生神章經三卷右緜州冲虚觀道士王希巢隱賢解玉􅈰散吏程公許爲之序西蜀譙巖趙日休跋朱文公嘗謂此經亦杜光庭所撰西山十二眞君傳一卷右晉許遜呉猛陳勲周廣曽亨時荷廿戰施岑彭抗盱烈鍾離嘉黄仁覽皆得道於西山者政和玉􅁽誥詞在其中皇宋拾遺仙傳一卷右陳希夷張虚静朱觀妙徐神公王侍宸劉静一趙道翁皇甫清虚之事蹟也其中所載御製及誥詞與夫詩記之􅀋爲多太上感應篇八卷右漢嘉夾江隱者李昌齡所編也希弁生父師冋嘗爲之序四明史彌忞跋其後曰趙公所序禍福善惡之報爲尤詳可謂愛人以德者余嘗守􅀽喜􅀽人之樂於趍善因閲是序矍然起敬而程公許湯中繼書之竹宫表制一卷右楊至質字休文太乙宫代言之文也自號勿齋聖上嘗書二字以賜之休文謝表云先儒德秀嘗貽金石之文督府了翁復賁蟲魚之􅂐希弁云不若用臣眞德秀臣魏了翁休文以爲然釋書􅀋御註四十二章經一卷右御注未詳歳月希弁嘗聞朱文公云釋氏只四十二章經是他古書其餘皆中國文士潤色成之維摩經亦是南北時人作御註大圓覺了義經二卷右孝宗皇帝賜徑山興聖萬壽禪寺僧寶印者也前刻唐裴休序大方廣佛華嚴經八十卷普賢行願品一卷右于闐國三藏沙門實义難詑譯序云天􅁽金輪聖神皇帝製者唐武后也希弁嘗攷晉義熙中六十卷唐聖暦中八十卷普賢行願品乃正元十二年南天竺烏荼國王手書以進通爲八十一卷厥後李長者製爲合論四十卷提舉坑冶鑄錢朝奉張大夫乃以經論合爲一書云李忠定公綱曰廣􅀶妙圎極諸經之閫奥莫如大方廣佛華嚴經精微條暢爲華嚴之指南莫如李長者所製合論妙法蓮華經七卷右姚秦三藏法師鳩摩羅什譯經本十卷後三卷朝廷所禁云楞嚴經解十卷右王荆公安石所解也圎覺經皆證論二卷右臨川謝逸序謂王荆公嘗問眞净文禪師曰一切衆生皆證圎覺而圭峯禪師易證爲具謂譯者之訛其義是否眞净曰圭峯之􅀃非是眞净法子德洪述其師之􅀃而爲之論净土文一卷右王日休所編歴陽張孝祥爲之序日休字虚中龍舒人嘗爲國學進士般若精義四卷右金剛般若波羅􅁡經解義也寂感禪師法語五卷右寂感禪師印肅語也程公許爲之序淳熙中謝艮齋諤所作塔銘附無庵法語一卷右孟少保琰與公安僧法東往復之語也陳􅠐趙希杼爲之序昭德先生讀書志卷第五上
