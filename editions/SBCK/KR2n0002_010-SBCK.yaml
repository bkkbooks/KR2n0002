body:
  text: 門人姚應績編第一卷經類揔論易類書類第二卷詩類禮類樂類第三卷春秋類孝經類第四卷論語類經解􅀋小學􅀋第五卷史類揔論正史類編年􅀋第六卷實錄􅀋雜史􅀋第七卷僞史類史評類職官類第八卷儀注類刑法􅁼地里類第九卷傳記􅀋譜諜類書目􅀋第十卷子􅀋揔論儒家􅀋第十一卷道家􅀋法家􅀋名家􅀋墨家􅀋緃横家􅀋第十二卷雜家􅀋農家􅀋第十三卷小說􅀋天文􅀋星暦􅀋第十四卷五行􅀋兵家􅀋􅀋書􅀋第十五卷藝術􅀋醫書􅀋第十六卷神仙􅀋釋書􅀋第十七卷集􅀋揔論楚辭􅀋別集􅀋上第十八卷別集􅀋中第十九卷別集􅀋下第二十卷揔集􅀋文說􅀋衢本昭德先生郡齋讀書志目錄
