body:
  text: 昭德先生讀書後志序昭德先生校井氏書為讀書志四卷番陽黎侯傳本于蜀刋之宜春郡齋且取希弁家所藏書删其重􅃨摭所未有益為五卷别以讀書附志三衢游史君蜀人也亦以蜀本鋟諸梓乃衍而為二十卷書加多焉蓋先生門人姚君應績所編也按先生自序余家自文元公來以翰墨顯者七世故家多書然自中原無事時已有火厄及兵戈之後尺素不存而杜君鵬舉所序扣之古松流水之間亦止於四卷則方其得南陽藏書時固未多也其殆三榮校讀之後網羅其家散失裒彚漸夥或者先生續筆邪抑門人推廣其遺志也今考姚君所編杜序獨缺而不著而著先生自序有所謂合吾家舊藏得若干卷疑與尺素不存之語自相抵牾希弁摘取其所増入者凡四百三十五部揔八千二百四十五卷徃徃皆晁氏之書請于郡而併刋焉然四卷既傳矣不敢以附志次其先自爲讀書後志二卷然後井晁二氏藏書之富其目大備希弁家三世所藏因以託不朽云郡侯命序梗㮣于卷首至若二本所載井氏四卷之書其間有實同而名異此備而彼遺與夫分種入類之各不同又爲考異于編末淳祐庚戌日南至江西漕貢進士祕書省校勘書籍趙希弁謹序衢本昭德先生郡齋讀書志自序杜鄴從張京兆之子學問王粲爲蔡中郎所竒皆盡得其家書故鄴以多聞稱而粲以慱物顯下逮國朝宋宣獻公亦得畢文簡楊文荘家書故所藏之冨與祕閣等而常山公以贍慱聞于時夫世之書多矣顧非一人之力所能聚設令篤好而能聚之亦老將至而耄且及豈暇讀哉然則二三子所以能慱聞者蓋自少時巳得先達所藏故也公武家自文元公來以翰墨爲業者七世故家多書至於是正之功世無與讓焉然自中原無事時巳有火厄及兵戈之後尺素不存也公武仕宦連蹇乆益窮空雖心志未衰而無書可讀每恨之南陽公天資好書自知興元府至領四川轉運使常以俸之半傳錄時巴蜀獨不被兵人間多有異本聞之未嘗不力求必得而後巳歴二十餘年所有甚冨旣罷載以舟即廬山之下居焉宿與公武厚一日貽書曰某老且死有平生所藏書甚祕惜之顧子孫稚弱不自樹立若其心愛名則爲貴者所奪若其心好利則爲冨者所售恐不能保也今舉以付子他日其間有好學者而後歸焉不然則子自取之公武惕然從其命書凢五十篋合吾家舊藏除其􅃨重得二萬四千五百卷有竒今三榮僻左少事日夕躬以朱黄讎校舛誤每終篇輙撮其大指論之豈敢効二三子之慱聞所期者不墜家聲而巳書則固自若也儻遇其子孫之賢者當如約紹興二十一年元日昭徳晁公武序
