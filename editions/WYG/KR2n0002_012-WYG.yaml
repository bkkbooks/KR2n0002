body:
  text: 子類伊川孟子解十四卷右皇朝程頥正叔撰頥居洛陽其門人號之為伊川先生云百家孟子解十二卷右集古今諸儒自裴日休至强至賈同百餘家解孟子成一編王安石解孟子十四卷王雱解孟子十四卷許允成解孟子十四卷右皇朝王安石介甫素喜孟子自為之解其子雱與其門人許允成皆有注釋崇觀間場屋舉子宗之㸃注孟子十四卷右皇朝熙寧中蜀州張簡㸃節經注附以釋文以敎童子董子一卷右周董無心撰皇朝呉秘注無心在戰國時著書闢墨子説𤣥一卷右唐王涯廣津撰涯始以貞元丙子終於元和己丑二十六年間注太𤣥為六卷今不之見獨此書行于世凡五篇一明宗二立例三揲法四占法五辨首宋惟幹太𤣥解十卷右皇朝宋惟幹注惟幹嘗得太𤣥古本于昭應咸平中知滑臺取宋衷陸績范望三家訓解别為之注仍作太𤣥宗㫖兩篇附于後其學葢師濟東田告司馬溫公所謂小宋者也陳漸演𤣥十卷右皇朝陳漸撰漸堯佐族子也國史有傳凡十四篇漸謂史以揚雄非聖人而作經猶呉楚僭王今按法言解嘲止云太𤣥然則經非其自稱弟子侯芭之徒尊之耳太𤣥淵㫖一卷右皇朝張揆撰溫公集注太𤣥經十卷右皇朝司馬光君實集漢宋衷解詁呉陸績釋文晉范望解贊唐王涯注經及首測宋惟幹通注陳漸演𤣥呉秘音義七家為此書自慶厯至元豐凡三十年始成其直云宋者衷也小宋者惟幹也惟幹漸秘皆國朝人溫公集注法言十三卷右皇朝司馬光君實集晉李軌唐柳宗元國朝宋咸呉秘注光自言少好此書歴年已多今輒采諸家所長附以己意名曰集注凡觀書者當先正其文辨其音然後可以求其義故宋相公庠家有李祠部注本及音義最為精詳宋呉亦據李本而其文多異同今叅以漢書取其通者以為定本先審其音乃解其義云元經十卷右隋王通撰唐薛收傳皇朝阮逸學起晉惠帝太熙元年終于陳亡予從兄子逸仕安康嘗得其本歸而示四父四父讀至帝問哇鳴哂其陋曰六籍奴婢之言不為過按崇文無其目疑逸依託為之帝範一卷右唐太宗撰凡十二篇今存者六篇貞觀末著此書以賜高宗且曰修身治國備在其中一旦不諱更無所言矣其末頗以汰侈自咎以戒高宗俾勿效已殊不知閨門之内慙徳甚多豈特太侈而已哉武后之立實有自來不能身敎多言奚益悲夫臣範二卷右唐則天皇后武氏撰範或作軌武氏稱制時嘗詔天下學者習之尋廢本十篇今闕其下五篇法語二十卷右南唐劉鶚撰鶚甲戌嵗擢南唐進士第實開寶七年也著書凡八十一篇言治國立身之道徐鉉為之序老子畧論一卷右魏王弼撰凡十有八章景迂云弼有得於老子而無得於易注易資於老子而老子論無資於易則其淺深之效可見矣溫公道徳論述要兩卷右皇朝司馬光撰光意謂道徳連體不可偏舉故廢道經徳經之名而曰道徳論墓誌載其目無名天地之始有名萬物之母常無欲以觀其妙常有欲以觀其徼皆於無與有下斷句不與先儒同吕氏老子注二卷右皇朝吕大臨撰其意以老氏之學合有無謂之𤣥以為道之所由出葢至于命矣其言道體非獨智之見孰能臻此求之終篇膠于聖人者葢寡但不當以聖知仁義為可絶棄耳黙希子注文子十二卷右黙希子者唐徐靈府自號也靈府謂文子周平王時人朱𤣥注文子十二卷右唐朱𤣥注闕符言一篇或取黙希注補焉文如海莊子疏十卷右唐文如海撰如海明皇時道士也以郭象注放乎自然而絕學習失莊生之㫖因再為之解凡九萬餘言吕吉甫注莊子十卷右皇朝吕惠卿撰吉甫惠卿字也元豐七年先表進内篇餘續成之王元澤注莊子十卷右皇朝王雱撰元澤其字也東坡廣成子解一卷右皇朝蘇軾撰軾取莊子中黄帝問道於廣成子一章為之解景迂嘗難之其序畧曰某晚玷先生薦賢中安敢與先生異論然先生許我不苟同翰墨具在天機子一卷右不著撰人凡二十五篇或曰一名隂符二十四機諸葛亮撰予觀其詞㫖殆李筌所為爾託之孔明也載道藏中無能子三卷右不著撰人唐光啟三年天子在褒寓三輔景氏舍成書三十篇述老莊自然之㫖總目録之於道家四子治國樞四卷右唐范乾九集四子謂莊子文子列子亢倉子其意以為黄老之道内足以修身外足以治國周王得文子之言趙王納莊周之論皆能興邦致治故採其書有益治道者分為二十門風俗通義十卷右漢應劭撰劭字仲遠奉之子篤學博覽多聞靈帝時舉孝亷仕至泰山太守撰風俗通以辨物名號釋時俗嫌疑文雖不典世服其洽聞意林三卷右唐馬總㑹元撰初梁頴川庾仲容取諸家書術數雜説凡一百七家抄其要語為三十卷總以其繁畧失中增損成三軸前有戴叔倫楊伯存兩序格言五卷右偽唐韓熙載叔言撰熙載以經濟自任乃著書二十六篇論古今王霸之道以干李煜首言陽九百六之數及五運迭興事其􅭸雜如此有門生舒雅序兩同書兩卷右唐羅隱撰隱謂老子養生孔子訓世因本之著内外篇各五其曰兩同書者取兩者同出而異名之言也物類相感志十卷右皇朝僧贊寧撰采經籍傳記物類相感者志之分天地人物四門贊寧呉人以博物稱于世柳如京徐騎省與之遊或就質疑事楊文公歐陽文忠公亦皆知其名王氏雜說十卷右皇朝王安石介甫撰蔡京為安石傳其畧曰自先王澤竭國異家殊由漢迄唐源流浸深宋興文物盛矣然不知道徳性命之理安石奮乎百世之下追堯舜三代通乎晝夜隂陽所不能測而入於神初著雜説數萬言世謂其言與孟軻相上下於是天下之士始原道徳之意窺性命之端云所謂雜説即此書也以京之誇至如此且不知所謂通乎晝夜隂陽所不能測而入於神者為何等語故著之保生月録一卷右唐韋行規撰分十二月雜纂每月攝養種藝祈禳之術也李翺為之序輦下嵗時記一卷右唐李綽撰綽經黄巢之亂避地蠻隅偶記秦地盛事傳諸晚學云國朝時令十二卷右皇朝賈昌朝撰景祐初復禮記舊文其唐月令别行三年詔昌朝與丁度李淑采國朝律厯典禮百度昏曉中星祠祀配侑嵗時施行約唐月令定為時令一卷以備宣讀後昌朝注為十二卷奏上頒行顧渚山記二卷右唐陸羽撰羽與皎然朱放輩論茶以顧渚為第一顧渚山在湖州呉王夫差顧望欲以為都故以名山吕惠卿建安茶記右皇朝吕惠卿撰聖宋茶論一卷右徽宗御製茶雜文一卷右集古今詩文及茶者竹譜一卷右戴凱之撰凱之字慶預武昌人裒輯竹事四字一讀有韻類賦頌李邯鄲云未詳何代人筍譜三卷右皇朝僧惠崇撰小説類殷芸小説十卷右宋殷芸撰述秦漢以來雜事予家本題曰劉餗李淑以為非𤣥怪録十卷右唐牛僧孺撰僧孺為宰相有聞於世而著此等書周秦行紀之謗葢有以致之也周秦行紀一卷右唐牛僧孺自敘所遇異事賈黄中以為韋瓘所撰瓘李徳裕門人以此誣僧孺鹿革事類三十卷鹿革文類三十卷右節太平廣記事實成一編曰事類詩文成一編曰文類蔡蕃晉如所撰晉如博學通音律能屬文與十父相友善鑒戒録十卷右後蜀何光遠撰字輝夫東海人唐證中纂輯唐以來君臣事迹可為世鑒者前有劉曦度序李獻臣云不知何時人考之不詳也歸田録六卷右皇朝李畋撰畋蜀人張詠客也與范鎮友善熙寧中致仕歸與門人賔客燕談衮衮忘倦門人請編録之遂以該聞為目又有雜詩十二篇係于後開譚録兩卷右皇朝蘇耆撰舜卿之父也記五代以來雜事下帙多載馮道行義古今前定録二卷右皇朝尹國均輯經史子集古今之人興衰窮達貴賤貧富死生壽夭與夫一動靜一語黙一飲一啄定于前而形于夢兆于卜見于相貌應于䜟記者凡一門以為不知命而躁競者之戒至若裴度以隂徳而致貴孫亮以隂譴而減齡之類又别為二門使君子不以天廢人云傅公嘉話一卷右皇朝傅堯俞之子孫記堯俞之言行凡四十餘章獻簡堯俞諡也曾公南遊記一卷右曾公未詳何人當是公亮之孫也共十二章記國朝雜事搢紳脞説二十卷右皇朝張唐英君房撰君房博學通釋老善著書如名臣傳蜀檮杌雲笈七籖行于世者毋慮數百卷此書亦詳實青箱雜記右唐朝何處厚撰處厚發蔡確車葢亭詩所記多失實成都置交子務起於冦瑊處厚乃以為張詠他多類此緗素雜記十卷右皇朝黄朝英撰所記二百事朝英建州人紹聖後舉子也為王安石之學者以贈之以芍藥為男淫女貽我握椒為女淫男前輩嘗以是為嗤朝英獨愛重之他可知也褒善録一卷右皇朝王蕃撰嘉祐中巴縣簿黄靖國死而復蘇道其冥中所見廖生嘗傳之蕃删取其要為此書麗情集二十卷右皇朝張君房唐英編古今情感事天文厯算類景祐乾象新書三卷右崇文目有三十卷置之天文類厯法一卷右未詳撰人厯草也刻漏圖一卷右皇朝燕肅撰肅有巧思上蓮花漏法嘗知潼川有石刻存焉洛陽宋君者増損肅之法為此圖五行類廣古今五行志三十卷右竇鋈撰唐志有其目未詳何人纂五行變異敘其徵應葢為洪範之學者自古術數之學多矣言五行則本洪範言卜筮則本周易近時兩者之學殆絕而最盛于世者葬書相術五星禄命六壬遁甲星禽而已然六壬之類足以推一時之吉凶星禽五星禄命相術之類足以推一身之吉凶葬書之類足以推一家之吉凶遁甲之類足以推一國之吉凶其所知若有遠近之異而或中或否不可盡信則一也且其説皆本於五行故同次之為一類青囊補注三卷右晉郭璞撰世傳葬書之學皆云無出郭璞之右者今盛行多璞書也按璞傳載葬母事世傳葢不誣矣璞未幾為王敦所殺若謂禍福皆係於葬則璞不應擇凶地以取禍若謂禍福有定數或它有以致之則葬地不必擇矣嗚呼璞自用其術尚如此况後遵其遺書者乎撥沙經一卷右唐吕才撰地理書畫山水之形成圖葢依託者㑹元經二十四卷右孫季邕撰未詳何代人集諸家相地書芟其鄙陋無驗者成是書五音地理新書三十卷右唐僧一行撰以人姓五音驗八山三十八將吉凶之方其學今世不行秤星經三卷右不著撰人以日月五星羅㬋計都紫炁月孛十一曜演十二宫宿度以推人貴賤壽夭休咎不知其術之所起或云天竺梵學也按洪範曰嵗月日時無易百穀用成乂用明俊民用章家用平康月之從星則以風雨冷州鳩曰武王伐殷嵗在鶉火月在天駟一曰在析木之津辰在斗柄星在天黿以此言之五星之術其來尚矣葢可以占國則可以占事可以占事則可以占人也然術家用日月五星以占吉凶又加以交初交中之神紫炁月孛之宿初中者交食之㑹亦可以意求惟氣孛無稽而術家獨以為效且曰土木之餘氣五星之行土木最遲而為吉凶者久故有餘氣云周易十二論一卷右未詳撰人論日月五星直年以占吉凶珞琭子疏五卷右皇朝李全東方明撰河圖天地二運賦一卷右不著撰人論天地二運葢三命書也崇文目以為卜筮類常陽經一卷右崇文目題曰黄帝式用葢六壬占卜術也六壬要訣一卷右未詳何人撰隋志載六壬之書兩種金鑾密記及五代史記頗言其驗今世龜筮道息而此術獨行六壬課鈐一卷右未詳何人所纂以六十甲子加十二時成七百二十課三傳入神以占吉凶玉關歌一卷右不題撰人六壬課訣也三十二家相書三卷右或集許負以下三十二家書成此編月波洞中記一卷右序稱唐任逍遥得之於太白山月波洞石壁上凡九篇相形術也崇文目置之五行類靈龜經一卷右史蘇撰論龜兆之吉凶崇文目三卷遁甲萬一訣一卷右題云唐李靖所纂黄帝書按遁甲之書見於隋志凡一十三家則其學之來亦不在近世矣以休生傷杜景死驚開八門推國家之吉凶通其學者以為有驗未之嘗試也遁甲經一卷右唐胡乾撰李氏書目亦云九天𤣥女術推九星八門三奇六儀之法鮮鶚經十卷右未詳撰人凡十門六十二章以星禽推知人之吉凶言其性情嗜好為尤驗説者謂本神仙之訣也故此書載于道藏李邯鄲云羅浮山逍遥子撰八神筮法二卷右以八卦世分六十四卦每卦首必云子夏曰論易筮之吉凶靈棊經二卷右漢東方朔撰又云張良劉安未知孰是晉顏幼明宋何承天注有唐李遠敘歸來子以為黄石公書豈謂以授良者邪按南史載客從南來遺我良財寶貨珠璣金碗玉盃之繇則古之遺書也明矣凡一百二十卦皆有繇辭紫堂訣三卷右紫堂先生撰未詳何代人著紫垣十二星至隱曜總三百六十位分二十八舍附之以五星配十二辰以推人命之吉凶兵類郭元振安邊策三卷右唐郭元振撰以總兵進攻聚衆退守不可無權謀乃著此書故舊題曰定遠安邊策武經聖畧十二卷右皇朝王洙撰寶元中西邊用兵朝廷講武備是時洙奉詔編祖宗任將用兵邊防事迹分十二門武經總要四十卷右皇朝曾公亮丁度撰康定中朝廷恐羣帥昧古今之學命公亮等采古兵法及本朝計謀方畧凡五年奏御制度五卷邊防五卷故事十五卷占候五卷御為製序兵要望江南一卷右題云黄石公以授張良者按其書雜占行軍吉凶寓聲于望江南詞取其易記憶總目云武安軍左押衙易靜撰葢唐人也倚馬立成法二卷右唐李淳風撰兵行占候之書也淳風太宗時人而此書起九宫法至貞元六年庚午假托以行其書爾非淳風本㫖也類書類古人姓氏相同録一卷右唐丘光庭撰光庭中進士第北堂書抄一百七十三卷右唐虞世南撰世南仕隋為秘書郎時鈔經史百家之事以備用分八十部八百一類北堂者省之後堂世南鈔書之所也家一百二十卷集類一百卷右唐劉綺莊撰綺莊毗陵人嘗為蘇州崑山縣令家多異書採摭事類分二十餘門凡五十餘萬言上之于朝前有萬希序題云開元二十九年辛巳按綺莊集有上白敏中啟疑非𤣥宗時人當攷三敎珠英三卷右唐張昌宗等撰按唐志一千三百卷今所存者止此備舉文言二十卷右唐陸贄撰總四百五十餘門議者謂大類六帖而文辭過焉崇文總目中有之小名録三卷右唐陸龜䝉撰龜䝉以末世有官名小名之别自秦至隋編而紀之至於神仙玉女之名婦人臧獲之字亦無棄焉龜蒙世稱其博然此書特雜取於史傳間爾無異聞也備忘小抄十卷右偽蜀文谷撰雜抄子史一千餘事以備遺忘其後題廣政三年廣政王衍號也唐㑹要一百卷右皇朝王溥撰初唐蘇冕敘高祖至徳宗九朝㳂革損益之制大中七年詔崔鉉等撰次徳宗以來事至宣宗大中六年以續冕書溥又采宣宗以後事共成百卷建隆二年正月奏御詞簡禮備太祖覽而嘉之詔藏於史閣賜物有差册府元龜一千卷右皇朝景徳二年詔王欽若楊億修君臣事迹唯取六經子史不録小説雜書至祥符六年書成上之凡三十一部有總序千一百四門有小序同修者十五人錢惟演杜鎬刁衎李維戚綸王希哲陳彭年姜輿宋貽陳越陳從易劉筠查道王曙夏竦初撰篇序諸儒皆作帝以體製不一遂擇李維錢惟演陳彭年劉筠夏竦等付楊億竄定賜今名為序冠其首其音釋又命孫奭為之類要六十五卷右皇朝晏殊纂分門輯經史子集事實以備修文之用禁殺録一卷右皇朝李象先纂元祐中象先集錄古今冥報事以為殺戒貨泉録一卷右皇朝陶岳撰記五代諸侯擅改錢幣之由幽州嶺南福建湖南江南五國墨譜一卷右皇朝董秉撰熙寧間人秉患世人徒知祖李之名而不知形模之異同製作之精觕故作圖以著其源流用補蘇易簡之闕文云印格一卷右皇朝晁克一撰克一張文潛甥也文潛嘗為之序其畧曰克一既好古印章其父補之愛之尤篤悉録古今印璽之法謂之圖書譜自秦以來變制異狀皆能言其故余頗愛其用心不移致精于末務使有傳焉䝉求三卷右唐李瀚撰纂經傳善惡事實類者兩兩相比為韻語取䝉卦童䝉求我之義名其書葢以敎學童云魯史分門屬類賦三卷右皇朝楊筠撰以左氏事類分十門各為律賦一篇乾徳四年奏御詔褒之仙苑編珠二卷右唐王松年撰取阮倉劉向葛洪所傳神仙又取經記中梁以後神仙百二十八人比事屬辭效蒙求本體為是書國史對韻十二卷右皇朝范鎮撰呉仲庶嘗稱景仁憫諸後學雖渉書傳而問之今代典故則懵然不知乃自太祖開基迄于仁宗朝摭取事實可為規矩鑒戒者用韻編次之即此書也孝悌類鑒七卷右皇朝俞觀能撰取經史孝悌事成四言韻語兩漢䝉求五卷唐史屬辭五卷南北史䝉求十卷右未詳撰人皆效李瀚也雜藝術類名畫見聞志六卷右皇朝郭若虛撰若虛以張愛賔之畫絕筆永昌元年因續之歴五代止國朝熙寧七年分敘論紀藝故事近事四門溫公投壺新格一卷右皇朝司馬光君實撰舊有投壺格君實惡其多取奇中者以為僥倖因盡改之九章算法九卷右未詳撰人者姓名或曰周公九章者一方田二算粟三衰分四少廣五商功六均輸七盈不足八方程九句股魏劉徽唐李淳風嘗為之注則此術起于漢之前矣求一算經一卷右未詳撰人溫公七國象碁一卷右皇朝司馬光君實撰周秦韓魏趙楚齊燕實八國而云七者周室不與焉葉子戲格一卷右不著撰人世傳葉子婦人也撰此戲晚唐之時也相鹤經一卷右題曰浮丘公撰其傳云浮丘公授于王子晉後崔文子學道于子晉得其文藏于嵩山之石室淮南公採藥得之乃傳于世相馬經二卷右伯樂撰相馬經一卷右未詳撰人述相馬法式并著馬之疾狀及治療之術李氏書目有之皇帝醫相馬經三卷右唐穆蠡集伯樂王良等六家書成此編皇帝斤神農也育駿方三卷右未詳撰人相馬術及醫治畜牧之方相牛經一卷右序曰寗戚傳之百里奚漢世河西薛公得其書以相牛千百不失其一至魏世高堂生又傳晉宣帝其後秘之細字薛公注也醫家類靈樞經九卷右王砯謂此書即漢志皇帝内經十八卷之九也或謂好事者于皇甫謐所集内經倉公論中抄出之名為古書也未知孰是丁徳用注難經五卷右皇朝丁徳用注以楊𤣥操所演甚失大義因改王之經文隱奥者繪為圖徳用濟陽人嘉祐末其書始成虞庶注難經五卷右皇朝虞庶注庶仁壽人寓居漢嘉少為儒已而棄其業習醫術為此書以補吕楊所未盡黎泰辰治平間為之序金匱玉函經八卷右漢張仲景撰晉王叔和集設答問雜病形證脈理叅以療治之方仁宗朝王洙得于館中用之甚効合二百六十二方仲景傷寒論十卷右漢張仲景述晉王叔和撰次按名醫録云仲景南陽人名機仲景其字也舉孝亷官至長沙太守以宗族二百餘口建安紀年以來未及十稔死者三之二而傷寒居其七乃著論二十二篇證外合三百九十七法一百一十二方善醫者或云仲景著傷寒論誠不刋之典然有大人之病而無嬰孺之患有北方之藥而無南方之治此其所闕者葢陳蔡以南不可用柴胡白虎二湯治傷寒其言極有理脈經三卷右題云黄帝撰論診脈之要凡二十一篇脈訣一卷右題曰王叔和皆歌訣鄙淺之言後人依託者然最行于世雷公炮炙三卷右宋雷斆撰胡洽重定述百藥性味炮熬煮炙之方其論多本之于乾寧晏先生斆稱内究守國安正公當是官名未詳金寶鑑三卷右魏嵩撰嵩仕至翰林博士崇文總目云不詳何代人述脈候徵驗要妙之理通真子傷寒訣一卷右題曰通真子而不著名氏用張長沙傷寒論為歌詩以便覽者脈訣之類也傷寒百問三卷右題曰無求子大觀初所著書運氣論奥三卷右皇朝劉溫舒撰溫舒以素問氣運最為治病之要而答問紛揉文辭古奥讀者難知因為三十論七十二圖上于朝脈粹一卷右皇朝蕭世基撰世基嘗閲素問及歴代醫經患其難知因綴緝成一編治平中姚誼序之存真圖一卷右皇朝楊介編崇寧間泗州刑賊於市郡守李夷行遣醫并畫工往親決膜摘膏肓曲折圖之盡得纎悉介校以古書無少異者比歐希範五藏圖過之遠矣實有益醫家也王莽時捕得翟義黨王孫慶使太醫尚方與巧屠共刳剝之量度五藏以竹筳導其脈知所終始云可以治病亦是此意證類本草三十二卷右皇朝唐慎微纂合兩本草為一書且集書傳所記單方附之于本條之下殊為詳博子午經一卷右題云扁鵲撰論鍼砭之要成歌詠葢後人依託者明堂針灸圖三卷右題曰黄帝論人身俞穴及灼灸禁忌㸃烙三十六黄經一卷右不著撰人唐世書也國史補云自茗飲行于世世人不復病黄癉千金方三十卷右唐孫思邈撰思邈博通經傳洞明醫術著用藥之方診脈之訣針灸之穴禁架之法以至導引養生之要無不周悉後世或能窺其一二未有不為名醫者然議者頗恨其獨不知傷寒之數云千金翼方三十卷右唐孫思􅊬撰思邈著千金方復掇集遺軼以羽翼其書成一家之學林億等謂首之以藥録次之以婦人傷寒小兒養性辟穀退居補益雜病瘡癰色脈針灸而禁經終焉者皆有指意云龍樹眼論三卷右佛經龍樹大士者能治眼疾或假其説集治七十二種目病之方寶藏暢微論三卷右五代軒轅述撰青霞君作寶藏論三篇著變煉金石之訣既詳其未善因刋其謬誤增其缺漏以成是言故曰暢微時年九十實乾亨二年也太平聖惠方一百卷右太宗皇帝在潛邸日多蓄名方異術太平興國中内出親驗者千餘首乃詔醫局各上家傳方書命王懷隱王祐鄭彥陳昭遇校正編類各於篇首著其疾證淳化初書成御製序引和劑局方十卷右大觀中詔通醫刋正藥局方書閲嵗書成校正七百八字增損七十餘方養生必用方十六卷右皇朝初虞世撰序謂古人醫經行於世者多矣所以别著者古方分劑為今銖兩不侔用者頗難此方其證易詳其法易用苟尋文為治雖不習之人亦可無求於醫也虞世本朝士一旦削髪為僧在襄陽與十父遊從甚密嬰童寶鏡十卷右題曰栖真子不著姓名録世行應驗方成此書小兒靈秘方十三卷右不題撰人辨小兒疾證及治療之方多為歌訣傷寒證治三方右皇朝王實編實謂百病之急無踰傷寒故畧舉病名法及世名醫之言為十三篇總方百四十六首或云頴川人官至外郎龎安常之高弟也小兒玉訣一卷右未詳撰人名氏為韻語以記小兒疾證治法凡二十三孫尚秘寶十卷右皇朝孫尚撰吕惠卿帥邊日尚之子在屬部因取此書刻板傳于世楊子䕶命方五卷通神論十四卷右皇朝楊退修撰退修以岐伯論五運六氣以治疾病後世通之者唯王砯一人而已然猶於遷變行度莫知其始終次序故著此方論云道書類大洞真經一卷右題云高上虛皇君等道書三十七章晉永和中上清紫微元君降授于王夫人是上清高法道藏書六部一曰大洞真部二曰靈寶洞元部三曰太上洞神部四曰太真部五曰太清部六曰正一部邯鄲李氏道書志四類一曰經誥類二曰傳録類三曰丹藥類四曰符篆類皆以此書為之首然唐志不載故以此度人經云西昇經四卷右題曰太上真人尹君紀録老子將遊西域既為關令尹喜説五千言又留秘㫖凡三十六章喜述之為此經其首稱老君西昇聞道竺乾有古先生是以就道說者以古先生佛也事見廣洪明集辯惑論韋注西昇經二卷右梁道士韋處𤣥分上下經上經三七法天之陽數分二十一章下經四七法地之隂數總四十九章象大衍用數云唐志稱處𤣥集解以聞道竺乾為經道竺乾以古先生為老子自謂洞𤣥注西昇經四卷右唐洞𤣥子注其姓名未詳唐志有戴詵注西昇經疑此或詵書也分三十六章謂竺乾古先生非釋氏之號云徐注西昇經二卷右徐道邈撰句曲人未詳何代其本以有古先生善入無為作善入泥丸古先生者吾之師也化乎竺乾作吾之身也化胡竺乾云歩虛經一卷右太極真人傳左仙公其章皆高仙上聖朝𤣥都玉京飛巡虚空之所諷詠故曰歩虚定觀經一卷右題云天尊授左𤣥真人述定心惠觀等修故以為名云老子化胡經十卷右魏明帝為之序經言老子歸崑崙化胡次授􅄢賔後及天竺按裴松之三國志注言世稱老子西入流沙化胡成佛其説葢起于此議化胡經八狀附于後唐志云萬嵗通天元年僧惠澄上言乞毁老子化胡經秋官侍郎劉如璿等議狀證其非偽此是也太清經一卷右太清䕶命靈文金闕上真按付修道之士可以除邪治病云登真隱訣二十五卷右梁陶𢎞景撰景以為學其訣者當由階而登真文多隱非訣莫登故以名書凡七篇十七條隋志云雲笈七籖一百二十卷右皇朝張君房等纂君房祥符中謫官寧海時聖祖降朝廷盡以秘閣道書付杭州俾戚綸陳堯臣校正綸等同王欽若薦君房專其事君房詮次得四千五百六十五卷於是掇其蘊奥總萬餘條成是書仁宗時上之張隨注參同契三卷右皇朝張隨皇祐中居青城山注魏伯陽之書列十數圖于其後參同契太易圖一卷右不題撰人論周天火候有太易太初太始太素太極四象五行等二十四篇并圖按崇文總目云張處撰而李獻臣以為天老神君撰雲常子張處序亦名至藥丹訣未知孰是混元内外鑒二卷延壽經一卷附右混元謂老子也亦導引之術内篇八外篇三玉皇聖胎神用訣一卷右玉皇訣云野人郎肇注太上説魂魄經二卷右題曰老子撰載三魂七魄名字形狀好惡以咒術存制之崇文題曰太上靈書李氏亦有其目無上秘要九十五卷右題曰元始天尊說藝文志止七十二卷不知何時析出二十三通也葛仙翁胎息術一卷右仙翁葛洪也太清服氣口訣一卷太起經一卷閉氣法一卷太上指南歌一卷右四書皆題曰老子撰服氣訣也食氣經一卷右太皇子撰未詳李邯鄲云似雜集之書道引養生圖一卷右梁陶𢎞景撰分三十六勢如鴻鶴徘徊鴛鸞戢羽之類各繪像于其上田偉家本少八勢天真皇人九仙經一卷右天真皇人為黄帝説一行羅公遠葉法靜注論水火龍虎造金丹之術崇文書也按九仙經興廢記云此經黄帝留峩眉山石壁漢武帝時得之大中嘗禁絕隂府内丹經一卷右題曰老子説日月𤣥樞論一卷右唐劉知古撰明皇朝為綿州昌明令時詔求通丹藥之士知古謂神仙大藥無出參同契因著論上于朝大還丹契秘圖一卷右草衣洞真子𤣥撰凡三十章大還丹者乃日月精氣之所致也論火候則以朔望為據記藥物則以鉛汞為名云釋書類華嚴經合論一百二十卷右按纂靈記云華嚴大經龍宫有三本佛滅度後六百年有龍樹菩薩入龍宫誦下本十萬偈四十八品流傳天竺晉有沙門支法領得下本分三萬六千偈至此土義熙十四年譯成六十卷唐證聖元年于闐沙門喜學再譯舊文兼補諸闕通舊總四萬五千頌成八十卷三十九品合論者唐李通𤣥所撰通𤣥太原人宗室子也當武后時隱居不仕舊學佛者皆曰佛説此經時居七處九㑹獨通𤣥以為十處十㑹云華嚴經清凉疏一百五十卷右唐僧澄觀撰澄觀居清凉山號清凉國師即韓愈贈之詩者文元公有言曰明法身之體者莫辨於楞嚴明法身之用者莫辨於華嚴學佛者以為不刋之論華嚴經畧一卷右唐僧澄觀撰澄觀既疏華嚴又撮其大意為此凡四十二章華嚴起信文一卷右唐僧善孜撰善孜潭州太平寺僧也每品一章撮其大指凡三十九章華嚴百門義海兩卷右唐僧法藏撰法藏長安崇福寺僧也分十章華嚴奥㫖一卷右唐僧法藏撰文曰妄盡還源觀凡六門法界披雲集一卷右皇朝僧道遹述杜順纂華嚴經義撰法界觀道遹又分十𤣥門華嚴吞海集一卷右皇朝僧道通述華嚴經七處九㑹三十九品五萬四千偈其文浩博澄觀為之疏尤難觀覽道通約之成萬三千言以便初學法華言句二十卷右唐僧智顗撰智顗居天台山號天台敎五代兵亂其書亡錢俶聞高麗有本厚賂因賈人求得之至今盛行於江浙禪宗金剛經解一卷右皇朝安保衡採摭禪宗自達磨而下發明是經者參釋之序稱其有言渉修證者北宗法門也舉心即佛者江西法門也無法無物本來如是者曹溪法門也建中靖國續燈録三十卷右皇朝僧惟白編惟白靖康初住法雲寺駙馬都尉張敦禮以其書上于朝徽宗為之序分正宗對機拈古頌古偈頌五門古塔主語録三卷右皇朝僧道古撰范文正喜之嘗親為疏請説法有云道行無玷孤風絕攀時以為非溢美也碧巖集十卷右皇朝僧克勤解雪竇頌古名曰碧巖集觀心論一卷右魏菩提達磨撰百法論一卷右唐僧𤣥奘譯西域僧天親所造所謂一切法者其畧有語一心法二心所有法三色法四心不相應行法五無為法心法八種心所有法五十一種色法十一種心不相應行法二十四種無為法六種故曰百法起信論一卷右唐僧宗密注僧真諦譯天竺第十二祖馬鳴大士所造也雖云名相葢明心宗指義𤣥微文辭明緻故盛行于世若肇論百法唯識及此學者皆顓門名家故藏中所收亦録于此辨正論八卷右唐釋法琳撰頴川陳良序云法琳姓陳關中人著此書窮釋老之教源極品藻之名理宣和中以其斥老子語焚毁其第二第四第五第六第八凡五卷序文亦有剪棄者破邪論二卷右唐釋法琳撰辨傅弈所排毁虞世南為之序甄正論二卷右唐釋法琳撰已上三書皆經宣和焚毁藏中多闕故録之輔敎編五卷右皇朝僧契嵩撰藤州人皇祐間以世儒多詆釋氏之道因著此書廣引經籍以證三家一致輔相其敎云幕府燕間録十卷右皇朝畢仲詢景儒撰仲詢元豐初為嵐州推官纂當代怪奇可喜之事為二十門羣書古鑑一卷右未詳何人所撰熙寧間集書史中相術驗者稗官志一卷右皇朝吕大辨撰雜記其所聞前言往行師友談記一卷右皇朝李薦方叔撰多記蘇子瞻范純夫及四學士所談論故曰師友龍川畧志六卷龍川别志四卷右皇朝蘇轍撰元符二年夏居循州杜門閉目追惟平昔使其子遠書之于紙凡四十事其秋復記四十七事龍川循州地名天文卜算類司天考占星通𤣥寳鏡一卷右題曰巫咸氏皇朝太平興國中詔天下知星者詣京師未幾至者百許人坐私習天文或誅或配𨽻海島由是星厯之學殆絕故予所藏書中亦無幾姑裒數種以備數云甘石星經一卷右漢甘公石申撰以日月五星三垣二十八宿恒星圖象次舍有占訣以候休咎合元萬分厯一卷右唐曹氏撰未知其名厯元起唐高宗顯慶五年庚申葢民間所行小厯也本天竺厯為法李獻臣云集聖厯一卷右皇朝楊可撰推神物所向擇日辰吉凶應用之法歩天歌一卷右未詳撰人二十八舍歌也三垣頌五星凌犯賦附于後或云唐王希明撰自號丹元子五行類八五經三卷右序云黄帝書八五謂八卦五行雖後人依託者而其辭亦馴雅相墓書也青囊本㫖一卷右不記撰人演郭璞相墓青囊經也洞林别訣一卷右江南范越鳯集郭璞所記諸家地里得失為此書二十四篇并司空珏尋龍入式歌附珞琭子三命賦一卷右李獻臣云珞琭者取珞珞如石琭琭如玉之義推人生吉凶否泰之法李虛中命書三卷右唐李虛中撰虛中字常容姓纂云同之八代孫學最深於五行書壽夭貴賤利不利輒先處其年時萬不失一韓愈言同為虛中十一世祖誤也五命秘訣一卷右皇朝林開撰三命之術年月日支干也加以時胎故曰五命占燈法一卷右皇朝李淳風撰崇文總目亦有之觀燈法一卷右唐李淳風撰袖中記一卷右唐朝李唐濬撰辨人形色知其壽夭吉凶集聖厯四卷右皇朝楊可集可為司天冬官正輯古今隂陽書彚為四時以涓擇日辰云兵家類六韜六卷右周吕望撰案漢藝文志無此書梁隋唐始著録分文武龍虎豹犬六目兵家權謀之書也魏武注孫子一卷右呉孫武撰魏武帝注按藝文志孫子兵法八十二篇今魏武所注止十三篇杜牧以為武書數十萬言魏武削其繁剰筆其精粹成此書云其序畧曰吾讀兵書戰策多矣武所著深矣李筌注孫子三卷右唐李筌注以魏武所解多誤約歴代史依遁甲注成三卷杜牧注孫子三卷右唐杜牧牧之注牧以武書大畧用仁義使機權曹公所注解十不釋一葢惜其所得自為新書爾因備注之世謂牧慨然最喜論兵欲試而不得者其學能道春秋戰國時事甚博而詳知兵者有取焉陳皥注孫子三卷右唐陳皥撰皥以曹公注隱微杜牧注濶疎重為之注云紀燮集注孫子三卷右唐紀燮集唐孟氏賈林杜佑三家所解梅聖俞注孫子三卷右皇朝梅堯臣聖俞注歐公為之序王晳注孫子三卷右皇朝王晳撰晳以古本校正闕誤又為之注仁廟時天下久承平人不習兵元昊既叛邊將數敗朝廷頗訪知兵者士大夫人人言兵矣故本朝注解孫武書者大抵皆當時人也何氏注孫子三卷右不題姓氏近代人也呉子三卷右魏呉起撰言兵家機權法制之說唐陸希聲類次為之説料敵治兵論將變化勵士凡六篇云司馬法三卷右齊司馬穰苴撰威王使大夫追論古者司馬兵法而附穰苴於其中因號司馬穰苴兵法司馬遷謂其書閎廓深遠雖三代征伐未能竟其義如其文近亦少褒矣穰苴為區區小國行師何暇及司馬兵法之揖讓乎黄石公三畧三卷右題曰黄石公上中下三畧其書論用兵機權之妙嚴明之决明妙審决軍可以死易生國可以存易亡經籍志云下邳神人撰世傳此即圯上老人以一編書授漢張良者尉繚子五卷右尉繚子未詳何人書主刑法兵戰按漢藝文志有二十九篇今逸五篇首篇稱梁惠王問意者魏人與張横渠注尉繚子一卷右皇朝張載撰其辭甚簡畧李衛公對問三卷右唐李靖對太宗問兵事元豐中并六韜孫呉三畧尉繚子司馬兵法類為一書頒之武學名曰七書史臣謂李靖兵法世無完書畧見於通典今對問出於阮逸家或云逸因杜氏附益之李臨淮武記一卷右唐李光弼撰其書凡一百二章末云吕望智廓而遠孫武思幽而密黄石寛而重斷呉起嚴而貴勇墨翟守而無攻老􅅨勝而不美今擇其精要雜以愚識為一家之書題曰統軍靈轄寶秘策或云光弼從事張參所纂人事軍律三卷右皇朝符彥卿撰其序稱言兵者多雜以隂陽殊不知往亡宋捷甲子胡興鵞入梟集翻成吉兆故此但述人事云或以為唐燕僧利正撰當考之庾袞保聚圖一卷右晉庾袞撰袞字叔褒西晉末保禹山張泓張昌不能犯所全活者毋慮數百萬元康三年己酉因撰保聚壘議二十篇武侯十六策一卷右蜀諸葛亮孔明撰序稱謹進便宜十六事一治國二君臣三視聴四納言五察疑六治民七舉措八考黜九治軍十賞罰十一喜怒十二治亂十三敎令十四斬斷十五思慮十六隂察陳壽録孔明書不載此策疑依託者神武秘畧十卷右皇朝仁宗御撰纂古今兵書戰策及舊史成敗之迹類權謀形勢隂陽技巧凡四門三十篇左氏要類其事類投缾内倒取之抄録成書故所記時代多無次序云記室新書三十卷右唐李途撰采摭故事綴為偶儷之句分四百門途為東川掌記因以名其書云園策十卷右唐虞世南撰奉王命纂古今事為四十八門皆偶儷之語戚苑英華十卷右唐袁悅重修本楊名所著悦掇其要類為語對以他説附益之通典二百卷右唐杜佑撰先是劉秩採經史自黄帝迄唐天寶末制度沿革廢置論議得失倣周禮六官法為政典三十五篇房琯稱才過劉向佑以為未盡因廣之參以新禮為二百篇以食貨選舉職官禮樂刑法州郡邊防八門分類序載世推該洽凡三十六年成書徳宗時上之五代㑹要三十卷右皇朝王溥等撰采梁至周典故纂次建隆初上之節國朝㑹要十二卷右皇朝章得象等天聖中被詔以國朝故事因革制度編次宋綬馮元李淑王舉正王洙同修得象監總慶厯四年書成上之凡一百五十卷范師道以其猥冗節其要以備檢閲古城塜記二卷右唐皇甫鑒撰記古城所築之人姓名初不及塜而名曰城塜記未知其説太平總領五十卷右唐朝李昉等撰太平興國中昉被詔纂經史故事分門編次六帖初學記之類也職林二十卷右皇朝楊侃纂集歴代職官沿革之故葢因通典職官門増廣而已書林韻海一百卷右不題撰人分門依韻纂經史雜事以備尋閱或云皇朝許冠所編異號録二十卷右皇朝馬永易明叟編古今殊異名號如銅馬帝無愁天子之類頃嘗見近世人増廣其書名曰賔實録亦殊該博硯譜二卷右皇朝唐詢撰記硯之故事及其優劣以紅絲石為第一端石次之古鼎記一卷右唐呉協撰記古人鑄鼎本原及其形製洽聞記三卷右不題撰人分二十門雜記經史名數或題童子洽聞記云唐許塾撰骨鯁藥二十卷右皇朝靖康初復修祖宗故事時人或集本朝諸公諫疏成此書書敘指南二十卷右皇朝任浚撰纂集古今文章碎語分門編次之凡二百餘類歌詩押韻二十四卷右皇朝楊咨撰裒集古今詩可以為矩矱者編為押韻侍女小名録一卷右皇朝王銍纂序云大觀中居汝隂與洪炎玉父遊讀陸魯望小名録戲徴古今女侍名字因盡發所藏書籍纂集餘月而成焉香譜一卷右皇朝洪芻駒父撰集古今香法有鄭康成漢宫香南史小宗香真誥嬰香戚夫人迫駕香唐員半千香所記甚該博然通典載厯代祀天用水沉香獨遺之何耶荆楚歲時記一卷右梁宗懔撰其序云傅𤣥之朝㑹杜駕之上已安仁秋興之叙君道娛蜡之術其屬辭則已洽其比事則未𢎞某率為小記以録荆楚時風物故事自元日至至除夕凡二十餘事雜藝術類古畫品録一卷右南齊謝赫撰言畫有六法分四品續畫記一卷右唐李嗣真撰補謝赫之闕後畫錄一卷右唐僧彦悰撰品長安名畫凡二十七人名畫獵精六卷右唐張彥遠纂記歴代畫工名姓自史皇以降至唐朝及論畫法并裝背禠軸之式鑒别閱玩之方書畫史二卷右皇朝米芾元章撰輯本朝公卿士庶家藏法書名畫論其優劣真偽五代名畫補遺一卷右皇朝劉道成纂符嘉應撰序云胡嶠嘗有梁朝名畫録因廣之故曰補遺聖朝名畫評三卷右皇朝劉道成纂符嘉應撰集本朝畫工之名世者第其品以王瓘之為神品云在呉生上益州名畫録三卷右皇朝黄休復纂唐乾符初至宋乾徳嵗休復在蜀中目擊圖書之精者五十八人品以四格云射評要畧一卷右題曰李廣撰凡十五篇嚴悟射訣一篇右唐王思永撰思永學射法於成都工曹嚴悟成書十篇每篇首必稱師木射圖一卷右唐陸秉撰為十五筍以代侯擊地毬以觸之筍飾以朱墨字以貴賤之朱者仁義禮智信溫良恭儉讓墨者慢傲佞貪濫仁者勝濫者負而行一賞罰焉投壺經一卷右唐上官儀奉勅刪定史𤣥道續注采周顒郝同梁簡文數家書為之唐志有其目樗蒲經一卷樗蒲格一卷右不題撰人序云樗蒲古之戲也劉毅李安民慕容寶之徒皆擲盧不聞餘采今以盧梟為上雉犢次之釣鼇圖一卷右不題撰人凡四十類各有一詩採珠局一卷右不題撰人序云王公而不知其名凡三十餘類亦各有一詩彈棊經一卷右未詳撰人序稱世説曰魏武帝好彈棊宫中皆効之難得其局以粧奩之葢形狀相類就葢而彈之俗中因謂魏宫粧奩之戲按西京雜記云劉向作彈棊典論云前代馬合卿張公子皆工彈棊然則起於漢朝非自魏始世說誤矣象棊經一卷右皇朝尹洙撰凡五圖今世所行者不與焉捉卧甕人事數一卷右皇朝李庭中撰以畢卓嵇康劉伶阮孚山簡阮籍儀狄顏回屈原陶潛孔融陶侃張翰李白白樂天為目有趙昌言序雙陸格一卷右不題撰人其法左右十二梁設二朋朋各十五子一白一墨用明瓊二各以其采由右歸左子單則他子得擊兩子以上他子雖相當不得擊故武后夢雙陸不勝狄仁傑所以云無子也益津射格一卷右皇朝錢師益序以五善圖及武陵格疎密不同參酌為之三國圖格一卷金龍戲格一卷打馬格一卷旋棊格一卷右不題撰人漢官儀彩選一卷右皇朝劉敞撰刪取西漢之官而附其列傳黜陟可戲笑者雜編之以為博弈之一物忘憂集三卷右皇朝劉仲甫編載唐韋延祐棊訣并古今棊圖六問算法五卷右皇朝龍受益撰并化零歌附應用算法三卷右皇朝蔣舜元撰醫家類黄帝素問右唐王砯注砯謂漢藝文志有黄帝内經十八卷素問即其經之九卷兼靈樞九卷迺其數焉先是第七亡逸砯時始獲乃詮次注釋凡八十一篇分二十四卷今又亡刺法本論二篇砯自號啟𤣥子黄帝八十一難經一卷右秦越人撰呉吕廣注唐楊𤣥操演越人授桑君秘術洞明醫道采黄帝内經精要之説凡八十一章編次為十三類其理趣深遠非易了故名難經補注神農本草二十卷右皇朝掌禹錫等補注舊説本草經神農所作而藝文志所不載平帝紀詔天下舉通知方術本草者本草之名葢起於此梁之録載神農本草三卷書中有後漢郡縣名葢上世未著文字師學相傳至張機華佗始為編述嘉祐初詔禹錫與林億蘇頌張洞等為之補注以開寶本草及諸家參校采拾遺逸判定新舊藥合一千八十二種總二十卷圖經本草二十卷目録一卷右皇朝蘇頌等撰先是詔掌禹錫林億等六人重校神農本草累年成書奏御又詔郡縣圖上所產藥本用永徽故事重命編述於是頌再與禹錫等裒集衆説類聚詮次各有條目云嘉祐六年上脈經十卷右晉王叔和撰纂岐伯華佗等論脈要訣巢氏病源候論五卷右隋巢元方等撰元方大業中被命與諸醫共論衆病所起之源皇朝昭陵時詔校本刻牘頒行宋綬為序外臺秘要方四十卷右唐王燾撰燾之序云嘗得古方書數千百卷因述諸病證候刪集方藥符禁鍼灸之法本草廣義二十卷右皇朝冦宗奭編以本草二部著撰之人或執用已私失於商確併考諸家之説參之事實覈其情理證其脱誤以成其書天元玉策三十卷右啟元子撰即唐王砯也書推五運六氣之變產寶二卷右偽蜀昝殷撰輯產乳備驗方藥二百七十八首銅人腧穴鍼灸圖三卷右皇朝王惟徳撰仁宗嘗詔惟徳考次鍼灸之法鑄銅人為式分腑臟十二經旁注俞穴所㑹刻題其名并為圖法并主療之術刻板傳于世夏竦為序明堂者謂雷公問道黄帝授之故名云太醫局方十卷右元豐中詔天下高手醫各以得効秘方進下太醫局驗試依方製藥鬻之仍摸本傳于世沈存中良方十五卷右皇朝沈括存中撰存中博學通醫術故類其經驗方成此書用者多驗或以蘇子瞻論醫藥雜說附之靈苑方二十卷右皇朝沈括存中編本朝士人如高若訥林億孫奇龎安常皆以善醫名世而存中尤善方書此中所載多可用博濟方五卷右皇朝王袞撰錢氏小兒方八卷右皇朝錢乙仲陽撰神宗時擢太醫丞於書無所不窺它人靳靳守古獨度越縱舍卒與法合尤邃本草多識物理辨正闕誤最工療嬰孺病年八十二而終閻季忠方附于後蘇沈良方十五卷右皇朝沈括通醫學嘗集得効方成一書後人附益以蘇軾醫藥雜説故曰蘇沈南陽活人書二十卷右皇朝朱肱撰序謂張長沙傷寒論其言雅奥非精於經絡不能曉㑹頃因投閒設為對問補苴得緝僅成卷軸作於己巳成于戊子計九萬一千三百六十八字神仙類黄庭内景經一卷右題大帝内書藏暘谷隂三十六章不載注人皆七言韻語梁丘子敘云扶桑大帝命𤾉谷神王傳魏夫人一名東華玉篇黄者二儀正色庭者四方之中近取諸身以脾為主故曰黄庭黄庭外景經一卷右敘謂老子所作元陽子注分上中下三篇亦皆七言韻語元陽子不詳其人老君内觀經一卷右凡十二章首皆云老君曰其言皆修心鍊神之法真誥七卷右梁陶𢎞景撰皆真人口受之誥故以為名記許邁許謐楊羲諸仙受道之説參同契三卷右漢魏伯陽撰按神仙傳伯陽㑹稽上虞人通貫詩律文辭贍博修真養志約周易作此書凡九十篇徐氏箋注桓帝時以授同郡淳于叔通因行于世彭曉為之解隋唐書目皆不載按唐陸徳明解易字云虞翻注參同契言字從日下月今此書有日月為易之文則其為古書明矣坐忘論一卷右唐司馬承禎字子微撰凡七篇其後有文元公跋謂子微之所謂坐忘即釋氏之言宴坐也肇論四卷右姚秦僧洪肇撰師羅什規模莊周之言以著此書物不遷不真空􅄺槃無知般若無名四論傳燈録云肇後為姚興所殺高僧傳不載其事天隱子一卷右唐司馬子微為之序云天隱子不知何許人著書八篇修鍊形氣養和心靈歸根契於伯陽遺照齊乎莊叟殆非人間所能力學者也王古以天隱子即子微也一本有三宫法附于後𤣥聖蘧廬二卷右唐李繁撰繁學於江西僧道一敬宗時嘗與丁公著陸亘入殿中抗佛老講論唐虞愈稱其家多書一覽終身不忘太和中舒元輿誣其濫殺不辜繫獄知且死著書十六篇以明禪理自謂臨死生而不懼賢於顏回在陋巷不改其樂嗚呼可謂賢矣而史載其平生行事甚醜獨何歟廣𢎞明集三十卷右唐僧釋道宣撰道宣麟徳初居西明寺以中原自周魏以來重老輕佛因採輯自古文章下逮齊隋發明其道者以廣僧祐之書分歸正辨惑佛徳法義僧行慈惻誠功啟福滅罪統歸等十門别集類揚雄集三卷右漢揚雄子雲也古無雄集皇朝譚愈好雄文患其散在諸篇籍離而不屬因綴輯之得四十餘篇隂鏗集一卷右陳隂鏗字子堅幼聰慧五嵗能誦詩賦日千言及長博渉史傳尤善五言詩徐陵言之於世祖使賦安樂宫援筆立成累遷散騎常侍有集三卷隋志已亡其二今所存者十數詩而已杜少陵嘗贈李太白詩首云李侯有佳句往往似隂鏗今觀斯集白葢過之遠矣甫之慎許可乃如此呉筠宗元先生集十卷右唐呉筠撰前有權徳輿序筠字貞節華隂人生十五年隱於南陽天寶初召至京師請為道士居嵩山已有勅待詔翰林筠知禄山將亂求還茅山許之乃東遊㑹稽往來天台剡中與李白孔巢父酬唱大厯中卒弟子諡為宗元先生筠通經義美文辭性高骾其待詔翰林也特承恩顧高力士素奉佛嘗短筠於帝故筠所著文賦深詆釋氏頗為通人所譏云陳黯文集三卷右唐陳黯撰黯字希孺頴川人十嵗能詩十三袖文謁清源牧牧面令賦詩頗稱賞之由是一時聲名大振㑹昌初就鄉薦至禮部輒罷歸咸通中卒有羅隱黄滔序令狐楚表奏十卷右唐令狐楚字殻士撰楚相憲宗為文善於牋奏自為序云登科後為桂并四府從事掌牋奏者十三年始遷御史綴其藁得一百九十三篇自號白雲孺子胡笳十八拍一卷右唐劉商撰漢蔡邕女琰為胡騎所掠因胡人吹蘆葉以為歌遂翻為琴曲其辭古淡商因擬之序琰事盛行一時商彭城人擢進士第歴臺省為郎好道術隱義興胡父渚世傳其仙去鼎國詩三卷右後唐李雄撰雄洛鞏人莊宗同光甲申嵗遊金陵成都鄴下各為咏古詩三十章以三國鼎峙故曰鼎國孫晟文集三卷右南唐孫晟字鳯密州人好學有文辭尤長於詩少為道士常畫賈島像置于屋壁晨夕事之後乃儒服謁唐莊宗于鎮州莊宗以為著作佐郎天成中奔于呉李昪父子用之為相周世宗征淮璟懼遣晟奉表求和世宗召問江南事不對殺之璟聞贈魯國公呉越掌記集一卷右唐羅隱掌錢鏐記室所著表啟也神宗皇帝御集二百卷右本朝神宗皇帝撰章惇等纂紹聖初以元祐中所集止九百四十三道有㫖命惇再加編次至元符中書成比元祐所編増多八千七百三十道分文辭政事邊機三門言者仍以元祐之臣託以邊機不宜洩露掩沒先帝盛美於是徧以賜羣臣云范魯公集三十卷右皇朝范質字文素大名人後唐長興中舉進士時和凝典貢舉覽質程文器之自以登第名在十三即以其數處質舉子謂之傳衣鉢晉天福中為翰林學士周廣順初拜相太祖受禪加兼侍中乾徳二年始罷為太子太傅卒年五十四將終戒其子旻勿請謚勿刻墓碑質力學强記好聚書既登朝猶手不釋卷國史載其示從子詩家書自序薦吕餘慶趙普表三篇張師黯集五十卷右皇朝張洎字師黯滁州人仕李煜知制誥中書舍人歸朝為史館修撰翰林學士淳化中參知政事至道二年卒洎風神洒落文辭清麗通釋氏學然性險詖而諂附集有呉淑序其子安期所編咸平五年上之晁文元道院集要三卷右皇朝王古編其序云文元晁公博觀内書不徒力行復勤於譔述以開導後學其書曰道院别集曰自擇増修百法曰法藏碎金曰隨因記述曰耄智餘書余嘗徧閱之以為名理之妙雖白樂天不迨也輒刪去重複總集精粹以便觀覽云古元祐中侍從田表聖咸平集五十卷右皇朝田錫字表聖其先京兆人唐末徙于蜀國初與胡旦何士宗齊名中興國三年進士第歴相臺桐廬淮陽海陵四郡守知制誥終於諫議大夫范仲淹司馬光讀其書皆稱其直諒蘇軾亦以比賈誼云李仲方集二十卷右皇朝李維字仲方雍熙二年進士景徳中知制誥遷中書舍人為翰林學士承㫖年七十一維以文學進至老手不釋卷能詩嗜酒嘗謂人曰人生詩酒足則尚何營哉民士編一十九卷右皇朝陳充撰充成都人雍熙中擢甲科仕至刑部郎中知祥符六年貢舉卒年七十詞學典贍性曠達善談謔澹於榮利自號中庸子民士云者葢其未仕已仕前後所著文也嘗以唐牛僧孺善惡無餘論為害敎著書反之國史稱焉今集載其論兩篇張晦之集二十卷右皇朝張景字晦之少師事柳開學為古文名震一時卒官至廷評年四十九集有文百九十三首禹偁所編并為之序姚鉉文集二十卷右皇朝姚鉉字寳臣廬州合肥人中進士甲科文辭敏麗淳化中直史館應制賦賞花釣魚詩特被嘉賞翌日命中使就第賜白金褒奬之累遷兩浙轉運使鉉雋爽尚氣薛映知杭州與之不協中以危法除其名卒年五十三緹巾集二十卷右皇朝宋庠字公序開封雍正人天聖中擢進士第一入翰林為學士皇祐元年拜相嘉祐中復為樞密使封莒國公以司空致仕初名郊字伯庠御史言其姓符國號名應郊天乃改今名遺命子孫不得以其文集流傳韓持國詩三卷右皇朝韓維字持國億之子也元豐中入翰林為學士遷承㫖哲宗初載拜門下侍郎與其兄子華玉汝俱位宰相持國最能詩世傳其酴釄絶句它多稱是范子功集五十卷右皇朝范百禄字子功鎮之姪也終于中書侍郎晁氏具茨集三卷右先君子詩集也呂本中以為江西宗𣲖曾慥亦稱公早受知陳無已從兄以道嘗謂公宗族中最才華喻汝礪序其詩云予嘗從叔用商近朝人物嘉言善行朝章國典禮文損益靡不貫洽由叔用之學而達諸廊廟温厚足以代言淵博足以顧問則以詩鳴者是豈叔用之志也哉雖然叔用既已油然棲志於林間曠逺之中遇事寫物形於興屬淵雅疎亮未嘗為悽怨危憤之音予於是有以見叔用於消長用舍之際未嘗不安而樂之者也嗟乎所謂含章内奥而深於道者非耶秦漢以來士有抱奇懷能留落不遇往往操心汗筆有怨誹沈抑之思氣候急刻不能閑遠古之詞人皆是也所以往往無所建立於天下唯深於道者遺於世而不怨發於詞而不怒君子是以知其必能有為於世者也嗟乎吾於叔用豈直以詩人命之哉岷山百境詩二卷右皇朝王寀字道輔少有能詩名世謂其詩初若不經意然遣詞屬意清麗絕人自號南陔居士宣和中以狂譎被譖伏誅楊天隱詩十卷右皇朝楊恬字天隱潼川人許表民詩十卷右皇朝許彥國字表民青社人周邦彥稱其寛平優游中極物情惜乎留落不偶故世人知之或寡也滿民昌邑集二十卷右皇朝滿中行字思復登進士第元豐中為太學官虞蕃獄起思復獨不絓吏議詔褒之元氏集三卷右皇朝元綘字厚之杭州人鏁㕔中進士第為翰林學士叅知政事綘立朝無特操晚入翰林諂事王安石及其子弟時論鄙之工文辭為流輩所推許卒年七十六諡章簡馮允南集十卷右皇朝馮山字允南普州人鄧綰為中丞薦為臺官允南力辭不就士論稱之希白詩三卷右皇朝僧希白撰張逸序之云希白能詩與宋白梁周翰張詠而下十數公相友善其格律不減齊已云邵氏集二十卷右皇朝邵溥字澤民進士第靖康初為户部侍郎上踐祚以例貶官紹興中復待制宣撫川陜師事崇福十二父詩文早有能聲總集類雜文章一卷右孫巨源得之於秘閣載宋玉等賦頌五十八篇景迂生元豐甲子以李公擇本校正後有劉大經曰為王雲李端唐君益諸公題跋唐賦二十卷右唐科舉之文也蕭頴士裴度白居易薛逢陸龜䝉之作皆在焉東漢文類三十卷右五代竇儼編唐文類三十卷右皇朝陶叔獻編唐漢策要十卷右皇朝陶叔獻編綸言集一百卷右或編國朝制册詔誥成此書以其皆王言也故以為名高麗詩三卷右元豐中高麗遣崔思齊李子威高琥康壽平李穗入貢上元宴之於東闕之下神宗製詩賜館伴畢仲行仲行與五人者及兩府皆和進其後使人金梯朴夤亮裴闕李綘孫盧柳金化珍等塗中酬唱七十餘篇自編之為西上雜詠綘孫為之序太平盛典二十三卷右或編政和間制誥表章多有可觀者文説類金針詩格三卷右唐白居易撰居易自謂與劉禹錫元稹皆以詩知名撮詩之體要為一格病得針而愈詩亦猶是也故曰金針集續金針詩格一卷右皇朝梅堯臣聖俞撰聖俞遊廬山宿西林與僧希白談詩因廣樂天所述云杜詩刋誤一卷右皇朝王仲至撰韓柳文章譜三卷右皇朝黄大輿撰大輿之意以為文章有莊老之異故取韓愈柳宗元文章為三譜其一取其詩文中官次年月可攷者次第先後著其初晚之異也其一悉取其詩文比敘之其一列當時君相於上以見二人之出處極為詳悉天廚禁臠三卷右皇朝釋惠洪撰論諸家詩格三十三種已見附志今不重刋開書目如后石經周易十卷周易指畧例一卷石經尚書十三卷石經毛詩二十卷石經周禮十二卷石經禮記二十卷石經左氏傳三十卷石經公羊傳十二卷石經穀梁傳十二卷春秋穀梁疏十二卷石經論語十卷石經孟子十四卷韓李論語筆解十卷疑孟一卷仁宗政要四十卷神宗聖訓二十卷東漢刋誤一卷長安志十卷列女傳八卷續一卷百將傳十卷三朝國朝會要一百卷聱隅子十卷鬻子十卷御注老子二卷列子釋文二卷孔叢子七卷劉子三卷御製聖濟經十卷度人經三卷四十二章經一卷神仙可學論一卷蔡邕獨斷二卷花蘂夫人詩一卷華陽集一百卷二種見平泉草木記一卷已載李衛公集中牡丹記一卷已載歐陽公集中一種刪去百中經三卷
