body:
  text: 别集類下下李復古集一卷右皇朝李迪復古濮州人少從柳開學為古文開嘗謂其門人張景髙弁曰此公輔器也景祐初應進士擢居第一累遷翰林學士拜同中書門下平章事後致仕諡文定孫文懿集三十卷右皇朝孫抃字夢得眉山人六世祖長孺喜藏書貯以樓蜀人號書樓孫天聖中進士甲科累遷知制誥翰林學士承㫖後參知政事諡文懿夏文莊集一百卷右皇朝夏竦子喬江州德安人以父死事補官舉賢良除光禄丞累擢知制誥仁宗屢欲相之為言者所攻而寢初封英國公後改封鄭謚文莊貴顯凡四十年天資好學自經史百氏隂陽律厯之書無所不通善為文章尤長偶儷之語朝廷大典策屢以屬之為詩巧麗皆山勢蜂腰斷溪流燕尾分之類其集夏伯孫編次有宋次道序宋景文集一百五十卷右皇朝宋祁子京開封雍丘人天聖中與其兄庠同舉進士奏名第一章獻以為弟不可先兄乃擢庠第一而以祁為第十當是時兄弟俱以辭賦妙天下號大小宋累遷知制誥除翰林學士承㫖以文章擅名一時終不至大用衆頗惜之張方平為之請謚景文通小學故其文多奇字蘇子瞻嘗謂其淵源皆有考奇嶮或難句世以為知言集有出麾小集西川猥藁之類合而為一田公金巖集兩卷右皇朝田况字元均嘗登學究進士賢良科終尚書左丞嘗知成都聽斷之眀蜀人以比張乖崖林君復集二卷右皇朝林逋字君復杭州錢塘人少刻志為學結廬隠西湖之孤山真宗聞其名詔郡縣常存遇之善行書喜為詩其語孤峭澄淡臨終作一絶句云茂陵他日求遺藁猶喜曽無封禪書或刻石置之其墓中賜諡曰和靖先生集有梅聖俞序陳亞之集一卷右皇朝陳亞字亞之惟滑稽喜賦藥名詩仕至司封郎中藥詩者始於唐人張籍有江臯歲暮相逢地黄葉霜前半下枝之詩人謂起於亞之實不然也何聖從廬江文集二十卷刀筆五卷奏議二十卷右何郯字聖從成都人仁宗朝為御史諫官擢天章閣待制熙寧中以尚書右丞致仕厯漢梓永興河南四帥守天資好學殆廢寢食為詩章簡重淳淡有孟東野之風其仕臺諫時知無不言頗有直聲鮮于子駿嘗誌其墓集有李邦直序富文忠劄子集六卷奏議十二卷右皇朝富弼彦國河南人天聖八年中制科至和二年召拜同中書門下平章事元豐中卒年八十諡文忠其為文章辨而不華質而不俚晁以道為之序其畧曰人孰不仰公使虜之功上乃拜樞密副使而公力辭至和之末請立皇嗣之功人或未聞公於褒進司徒則一命而不避公每聞人語及北事便變色若不欲聞者至青州救灾之功平居喜為人道之石介嘗以夔􅆻方公矣而嚴事王沂公薦士後至將相者多矣而最善劉槩數事皆世所罕知者又曰公於仁宗時言猶雨露也英宗時言猶海潮也神宗時言猶鳳嗚也歐陽文忠公集八十卷諫垣集八卷右皇朝歐陽修字永叔吉州人舉進士累遷知制誥夏竦以永叔黨於杜韓范富因以外甥張氏事汚之下開封府治之無狀坐用張氏奩中物市田出知滁州召入修唐書為翰林學士未幾參知政事蔣之竒言其帷簿事連其長子婦吳氏詔誥之奇辭窮坐貶年六十乞致仕卒諡文忠博極羣書好學不倦尤以奬進天下士為己任延譽慰藉極其力而後已於經術治其大指不求異於諸儒與尹洙皆為古學遂為天下宗匠蘇明允以其文詞令雍容似李翺切近適當似陸䞇而其才亦似過此兩人至所作唐書五代史不愧班固劉向也獨議濮邸事議者不以為是有蘇子瞻序劉公是集七十五卷右皇朝劉敞字原甫袁州人慶厯中舉進士廷試第一累遷知制誥出知永興惑官妓得驚眩疾力求便郡仁宗謂執政曰如敞者豈易得邪賜以新橙五十為人眀白俊偉自六經百氏下至傳記無所不通為文章尤敏贍好摹倣古語句度在西掖時嘗食頃揮九制各得其體英宗嘗語及原甫韓魏公對以有文學歐陽公曰其文章未佳特博學可稱耳尹師魯集二十卷右皇朝尹洙字師魯河南人天聖中進士以薦為館閣校勘累遷右司諫知渭州兼領涇原路經畧公事爭城永洛事為董士亷所訟遣御史就鞫不能得其罪猶貶均州監酒師魯内剛而外和與人言必極辨其是非前世治亂沿革之變靡不該貫人有疑不能通為指畫講說皆釋然自得尤長於春秋文章自唐末卑弱本朝柳開始為古學天聖初與穆修大振起之梅聖俞宛陵集六十卷右皇朝梅堯臣聖俞宛陵人少以䕃補吏累舉進士輒抑於有司幼習為詩出語已驚人既長學六經仁義之說其為文章簡古純粹然最樂為詩王舉正見而歎曰二百年無此作矣歐陽永叔與之友善其意如韓愈之待郊島云孫明復睢陽小集十卷右皇朝孫眀復晉州人居泰山深於春秋自石介已下皆師事之年四十未娶李丞相迪以其弟之子妻之慶厯中范文正富鄭公言之于朝除國子監直講嘗對邇英閣說詩上欲以為侍講楊安國沮之而寢石守道集二十卷右皇朝石介守道兖州奉符人天聖八年登進士第遷直集賢院篤學有大志嘗謂時無不可為不在其位則行其言雖獲禍至死而不悔其為文章陳古今治亂成敗以指切當世無所忌諱作慶厯聖德詩分别邪正專斥夏竦其後守道死竦因誣以北走契丹請剖棺驗視云石曼卿集一卷右皇朝石延年曼卿南京宋城人舉進士不中為三班奉職改太常寺太祝遷秘閣校理能為詩書甚遒麗蘇才翁集一卷右皇朝蘇舜元才翁子美兄也工草𨽻詩章豪麗蘇子美集十六卷右皇朝蘇舜欽子美易簡之孫也景祐中進士累遷集賢校理監進奏院坐用故紙錢會客除名慷慨有大志好古文章及廢居蘇州買水石作滄浪亭益讀書發其憤懣於歌詩其體豪放往往驚人又善草書酣醉落筆爭為人所傳翫集歐公為之序鄭毅夫鄖谿集五十卷右皇朝鄭獬字毅夫安州人少俊異為詩賦有聲廷試第一累遷知制誥入翰林為學士王安石不恱之乘宰相在告除獬知杭州為文有豪氣峭整無長語與滕達道少相善嗜酒落魄無檢操人目之曰滕屠鄭沽云蘇明允嘉祐集十五卷右皇朝蘇洵字明允眉山人至和中歐陽永叔得明允書二十二篇大愛其文辭以為雖賈誼劉向不過也以書獻除校書郎與姚子張同編太常因革禮百卷書方成而卒治平史臣謂永叔所獻明允之文甚美然大抵兵謀權利機變之言也蔡君謨集十七卷右皇朝蔡襄字君謨興化人天聖中舉進士慶厯三年知諫院仁宗慨然思治增置諫官四員君謨在選中皇祐中知制誥累遷翰林學士權三司使嘗知福泉杭三州文章清遒粹美工書為本朝第一殘章繼藁得者珍藏之在泉州之日喪叔母在告其僚拱之黄垍燕飲用樂君謨怒中以危法後數為拱之所訴杜師雄詩一卷右皇朝杜黙字師雄徂徠人石介作三豪篇所謂歌之豪者蘇子瞻頗陋之鄭成之集十卷右皇朝鄭褒字成之閩人登進士第慕韓愈為文陳詁為編次其集張景為之序徐仲車詩一卷右皇朝徐積字仲車東莞人邵堯夫擊壤集二十卷右皇朝邵雍堯夫隠居洛陽熙寧中與常秩同召力辭不起邃於易數始為學至二十年不施枕而睡其精如此歌詩葢其餘事亦頗切理盛行于時卒諡康節集自為序張少愚白雲集二十卷右皇朝張俞字少愚幼通悟於書無不該貫朝廷嘗以校書郎徵召表乞授其父隠於氓山之白雲谿凡六被召皆不起為文有西漢風嘗賦洛陽懐古蘇子美見而歎曰優游感諷意不可盡吾不能也包孝肅奏議十卷右皇朝包拯字希仁合淝人天聖五年進士權御史中丞知開封府為人剛嚴聞者憚之雖閭里童稚婦女亦知其名性不苟合未嘗偽色辭以恱人平生無私書不受干請雖故人親黨一皆絶之司馬文正傳家集八十卷右皇朝司馬光君實也陜州夏縣人初以父䕃入官年二十舉進士甲科故相龎籍薦除館閣校理神宗即位擢翰林學士御史中丞後除樞密副使力辭而去元祐初拜門下侍郎遷尚書左僕射卒年六十八諡文正好學如飢之嗜食於學無所不通音樂律吕天文厯數皆極其妙晚節尤好禮其文如金玉穀帛藥石也必有適於用無益之文未嘗一語及之集乃公自編次公薨子康又沒晁以道得而藏之中更禁錮迨至渡江幸不失墜後以授謝克家劉嶠得而刻版上之王介甫臨川集一百三十卷右皇朝王安石字介甫撫州臨川人慶厯二年進士累除知制誥神宗在藩邸見其文異之召為翰林學士熙寧三年拜中書門下平章事熙寧七年罷眀年再入相九年罷卒年六十六謚文公其壻蔡卞謂自先王澤竭士習卑陋不知道德性命之理安石奮乎百世之下追堯舜三代通乎晝夜隂陽所不能測而入於神著雜說數萬言其言與孟軻相上下晚以所學考字畫竒耦横直深造天地隂陽造化之理著字說包括萬象與易相表裏崇寧初卞之兄京秉政詔配祀文宣王廟近時議者謂自紹聖以來學術政事敗壊殘酷貽禍社稷實出於安石云吕獻可章奏二十卷右皇朝吕誨字獻可洛陽人登進士第熙寧初為御史中丞時王安石棄官家居朝野稱其才以為古今少倫神宗引參大政衆以為得人獻可獨以為不然居無何安石棄衆任已多變祖宗專汲汲斂民財所愛信引拔或非其人天下失望獻可屢爭不能得乃抗章曰誤天下蒼生必此人上遣使喻解執之愈堅乃出知鄧州溫公嘗服其知人誌其墓且序其章奏集云其草存者二百八十有九厯觀古人有能得其一二者已可載之史籍在獻可葢不足道也蒲左丞集十卷右皇朝蒲宗孟傳正閬州新井人皇祐五年進士曾公亮薦除館職神宗謂宰相曰宗孟有史才乃同修國史入為翰林學士除尚書左丞卒年六十六為人酷暴奢侈蘇子瞻嘗規之云一曰慈二曰儉世以為中其膏肓之疾趙懿簡集三十卷右皇朝趙瞻大觀盩厔人少善為古文慶厯五年登進士第治平中為侍御史論濮邸事及貶元祐中終於同知樞密院諡懿簡學春秋著書十卷其他文不皆竒也鮮于諫議集三卷右皇朝鮮于侁子駿閬中人景祐中登進士乙科神宗初上書上愛其文以為不減王陶元祐中仕至諫議大夫侁治經術有法論者多出新意晚年為詩與楚詞尤工人以為有屈宋風族姪之武編次有序楊元素集四十卷右皇朝楊繪字元素漢州綿竹人幼警敏讀書一過輒誦至老不忘皇祐初擢進士第二人累擢翰林學士沈存中為三司使暴其所薦王永年事因貶官終於天章閣待制知杭州嘗居無為山號無為子為文立就曾子固元豐類藁五十卷右皇明曾鞏子固南豐人元豐中為中書舍人卒子固師事歐陽永叔早以文章名天下壯年其文慓鷙奔放雄渾瓌瑋其自負要似劉向藐視韓愈以下也晚年始在掖垣屬新官制方除目填委占紙肆書初若不經意及屬草授吏所以本法意原職守為之訓勅者人人不同贍裕雅重自成一家歐公門下士多為世顯人議者獨以子固為得其傳猶學浮屠者所謂嫡嗣云李誠之集三卷右皇朝李師中字誠之登進士科仁廟時權廣南轉運使終天章閣待制唐子方貶春州誠之嘗有詩送行盛傳一時孫莘老奏議十卷右皇朝孫覺字莘老元豐末自秘書少監除右諫議大夫元祐初遷給事中吏部侍郎莘老素與王介甫善後為諫官論新法遂絶李公擇廬山奏議十七卷右皇朝李常字公擇早年讀書於廬山熙寧中為諫官論青苗法而罷元祐初為御史中丞孫賢良進卷十卷右皇朝孫洙字巨源廣陵人歐陽永叔舉洙賢良上策論五十篇極論時事元豐中直學士院奉詔作靈津廟碑上稱洙學術行誼且大用之暴得風緩而卒或云上欲復大理獄洙對合㫖由是驟進錢賢良進卷十卷右皇朝錢公輔字君倚武進人從胡瑗學昭陵末知制誥文與可丹淵集四十卷右皇朝文同與可蜀人進士髙第以文學名操韻髙潔畫筆尤妙仕至太常博士集賢校理元豐初出守吳興至宛丘驛忽留不行一旦沐浴冠帶正坐而逝吕晉伯輞川集五卷奏議十卷右皇朝吕大忠字晉伯藍田人汲公之兄皇祐中進士除檢討樞密院吏房文字為河北轉運判官累遷寳文閣直學士晉伯博極羣書為文尚理致有益於用章奏皆親為之吕汲公文録二十卷文録掇遺一卷右皇朝吕大防微仲京兆藍田人皇祐初中進士第哲宗即位召知制誥翰林學士拜尚書左僕射兼門下侍郎紹聖初責授舒州團練副使循州安置未踰嶺卒大防既拜相常分其俸之半以録書故所藏甚富其在翰林書命典麗議者謂在元絳之上云吕和叔誠德集三十卷右皇朝吕大鈞字和叔嘉祐二年中進士第大防仲弟也終於宣義郎鄜延路漕司屬官師張厚之贍學博聞無所不該其文章非義理不發吕與叔玉溪集二十五卷玉溪别集一十卷右皇朝吕大臨字與叔汲公季弟也登進士第嘗厯太學博士秘書省正字從程正叔張厚之學通六經尤精於禮解中庸大學等篇行於世嘗賦詩云學如元凱方成癖辭類相如始近俳獨倚聖門無一事願同回也得心齋正叔可之晁氏新城集十卷右皇朝族祖新城府君也公諱某字君成早登進士第為杭州新城令以沒蘇子瞻嘗稱其詩清厚靜深而每篇輒出新意竒語蘇子瞻東坡前集四十卷後集二十卷奏議十五卷内制十卷外制三卷和陶集四卷應詔集十卷右皇朝蘇軾字子瞻洵之長子也軾生十年其母授以書聞古今成敗輒能語其要比冠學通經史屬文日數千言嘉祐中歐陽永叔考試禮部進士梅聖俞與其事得其論刑賞以示永叔至驚喜以為異人欲以冠多士疑曾子固所為乃寘之第二後以書謝永叔見之語客曰老夫當避此人放出一頭地又以直言薦之答策入上等英宗在藩邸聞其名欲以唐故事召入翰林宰相不可知湖州以表謝上言事者摘其語以謗聞遣官逮赴御史獄初子瞻當王安石紛更法度之際見其事不便於民賦詩以刺焉言者從而媒孽欲置之死神宗薄其過謫置黄州温公相哲宗累擢中書舍人除翰林學士承㫖紹聖中坐草謫吕惠卿制直書其罪誣以訕謗安置惠州徙昌化元符中北還卒於常州初好賈誼陸贄書論古今治亂不為空言既謫黄州杜門深居馳騁翰墨其文一變平生遇事所為詩騷銘記書檄論譔率皆過人晚喜陶淵眀詩和之幾徧為人英辨竒偉於書無所不通所作文章才落筆四海已皆傳誦下至閭閻田里外至夷狄莫不知其名門下賓客亦皆一世豪傑其盛本朝所未有也立朝知無不為世稱其忠義嘗自比范滂孔融議者不以為過在黄州日自號東坡居士世因不呼其名止目之為東坡云蘇子由欒城集前集五十卷後集二十四卷第三集十卷應詔集十二卷右皇朝蘇轍子由洵之次子也年十九中進士第二十二舉直言因所問極言得失策入或欲黜之仁宗不許曰以直言召人而以直言見弃天下謂我何擢商州推官久之其兄以詩得罪從坐謫監筠州酒稅宣仁臨朝相溫公擢中書舍人代子瞻為翰林學士未幾拜尚書左丞紹聖初謫置雷州後北還凡居雷循七年居許十六年杜門理舊學於是詩春秋傳老子解古史書皆成自謂得聖賢遺意程伊川集二十卷右皇朝程頤字正叔珦之子也少與其兄顥從汝南周敦實為學元祐初司馬温公薦于朝自布衣擢崇政殿說書未幾罷紹聖中嘗謫涪陵專務談經明道深斥辭章之學從其游者多知名于世曾子開曲阜集四十卷奏議十二卷西掖集二卷内制五十卷右皇朝曾肇字子開子固之弟也登進士第元祐中為中書舍人元符末再入西掖遂為翰林學士前後厯陳潁宋泰海和金陵真定九郡帥守坐兄子宣貶亦以散官汀州安置崇寧末移台州居京口而終封曲阜侯黄魯直豫章集三十卷外集十四卷右皇朝黄庭堅魯直幼警悟讀書五行俱下數過輒憶蘇子瞻嘗見其詩於孫莘老家絶歎以為世久無此作矣因以詩往來會子瞻以詩得罪亦罰金元祐中為校書郎先是秦少游晁無咎張文潛皆以文學遊蘇氏之門至是同入館世號四學士而魯直之詩尤奇世又謂之蘇黄云紹聖初謫戎州嘗因嘲謔忤趙正夫及正夫為相諭部使者以風指摘所作承天院塔記中語以為幸灾謗國遂除名編𨽻宜州以崇寧四年九月三十日卒晁無咎雞肋編七十卷右皇朝族父吏部公也公諱補之字無咎幼豪邁英爽不羣七歲能屬文日誦千言王安石名重天下慎許可一見大奇之在杭州作文曰七述敘杭州之山川人物之盛麗時蘇子瞻倅杭州亦欲有所賦見其所作歎曰吾可以閣筆矣子瞻以文章名一時至屈輩行與之交由此聲名籍甚舉進士禮部别試第一而考官謂其文辭近世未有遂以進御神宗曰是深於經可革浮薄元祐中除校書郎紹聖初落職監信州酒後知泗州終于官大觀四年也於文章葢天性讀書不過一再終身不㤀自少為文即能追考左氏戰國策太史公班固揚雄劉向屈原宋玉韓愈柳宗元之作促駕而力鞭之務與之齊而後已其凌厲奇卓出於天才非醖釀而成者自韓柳而還葢不足道也秦少游淮海集三十卷右皇朝秦觀少㳺髙郵人登進士第元祐初除校勘黄本書籍紹聖初除名編𨽻横州遇赦北歸至籐州卒蘇子瞻嘗謂李廌曰少游之文如美玉無瑕又琢磨之功殆未有出其右者少游亦自言其文銖兩不差但華麗為愧耳張文濳柯山集一百卷右皇朝張耒文濳譙郡人仕至起居舍人嘗為宣潤汝頴兖五州守又嘗謫居黄州復州最後居陳以沒元祐中蘇氏兄弟以文倡天下號長公少公其門人號四學士文濳少公之客也諸人多早沒文濳獨後亡故詩文傳于世者尤多其於詩文兼長雖同時鮮復其比而晚年更喜白樂天詩體多効之云畢公叔西臺集二十卷右皇朝畢仲游字公叔蚤登進士第元祐中召天下文學之士三人策試翰林院蘇子瞻以公叔為第一除集賢校理又表自代云學貫經史才通世務文章精麗論議有餘自臺郎為憲漕綽有能聲以黨籍終於西京留臺集陳叔易為之序陳無已後山集二十卷右皇朝陳師道無已彭城人公少以文謁曾南豐一見奇之許其必以文著元祐中侍從合薦于朝起為太學博士紹聖中以進非科舉而罷建中靖國初入秘書為正字以卒為文至多少不中意則焚之存者才十一臨溪隠居集二十卷右皇朝魏泰字道輔襄陽人曾布子宣妻之弟也幼邁爽能屬文嘗從徐禧晚節卜隠漢上人頗言其倚子宣之勢為鄉里患苦云廖明畧竹林集三卷右皇朝廖正一字眀畧元祐中召試館職蘇子瞻在翰林見其所對䇿大奇之俄除正字時黄秦晁張皆子瞻門下士號四學士子瞻待之厚每來必命侍妾朝雲取密雲龍家人以此知之一日子瞻又取密雲龍家人謂是四學士窺之乃明畧來謝也紹聖間明畧貶信州玉山監稅鬱鬱不得志喪眀而沒自號竹林居士邢敦夫呻吟集一卷右皇朝邢君實敦夫和叔之子年十四賦明妃引蘇子瞻見而稱之由是知名未幾和叔貶隨州敦夫侍行病羸嘔血一旦有鈴下老卒驕慢應對不遜敦夫怒而擊之無何卒死和叔怒以敦夫屬吏以故疾日侵而夭黄魯直為之挽云眼看白璧埋黄壤何况人間父子情葢隠之也集後有子瞻魯直無咎諸公跋員逢原三蓮集二十卷右皇朝員逢原關中人仕至朝議大夫司馬才仲夏陽集二卷右皇朝司馬槱字才仲溫公之姪孫元祐初與王常輩同中賢良科調錢塘尉而卒喜為宫體詩故世傳其為鬼物所祟司馬才叔逸堂集十卷右皇朝司馬棫字才叔才仲之弟也登進士第亦嘗應賢良以黨錮不召詩雖纎艷比其兄稍莊雅張浮休畫墁集一百卷奏議十卷右皇朝張舜民芸叟邠州人慶厯中范仲淹帥邠見其文異之用温公薦為諫官仕至吏部侍郎後羈置房陵政和中卒其文豪重有理致而最刻意於詩晚年為樂府百餘篇自序稱年踰耳順方敢言詩百世之後必有知音者云自號浮休先生陳瑩中了齋集三十卷右皇朝陳瓘瑩中延平人建中靖國初為右司諫嘗移書責曾布及言蔡京與弟卞之姦惡章數十上除名編𨽻合浦以死靖康初贈諫議大夫自號了翁陳司諫集二卷右皇朝陳祐字純益仙井監人登進士第建中靖國初為臺諫與龔夬任伯雨張公望協力彈擊紹聖姦臣後蔡京用事廢斥而沒張無盡集三十二卷右皇朝張商英字天覺登第調官峽路章惇察訪巴蜀風采傾動西南峽中部使者憂之日夕謀所以待之之禮曲盡因求辨博之士以備燕談或以天覺姓名告因檄召至夔州惇既至杯酒間果以人材為問部使者即言之惇令召入天覺不冠服峩巾長揖徑就坐左惇負氣敢大言天覺輒吐言壓之惇大喜歸而薦於朝由是召用元祐中為開封府推官出使河東紹聖初擢御史大觀四年長星見蔡京罷相乃拜右僕射盡反京之政召用元祐遷客天下翕然歸重期年去位靖康初遂與司馬溫公范文正公同日降制加贈官爵賜謚文忠疑范文正乃忠宣也晁氏景迂集十二卷右從父詹事公也諱說之字以道文元公元孫少慕司馬溫公為人自號景迂生年未三十蘇子瞻以著述科薦之元符中上書居邪中等博極羣書通六經尤精於易傳邵堯夫之學著太極傳搢紳髙其節行嘗守成州時民訴歲旱公以為十分盡蠲其稅轉運使大怒督責甚峻因丐老而歸靖康初以著作郎召遷秘書監免試除中書舍人兼太子詹事俄以論不合去建炎初終於徽猷閣待制晁氏崇福集三十五卷四六集十五卷右從父崇福公也諱詠之字之道以道弟也登進士第又中宏詞第一元符末上書居邪等廢斥二十年以朝請郎奉祠崇福宫而終天才英特為文章立成明潤密緻世以為宜在北門西掖云晁氏封丘集二十卷右世父封丘府君也諱某字伯宇鏁㕔中進士第黄魯直嘗薦之於蘇子瞻云晁伯宇謹厚守文元家法從㳺多長者其文已能如此年葢未二十也願子瞻一語教戒之子瞻答云晁伯宇詩騷細看甚奇麗信乎其家之多異材也雖然凡文至足之餘溢為奇偉今晁君文涉奇似太早可作朋友切磋之語以告之非謂其諱也恐傷其邁往之氣耳後坎􅇄終身卒官封丘丞唐子西集十卷右皇朝唐庚字子西眉山人登進士第早受知於張天覺天覺為相擢京畿提舉常平且欲用為諌官天覺去位後言者謂子西嘗宣言有一網打盡之語貶惠州大觀五年會赦北歸韓子蒼集三卷右皇朝韓駒子蒼仙井人政和初請闕上書特命以官累擢中書舍人權直學士院王甫嘗命子蒼詠其家藏太一真人圖詩盛傳一時宣和廷臣獨以能詩稱云劉巨濟前溪集五卷右皇朝劉涇字巨濟蜀人終于太學博士為文頗奇怪崔德符婆娑集三十卷右皇朝崔鶠字德符蚤中進士第元符末上書入邪等廢斥幾三十年靖康初召為右正言居無何感疾卒其為文最長於詩清婉敷腴有唐人風李元應跨鼇集五十卷右皇朝李新字元應仙井人早登進士第劉涇嘗薦於蘇子瞻命賦墨竹口占一絶立就坐元符末上書奪官謫置遂州流落終身跨鼇仙井山名也王履道初寮集十卷内制十八卷外制八卷右皇朝王安中履道真定人政和中有密薦於上者自監大名倉累擢掌内外制後拜太保鎮燕山建炎初貶象州為文瓌奇髙妙最長於制誥李邴入翰林嘗請於上以方今詞林之式上首尾舉履道之名自號初寮先生吕居仁集十卷右皇朝吕本中字居仁好問右丞之長子靖康初權尚書郎紹興中賜進士第除右史遷中書舍人已而落職奉祠少學黄山谷為詩嘗作江西宗派圖行于世陳參政簡齋集二十卷右皇朝陳與義去非汝州葉縣人中進士第宣和中徽宗見其所賦墨梅詩喜之遂登冊府建炎中掌内外制拜參知政事以卒晚年詩尤工周葵得其家所藏五百餘篇刋行之號簡齋集胡承公集十卷資古紹志集十卷右皇朝胡世將字承公中進士科早受知於晁無咎建炎南渡嘗直學士院終於資政殿學士川陜宣撫使為文敏贍溫雅掌書命頗有能聲喜聚金石刻効歐公集古録為資古紹志集序云以成其先人之志故以紹志目其書參寥集十二卷右皇朝僧道潛自號參寥子與蘇子瞻秦少㳺為詩友其詩清麗不類浮屠語洪覺範筠溪集十卷右皇朝僧惠㓋覺範姓喻氏髙安人少孤能緝文張天覺聞其名請住峽州天寧寺以為今世融肇也未幾坐累民之及天覺當國復度為僧易名德洪數延入府中及天覺去位制獄窮治其傳達言語於郭天信竄海南島上後北歸建炎中卒著書數萬言如林間録僧寳傳冷齋夜話之類皆行于世然多夸誕人莫之信云饒德操集一卷右皇朝饒節字德操曽布之客也性剛峻晚與布論不合因弃去祝髪為浮屠在襄漢間聲望甚重云李易安集十二卷右皇朝李氏格非之女先嫁趙誠之有才藻名其舅正夫相徽宗朝李氏嘗獻詩曰炙手可熱心可寒然無檢操晚節流落江湖間以卒詹玠將歸集一卷右未詳何人有題林逋隠居詩當是昭陵時人也趙韓王集三卷右皇朝趙普字平則薊州人其父遷洛陽占籍焉乾德中代范貭為平章事太平興國六年及端拱初三入相薨封真定王諡忠獻卒年七十一普初無學術太宗勉之晚年頗該博范蜀公集十卷右皇朝范鎮字景仁成都人舉進士為禮部第一仁宗朝知諫院後言王安石新法不便乞致仕歸潁昌元祐初詔召不起封蜀郡公年八十一諡忠文黄虞部詩一卷右皇朝黄觀昭陵時嘗將漕成都吕吉甫集二十卷右皇朝吕惠卿字吉甫閩人王安石執政擢參知政事元祐初謫知福州紹聖後累領藩鎮有莊子解為文長於表奏張橫渠崇文集十卷右皇朝張載字厚之京師人後居鳳翔之橫渠鎮學者稱曰横渠先生吕晦叔薦之於朝命校書崇文未幾紹按獄浙東既歸卒馭臣鑒古二十卷右皇朝鄧綰所著綰元豐中為中丞所獻書也未幾坐操心頗僻賦性姦回論事薦人不循分守貶余氏至言十八篇右皇朝余安行字仲勉鄱陽人少受知于彭汝礪年八十餘者此書自謂有得于中庸也東南學者多宗之河間公奏議十卷右皇朝朱光庭元祐中為諫官時所論事也汲世論一卷右未詳何人所著多稱元祐間事且喜論兵疑吕氏書也凡十門陳叔易詩二十卷右皇朝陳恬字叔易堯叟裔孫藏寂軒文藁右皇朝董闕字闕襄陽人趙延持盈要論右皇朝趙延宣和初任合州石照縣丞日所上汪彦章集十卷右皇朝汪藻字彦章嘗為翰林學士詩苑類格三卷右皇朝李淑撰寳元三年豫王出閣淑為王子傅因纂成此書上之述古賢作詩體格總九十目韓文辨證八卷右皇朝洪興祖討論韓愈詩文推考其根源因以訂正其訛繆頗為該洽云藝圃折𠂻六卷右皇朝鄭厚莆陽人紹興中舉進士第一坐臺評廢于家總
