body:
  text: 楚辭類楚辭集註八卷後語六卷辨證一卷右朱文公所定也離騷凡七題二十五篇皆屈原作定為五卷續離騷八題十六篇定為三卷校晁氏本増弔屈原服賦二篇而去七諌九懐九歎九思四篇公謂四篇雖為騷體然詞氣平緩意不深切如無所疾痛而强為呻吟者就其中諌歎猶粗可觀兩三則卑已甚矣故雖幸附書尾而人莫之讀今不復以累篇􅐆也賈傅之詞于西京為最髙且惜誓已著於篇而二賦尤精乃不見取亦不可曉故并録以附焉後語定著五十二篇公謂屈子者窮而呼天疾痛而呼父母之詞也故今所欲取而使繼之者必其出於幽憂窮蹙怨慕凄涼之意乃為得其餘韻而宏衍鉅麗之觀懽愉快適之語宜不得而與焉至論其等則又必以無心而冥㑹者為貴其或有是則雖逺且賤猶將汲而進之一有意於求似則雖迫近如楊柳亦不得已而取之耳騷自楚興公之加意此書則作牧於楚之後也或曰有感於趙忠定之變而然離騷章句一卷右吕成公所分也以離騷經一篇為十六章公謂王逸嘗言劉向典校分離騷為十六卷班固賈逵各作離騷章句惟一卷傳焉餘十五卷闕而不録今觀屈平所作凡二十有五各有篇目獨此一篇謂之離騷切意劉向所分即此篇猶一篇之中有數章焉故嘗因逸之言即離騷一篇反復求之考其文之起㐲意之先後固有十六章次第矣因而分之為十六章東萊集中不載離騷草木疏四卷右通直郎行國子録河南呉仁傑撰慶元間自序别集類一申鑒五卷右後漢荀恱所作也恱字仲豫儉之子也儉早卒恱年十二能說春秋家貧無書每之人間所見篇牘一覽多能誦記尢好著述靈帝時閹官用權士多退身窮處恱乃託疾隠居初辟鎮東將軍曹操府遷黄門侍郎侍講禁中累遷秘書監侍中時政移曹氏天子恭已而已恱志在獻替而謀無所用乃作申鑒五篇其所論辨通見政體既成而奏之其大畧曰前鑒既明後復申之故古之聖王其於仁義也申重而已恱嘗依左氏傳體為漢紀三十篇又著崇徳正論及諸論數十篇建安十四年卒孔稚珪集十卷右齊孔稚珪字徳璋之文也稚珪道隆孫㑹稽山隂人為東南冠族少知名有文彩辭章清抜獨冠當世舉秀才為安成王法曹叅軍齊髙帝時補記室叅軍終于都官尚書散騎常侍太子詹事追贈金紫光禄大夫謚簡子集有序云所為文章雖行於世竟未撰集今摭其遺逸分為十卷然莫知其為誰序也詩品三卷右梁征逺記室叅軍鍾嶸撰嶸字仲偉南史有傳嶸嘗求譽於沈約約拒之及約卒嶸品古今詩為評言其優劣云觀休文衆製五言最優齊永明中相王愛文王元長等皆宗附約于時謝朓未遒江淹才盡范雲名級又微故稱獨歩故當辭宏於謝意淺于江蓋追宿憾以此報約也陸宣公集二十二卷右唐陸贄敬輿之文也讀書志云陸贄奏議十二卷希弁所藏制誥十卷奏草六卷奏議六卷凡二十二卷云李翰林文集三十卷右唐李白太白之文也讀書志云二十卷希弁所藏三十卷以常山宋敏求南豐曽鞏序考之則三十卷為是然第一卷乃李陽冰魏顥樂史三人所作序李華劉全白范傳正裴敬四人所作誌與碑第二卷以後乃白詩文云黄氏補千家集註杜工部詩史三十六卷外集二卷右唐杜甫少陵之詩也嘉定中臨川黄希夢得及其子鶴叔似所補也外集上卷詩二十九首下卷祭逺祖當陽君文祭外祖祖母文為閬州王史君進論巴蜀安危表東西兩川說凡四篇以唐書本傳冠于前而吕汲公年譜附于後云昌黎先生文集四十卷外集三卷順宗實録五卷附録三卷右唐韓愈退之之文也讀書志云韓愈集四十卷集外文一卷希弁所藏合五十一卷嘗以宜春新舊本兼饒本叅校又以嘉祐壬寅所刋杭本是正之饒本刋年譜于目録之後刋附録于外集之前又附録止載九篇而前後共列五序柳開但曰後序亦不書其姓名杭本並無目録年譜附録亦無柳開一序趙徳之序文録列于李漢之先歐陽修之記舊本較之他集則異他本所載者六百二十七字杭本所刋者一百六十二字以嘉祐壬寅考之歐陽方在政府刋者不應謬誤豈非後來更改而然歟遂寫杭本歐陽之序饒本汲公之記續於附録之後石守道秦少游張文潜之論黄魯直蔣頴叔李伯紀之詩鄭介甫之祭文陳元光之集序黄直卿之記新廟真希元之記祠堂又寫附歐吕二公之後而諸賢評論先生之文者各以其說註於逐篇之上若夫委緌大學宜序天臺之屬此先生除都官郎之誥詞也當考誰行道徳博聞此先生謚文公之法也當考誰議有所謂示浩初序之書者王逢原代先生之作也續駑驥行之詩者李泰伯廣先生之說也如此類者亦當寫補附録之缺云柳先生文集四十五卷外集二卷附録二卷右唐柳宗元子厚之文也讀書志云柳宗元集三十卷集外文一卷希弁所藏卷帙與劉禹錫四十五通之說同以諸本㸃校寫諸公評論於逐篇之上附録中先後失次者正之遺缺者補之若夫昌黎所作先生墓誌祭文他本皆在附録中惟此本在正符之後蓋禹錫自謂附於第一通之末也朱文公嘗謂柳文後龍城雜記王銍性之所為也子厚叙事文字多少筆力此記衰弱之甚皆寓古人詩文中不可曉知底于其中似暗影出云杜詩辨證一卷右洪興祖所纂也年譜列于前興祖字慶善鎮之丹陽人也張釡刻于興國韓文考異十卷右朱文公所定也以南安舉正及祥符杭本嘉祐蜀本李謝所據館閣本考其同異一以文勢義理及他書之可證驗者決之云嘉定戊辰三山鄭自誠刻而叙其後韓文音義一卷右右從政郎潭州寧鄉縣丞祝充所進也毛叔度為之序張杓刻而叙其後柳文音釋一卷右南城童宗說編韓集舉正一卷右莫詳誰作而說云唐儒郭京有周易舉正三卷蓋以所得王輔嗣韓康伯註定真本舉正傳本之訛題義取云文標集三卷右唐集賢學士盧肇之文也肇字子發宜春人幼好學頴抜不羣宜春令盧㠋一見竒之曰子異日有聞乎由是愈激厲唐㑹昌二年預江西解試末送啟謝曰巨鼇贔屭首冠蓬山主文詢其謂對曰巨鼇不靈頑石右上一座盡笑唐制取士許簾獻所業先察其素時王起知舉肇為書以獻起問曰鄉薦如公材幾何對曰皆才選也未易品判然如肇者亦猶沅江之鼈九助賔希繼而同舉黄頗進謁起問如初則曰捨頗其誰才起由是少頗而多肇之謙始李徳裕以言事出為宜春長史嘉肇文行異禮之至是徳裕以言事遷大尉總樞柄絶朋黨晚進寒素難逰其門獨肇入謁常許袍帶從容談論既試有期知舉以取士白亦舊例也徳裕曰某不薦人然喜今榜得一狀元矣迨試果魁中任著作郎遷京兆府司録使相盧商裴休盧簡求爭辟之厯集賢學士歙宣池三州刺史所至皆有可紀後為吉州刺史卒靈溪集七卷右唐王貞白之文也貞字有道信州永豐人乾寧二年進士後七年調校書郎手編所為詩三百篇命曰靈溪集云慶元中洪文敏公邁為之序别集二趙韓王文集五卷右韓忠獻王趙普之文也讀書志云文集三卷而叙述甚畧希弁所藏文集一册列劉昌言所作行狀于前記一表疏二十九附手詔批答五奏狀劄子二十五附御詩二十一啟狀十詞帖三希弁又得其謝請班師批答一表於國史本傳賀平江南一表及與諸公遺書于國朝文粹通六十八篇以太宗皇帝御製神道碑冠于帙首并行狀為一卷次以記又次以表疏又次以奏狀劄子又次以啟狀詞帖成五卷碑稱晚嵗酷愛讀書經史百家常存几案强記黙識經目諳心碩學老儒宛有不及又為之銘曰經綸宏異學識通該傳亦稱普初以吏道聞寡學術及為相太祖常勸以讀書晚年手不釋卷謚以忠獻取慮國忘家薦可替否之法也追封韓王配享太祖皇帝廟庭韓魏王安陽集五十卷右魏忠獻王韓琦之文也王安陽人故以名集王字稚圭天聖五年進士第二人定䇿三朝功在國史神宗皇帝御製神道碑有云薨前一夕有大星殞於園中櫪馬皆鳴又曰公奉詔立皇子句被顧命立英宗為皇帝句立朕以承祖宗之序可謂定䇿元勛之臣矣又為之銘曰公行不歸中夕是悼尚想公儀淚落苑草復御篆十字填金以冠其額曰兩朝顧命定䇿元勛之碑贈尚書令謚忠獻取慮國忘家文賢有成之法也追封魏王配享英廟楊文公武夷集二十卷右楊文公億之文也景徳丁未公所自編序于前曰目之武夷蓋山林之士不忘維桑之情雕篆之文竊懐敝帚之愛命題之意蓋以是也集凡五百七十五篇公兩為翰林學士冦凖得罪公憂畏而卒自唐大中後文氣衰濫國朝稍革其弊至億乃振起風采與古之作者方駕矣景祐初贈禮部尚書謚曰文鎮國節度使駙馬都尉李朂乞加謚忠字奏雖不行詔付史館种𨼆君江南小集二卷右种放字明逸之文也明逸洛陽人少時徃來嵩華間慨然有山林之志隠居終南豹林谷自號雲溪醉叟又號退士聞陳摶之風徃見之放作樵夫拜庭下摶挽之而上曰君豈樵者耶二十年當為顯官名聞天下放曰放為道義官禄非所願也摶笑曰人之貴賤莫不有命貴者不可為賤亦猶賤者之不可為貴也君骨相當爾雖晦迹山林恐不能安異日當自知之太宗時召之不起真宗時召為左司諫携其手登龍圖閣論天下事累遷工部侍郎嘗侍宴真宗命羣臣賦詩杜鎬以素不屬辭誦北山移文以譏之真宗因出放所上時議十二篇謂近臣曰放為朕言事甚衆但人無知者耳放一日晨興忽取前後章疏槀焚之服道士服召諸生飲與訣酒數行而卒年六十贈工部尚書集凡二百九十四篇乃淳化三年李介所編者序謂以所集之地定名故曰江南小集云歐陽文忠公文集一百五十三卷附録五卷廬陵歐陽先生集六十一卷右歐陽文忠公修永叔之文也讀書志云文忠公集八十卷諫垣集八卷希弁所藏一百五十三卷内居士集五十卷外集二十五卷易童子問三卷外内制十一卷表奏書啟四六奏議二十五卷雜著述十九卷集古録跋語一十卷附録五卷别一本六十一卷乃舊物也張文定玉堂集二十卷右張文定公方平之文也公字安道宋城人明道二年以茂材異等擢為校書郎神廟時參大政元祐六年終於太子少師致仕贈司空謚文定公出入兩禁垂二十年一時大典多出其手劉忠肅嘗序其玉堂集二十卷乃在東坡所序樂全集四十卷之外淳熙九年錫山尤袤重刻于江西漕臺范文正公奏議十五卷右范文正公仲淹之奏議也皇祐五年韓魏王為河東經畧安撫使知并州時所序也公字希文蘇州人中進士第嘗與韓魏王開府涇州經畧邊事元昊請和召拜樞副除參知政事以資政殿學士户部侍郎卒贈兵書謚文正上篆其碑額曰褒賢别有丹陽集二十卷東坡先生序之王岐公華陽集一百卷右王文恭公珪之文也大觀二年詔故相岐國王公之家以文集來上其子朝奉大夫管勾南京鴻慶宫上䕶軍仲修等表進之許光疑為之序公字禹玉成都華陽人也舉進士廷試等二以左僕射岐國公薨於位贈太師謚文恭紹聖中為章惇所誣追貶萬安軍司户元符三年其子仲修訴父寃乃盡復故官贈謚及蔡京用事又以珪為臣不忠入黨籍哲宗嘗篆其碑額曰懿文徽宗又賜之曰元豐治定弼亮功臣范忠宣公文集二十卷右范忠宣公純仁之文也後三卷乃國史載公本傳及行狀公字堯夫文正公次子以恩補太祝中皇祐元年進士第再相元祐之間元符末自潁昌以大觀文中太乙宫使召以疾不赴薨上覽遺表震悼贈開府儀同三司謚忠宣賜其墓碑曰世濟忠直曽文昭公銘之四明樓鑰序其文别有臺諫論事五卷邊防奏議二十卷又在此文之外劉忠肅公文集四十卷右劉忠肅公摯之文也忠肅制誥附于後元城先生劉安世序之公名摯字莘老永靜軍東光人嘉祐中登進士甲科元祐六年拜右僕射出知鄆州紹聖四年責鼎州團練副使新州安置薨詔許歸𦵏追復觀文殿學士中興贈少師謚正肅以家諱改忠肅陳忠肅公諌垣集二卷右陳忠肅公瓘所作也瓘字瑩中延平人元豐二年進士甲科徽宗朝為右正言遷右司諌坐黨籍除名勒停送袁州編管崇寧初移亷州又移郴及彗出仆黨碑乃得自便靖康初贈諌議大夫擢其李子為密院檢詳嘗因奏對許刋其家集云道卿鄒忠公奏議十卷右鄒忠公浩之文也龜山先生為之序公字至全常州晉陵人舉進士累遷右正言上疏諌立劉皇后除名新州覊管然世所傳疏其辭詆訐蓋當時小人偽為之以激怒者也公之子柄後因賜對首辨此事且繳元疏副本上之詔付史館贈公寳文閣直學士謚曰忠趙豐公忠正徳文集十卷右豐國趙忠簡公鼎之文也始號得全居士集周文忠公序之曰髙宗中興用宰相十五人曰忠曰正曰徳曰文兼而有之者其惟趙公元鎮乎此非私言髙宗大書賜公云爾遂以名其集文謂唐用兵伐叛詔書付宰相乃下處報機急武宗必命徳裕起草與公事業如出一揆又謂徳裕自分司東都貶潮之司馬鼎奉祠四明以散官安置于潮徳裕貶朱崖司户而卒公亦移置此地薨於紹興十七年乾道四年賜謚忠簡上曰此謚甚稱陳俊卿曰真所謂正直無邪曰簡追封豐國公贈太傳配食髙廟胡文定公武夷集十五卷右胡文定公安國之文也公之子太常丞寧輪對奏事上問乃父既解釋春秋尚當有他論著其具以進徽猷閣直學士左承議郎致仕寅遂表上之安國子康侯建之崇安人中紹聖四年進士第終于寳文閣直學士謚文定呉康肅公湖山集四十三卷别集一卷和陶詩三卷附録三卷右呉康肅公芾之文也附録則行狀神道碑及謚誥周益公為之序公字明可台之仙居人紹興二年進士中第嘗為御史厯吏户禮刑少常伯給事中以龍圖閣直學士致仕卒謚康肅自號湖山居士云忠恪章公文集二十卷右章忠恪公誼之文也公字且叟丹陽人崇寧二年進士建炎三年通判杭州苗劉之變公正色以斥時希孟二賊就擒擢倉部外郎累遷樞密都承㫖同孫近使金國歸拜刑部尚書終于端明殿學士提舉明道宫謚忠恪集乃陳季習序許右丞襄陵文集二十二卷詩二卷行狀一卷右尚書右丞許翰之文也翰字崧老拱之襄邑人登元祐進士第建炎初元自提舉鴻慶宫召拜右丞屢章丐罷除資政提舉洞霄宫紹興二年以提舉萬夀觀召懇求外祠又乞致仕道卒于吉州贈光禄大夫行狀中載其章疏為多李莊簡公文集二十卷右李莊簡公光之文也光字泰發紹興中叅知政事庚申嵗金敗盟奪河南地光在榻前攻檜之短遂罷尋謫藤州移瓊州又移萬安檜死量移郴己卯用赦放還舟行至江州而卒洪文惠盤洲集八十卷右文惠公洪适之文也公字景伯紹興十二年與文安公遵同中博學宏詞科宰臣進呈所試制詞髙宗曰父在逺子能自立可嘉宜與陞擢遂除勅令所刪定官後三年文敏公邁亦中選由是洪氏文名滿天下适以乾道元年十二月拜通奉大夫尚書右僕射兼樞密使淳熙十一年二月薨於家前自撰遺表上之神道碑謚議附於集後孫尚書大全集五十七卷右孫覿之文也覿字仲益蘭陵人大觀三年進士常以靖康間文字得罪廢徙久之終于左朝奉郎龍圖閣待制趙中書棲雲集二十五卷右中書舎人趙昶之文也昶字莊叔紹興辛未入奉大對天子親擢為第一嘗卜居溪山間榜之曰棲雲故名其集潘文夀編周麟之所撰墓誌附于後徐學士北門集十二卷右徐鳯之文也盧壯父刻于瑞陽王荆公詩註五十卷右李文懿公璧所註魏文靖公了翁序孔毅文詩戯一卷右孔平仲毅甫之詩也向子諲跋之平仲父延之字長源生文仲武仲平仲皆登制科晚又得子極頴悟多才思有故人見其三子既顯貴以書勸長源歸休長源報書云某又有一子年七嵗能作梅花詩云舊葉落未盡新花開更繁俟其及第則致仕未幾而夭黄直講泉書十卷右國子監直講黄君俞之說也觀其自序蓋仁廟時閩人也所謂六經關言二傳節適三史訓彛五經續註六代史記惜不得而見之矣蒭蕘集十卷右從政郎差充嚴州州學教授鄭範撰進凡五十篇一曰叙篇叙述其所以言之意云别集類三河東先生文集十五卷右如京使知滄州河東伯栁開字仲塗之文也讀書志云柳仲塗集一卷希弁所藏乃十五卷咸平三年張景序云緝其遺文得九十六首成十五卷命之曰河東先生集行狀附于後亦景所撰也開著書號東郊野夫又號補亡先生作二傳以見意開垂絶語景曰吾十年著一書可行于世景為名之曰黙書辭義稍隠讀者難遽曉今載文集第一卷第一篇凡六百二十三言濓溪先生大成集七卷濓溪先生大全集七卷右周元公頥字茂叔之文也濓溪在營道之西蓋營川之支流也先生既不能返其故鄉卜居廬山之下築室溪上名曰濓溪書堂以無忘父母之邦之意學者因號為濓溪先生國朝道學始于先生嘉定十二年賜謚曰元太常丞臧格取主善行徳之法也淳祐初元詔從祀于學封舂陵伯始道守蕭一致刻先生遺文并附録七卷名曰大成集進士易統又刻于萍鄉名曰大全集然兩本俱有差誤今併參校而藏之明道先生文集四卷遺文九篇右程純公顥字伯淳之文也太師潞國公文彦博題其墓曰大宋明道先生程君伯淳之墓弟頥序其所以而刻之嘉定十二年謚曰純公取法所謂中正粹精也淳祐初詔從祀于學封河南伯此集并伊川集刻于長沙者南軒先生識其後曰右遺文九篇新安朱熹得之玉山汪應辰者敬授教授何藴俾嗣刻之河内先生文集六卷右太常博士尹源字子漸之文也源與弟洙俱以儒學知名趙元昊冦邊圍定川堡大將葛懐敏發涇原兵救之源與懐敏書曰賊舉其國而來其利不在城堡而兵法有不得而救者且吾軍畏怯見敵必赴而不計利害此其所以數敗也宜駐兵尾亭見利而後動懐敏不能用今此書不見于集中河南先生文集十五卷右起居舎人尹洙師魯之文也讀書志云尹師魯集二十卷希弁所藏二十七卷洙傳中所載亦同希弁嘗考邵氏聞見録云錢惟演守西都起雙桂樓建臨園驛命永叔師魯作記永叔文先成凡千餘言師魯曰某止用五百字可記文成永叔服其簡古永叔自此始為古文然二記皆不載于集中彭城先生文集六十卷右中書舍人劉攽字貢父之文也攽與兄敞同學自刻厲博讀羣書遂偕中第或曰原父將死戒子弟無得遽出其集曰後百餘年世好定當有知我者故貢父次其集藏之不肯出私謚曰公是先生貢父平生亦好諧謔與荆公素厚坐是亦相失及死子弟亦次其文私謚曰公非先生然今謂原父之文為公是集貢父止曰彭城集云東坡先生别集三十二卷續别集八卷右東坡先生别集續别集乃蘇公嶠刋置建安而刪畧者淳祐甲辰廬陵郡庠刻豫章先生别集二十卷黄文纂異一卷右豫章先生别集乃前集外集之未載者淳熈壬寅先生諸孫􅓌所編也后山先生文集五十五卷右陳師道無已之文也讀書志云二十卷希弁所藏乃紹興二年謝克家所叙者或謂二十卷者乃魏衍所編而讀書志不載清真先生文集二十四卷右周邦彦字美成之文也神宗時嘗奏汴都賦七千言上命近臣讀于邇英閣由諸生為學官哲宗寘之文館徽宗列之郎曹嘗守四明故樓忠簡公鑰序而刻之玉池先生文集十二卷右鄧忠臣字謹思之文也即覆議范忠宣公謚者以此入黨籍欽宗踐阼贈直秘閣初寮先生前集四十卷後集十卷右王安中字履道之文也讀書志止載初寮集十卷希弁所藏乃周益文忠公必大序前集中興以前後集中興以後文也内外制二十六卷則李文敏公邴序西塘先生文集二十卷右鄭俠字介甫之文也熙寧中監安上門時久不雨公以本門所見飢民及新法之不便者為圖狀發馬遞經銀臺投進且曰如行臣之言十日不雨乞斬臣宣徳門外神宗觀圖長嘘命馮京等體量新法而寢罷之大開倉庾以賑飢民下責躬詔三日大雨荆公率百僚入賀上出奏疏并圖以示之附麗新法者爭言公詆毁良法直奏驚御遂得罪云中興初贈朝奉郎官其孫一人元澤先生文集三十六卷右王雱字元澤之文也雱未冠著書已數千百言舉進士為旌徳尉作䇿三十餘篇極論天下事又作老子訓傳及佛書義解亦數萬言有以雱書聞者召見除太子中允崇政殿說書被㫖撰詩書義擢天章閣待制書成遷龍圖閣直學士雱不拜而卒雱論議刻深常稱商君以為豪傑之士言不誅異議者法不行嘗勸安石誅不用命大臣政和中封臨川伯從祀于學靖康初罷之集乃崇寧中盧崇編忠惠先生文集三十卷右翟汝文公㢲之文也公㢲丹陽人年十四登進士第徽宗朝為左史給事中吏部侍郎欽宗朝召直翰苑紹興中叅知政事終于資政殿學士提舉洞霄宫私謚忠惠文乃其子耆年編次附忠惠先生家傳于後梁谿先生文集一百七十卷右李忠定公綱之文也公字伯紀邵武人寓于常州無錫梁谿因以為號政和初年進士乙科宣和初為起居舎人以大水章疏罷黜靖康初為右丞親征行營使俄知樞密院河東北宣撫使罷知揚州提舉洞霄宫責授昭化節度副使建昌軍安置髙宗即位召拜右僕射凡七十五日而罷後贈少師謚忠定奏議中欽宗批答為多集有陳俊卿序朱文公後序浮溪先生文集六十卷猥槀外集一卷龍溪先生文集六十卷右汪藻字彥章之文也讀書志止載汪彥章集十卷希弁所藏浮溪龍溪兩本卷帙皆六十卷藻徳興人崇寧二年進士建炎中為中書舎人權直院紹興中為兵侍改翰林出知湖州改撫州提舉太平宫黜居于永累赦不宥凡八年而卒藻工於儷語所為制詞人多𫝊誦集乃孫覿序北海先生文集六十卷右綦崈禮字叔厚之文也叔厚髙密人登政和上舍進士第仕髙宗為翰林學士終寳文閣學士髙密郡侯贈朝議大夫楊萬里樓鑰為文集序行狀墓誌附于後致堂先生斐然集三十卷右禮部侍郎胡寅字明仲之文也章頴為序然與髙閌書責其請幸太學報秦檜書所謂願公修政任賢勿替初志尊王攘狄以開後功之說皆不載焉玉山先生表奏六卷右汪應辰聖錫之文也本名洋紹興五年進士第二黄中以有官遂升洋為第一洋乞避逺祖嫌名髙宗以其與王拱辰皆年十八遂賜今名五峰先生文集五卷右胡宏字仁仲之文門人張栻所序也南軒先生文集四十四卷右張宣公栻字敬夫之文也朱文公校定而為之序然紫巖棊圖跋語之類皆不載于集中晦菴先生文集一百卷續集一十卷右朱文公之文嘉熙己亥王埜刻于建安黄壯猷嗣成之識于後續集則王遂刋而序之然南康黄西坡諸處所刻墨帖之類或不在焉然則遺逸尚多有之象山先生文集二十八卷外集四卷右陸文安公九淵字子靜之文也嘗作書院於象山之上以待講學之士因以自號集有袁爕楊簡序嘉定十三年賜謚行狀謚議附復齋先生文集六卷右陸文安公之兄九齡字子夀之文也東萊吕太史所作墓誌附水心先生文集二十八卷右葉適字正則之文也門人趙汝鐺序而刻之水心其自號云篔牕先生初集三十卷續集三十八卷右陳耆卿字夀老之文也夀老台之臨海人初集葉水心為之序呉子良併刻于江西漕司于中沂邸牋表為多頥堂先生文集五十九卷碧雞漫志一卷長短句一卷祭文一卷右王灼晦叔之文也灼遂寧人嘗佐總幕故趙公為之序漫志可以見樂府之源委鶴山先生文集十三卷後集十卷續集十三卷别集十一卷右魏文靖公了翁字華父謫靖州日所作故名渠陽集云鴈湖先生詩集四十卷右李文懿公璧字季章之詩也璧文簡公燾之子嘗為叅知政事神道碑附于集後真文忠公徳秀所作也滄洲先生塵缶編三十五卷内外制二十四卷右程先生公許之文也先生字季與眉桂枝人嘉定辛未進士嘗以禮部侍郎兼侍講聖上親御翰墨以桂枝永芳世家及南山滄洲字賜之臞軒王邁為之序其集希弁生父郴倅墓銘先生筆也總龜先生松菊集五卷右阮閱之詩也建炎初以中奉大夫知袁州三山張先生質言四卷右張淵叔潜撰叔潜三山人嘗為左宣教郎樞宻院編修云石室先生百論十卷右陸子才所進也君論三十篇政事論二十篇臣論三十篇攻守論二十篇各有其目云别集類四莆陽居士蔡公文集三十卷右蔡忠惠公襄字君謨之文也讀書志止載蔡君謨集十七卷希弁所藏三十卷乃公之曾孫刑部郎洗所刋者陳叅政騤序得得居士乗桴集三卷戇草二卷右任忠敏公伯雨字徳翁之文也公眉山人元豐五年進士為左正言僅半嵗而上一百八疏以黨事編管通州遷儋耳移道州復官提點明道宫卒紹興中累贈右諫議謚忠敏集首刻朱震所作行狀藏六居士安樂集十二卷右安定郡王令畤之文也王字徳麟東坡先生為字說又嘗薦之乞召致館閣以風厲天下紹興初同知大宗正襲封安定薨之日嗣濮王仲湜言其貧無以殮乃命户部賜銀絹百匹兩贈開府儀同三司王薦宗室槀中所謂和衎自將居貧不撓則有右從政郎子孟者希弁曾大父清愿先生字醇父也家藏王之墨跡為多近時諸賢皆跋之退齋居士文集二十八卷右起居舎人侯延慶字季長之文也季長衡山人政和六年進士嘗侍講筵髙宗取杜詩直臣寧戮辱賢路不﨑嶇之句書扇以賜之兄彭老所為誌銘附集後介菴趙居士文集十卷右趙彦端字徳莊之文也徳莊寓居南昌登紹興八年進士第出更麾節入踐臺省凡奏對獻䇿陳述利害如蠲丁錢講治體禦敵守邊之謀用兵行賞之規議論醇正卓然皆有可用之實淳熙十四年江西運副趙彦操刻之于湖居士文集四十卷右張孝祥字安國之文也安國厯陽人紹興甲戌大魁多士明年入館浸登清華至中書舎人出典藩郡孝宗皇帝嘗有用不盡之歎安國筆法妙天下希弁伯祖伯崇得其詩曰趙侯富貴種而有巖壑姿同姓古所敦早晚蹋天墀又云徳髙欲余作字醉中不能謹也安國書徳髙乃伯祖字也介庵張居士文集七卷右張耕字莘翁之文也莘翁嘉泰壬戌進士終于清江别駕希弁妻之諸父也故生父師同為之序繼而程公許亦序之行狀則今應大叅㒡之筆雪齋居士文集二十卷右導江王咨字夢得之文也門人計運孫援李漢裒昌黎文章故事為序咨嘗知劍州其訓詞有曰早登儒科文采著見久更民事為朕所知云李泰伯退居類槀十二卷皇祐續槀八卷當語三卷周禮致太平論十卷後集六卷右李覯泰伯之文也覯旴江人嘗試制科六論不得其一曰吾書未嘗不讀必孟子註疏也擲而出人為檢視之果然遂下第而歸後以海門簿召赴太學說書以卒嘗自類其所為文曰天將夀我與所為固未足也不然斯亦足以藉手見古人矣其詳見于國朝儒學傳希弁嘗得修梓山寺殿記云應茂材異等科李覯撰然不載于槀中續元豐類槀四十卷右南豐先生遺文也建昌郡丞陳東叔魯刋而叙之掖垣類槀七卷玉堂類槀二十卷右周益文忠公必大之文也公自為之序性善堂槀十五卷右度正周卿之文也曹文簡公彦約為之序周卿巴川人紹熙元年進士嘗為禮部侍郎志隠類槀二十卷右許開仲啟之文也信安陳晅為之序開嘗為中奉大夫提舉武夷冲祐觀清江二王帖開為守時所刻東溪詩槀六卷右許玠介之之詩也周益公嘗親寫其漢宫春夜朱陵洞詞古離别出塞曲四篇而跋之友林詩槀二卷右史彌寧安卿之詩也集有黄景說曽丰序安卿嘉定中以國子舎生之望涖春坊事帶閣門宣贊舎人知邵陽雙峰猥槀八卷右舒邦佐平叔之文也開禧丙寅劉徳秀為之序平叔豫章雙谿人也湘中類槀三卷右楊叔虎文若之詩也環澗王容為之序文若長安人為武成宫諸生第一嘗任隂平太守得罪謫長沙云捄楮奏槀一卷右唐璘伯玉之奏疏也刻于江東漕司籌思堂孚齋文録十卷右張翃仲龍之文也李良為之序翃三山人嘗以隆興倅攝袁州腴齋詞草三卷右段允廸之作也允廸濟陽人乃武人之能文者陳朴厚黄庚序金陵吏餘四卷右劉榘帥建康日所作詩詞也豫章雜著二卷右馬某分教隆興日所作詩文也雲壑隠居集三卷浩歌集一卷右蔡柟堅老之作也柟嘗為宜春别駕云閑止堂集一卷右沈弇徳逺之作也趙蕃為之序弇之子兢莊可亦以詩名自號菊山此集乃莊可之手寫碧崖詩集五卷右閤皂山羽士甘夢叔叔懐之詩也叔懐嘗登晦菴誠齋之門楊長孺為之序東山詩文選十卷右葛紹體元承之作也家大酉應㒡為之序葉夢鼎跋其後行狀墓誌附焉煮瀑菴詩一卷右莆陽方左鉞武成之詩也劉克莊所作墓誌附葛無懐詩一卷右㑹稽葛天民無懐之詩也語録類河南程氏遺書二十五卷附録一卷外書十二卷右李籲吕大臨謝良佐游酢蘇昞諸人記二先生語十卷劉絢錄明道語四卷劉元承楊遵道周孚張繹唐棣鮑若雨鄒柄暢大隠諸人録伊川語十三卷附録則明道行狀劉立之朱光庭邢恕范祖禹叙述游酢書行狀後吕大臨哀詞明道墓表伊川年譜張繹祭文胡安國奏狀外書則拾遺也朱光庭録二卷陳淵本程氏學馮氏本羅氏本胡氏本游氏本春秋録大全集時氏本傳聞雜記各一卷朱文公記其後横渠先生語録三卷右張獻公載字子厚之語也公秦人舉嘉祐二年進士厯崇文檢書同知太常禮院議禮不合復以病請歸卒門人謚為明誠中子吕大臨為謚議有正䝉理窟二書行于世嘉定中有旨賜謚禮官議謚曰逹或者不以為然改議曰誠或者又以謚法至誠感神為疑乆之乃謚曰獻淳祐初從祀于學封郿伯云横渠先生經學理窟一卷右張獻公載之說也讀書志云理窟二卷右題金華先生未詳何人為程張之學者希弁所藏横渠先生經學理窟一卷其目有所謂周禮詩書宗法禮樂氣質義理學大原自道祭祀月令統䘮紀凡十二云元城先生語録三卷譚録一卷道䕶録兩卷右劉忠定公安世字器之之語也維揚馬永卿大年為之序器之大名人中熙寧六年進士第哲宗朝厯正言左史司諫右諫議中書舎人貶黜乆之至除名勒停送峽州編管起提舉鴻慶復直龍圖閣以卒昔有與蘇子瞻論元祐人才者至公則曰器之真鐵漢不可及也龜山先生語録四卷右楊文靖公時字中立之語也公閩人與游定夫謝顯道俱從游于明道先生之門嘗以著庭兼邇英殿說書遷祭酒擢右諫議除徽猷閣直學士工部侍郎兼侍講紹興五年卒初入見之際首言自古聖賢之君未有不以講學為先務者上深然之上蔡先生語録三卷右門人記録謝先生良佐字顯道之語也延平先生問答一卷右延平先生李侗愿中之語而晦菴先生所録也晦菴先生語録四十三卷右廖徳明輔廣余大雅陳文蔚李閎祖李方子葉賀孫潘時舉董銖竇從周金去偽李季扎萬人傑楊道夫徐寓林恪石洪慶徐容甘節黄義剛㬊淵龔蓋卿廖謙孫自修潘履孫湯泳林夔孫陳埴錢木之曽祖道沈僴郭友仁李儒用三十三人記録晦菴先生之語也李文惠公道𫝊持江東庾節刻于池陽黄幹書于目録之後晦菴先生語續録四十六卷右黄幹何鎬程端䝉周謨潘柄魏椿呉必大黄􅓌楊若海楊驤陳淳童伯羽鄭可學滕璘王立行游敬仲黄升卿周明作蔡㦛楊與立鄭南升歐陽謙之游倪楊至潘植王過董拱夀林學䝉林賜李儒用胡泳吕燾黄義剛吕夀昌楊長儒呉琮等四十一家記録晦庵先生語也内五家莫詳姓氏後一卷則前録廖徳明潘時舉董銖萬人傑徐寓林恪所遺也李性傳叙而刻之鄱陽朱子語畧二十卷右楊與立編次晦庵先生之語蕭一致刻于道州師誨三卷附録一卷右呉必大記録晦庵先生之語朱鑑刻于興國近思録十四卷右晦庵先生東萊先生集周張二程之說也續近思録十四卷右寳慶丁亥蔡模纂晦庵先生之語以續之五峰先生知言一卷右胡子宏字仁仲之說也門人張栻序之曰先生優游南山之下餘二十年玩心神明不舎晝夜力行所知親切至到析太極精微之藴窮皇王制作之端此書乃平日之所自著其言約其義精晚嵗嘗被召旨不幸寢疾不克造朝而卒云近世朝廷嘗索其書而賜之謚無垢先生心傳録十二卷右張文忠公九成字子韶之說也甥于恕編公以紹興三年狀元及第厯禮部侍郎兼侍講謫居南安十四年于不停披嵗久庭蹟依然公題于柱曰予平生嗜書老來目病執書就明於此者十四年矣倚立積乆雙趺隠然可一笑也因自號横浦居士寳慶初贈太師追封崇國公謚文忠云横浦日新二卷右門人郎􅁮記録無垢先生之說也南軒先生問答四卷右張宣公栻敬夫答門人之所問也敬夫魏國忠獻公之嗣子也忠獻都督諸軍事奏以公書冩機宜文字以軍事入見天子異其言詔以為直秘閣劉珙薦公學行志業遂與郡召為吏部員外郎兼侍講除左司知靜江治狀上聞特轉承事郎除修撰為湖北運副知江陵而卒且死猶手草遺表冩畢而絶學者稱為南軒先生嘉定八年賜謚張子太極解義一卷右張宣公解周元公太極之義二十先生西銘解義一卷右明道伊川吕大防微仲吕大臨與叔楊時中立游酢定夫尹焞彥明劉安節元承鮑若雨商霖李朴先之張九成子韶胡銓邦衡許景衡少伊郭雍子和謝諤昌國劉清之子澄張維祝禹圭錢聞詩子言張栻敬夫解横渠先生西銘之義也無極太極辨一卷右朱文公陸梭山象山往復論難之書也復禮齋語録一卷右楚澤李蓍之說也亦名桂林語録總括夫子言仁圖一卷右李蓍所著也羣經新說十二卷論五經疑難新說三卷右荆國文公王安石之說也傳道精語三十卷後集二十六卷右李方子編濂溪康節横渠明道伊川晦庵南軒東萊之說類而集之勉齋先生講義一卷右黄文肅公榦所講孟子義二十篇也總集類古文苑九卷右古文苑世傳孫巨源于佛寺經龕中得唐人所藏文章一編莫知誰氏録也皆史傳所不載文選所未取而間見于諸集及樂府好事者因以古文苑目之自石鼓文而下曰賦曰詩曰歌曰曲曰敕曰書曰對曰頌曰箴曰銘曰贊曰記曰碑曰雜文皆周秦漢人之作也容齋隨筆嘗引之然訛舛謬缺不敢是正淳熙中韓元吉之記己言之文苑英華一千卷右翰林學士中書舍人宋白等奉敕集始太宗皇帝既得諸國圖籍聚名士於朝詔修三大書其一曰文苑英華蓋以諸家文集其數實繁雖各擅所長亦榛蕪相間乃命白等精加銓擇以類編次為一千卷時太平興國七年九月也雍熙三年十二月壬寅上之賦五十卷詩一百八十卷歌行二十卷雜文二十九卷中書制誥四十卷翰林制誥五十三卷䇿問四卷䇿二十六卷判五十卷表七十四卷牋一卷狀十七卷檄二卷露布二卷彈文一卷移文一卷啟十六卷書二十七卷疏五卷序四十卷論二十二卷議十卷連珠喻對一卷頌八卷讚五卷銘六卷箴一卷傳五卷記三十八卷謚哀册五卷謚議二卷誄二卷碑九十一卷誌三十五卷墓表一卷行狀十卷祭文二十三卷通一千卷嘉泰改元周益公刻而記于前樂府集十卷樂府序解一卷樂府雜録一卷羯鼓録一卷右劉次莊所序也古樂府之所起二十二横吹曲二十四日月雲霞十九時序十一山水二十三佛道十二古人十七童謠三古婦人二十三美女十六酒六音樂十一遊樂十三離怨二十八雜歌行五十七都邑四十六宫殿樓臺十六征戍弋獵十七夷狄六蟲魚鳥獸三十三草木花果二十五次莊元祐間人也樂府雜録一卷朝議大夫守國子司業上柱國賜紫金魚袋段安節撰羯鼓録一卷婺州刺史南卓撰乃唐人也讀書志載古樂府於别集類而載段卓二録於樂類希弁所藏本乃刋三書為一集云國朝二百家名臣文粹三百卷右論著二十二門策四門書十門碑記十二門序六門雜文八門總目六分門六十二所謂二百家者趙普柳開張齊賢田錫冦凖張詠王禹偁孫何楊億劉筠陳堯咨錢惟演种放王曽夏竦晏殊穆修范仲淹孫堪宋庠宋祁余靖尹洙韓琦包拯文彥博孫甫孫抃蔡襄田况石介歐陽修元絳富弼張方平趙抃蘇舜欽祖無擇司馬光范鎮鮮于侁邵泌吕誨邵亢李覯王珪王安石韓維陳襄孫復王令崔公度劉敞王逢强至章望之劉恕周敦頥錢公輔文同孫覺鄧潤甫孫洙鄭獬楊繪劉攽蒲宗孟李清臣梅堯臣蘇洵吕惠卿曽鞏王無咎蔣之竒蘇軾蘇轍程顥王韶張載王回邵雍王鞏顔復胡宗愈劉摯章惇楊傑李常王覯孔文仲孔武仲范祖禹袁默吕陶鄧綰孫覽吕大臨張舜民張商英許安世鄭俠王雱黄庭堅曽肇顧臨史均陸佃龔原王巖叟劉涇劉安世張耒呉拭王安國徐禧楊時呉儔陳瓘晁補之劉弇楊天惠黄裳張剛鄒浩馮澥任伯雨周邦彥程頥秦觀李廌陳師道何去非王庠李之儀蘇過謝逸馬存鄭少微崔鶠馬涓李新王當侯溥唐庚晁詠之翟汝文范致明王雲宇文粹中王賞彭俊民汪藻汪伯彥黄定梅執禮蘇元老劉觀喻汝礪陳恬余安行唐重孫覿李若水王騰陳公輔韓駒林敏功何㮚李良臣洪皓胡宏范宗尹計有功劉一止熊彥詩楊椿馮時行張九成趙雍何熙志程敦厚張行成邵博黄成孫王之望李燾晁公遡劉望之宋逺孫洪邁郭雍張栻趙逵李石張震張孝祥楊萬里王十朋趙雄皇朝名臣經濟奏議一百五十卷右淳熙中趙忠定帥蜀時所進也一君道二帝繫三天道四百官五儒學六禮樂七賞刑八財賦九兵政十方域十一邊防十二總議自建隆迄靖康推尋嵗月槩見本末忠定自序於前紹熙之末忠定有定䇿功為侂胄誣貶久而論定賜謚追王配食寧廟游佀誌其神道之碑御篆額曰宗老元勛云宗藩文類六十卷右魏邸鑰天銓次也三祖而下各以昭穆編叙之凡朝廷之所褒嘉者為詔為制二十五卷凡名公鉅卿相與贊述者為表奏為記序為賦頌為詩歌與夫碑銘祭文等作三十五卷魏了翁為之序端平己亥鑰天自蜀來訪扣未盡之書希弁嘗以一二補其闕渠深惜太祖𣲖下文字獨少既而欲以燕王秦王初除防禦使制達之而未能云古文正宗前集二十二卷後集十二卷右集諸儒評論先秦兩漢三國二晉六朝唐及我宋諸公之文也諸儒鳴道集七十二卷右集濓溪洓水横渠二程上蔡元城龜山横浦諸公議論著述也于中有江民表心性說一卷安正忘筌集十卷崇安聖傳論二卷宋賢體要集十三卷右集曾鞏歐陽修王安石王令王安國呉子經周亶父王雱陳之方蘇軾蘇轍孫洙杜植曾宰鄭獬范鎮唐介姚闢所作也戛玉前集四十九卷後集五十卷右紹興壬戌楊存亮元明編近世諸公舉業雜文類而次之中興六臣進䇿十二卷右紹興五年前宰執吕頥浩李綱汪伯彦李邴張守王絢韓肖胄答詔旨所問戰守方畧之策也中興羣公吟槀四十八卷右中興以來一百五十三人之詩也四靈詩四卷右趙師秀字靈秀翁卷字靈舒徐璣字靈囦徐照字靈暉四人之詩也法帖類御製太清樓閱書歌一卷右真宗皇帝御製賜張耆以下徽宗皇帝髙宗皇帝跋其後御製唐十八學士圖贊一卷右欽宗皇帝御書賜張叔夜御書真草孝經一卷右髙宗皇帝御書賜尚書右僕射兼樞密使秦檜時紹興九年六月辛酉檜請刻之石上曰十八章世人以為童蒙之書不知聖人精微之學不出乎此朕宫中無事因學草聖遂以賜卿豈足傳後檜請再三乃從之十四年七月從左宣教郎守殿中侍御史汪勃所請詔令諸州刋石賜見任官并係學籍諸生云御臨法帖十卷右髙宗皇帝臨晉唐諸人之帖也秦檜跋御製聖安夀仁太上皇帝聖政序一卷右寧宗皇帝御製光宗皇帝聖政序也謝深甫跋其下淳熙秘閣續法帖十卷右淳熙十二年三月十九日奉聖旨摸勒鍾繇諸人帖羣玉堂帖十卷右嘉定元年四月二十四日省劄下秘書收省藏蓋韓平原家本也故卷尾有印曰閱古審定法書之印永興軍節度使印篇首則三朝宸翰有璽文曰呉娃之章呉氏書印呉娃翰墨寳章妙墨宜爾子孫世世寳之康夀珍坃皆憲聖慈烈皇后之記也二王帖三卷右清江所刻羲之獻之帖也二像冠于篇端引周子中之言曰心慕二王之人品則瞻之在前手追二王之墨妙則忽然在後目録註釋具於卷末篆書千文一卷右徐鉉篆周興嗣之音也希弁嘗考徽宗皇帝實録政和三年四月辛卯詔避廟諱改曰嚴與敬為曰嚴與謹勞謙謹勅為勞謙兢勅籍甚無竟為籍甚無罄璇璣懸斡為璇璣遷幹云星鳯樓帖右曹文簡公彦約家所刻也甲秀堂帖右廬山陳氏所刻也鳯墅帖二十卷畫帖二卷續帖四卷右廬陵曽宏父刻國朝聖賢帖也東坡先生帖三十卷右玉山汪應辰聖錫所刻也山谷先生帖五卷右張孝祥跋山谷之姪虨所藏卷後引徽宗皇帝評公之書謂如抱道足學之士坐髙車駟馬之上横斜髙下無不如意云張忠文奏議一卷右張忠文公叔夜圍城中奏議也李綱李彌遜趙子淔胡世將沈調諸公跋其後趙延康帖右髙宗皇帝賜趙子崧書一幅後用御名圖書其次則子崧與張邦昌一書與王時雍諸人一書親茟也張魏公帖一卷右張忠獻公帖篇端紫巖碁圖乃忠獻及陳逍遥二老畫像南軒先生跋其下張宣公帖四卷右南軒先生帖遺表終焉表云再世䝉恩一心報國大命至此厥路無由猶有微誠不能自己伏願陛下親君子逺小人信任防一已之徧好惡公天下之理永清四海克鞏丕圖臣死之日猶生之年臣栻朱文公帖六卷右南康黄西坡所藏先生之帖而郡守錢明徳并項平菴跋語刻之于中可以補晦翁大全集之闕者為多張紫微帖一卷右厯陽張孝祥帖尋陽陶思贊所刻歐陽公集古録跋尾六卷拾遺一卷右周益公跋方崧卿所刋雖非石刻亦真蹟也故附於法帖之後拾遺春秋集善十一卷右胡忠簡公銓為敷文閣直學士提舉江州太平興國宫日被旨投進之書也其說多引易以證之張忠獻公浚為之序論語集程氏說二卷孟子集程氏說一卷右左宣教郎建寧府教授湯烈編集程氏二先生論孟說也二先生議論答問散在諸集學者未能徧觀烈取遺書語録與夫門人編纂之言條而類之于逐章之下續又得論語說一百二十有九孟子說六十有八附于卷末曰拾遺云論語意原十卷右東谷鄭汝諧所著也然所原三仁等說晦庵先生多不然之晦庵謂論語只言微子去之初無面縳啣璧之說今乃捨孔子而從左氏史遷已自難信义不得已而曲為之說以為微子之去乃去紂而適其封國則尤為無㨿矣疑孟一卷右温國司馬文正公光所著也公疑孟子之書有非軻之言者故為疑孟十有一篇建安余允文乃為尊孟辨於温公之疑逐段為之辨晦庵先生又於允疑之後逐段為之說云孝經解一卷右張文忠公九成所解也孝經說一卷右蒙齋先生袁公甫親筆也甫字廣微潔齋先生之子也大學衍義四十三卷右真文忠公徳秀為户部尚書日所進也因大學條目而附之以經史首之以帝王為治之序次之以帝王為學之本是之謂綱首之以明道術辨人才審治體察民情次之以崇敬畏戒逸欲又次之以謹言動正威儀又次之以重妃匹嚴内治定國本教戚屬是之謂目每條之中首之以聖賢之典訓次之以古今之事迹諸儒之釋經論史有發明者録之而公之說亦附見焉小學之書四卷右朱文公先生所編也有内篇有外篇其宏綱有三曰立教曰明倫曰敬身明倫則有父子君臣夫婦長幼朋友之品敬身則有心術威儀衣服飲食之目又採摭古今經傳書史之所紀載曰稽古曰嘉言曰善行以廣其教而實其事小學之工程大學之門户也越絶書十五卷右越復讎之書也或以為子貢所作或疑似子胥所作皆無所據故曰越絶誰所作呉越賢者所作也隋經籍志十六卷崇文總目十五卷希弁考其所以第一卷荆平王内傳第二卷外傳記吳地第三卷吳内傳第四卷計倪内經第五卷請糴内傳第六卷外傳策考第七卷外傳記范伯内傳陳成􅀈第八卷外傳記地𫝊第九卷外傳計倪第十卷外傳記吳王占夢第十一卷外傳記寶劍第十二卷内經九術外傳記軍氣第十三卷外傳枕中第十四卷外傳春申君徳序外傳第十五卷篇叙外傳此十五卷也然第一卷有所謂越絶外傳本事一篇此其為十六卷歟蔡邕獨斷二卷右漢左中郎將陳留蔡邕撰雜記自古國家及漢朝故事王莽無髮蓋見於此資治通鑑釋文二十八卷右奉議郎行秘書省著作佐郎兼侍講賜緋魚袋司馬康所集也康字公體温公之子也内傳國語十卷右劉攽戇父所作也以其異於外傳國語故曰内傳云其兄敞原父題辭神宗聖訓二十卷右試太學録林虙所集也虙乃希之妷以所聞神宗聖訓記録分一百門擬續五朝寳訓崇寧中上於朝云韓忠獻王遺事一卷右羣牧判官朝奉郎尚書職方員外郎上騎都尉强至編次韓魏王琦言行也始韓忠彦編次家傳王巖叟編次别録至又編次其遺事云厯代氏族言行類槀六十卷右武夷章定以厯代迄本朝名賢言行之迹類姓成編凡一千一百八十九姓云古今年號録五卷右紹熙中臨安府免解進士侯望所進也其說謂自漢建元至今一千三百三十五年正偽年號總八百三十八為字二百三十五有重用三用至九用者列子釋文二卷右唐當塗縣丞殷敬順撰說𤣥一卷右温國司馬文正公光所著也天象賦一卷右題後漢尚書張衡撰蜀丞相諸葛亮注然注中引用晉事決非亮也希弁嘗以秘書省闕書目考之天象賦一卷張衡撰李淳風注疑此為是𤣥綱三卷神仙可學論一卷形神可固論一卷右唐中嶽嵩陽宫道士宗𤣥先生呉筠貞節所進修行之要㫖也一曰明道徳二曰辨法教三曰析疑滯𤣥宗批答云詞簡旨奥義博文精足以𢎞闡格言發明幽致國朝官制沿革一卷右黄元禮琮所編也職官記一卷右三晉張縯所編也其說謂元豐官制名實正矣惟是祖宗因官制以别流品之意當時初不講明及之故寄禄之階條理未盡若叅以舊典則得失可見遂先立元豐寄禄新格以祖宗舊官遷轉之法叅列於後云續文房四譜五卷右題柯田山樵編蓋續蘇易簡之書也秘書省闕書目云李洪編夷堅志四十八卷右洪文敏公邁記異志怪之書也其名蓋取列子所謂大禹行而見之伯益知而名之夷堅聞而志之說者謂夷堅乃古之博物者云義林十卷右起居舎人兼中書舎人兼侍講眉山程敦厚所述也凡一百一十二篇摭取千百載人物而尚論之張文忠公九成嘗謂如論姚崇不進制心之說而以十事諫王莽之文姦言起於嚴助朱買臣天誘君子以甚難王伯自用心始鄭伯上欲為舜下欲為周公文帝斗粟之譏所以致刑措景帝殺臨江王天下安之而不疑蕭何萬世之功在王漢中用韓信絳侯無出塞功衛霍有絶漠賞仲連鄒陽同傳平勃合於輿權之說皆深見眇微而發古人用心處議論卓然在人意表云常譚二卷右河南呉箕和父雜記經子史傳之事二百餘條視聴鈔三卷右國子博士呉莘商卿得之聞見示後人以勸戒凡六十四事云武昌志三十卷右郡守古括王信所修也詩文附焉萍實志十卷續志二卷右邑宰周世昌所修征官王大節所續也都梁志六卷右郡守何季羽所修也詩文附焉嶺外代答十卷右周去非直夫記廣右二十五郡疆場之事經國之具荒忽誕漫之俗瑰詭譎怪之産耳目所治與得諸學士大夫之緒談者四百條云秘書省闕書目四卷右秘書省見闕書之目也楚辭故訓傳六卷楚辭草木疏一卷楚辭補音一卷右建寧倅谷水林至所著也李大異為之序河海英靈集二卷右唐丹陽進士殷璠集常建李白王維劉謹虚張渭王季友陶翰李頎髙適岑參崔顥薛㨿綦母潜孟浩然崔國輔儲光羲王昌齡賀蘭進明崔曙王灣祖詠盧象李嶷閻防二十四人之詩璠謂諸人皆河海英靈也故以名集凡二百四十三首云唐賢絶句一卷右莆田柯夢得所選李白杜甫元結王維韋應物賀知章岑參靈徹張繼郎士兀盧綸司空文明韓愈柳宗元張籍賈島陳羽劉禹錫元稹白居易杜牧竇庠竇鞏張祜徐凝王建于鵠朱絳許渾雍陶陳陶李播劉商羊士諤楊敬之司空圖薛能鄭谷王涯李渉楊憑崔櫓劉昭屬陸龜䝉狄歸昌章碣劉得仁許纏吉師老張顛杜荀鶴呉融韓偓韋莊五十四人之作白止四首甫六首愈八首宗元四首惟牧二十五首云衆妙集一卷右汴人趙師秀編沈佺盧象王維孟浩然錢起周賀于武陵李頻秦系劉長卿李嘉祐楊巨源劉得仁朱慶餘雍陶郎士元崔塗皇甫曾皇甫冉包佶司空曙耿緯嚴維李端韓翃戴叔倫盧綸祖詠綦母潜方干靈一無可䕶國貫休岑參張衆甫張南史周朴張蠙張祐李季蘭許渾張祜馬戴張循之張繼章八元李益張喬吕温于鵠崔顥項斯崔峒包何竇常趙嘏薛能劉威鄭谷韓偓羅隠李羣玉皮日休杜荀鶴張籍任藩劉商楊發處黙戎昱于良史王灣林寛劉禹錫王貞白七十六人之作二妙集一卷右汴人趙師秀選賈島姚合詩也宣和御製詩一卷右徽宗皇帝賜張忠文公叔夜之詩也凡二十有八篇云巴東集一卷右萊國忠愍公冦凖之詩也讀書志云冦忠愍詩三卷希弁所藏巴東集乃公自編而為之序凡一百五十有六篇秋風亭記附按公本傳云巴東有秋風亭公析韋應物一言為二句云野水無人渡孤舟盡日横識者知其必大用凡五年不得代邑庭有二栢民以比甘棠集後有范忠文諸公題秋風亭詩然東坡亦有詩曰萊公昔未遇寂寞在巴東聞道山中樹獨餘手種松惜不之載焉晦翁先生朱文公語後録二十卷右東陽王佖記楊方黄榦劉炎黄灝邵浩劉砥李煇黄卓汪徳輔陳芝呉振呉雉林子䝉林學履劉礪鍾震蕭佐舒髙魏椿楊至所録也其說謂池録初成勉齋猶未免有遺恨於刋行之後况饒本又出於其後乎此二十卷皆池饒所未及刋者稽其所自證其所得嘗屢反復焉無一語或敢不謹也又謂晦翁始與南軒講于嶽麓後與東萊及象山講于鵝湖此皆先賢講論大端深恨從游者莫能録其所聞以示後世云晦庵先生朱文公語續録後集二十五卷右楊方黄榦包揚劉炎劉子寰邵浩劉砥劉礪李煇陳芝黄灝黄卓汪徳輔呉振呉雉鍾震林子䝉林學履蕭佐舒髙魏椿楊至二十二人記録晦庵先生之語也蔡杭將詣江東集而刻之曲江帖五卷後帖一卷右二蘇劉元城鄒道卿黄山谷王金陵曾文清韓吕諸公之帖也花蘂夫人詩一卷右蜀孟昶愛姬也青城費氏女幼能屬文長于詩宫詞尤有思致蜀平以俘輪織室後有罪賜死此卷乃王安國寫入館者毛恕鐫于衡陽郡齋讀書志卷五下昭德先生郡齋讀書後志序昭德先生校井氏書為讀書志四卷番陽黎侯傳本於蜀刋之宜春郡齋且取希弁家所藏書删其重􅃨摭所未有益為五卷别以讀書附志三衢游史君蜀人也亦以蜀本鋟諸梓乃衍而為二十卷書加多焉盖先生門人姚君應績所編也按先生自序余家自文元公來以翰墨顯者七世故家多書然自中原無事時已有火厄及兵戈之後尺素不存而杜君鵬舉所序扣之古松流水之間亦止於四卷則方其得南陽藏書時固未多也其殆三榮校讀之後網羅其家散失裒彚漸夥或者先生續筆邪抑門人推廣其遺志也今考姚君所編杜序獨缺而不著而著先生自序有所謂合吾家舊藏得若干卷疑於尺素不存之語自相牴牾希弁摘取其所増入者凡四百三十五部總八千二百四十五卷往往皆晁氏之書請於郡而併刋焉然四卷既傳矣不敢以附志次其先自為讀書後志二卷然後井晁二氏藏書之富其目大備希弁家三世所藏因以託不朽云郡侯命序梗概於卷首至若二本所載井氏四卷之書其間有實同而名異此備而彼遺與夫分種入類之各不同又為考異於編末淳祐庚戌日南至江西漕貢進士秘書省校勘書籍趙希弁謹序欽定四庫全書郡齋讀書後志卷一宋趙希弁撰經類周易甘棠正義三十卷右梁任正一撰以孔頴達為本甘棠云者正一嘗為陜州司馬故名其書坤鑿度二卷右題曰包羲氏先文軒轅氏演古籀文蒼頡修按隋唐志及崇文總目皆無之至元祐田氏書目始載焉當是國朝人依託為之周易緯稽覽圖二卷周易緯是類謀一卷周易緯辨終備一卷周易緯乾元敘制記一卷周易緯坤靈圖一卷易通驗卦二卷右漢鄭𤣥注按隋志有鄭氏注易緯八卷唐志有宋均注易緯九卷李氏本注與隋志同卷數與唐志同家本葢出李氏獨不載乾鑿度二卷而有乾元敘制一卷按後漢注七緯名亦無乾元敘制周易開𤣥關一卷右唐蘇鶚撰自序云五代祖晉官至吏部侍郎學兼天人嘗製八卦論為世所傳遭亂遺墜而編簡尚有存者鶚乃畧演其㫖於此周易流演五卷右唐成𤣥英撰錯綜六十四卦演九宫以直年月日推國家之吉凶𤣥英道士也故道藏録之或云釋仁英撰未知孰是周易啟源一十卷右蔡廣成撰李邯鄲云唐人田偉置于王昭素之下今從李説有徳恒伯言徳膚徳翰四目皆作問對凡三十六篇陸秉意學十卷右皇朝陸秉撰秉字端夫舊名東寶元二年以此書奏御勅書嘉奬秉嘗通判蜀州首篇論易之名頗采參同契之説邵古周易解五卷右皇朝邵古天叟撰古雍之父也世本范陽治平初卒于洛年七十九其學先正音文云代淵易論二十卷右皇朝代淵撰國史藝文志有其目徐庸易意縕一卷右皇朝徐庸撰庸以春秋凡例易亦有之故著書九篇號意縕凡例總論其學祖劉牧陸秉云徂徠先生周易五卷右皇朝石介守道撰景迂云易古文十二篇先儒謂費直專以彖象文言參解易爻以彖象文言雜入卦中者自費氏始孔頴達云王輔嗣又分爻之象辭各附當爻則費氏初變古制時猶若今乾卦彖象繫卦之末歟古經始變于費氏卒大亂於王弼惜哉今學者曾不之知也石守道亦曰孔子作彖象於六爻之前小象係逐爻之下惟乾悉屬之於後者譲也嗚呼他人尚何責哉家本不見此文豈介後覺其誤改之歟宋咸易訓三卷右皇朝宋咸撰咸自序云予既以補註易奏御而男億請餘義凡百餘篇端因以易訓名之葢言不敢以傳世特敎其子而已頗論陸希聲劉牧鮮于侁得失云横渠易説十卷右皇朝張載子厚撰載居横渠故以名書其解甚畧繫辭差詳張弼易十卷右皇朝張弼興化軍人章惇薦于朝賜號葆光處士紹聖二年黄裳等再薦之詔以為福州司户本州敎授其易學頗宗鄭氏河圖解二卷右皇朝康平撰凡五十二篇王湜易學一卷右皇朝王湜同州人早潛心於邵康節之學其序曰康節有云理有未見不可强求使通故愚於觀物篇之所得既推其所不疑又存其所可疑亦以先生之言自慎不敢輕其去取故也兼山易解二卷右郭忠孝撰忠孝字立之河南人頗明象數自謂得李挺之卦變論于陳子惠因亟讀有得焉靖康中持憲關右死于難故其書散落大半孫莘老尚書解十三卷右皇朝孫覺莘老撰覺仕元祐至謂康王以喪服見諸侯為非禮蘇氏之説葢本于此毛詩辨疑一卷右皇朝楊時中立撰開寶通禮二百卷右皇朝劉溫叟等撰開寶中詔溫叟同李昉盧多遜扈䝉楊昭儉賈黄中和峴陳諤損益開元禮為之附益以國朝新制太常因革禮一百卷右皇朝姚闢蘇洵撰嘉祐中歐陽修言禮院文書放軼請禮官編修六年用張洞奏以命闢洵至治平二年乃成詔賜以名李清臣云開寶已後三輯禮書推其要歸嘉祐尤悉然繁簡失中訛缺不補豈有拘而不得騁乎何楦釀之甚也郊廟禮文三十一卷右皇朝楊完撰元豐初以郊廟禮文訛舛詔陳襄李淸臣王存黄履何洵直孫諤楊完就太常寺檢討歴代㳂革以詔考其得失又命陸佃張璪詳定後以前後嘗進禮文獨令完編類五年成書奏御其書雖援據廣博而雜出衆手前後屢見繁猥為甚云周禮義辨疑一卷右皇朝楊時中立撰集諡總録一卷右皇朝孫緯撰春明退朝録嘗集類國朝諡幾二百人緯任宗正寺丞日因宋氏之舊纂元豐已後遂得三百餘人自宗室宰相以下分為九等其序畧云有爵位已高當得諡而未聞者若范質吕餘慶韓崇訓王博文姜遵王沔是也太常禮書一百五十卷右皇朝陳祥道用之撰祥道元祐初以左宣義郎任太常博士解禮之名物且繪其象甚精博朝廷聞之給札繕寫奏御今世傳止五十卷予愛之而恨其缺少得是本於敘州通判盧彭年家其象目以五彩飾之於是始見其全書云聲律要訣十卷右唐上黨郡司馬田疇撰疇序謂一切樂器依律吕之聲皆須本月真響若但執累黍之文則律吕隂陽不復諧矣故據經史參校短長為此書云琵琶故事一卷右未詳何人所纂敎坊記一卷右唐崔令欽撰開元中敎坊特盛令欽記之率鄙俗事非有益於正樂也皇祐樂記三卷右皇朝胡瑗等撰皇祐二年下詔曰國初循用王朴樂太祖患其聲高令和峴減下一律然猶未全命瑗同阮逸等二十餘人再定四年樂成奏之上御紫宸殿觀焉此其説也范蜀公樂書一卷右皇朝范鎮景仁撰景仁論樂宗房庶潛心四十餘年出私財鑄樂器元祐中奏御樂府詩集一百卷右皇朝郭茂倩編次取古今樂府分十二門郊廟歌辭十二燕射歌辭三鼓吹曲辭五横吹曲辭五相和歌辭十八清商曲辭八舞曲歌辭五琴曲歌辭四雜曲歌辭十八近代歌辭四雜謡歌辭七新樂府詞十一通為百卷包括傳記辭曲畧無遺軼春秋經社六卷右皇朝孫覺撰其學亦出於啖趙凡四十餘門論議頗嚴春秋演聖統例二十卷右皇朝丁副撰田偉書目副作嗣未知孰誤其序云經有例法一家所至較然重輕杜預釋例專左氏而未該唐陸淳纂例雖舉經而未備纎悉絓羅而咸在者其唯此書乎春秋名號歸一圖二卷右偽蜀馮繼先撰左氏所書人不但稱其名或字或號或爵諡多互見學者苦之繼先皆取以繋之名下云帝王歴紀譜三卷右題曰秦相荀卿撰載周末列國世家故一名春秋公子血脈圖頗多疎畧决非荀卿所著且卿未嘗相秦豈世别有一荀卿邪皇侃論語十卷右梁皇侃撰古今論語之注多矣何晏集七家復采古論語注為集解行于世侃今又引衛瓘繆播欒肇郭象蔡謨袁宏江惇蔡奚李充孫綽周懷范寗王珉凡十三家之説成此書其序稱江熙所集世謂其引事雖時近詭異而援證精博為後學所宗云王令論語十卷右皇朝王令逢原撰解堯曰篇云四海不困窮則天禄不永終矣王安石書新義取之吕與叔論語解十卷右皇朝吕大臨撰大臨雖程正叔之徒解經不盡用其師説汪氏論語直解十卷右皇朝汪革撰革字信民撫州人紹聖中試禮部為天下第一嘗語人曰吾鄉有二宰相一為天下之福一為天下之禍葢指晏元獻王荆公也即此可見其解經淵源所自云經解類六説五卷右唐劉迅撰迅著書以擬六經此乃其敘篇唯易闕而不言故止五卷云匡謬正俗八卷右唐顏籀師古撰以世俗之言多謬誤質諸經史刋而正之永徽中其子揚庭上之演聖通論四十九卷右皇朝胡旦撰論六經傳注得失易十六卷書七卷詩十卷禮記十六卷而春秋論别行天聖中嘗獻于朝博辨精詳學者宗焉小學類爾雅音畧三卷右偽蜀母昭裔撰爾雅舊有釋智騫及陸朗釋文昭裔以一字有兩音或三音後生疑于呼讀今釋其文義最明者為定小爾雅一卷右孔氏古文也見于孔鮒書急就章一卷右漢史游撰唐顏師古注游元帝時為黄門令書凡三十二章雜記姓名諸物五官等字以敎童䝉急就者謂字之難知者緩急可就而求焉自昔善小學者多書此故有皇象鍾繇衛夫人王羲之所書傳于世智永千字文一卷右梁周興嗣撰釋智永所書于禄字書一卷右唐顏元孫纂以經史所用為正世所行為俗三者之間為通凡三體林氏小説三卷右唐林罕撰凡五百四十一字其説頗與許慎不同而互有得失邵必縁進禮記石經陛對仁宗顧問罕之書如何必曰雖有所長而微好怪説文歸字從堆從止從帚以堆為聲罕云從追於聲為近此長於許氏矣説文哭從吅從獄省罕乃云象犬嘷此怪也有石刻在成都公武嘗從數友就觀之其解字殊可駭笑者不疑好怪之論誠然翰林禁經八卷右唐李陽氷撰論書勢筆法所禁故以名書墨藪十卷右高陽許歸與編未詳何代人李氏書目止五卷而梁武評書王逸少筆勢論皆别出臨池妙訣三卷右未詳撰人後有江南李煜述書古文四聲五卷右皇朝夏竦撰博採古文竒字分四聲編次以便檢尋周越書苑十五卷右皇朝周越撰越以善書名世天聖八年四月成此書奏御故其序稱臣越臣兄起於柳公權書又云亡兄間稱名而不臣似未精討論也唐藏經音義四卷右未詳撰人分四聲以類相從蜀中印本也英公字源一卷右皇朝釋夢英撰夢英通篆籀之學書偏旁五百三十九字郭忠恕云按説文字源唯有五百四十部子字合收在子部今目録妄有更改又集解中誤收去部在注中今㸃檢偏旁少晶惢至龜弦五字故知林氏虛誕誤後進其小説可焚夢英因書此以正之柴禹錫為立石唐氏字説解一百二十卷右皇朝唐耜撰紹聖以來用字説程試諸生解者甚衆耜集成此書頗注其用事所出一時稱之耜知卭州日奏御五代史一百五十卷右皇朝薛居正等撰開寶中詔修梁唐晉漢周書盧多遜扈䝉張澹李昉劉兼李穆李九齡同修居正監修兩朝國史一百二十卷右仁宗英宗兩朝國史也王珪等撰元豐五年六月甲寅奏御監修王珪史官蒲宗孟李清臣王存趙彦若曾肇賜銀絹有差蘇頌黄履林希蔡卞劉奉世以它職罷去呉充宋敏求前死皆有賜賚紀五卷志四十五卷比之實録事迹頗多但非冦凖而是丁謂託之神宗詔㫖編年類帝王鏡畧一卷右唐劉軻撰自開闢迄唐初帝王世次綴為四言以訓童䝉偽蜀馮鑑續之至唐末運厯圖六卷右皇朝龔頴撰起於秦昭王滅周之嵗乙巳止於國朝雍禧丁亥以歴代興亡大事附見其下四年獻於朝優詔奬之歐陽公嘗據之考正集古目録稱其精博按晉史張軌世襲凉州如但稱愍帝建興年號其間唯張祚纂竊改建興四十二年為和平元年始奉穆帝升平之朔始末不聞有改元事唯頴書載張實改元曰永安張茂改元曰永元張重華曰永樂曰和平張元龍曰太始張天錫曰太清張大豫曰鳯凰不知頴何所據而言或云出崔鴻十六國春秋鴻書久不傳于世莫得而考焉編年通載十五卷右皇朝張衡撰衡觀四部書至古今纂輯運厯書十餘家皆淺陋楦釀無足細繹乃編歴代年號貫以甲子始于帝堯訖于國朝治平丁未質之經史資以傳記百家之書聖賢勲徳奸雄纂竊及蠻夷盜賊凡繋於存亡綱紀之大者無不詳録總三千四百年且刋正謬誤如史記載舜年虞書不同漢紀載魏受漢禪與魏志受禪壇碑各異之類熙寧七年表獻之通鑑舉要厯八十卷右皇朝司馬光撰通鑑奏御之明日輔臣亟請觀焉神宗出而示之每編始末識以睿思殿寶章葢尊寵其書如此公尚患本書浩大故為舉要云寶厯歌一卷右未詳撰人以開闢太古迄于周世宗正綂帝王世次諡號成七言韻語一通歴代紀元賦一卷右皇朝楊億撰次漢至五代正綂年號為賦一首又别為宋頌四章實録類唐高祖實録二十卷右唐房𤣥齡等撰太宗詔𤣥齡與許敬宗敬播同修起創業盡武徳九年貞觀十七年書成唐太宗實録四十卷右唐許敬宗等撰起即位盡貞觀二十三年初貞觀十七年房𤣥齡許敬宗敬播撰今上實録止十四年成二十卷永徽五年無忌與史臣續十五年後盡昭陵事合四十卷其後敬宗改定唐高宗實録三十卷右唐劉知幾等撰起即位盡永淳二年凡二十九年初令狐徳棻許敬宗等撰録止顯慶三年成二十卷上之後知幾與呉兢續成唐中宗實録二十卷右唐呉兢撰起神龍元年復位盡景龍四年凡六年唐睿宗實録十卷右唐劉知幾撰知幾與呉兢先修太上皇實録起初誕止傳位凡四年後續修益止山陵唐𤣥宗實録一百卷右唐元載等撰起即位盡上元三年凡五十年安史之亂𤣥宗起居注亡大厯中史官令狐峘裒掇詔䇿備一朝之遺闕開元天寶間君臣事多漏畧唐肅宗實録三十卷右唐元載等撰起即位盡後元年凡六年唐徳宗實録五十卷右唐裴垍等撰起即位盡貞元二十一年凡二十五年元和二年詔蔣乂樊紳林寶韋處厚獨孤郁同修五年垍上之唐憲宗實録四十卷右唐路隋等撰起即位盡元和十五年初穆宗長慶二年詔監修國史杜元頴與史官韋處厚路隋沈傳師鄭澣宇文籍等修元和實録未及成書太和四年隋與蘇景裔陳夷行李漢蔣係續成上之綂例取捨皆出處厚焉唐穆宗實録二十卷右唐路隋等撰起即位盡長慶四年案文宗實録太和四年隋與蘇景裔等上憲宗實録後有王彥威楊漢公蘇滌裴休竝為史官云唐文宗實録四十卷右唐魏謩等撰起即位盡開成五年凡十四年宣宗大中八年史官蔣偕牛叢王諷盧吉同修唐武宗實録一卷右唐韋保衡等撰武宗以後實録皆亡今存止㑹昌元年正月二月唐宣宗實録三十卷懿宗實録三十卷僖宗實録三十卷昭宗實録三十卷哀宗實録八卷右國朝宋敏求次道嘗補宣宗實録三十卷懿宗實録三十卷僖宗實録三十卷昭宗實録三十卷哀宗實録八卷通百二十八卷世服其博聞蜀高祖實録三十卷右偽蜀李昊撰高祖者孟知祥也昊相知祥子昶時被命撰起唐咸通甲午終於偽明徳元年甲午凡六十二年太祖實録三十卷右皇朝沈倫撰太平興國三年詔李昉扈䝉李穆郭贄宋白董淳趙隣幾同修倫總其事更歴二載書成起創業迄山陵凡十七年淳化中王禹偁作篋中記敘云太祖神聖文武曠世無倫自受命之後功徳日新皆禹偁耳目所聞見今為史臣多有諱忌而不書又上近取實録入禁中親筆削之禹偁恐嵗月浸久遺落不傳因編次十餘事按禹偁所言雖未可盡信然咸平祥符間亦以所書漏落一再命儒臣重修多所増益故有三本傳于世徽廟實録二十卷右皇朝程俱撰先是汪藻編庚辰以來詔㫖頗繁雜俱删輯成此書且附以靖康建炎時事雜史類高氏小史一百二十卷右唐高峻撰以司馬遷史至陳隋書附以唐實録纂其要分十例為六十卷後其子逈析而倍之東觀奏記三卷右唐裴廷裕撰昭宗時長安冦亂相仍自武宗以後日厯起居注散軼不存詔史臣撰宣懿僖三朝實録廷裕次宣宗録特採大中以來耳目聞見撰次此書奏記于監修杜讓能以備史閣討論云桂苑叢談一卷右題云馮翊子子休撰雜記唐朝雜事僖昭時當是五代人邯鄲云姓嚴耳目記二卷右題云劉氏未詳何時人雜記唐末五代事唐餘録六十卷右皇朝王皥奉詔撰皥芟五代舊史繁雜之文採諸家之説倣裴松之體附註之以本朝當承漢唐之盛五代則閏也故名之曰唐餘録寶元二年上之溫公修通鑑間亦采之皥曽之弟唐末汎聞録五卷右皇朝閻自若纂乾徳中王普五代史成自若之父觀之謂自若曰唐末之事皆吾耳目所及與史册異者多矣因話見聞故事命自若志之五代補録五卷右皇朝陶岳撰祥符壬子岳以五季史書闕畧因書所聞得一百七事吕夏卿兵志三卷右皇朝吕夏卿撰公武得之于宇文時中季蒙題其後云夏卿修唐史别著兵志三篇自秘之戒其子弟勿妄傳鮑欽止吏部好藏書苦求得之其子無為太守恭孫偶言及因懇借抄録於呉興之山齋龍飛日厯一卷右皇朝趙普撰記顯徳七年正月藝祖受禪事是年改元建隆二月普撰此書普時為樞宻學士景命萬年録一卷藝祖受禪録一卷右皆未詳撰人記趙氏世次藝祖歴試迄受禪事金人背盟録七卷圍城雜記一卷避戎夜話一卷金國行程十卷南歸録一卷朝野僉言一卷右皇朝汪藻編記金人伐契丹迄於宣和乙巳犯京城圍城雜記等五書皆記靖康時事也偽史類十國紀年四十二卷右皇朝劉恕道原撰溫公序云渙之子也博學强記同修通鑑史事之紛錯難治者以諉恕宋次道知亳州家多書恕往借觀之目為之瞀性剛介初與王安石善及改新法言其非遂與之絶卒年四十九所謂十國者一王蜀二孟蜀三呉四唐五呉越六閩七楚八南漢九荆南十北漢溫公又題其後云世稱路氏九國志在五代之史中最佳此書又過之以予考之長於考異同而拙於屬文其書國朝事皆曰宋而無所隱諱意者各以其國為主耳秉軺録一卷右皇朝路振子發撰振大中祥符初使契丹撰此書以獻事見其傳雲南行紀二卷右唐韋齊休撰齊休長慶三年從韋審規使雲南紀其往來道里及其見聞序謂雲南所以能為唐患者以開道越嶲耳若自黎州之南清溪關外盡斥棄之疆場可以無虞不然憂未艾也及唐之亡禍果由此本朝棄嶲州不守而遂無邊患以此論之則齊休之言可不謂善哉至道雲南録三卷右皇朝辛怡顯撰蜀賊李順既平餘黨竄入雲南雷有終募怡顯招出之至道初歸因書其所歴成此書南蠻録十卷右未詳撰人熙寧間交趾叛朝廷議討之或纂歴代南蠻事迹及便宜上之西域志十二卷右唐僧𤣥奘撰𤣥奘西遊天竺求佛書既歸記其所歴諸國風俗其自序云自黑嶺以西皆土著尚東左袵務田畜重財賄嫁娶無禮獨天竺則異别記於後云夏國樞要二卷右皇朝孫巽纂記夏北兵屯㑹要土地肥磽井泉湧涸谷粟窖藏酋豪姓氏名位司存與夫城池之完缺風俗之所尚編為兩帙上之于朝石晉陷蕃記一卷右皇朝范質撰質石晉末在翰林為出帝草降北表知其事為詳記少主初遷於黄龍府後居於建州凡十八年而卒按契丹丙午嵗入汴順數至甲子嵗為十八年實國朝太祖乾徳二年也北廷雜記十卷右契丹降人趙志忠撰記北廷雜事始於阿保謹迄邪律宗真李清臣云志忠仕北為中書舍人得罪宗真來歸上此書及契丹地圖言北中事甚詳史評類史通析微十卷右唐柳燦炤之撰燦以劉子𤣥史通妄誣聖哲評湯之徳為偽跡論桀之惡為厚誣謗周公云不臣褒武庚以徇節其甚至於彈劾仲尼因討論其舛謬共成五十篇蕭綂云論則析理精微故以為名乾寧四年書成唐史云燦公綽族孫少孤貧好學著史通析微時或稱之起布衣至為相不四嵗按唐紀相燦在天祐改元則書成時猶未仕也歴代史贊論五十四卷右未詳撰人纂史記迄五代史臣讚論唐史音義三十卷右未詳撰人比竇氏書大畧同而稍簡乃析為三十卷兩漢博聞十二卷右皇朝楊侃纂景徳中侃讀兩漢書取其中名數前儒解釋為此書以資渉獵者侃嘗編職林矣此亦其類也三劉漢書六卷右皇朝劉敞原父弟攽貢父子奉世仲馮撰劉跂嘗䟦其書尾云余為學官亳州故中書劉舍人貢父實為守從容出所讀漢書示余曰欲作補注未能也然卷中題識已多公之子方山亞父録以相示也吕氏前漢論三十卷右皇朝吕大忠晉伯撰予得其本于銅梁令吕肇修撰汲公諸孫也晉書指掌十二卷右皇朝劉編以晉書事實以類分六十五門職官類翰林雜志一卷右不題撰人輯唐韋執誼故事元稹承㫖壁記韋來微新樓記杜元頴監院使記鄭璘視草亭記并詩李宗諤題名記為一編或云蘇易簡子耆采其父翰林續志所遺附益之新御史臺記右皇朝宋聖寵編崇寧中聖寵為察官續韓琬書咸用其規式所異者不為諸人立傳於儀制勅令格式為詳後人續至紹興九年御史臺彈奏格一卷右政和中御史中丞蔣猷奏乞委屬官李彌大將本臺制勅令格式彈奏事件編成格目六月書成上之南宫故事一卷右不題撰人韋述云開元中劉鄭蘭撰劉儒者無著述才執政拜罷録十卷右不題撰人自建隆元年迄于紹興九年按國朝以樞密院及叅知政事為執政改官制後以左右丞兩省侍郎并密院為執政建炎三年後復用舊制云百官公卿表一百四十二卷右皇朝司馬光君實等撰熙寧中光以翰林學士兼史官修撰建議欲據國史旁採異聞敘宋興以來百官除拜効漢書作表以便御覽詔許之光請宋敏求同修及敏求卒又請趙彥若繼之歴十二年書成奏御中書備對十卷右皇朝元豐三年畢仲衍承詔編次序曰周官所謂要㑹者正今日中書所宜有自漢至唐莫知議此今編成十卷凡一百二十五門附五十八事李清臣嘗與許將書云備對乃呉正憲公居宰路以聖問多出意表故令中書椽畢君為之其時預有畫㫖諸司遇取㑹不許濡滯如此尚歴數年迺就後雖有改革然事亦可概見也掖垣叢志二卷右皇朝宋庠撰景祐中李宗諤始取國初掌誥名氏刻之于石自為紀序庠因之成此書王禹王頗譏其疎畧裴廷裕載舍人上事知印宰相壓角至今傳之為故事而庠書闕焉掖垣續志一卷右不詳撰人續宋庠書迄元祐六年十一月陳軒試中書舍人輔弼名對四十卷目録一卷右皇朝劉顏撰纂西漢迄五代羣臣應對之名者汲黯有天子置公卿輔弼之臣寧令從諛承意陷主不誼之言顏取以名其書天聖初馮元為侍講上之顏嘗為令坐事免由是詔復其官將作營造法式三十四卷右皇朝李誡撰熙寧初勅將作監編修營造法式誡以為未備乃考究經史詢訪匠氏以成此書頒于列郡世謂喻皓木經極為精詳此書葢過之儀注類咸鎬故事一卷右唐韋慎微撰纂長安自元日至除夜朝廷慶賀事景徳㑹計録六卷右皇朝丁謂謂之撰謂景徳中纂三司户口税賦之入及兵食吏禄之費㑹計天下每嵗出納贏虧之數吕吉甫元祐國計圖之類也書成奏御刑法類金科易覽三卷右崇文總目有唐趙綽金科易覽一卷田氏書目有蕭緒金科易覽三卷當是綽初撰一卷緒删改析之為三爾天聖編勅三十卷右天聖中宋庠龎籍受詔改修唐令叅以今制而成凡二十一門官品一户二祠三選舉四考課五軍防六衣服七儀制八鹵簿九公式十田十一賦十二倉庫十三廏牧十四關市十五補亡十六疾醫十七獄官十八營繕十九喪葬二十雜二十一元豐廣案一百卷右皇朝元豐初置新科明法或類其所試成此書刑綂賦兩卷右皇朝傳霖撰或人為之注決獄龜鑑二十卷右皇朝鄭克編次五代和凝有疑獄集近時趙仝有疑獄事類皆未詳盡克因增廣之依劉向晏子春秋舉其綱要為之目録分二十門計三百九十五事律心四卷右未詳撰人纂刑綂綱要也斷例四卷右皇朝王安石執政以後士大夫頗垂意律令此熙豐紹聖中法寺決獄比也地理類山海經十八卷右大禹製晉郭璞傳漢侍中奉車都尉劉秀校定表言禹别九州而益等類物善惡著此書皆聖賢之遺事古文明著者也大父嘗考之於其書有曰長沙零陵鴈門皆郡縣名又自載禹鯀似後人因其名叅益之山海經圖十卷右皇朝舒雅等撰雅仕江南韓熙載門人也後入朝數預修書之選閩中刋行本或題曰張僧繇畫妄也十道志十三卷右唐梁載言撰唐分天下為十道所載頗詳博其書多稱咸通中㳂革載言葢唐末人也游城南記一卷右皇朝張禮撰禮秦人元祐中與陳明微自長安城南探奇訪古以抵樊川因次之為記太平寰宇志二百卷右皇朝樂史等撰太平興國中盡平諸國天下一綂史悉取自古山經地志考正訛謬纂成此書上之于朝圖經右皇朝李昉撰洽聞記三卷右唐鄭常撰雜記郡國舊事故附之地理類職方機要四十卷右不題撰人姓名序云本新舊九域志上據歴代史旁取左氏水經通典且採舊聞叅以小説黜繆舉真紬成此書其間載政和間事葢當時人也傳記類襄陽耆舊記五卷右晉習鑿齒撰前載襄漢人物中載其山川城邑後載其牧守隋經籍志曰耆舊記唐藝文志曰載舊傳觀其書記録叢脞非傳體也名當從經籍志云高士傳十卷右晉皇甫謐撰纂自陶唐至魏八代二千四百餘載世士高節者其或以身狥名雖如夷齊兩龔皆不録凡九十六人而東漢之士居三之一自古名節之盛議者獨推焉觀此尤信孔子編年三卷右皇朝孔傳取左氏國語公羊史記及他書所載孔子事以年次之自生至卒東家雜記二卷右皇朝孔傳撰孔子四十七代孫也纂其家舊聞軼事于此書翊聖保徳傳三卷右皇朝王欽若撰建隆初有神降于鳯翔民張守真家開寶末徵守真詣闕屬太宗踐祚封神翊聖將軍築宫于終南山祥符中詔欽若編次其事御為製序引登科記三十卷右皇朝樂史撰記進士及諸科登名者起唐武徳迄天祐末唐制舉科目圖一卷右不題撰人凡七十六科仕至宰相者七十二人唯劉蕡名最高而官最不達宋登科記三卷右皇朝登科人名氏未詳何人所撰民表録三卷右皇朝胡納撰録國朝循吏善政李淑以為雖淺俗亦可備廣記云納瑗之父天聖中偕賢惠録上之賢惠録三卷右皇朝胡納撰録國朝賢惠之女後一卷瑗嗣成之萊公勲烈一卷右皇朝冦宗奭編宗奭凖之曾孫也編集仁宗祭凖文及贈誥墓碑傳誌贊詩等為此書列仙傳二卷右漢劉向撰高僧傳十四卷右蕭梁僧釋慧皎撰慧皎以劉義宣靈驗記陶潛搜神録等數十家並書諸僧殊疎畧乃博采諸書咨訪古老起于永平十年終于天監十八年凡五百五十二載二百五十七人又附見者二百餘人分為釋經義解神異習禪明律遺身誦經興福經師唱道十科續高僧傳三十卷右唐僧道宣撰藝文志作道宗大明寺僧也以慧皎㑹稽人故其書詳於呉越而畧於燕魏故上距梁天監下終唐貞觀十九年百四十四載編載二百四十人附見者又一百六十人分釋經解義習禪明律䕶法感通遺身讀誦興福雜科凡十門比丘尼傳四卷右蕭梁僧寶唱撰起晉升平訖梁天監得尼六十五人為之傳以檢淨為首寶唱金陵人藝文志有其目補江總白猿傳一卷右不詳何人撰述梁大同末歐陽紇妻為猿所竊後生子詢崇文目以為唐人惡詢者為之緑珠傳一卷右皇朝樂史撰譜諜類千姓編右不著撰人釋迦氏譜十卷右唐釋僧祐撰僧祐以釋迦譜記雜見于經論覽亦難通因纂成五卷又取内外族姓及弟子名氏附于後書目類文選著作人名三卷右唐常寶鼎撰纂文選所集文章著作人姓名鄉里行事及其述作之意十三代史目三卷右唐殷仲茂撰輯史記兩漢三國晉宋齊梁陳後魏北齊周隋史籍篇次名氏國朝杜鎬以唐五代書目續之開元釋敎録三十卷右唐僧智昇撰智昇在開元中纂釋氏諸書入中國嵗月及翻譯者姓氏以楞嚴經為唐僧懷迪譯張天覺以懷迪與菩提流支同時流支後魏僧其言殆不可信也成都刻石總目三帙右皇朝劉涇撰元祐中蔡京帥成都以意授涇纂府縣碑板幢柱自東漢初平迄偽蜀廣政凡二百六十八田氏書目六卷右皇朝田鎬撰田偉居荆南家藏書幾三萬卷鎬偉之子也因成此目元祐中袁黙為之序羣書備檢十卷右未詳撰人輯易書詩左氏公羊穀梁二禮論語孟子荀子揚子文中子史記兩漢三國志晉宋齊梁陳後周北齊隋新舊唐五代史書以備檢閱郡齋讀書後志卷一欽定四庫全書郡齋讀書後志卷二宋趙希弁撰子類伊川孟子解十四卷右皇朝程頥正叔撰頥居洛陽其門人號之為伊川先生云百家孟子解十二卷右集古今諸儒自裴日休至强至賈同百餘家解孟子成一編王安石解孟子十四卷王雱解孟子十四卷許允成解孟子十四卷右皇朝王安石介甫素喜孟子自為之解其子雱與其門人許允成皆有注釋崇觀間場屋舉子宗之㸃注孟子十四卷右皇朝熙寧中蜀州張簡㸃節經注附以釋文以敎童子董子一卷右周董無心撰皇朝呉秘注無心在戰國時著書闢墨子説𤣥一卷右唐王涯廣津撰涯始以貞元丙子終於元和己丑二十六年間注太𤣥為六卷今不之見獨此書行于世凡五篇一明宗二立例三揲法四占法五辨首宋惟幹太𤣥解十卷右皇朝宋惟幹注惟幹嘗得太𤣥古本于昭應咸平中知滑臺取宋衷陸績范望三家訓解别為之注仍作太𤣥宗㫖兩篇附于後其學葢師濟東田告司馬溫公所謂小宋者也陳漸演𤣥十卷右皇朝陳漸撰漸堯佐族子也國史有傳凡十四篇漸謂史以揚雄非聖人而作經猶呉楚僭王今按法言解嘲止云太𤣥然則經非其自稱弟子侯芭之徒尊之耳太𤣥淵㫖一卷右皇朝張揆撰溫公集注太𤣥經十卷右皇朝司馬光君實集漢宋衷解詁呉陸績釋文晉范望解贊唐王涯注經及首測宋惟幹通注陳漸演𤣥呉秘音義七家為此書自慶厯至元豐凡三十年始成其直云宋者衷也小宋者惟幹也惟幹漸秘皆國朝人溫公集注法言十三卷右皇朝司馬光君實集晉李軌唐柳宗元國朝宋咸呉秘注光自言少好此書歴年已多今輒采諸家所長附以己意名曰集注凡觀書者當先正其文辨其音然後可以求其義故宋相公庠家有李祠部注本及音義最為精詳宋呉亦據李本而其文多異同今叅以漢書取其通者以為定本先審其音乃解其義云元經十卷右隋王通撰唐薛收傳皇朝阮逸學起晉惠帝太熙元年終于陳亡予從兄子逸仕安康嘗得其本歸而示四父四父讀至帝問哇鳴哂其陋曰六籍奴婢之言不為過按崇文無其目疑逸依託為之帝範一卷右唐太宗撰凡十二篇今存者六篇貞觀末著此書以賜高宗且曰修身治國備在其中一旦不諱更無所言矣其末頗以汰侈自咎以戒高宗俾勿效已殊不知閨門之内慙徳甚多豈特太侈而已哉武后之立實有自來不能身敎多言奚益悲夫臣範二卷右唐則天皇后武氏撰範或作軌武氏稱制時嘗詔天下學者習之尋廢本十篇今闕其下五篇法語二十卷右南唐劉鶚撰鶚甲戌嵗擢南唐進士第實開寶七年也著書凡八十一篇言治國立身之道徐鉉為之序老子畧論一卷右魏王弼撰凡十有八章景迂云弼有得於老子而無得於易注易資於老子而老子論無資於易則其淺深之效可見矣溫公道徳論述要兩卷右皇朝司馬光撰光意謂道徳連體不可偏舉故廢道經徳經之名而曰道徳論墓誌載其目無名天地之始有名萬物之母常無欲以觀其妙常有欲以觀其徼皆於無與有下斷句不與先儒同吕氏老子注二卷右皇朝吕大臨撰其意以老氏之學合有無謂之𤣥以為道之所由出葢至于命矣其言道體非獨智之見孰能臻此求之終篇膠于聖人者葢寡但不當以聖知仁義為可絶棄耳黙希子注文子十二卷右黙希子者唐徐靈府自號也靈府謂文子周平王時人朱𤣥注文子十二卷右唐朱𤣥注闕符言一篇或取黙希注補焉文如海莊子疏十卷右唐文如海撰如海明皇時道士也以郭象注放乎自然而絕學習失莊生之㫖因再為之解凡九萬餘言吕吉甫注莊子十卷右皇朝吕惠卿撰吉甫惠卿字也元豐七年先表進内篇餘續成之王元澤注莊子十卷右皇朝王雱撰元澤其字也東坡廣成子解一卷右皇朝蘇軾撰軾取莊子中黄帝問道於廣成子一章為之解景迂嘗難之其序畧曰某晚玷先生薦賢中安敢與先生異論然先生許我不苟同翰墨具在天機子一卷右不著撰人凡二十五篇或曰一名隂符二十四機諸葛亮撰予觀其詞㫖殆李筌所為爾託之孔明也載道藏中無能子三卷右不著撰人唐光啟三年天子在褒寓三輔景氏舍成書三十篇述老莊自然之㫖總目録之於道家四子治國樞四卷右唐范乾九集四子謂莊子文子列子亢倉子其意以為黄老之道内足以修身外足以治國周王得文子之言趙王納莊周之論皆能興邦致治故採其書有益治道者分為二十門風俗通義十卷右漢應劭撰劭字仲遠奉之子篤學博覽多聞靈帝時舉孝亷仕至泰山太守撰風俗通以辨物名號釋時俗嫌疑文雖不典世服其洽聞意林三卷右唐馬總㑹元撰初梁頴川庾仲容取諸家書術數雜説凡一百七家抄其要語為三十卷總以其繁畧失中增損成三軸前有戴叔倫楊伯存兩序格言五卷右偽唐韓熙載叔言撰熙載以經濟自任乃著書二十六篇論古今王霸之道以干李煜首言陽九百六之數及五運迭興事其􅭸雜如此有門生舒雅序兩同書兩卷右唐羅隱撰隱謂老子養生孔子訓世因本之著内外篇各五其曰兩同書者取兩者同出而異名之言也物類相感志十卷右皇朝僧贊寧撰采經籍傳記物類相感者志之分天地人物四門贊寧呉人以博物稱于世柳如京徐騎省與之遊或就質疑事楊文公歐陽文忠公亦皆知其名王氏雜說十卷右皇朝王安石介甫撰蔡京為安石傳其畧曰自先王澤竭國異家殊由漢迄唐源流浸深宋興文物盛矣然不知道徳性命之理安石奮乎百世之下追堯舜三代通乎晝夜隂陽所不能測而入於神初著雜説數萬言世謂其言與孟軻相上下於是天下之士始原道徳之意窺性命之端云所謂雜説即此書也以京之誇至如此且不知所謂通乎晝夜隂陽所不能測而入於神者為何等語故著之保生月録一卷右唐韋行規撰分十二月雜纂每月攝養種藝祈禳之術也李翺為之序輦下嵗時記一卷右唐李綽撰綽經黄巢之亂避地蠻隅偶記秦地盛事傳諸晚學云國朝時令十二卷右皇朝賈昌朝撰景祐初復禮記舊文其唐月令别行三年詔昌朝與丁度李淑采國朝律厯典禮百度昏曉中星祠祀配侑嵗時施行約唐月令定為時令一卷以備宣讀後昌朝注為十二卷奏上頒行顧渚山記二卷右唐陸羽撰羽與皎然朱放輩論茶以顧渚為第一顧渚山在湖州呉王夫差顧望欲以為都故以名山吕惠卿建安茶記右皇朝吕惠卿撰聖宋茶論一卷右徽宗御製茶雜文一卷右集古今詩文及茶者竹譜一卷右戴凱之撰凱之字慶預武昌人裒輯竹事四字一讀有韻類賦頌李邯鄲云未詳何代人筍譜三卷右皇朝僧惠崇撰小説類殷芸小説十卷右宋殷芸撰述秦漢以來雜事予家本題曰劉餗李淑以為非𤣥怪録十卷右唐牛僧孺撰僧孺為宰相有聞於世而著此等書周秦行紀之謗葢有以致之也周秦行紀一卷右唐牛僧孺自敘所遇異事賈黄中以為韋瓘所撰瓘李徳裕門人以此誣僧孺鹿革事類三十卷鹿革文類三十卷右節太平廣記事實成一編曰事類詩文成一編曰文類蔡蕃晉如所撰晉如博學通音律能屬文與十父相友善鑒戒録十卷右後蜀何光遠撰字輝夫東海人唐證中纂輯唐以來君臣事迹可為世鑒者前有劉曦度序李獻臣云不知何時人考之不詳也歸田録六卷右皇朝李畋撰畋蜀人張詠客也與范鎮友善熙寧中致仕歸與門人賔客燕談衮衮忘倦門人請編録之遂以該聞為目又有雜詩十二篇係于後開譚録兩卷右皇朝蘇耆撰舜卿之父也記五代以來雜事下帙多載馮道行義古今前定録二卷右皇朝尹國均輯經史子集古今之人興衰窮達貴賤貧富死生壽夭與夫一動靜一語黙一飲一啄定于前而形于夢兆于卜見于相貌應于䜟記者凡一門以為不知命而躁競者之戒至若裴度以隂徳而致貴孫亮以隂譴而減齡之類又别為二門使君子不以天廢人云傅公嘉話一卷右皇朝傅堯俞之子孫記堯俞之言行凡四十餘章獻簡堯俞諡也曾公南遊記一卷右曾公未詳何人當是公亮之孫也共十二章記國朝雜事搢紳脞説二十卷右皇朝張唐英君房撰君房博學通釋老善著書如名臣傳蜀檮杌雲笈七籖行于世者毋慮數百卷此書亦詳實青箱雜記右唐朝何處厚撰處厚發蔡確車葢亭詩所記多失實成都置交子務起於冦瑊處厚乃以為張詠他多類此緗素雜記十卷右皇朝黄朝英撰所記二百事朝英建州人紹聖後舉子也為王安石之學者以贈之以芍藥為男淫女貽我握椒為女淫男前輩嘗以是為嗤朝英獨愛重之他可知也褒善録一卷右皇朝王蕃撰嘉祐中巴縣簿黄靖國死而復蘇道其冥中所見廖生嘗傳之蕃删取其要為此書麗情集二十卷右皇朝張君房唐英編古今情感事天文厯算類景祐乾象新書三卷右崇文目有三十卷置之天文類厯法一卷右未詳撰人厯草也刻漏圖一卷右皇朝燕肅撰肅有巧思上蓮花漏法嘗知潼川有石刻存焉洛陽宋君者増損肅之法為此圖五行類廣古今五行志三十卷右竇鋈撰唐志有其目未詳何人纂五行變異敘其徵應葢為洪範之學者自古術數之學多矣言五行則本洪範言卜筮則本周易近時兩者之學殆絕而最盛于世者葬書相術五星禄命六壬遁甲星禽而已然六壬之類足以推一時之吉凶星禽五星禄命相術之類足以推一身之吉凶葬書之類足以推一家之吉凶遁甲之類足以推一國之吉凶其所知若有遠近之異而或中或否不可盡信則一也且其説皆本於五行故同次之為一類青囊補注三卷右晉郭璞撰世傳葬書之學皆云無出郭璞之右者今盛行多璞書也按璞傳載葬母事世傳葢不誣矣璞未幾為王敦所殺若謂禍福皆係於葬則璞不應擇凶地以取禍若謂禍福有定數或它有以致之則葬地不必擇矣嗚呼璞自用其術尚如此况後遵其遺書者乎撥沙經一卷右唐吕才撰地理書畫山水之形成圖葢依託者㑹元經二十四卷右孫季邕撰未詳何代人集諸家相地書芟其鄙陋無驗者成是書五音地理新書三十卷右唐僧一行撰以人姓五音驗八山三十八將吉凶之方其學今世不行秤星經三卷右不著撰人以日月五星羅㬋計都紫炁月孛十一曜演十二宫宿度以推人貴賤壽夭休咎不知其術之所起或云天竺梵學也按洪範曰嵗月日時無易百穀用成乂用明俊民用章家用平康月之從星則以風雨冷州鳩曰武王伐殷嵗在鶉火月在天駟一曰在析木之津辰在斗柄星在天黿以此言之五星之術其來尚矣葢可以占國則可以占事可以占事則可以占人也然術家用日月五星以占吉凶又加以交初交中之神紫炁月孛之宿初中者交食之㑹亦可以意求惟氣孛無稽而術家獨以為效且曰土木之餘氣五星之行土木最遲而為吉凶者久故有餘氣云周易十二論一卷右未詳撰人論日月五星直年以占吉凶珞琭子疏五卷右皇朝李全東方明撰河圖天地二運賦一卷右不著撰人論天地二運葢三命書也崇文目以為卜筮類常陽經一卷右崇文目題曰黄帝式用葢六壬占卜術也六壬要訣一卷右未詳何人撰隋志載六壬之書兩種金鑾密記及五代史記頗言其驗今世龜筮道息而此術獨行六壬課鈐一卷右未詳何人所纂以六十甲子加十二時成七百二十課三傳入神以占吉凶玉關歌一卷右不題撰人六壬課訣也三十二家相書三卷右或集許負以下三十二家書成此編月波洞中記一卷右序稱唐任逍遥得之於太白山月波洞石壁上凡九篇相形術也崇文目置之五行類靈龜經一卷右史蘇撰論龜兆之吉凶崇文目三卷遁甲萬一訣一卷右題云唐李靖所纂黄帝書按遁甲之書見於隋志凡一十三家則其學之來亦不在近世矣以休生傷杜景死驚開八門推國家之吉凶通其學者以為有驗未之嘗試也遁甲經一卷右唐胡乾撰李氏書目亦云九天𤣥女術推九星八門三奇六儀之法鮮鶚經十卷右未詳撰人凡十門六十二章以星禽推知人之吉凶言其性情嗜好為尤驗説者謂本神仙之訣也故此書載于道藏李邯鄲云羅浮山逍遥子撰八神筮法二卷右以八卦世分六十四卦每卦首必云子夏曰論易筮之吉凶靈棊經二卷右漢東方朔撰又云張良劉安未知孰是晉顏幼明宋何承天注有唐李遠敘歸來子以為黄石公書豈謂以授良者邪按南史載客從南來遺我良財寶貨珠璣金碗玉盃之繇則古之遺書也明矣凡一百二十卦皆有繇辭紫堂訣三卷右紫堂先生撰未詳何代人著紫垣十二星至隱曜總三百六十位分二十八舍附之以五星配十二辰以推人命之吉凶兵類郭元振安邊策三卷右唐郭元振撰以總兵進攻聚衆退守不可無權謀乃著此書故舊題曰定遠安邊策武經聖畧十二卷右皇朝王洙撰寶元中西邊用兵朝廷講武備是時洙奉詔編祖宗任將用兵邊防事迹分十二門武經總要四十卷右皇朝曾公亮丁度撰康定中朝廷恐羣帥昧古今之學命公亮等采古兵法及本朝計謀方畧凡五年奏御制度五卷邊防五卷故事十五卷占候五卷御為製序兵要望江南一卷右題云黄石公以授張良者按其書雜占行軍吉凶寓聲于望江南詞取其易記憶總目云武安軍左押衙易靜撰葢唐人也倚馬立成法二卷右唐李淳風撰兵行占候之書也淳風太宗時人而此書起九宫法至貞元六年庚午假托以行其書爾非淳風本㫖也類書類古人姓氏相同録一卷右唐丘光庭撰光庭中進士第北堂書抄一百七十三卷右唐虞世南撰世南仕隋為秘書郎時鈔經史百家之事以備用分八十部八百一類北堂者省之後堂世南鈔書之所也家一百二十卷集類一百卷右唐劉綺莊撰綺莊毗陵人嘗為蘇州崑山縣令家多異書採摭事類分二十餘門凡五十餘萬言上之于朝前有萬希序題云開元二十九年辛巳按綺莊集有上白敏中啟疑非𤣥宗時人當攷三敎珠英三卷右唐張昌宗等撰按唐志一千三百卷今所存者止此備舉文言二十卷右唐陸贄撰總四百五十餘門議者謂大類六帖而文辭過焉崇文總目中有之小名録三卷右唐陸龜䝉撰龜䝉以末世有官名小名之别自秦至隋編而紀之至於神仙玉女之名婦人臧獲之字亦無棄焉龜蒙世稱其博然此書特雜取於史傳間爾無異聞也備忘小抄十卷右偽蜀文谷撰雜抄子史一千餘事以備遺忘其後題廣政三年廣政王衍號也唐㑹要一百卷右皇朝王溥撰初唐蘇冕敘高祖至徳宗九朝㳂革損益之制大中七年詔崔鉉等撰次徳宗以來事至宣宗大中六年以續冕書溥又采宣宗以後事共成百卷建隆二年正月奏御詞簡禮備太祖覽而嘉之詔藏於史閣賜物有差册府元龜一千卷右皇朝景徳二年詔王欽若楊億修君臣事迹唯取六經子史不録小説雜書至祥符六年書成上之凡三十一部有總序千一百四門有小序同修者十五人錢惟演杜鎬刁衎李維戚綸王希哲陳彭年姜輿宋貽陳越陳從易劉筠查道王曙夏竦初撰篇序諸儒皆作帝以體製不一遂擇李維錢惟演陳彭年劉筠夏竦等付楊億竄定賜今名為序冠其首其音釋又命孫奭為之類要六十五卷右皇朝晏殊纂分門輯經史子集事實以備修文之用禁殺録一卷右皇朝李象先纂元祐中象先集錄古今冥報事以為殺戒貨泉録一卷右皇朝陶岳撰記五代諸侯擅改錢幣之由幽州嶺南福建湖南江南五國墨譜一卷右皇朝董秉撰熙寧間人秉患世人徒知祖李之名而不知形模之異同製作之精觕故作圖以著其源流用補蘇易簡之闕文云印格一卷右皇朝晁克一撰克一張文潛甥也文潛嘗為之序其畧曰克一既好古印章其父補之愛之尤篤悉録古今印璽之法謂之圖書譜自秦以來變制異狀皆能言其故余頗愛其用心不移致精于末務使有傳焉䝉求三卷右唐李瀚撰纂經傳善惡事實類者兩兩相比為韻語取䝉卦童䝉求我之義名其書葢以敎學童云魯史分門屬類賦三卷右皇朝楊筠撰以左氏事類分十門各為律賦一篇乾徳四年奏御詔褒之仙苑編珠二卷右唐王松年撰取阮倉劉向葛洪所傳神仙又取經記中梁以後神仙百二十八人比事屬辭效蒙求本體為是書國史對韻十二卷右皇朝范鎮撰呉仲庶嘗稱景仁憫諸後學雖渉書傳而問之今代典故則懵然不知乃自太祖開基迄于仁宗朝摭取事實可為規矩鑒戒者用韻編次之即此書也孝悌類鑒七卷右皇朝俞觀能撰取經史孝悌事成四言韻語兩漢䝉求五卷唐史屬辭五卷南北史䝉求十卷右未詳撰人皆效李瀚也雜藝術類名畫見聞志六卷右皇朝郭若虛撰若虛以張愛賔之畫絕筆永昌元年因續之歴五代止國朝熙寧七年分敘論紀藝故事近事四門溫公投壺新格一卷右皇朝司馬光君實撰舊有投壺格君實惡其多取奇中者以為僥倖因盡改之九章算法九卷右未詳撰人者姓名或曰周公九章者一方田二算粟三衰分四少廣五商功六均輸七盈不足八方程九句股魏劉徽唐李淳風嘗為之注則此術起于漢之前矣求一算經一卷右未詳撰人溫公七國象碁一卷右皇朝司馬光君實撰周秦韓魏趙楚齊燕實八國而云七者周室不與焉葉子戲格一卷右不著撰人世傳葉子婦人也撰此戲晚唐之時也相鹤經一卷右題曰浮丘公撰其傳云浮丘公授于王子晉後崔文子學道于子晉得其文藏于嵩山之石室淮南公採藥得之乃傳于世相馬經二卷右伯樂撰相馬經一卷右未詳撰人述相馬法式并著馬之疾狀及治療之術李氏書目有之皇帝醫相馬經三卷右唐穆蠡集伯樂王良等六家書成此編皇帝斤神農也育駿方三卷右未詳撰人相馬術及醫治畜牧之方相牛經一卷右序曰寗戚傳之百里奚漢世河西薛公得其書以相牛千百不失其一至魏世高堂生又傳晉宣帝其後秘之細字薛公注也醫家類靈樞經九卷右王砯謂此書即漢志皇帝内經十八卷之九也或謂好事者于皇甫謐所集内經倉公論中抄出之名為古書也未知孰是丁徳用注難經五卷右皇朝丁徳用注以楊𤣥操所演甚失大義因改王之經文隱奥者繪為圖徳用濟陽人嘉祐末其書始成虞庶注難經五卷右皇朝虞庶注庶仁壽人寓居漢嘉少為儒已而棄其業習醫術為此書以補吕楊所未盡黎泰辰治平間為之序金匱玉函經八卷右漢張仲景撰晉王叔和集設答問雜病形證脈理叅以療治之方仁宗朝王洙得于館中用之甚効合二百六十二方仲景傷寒論十卷右漢張仲景述晉王叔和撰次按名醫録云仲景南陽人名機仲景其字也舉孝亷官至長沙太守以宗族二百餘口建安紀年以來未及十稔死者三之二而傷寒居其七乃著論二十二篇證外合三百九十七法一百一十二方善醫者或云仲景著傷寒論誠不刋之典然有大人之病而無嬰孺之患有北方之藥而無南方之治此其所闕者葢陳蔡以南不可用柴胡白虎二湯治傷寒其言極有理脈經三卷右題云黄帝撰論診脈之要凡二十一篇脈訣一卷右題曰王叔和皆歌訣鄙淺之言後人依託者然最行于世雷公炮炙三卷右宋雷斆撰胡洽重定述百藥性味炮熬煮炙之方其論多本之于乾寧晏先生斆稱内究守國安正公當是官名未詳金寶鑑三卷右魏嵩撰嵩仕至翰林博士崇文總目云不詳何代人述脈候徵驗要妙之理通真子傷寒訣一卷右題曰通真子而不著名氏用張長沙傷寒論為歌詩以便覽者脈訣之類也傷寒百問三卷右題曰無求子大觀初所著書運氣論奥三卷右皇朝劉溫舒撰溫舒以素問氣運最為治病之要而答問紛揉文辭古奥讀者難知因為三十論七十二圖上于朝脈粹一卷右皇朝蕭世基撰世基嘗閲素問及歴代醫經患其難知因綴緝成一編治平中姚誼序之存真圖一卷右皇朝楊介編崇寧間泗州刑賊於市郡守李夷行遣醫并畫工往親決膜摘膏肓曲折圖之盡得纎悉介校以古書無少異者比歐希範五藏圖過之遠矣實有益醫家也王莽時捕得翟義黨王孫慶使太醫尚方與巧屠共刳剝之量度五藏以竹筳導其脈知所終始云可以治病亦是此意證類本草三十二卷右皇朝唐慎微纂合兩本草為一書且集書傳所記單方附之于本條之下殊為詳博子午經一卷右題云扁鵲撰論鍼砭之要成歌詠葢後人依託者明堂針灸圖三卷右題曰黄帝論人身俞穴及灼灸禁忌㸃烙三十六黄經一卷右不著撰人唐世書也國史補云自茗飲行于世世人不復病黄癉千金方三十卷右唐孫思邈撰思邈博通經傳洞明醫術著用藥之方診脈之訣針灸之穴禁架之法以至導引養生之要無不周悉後世或能窺其一二未有不為名醫者然議者頗恨其獨不知傷寒之數云千金翼方三十卷右唐孫思􅊬撰思邈著千金方復掇集遺軼以羽翼其書成一家之學林億等謂首之以藥録次之以婦人傷寒小兒養性辟穀退居補益雜病瘡癰色脈針灸而禁經終焉者皆有指意云龍樹眼論三卷右佛經龍樹大士者能治眼疾或假其説集治七十二種目病之方寶藏暢微論三卷右五代軒轅述撰青霞君作寶藏論三篇著變煉金石之訣既詳其未善因刋其謬誤增其缺漏以成是言故曰暢微時年九十實乾亨二年也太平聖惠方一百卷右太宗皇帝在潛邸日多蓄名方異術太平興國中内出親驗者千餘首乃詔醫局各上家傳方書命王懷隱王祐鄭彥陳昭遇校正編類各於篇首著其疾證淳化初書成御製序引和劑局方十卷右大觀中詔通醫刋正藥局方書閲嵗書成校正七百八字增損七十餘方養生必用方十六卷右皇朝初虞世撰序謂古人醫經行於世者多矣所以别著者古方分劑為今銖兩不侔用者頗難此方其證易詳其法易用苟尋文為治雖不習之人亦可無求於醫也虞世本朝士一旦削髪為僧在襄陽與十父遊從甚密嬰童寶鏡十卷右題曰栖真子不著姓名録世行應驗方成此書小兒靈秘方十三卷右不題撰人辨小兒疾證及治療之方多為歌訣傷寒證治三方右皇朝王實編實謂百病之急無踰傷寒故畧舉病名法及世名醫之言為十三篇總方百四十六首或云頴川人官至外郎龎安常之高弟也小兒玉訣一卷右未詳撰人名氏為韻語以記小兒疾證治法凡二十三孫尚秘寶十卷右皇朝孫尚撰吕惠卿帥邊日尚之子在屬部因取此書刻板傳于世楊子䕶命方五卷通神論十四卷右皇朝楊退修撰退修以岐伯論五運六氣以治疾病後世通之者唯王砯一人而已然猶於遷變行度莫知其始終次序故著此方論云道書類大洞真經一卷右題云高上虛皇君等道書三十七章晉永和中上清紫微元君降授于王夫人是上清高法道藏書六部一曰大洞真部二曰靈寶洞元部三曰太上洞神部四曰太真部五曰太清部六曰正一部邯鄲李氏道書志四類一曰經誥類二曰傳録類三曰丹藥類四曰符篆類皆以此書為之首然唐志不載故以此度人經云西昇經四卷右題曰太上真人尹君紀録老子將遊西域既為關令尹喜説五千言又留秘㫖凡三十六章喜述之為此經其首稱老君西昇聞道竺乾有古先生是以就道說者以古先生佛也事見廣洪明集辯惑論韋注西昇經二卷右梁道士韋處𤣥分上下經上經三七法天之陽數分二十一章下經四七法地之隂數總四十九章象大衍用數云唐志稱處𤣥集解以聞道竺乾為經道竺乾以古先生為老子自謂洞𤣥注西昇經四卷右唐洞𤣥子注其姓名未詳唐志有戴詵注西昇經疑此或詵書也分三十六章謂竺乾古先生非釋氏之號云徐注西昇經二卷右徐道邈撰句曲人未詳何代其本以有古先生善入無為作善入泥丸古先生者吾之師也化乎竺乾作吾之身也化胡竺乾云歩虛經一卷右太極真人傳左仙公其章皆高仙上聖朝𤣥都玉京飛巡虚空之所諷詠故曰歩虚定觀經一卷右題云天尊授左𤣥真人述定心惠觀等修故以為名云老子化胡經十卷右魏明帝為之序經言老子歸崑崙化胡次授􅄢賔後及天竺按裴松之三國志注言世稱老子西入流沙化胡成佛其説葢起于此議化胡經八狀附于後唐志云萬嵗通天元年僧惠澄上言乞毁老子化胡經秋官侍郎劉如璿等議狀證其非偽此是也太清經一卷右太清䕶命靈文金闕上真按付修道之士可以除邪治病云登真隱訣二十五卷右梁陶𢎞景撰景以為學其訣者當由階而登真文多隱非訣莫登故以名書凡七篇十七條隋志云雲笈七籖一百二十卷右皇朝張君房等纂君房祥符中謫官寧海時聖祖降朝廷盡以秘閣道書付杭州俾戚綸陳堯臣校正綸等同王欽若薦君房專其事君房詮次得四千五百六十五卷於是掇其蘊奥總萬餘條成是書仁宗時上之張隨注參同契三卷右皇朝張隨皇祐中居青城山注魏伯陽之書列十數圖于其後參同契太易圖一卷右不題撰人論周天火候有太易太初太始太素太極四象五行等二十四篇并圖按崇文總目云張處撰而李獻臣以為天老神君撰雲常子張處序亦名至藥丹訣未知孰是混元内外鑒二卷延壽經一卷附右混元謂老子也亦導引之術内篇八外篇三玉皇聖胎神用訣一卷右玉皇訣云野人郎肇注太上説魂魄經二卷右題曰老子撰載三魂七魄名字形狀好惡以咒術存制之崇文題曰太上靈書李氏亦有其目無上秘要九十五卷右題曰元始天尊說藝文志止七十二卷不知何時析出二十三通也葛仙翁胎息術一卷右仙翁葛洪也太清服氣口訣一卷太起經一卷閉氣法一卷太上指南歌一卷右四書皆題曰老子撰服氣訣也食氣經一卷右太皇子撰未詳李邯鄲云似雜集之書道引養生圖一卷右梁陶𢎞景撰分三十六勢如鴻鶴徘徊鴛鸞戢羽之類各繪像于其上田偉家本少八勢天真皇人九仙經一卷右天真皇人為黄帝説一行羅公遠葉法靜注論水火龍虎造金丹之術崇文書也按九仙經興廢記云此經黄帝留峩眉山石壁漢武帝時得之大中嘗禁絕隂府内丹經一卷右題曰老子説日月𤣥樞論一卷右唐劉知古撰明皇朝為綿州昌明令時詔求通丹藥之士知古謂神仙大藥無出參同契因著論上于朝大還丹契秘圖一卷右草衣洞真子𤣥撰凡三十章大還丹者乃日月精氣之所致也論火候則以朔望為據記藥物則以鉛汞為名云釋書類華嚴經合論一百二十卷右按纂靈記云華嚴大經龍宫有三本佛滅度後六百年有龍樹菩薩入龍宫誦下本十萬偈四十八品流傳天竺晉有沙門支法領得下本分三萬六千偈至此土義熙十四年譯成六十卷唐證聖元年于闐沙門喜學再譯舊文兼補諸闕通舊總四萬五千頌成八十卷三十九品合論者唐李通𤣥所撰通𤣥太原人宗室子也當武后時隱居不仕舊學佛者皆曰佛説此經時居七處九㑹獨通𤣥以為十處十㑹云華嚴經清凉疏一百五十卷右唐僧澄觀撰澄觀居清凉山號清凉國師即韓愈贈之詩者文元公有言曰明法身之體者莫辨於楞嚴明法身之用者莫辨於華嚴學佛者以為不刋之論華嚴經畧一卷右唐僧澄觀撰澄觀既疏華嚴又撮其大意為此凡四十二章華嚴起信文一卷右唐僧善孜撰善孜潭州太平寺僧也每品一章撮其大指凡三十九章華嚴百門義海兩卷右唐僧法藏撰法藏長安崇福寺僧也分十章華嚴奥㫖一卷右唐僧法藏撰文曰妄盡還源觀凡六門法界披雲集一卷右皇朝僧道遹述杜順纂華嚴經義撰法界觀道遹又分十𤣥門華嚴吞海集一卷右皇朝僧道通述華嚴經七處九㑹三十九品五萬四千偈其文浩博澄觀為之疏尤難觀覽道通約之成萬三千言以便初學法華言句二十卷右唐僧智顗撰智顗居天台山號天台敎五代兵亂其書亡錢俶聞高麗有本厚賂因賈人求得之至今盛行於江浙禪宗金剛經解一卷右皇朝安保衡採摭禪宗自達磨而下發明是經者參釋之序稱其有言渉修證者北宗法門也舉心即佛者江西法門也無法無物本來如是者曹溪法門也建中靖國續燈録三十卷右皇朝僧惟白編惟白靖康初住法雲寺駙馬都尉張敦禮以其書上于朝徽宗為之序分正宗對機拈古頌古偈頌五門古塔主語録三卷右皇朝僧道古撰范文正喜之嘗親為疏請説法有云道行無玷孤風絕攀時以為非溢美也碧巖集十卷右皇朝僧克勤解雪竇頌古名曰碧巖集觀心論一卷右魏菩提達磨撰百法論一卷右唐僧𤣥奘譯西域僧天親所造所謂一切法者其畧有語一心法二心所有法三色法四心不相應行法五無為法心法八種心所有法五十一種色法十一種心不相應行法二十四種無為法六種故曰百法起信論一卷右唐僧宗密注僧真諦譯天竺第十二祖馬鳴大士所造也雖云名相葢明心宗指義𤣥微文辭明緻故盛行于世若肇論百法唯識及此學者皆顓門名家故藏中所收亦録于此辨正論八卷右唐釋法琳撰頴川陳良序云法琳姓陳關中人著此書窮釋老之教源極品藻之名理宣和中以其斥老子語焚毁其第二第四第五第六第八凡五卷序文亦有剪棄者破邪論二卷右唐釋法琳撰辨傅弈所排毁虞世南為之序甄正論二卷右唐釋法琳撰已上三書皆經宣和焚毁藏中多闕故録之輔敎編五卷右皇朝僧契嵩撰藤州人皇祐間以世儒多詆釋氏之道因著此書廣引經籍以證三家一致輔相其敎云幕府燕間録十卷右皇朝畢仲詢景儒撰仲詢元豐初為嵐州推官纂當代怪奇可喜之事為二十門羣書古鑑一卷右未詳何人所撰熙寧間集書史中相術驗者稗官志一卷右皇朝吕大辨撰雜記其所聞前言往行師友談記一卷右皇朝李薦方叔撰多記蘇子瞻范純夫及四學士所談論故曰師友龍川畧志六卷龍川别志四卷右皇朝蘇轍撰元符二年夏居循州杜門閉目追惟平昔使其子遠書之于紙凡四十事其秋復記四十七事龍川循州地名天文卜算類司天考占星通𤣥寳鏡一卷右題曰巫咸氏皇朝太平興國中詔天下知星者詣京師未幾至者百許人坐私習天文或誅或配𨽻海島由是星厯之學殆絕故予所藏書中亦無幾姑裒數種以備數云甘石星經一卷右漢甘公石申撰以日月五星三垣二十八宿恒星圖象次舍有占訣以候休咎合元萬分厯一卷右唐曹氏撰未知其名厯元起唐高宗顯慶五年庚申葢民間所行小厯也本天竺厯為法李獻臣云集聖厯一卷右皇朝楊可撰推神物所向擇日辰吉凶應用之法歩天歌一卷右未詳撰人二十八舍歌也三垣頌五星凌犯賦附于後或云唐王希明撰自號丹元子五行類八五經三卷右序云黄帝書八五謂八卦五行雖後人依託者而其辭亦馴雅相墓書也青囊本㫖一卷右不記撰人演郭璞相墓青囊經也洞林别訣一卷右江南范越鳯集郭璞所記諸家地里得失為此書二十四篇并司空珏尋龍入式歌附珞琭子三命賦一卷右李獻臣云珞琭者取珞珞如石琭琭如玉之義推人生吉凶否泰之法李虛中命書三卷右唐李虛中撰虛中字常容姓纂云同之八代孫學最深於五行書壽夭貴賤利不利輒先處其年時萬不失一韓愈言同為虛中十一世祖誤也五命秘訣一卷右皇朝林開撰三命之術年月日支干也加以時胎故曰五命占燈法一卷右皇朝李淳風撰崇文總目亦有之觀燈法一卷右唐李淳風撰袖中記一卷右唐朝李唐濬撰辨人形色知其壽夭吉凶集聖厯四卷右皇朝楊可集可為司天冬官正輯古今隂陽書彚為四時以涓擇日辰云兵家類六韜六卷右周吕望撰案漢藝文志無此書梁隋唐始著録分文武龍虎豹犬六目兵家權謀之書也魏武注孫子一卷右呉孫武撰魏武帝注按藝文志孫子兵法八十二篇今魏武所注止十三篇杜牧以為武書數十萬言魏武削其繁剰筆其精粹成此書云其序畧曰吾讀兵書戰策多矣武所著深矣李筌注孫子三卷右唐李筌注以魏武所解多誤約歴代史依遁甲注成三卷杜牧注孫子三卷右唐杜牧牧之注牧以武書大畧用仁義使機權曹公所注解十不釋一葢惜其所得自為新書爾因備注之世謂牧慨然最喜論兵欲試而不得者其學能道春秋戰國時事甚博而詳知兵者有取焉陳皥注孫子三卷右唐陳皥撰皥以曹公注隱微杜牧注濶疎重為之注云紀燮集注孫子三卷右唐紀燮集唐孟氏賈林杜佑三家所解梅聖俞注孫子三卷右皇朝梅堯臣聖俞注歐公為之序王晳注孫子三卷右皇朝王晳撰晳以古本校正闕誤又為之注仁廟時天下久承平人不習兵元昊既叛邊將數敗朝廷頗訪知兵者士大夫人人言兵矣故本朝注解孫武書者大抵皆當時人也何氏注孫子三卷右不題姓氏近代人也呉子三卷右魏呉起撰言兵家機權法制之說唐陸希聲類次為之説料敵治兵論將變化勵士凡六篇云司馬法三卷右齊司馬穰苴撰威王使大夫追論古者司馬兵法而附穰苴於其中因號司馬穰苴兵法司馬遷謂其書閎廓深遠雖三代征伐未能竟其義如其文近亦少褒矣穰苴為區區小國行師何暇及司馬兵法之揖讓乎黄石公三畧三卷右題曰黄石公上中下三畧其書論用兵機權之妙嚴明之决明妙審决軍可以死易生國可以存易亡經籍志云下邳神人撰世傳此即圯上老人以一編書授漢張良者尉繚子五卷右尉繚子未詳何人書主刑法兵戰按漢藝文志有二十九篇今逸五篇首篇稱梁惠王問意者魏人與張横渠注尉繚子一卷右皇朝張載撰其辭甚簡畧李衛公對問三卷右唐李靖對太宗問兵事元豐中并六韜孫呉三畧尉繚子司馬兵法類為一書頒之武學名曰七書史臣謂李靖兵法世無完書畧見於通典今對問出於阮逸家或云逸因杜氏附益之李臨淮武記一卷右唐李光弼撰其書凡一百二章末云吕望智廓而遠孫武思幽而密黄石寛而重斷呉起嚴而貴勇墨翟守而無攻老􅅨勝而不美今擇其精要雜以愚識為一家之書題曰統軍靈轄寶秘策或云光弼從事張參所纂人事軍律三卷右皇朝符彥卿撰其序稱言兵者多雜以隂陽殊不知往亡宋捷甲子胡興鵞入梟集翻成吉兆故此但述人事云或以為唐燕僧利正撰當考之庾袞保聚圖一卷右晉庾袞撰袞字叔褒西晉末保禹山張泓張昌不能犯所全活者毋慮數百萬元康三年己酉因撰保聚壘議二十篇武侯十六策一卷右蜀諸葛亮孔明撰序稱謹進便宜十六事一治國二君臣三視聴四納言五察疑六治民七舉措八考黜九治軍十賞罰十一喜怒十二治亂十三敎令十四斬斷十五思慮十六隂察陳壽録孔明書不載此策疑依託者神武秘畧十卷右皇朝仁宗御撰纂古今兵書戰策及舊史成敗之迹類權謀形勢隂陽技巧凡四門三十篇左氏要類其事類投缾内倒取之抄録成書故所記時代多無次序云記室新書三十卷右唐李途撰采摭故事綴為偶儷之句分四百門途為東川掌記因以名其書云園策十卷右唐虞世南撰奉王命纂古今事為四十八門皆偶儷之語戚苑英華十卷右唐袁悅重修本楊名所著悦掇其要類為語對以他説附益之通典二百卷右唐杜佑撰先是劉秩採經史自黄帝迄唐天寶末制度沿革廢置論議得失倣周禮六官法為政典三十五篇房琯稱才過劉向佑以為未盡因廣之參以新禮為二百篇以食貨選舉職官禮樂刑法州郡邊防八門分類序載世推該洽凡三十六年成書徳宗時上之五代㑹要三十卷右皇朝王溥等撰采梁至周典故纂次建隆初上之節國朝㑹要十二卷右皇朝章得象等天聖中被詔以國朝故事因革制度編次宋綬馮元李淑王舉正王洙同修得象監總慶厯四年書成上之凡一百五十卷范師道以其猥冗節其要以備檢閲古城塜記二卷右唐皇甫鑒撰記古城所築之人姓名初不及塜而名曰城塜記未知其説太平總領五十卷右唐朝李昉等撰太平興國中昉被詔纂經史故事分門編次六帖初學記之類也職林二十卷右皇朝楊侃纂集歴代職官沿革之故葢因通典職官門増廣而已書林韻海一百卷右不題撰人分門依韻纂經史雜事以備尋閱或云皇朝許冠所編異號録二十卷右皇朝馬永易明叟編古今殊異名號如銅馬帝無愁天子之類頃嘗見近世人増廣其書名曰賔實録亦殊該博硯譜二卷右皇朝唐詢撰記硯之故事及其優劣以紅絲石為第一端石次之古鼎記一卷右唐呉協撰記古人鑄鼎本原及其形製洽聞記三卷右不題撰人分二十門雜記經史名數或題童子洽聞記云唐許塾撰骨鯁藥二十卷右皇朝靖康初復修祖宗故事時人或集本朝諸公諫疏成此書書敘指南二十卷右皇朝任浚撰纂集古今文章碎語分門編次之凡二百餘類歌詩押韻二十四卷右皇朝楊咨撰裒集古今詩可以為矩矱者編為押韻侍女小名録一卷右皇朝王銍纂序云大觀中居汝隂與洪炎玉父遊讀陸魯望小名録戲徴古今女侍名字因盡發所藏書籍纂集餘月而成焉香譜一卷右皇朝洪芻駒父撰集古今香法有鄭康成漢宫香南史小宗香真誥嬰香戚夫人迫駕香唐員半千香所記甚該博然通典載厯代祀天用水沉香獨遺之何耶荆楚歲時記一卷右梁宗懔撰其序云傅𤣥之朝㑹杜駕之上已安仁秋興之叙君道娛蜡之術其屬辭則已洽其比事則未𢎞某率為小記以録荆楚時風物故事自元日至至除夕凡二十餘事雜藝術類古畫品録一卷右南齊謝赫撰言畫有六法分四品續畫記一卷右唐李嗣真撰補謝赫之闕後畫錄一卷右唐僧彦悰撰品長安名畫凡二十七人名畫獵精六卷右唐張彥遠纂記歴代畫工名姓自史皇以降至唐朝及論畫法并裝背禠軸之式鑒别閱玩之方書畫史二卷右皇朝米芾元章撰輯本朝公卿士庶家藏法書名畫論其優劣真偽五代名畫補遺一卷右皇朝劉道成纂符嘉應撰序云胡嶠嘗有梁朝名畫録因廣之故曰補遺聖朝名畫評三卷右皇朝劉道成纂符嘉應撰集本朝畫工之名世者第其品以王瓘之為神品云在呉生上益州名畫録三卷右皇朝黄休復纂唐乾符初至宋乾徳嵗休復在蜀中目擊圖書之精者五十八人品以四格云射評要畧一卷右題曰李廣撰凡十五篇嚴悟射訣一篇右唐王思永撰思永學射法於成都工曹嚴悟成書十篇每篇首必稱師木射圖一卷右唐陸秉撰為十五筍以代侯擊地毬以觸之筍飾以朱墨字以貴賤之朱者仁義禮智信溫良恭儉讓墨者慢傲佞貪濫仁者勝濫者負而行一賞罰焉投壺經一卷右唐上官儀奉勅刪定史𤣥道續注采周顒郝同梁簡文數家書為之唐志有其目樗蒲經一卷樗蒲格一卷右不題撰人序云樗蒲古之戲也劉毅李安民慕容寶之徒皆擲盧不聞餘采今以盧梟為上雉犢次之釣鼇圖一卷右不題撰人凡四十類各有一詩採珠局一卷右不題撰人序云王公而不知其名凡三十餘類亦各有一詩彈棊經一卷右未詳撰人序稱世説曰魏武帝好彈棊宫中皆効之難得其局以粧奩之葢形狀相類就葢而彈之俗中因謂魏宫粧奩之戲按西京雜記云劉向作彈棊典論云前代馬合卿張公子皆工彈棊然則起於漢朝非自魏始世說誤矣象棊經一卷右皇朝尹洙撰凡五圖今世所行者不與焉捉卧甕人事數一卷右皇朝李庭中撰以畢卓嵇康劉伶阮孚山簡阮籍儀狄顏回屈原陶潛孔融陶侃張翰李白白樂天為目有趙昌言序雙陸格一卷右不題撰人其法左右十二梁設二朋朋各十五子一白一墨用明瓊二各以其采由右歸左子單則他子得擊兩子以上他子雖相當不得擊故武后夢雙陸不勝狄仁傑所以云無子也益津射格一卷右皇朝錢師益序以五善圖及武陵格疎密不同參酌為之三國圖格一卷金龍戲格一卷打馬格一卷旋棊格一卷右不題撰人漢官儀彩選一卷右皇朝劉敞撰刪取西漢之官而附其列傳黜陟可戲笑者雜編之以為博弈之一物忘憂集三卷右皇朝劉仲甫編載唐韋延祐棊訣并古今棊圖六問算法五卷右皇朝龍受益撰并化零歌附應用算法三卷右皇朝蔣舜元撰醫家類黄帝素問右唐王砯注砯謂漢藝文志有黄帝内經十八卷素問即其經之九卷兼靈樞九卷迺其數焉先是第七亡逸砯時始獲乃詮次注釋凡八十一篇分二十四卷今又亡刺法本論二篇砯自號啟𤣥子黄帝八十一難經一卷右秦越人撰呉吕廣注唐楊𤣥操演越人授桑君秘術洞明醫道采黄帝内經精要之説凡八十一章編次為十三類其理趣深遠非易了故名難經補注神農本草二十卷右皇朝掌禹錫等補注舊説本草經神農所作而藝文志所不載平帝紀詔天下舉通知方術本草者本草之名葢起於此梁之録載神農本草三卷書中有後漢郡縣名葢上世未著文字師學相傳至張機華佗始為編述嘉祐初詔禹錫與林億蘇頌張洞等為之補注以開寶本草及諸家參校采拾遺逸判定新舊藥合一千八十二種總二十卷圖經本草二十卷目録一卷右皇朝蘇頌等撰先是詔掌禹錫林億等六人重校神農本草累年成書奏御又詔郡縣圖上所產藥本用永徽故事重命編述於是頌再與禹錫等裒集衆説類聚詮次各有條目云嘉祐六年上脈經十卷右晉王叔和撰纂岐伯華佗等論脈要訣巢氏病源候論五卷右隋巢元方等撰元方大業中被命與諸醫共論衆病所起之源皇朝昭陵時詔校本刻牘頒行宋綬為序外臺秘要方四十卷右唐王燾撰燾之序云嘗得古方書數千百卷因述諸病證候刪集方藥符禁鍼灸之法本草廣義二十卷右皇朝冦宗奭編以本草二部著撰之人或執用已私失於商確併考諸家之説參之事實覈其情理證其脱誤以成其書天元玉策三十卷右啟元子撰即唐王砯也書推五運六氣之變產寶二卷右偽蜀昝殷撰輯產乳備驗方藥二百七十八首銅人腧穴鍼灸圖三卷右皇朝王惟徳撰仁宗嘗詔惟徳考次鍼灸之法鑄銅人為式分腑臟十二經旁注俞穴所㑹刻題其名并為圖法并主療之術刻板傳于世夏竦為序明堂者謂雷公問道黄帝授之故名云太醫局方十卷右元豐中詔天下高手醫各以得効秘方進下太醫局驗試依方製藥鬻之仍摸本傳于世沈存中良方十五卷右皇朝沈括存中撰存中博學通醫術故類其經驗方成此書用者多驗或以蘇子瞻論醫藥雜說附之靈苑方二十卷右皇朝沈括存中編本朝士人如高若訥林億孫奇龎安常皆以善醫名世而存中尤善方書此中所載多可用博濟方五卷右皇朝王袞撰錢氏小兒方八卷右皇朝錢乙仲陽撰神宗時擢太醫丞於書無所不窺它人靳靳守古獨度越縱舍卒與法合尤邃本草多識物理辨正闕誤最工療嬰孺病年八十二而終閻季忠方附于後蘇沈良方十五卷右皇朝沈括通醫學嘗集得効方成一書後人附益以蘇軾醫藥雜説故曰蘇沈南陽活人書二十卷右皇朝朱肱撰序謂張長沙傷寒論其言雅奥非精於經絡不能曉㑹頃因投閒設為對問補苴得緝僅成卷軸作於己巳成于戊子計九萬一千三百六十八字神仙類黄庭内景經一卷右題大帝内書藏暘谷隂三十六章不載注人皆七言韻語梁丘子敘云扶桑大帝命𤾉谷神王傳魏夫人一名東華玉篇黄者二儀正色庭者四方之中近取諸身以脾為主故曰黄庭黄庭外景經一卷右敘謂老子所作元陽子注分上中下三篇亦皆七言韻語元陽子不詳其人老君内觀經一卷右凡十二章首皆云老君曰其言皆修心鍊神之法真誥七卷右梁陶𢎞景撰皆真人口受之誥故以為名記許邁許謐楊羲諸仙受道之説參同契三卷右漢魏伯陽撰按神仙傳伯陽㑹稽上虞人通貫詩律文辭贍博修真養志約周易作此書凡九十篇徐氏箋注桓帝時以授同郡淳于叔通因行于世彭曉為之解隋唐書目皆不載按唐陸徳明解易字云虞翻注參同契言字從日下月今此書有日月為易之文則其為古書明矣坐忘論一卷右唐司馬承禎字子微撰凡七篇其後有文元公跋謂子微之所謂坐忘即釋氏之言宴坐也肇論四卷右姚秦僧洪肇撰師羅什規模莊周之言以著此書物不遷不真空􅄺槃無知般若無名四論傳燈録云肇後為姚興所殺高僧傳不載其事天隱子一卷右唐司馬子微為之序云天隱子不知何許人著書八篇修鍊形氣養和心靈歸根契於伯陽遺照齊乎莊叟殆非人間所能力學者也王古以天隱子即子微也一本有三宫法附于後𤣥聖蘧廬二卷右唐李繁撰繁學於江西僧道一敬宗時嘗與丁公著陸亘入殿中抗佛老講論唐虞愈稱其家多書一覽終身不忘太和中舒元輿誣其濫殺不辜繫獄知且死著書十六篇以明禪理自謂臨死生而不懼賢於顏回在陋巷不改其樂嗚呼可謂賢矣而史載其平生行事甚醜獨何歟廣𢎞明集三十卷右唐僧釋道宣撰道宣麟徳初居西明寺以中原自周魏以來重老輕佛因採輯自古文章下逮齊隋發明其道者以廣僧祐之書分歸正辨惑佛徳法義僧行慈惻誠功啟福滅罪統歸等十門别集類揚雄集三卷右漢揚雄子雲也古無雄集皇朝譚愈好雄文患其散在諸篇籍離而不屬因綴輯之得四十餘篇隂鏗集一卷右陳隂鏗字子堅幼聰慧五嵗能誦詩賦日千言及長博渉史傳尤善五言詩徐陵言之於世祖使賦安樂宫援筆立成累遷散騎常侍有集三卷隋志已亡其二今所存者十數詩而已杜少陵嘗贈李太白詩首云李侯有佳句往往似隂鏗今觀斯集白葢過之遠矣甫之慎許可乃如此呉筠宗元先生集十卷右唐呉筠撰前有權徳輿序筠字貞節華隂人生十五年隱於南陽天寶初召至京師請為道士居嵩山已有勅待詔翰林筠知禄山將亂求還茅山許之乃東遊㑹稽往來天台剡中與李白孔巢父酬唱大厯中卒弟子諡為宗元先生筠通經義美文辭性高骾其待詔翰林也特承恩顧高力士素奉佛嘗短筠於帝故筠所著文賦深詆釋氏頗為通人所譏云陳黯文集三卷右唐陳黯撰黯字希孺頴川人十嵗能詩十三袖文謁清源牧牧面令賦詩頗稱賞之由是一時聲名大振㑹昌初就鄉薦至禮部輒罷歸咸通中卒有羅隱黄滔序令狐楚表奏十卷右唐令狐楚字殻士撰楚相憲宗為文善於牋奏自為序云登科後為桂并四府從事掌牋奏者十三年始遷御史綴其藁得一百九十三篇自號白雲孺子胡笳十八拍一卷右唐劉商撰漢蔡邕女琰為胡騎所掠因胡人吹蘆葉以為歌遂翻為琴曲其辭古淡商因擬之序琰事盛行一時商彭城人擢進士第歴臺省為郎好道術隱義興胡父渚世傳其仙去鼎國詩三卷右後唐李雄撰雄洛鞏人莊宗同光甲申嵗遊金陵成都鄴下各為咏古詩三十章以三國鼎峙故曰鼎國孫晟文集三卷右南唐孫晟字鳯密州人好學有文辭尤長於詩少為道士常畫賈島像置于屋壁晨夕事之後乃儒服謁唐莊宗于鎮州莊宗以為著作佐郎天成中奔于呉李昪父子用之為相周世宗征淮璟懼遣晟奉表求和世宗召問江南事不對殺之璟聞贈魯國公呉越掌記集一卷右唐羅隱掌錢鏐記室所著表啟也神宗皇帝御集二百卷右本朝神宗皇帝撰章惇等纂紹聖初以元祐中所集止九百四十三道有㫖命惇再加編次至元符中書成比元祐所編増多八千七百三十道分文辭政事邊機三門言者仍以元祐之臣託以邊機不宜洩露掩沒先帝盛美於是徧以賜羣臣云范魯公集三十卷右皇朝范質字文素大名人後唐長興中舉進士時和凝典貢舉覽質程文器之自以登第名在十三即以其數處質舉子謂之傳衣鉢晉天福中為翰林學士周廣順初拜相太祖受禪加兼侍中乾徳二年始罷為太子太傅卒年五十四將終戒其子旻勿請謚勿刻墓碑質力學强記好聚書既登朝猶手不釋卷國史載其示從子詩家書自序薦吕餘慶趙普表三篇張師黯集五十卷右皇朝張洎字師黯滁州人仕李煜知制誥中書舍人歸朝為史館修撰翰林學士淳化中參知政事至道二年卒洎風神洒落文辭清麗通釋氏學然性險詖而諂附集有呉淑序其子安期所編咸平五年上之晁文元道院集要三卷右皇朝王古編其序云文元晁公博觀内書不徒力行復勤於譔述以開導後學其書曰道院别集曰自擇増修百法曰法藏碎金曰隨因記述曰耄智餘書余嘗徧閱之以為名理之妙雖白樂天不迨也輒刪去重複總集精粹以便觀覽云古元祐中侍從田表聖咸平集五十卷右皇朝田錫字表聖其先京兆人唐末徙于蜀國初與胡旦何士宗齊名中興國三年進士第歴相臺桐廬淮陽海陵四郡守知制誥終於諫議大夫范仲淹司馬光讀其書皆稱其直諒蘇軾亦以比賈誼云李仲方集二十卷右皇朝李維字仲方雍熙二年進士景徳中知制誥遷中書舍人為翰林學士承㫖年七十一維以文學進至老手不釋卷能詩嗜酒嘗謂人曰人生詩酒足則尚何營哉民士編一十九卷右皇朝陳充撰充成都人雍熙中擢甲科仕至刑部郎中知祥符六年貢舉卒年七十詞學典贍性曠達善談謔澹於榮利自號中庸子民士云者葢其未仕已仕前後所著文也嘗以唐牛僧孺善惡無餘論為害敎著書反之國史稱焉今集載其論兩篇張晦之集二十卷右皇朝張景字晦之少師事柳開學為古文名震一時卒官至廷評年四十九集有文百九十三首禹偁所編并為之序姚鉉文集二十卷右皇朝姚鉉字寳臣廬州合肥人中進士甲科文辭敏麗淳化中直史館應制賦賞花釣魚詩特被嘉賞翌日命中使就第賜白金褒奬之累遷兩浙轉運使鉉雋爽尚氣薛映知杭州與之不協中以危法除其名卒年五十三緹巾集二十卷右皇朝宋庠字公序開封雍正人天聖中擢進士第一入翰林為學士皇祐元年拜相嘉祐中復為樞密使封莒國公以司空致仕初名郊字伯庠御史言其姓符國號名應郊天乃改今名遺命子孫不得以其文集流傳韓持國詩三卷右皇朝韓維字持國億之子也元豐中入翰林為學士遷承㫖哲宗初載拜門下侍郎與其兄子華玉汝俱位宰相持國最能詩世傳其酴釄絶句它多稱是范子功集五十卷右皇朝范百禄字子功鎮之姪也終于中書侍郎晁氏具茨集三卷右先君子詩集也呂本中以為江西宗𣲖曾慥亦稱公早受知陳無已從兄以道嘗謂公宗族中最才華喻汝礪序其詩云予嘗從叔用商近朝人物嘉言善行朝章國典禮文損益靡不貫洽由叔用之學而達諸廊廟温厚足以代言淵博足以顧問則以詩鳴者是豈叔用之志也哉雖然叔用既已油然棲志於林間曠逺之中遇事寫物形於興屬淵雅疎亮未嘗為悽怨危憤之音予於是有以見叔用於消長用舍之際未嘗不安而樂之者也嗟乎所謂含章内奥而深於道者非耶秦漢以來士有抱奇懷能留落不遇往往操心汗筆有怨誹沈抑之思氣候急刻不能閑遠古之詞人皆是也所以往往無所建立於天下唯深於道者遺於世而不怨發於詞而不怒君子是以知其必能有為於世者也嗟乎吾於叔用豈直以詩人命之哉岷山百境詩二卷右皇朝王寀字道輔少有能詩名世謂其詩初若不經意然遣詞屬意清麗絕人自號南陔居士宣和中以狂譎被譖伏誅楊天隱詩十卷右皇朝楊恬字天隱潼川人許表民詩十卷右皇朝許彥國字表民青社人周邦彥稱其寛平優游中極物情惜乎留落不偶故世人知之或寡也滿民昌邑集二十卷右皇朝滿中行字思復登進士第元豐中為太學官虞蕃獄起思復獨不絓吏議詔褒之元氏集三卷右皇朝元綘字厚之杭州人鏁㕔中進士第為翰林學士叅知政事綘立朝無特操晚入翰林諂事王安石及其子弟時論鄙之工文辭為流輩所推許卒年七十六諡章簡馮允南集十卷右皇朝馮山字允南普州人鄧綰為中丞薦為臺官允南力辭不就士論稱之希白詩三卷右皇朝僧希白撰張逸序之云希白能詩與宋白梁周翰張詠而下十數公相友善其格律不減齊已云邵氏集二十卷右皇朝邵溥字澤民進士第靖康初為户部侍郎上踐祚以例貶官紹興中復待制宣撫川陜師事崇福十二父詩文早有能聲總集類雜文章一卷右孫巨源得之於秘閣載宋玉等賦頌五十八篇景迂生元豐甲子以李公擇本校正後有劉大經曰為王雲李端唐君益諸公題跋唐賦二十卷右唐科舉之文也蕭頴士裴度白居易薛逢陸龜䝉之作皆在焉東漢文類三十卷右五代竇儼編唐文類三十卷右皇朝陶叔獻編唐漢策要十卷右皇朝陶叔獻編綸言集一百卷右或編國朝制册詔誥成此書以其皆王言也故以為名高麗詩三卷右元豐中高麗遣崔思齊李子威高琥康壽平李穗入貢上元宴之於東闕之下神宗製詩賜館伴畢仲行仲行與五人者及兩府皆和進其後使人金梯朴夤亮裴闕李綘孫盧柳金化珍等塗中酬唱七十餘篇自編之為西上雜詠綘孫為之序太平盛典二十三卷右或編政和間制誥表章多有可觀者文説類金針詩格三卷右唐白居易撰居易自謂與劉禹錫元稹皆以詩知名撮詩之體要為一格病得針而愈詩亦猶是也故曰金針集續金針詩格一卷右皇朝梅堯臣聖俞撰聖俞遊廬山宿西林與僧希白談詩因廣樂天所述云杜詩刋誤一卷右皇朝王仲至撰韓柳文章譜三卷右皇朝黄大輿撰大輿之意以為文章有莊老之異故取韓愈柳宗元文章為三譜其一取其詩文中官次年月可攷者次第先後著其初晚之異也其一悉取其詩文比敘之其一列當時君相於上以見二人之出處極為詳悉天廚禁臠三卷右皇朝釋惠洪撰論諸家詩格三十三種已見附志今不重刋開書目如后石經周易十卷周易指畧例一卷石經尚書十三卷石經毛詩二十卷石經周禮十二卷石經禮記二十卷石經左氏傳三十卷石經公羊傳十二卷石經穀梁傳十二卷春秋穀梁疏十二卷石經論語十卷石經孟子十四卷韓李論語筆解十卷疑孟一卷仁宗政要四十卷神宗聖訓二十卷東漢刋誤一卷長安志十卷列女傳八卷續一卷百將傳十卷三朝國朝會要一百卷聱隅子十卷鬻子十卷御注老子二卷列子釋文二卷孔叢子七卷劉子三卷御製聖濟經十卷度人經三卷四十二章經一卷神仙可學論一卷蔡邕獨斷二卷花蘂夫人詩一卷華陽集一百卷二種見平泉草木記一卷已載李衛公集中牡丹記一卷已載歐陽公集中一種刪去百中經三卷二本四卷考異三種書同而名異袁本毗陵易傳十一卷衢本作東坡易傳袁本芸閣先生易解一卷衢本作吕氏章袁本陳叔易詩一卷衢本作澗上丈人詩二十一種所載入類不同晁以道易𤣥星紀譜一卷左氏綱領四卷左氏䝉求三卷押韻一卷漁樵問對一卷程氏雜説一卷儒言一卷信聞記一卷以上袁本經類衢本子類古樂府十卷樂府古題要解十卷玉臺新咏十卷玉臺後集十卷以上袁本經類衢本集類松牕録一卷太和辨謗畧三卷以上袁本史類衢本集類神仙傳十卷王氏神仙傳四卷高僧傳二卷求法高僧傳十卷僧寳傳三十二卷以上袁本子類衢本史類馭臣鑒古二十卷汲古論一卷以上袁本集類衢本子類二十九種袁本所載衢本所遺六家經要四卷淳化法帖十卷武陵法帖二十二卷王曾筆録一卷英宗朝諸臣列傳三卷本朝事實三十卷青唐録二卷忠臣逆臣傳三卷藝文志見闕書目一卷酒經三卷晉公談録一卷該聞録十卷漫叟見聞録一卷劉辣小説五卷左氏要類職林二十卷骨鯁集二十卷蘇沈良方十五卷維摩誥所説經三卷六祖壇經二卷修已金剛經㫖要一卷錦囊集一卷員半千三蓮集二十卷余氏至言十八卷藏寂軒文集趙延持盈要論聖紹堯章集十卷藝圃折衷六卷政和文選二十卷郡齋讀書後志卷二
