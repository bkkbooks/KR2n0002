front:
  text: 下昭德先生郡齋讀書後志序昭德先生校井氏書為讀書志四卷番陽黎侯傳本於蜀刋之宜春郡齋且取希弁家所藏書删其重􅃨摭所未有益為五卷别以讀書附志三衢游史君蜀人也亦以蜀本鋟諸梓乃衍而為二十卷書加多焉盖先生門人姚君應績所編也按先生自序余家自文元公來以翰墨顯者七世故家多書然自中原無事時已有火厄及兵戈之後尺素不存而杜君鵬舉所序扣之古松流水之間亦止於四卷則方其得南陽藏書時固未多也其殆三榮校讀之後網羅其家散失裒彚漸夥或者先生續筆邪抑門人推廣其遺志也今考姚君所編杜序獨缺而不著而著先生自序有所謂合吾家舊藏得若干卷疑於尺素不存之語自相牴牾希弁摘取其所増入者凡四百三十五部總八千二百四十五卷往往皆晁氏之書請於郡而併刋焉然四卷既傳矣不敢以附志次其先自為讀書後志二卷然後井晁二氏藏書之富其目大備希弁家三世所藏因以託不朽云郡侯命序梗概於卷首至若二本所載井氏四卷之書其間有實同而名異此備而彼遺與夫分種入類之各不同又為考異於編末淳祐庚戌日南至江西漕貢進士秘書省校勘書籍趙希弁謹序欽定四庫全書
