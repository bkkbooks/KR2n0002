  hash: sha256:cc7395eb7f15dd86ab83950285cf574da50a15108d0856c1ff14467668f3b8ca
body:
  text: 宋晁公武撰子部其類十六一曰儒家類二曰道家類三曰法家類四曰名家類五曰墨家類六曰縱横類七曰雜家類八曰農家類九曰小說類十曰天文歴算類十一曰兵家類十二曰類家類十三曰雜藝類十四曰醫書類十五曰神仙類十六曰釋書類序九流者以謂皆出於先王之官咸有所長及失其傳故各有弊非道本然特學者之過也是以録之又以醫卜技藝亦先王之所不廢故附於九流之末夫儒墨名法先王之教醫卜技藝先王之政其相附近也固宜昔劉歆既録神仙之書而王儉又録釋氏今亦循之者何哉自漢以後九流寖微隋唐之間又尚辭章不復問義理之實雖以儒自名者亦不知何等為儒術矣况其次者哉百家壅底正塗之弊雖息而神仙服食之説盛釋氏因果之教興雜然與儒者抗衡而意常先之不為所惑者鮮矣其為患又甚於漢葢彼八家皆有補于時特學者失之而莊老猶足以亡晉申商猶足以滅秦况二教無意于世不自附于聖人若學而又失之則其禍將如何故存之以為世戒云儒家類曾子二卷右魯曾參撰漢藝文志曽子十八篇隋志曽子二卷目一卷唐志曾子二卷今世傳曽子二卷十篇本也有題曰傳紹述本豈樊宗師歟視隋亡目一篇考其書已見於大戴禮漢有禮經七十篇后氏戴氏記百三十一篇七十子後學者所記是時未有大小戴之分不知曽子在其中歟否也予從父詹事公嘗病世之人莫不尊事孟子而知子思中庸者葢寡知子思中庸者雖寡而知讀曾子者殆未見其人也是以文字回舛謬誤乃以家藏曾子與温公所藏大戴叅校頗為是正而盧注遂行於曽子云子思子一卷右周孔伋字子思撰四庫書目中無之載孟軻問牧民之道何先子思曰先利之曰君子之教民者亦仁義而已何必曰利子思曰仁義者固所以利之也上不仁則下不得其所上不義則下樂為詐此為不利大矣故易曰利者義之和也又曰利用安身以崇德也此皆利之大者也温公采之著之於通鑑孟子十四卷右魯孟軻撰漢趙岐注自為章㫖析十四篇序云軻鄒人戰國時以儒術干諸侯不用退與公孫丑萬章之徒難疑答問著書七篇三萬四千六百八十五言按此書韓愈以為弟子所㑹集非軻自作今考於軻之書則知愈之言非妄發也其書載孟子所見諸侯皆稱諡如齊宣王梁惠王梁襄王滕定公滕文公魯平公是也夫死然後有諡軻著書時所見諸侯不應皆死且惠王元年至平公之卒凡七十七年孟子見惠王王目之曰叟必已老矣決不見平公之卒也故予以愈言為然孟子音義二卷右皇朝孫奭等撰大中祥符中被㫖校正孟子因以張鎰于公著音義參考成書上之五臣解孟子十四卷右皇朝范祖禹孔武仲呉安詩豐稷呂希哲元祐中同在經筵所進講義貫穿史傳辭㫖精贍横渠孟子解十四卷右皇朝張載子厚撰幷孟子綂説附于後荀子二十卷右趙荀况撰漢劉向校定除其重複著三十二篇為十二卷題曰新書稱卿趙人名况當齊宣王威王之時聚天下賢士稷下是時荀卿為秀才年十五始來遊學至齊襄王時荀卿最為老師後適楚相春申君以為蘭陵令已而歸趙按威王死其子嗣立是為宣王楚考烈王初黄歇始相年表自齊宣王元年至楚考烈王元年凡八十一年則荀卿去楚時僅百嵗矣新書十卷右漢賈誼撰誼著事勢連語雜事凡五十八篇劉向校定除其重複者或取漢書誼傳附于後范氏注太𤣥經十卷右漢揚雄撰雄字子雲凖易而作太𤣥覃思渾天書為三方九州二十七部八十一家以三相乘為八十一首首為九贊共七百二十九贊二贊當一度以盡周天三百六十五度又為踦二贊以當四分度之一以五行為一家起于中孚而終於頥范望字叔明晉人也為解其序云子雲著𤣥桓譚以為絶倫張衡擬五經自侯芭受業之後希有傳者建安中宋衷陸績解釋之文字繁猥今以陸為本録宋所長訓理其義為十卷且以首分居本經之上以測散處贊辭之下其前又有陸績序以子雲為聖人云太𤣥經十卷右皇朝徐庸注庸慶歴間人也以范望解指義不的因王涯林氏諸解重為之注取王涯説𤣥附於後及自為𤣥頥通名之為太𤣥性總其自序云爾又多改其文字如以杚為仡以姽為􅀈以牡凡為札乃以半為手以孿為㝈以稚為推之類其所謂林氏者林瑀也太𤣥經疏十八卷右皇朝郭元亨撰元亨序云昔揚雄作𤣥傳之侯芭後獨有張衡桓譚張華見而稱嘆呉郡鄒伯岐求本不能得宋衷為訓解陸績為注解范叔明王涯亦注之皆未明白元亨在蜀自淳化末迄於祥符八年僅三十年撰成今疏又云太𤣥潤色於君平未知出何書也法言十三卷右漢揚雄撰皇朝司馬光集晉李軌唐柳宗元皇朝宋咸呉秘注雄好古學見諸子各以其知舛駮不與聖人同是非頗繆於經故人時有問雄者常用法言應之譔以為十二卷象論語號曰法言每篇復為序贊以發其大意新序十卷右漢劉向撰向當成帝時典校書因採傳記行事百家之言刪取正辭美義可勸戒者為新序説苑共五十篇新序陽朔元年上世傳本多亡闕皇朝曾子固在館中日校正其訛舛而綴緝其放逸久之新序始復全説苑二十卷右漢劉向撰以君道臣術建本立節貴德復恩政理尊賢正諫法誡善説奉使權謀至公指式談叢雜言辨物修文為目鴻嘉四年上之闕第十三卷曾子固校書自謂得十五篇於士大夫家與崇文舊書五篇合為二十篇而敘之然止是析十九卷作修文上下篇耳鹽鐵論十卷右漢桓寛次公撰寛汝南人孝昭時丞相御史與賢良文學論鹽鐵事因撰次之潛夫論十卷右後漢王符撰在和安之世耿介不同於俗遂不得進隱居著書二十餘篇以譏當時失得不欲彰顯其名故號潛夫云中論二卷右後漢徐幹所撰幹鄴下七子之一人也仕魏王國文學建安之間嫉詞人美麗之文不能敷散道教故著中論二十餘篇辭義典雅當世嘉之此本無復三年制役二篇家訓七篇右北齊顔之推撰之推本梁人所著凡二十篇述立身治家之法辯正時俗之謬以訓諸子孫續家訓八卷右皇朝董正功撰續顔氏之書家範十卷右皇朝司馬光君實撰取經史所載賢聖修身齊家之法分十九門編類以訓子孫正蒙書十卷右皇朝張載子厚撰張舜民嘗乞追贈載于朝云横渠先生張載著書萬言名曰正蒙隂陽變化之端仁義道德之理死生性命之分治亂國家之經罔不究通方之前人其孟軻揚雄之流乎潛虛一卷右皇朝司馬光擬太𤣥撰此書以五行為本五五相乘為二十五兩之得五十首有氣體性名行變解七圖然其辭有闕者葢未成也其手寫草藁一通今在子健姪房帝學十卷右皇朝范祖禹編纂自古賢君下迨祖宗務學事跡為一編以勸講理窟二卷右題曰金華先生未詳何人為程張氏之學者文中子中説十卷右隋王通之門人共集其師之語為是書通行事於史無考焉隋唐通録稱其有穢行為史臣所削今觀中説其迹往往僭聖人模擬竄竊有深可怪笑者獨貞觀時諸將相若房杜李魏二温王陳皆其門人予嘗以此為疑及見關朗李德林薛道衡事然後知其皆妄也通生於開皇四年而德林卒以十一年通適八歲固未有門人通仁壽四年嘗一到長安時德林卒已九載矣其書乃有予在長安德林請見歸援琴鼓蕩之什門人皆霑襟關朗在太和中見魏孝文自太和丁巳至通生之年甲辰葢一百七年矣而其書有問禮於關子明隋書薛道衡傳稱道衡仁壽中出為襄州總管至煬帝即位召還本紀仁壽二年九月襄州總管周搖卒道衡之出當在此年也通仁壽四年始到長安是年高祖崩葢仁壽末矣又隋書稱道衡子収初生即出繼族父孺養於孺宅至於長成不識本生其書有内史薛公見子於長安語子収曰汝往事之用此三事推焉則以房杜輩為門人抑又可知也删孟右皇朝馮休撰其序云觀孟軻書時有叛違經者殆軻之沒其門人妄有附益耳將刪去之懼得罪於獨見遂著書十七篇以别其偽其後温公蘇子瞻皆嘗疑軻之言有與經不合者葢始於休云太𤣥經解十卷幷發隱二卷釋文一卷右皇朝張詧撰嘉祐中成都帥蔣堂獻其書於朝詔書寵奬賜號同退處士實録稱詧字隱之雙流人通經術善屬文性恬淡屛居林泉以養生治氣為事道家類河上公注道德經二卷右李耳撰以周平王四十二年授關尹喜凡五千七百四十有八言八十一章言道德之㫖其末云使民復結繩而用之葢三皇之道也河上公注晉葛洪曰河上公者莫知其姓名漢孝文時居河之上侍郎裴楷言其通老子孝文詣問之即授素書道德經章句二卷其書頗言吐故納新按摩步行之術近神仙家也傅奕謂常善救人故無棄人常善救物故無棄物四句古本無有獨得於河上公耳老子疏六卷右唐𤣥宗撰𤣥宗既為注又為疏六卷唐藝文志有之天寶中加號𤣥邁道德經世不稱之嘗以河上公本校之不同者百餘字以校世傳本當乙者五字當注者五十五字當塗者三十八字最與御注不同如此云天下柔弱莫過於水而堅强者莫能勝以無能易之而御注作天下莫柔弱於水而故堅强者莫之能先以其無以易之也如此本云恬惔為上勝而不美而美之者是樂殺人者不可得志於天下矣吉事尚左凶事尚右偏將軍處左上將軍處右言以喪禮處之御注本恬惔為上故不美也若美必樂之樂之者是樂殺人也夫樂殺人者不得志於天下矣故吉事尚左凶事尚右偏將軍處左上將軍處右言以喪禮處之其不同至如此三十家注老子八卷右唐蜀郡岷山道士張君相集河上公嚴遵君平王弼輔嗣郭象子𤣥鍾㑹士秀孫登公和羊祐叔子羅什盧裕仲儒劉仁㑹顧歡景怡陶隱居松靈仙裴處恩杜弼節解張憑張嗣臧𤣥静大孟小孟竇畧宋文明褚糅劉進喜蔡子晃成𤣥英車惠弼等注君相稱三十家而列其名止二十有九葢君相自為一家言幷數之爾君相不知何時人而謂成𤣥英為皇朝道士則唐天寶後人也絶學無憂一句附絶聖棄知章下以唯之與阿别為一章與諸本不同老子指歸十三卷右漢嚴遵撰谷神子注本理國修身清淨無為之説按唐志有嚴遵指歸四十卷馮廓注指歸十三卷此本有序注而題谷神子疑即廓也王介甫注老子二卷王元澤注二卷吕吉甫注二卷陸佃注二卷劉仲平注二卷右皇朝王安石介甫注介甫平生最喜老子故解釋最所致意如無名天地之始有名萬物之母常無欲以觀其妙常有欲以觀其徼皆於有無字下斷句與先儒不同他皆類此後其子雱其黨吕惠卿陸佃劉仲平皆有老子注蘇子由注老子二卷右皇朝蘇轍子由注子由謫官筠州頗與學浮屠者游而有所得焉於是解老子中庸曰喜怒哀樂未發之謂中發而皆中節之謂和致中和天地位焉萬物育焉此非佛法而何六祖謂不思善不思惡則喜怒哀樂之未發也葢中者佛法之異名而和者六度萬行之總目也致中極和而天地萬物生於其間此非佛法何以當之天下無二道而所以治人則異古之聖人忠信行道而不毁世法以此耳故解老子亦時有與佛法合者其自序如此其解是謂襲明以為釋氏傳燈之類劉巨濟注老子二卷右皇朝劉涇巨濟注涇蜀人篤志於學文詞奇偉早登蘇子瞻之門晚受知於蔡京除太學博士文子十二篇右李暹注其傳曰姓辛氏葵丘濮上人號曰計然范蠡師事之本受業於老子文子録其遺言為十二篇云按劉向録文子九卷而已唐志録暹注與今篇次同豈暹析之歟顔籕以其與孔子並時而稱周平王問疑依託者然三代之書經秦火之後幸而存者其錯亂參差類如此小雅周公作也而有張仲孝友列子鄭穆公時人而有子陽餽粟是也李暹師事僧般若流支葢元魏人也列子冲虛至德真經八卷右鄭列禦冦撰禦冦劉向校定八篇云繆公時人學本於黄帝老子清虛無為務崇不競其寓言與莊周類晉張湛注唐號冲虛真經皇朝加至德之號力命篇言壽夭不存於葆養窮達不係乎智力皆天之命也楊朱篇言肆耳目之欲而不恤生之危縱酒色之娯而不顧名之醜是之謂制命於内劉向以二義乖背不似一家之言予以為非也道家之學本謂世衰道喪物偽滋起或騁智力以圖利不知張毅之走高門竟以病殞或背天真以徇名不知伯夷之在首陽因以餒終是以兩皆排擯欲便好利者不巧詐以干命好名者不矯妄以失性爾非不同也雖然儒者之道則異乎是雖壽夭窮達之非人力也必修身俟焉以為巖牆之下而死者非正命也雖知耳目之於聲色有性焉以為其樂也外而不易吾内嗚呼以此自為則為愛已以此教人則為愛人儒者之道所以萬世而無弊歟莊子南華真經十卷右莊周撰晉郭象注周為蒙漆園吏按漢書志書本五十二篇晉向秀郭象合為三十三篇内篇八外篇十五雜篇十一唐世號南華真經自孔子沒天下之道術日散老􅔶始著書垂世而虛無自然之論起周又從而羽翼之棓擊百世之聖人彈踐天下之聖法而不忌其言可謂反道矣自荀卿揚雄以來諸儒莫不闢之而放者猶自謂游方之外尊其學以自肆於是乎禮教之大壞紀綱失墜而天下横流兩晉之禍是巳自熈寧元豐之後學者用意過中見其書末篇論天下之道術雖老􅔶與其身皆列之為一家而不及孔子莫不以為陽訿孔子而隂尊焉遂引而内之殊不察其言之指歸宗老氏邪宗孔氏邪既曰宗老氏矣庸詎有隂助孔氏之理也邪至其論道術而有是言葢不得已耳夫盜之暴也又何嘗不知主人之為主人邪顧可以其智及此遂以為尊我開關揖而進之乎竊懼夫禍之過乎兩晉也南華真經疏三十三卷右成𤣥英撰本郭象注為之疏義𤣥英字子實陜州人隱居東海貞觀五年召至京師加號西華法師永徽中流郁州書成道士王元慶邀文學賈鼎就授大義嵩高山人李利涉為之序疏云莊周字子休鶡冠子三卷右按漢志鶡冠子楚人不顯名氏居深山以鶡羽為冠因自號焉著書十五篇論三才變通古今治亂之道唐柳宗元嘗辯此書非古而韓愈獨稱焉二人皆名儒未知孰是亢倉子二卷右唐柳宗元曰太史公為莊周列傳稱其為書畏累亢桑子皆空言無事實今世有亢桑子書其首篇出莊子而益以庸言葢周所云者尚不能有事實又况取其語而益之者其為空言尤也劉向班固録書無亢倉子而今之為術者乃始為之傳注以教於世不亦惑乎按大唐天寶元年詔號亢桑子為洞靈真經然求之不獲襄陽處士王士元謂莊子作庚桑子太史公作亢倉子其實一也取諸子文義類者補其亡今此書乃士元補亡者宗元不知其故而遽掊撃之可見其鋭於譏議也其書多作古文奇字豈内不足者必假外飾與何璨注素書一卷右題黄石公著凡一千三百六十六言其書言治國治家治身之道而厖亂無綂葢采諸書以成之者也無盡居士注素書一卷右皇朝張商英注商英稱素書凡六篇按漢書黄石公圯上授子房世人多以三畧為是葢誤也晉亂有盜發子房塚玊枕中獲此書云抱朴子内篇二十卷外篇十卷右晉葛洪撰洪字稚川丹陽句容人元帝時累召不就止羅浮山錬丹著書推明飛升之道導養之理黄白之事二十卷名曰内篇十卷名曰外篇自號抱朴子因以命書隂符經一卷右唐少室山布衣李筌序云隂符經者黄帝之書或曰受之廣成子或曰受之𤣥女或曰黄帝與風后玉女論隂陽六甲退而自著其事隂者暗也符者合也天機暗合於事機故曰隂符皇朝黄庭堅魯直嘗跋其後云隂符出於李筌熟讀其文知非黄帝書也葢欲其文奇古反詭譎不經葢糅雜兵家語又妄託子房孔明諸賢訓注尤可笑惜不經柳子厚一掊擊也法家類管子十八篇右齊管夷吾撰書富國之要述輕重九府取人之制劉向校八十一篇今亡一篇五十八篇有注解按杜佑指畧序云房𤣥齡所注或云唐尹知章注未詳韓子二十卷右韓非撰非韓諸公子喜刑名法術以富國彊兵法制之策干韓王不用作孤憤五蠧説林説難十餘萬言秦王見書歎曰得此人與之游死不恨急攻韓得非後用李斯之毁下吏治赦之不及商子五卷右秦公孫鞅撰衛之庶孽相秦封商好刑名之學秦委以政遂致富彊卒以刻薄致誅所著本二十九篇今亡者三篇名家類尹文子三卷右仲長氏所定尹文子篇序稱文子當齊宣王時居稷下學於公孫龍龍稱之而前漢藝文志敘此書在龍書上顔師古謂文嘗説齊宣王在龍之前史記云公孫龍客于平原君君相趙惠文王惠文王元年齊宣王沒已四十餘歲矣則知文非學於龍者也今觀其書雖專言刑名然亦宗六藝數稱仲尼其叛道者葢鮮豈若龍之不宗賢聖好怪妄言哉李獻臣云仲長氏統也熈伯繆襲字也傳稱統卒於獻帝遜位之年而此云黄初末到京師豈史之誤乎此本富順李氏家所藏者謬誤殆不可讀因為是正其甚者疑則闕焉鄧析子二卷右鄧析二篇文字訛缺或以繩為澠以巧為功頗為是正其謬且撮其㫖意而論之曰先王之世道德修明以仁為本以義為輔誥命謨訓則著之書諷頌箴規則寓之詩禮樂以彰善春秋以懲惡其始雖若不同而其歸則合猶天地之勢殊而育物之化均寒暑之氣異而成歲之功一豈非出於道德而然邪自文武既沒王者不作道德晦昧於天下而仁義幾于熄百家之説􅑣起各求自附於聖人而不見夫道之大全以其私知臆説譁世而惑衆故九流皆出於晚周其言各有所長而不能無所失其長葢或有見於聖人而所失葢各奮其私知故明者審取舍之而已然則析之書豈可盡廢哉左傳曰駟歂殺析而用其竹刑班固録析書於名家之首則析之學葢兼名法家也今其書大㫖訐而刻真其言也無可疑者而其間時𠞰取他書頗駮雜不倫豈後人附益之歟人物志三卷右魏劉劭撰凡一十二篇偽凉劉昞注以人物情性志氣不同當審察材理各等列云墨家類墨子五十卷右宋墨翟撰戰國時為宋大夫著書七十一篇以貴儉兼愛尊賢右鬼非命尚同為説云荀孟皆非之而韓愈獨謂辨生於末學非二師之道本然也晏子春秋十二卷右齊晏嬰也嬰相景公此書著其行事及諫諍之言昔司馬遷讀而高之而莫知其所以為書或曰晏子之後為之唐柳宗元謂遷之言乃然以為墨子之徒有齊人者為之墨好儉名世故墨子之徒尊著其事以増高為已術者且其㫖多尚同兼愛非樂節用非厚葬乆喪非儒明鬼皆出墨子又往往言墨子聞其道而稱之此甚顯白自向歆彪周皆録之儒家非是後宜列之墨家今從宗元之説云縱横家類鬼谷子三卷右鬼谷先生撰按史記戰國時隱居穎川陽城之鬼谷因以自號長於養性治身蘇秦張儀師之受縱横之事敘謂此書即授秦儀者捭闔之術十三章本經持樞中經三篇梁陶𢎞景注柳子厚嘗曰劉向班固録書無鬼谷子鬼谷子後出而嶮􅉦峭薄恐其言妄亂世難信尤者晚乃益出七術怪謬異甚言益隘使人猖狂失守來鵠亦曰鬼谷子昔教人詭紿激訐揣測憸滑之術悉備於章學之者惟儀秦而已始捭闔飛箝實今之常態是知漸漓之後不讀鬼谷子書者其行事皆得自然符契也昔倉頡作文字鬼為之哭不知鬼谷作是書鬼何為邪世人欲知鬼谷子者觀二子言畧盡矣故掇其大要著之篇戰國策三十三卷右漢劉向校定三十三篇東西周各一秦五齊六楚趙魏各四韓燕各三宋衛中山各一舊有五號向以為皆戰國時游士策謀改定今名其事則上繼春秋下訖楚漢之起凡二百四十五年崇文總目多闕至皇朝曾鞏校書訪之士大夫家其書始復完漢高誘注今止十篇餘逸歴代以其記諸國事載於史類予謂其紀事不皆實録難盡信葢出學縱横者所著當附於縱横家云雜家類吕氏春秋二十六卷右秦吕不韋撰後漢高誘注按史記不韋傳云不韋相秦招致辨士厚遇之使人人著所聞集論以為八覽六論十二紀二十餘萬言以為備天地萬物古今之事號曰吕氏春秋布咸陽市門懸千金其上延諸侯遊士賔客有能增損一字予千金淮南子二十一卷右漢劉安撰安淮南厲王子也襲封招致儒士賔客講論道德總統仁義作為内書二十一篇後漢許慎注慎標其首皆曰間詰次曰淮南鴻烈自名注曰記上第七十九闕子華子十卷右其傳曰子華子程氏名本晉人也劉向校定其書按莊子稱子華子見韓昭侯陸德明以為魏人既不合又藝文志不録子華子書觀其文辭近世依託為之者也其書有子華子為趙簡子不悦又有秦襄之卒在春秋前而趙簡子與孔子同時相去幾二百年其牴牾類如此且多用字説謬誤淺陋殆元豐以後舉子所為爾論衡三卷右後漢王充仲任撰充好論説始如詭異終有實理以俗儒守文多失其真乃閉門潛思户牖牆壁各置刀筆著論衡八十五篇釋物類同異正時俗嫌疑後蔡邕得之秘玩以為談助云金樓子十卷右梁元帝撰繹書十五篇論歴古興亡之迹箴戒立言志怪雜說自叙著書聚書通曰金樓子者在藩時自號長短經十卷右唐趙㽔撰論王霸機權正變長短之術凡六十三篇第十九載兵權隂謀云致理書十卷右唐朱朴撰乾寧中為國子毛詩博士論述時務凡五十篇上之事始三卷右唐劉孝孫等撰太宗命諸王府官以事名類推原初始凡二十六門以教始學諸王云續事始五卷右偽蜀馮鑑廣孝孫所著事原録右皇朝朱繪撰其書事始之類也炙轂子雜録注解五卷右唐王叡撰二儀實録古今注載事物之始樂府題解樂府所由起叡輯纂數家之言正誤闕疑補遺削冗劉允併歸一編云宋齊丘化書六卷右偽唐宋齊丘子嵩撰張耒文潛嘗題其後云齊丘之智特犬鼠之雄耳葢不足道其為化書雖皆淺機小數亦㣲有以見於黄老之所謂道德其能成功有以也文章頗亦高簡有可喜者其言曰君子有奇智天下不親雖聖人出斯言不廢農家類齊民要術十卷右元魏賈思勰撰記民俗歲時治生種蒔之事凡九十二篇四時纂要五卷右唐韓諤撰諤徧閲農書取廣雅爾雅定土産取月令家令叙時宜採氾勝種樹之書掇崔實試穀之法兼删韋氏月録齊民要術編成歲華紀麗四卷右唐韓諤撰分四時十二月節序以事實為偶儷之句附著之錢譜十卷右梁顧烜嘗撰錢譜一卷唐張台亦有錢録兩卷皇朝紹聖間李孝美以兩人所纂舛錯増廣成十卷分八品云錢譜十卷右皇朝董逌撰逌之祖嘗得古錢百令逌考次其文譜之以前世帝王世次為序且言梁顧烜唐封演之譜漫汗蔽固不可用其譜自太昊葛天氏至堯舜夏商皆錢幣其穿鑿誕妄至此茶經三卷右唐陸羽鴻漸撰載産茶之地造作器具古今故事分十門煎茶水記一卷右唐張又新撰其所嘗水凡二十種因第其味之優劣茶譜一卷右魏偽蜀毛文錫撰記茶故事其後附以唐人詩文建安茶録三卷右皇朝丁謂撰録建安園焙之數圖其器具叙採制入貢法式北菀拾遺一卷右皇朝劉異採新聞遺事附丁晉公茶經之末補茶經一卷右皇朝周絳以陸羽茶經不載建安故補之試茶録二卷右皇朝蔡襄撰記其烹試之法東谿試茶録一卷右皇朝朱子安集拾丁蔡之遺荔支譜一卷荔支故事一卷右皇朝蔡襄撰記建安荔支味之品第凡三十餘種古今故事酒經三卷右皇朝朱肱撰記釀酒諸法幷麯糵法續酒譜十卷右唐鄭遨雲叟撰輯古今酒事以續王績之書忘懷録三卷右皇朝元豐中夢溪丈人撰所集皆飲食器用之式種藝之方可以資山居之樂者不詳其名氏或云沈括也郡齋讀書志卷三上欽定四庫全書郡齋讀書志卷三下宋晁公武撰小說類太平廣記五百卷右皇朝太平興國初詔李昉等取古今小説編纂成書同太平御覽上之補妬記一卷右古有妬記久已亡之不知何人輯傳記中婦人嚴妬事以補亡自商周至于唐初吉凶影響十卷右皇朝岑象求編熈寧末閒居江陵披閲載籍見善惡報應事輒刪潤而記之間有聞見者難於備載亦采摘著於篇文房四譜五卷右皇朝蘇易簡撰集古今筆硯紙墨本原及其故實繼以賦頌述作有徐鉉序紺珠集十三卷右皇朝朱勝非編百家小説成此書舊説張燕公有紺珠見之則能記事不忘故以為名類記六十卷右皇朝曾慥編其序云閒居銀峰因集百家之説纂集成書可以資治體助名教供笑談廣聞見二百家類事六十卷右分門編古今稗官小説成一書雖曰該博但失於大畧耳不題人姓氏世説新語十卷右宋劉義慶撰劉孝標注紀東漢以後事分三十八門唐藝文志云劉義慶世説八卷劉孝標續十卷而崇文總目止載十卷當時孝標續義慶元本八卷通成十卷耳家本有二一本極詳一本殊畧未知孰為正然其目則同劉知幾頗言非其實録博物志十卷右晉張華茂先撰周日用注載歴代四方奇物異事首卷有理畧後有讚文述異記二卷右梁任昉撰昉家藏書三萬采前世異聞成書譚賔録十卷右唐胡璩子温撰皆唐朝史之所遺文武間人劇談録三卷右康軿字駕言撰乾符中登進士第書載唐世故事因話録六卷右唐趙璘撰字澤章大中時為衢州刺史記唐史逸事戎幕閒談一卷右唐韋絢撰太和中為李德裕從事記德裕所談劉公嘉話録一卷右唐韋絢撰劉公謂禹錫絢字文明執誼子也咸通中節度義武㓜從學於禹錫録其話言家學要録一卷右唐柳珵撰採其曽祖彦昭祖芳父冕家集所記累朝典章因革時政得失著此録小説之尤者也常侍言㫖一卷右唐柳珵記其世父芳所著凡六章末有劉幽求及上清傳附樹萱録一卷右序稱纂尚書滎陽公所談陸氏集異記二卷右唐陸勲纂語怪之書也凡三十二事言犬怪者居三之一資暇三卷右唐李匡乂濟翁撰序稱世俗之談類多訛誤雖有見聞嘿不敢證故著此書上篇正誤中篇談原下篇本物以資休暇云封氏見聞記五卷右唐封演撰分門記儒道經籍人物地理雜事且辨俗説訛謬葢著其所見聞如此芝田録一卷右敘謂嘗憩緱氏故取潘岳西征賦名其書記隋唐雜事未詳何人總六百條朝野僉載補遺三卷右唐張鷟文成撰分三十五門載唐朝雜事鷟自號浮休子葢取莊子其生也浮其死也休之義雲溪友議三卷右唐范攄撰記唐開元以後事攄五溪人故以名其書杜陽雜編三卷右唐蘇鶚字德祥光啓中進士家武功杜陽川雜録廣德以至咸通時事金華子三卷右唐劉崇逺撰金華子崇逺自號也録唐大中後事一本題曰劉氏雜編乾饌子三卷右唐温庭筠撰序謂語怪以悦賔無異饌味之適口故以乾饌命篇幽閒鼔吹一卷右唐張固撰紀唐二十餘事懿僖間人酉陽雜俎二十卷續十卷右唐段成式撰自序云縫掖之徒及怪及戯無侵於儒詩書為大羮史折俎子為醯醢大小二酉山多藏奇書故名酉陽雜俎分三十門為二十卷其後又續十卷北夢瑣言三十卷右荆南孫光憲撰取傳畋於江南之夢以其為高氏從事在荆江之北故以命篇記唐至五代及十國雜事朝廷卓絶事一卷右唐陳岠撰記唐朝忠賢卓絶五十事卓異記一卷右唐李翺撰或題云陳翺記唐室功業特異幷其臣美事二十七類摭言十五卷右唐王定保撰八十三門記唐朝進士應舉登科雜事宣室志十卷右唐張讀聖朋撰纂輯仙鬼靈異事名曰宣室志者取漢文召見賈生論鬼神之義苗台符為之序洽聞記三卷右唐鄭常撰記古今神異詭譎事凡百五十六條或題曰鄭遂續𤣥怪録十卷右唐李復言撰續牛僧孺書也異聞集十卷右唐陳翰編以傳記所載唐朝奇怪事類為一書甘澤謡一卷右唐袁郊撰載譎異事九章咸通中久雨卧疾所著故曰甘澤謡稽神録十卷右南唐徐鉉撰記怪神之事序稱自乙未歲至乙卯凡二十年僅得百五十事楊大年云江東布衣蒯亮好大言夸誕鉉喜之館於門下稽神録中事多亮所言河東記三卷右不著撰人亦記譎怪之事博異志右題曰谷神子纂不知撰人志怪之書也北里志一卷右唐孫棨撰記大中進士游俠平康事集異記三卷右唐薛用弱撰集隋唐間譎詭之事一題曰古異記首載徐佐卿化鶴事尚書故實一卷右唐李綽編崇文目謂尚書即張延賞也綽記延賞所談故又題曰尚書談録按其書稱嘉貞為四世祖疑非延賞也唐語林十卷右未詳撰人效世説體分門記唐世事新増嗜好等十七門餘仍舊云史話三卷右不題撰人自後漢及江左朝野雜事皆記之傳音三卷右唐裴鉶撰鉶高駢客故其書所記皆神仙怪譎事駢之惑吕用之未必非鉶輩導諛所致稽神異苑十卷右題云南齊焦度撰雜編傳記鬼神變化及草木禽獸妖怪譎詭事按焦度南安氐也質訥朴戇以勇力事高帝決不能著書又卒於建元四年所紀有梁天監中事必非也唐志有焦路窮神秘菀十卷豈即此書而相傳之訛與賈氏談録一卷右偽唐張洎奉使來朝録典客賈黄中所談三十餘事歸獻其主秘閣閒談五卷右皇朝呉淑撰記秘閣同僚燕談洞微志十卷右皇朝錢希白述記唐以來譎詭事乘異記三卷右皇朝張君房撰其序謂乘者載記之名異者非常之事葢志鬼神變怪之書凡十一門七十五事郡閣雅言一卷右皇朝潘若同撰太宗時守郡與僚佐話及南唐野逸賢哲異事佳言輒疏之於書凡五十六條以資雅言或題曰郡閣雅談楊文公談苑八卷右皇朝宋庠編初楊公億里人黄鑑裒撰平生異事為一編庠取而删類之分為二十一門晉公談録一卷右皇朝丁謂封晉公不知何人記其所談此書襄陽董識得之於洪州潘延之晉公甥也疑延之所作江鄰幾雜誌右皇朝江休復撰休復歐陽永叔之執友其所記精博絶人逺甚鄰幾其字也景文筆録三卷右皇朝宋祁撰皆故事異聞嘉言奥論可為談助不知何人所編每章冠以公曰景文乃祁謚也東齋記十卷右皇朝范鎮景仁元豐中撰序言既謝事日於東齋燕坐追憶在朝時交遊言語與夫俚俗傳説因纂集成一編崇觀間以其及國朝故事禁之該聞録十卷右皇朝李畋撰畋蜀人張詠客也與范鎮友善熈寧中致仕歸與門人賔客燕談袞袞忘倦門人請編録遂以該聞為目又有雜詩十二篇系于後筆談二十六卷右皇朝沈括存中撰括好功名城永樂不克貶死而實高材博學多枝能音律星歴尢邃自序云退處林下深居絶過從所與談者唯筆硯而已故以命其書凡十七目春明退朝録三卷右皇朝宋敏求次道撰多記國朝典故其序云熈寧三年予奉朝請於春明里因纂所聞見湘山野録四卷右皇朝熈寧中僧文瑩撰記國朝故事孔氏雜記一卷右皇朝孔武仲撰論載籍中前言往行及國家故實賢哲文章亦時記其所見聞者倦遊雜録八卷右皇朝元豐初張師正撰序言倦遊云者仕不得志聊書平生見聞將以信於世也自以非史官雖書善惡而不敢褒貶玉壺清話十卷右皇朝僧文瑩元豐中撰自序云文瑩収國初至熈寧中文集數千卷其間神道墓誌行狀實録奏議之類輯其事成一家言玉壺隱居之潭也衣冠嘉話一卷右未詳何人撰記國初至熈寧中雜事南遷録二卷右皇朝張舜民芸叟撰舜民元豐中從軍攻靈州師還謫授柳州監酒即日之官記塗中所歴幷其詩文茆亭客話十卷右皇朝黄休復撰茆亭其所居也暇日賔客話言及虚無變化謡俗卜筮雖異端而合道㫖屬懲勸者皆録之澠水燕談十卷右皇朝王闢紹聖間撰澠水其退居之地也闢從仕四方與賢士大夫燕談有可取者輒紀之乆而得三百六十餘事漁樵閒話二卷設漁樵問答及史傳雜事不知何人所為後山詩話二卷右皇朝陳師道無巳撰論詩七十餘條續詩話一卷右皇朝司馬光君實撰序云詩話尚有遺者歐公文章聲名雖不可及然記事一也故敢續之東坡詩話二卷右皇朝蘇軾號東坡居士雜書有及詩者好事者因集之成二卷歐公詩話一卷右皇朝歐陽修永叔撰修退居汝隂戯作此以資談笑中山詩話三卷右皇朝劉攽貢父撰多及歐梅蘇石攽以博學名世如言蕭何未嘗掾工曹亦有誤謬詩眼一卷右皇朝范温元實撰温范祖禹之子學詩於黄庭堅歸叟詩話六卷右皇朝王直方立之撰直方自號歸叟元祐中蘇子瞻及其門下士以盛名居北門東觀直方世居浚儀有别墅在城南殊好事以故諸公亟㑹其家由是得聞緒言餘論因輯成此書然其間多以己意有所抑揚頗失是非之實宣和末京師書肆刻印鬻之羣從中以其多記從父詹事公話言得之以呈公取覽之不懌曰皆非我語也東軒筆録十五卷續録一卷右皇朝魏泰撰襄陽人曾布之婦弟為人無行而有口頗為鄉里患苦元祐中紀其少時公卿間所聞成此編云冷齋夜話六卷右皇朝僧惠洪撰崇觀間記一時雜事惠洪喜遊公卿之門後生事配𨽻嶺表青瑣高議十八卷右不題撰人載皇朝雜事及名士所撰記傳然其所書辭意頗鄙淺雲齋廣録十卷右皇朝政和中李獻民撰分九門記一時奇麗雜事遯齋閒覽十四卷右皇朝陳正敏崇觀間撰正敏自號遯翁録其平昔所見聞分十門為小説一篇以備異日披閲勸善録六卷右皇朝周明寂元豐中纂道釋神奇禍福之効前人為傳記者成一編以誡世勸善録拾遺右不題撰人疑亦明寂所纂僅百事悅神集一卷右不題撰人記滑稽之説唐有邯鄲淳笑林此其類也漫叟見聞録一卷右不知何人建炎中所撰也碧雲騢兩卷右皇朝梅堯臣聖俞撰碧雲騢馬名以旋毛貴陰詆范文正公劉餗小説十卷右唐劉餗撰纂周漢至晉江左雜事皮氏見聞録五卷右唐皮光業撰光業唐末為錢鏐從事記當時詭異見聞洛中紀異十卷右皇朝秦再思撰記五代及國初䜟應雜事牧豎閒談右皇朝景漁撰多記奇器異物漁自號玊壘山閒吟牧豎云南部新書五卷右皇朝錢希曰撰記唐朝雜事括異志纂十卷右皇朝張師正撰師正游宦四十年不得志於是推變怪之理參見聞之異得二百五十篇祖異志十卷右皇朝聶田撰田天禧中舉進士不中第因記近時詭聞異見一百餘事雞跖集十卷右未詳撰人纂集書傳中瑣碎佳事分門編次之傳曰善學者如齊王之食雞跖其名書之意殆以此也羣仙㑹真記五卷右唐施肩吾集言鍊養形氣補毓精神成内丹之法凡二十五篇王氏神仙傳右偽蜀杜光庭纂光庭集王氏男真女仙五十五人以諂王建其後又有王虛中續纂三十人附於後神仙傳右晉葛洪之弟子滕升嘗問曰古之仙者豈有其人乎洪答云秦阮倉所記有數百人劉向所纂又七十一人今復録集古之仙者以傳真識之士云釋書類維摩詰所説經三卷右姚秦僧鳩摩羅什譯什與其弟子僧肇等注十四品楞伽經四卷右宋天竺僧求那跋陁羅譯元魏時僧達摩以付僧慧可曰吾觀中國所有經教唯楞伽可以印心謂此書也金剛經㑹解一卷右後秦僧鳩摩羅什譯唐僧宗宻僧知恩皇朝元仁賈昌朝王安石五家注般若波羅蜜多心經集解一卷右唐陳留僧𤣥奘譯并注長安中僧法藏為之疏元豐中僧法泉亦注之圓覺經疏三卷右唐長壽二年天竺僧覺救譯宗蜜疏解大佛頂首楞嚴經疏二十卷右唐神龍二年中天竺國僧彼岸於廣州譯房融筆授皇朝僧子璿撰疏王隨為之序宗鏡録一百卷右皇朝僧延壽撰壽因讀楞伽經云佛語心為宗乃制此録設或人問即引大藏經云以答之凡一百卷楞嚴標指要義十卷右皇朝僧月公撰其弟子應乾録范峋為之序圭峰原人論一卷右唐僧宗蜜撰斥執迷褊淺直顯真源㑹通本末凡四篇𢎞明集十四卷右梁釋僧祐纂采前代勝士書記文述有益於釋教者多宗炳何尚之輩著述六祖壇經二卷右唐僧惠昕撰記僧盧慧能學佛本末慧能號六祖凡十六門周希後有序龎居士語録十卷右唐龎藴襄陽人與其妻子皆學佛後人録其名言成此書景德傳燈録三十卷右皇朝僧道原編其書披奕世祖圖采諸方語録由七佛以至法眼之嗣凡五十二世一千七百一人獻之朝詔楊億李維王曙同加裁定億等潤色其文是正其差繆上之遂大行於世為禪學之祖傳燈玉英集十五卷右皇朝王隨撰以傳燈録繁冗難觀刪為此録景祐甲戌上之詔書奬答有序附于後天聖廣燈録三十卷右皇朝李遵朂編斷自釋迦以降仁宗御製序分燈集二十五卷右皇朝井度編葢續三燈録也禪苑瑤林一百卷右皇朝井度編取三燈録所載祖師言行附入諸方拈提語句且是正其差誤云林間録二卷右皇朝僧德洪撰記高僧嘉言善行謝逸為之序然多寓言如謂杜祁公張安道皆致仕居睢陽之類是也按祁公慶歴六年致仕治平中薨安道元豐末始請老葢相去二十年矣其疎濶可笑也雪竇頌古八卷右皇朝僧道顯撰居雪竇山注維摩詰經十卷右後漢羅什譯什又與其高弟僧肇道生道融注釋之淳化中張齊賢刻之板忠國師多心經一卷右唐僧慧忠肅宗師事之此其所著書也六祖解心經一卷右唐僧慧能解法界觀一卷右唐僧杜順撰華嚴經最後品名曰法界叙善財參五十三位善知識經文廣博罕能通其説杜順乃著是書宗宻注之裴休為之序法界觀摭一要記四卷右皇朝僧遵式述其序云元豐初覽清涼𤣥鏡圭峰注取其合者録之六祖壇經二卷右唐僧慧能授禪學於𢎞忍韶州刺史韋據請説無相心地戒門人紀録目曰壇經盛行於世華嚴經決疑論四卷右唐李通𤣥撰太原人則天朝撰華嚴合論又著此書皇朝張商英使河東得之壽陽縣東浮屠廢書中㑹解楞嚴經十卷右唐僧彌伽釋迦譯語房融筆授皇朝井度集古今十二家解去取之成此書修已金剛經㫖要一卷右皇朝僧修已住持峨眉山白水寺道楷之法嗣也釋氏要覽十卷右皇朝僧道誠集雜録釋典旁采書傳分門編次成二十類天禧三年書成高僧傳六卷右梁僧惠敏撰分譯經義解兩門求法高僧傳兩卷右唐僧義淨撰淨垂拱中往天竺求佛經既還因纂集唐僧往西域者五十六人行事僧寶傳三十卷右皇朝僧德洪撰其序云五家宗派嘉祐中達觀曇穎嘗為之傳載其機緣語句而畧其終始行事德洪謂入道之緣臨終之効有不可闕者遂盡掇遺編别記補以諸方之傳又自嘉祐至政和取雲門臨濟兩宗之裔絶出者合八十七人各為傳系之以贊云錦囊集一卷右皇朝僧瑞光集皆教其徒答問語也郡齋讀書志卷三下欽定四庫全書郡齋讀書志卷
